front:
  text: 大佛頂首楞嚴經正脈疏序京都西湖沙門交光真鑑述本元覺海在纏名如來藏心湛寂性天當體號首楞嚴定豈惟世出世間從來不動亦且情與無情法爾無生奈何華起翳睛夢沉長夜於不動中而見遷流動轉於無生內而受生死輪回若是則豈但凡外狂走不能脫於瀑流是雖權小劬勞亦未免於細注率由未見天真之本定徒攻縛識之枯禪所謂生滅為因終無實果也故我釋尊因中悟此為密因果中證此為極果寂場海印非不欲普灌醍醐而夢夜昏狂要須待多方淘汰及其機熟仍示元心法華方以開端斯經乃以竟説多聞示墮警狂慧策力於深禪答定徵心破凡小全迷於偽定是必偽定全捨而後大定可聞由是向六根而指見性令親驗乎不動之本真會四科而示藏心令備明乎常住之自體復通七大極顯周圓阿難遂以讚不動尊謝希有定是尚未及於請修而所謝首楞嚴王非指自性本定而何哉此方答慶喜會妄歸真顯空藏不變之體下及酬滿慈從真起妄顯不空隨緣之用又復雙明性相見空與不空二俱無礙而圓彰三藏之全體大用然後知一切事究竟堅固之定體本自圓成徹法源不動不壞之楞嚴非由造作所謂奢摩他微密觀照發盡無餘回視強制識心思惟影相之定天淵未足為喻矣然而定雖本有根結未開體固無虧用終不發由是當機思契入而喻屋求門如來示決定而指根明結於中列數量所以令其選圓推攬塵所以明其可盡疑斷滅則擊鍾以驗其不滅疑別有則現佛以證其無他乃至綰巾而六結有倫冥授而諸長悉啓及敕文殊之推選獨取觀音之耳門蓋必寂滅之真體現前而後圓應之妙用備發真所謂如幻三摩提彈指超無學矣若夫道場三學祕呪四檀但為修圓通而障重者加行耳非別有異門也是則華屋之門方入而升堂入室不無所歷之位故當機繼是以請位焉佛乃楪加行圓通以為三漸束三漸以為乾慧即以此心中中流入由是生佛家而名十住行佛事而名十行攝歸三處名十向實證一真名十地以至等覺覆涅槃海即大寂滅海而生死永寂妙覺入莊嚴海即萬德果海而菩提永成顧謂歸無所得者明但復還乎本不動體而出現其本有家珍非從外得也豈同非因非果空無所獲哉斯乃依禪那以修進聖位而首楞嚴大定成始成終故結五名而囑其奉持焉至於七趣勸離五魔教識亦前文要義特重伸以加詳耳最後深慈曷有窮己乎是則斯經也一乘終實圓頓指歸語解悟則密因本具非假外求語修證則了義妙門不勞肯綮十方如來得成菩提之要道無有越於斯門者矣夫何經本分明而注多莽鹵正脈既失本旨多乖後賢指摘成帙甚至但説本文學者莫決從違而臨文浩嘆者多矣鑑長夜迷徒釋宗晚學賴聖賢加被發薄少善根偶窺華屋之門輒憫宮墻之望僭伸管見請正大方實非橫陳臆説而蔑先賢意惟曲順佛言而資後學知我罪我靡恤靡逃所冀暫結喜緣普碎阿鼻而成樂國倘開妙悟咸歸大定而證菩提他日於諸佛會下寧非同行眷屬哉特撮略以冠篇端而其詳在懸示云
