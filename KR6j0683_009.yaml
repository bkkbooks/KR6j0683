body:
  text: 京都西湖沙門交光真鑑述二四禪溫陵曰自此而上明十八天雖離欲染尚有色質故通名色界又通名梵世為已離欲染也通號四禪為已離散動也欲天但十善感生此天兼禪定感生然特有漏禪觀六事行耳六行者厭欲界是苦是粗是障欣色界是淨是妙是離此則凡夫伏惑超欲界道也前天亦間有禪定而此界方名禪者以前結云形雖出動心迹尚交足知自此以上絶無女人心迹俱離無所交接兼無食眠三欲俱忘稍涉飢倦即入禪定出定則飽滿精明是但以禪悅為食為息稍離粗重身心矣略分四重各有本定故云四禪詳分十八重但疑亦有同處而區分勝劣為類者未必十八皆以上下為次也至文再詳分二一正分四禪就分四一初禪三天此三天雖入禪侶而戒德偏勝雖顯戒偏勝而後二天略顯定慧至文自見又二一示三天別相又三一梵衆天阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵衆天首言世間顯非出世而亦言修心者以凡迷冥修誰不自謂真正修心魔鬼尚謂得無上道何況禪天然諸經皆謂禪天靜慮等持靜即是定深於六欲慮即是慧揀於四空故權教之佛寄此而成今言不假禪那無正智慧者顯彼惟有漏靜慮伏欲六行而已非無漏真三摩地妙圓通矣此義亦應通後向下方是本天別文此天且獨顯戒德而未彰定慧先言執身者表異六欲縱強忘情不免身犯此身全遠梵行方成若行下表非不攝心身心俱潔故下無卜居而上界同侶矣衆即梵世之庶民也二梵輔天欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天環師言此天戒與定共首二句表上天但初離欲清淨心相未至顯現此則離欲清淨心相顯發著明前天如病初愈未至康壯此天如已康強光澤諸律即梵行戒品愛樂則悅豫隨順則輕安即與定共之相也行梵德者不但清淨身心亦且弘揚德化亦以內心外儀無間故生天既輔化即天臣矣三大梵天身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王如是一類名大梵天此天乃顯戒與慧俱初天執身次天心現此天雙攝故言妙圓又初天由執身而攝心次天由心現而行德此之身心得一如無二之妙滿足分量之圓威儀不缺者行住坐臥皆妙圓也次二句正戒與慧俱之相明悟亦即六行之智等增明而已前天之德能輔王化臣道也此天之德能統梵衆猶體仁足以長人君道也亦慧愈前天故勝耳示三天別相已竟二結苦離漏止阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪溫陵曰已離欲界八苦故曰苦惱不逼已離散動欲心故曰諸漏不動俱舍論云此名離生喜樂地謂離欲界雜惡趣生得清淨樂也孤山曰禪有四類一有漏禪即今四禪也二無漏禪謂九想八背等三亦有漏亦無漏禪謂六妙通明等四非有漏非無漏禪即今經首楞嚴王中道理定今云雖非正修真三摩地此以第一簡非第四耳自此以上皆稱勝流表勝欲界諸趣此三天頗疑恐非竪分夫天民天臣天王各居一層何成一統且臣民尚許衆多而天王何至滿天獨居一層彼此皆王何所使令但恐如四王臣於忉利上下居之然忉利別有臣民同居却非全取於四王或者大梵天子諒亦非多彼之一天廣列王居惟以同其眷屬而下之臣民供役者暫升寄居無事退居本天若是則仍是上下竪分然未有的據尚俟參考初禪三天已竟二二禪三天前天定力尚假戒扶此則不假戒扶而自不動定勝發光以光之勝劣為次吳興曰地持論目第二禪名喜俱禪此定生時與喜俱發分二一示三天別相就分三一少光天阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天統攝二句元似大梵所為故此天疑從彼天中修來蓋躡前行而但加圓滿則升此天環師亦謂躡大梵之行升進者是也澄心下方是此天勝處澄湛生光如水澄成映而靜極發照用也問此與菩薩寂照何殊答人法二執毫髮未動但以離欲得定定深生照而已此其別也下皆放此二無量光天光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天溫陵曰定力轉明妙光迭發境隨光發遍成琉璃真際曰映十方界者約其定光隨所受用東西南北等言之非遍十方世界也按此天雖不能映諸大千而於本界亦覆小千當滿一千箇四天下何無十方界乎三光音天吸持圓光成就教體發化清淨應用無盡如是一類名光音天此以光明代其言音以宣彼梵行教化如世間以文字代其言音而亦以宣諸教化與用光明作佛事者同也發化二句明其闡揚梵教其妙無窮也沇師緣此遂謂二禪以上俱無語言恐未必然如世紙墨文字雖代言教豈盡廢其言語哉示三天別相已竟二結憂離漏伏阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪懸不安也前天言苦惱乃粗重切於身心此憂懸輕細但涉於心念而已今亦不逼喜樂可知溫陵曰二禪離憂得極喜樂故云憂懸不逼初禪方得漏心不動而未能伏此天已伏粗漏俱舍云此名定生喜樂地謂有定水潤業憂懸不逼也吳興曰懸或作愁字之誤也二禪三天已竟三三禪三天吳興曰地持論目第三禪為樂俱禪此定功德與遍身樂俱發故前二禪雖有樂支為喜支所障今滅喜純樂故得其名分二一示三天別相分三一少淨天阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天溫陵曰由上圓光教體披露妙理發成精行離前喜動而生淨樂恬泊寂靜名寂滅樂能通而已尚未能成以猶劣故名少淨也精行亦與披露妙理相應之淨行也寂滅樂亦定深心安所發不可濫於本性寂體蓋名同而體異耳下文云久必壞生其意蓋可見矣二無量淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天首句言前但得淨此更發空漸以虗豁至無邊際前通寂滅但樂內心此加身心內外安樂積中發外廓然廣大故稱無量淨也三遍淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天前但身心此加世界通成虗寂故曰圓淨此但定力所使所謂境隨定變而已非唯心觀力所使也淨德二句躡上而言既世界身心圓淨豈非淨德成就勝託二句將謂真實安身立命清淨極樂之家鄉矣前雖發外仍是身心虗曠之境未融世界今並融之故稱遍淨示三天別相已竟二結安隱喜具阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪具大隨順者異初禪隨順律儀非大隨順此隨順淨樂至無量周遍故具大隨順安隱即自在受用也無量樂即樂之至極故界內以三禪為極樂處也此地名離喜妙樂而仍言歡喜畢具者以有安隱心中四字揀之故也良以喜是動心所發樂是靜心所融若在飛動心縱説樂而仍是喜支若在安隱心縱説喜而仍是樂支嶽師謂名同體異是矣又言不以辭害義者不達已有安隱心中為揀別也三禪三天已竟四四禪九天溫陵曰自此而下明四禪凡有九天然四禪報境但有三天第四無想乃第三廣果別開是外道報境此四之上有五不還天乃聖賢別修靜慮與凡夫不同分二一四勝流天因佛總結此四勝流故作是科不揀第四外道以同是捨俱禪耳故佛同判又當知四禪取捨不出三受前天捨苦受而住樂受此天二受雙捨而住捨受耳又二一示四天別相又為三一示前二天前三天雖為一聚而第三與無想分岐故此兩兩為科也二一福生天阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天不逼二句結前二禪明苦已離蓋初禪苦惱離二禪憂懸盡皆不逼也欲是苦因諸欲杜絶故苦因盡樂非二句結後一天明樂亦不當受之意則可了苦樂下乃躡此樂之有壞故起雙捨之心正是本天功行蓋既已離苦亦不受樂樂既不受壞亦不生粗重相滅者苦壞雙超也淨福性生者有樂不受福自積漸生也命名可知二福愛天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天前天初專於捨未免偏空此既純熟漸不礙有故曰圓融勝解清淨者解此清淨比前最勝前以離欲離苦為清淨此則苦樂雙離復不礙有故也蓋空即捨定有即福德遮限也妙隨順者大自在也蓋大福者有所願求無有遮限得大自在也窮未來際者如嶽師所謂福資二路非止當天是也更望上二天中受報無窮之意非真常住之謂也名福愛者言此天福德於有為界中亦可愛樂也又此天所積福德別有愛求即希上二岐路也二判二岐路阿難從是天中有二岐路是天即福愛天從是天而入岐路者心念行業各別也下科自見其意溫陵曰一直往道趣廣果一迂僻道趣無想又嘗因此詳味之語上升則循序者多頓趣者少如世升官類也語下墜則直墮者多循序者少如世謫官類也今經所明似皆從下一天修之升上一天皆單約循序之意便於演説而已餘可以意得之三示後二天即二岐路就分二一廣果天若於先心無量淨光福德圓明修證而住如是一類名廣果天先心即福愛天中妙隨順心能令所求如意然此心以定福相圓融為體今無量淨光即捨俱禪定深而發光也於此光中滋令福德增盛圓明剋取修證資中曰以四無量心薰禪福德離下地染廣果所感名廣果天也二無想天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天先心同前但廣果天令福德增盛此天乃令捨定增盛正因妄謂依此可得涅槃此兩天分岐之故也首二句躡前心也精研下三句加功修因也精研者深搜細絶也相續者勤勇無間也圓窮者必求究竟也身心三句定成剋果也言在定中渾成晦昧冥然一空雖只言身心必兼滅界正彼妄取為涅槃果也經五百劫大劫也自初生以至壽終得此長時而已是人下四句出其無常之故正由向二種根本錯亂修習耳初句明其錯依六識生死根本為本修因強令灰凝次句明其反迷識精明元圓湛不生滅性而全不知用故也末二句明始終皆墮無常初半劫滅者初生習定半劫始滅想也後半劫生者報盡定銷半劫復生想也問身界俱空何異四空答出定則有故不同也然亦但有身界非並起於雜想耳四天別相已竟二結不動純熟阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪同修雙捨故二境莫動溫陵曰四禪不為三災所動名不動地然彼器非真常情俱生滅雖非無為真境而有為功用至此已純熟矣問不為三災所動何言器非真常答他經明此天天人生時宮殿園林隨之而生死時隨之而滅但無總壞相耳又通論四禪初禪共戒戒德增上二禪喜俱光明增上三禪樂俱淨樂增上四禪捨俱而於中前三天福德增上後一天捨定增上此其別也四勝流天已竟二五那含天溫陵曰第三果人斷欲界九品修惑盡即生此天不復欲界受生資中曰俱舍云雜修靜慮有五品不同故生五淨居天雜修者以有漏無漏間雜而修也靜慮者定慧均等之謂也五品者下中上上勝上極也五品五天既皆從劣向勝則五天按品分之似亦無差又既有勝劣豈不約斷惑之淺深而分居之若是則前四天似以次而斷本界四地之惑第五天既名色究竟似斷上無色界四地之惑比量判之以俟參考既非決定縱有小差非過也分三一標聖果寄居阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙忘下無卜居故於捨心衆同分中安立居處溫陵曰不復欲界受生故曰不還亦名五淨居謂離欲淨身所居也習氣思惑也與現行皆滅故曰俱盡齊此以上是表聖人斷惑之事明其有異四禪也蓋凡夫伏惑而不能斷此聖凡之分下界即欲界也習氣即思惑種子思惑謂貪嗔癡慢是任運而起輕細之惑非同分別中粗惑也分八十一品斷之蓋於三界九地地各九品今此九品乃欲界五趣雜居地之九品於上中下復各分三天上人間經於七生往返斷之而言俱時滅盡約最後一剎那斷盡證三果也齊此以下乃是表五天寄居此地之由明其有同四禪處也伏問云何故上下懸絶偏居此地答云由彼欲界惑盡粗苦已除三禪淨樂又復不受其所入定復是苦樂雙忘捨俱禪耳夫苦忘則五趣雜居地無卜居處樂忘則三禪三地無卜居處以非其同分也然既捨俱禪定與此捨念清淨地獨為同分所以獨於此地卜安處也住此以斷七十二品最細貪癡慢希成阿羅漢矣二示五天別相就分五一無煩天阿難苦樂兩滅鬬心不交如是一類名無煩天按五品此天似在下品亦似應斷離生喜樂地中九品思惑也鬬心即欣厭二心蓋苦樂未忘時則厭苦欣樂交戰胸中故曰鬬心今已兩忘故曰不交盛熱曰煩亦狀其內心鬱陶熱中之象有鬬心者所不能免此方不交初得清涼故名無煩二無熱天機括獨行研交無地如是一類名無熱天此天似當中品似應斷除定生喜樂地九品思惑也機即弩牙狀念之放也括即囊括狀念之收也放收亦起止也獨行言其惟一捨念或放起或收止更無餘念雜於其間到此全不見欣厭研交之地意表前此雖不研交猶見交地耳微煩曰熱并熱亦無者捨念清淨既加勝則意地清涼了無熱惱矣三善見天十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天此天似當上品似應斷除離喜妙樂地九品思惑也十方世界即一大千之量也妙見即天眼也既與四禪同分天眼亦應同四禪見大千總相圓即滿大千也澄清徹也塵象約境言明其更無障隔之境也沉垢約心言明其更無留滯之念也若作思惑而復言一切豈思惑至此天而即盡耶名善見者表此天定體澄清善於鑑照矣四善現天精見現前陶鑄無礙如是一類名善現天此天似當上勝品似應斷除捨念清淨地九品思惑也前天定體圓而定用未勝此天體用兼勝故首躡前天之妙體次句發此天之勝用陶鑄無礙者亦同摩醯首羅隨心造化一切萬物如陶之燒瓦鑄之鎔金得其自在問聖人豈亦同魔所為答既與同分亦當同具此能而已豈並同其貪權妄宰耶名善現者表具變現之用耳五色究竟天究竟羣幾窮色性性入無邊際如是一類名色究竟天此天似當上極品似應斷四空四地中三十六品思惑問憑何度量此偏多斷答既名色究竟便以盡色為義而四空皆究竟離色故知然也況準前皆重惑獨斷輕惑共斷今度末後最輕一天可共斷也吳興曰究竟研窮之謂也幾者動之微也研窮多念至於一念故曰究竟羣幾以雜修五品初用多念無漏薰多念有漏乃至最後用一念無漏薰一念有漏名上極品故俱舍云成由一念雜是也問此豈不與子所説前少後多相違耶答此約能斷之智前繁後簡我約所斷之惑前重後輕如多念有漏豈非重惑故一天惟斷九品後乃漸少豈不末後最輕況輕惑復分多品所以一天可獨斷之也窮色性性者即嶽師所謂心既薰多至少色亦窮粗至微是也言性性者以凡外謂極微為色性猶言微而復微也入無邊際者入四空邊際也色究竟者色至此而淨盡無餘也示五天別相已竟三結四天不見阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見唯識謂二禪以上不分王臣此言四王者或推尊上首略似於王餘亦不必如下界之臣故亦可言有王無臣也有聞無知見者斷惑與伏惑無漏與有漏聖人與凡夫粗細懸殊故但仰嘉名不知其受用不見其依正也如今下取例人間也聖道場地如天台竹林等是也雖言羅漢亦兼菩薩如五臺蛾眉亦但欽聞不知見也因此疑五天似但居廣果方如聖寄人間欽聞不見若上下懸絶何必云此況佛初只言此中而未言此上猶可見也正分四禪已竟二結屬色界阿難是十八天獨行無交未盡形纍自此已還名為色界孤山曰獨行無交俱無情欲故未盡形纍尚有色質故又上句明所離下句明所住自此以還者自色究竟天以下直至梵衆同一色界矣四禪已竟三四空溫陵曰自此而上明無色界四天也無色者無業果色有定果色依正皆然乃滅身歸無捨厭天人雜處其類不一皆無色蘊也四天皆依偏空修進初厭色依空二厭空依識三色空識三都滅而依識性四依識性以滅窮研而不得真滅是皆有為增上善果未出輪回不成聖道者也此中盡色趣空凡夫是其正居定性聲聞寄居而異計外道雜處也分五科一標岐除聖復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢溫陵曰色竟天居有色頂與無色鄰名色邊際四禪皆依捨念修定此言捨心指有頂因心也吳興曰色究竟天第三果人根有利鈍故分二路其利根者發無漏智斷盡修惑即出三界其鈍根者復由定心欣上厭下生無色界智慧即人空智思惑盡而空智滿名慧光圓通成阿羅漢即出三界入菩薩乘則復離單空下結回心有二意一約回心羅漢則回其欣上厭下之心而頓出三界二約回心菩薩則回其捨大取小之心而速入大乘然此之一類元是不定性人而又根利者也反顯定性而又鈍根者方入四空耳此亦順序而談故就便直約色究竟人説其入四空天其實凡夫廣果外道無想俱與空鄰俱可上入四天請觀後出墜聖凡其意可見二正列四天分四一空無邊處天若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處首二句躡前天次二句明本天溫陵曰厭己形礙堅修空觀滅身歸無即厭色依空者也名空處定故報生空處也長水曰捨心有二一者若於有頂用無漏道斷惑入空即樂定那含也二者若於廣果用有漏道伏惑入空即凡夫外道也二識無邊處天諸礙既銷無礙無滅其中惟留阿賴耶識全於末那半分微細如是一類名為識處首句躡前天果相次句以下即本天功行果相溫陵曰諸礙既銷而無則不依於色無礙之無亦滅則不依於空惟留阿賴末那即厭空依識者也名識處定故報生識處賴耶第八識末那第七識也而末那所緣色空識三此位厭色空而依識則色空粗緣已無故惟全半分微細也問按惟識末那不緣外境但內執八識見分為我環師何謂亦緣色空答七緣色空固無此理但既內執賴耶為我亦任運外執色為他所以色空若在全分末那俱在今色空既盡故惟半分末那入微細也問末那賴耶羅漢未了凡外那含何以知之答此自如來明眼了見與之作名非許彼知也在彼固自以為離色空即性真也迷同無想法華云衆生住於諸地惟有如來如實知之是也三無所有處天空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處首句躡前天果次句下本天因果識心即前末那賴耶而言都滅者憑深定力二識現行俱伏不行例如無想伏六現耳彼伏五百劫此伏六萬劫問現行何狀滅之何如答七緣第八能所歷然名為現行即是前天更進深定能所緣息暫名都滅即是此天故知此滅非如羅漢種現俱斷之謂也寂無攸往者滅識定中所證境界廓然冥然不復能前進矣此外道昧為冥諦之處也末句命名謂色空識三者皆無所有也四非非想處天識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處環師見此言識性不動故説前天方亡識心未亡識性不審心性何分至此又釋識性為幽本亦不審何為幽本若以識心為現行識性為種子則似理通而種子眠伏藏識誠為幽本不動者以凡外未秉佛斷種法門那含未盡思惑故皆覺其堅確不可動搖以滅窮研者強憑滅定之力窮之欲盡研之欲透也下二句判決其卒不可盡有二意若約賴耶本體即是藏性則凡聖皆無可盡之理若約種子則凡外既無斷法終不可盡那含復是鈍根亦非盡時而於此天初心皆強以發宣欲盡其性不可得也以上皆是生此天之因即所用功力也次下二句方是住此天之果蓋於二識如殘燈然半滅半明而已良以滅定所逼故如存不存似燈半滅也種體莫動故若盡非盡似燈半明也末後環師承如存不存以結非想承若盡非盡以結非非想得其語脈矣蓋非想即非有想非非想即非無想耳正列四天已竟三聖凡出墜此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉此科專明住無想者八萬劫滿聖類即出三界凡類即墜輪回各有終相而已舊注全不達此撥羅漢仍作那含説後半但遮無想了無關要無謂之甚也請詳今解首二句通判無色渾包聖凡此即無想等即前三窮空者初天窮色令銷二天窮空令無三天窮識令滅四天窮性令盡蓋前二窮境後二窮心欲令心境俱空故總謂窮空不盡空理者凡外未了人空之理小聖不達法空之理何況圓頓之旨心境本空豈待銷滅故總斷其不了耳向下方分言聖凡出墜不同言彼住非想者若元從五天修習聖道而來此之一類八萬劫滿思惑斷盡即出三界成阿羅漢而言不回心者亦有二意若追過去乃責其不於色頂早回欣厭之心速成羅漢若按未來乃明其必且不回趣空之心向菩薩乘以彼是定性聲聞非前不定性矣又言其鈍者以彼備歷四天比前利根者多修二十萬劫故也問前於色頂已判思惑斷盡不審斯人在四空中何所修斷答前約利根鈍豈能同鈍根在五天時前四斷惑同於利根至第五天不回欣厭之心但加功銷礙求生四空後半之惑期於彼天斷之則四空四地應於每地各斷九品故至非想劫滿方盡也準此則上極一品當連色頂通該五天比度應然再俟參考此明聖出已竟向下方明凡墜言彼住非想者若元從無想廣果諸天但惟修習有漏禪定窮空而來者則八萬劫滿無所歸托即當下墜入輪回矣問後經謂無想妄執涅槃而臨終謗佛墮獄今何許至非想答嶽師正因此惑而謂不來不知後經所云但時間或有之而根性萬殊豈箇箇皆然耶問佛云諸外道天何知亦該廣果答尋常對佛天乘為內教則無想獨為外道今對佛小乘為內教故並呼諸天皆外道也云不歸者言其一味窮空更不回心歸順聖乘至此力竭途窮無所歸托只得下墜又言迷漏無聞者出其由過以警後人也言彼特因迷有漏因作無為解闕於多聞但勤小行之過所以至此無歸而直墮也由是而知上言不回心鈍羅漢者亦出過以示警也言彼特因不早回心以致遲鈍經久方成此意詳味之四通分凡聖阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩地漸次增進回向聖倫所修行路前科但判非想聖凡終盡之事此則通判三界現住天人孰凡孰聖合是諸天總結宜居下科之後通前總結科中誤居此耳天人謂臣民也業果酬答者十善八定為實功業而六欲四禪之果所以酬答之也答盡入輪者即永嘉所謂勢力盡箭還墜也問上界無惡何亦有直墮三塗者答藏識雜種遠劫不忘次第而熟不能逾越今天福報終隨彼熟種任運而墮豈揀三塗此如來所以苦勸念佛以橫出也漸增回聖寄修進也然以菩薩位配諸天王諸經約教不同名位參差不敢詳定環師引華嚴三地方配天王亦大略而已豫記天台配詳再容考定五結屬無色阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界初二天全無身境故曰身滅後二天七八現行俱伏不行故曰心滅盡也定性現前者約在定時有定果色即則師引顯揚論説為定自在所生色蓋隨化依正自在受用矣無業果色者約出定時身心俱寂依正皆空聖眼觀之三尺識神似中有也從此逮終者從初天至四天也結名無色者但憑定力二十萬劫暫無依正非真蘊空永絶業果正列諸天已竟二通前總結此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特伽羅各從其類此自六欲以至非想通結之也妙覺明心即近具根中遠包萬法者也本無生死識心曰妙本無冥頑色空曰覺本無無明惑障曰明現具而不自見故曰不了積妄二句言長劫執著取捨故三界永成實有長眠大夢也中間二句以此為結諸天故言諸天雖浪施功力特未明心故終不免同溺生死同名七趣甚憐惜之以示警也末二句明分類之由補特伽羅此云數取趣即中有也以能數數受生取於諸趣故命斯名蓋言諸天諸天中有身己業同類受生各為一聚故文中每言如是一類也諸天趣已竟七修羅趣按佛序談七趣皆從劣向勝此趣具有勝劣四趣分攝故居於此按本經所判同分但空水天處而已嶽師引阿含謂南洲金剛山中有修羅宮治六千由旬欄楯行樹等然一日一夜三時受苦苦具自來入其宮中豫亦藏中屢見之恐是乘通入空者亦同旦遊虗空暮歸此宿耳不然應與下劣同類散處地上者也尚當闕之以俟考證分二一總標名數復次阿難是三界中復有四種阿修羅類以是俱攝故渾標三界實但居於欲界環師以非天譯名謂其多瞋有天福而無天行亦云無端正以夫醜婦美從男受稱亦云無酒以嗔無和氣任釀不成四類下文自分之二別釋趣攝分四一卵生鬼攝若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝鬼道是此類前因言彼元從鬼趣發心護經呪禪戒等皆名護法所生福力升此趣中乘神通入空界居之似與三夜叉天為鄰卵生飛空因果類鬼故屬鬼攝也二胎生人攝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝天中是其前身也降德是因言在天中或有損德之過或天福已盡俱是降德貶墜是果即沉此趣胎生類人故人趣攝三化生天攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝執持世界者亦能驅役鬼神禍福人間如孔經亦云修羅所罰其意可見但其專權不及諸天故每怒而爭之洞通也徹也力洞無畏者言其威力通徹諸天無所恐怖也經稱化身十六萬八千由旬手撼須彌諸天震恐帝釋四天常與戰鬬今言梵王亦爭者帝釋或不勝時則梵天以下俱助力也荊溪謂法華四類是此一類無疑矣化生福力俱等於天故天趣攝也此趣獨不言其在處既勝前趣似應更居於上然終未聞修羅鄰於忉利恐與前趣同居此或是修羅王而前乃修羅衆耳再俟考定四濕生畜攝阿難別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝海心水口者豫閲起世經言須彌入水八萬四千由旬修羅分四級居即此類也生居劣下故以畜攝餘意可知備明諸趣已竟二結妄勸離所以備明諸趣者意正在此分三一藥病雙舉七趣皆病而此經大定是藥如來所以深明病態者意在激其速進藥也又三一總舉妄病阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒精謂詳熟研謂窮究蓋升沉往復百千萬回不知出要故也皆是下出其病態昏沉惑也有為業也受生隨業果也所謂惑業苦三如惡叉聚也於妙下總明其妄先舉真心以反顯之業果不縛曰妙空有不墮曰圓惑障不覆曰明不由取捨修證曰無作此即人人本有妙心七趣在此心中如空華在太虗中豈有毫末住著豈有根蒂頭緒之可得哉二指病深根阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性溫陵曰前問妙心遍圓何有獄鬼人天等道故此結示由殺盜淫三為根本也上言無根緒而此又指病根者蓋妄雖無體起固無因而妄理相應續非無故故復指也不識下先迭三道之相續本心即上科妙心不識即惑道也受此下即永為業果二道所輪不得真淨者言欲界固不淨而上界離欲離色自謂已淨矣而無奈隨眠畢竟非真淨也皆由下正指病根言隨順即成三惡反之則成三善正皆是三道相緒之病根也問三善何為病根答因回向三有同障出要也有名四句正表其同是繫三界之根本也有之而成三惡固是鬼倫攝三塗也無之而成三善亦但天趣同人仙也修羅隨攝分之傾即奪也奪有成無從下升上奪無成有從上墜下互奪不已善惡俱無出期故曰起輪回性也三定藥能除若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事當知詳敘七趣揭露病根全為此科勸修大定也妙三摩提者剋體對機即耳根圓通也妙常寂者聞性三德相也妙即圓通二真實常即常真實寂即自性本定也又妙則本無七趣繫縛常則本無七趣生滅寂則本無七趣流轉故能反聞常住此性者則有無云云有即三惡無即三善二俱遠離曰有無二無此先得人空出三界也無二即小乘涅槃此更復滅成法解脫越二乘也所謂忽然超出世出世間圓師亦謂雙超生死涅槃末二句猶言輕病尚無何況重病圓師復補云尚無無二云何隨二亦好大抵深激其修大定也藥病雙舉已竟二同別俱妄阿難不斷三業各各有私因各各私衆私同分非無定處自妄發生生妄無因無可尋究溫陵曰前問地獄為有定處為復自然彼彼發業各各私受故此牒答三業即殺盜淫也據此是通結七趣不斷二字應兼有無前問處但是疑受果報時同受耶私受耶同受則同分之地共居之私受反此今佛結首二句明造業各私也次二句明受報有同分地也末三句總結其徹底虗妄而言自妄發生者不從心外也生妄無因者亦無初相也無可尋究者畢竟無體也三正勸須除三一欲修須除汝勗修行欲得菩提要除三惑勗勉也奮力之意三惡三善總皆是業而由不達此三為繫縛之本障智之端故呼為三惑除者不但只除有三而無三亦除之也二不除必墮不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道除世惡而不除世善則對待不盡縱得神通者仙天之類也伏現行而不除種子遇緣復起則終落魔道三增偽自取雖欲除妄倍加虗偽如來説為可哀憐者汝妄自造非菩提咎倍加虗偽者如各自謂得無上道實皆假世智以妄研乘神通而造業違遠圓通背涅槃城枉費功力番成惡因故如來深憫之也此結似但勸界內而後文二乘亦未出五魔當亦兼勸之也復言汝妄自造非菩提咎者歸初問也阿難初問佛體真實云何復有諸趣故明咎因自造非佛體咎佛體即菩提也所以教其惟止自造莫咎菩提也結妄勸離已竟二判決邪正作是説者名為正説若他説者即魔王説此雖欲其總不謬於七趣全文而尤重結妄勸離惟許必結妄而必勸離者乃真佛説如讚殺盜淫而言無礙勸住三有而謂真實即皆魔語耳深警其著眼辨識而亦應速捨以修三摩提矣談七趣勸離以警淹留大科已竟二談五魔令辨以護墮落上科於結妄處助其悟勸離處助其入此於辨魔處助其修不退處助其證也分二一無問自説五陰魔境當機但知請定而定中所發微細魔境非其智力所及故無問佛既開導大定而魔軍勝敗實大定成壞所關利害非細故動深慈不待問而自説也一普告魔境當識又三一將罷回告即時如來將罷法座於師子床攬七寶几回紫金山再來憑倚普告大衆及阿難言將罷能座表最後開示回身再來顯不盡真慈二陳所欲言又分為二一先明已説汝等有學緣覺聲聞今日回心趣大菩提無上妙覺吾今已説真修行法無學四陰已破但餘第五天魔鬼神等粗外魔境皆已不至故此全談五陰魔曲為有學是以特舉真修行法即反聞也二後示未説即魔事也又二一總標魔害汝猶未識修奢摩他毗婆舍那微細魔事魔觸現前汝不能識洗心非正落於邪見尚不知問何況能識奢摩等雙舉性修二定合言乃大定全體此中所發魔事最為微細不識則以邪為正墮於邪見而不自覺矣夫力能引邪邪排正盡此魔之大害故此先標二略陳魔相又為二一略示前三內外魔相或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子或汝陰魔者色陰中十種方是初心自現尚無外魔故言汝陰魔也受中十種已召外魔然且潛入身中而魔未現身想中十種方有天魔鬼神魑魅若不聞知則認賊為子在所不免或自任為聖或認魔為聖皆名認賊為子二略示後二心見魔相又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄行陰所發十種心魔識陰所發十種見魔皆無外境但是自心邪見得少為足四禪等者舉一以例餘也無聞者因其但修無想不務多聞故自誤不覺阿羅漢遭後有者環師謂謗佛妄説羅漢不受後有因此墜墮也據見魔中有無學羅漢但其魔事輕微故召告單舉有學以並攝之也三勑聽許説汝應諦聽吾今為汝子細分別不但分別而更許子細者一以魔相幽微難見一以魔害酷烈難堪故勞真慈如此也普告魔境當識已竟二會衆頂禮欽承阿難起立并其會中同有學者歡喜頂禮伏聽慈誨聞害悚動承慈感激見許歡喜故起拜領三正以詳陳魔事分三一標示動成之由謂動魔之由及成害之由又二一驚動諸魔由定二一推真妄生滅相關若無相關則真定不驚妄魔矣又四一先明本覺同佛佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明圓覺心體與十方佛無二無別本有之圓覺故同佛遍在諸佛心中如千燈共室不同則不圓不圓則不同也溫陵曰覺圓心體所謂真元是也二次示妄生空界又二一迷妄有虗空由汝妄想迷理為咎癡愛發生生發遍迷故有空性妄想通舉本末無明迷理為咎即根本無明所謂迷真也癡即業相愛即轉相所謂執似也末二句言境界相發先將全法界俱迷為頑空也二依空立世界化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立首二句即空晦暗中結暗為色則此下總明其依妄立也非無漏者明簡方便實報偏取同居為其動魔也故嶽師並推振裂者不必然也妄想總體迷頑二功能也迷則能生有情見分頑則能生無情相分故皆彼立也三比況空界微茫當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶溫陵曰空生大覺中如海一漚發又喻片雲以明世界虗幻微茫易以消殞矣四歸元必壞空界汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂發真歸元者言住大定入圓通者真顯妄破歸前無二本心也空銷殞者應念將化無上知覺也國土振裂者內動外感凡事皆然況大定乎問凡聖各皆萬法一心彼此無干故諸佛成道生界依然今一人歸元何干衆界而振裂耶既能振裂何不俱銷願請決疑答凡聖同一法界非自非他非離非即譬如千燈共室正同處時雖各有照而滿室之光誰能分其彼此耶若忽一燈出室雖與諸燈無干正當出時諸光豈不悉成搖動既出之後諸燈依舊無干詳之可了推真妄生滅相關已竟二示大定致魔之相分四一定合聖流汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通吻當處湛然飾嚴護也行人於行住坐臥中或反聞或休歇住此理中不昧不斷毫髮無滲漏處下言諸聖心通吻者以聖凡元一法界特凡迷馳擾別成邪聚不隔而隔今一旦悟後歸元故不離當處一念不生與諸聖心泯同一際湛然虗明無別無二二諸有壞動一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚懾魔王攝臣民故言一切凡天當兼外道大地水陸飛騰當兼人畜凡在三界自天以及諸畜不求出要耽戀諸有者盡屬魔所攝持故安危事同無不驚懾三諸魔不容又為二一先除凡愚訛謬凡夫昏暗不覺遷訛此凡夫單指人言昏暗者謂不具五通也不覺者謂不能覺知是行人入定將證之故遷訛者言彼見大地動搖房屋崩壞或訛言陰陽失度或謬傳神鰲動目等也二後示魔通必知彼等咸得五種神通惟除漏盡戀此塵勞如何令汝摧裂其處惟除漏盡者六通中但未證乎漏盡一通也夫五通既具必知是汝定力所為既戀塵勞必護所居之處故決定不容也四故來惱亂是故鬼神及諸天魔魍魑妖精於三昧時僉來惱汝僉同也動雖遍界獨魔偏重故惟彼衆同來惱亂意欲破其禪定彼始安也驚動諸魔由定科已竟二成就破亂由迷分為三一分客主而推破亂又二一示喻客不成害然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅冰暖氣漸鄰不日消殞徒恃神力但為其客彼在塵勞縱有神通殊為渺小此居妙覺則湛然空廓周遍十方故如風三句喻彼無傷於汝也汝如四句喻汝反消於彼也蓋魔之擾定遠望分明近反不見故遠處發瞋近漸恐怖所以如暖消冰也末二句出其深故良由彼雖憑仗神通而實勞擾無停暫留不住故但為客二正推迷亂由主成就破亂由汝心中五陰主人主人若迷客得其便五陰主人則飾定者當人自己不可定其真妙雖離真無體而尚在五陰亦非即真也大抵魔擾行人如賊劫主若主人深居不動賊乃莫測愈近愈恐俗云強賊怕弱主以是退散者多若或主人自守不定驚慌出走為賊所執方得其便此意若以法一一對喻思之足知患在主也二約悟迷而示勝敗分二一悟則必能超勝又為三一直斷無奈當處禪那覺悟無惑則彼魔事無奈汝何禪那指人言即上五陰主人在禪定者也覺悟無惑者了知如上所云彼無傷我我能銷彼又達我主彼客彼怖我安由是一心不動於彼善惡境界不欣不怖不愛不憎但惟照理一切不顧所謂山鬼伎倆有盡我之不猜無窮則彼魔事真無可奈何矣二示其所由陰消入明則彼羣邪咸受幽氣明能破暗近自消殞此表其無奈之故由以明而消暗也毗盧遮那此云光明遍一切處衆生本亦同此但為五陰重重覆之全成暗昧若陰未消時與魔同分在幽暗中故魔可見可擾今禪定得力陰漸消而明漸發諸魔受幽氣者漸與光明隔別如梟入曉羅叉向陽尚不可見豈能肆擾故必至於消殞矣三總結必祛如何敢留擾亂禪定言其必喪魄而去矣二迷則必成敗墮若不明悟被陰所迷則汝阿難必為魔子成就魔人不明悟者不能如上覺悟也被陰所迷者於彼虗幻境界欣怖憎愛亡失照理正念墮為彼類無疑矣所以深警之也約迷悟而示勝敗已竟三舉前墮而較淺深前墮者最初墮淫室也分二一示墮淫害淺如摩登伽殊為眇劣彼惟呪汝破佛律儀八萬行中只毀一戒心清淨故尚未淪溺孤山曰以淫女比天魔人眇劣也以一戒比全身事眇劣也舉劣況勝最彼深防初果道共戒力自然無犯故曰心清淨等也二示墮魔害深此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救隳壞也壞全身者不但壞盡道果亦且入無間獄豈不與宰臣貴鄰天子遭籍沒則不但喪盡官位而且不免刑律者事相類哉是宜警懼而慎察識矣孤山曰籍沒漢書除其屬籍是也標示動成二由科已竟二詳分五魔境相夫上科知動魔由於定切則於魔之發端不驚而預防無患知成亂由於主迷則於魔之究竟不動而自守惟堅然而所現境相多端不詳剖析未必其不迷也故今詳與分辨之就分為五一色陰魔相謂當色陰將破未破之際有此等境應當了知又分三一具示始終色陰未開為始既開為終各有境相今先令其識此兩頭境相而次方詳列中間也又二一始修未破區宇又為三一銷念工夫阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一坐道場有二一兼事道場即七卷中土壇鏡像等端坐於中以習反聞正定是也二惟理道場則不假壇等不局身坐俱取前詳釋聞中境界為道場以一切時中四威儀內反聞專注為坐道場銷落諸念不同徑直止念此但專務反聞而萬念自銷也功淺未必念盡功深自然念盡耳則諸離念者即起信所謂心體離念等虗空界也一切精明者得常不昧念頭入手之意非發光之謂也又銷念即寂寂精明即惺惺耳注聞本不注境故境之動靜安能移之聞性無干意識故識之憶忘安能變之且識忽起而為憶也如影現鏡中曾不障於鏡也識忽滅而為忘也如影滅鏡內而鏡體愈如故也此正禪家打成一片時節矣二在定相狀當住此處入三摩地如明目人處大幽暗此處者即銷念精明惺寂雙流境中也三摩地即耳門圓照三昧定成之號也由上功夫入手故三昧現前名為入也如明下狀其在定境界也散心但對目前現境惟覺一區光明曾不覺知餘處皆暗譬如黑夜對一室燈光而室外無邊昏黑也今一旦不顧目前現境專注聞中無邊法界此定成就則現境都失方覺十方悉皆黑暗譬如吹滅室燈室也沒了通天徹地渾成黑暗故曰如明目人處大幽暗也龍潭吹燈發明德山正令入此三昧耳問尋常説本心現有照體明喻日月何得有此黑暗答照體固自不減黑暗亦自非無例如經初所云此但無明見何虧損問此暗何緣而有耶答衆生本性與遮那無二光明遍一切處猶如醒人無不明了從本以來具足有五陰無明蓋覆之盡法界俱成暗相如醒人被昏沉壓覆故全成昏昧至於目前朗見山河等境乃無明幻出能見所見皆無明所為如二卷所明顛倒見妄也譬如醒人被昏沉逼壓起種種夢自謂所見分明而實居黑暗之中若但取目前所見山河分明不昧遂謂真實光明何得聚見於眼開眼則明合眼則暗見不脫於根塵光全居於黑暗執之為實何有悟期何以故以尚不覺全在陰覆之中何緣而有開時耶如夢中人不知是夢但見目前明朗謂為實明了無迷悶全不覺在昏沉黑暗之中豈有醒夢之時耶故今入三摩地者要須頓捨目前幻身幻境絲毫不緣努力反聞當在此中方覺無邊黑暗故如明目人處大幽暗也即同夢中人覺知是夢捨彼夢境不復更緣努力求醒方覺昏沉黑暗覆壓迷悶也以法對夢一一可了三結成區宇精性妙淨心未發光此則名為色陰區宇離念自體精而不雜曰精性逈脫根塵中道自在曰妙雙超空有不染二邊曰淨心未發光者色陰未開心光未泄無邊幽暗虗靜而已問既曰脫根塵超空有何又幽暗而未發光乎答此但解空了性循中入定初心定力所使非是開證之境故正在幽暗之中然定境虗融亦在妙處行人不識取著無進禪家謂之墮一色邊倣佛在茲也末二句言正在色陰之內如暗室區覆墻宇局滯也達此豈肯生住著哉二終破顯露妄源若目明朗十方洞開無復幽暗名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本首二句言心光發越不用肉眼十方洞照而前之黑暗如風約雲開內徹五臟百骸外徹山河大地天上人間悉如指掌雖未至三千圓鑑亦應洞達一界或至小千等以佛未的實格量不敢定耳名色陰盡者如五重衣服初脫最上一重也問諸色尚見何以言盡答圓融中道豈盡色成空耶但盡陰不蓋覆而已良由真心元能隨緣現色而色不異心本自明徹如珠有光還照珠體但緣無始迷己為物遍成障隔又認物為己而聚見於眼是以永沉黑暗盡失其遍界之明豈惟不知本明兼亦不覺現暗今緣奢摩他中開示四科七大元一藏心各各自知心遍十方彼時有學者尚屬比量而知方以覺得現暗未能現量而見豈即親證本明到此躡解成行入三摩地於幽暗中忍住一番功夫到日忽爾色陰雲開親證本明一切堅頑暗昧根塵皆如琉璃內外瑩徹且不聚見於眼而心體周遍無復遠近皆如目前是之謂色陰盡豈壞色成空者可比其萬一哉常途劫濁以人壽百歲時運入劫濁總統五濁名為惡世今此自晦昧為空結暗為色即入劫濁無量劫來長眠黑暗生死之中然此濁體全依色陰幽暗為之離彼色陰畢境無體故今色陰盡時晦昧即開故曰超劫濁也觀其所由如伐樹者去其覆土方以見根今劫濁既開觀見色陰之由自然之理也堅固妄想者堅執固結妄情癡想也於外四大堅執為心外實有於內四大堅執為心所住處由是固結不解成此色陰黑暗之體也佛後自釋惟約身言者且圖自身親切容易覺知而已其實十一色法俱是色陰皆屬堅固妄想前偈云想澄成國土知覺乃衆生足可證之然佛雖就身發明尚欲其察近而悟遠觸類而引伸不然若但色陰惟局一身則色陰盡時應只説言身中朗徹何言十方洞開乎準此餘四陰體皆有言近指遠之意方顯一一遍周孚前七大也此雖談魔而修進下手之旨存故詳釋之幸勿厭繁也具示始終已竟二中間十境中間者即色陰將破未破中間所謂交互之處也良以藏心統含四土不離當處不越毫端秪因色陰所覆豈惟不見上三而於同居一土現前朗見能幾乎哉尅論現見特塵剎中一剎一剎中一界一界中一洲一洲中一國一國中一邑即於一邑之中亦但於所住所到之處一區之明而已一區之外悉皆不見既皆不見悉是黑暗之境然此黑暗中一國一剎乃至塵剎四土無不包含今入定者既復捨彼一區之明而全處無邊之暗當色陰未開之際反聞逼拶之深心光所流或近徹身境或遠照十方或淺射同居或深臻三土所謂忽遠忽近乍淺乍深皆色陰將開之前兆暫爾非常有此十相行人於此作證不作證間魔佛異路可不戒慎而加察哉就分十一身能出礙阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此中者即前惺寂雙流境心不擾之中亦即幽暗之中後凡言此中皆即此中妙明即指聞性精研即反聞時著力深窮也如禪家所謂著些精彩挨排將去也四大不止説身內外俱該以此説流溢前境非談內徹也不織者境界虗融如雲如影不復密織堅實也少選者不多時也身能出礙者偶爾透過墻壁豁然無礙也然上句言少選者正説此境但暫時如此非常能也此名下判其名令詳其義精明指心光而言流溢者融泄之意前境即目前堅礙之境也蓋真心虗融光寂少有發泄於境即得虗豁無礙斯但下斷其故而明其不久功用暫得者明其特因精研功夫逼拶之極偶令心光泄露暫得前境虗融隨即失之非為聖證者非同聖人證果一得永得也不作聖心者言行人遇此知是功用偶然略不挂意如近世悟人云上得秦公嶺望見四部洲從他四部洲依然顧話頭是也名善境界言此亦足驗功夫得力心妙非虗可增信心可誘精進亦是過去宿習善根發相未來入位開心先兆誠是善祥境界本無過咎也若作聖解者言行人若無見識及缺涵養遇此一境輒起證聖之解即受羣邪者言魔得其便將進欺誑漸成大害至不可救矣從斯但下數句之意後皆放此説之二內徹拾蟲阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪首二句同前內徹者心光忽照身內五臟開明如揭蓋覆親見蟯蛔以手拾出身無傷毀流溢同前但內融形體為異斯但下意皆同前三聞空説法又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞説法音或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪首二句環師所謂前之精研初能外虗次能內徹此復內外精研俱虗徹是也醫經謂魂藏於肝魄藏於肺意藏於脾志藏於膽或曰左腎再俟考證精藏於腎神藏於心除執受身者除彼身形安然不遷改也餘皆涉入者即環師所謂魂魄等皆失故常遞互相涉是也互為賓主者嶽師所謂餘五入魂則魂為主餘為賓乃至入神則神為主而餘亦為賓是也聞空中説法者賓聞主説也聞十方同敷者主聞賓説也遞相離合者嶽師謂精離本位而合於魂或魂離本位而合於精等是也蓋離即失本位合即入地位成就善種者即環師所謂夙昔聞熏自能發揮而有所聞也今夫刻意凝神討論之極則奇文麗藻未嘗經意往往煥然得於夢寐則精神激發神者偶現類可知也愚謂五臟內境也空中十方外境也由功夫內外精研故內外合一而説聽交互周匝遍滿也餘皆同上可知此上三科皆近徹身境也四境變佛現又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來于時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此當反聞功盛雖始本一如然澄露皎徹似始覺之智定光融透也內光發明似本覺心光發泄也無情遍成金界有情盡作如來又見毗盧乃至蓮現此即華嚴所明文義全似而言心光靈悟所染者似曾於維摩華嚴等經聞熏成種今於反聞妙定之中心光被研發明照灼於此實報莊嚴諸殊勝界尊特身也問既言遍作化為恐非實界實佛何言即是報土答四土除後一而餘三皆同幻化何妨説化特於光流灼見之時穢土忽滅淨土忽現而説遍作化為耳若此即言非實則前之五臟後之暗室皆非實耶又何彼偏實而此偏虗耶問實報深位所居豈此初心遽能親見答圓融心海本無障礙復加圓人勝解本具勤勇無前尚當不久超證何妨定中暫一先見之耶固知此為報土無疑矣況文亦言照諸世界豈皆言化為耶五空羅寶色又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此中説功夫勇勝處倍過諸科所見妙境非同淺淺觀察不停者反聞功切照理綿密無絲毫間斷也制即忍也止即定也抑按降伏制止超越者以圓人見解入反聞妙門於時圓伏五住深忍深定超越二乘及菩薩境倣佛切近寂光妙土故非身非土但見十方無量寶色而已然同時遍滿不相留礙者多分不礙同滿也青黃赤白各各純現者交雜不礙各純也此名抑按功力逾分者重言圓伏之力絶勝所發故有過分之境蓋此非身非土倣佛寂光之境非初心分所宜見特定力逼發暫一見耳即環師所謂妙明逼極煥散而現也問寂光非身非土宜無色之可見今既見色能所宛然豈敢目為寂光答明言切近非謂全即但此已越一切妙身妙土惟餘虗空寶色故言切近寂光耳況準天台亦言寂光尚有金寶奚止寶色所謂因滅是色獲得常色等當知常寂光土不可定執同灰斷境問此何異於四禪中青黃赤白等定耶答彼禪定中有心而取此反聞內無心而現又彼但各現而已豈如此之分不礙滿雜不礙純耶斯固難思妙境寂光前兆故言超越逾分若反同於界內事定則何超越逾分之有哉此上四五兩科所謂深臻後三土矣六暗中見物又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪研究者挨拶也澄徹者靜極光通也精光不亂者心光凝定不為明暗境移也忽於下正明暗中見物也先言種種物者非室內所有之物乃暗中出現之異物也蓋鬼神精魅恆雜人居互不相見今為心光密澄幽隱發露之時故種種出現也曾聞有人在靜室中忽見一人自地而出一人從壁中來對語良久各沒原處又有見三五裸形人高一二尺竊室中米傍若無人類難盡舉後言暗室中物亦不除滅者方是説室中原有之物亦朗然不昧不遷變也心細密澄所視洞幽者惺寂綿密無絲毫滲漏故靜明之極而心光徹照矣七身同草木又以此心圓入虗融四肢忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪圓入等者反聞功切虗融之極忘身如遺故燒斫皆不覺也又則下文雖重亦稍不同上燒不覺皮肉未必無傷此不能燒皮肉略無傷毀上言斫而未削此言削去如泥是其別也塵併下三句出其不覺無傷之由即環師所謂五塵併消四大排遣純覺遺身故無傷觸也此上六七二科約當土境身最近之事也八覩界覩佛又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪清淨者純理無雜之謂也功極忽見亦淨極光通也然忽見下見同居諸淨土也又見下見淨土現在諸佛也下見三句見同居諸穢土也略佛不言可知又佛淨穢無殊故不另説穢土佛也欣厭凝想非今定中作是覺觀蓋是未入定前諸經教中聞説淨土穢土隨起欣淨厭穢之念熏習成種今於定中反聞逼極心光所灼故悉發現雖説化成亦非虗境雖是實境仍同幻化耳九遙見遙聞又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪研究深遠者窮極反聞廓然周遍也言中夜者偏取心境俱靜時也但多在此時未必局定也此則顯然是為實境豫亦親見河南常僧在潞偶然靜坐忽見鄉閭市井宛然見其兄於路被官責打此是白晝計其時日不久鄉人至潞問之乃分毫不爽此必宿習禪定善根故偶遇如此惜其僧不知自重也此名下出其原由也飛出者即心光飛出也此上八九二科不離同居而見遠境耳總上九科不出四土身境一二三六七共五科同居近相也四五兩科後二土相也八九兩科同居遠相也方便土相未特顯著或可該攝於同居淨土之中智者研審之十見善知識又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端説法通達妙義非為聖證不作聖心魔事消歇若作聖解即受羣邪上之九科皆初心反聞入三摩地定心逼極所發善境非魔所為要須作證方成招魔之端今此第十之科是大定中不為上之九境所遷竭力窮研到至精至極之地正是與諸聖心精通吻時節而色陰將破振裂動搖魔心荒越萃於斯時故魔擾於是而發端也然不出兩端或發其妄見或發其狂慧皆能令行人自疑證聖然後得其便而乘間以入也故今皆與示其相而明其故令先覺焉但其文先後顛倒稍難分辨試與分之見善下發其妄見也首四句先以示其相也見善知識等者即行人靜中自見也形體變遷等者即變現佛菩薩天龍男女諸像也次二句後以明其故也邪心含魅者言其但是行人防心不密領受妄境故鬼物眩惑現此虗影非真實見聖也或遭下發其狂慧也首二句先以明其故也天魔入心者魔入行人身中持其心神也次二句後以示其相也説法達妙即指行人自説皆魔力持之使然非真實心開也此方與下非為聖證等語脈投合舊説善知識即作實人如後飛精所附説法亦即指彼所説非為聖證等復亦指彼通乖前之諸文決無此理當知行人用功自淺而深魔魅肆擾由微而著故此節與下受陰十境皆且暗中入心令自發亂直至想陰中方以飛附旁人顯然誑惑豈有發端之初即遣實人來惑亂哉不作下言若依此先覺魔自消歇反此則大發魔事不待言也中間十境已竟三結害囑護分三一示因交互阿難如是十種禪那現境皆是色陰用心交互故現斯事交即嶽師所謂禪觀與各陰妄想交戰是也互謂互為勝負如色中每一善境界發即是觀力暫勝妄想故得心光泄露然但暫開隨閉即是妄想復勝觀力依然不能動也故前十境皆當此時而現後皆放此二迷則成害衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄頑謂無知迷謂倒想不自忖量者謂不度己功力未久迷不自識者又不察暫開復閉何有聖證固乃妄言登聖安得不墮哉後皆放此詳前十境皆是深定所逼決是位在觀行非名字所能也三囑令保護汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道當依如來者奉行其宣示覆護之意也宣示謂結集流通及現身説法令其自明覆護謂冥加神力令不至惑也後皆放此色陰魔相已竟二受陰魔相亦分為三科一具示始終又分二一始初未破區宇分二一躡前色陰盡相阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像修三二句止觀雙修也耳門即入流之觀亡所之止色陰盡者言於上之十境或備經或不備經或相類而更多大抵俱要明識不為所惑功夫到日色陰忽有盡時後皆放此説之即前如明目人處大暗室者到此遍成光明即色盡相也前於十方洞開下已詳釋之見諸二句環師謂諸佛心即我妙覺明心是也洞開無暗是其心相衆生向外馳思擬度佛心終不能見今於自心開處見之本不在外豈不親切明白故喻如鏡中現像也準八卷第二漸次所定此位已入初信不依舊判猶在觀行以此明言親見佛心如鏡現相豈非正信已發況佛心即阿耨菩提之心諸師判位皆以發菩提心為初信此何非初信耶更有防難待後六十聖位下再當辨之二狀示受陰區宇若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇若有所得者既是自心而復親見豈不即若實得其體而未能用者未能稱體發自在用也下科即見用處下以喻明睡中被魘之人明見醒中之境而不能動正如色陰已開受陰覆人之狀也手足二句喻若有所得也心觸二句喻不能用也客邪者以魘字從鬼似亦外感鬼物之所覆壓而然故魘鬼正以喻受陰也二終破顯露妄原若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本首句即受陰盡其心下即能發自在用也心本不局身中無始迷執非局而局生局現陰死局中陰無時不局於身安有離身自由之分要皆受陰以為結縛之本故受才盡便離身觀面去住自由也當知此不同坐脫而不能復來者彼但於前幽暗位中憑定力以坐脫耳所以九峯不許泰首座也此則色受俱開體用俱稱去來無滯洞山法慶等是其人矣身見為諸見之本受盡離身身見解脫故能超越見濁方以現見親證心本不在身中但受陰妄為領納虗以發明而已依前判其位當二三兩信待後想陰之初六十聖位下再當辨之具示始終已竟二中間十相此十相中分五對十雙釋之就分十一抑己悲生此與下科抑揚生佛對也故此抑己者抑責自己也悲生者悲愍衆生也又三一發端現相阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊蟲猶如赤子心生憐愍不覺流淚此中即色陰已開受陰未破之中也得大光耀即十方洞開也其心發明者謂悟得一切衆生皆同具此光明妙理枉受淪溺內抑過分者却乃自責己之執迷不早悟度生此悲心所由發也究而論之固同體之悲本亦非咎但內抑觀見等展轉過甚則招致魔附之端也二指名教悟此名功用抑摧過越悟則無咎非為聖證覺了不迷久自消歇功用抑摧過越者本欲興悲䇿進以破受陰但由自抑自責太過失於慈柔故成過悲若能悟此本因不作聖證之想漸悟漸止復還正念故曰久則消歇也三示迷必墜若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜作聖解者自謂已同諸佛大悲或謂與菩薩二殊勝中同一悲仰自以為是悲愍不止則魔以類入心失定以起無量顛倒邪念故必墜也已入位而不防淪墜其深故在想陰中貪求善巧科下詳辨二揚己齊佛揚己者高舉己靈也齊佛者頓同至聖也又分三一發端現相阿難又彼定中諸善男子見色陰消受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越色開受明者如脫外衣明見內衣也勝相如見佛心鏡中現相等也感激過分者謂一向雖聞心佛無二未能親見今因色開親證實見故感激而發大勇猛也志齊諸佛者言現見心佛無二一念謂可速超何待三祇問頓教不立階級一超直入於此何殊答彼為高推聖境自限蹭蹬者施應病之藥耳非一向以圓融而礙行部也請詳宗門信位人位之旨則頓教人未必全廢於位也二指名教悟此名功用陵率過越悟則無咎非為聖證覺了不迷久自消歇陵率過越者言本為進破受陰而忽高舉齊佛之念妄謂三祇不歷一念能超故為陵節粗率過分越禮悟而止之可復消磨於無過矣三示迷必墜若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜若自謂同於諸聖勇猛妄任不已則魔亦以類附之我慢失定必墜何疑三定偏多憶此與下科定慧憶狂對也分三一發端現相又彼定中諸善男子見色陰消受陰明白前無新證歸失故居智力衰微入中隳地逈無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相前無新證受陰未破也歸失故居色陰已盡也當此之際但應定慧等持入流亡所久可剋功顧乃智力衰微莫能照見於受體本空不記塵忘根盡迷悶無所趣進故曰入中隳而無見也忽然下方表其偏用定心枯渴沉憶以為破受精進之功也二指名教悟此名修心無慧自失悟則無咎非為聖證此名修心者即偏用定力以修治其心也無慧自失者無照見塵亡根盡受體本空之智自失其方便也悟謂省解其慧少定多而還復等持庶無過咎而已何有於聖證哉三示迷必墜若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜作聖解者以此心沉憶之定妄謂證聖當然故憶魔以類附之撮即攝也攝心高懸失其本定也問古人謂置心一處無事不辦何以異此答彼為與散亂世緣者一期應病而已非一向懸心為精進也或復以遍法界為一處則圓遍境界與此大不同矣四慧偏多狂又分三一發端現相又彼定中諸善男子見色陰消受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足慧力二句以見自性殊勝令其慧心增勝蓋是過於尊重己靈所謂太尊貴生也故言勝性懷心自疑盧舍也當知此異前來齊佛之科前但謂佛可速成念越多劫修之無難此見自性即是不假修證其過比前更甚矣問宗門皆言本來是佛不待修證何不為過答祖師為人惟執修成孤負己靈故抑揚之耳然亦有時令人大死一番竿頭進步極盡今時如是一類之語不可勝紀何嘗偏重己靈全撥修證哉二指名教悟此名用心亡失恆審溺於知見悟則無咎非為聖證亡失恆審者謂不能恆常審試自德與佛德為有差別為無差別溺於知見者蓋過信過恃身中自有如來知見以性礙修故至於此若能省解審知五陰尚未全空安能齊佛德用可還無過矣三示迷必墜若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜作聖解即自任舍那執迷不返則類魔相附大發狂顛當知言我言得具足人法二執第一義諦豈有是哉五覺險多憂此與下科險安憂喜對也又分三一發端現相又彼定中諸善男子見色陰消受陰明白新證未護故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵床如飲毒藥心不欲活常求於人令害其命早取解脫上半與定偏科同歷覽二際者觀察色受二邊際也自生險憂者慮恐遭退失也過憂不止展轉成顛故發如坐下諸妄事也二指名教悟此名修行失於方便悟則無咎非為聖證言其本是勤修警懼心中不覺太甚無復解慰方便故至於此祖師云大道迂濶忙作甚麼又云默默自知田地穩騰騰誰放肚皮憨又云放四大莫把捉等無量方便皆可忘憂還復正念矣豈可以多憂為聖哉三示迷必墜若作聖解則有一分常憂愁魔入其心腑手執刀劍自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜若以多憂為聖心宜然憂之不止則魔類附而發執刀等大風顛矣六覺安多喜分三一發端現相又彼定中諸善男子見色陰消受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此因色開受現境界亦甚可樂於此生喜本亦非過若耽著恣情展轉不止必致過生祖云設有悟證快須吐却即此之謂也二指名教悟此名輕安無慧自禁悟則無咎非為聖證悟證境中妙樂即輕安也若有慧照察此方淺證何須深樂喜風自止今無斯慧故不能禁也三示迷必墜若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜若謂樂道乃聖心宜然由是放浪縱喜不止則魔附發顛不復覺也七見勝慢他此與下科見慧自他對也分三一發端現相又彼定中諸善男子見色陰消受陰明白自謂己足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺自謂者不求師印惟憑己見妄憶也己足者即自滿自高之意發慢之由也無端即無故亦無量也大我慢雖七慢之一似諸慢之總七慢者開蒙云單過慢增邪我卑也彼釋云於劣計己勝於等計己等為單慢於勝計己等於等計己勝為過慢於勝計己勝為慢過慢未得謂得計劣己多為增上慢自全無得謂己有德為邪慢對多勝者自甘劣少不敬不求為卑劣慢也今經惟缺邪慢總別合論具彼六慢心中下雖諸謾心併力所使然高推己靈下視諸聖剋體而言慢過慢也當知此復比前慧偏多狂之過為更甚焉彼但謂本來同佛而已此則更謂超越諸佛故也問祖師門下呵佛罵祖何以異此答祖師極欲人悟一性平等心外無佛剿絶佛見而已豈真增長高慢反失平等哉二指名教悟此名見勝無慧自救悟則無咎非為聖證見勝者因見殊勝之性勝氣所使若有省察之慧既悟平等之性便不見一衆生可慢何況惑未祛而行未滿安敢慢諸聖哉三示迷必墜若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是疊華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間嶽失於正受當從淪墜若終執迷無復省過魔附發顛誤己誤人不可救矣近世此輩遍於天下毀佛相為金銅土木以自身為活佛毀佛經為紙墨文字以自言為真經真是魔説宛是魔民以今經證之當入阿鼻猶如射箭豈不甚可憐憫倘有微緣聞經速當改悔實大幸矣八慧安自足又分三一發端現相又彼定中諸善男子見色陰消受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在精明即佛初示識精明元後稱耳門聞性元從此中入三摩地今即於此中色開受現見諸佛心如鏡現像故曰圓悟至精之理也得大隨順者言欲見即見無復隔礙也輕安者即身心離諸粗重豁悟自在之意遂自以為滿足成聖得大解脫矣此比上科其過似輕以但自足不進非更慢他也二指名教悟此名因慧獲諸輕清悟則無咎非為聖證當知前見此慧體相各別見是分別心路慧是開悟境界因慧獲輕清者因色開時覺得身心如雲如影離重濁而獲輕清此但一時豁悟快足之境豈有聖證何足自滿哉行人逢此當依如是悟也三示迷必墜若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失於正受當從淪墜迷而不悟魔附自畫展轉如無想比丘不但自誤兼誤多人加以悔恨謗佛遂成大墜落矣九著空毀戒此與下科空有毀恣對也又分三一發端現相又彼定中諸善男子見色陰消受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解明悟中即十方洞開豁然明朗寂爾無法可得故著空淨而沉永滅也見得無作無受故撥因果以納於斷空邪種皆由取著虗明遂至於此二指名教悟悟則無咎非為聖證若悟沉空滯寂非究竟法則可無過三示迷必墜若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜既為魔附展轉不覺失盡本心誤陷多人其過無量究其根本但因著空近世有等白衣專説大虗空為本性一切佛事皆謗著相一切俗事却言無礙亦有一二破齋戒者共讚之曰汝何徹悟至此若不聞經悔悟則淫穢屎尿之顛將來必漸恣矣此中雖亦有淫而偏破諸戒故以毀戒為科名誤入人罪者令人誤入罪咎之事也十著有恣淫經言生愛即著有也分三一發端現相又彼定中諸善男子見色陰消受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此與上科雖皆從虗明而來上於虗明之理明悟空見此於虗明之味耽著愛樂愛極發狂縱成淫欲故上是慧病此是定過也蓋禪定中發於妙觸自在受用不可為喻有言過於淫樂者即引淫欲之端也止觀中詳誡不可耽味正恐發狂成此咎耳又當知上科見惑所攝此科思惑所攝矣二指名教悟此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證定境安順入心明其是定中妙觸受用也此當用慧觀察一切不受方為正受豈可於此耽著受用由是捨置透過即無過矣三示迷必墜若作聖解則有欲魔入其心腑一向説欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德即無陷於王難疑誤衆生入無間獄失於正受當從淪墜此魔附恣淫陷墜自他之事文皆易解然近世尚未見此僻陋之處稍聞有似此者未必如是之盛佛言不妄當來末法之深將必有矣中間十境已竟三結害囑護分三一示因交互阿難如是十種禪那現境皆是受陰用心交互故現斯事言其受陰未開時防此過生交互意同前科而指文小異如得光耀乃至得虗明性觀力勝妄想也發無窮悲乃至無限愛生妄想勝觀力也是亦交戰互勝之意二迷則成害衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄迷不自識者即不能諳其名字不覺是過謂言登聖即作聖解也末二句示大害而警覺其驚悟也三囑令保護汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道全同色陰結意於此十種魔事已成非但如前方為引發之端然亦但言魔以類至而不歷言天魔飛精又魔即暗入本行人心令其不覺自顛亦不同於後十待至後文自見受陰魔相已竟三想陰魔相諸陰體相解現二卷分四一具示始終就分為二一始初未破區宇又分二一躡前受陰盡相阿難彼善男子修三摩地受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙按前判當在信之二三故言漏未盡也以七信不受後有方為漏盡心離其身者以真心周遍本不局身無始迷執非局而局前此任其比解遍周無奈見聞但隨身轉何有暫時解脫之分縱前色盡聞見遍周亦無離身自在之用如迷方者縱有人分明説與亦卒然難轉此皆受陰覆之之故也是以受盡方得離身如鳥脫籠之自在也已成就下四句判其決定能以凡身歷聖位也蓋別教皆實取證故經生纍劫證得一分方到一位豈能以凡身而頓歷諸位哉此圓頓最利之根不實取證即以凡身速疾上歷諸位故住前多不列位住後有位亦超亦但顯其圓融不礙行部而已非如別教鈍修實證故言以凡身而歷六十位也六十位者於五十五位却前加乾慧後加妙覺為五十七若并前三漸恰滿六十但第一漸次方斷五辛似未可當於聖位況第二漸次清淨業報中顯然方入常途信位故應前除初漸後開金剛為六十位問佛既從受盡方言歷位則孤山謂受盡方入信位似順佛言今何以色盡便入初信耶答佛語自在特緣受盡妙用顯彰因表其必能歷盡聖位未必聖位便始於此也以前位十方洞開佛心如鏡當是妙體披露正信現前豈不為初信而亦何非聖位乎請合二漸淨報之文再詳玩之孤山曰其間有賢有聖皆是三世諸佛所歷之位故通稱聖位意生身喻如意去速疾無礙而有三種一入三昧樂意生身謂心寂不動即相似初信至七信入空位也二覺法自性意生身謂普入佛剎以法為自性即相似八信出假位也三種類俱生無作意生身謂了佛所證法即九信十信修中位也嘗笑學仙者以出陽神為勝事不知釋宗淺位三意生身妙超無比何況深位之十身乎而顧妄謂陰神真無知之言也二狀示想陰區宇譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇前於受覆喻魘不動表見聞雖周而全無用故受開喻發寱言雖似明其比前有用而實表其尚為想覆蓋寱説夢事非是醒言故也無別所知者即未能圓照生死也言已成次者即能於聖位次第上歷也不寐悟語者如二漸中言其得通遊界覩佛聞法親奉聖旨則諸佛誰不親知面見非同般若但是冥中知見而已二終破顯露妄源若動念盡浮想消除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本大意如圓師所謂覺明如鏡浮想如塵想盡心明是也倫類也一倫生死即三界異生雖區分十二而生死大同故言一類圓師謂首尾即始終蓋生死各有始終如生住異滅也圓照謂洞見分明正如明鏡當臺一塵不度矣想雖居於五陰中間而前二後二皆依妄想而粗細不同耳何況一切根隨煩惱離想陰畢竟無依此所以想盡超煩惱濁也溫陵曰想能融變使心隨境使境隨心如想酢梅能通質礙故曰融通妄想也具示始終已竟二中間十相就分為十一貪求善巧頗似神變然意在取人信服以行教化故言善巧也又曲分七一定發愛求阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧虗謂見聞遍周妙謂離身作用不遭邪慮謂中間不為十境所惑圓定發明即發明受陰已盡境界後皆放此心愛下三句即新起愛求愛圓明者蓋起心喜愛圓滿發明一切妙用故勇鋭精思貪其善巧其意將以悚動人心以行其教化也二魔遣邪附爾時天魔候得其便飛精附人口説經法前雖總結天魔而未歷言今節節言見受盡定深天魔經意也亦不親來但遣魔黨而已故飛即速遣之意如軍門飛檄官府飛票之類精即魔黨諸精魅也然亦各以類至下文佛自各出名字附人者另附他人素受邪惑者也蓋受盡者不能入其心腑故假旁人惑之轉令自亂耳後皆放此三客邪投擾其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座説法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明其人即所附之人不覺者即此人不自覺也蓋魔入心人豈能自覺來彼下方到行人之所故知上之自言非對行人之言良由彼既不覺魔著自怪無端善説經法疑謂已成佛道然後任運來惑行人皆魔默附使之然也後放此變形放光正善巧動人之事也此方是遣實人來變化相惑故知前見善知識但是靜中虗影不同此也四主人惑亂是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲蓋緣投其心所愛求不得不迷惑也向使無所愛求何至惑亂行人但宜安心息愛求也末二句是魔惑行人徹底主意蓋行人三學無缺策進如飛魔宮震恐而魔之設謀擾亂惟期破戒導淫則定慧俱納於邪身為魔子魔乃晏安若智強者於此反為驗魔之要任其神變莫測但察毀戒誘淫即知是魔何至迷惑後文種種淫事及毀戒事皆放此意五按其言狀口中好言災祥變異或言如來某處出世或言劫火或説刀兵恐怖於人令其家資無故耗散災即咎徵祥即休徵變異怪誕非常也或言下近世閭閻蒙昧之人多有斯言令人棄家逃散及至臨期了無其事六出名示害此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難怪鬼即遇物成形者也多年乃得為魔使者故曰年老成魔然此鬼即天魔所飛遣之精靈佛至此方出其名字令人辨識而已非前是天魔至此又換作鬼神蓋舊注以未達飛精即是遣鬼故作兩節説之致令文理謬戾不通後皆放此魔有威福故去後方禍吳興曰弟子與師即求巧之子説法之師下皆例此七教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄先覺即按經察辨識其是魔也故免墮落迷而不悟歸依順從故必墮獄圓師謂受開以後應無墮義正當此處辨之彼特領佛上歷聖位一語似應不退而遂違佛二十八位俱墮無間之明言且自意比度豈敢遽抗於聖言量乎宜虗心求不可輒臆斷也或曰教中聖位俱無墮義圓師參據非臆斷也殊不知權漸中經劫歷位剋定取證故證聖即無墮義如走者登山匍匐梯層節節歇息遲則遲鈍有升無墜圓頓不歷僧祇一超直入中間更不取證直以初住為第二峯頭方言不退故佛既言從是凡身足見不取聖果又曰上歷聖位足見但是速以歷過而已豈一一取證哉如飛者升山舉翼即過無數梯層中間更無息處速則速疾升墜不定或驚疑於上或摔愛於下緩翼之間已落千巖之下故知識陰未開未入圓通以來不妨有墮義也或曰若是則圓頓反劣於漸教矣曰是何言歟圓頓歷時無幾而彼教聖前往復紆回何止如圓頓之升墜乎且圓頓以悟為要如飛者恃翼墜固易墜升無難升如經文云悟則無咎即將墜而復升也況秉圓頓上根者多能愛求念絶凡聖情忘自無招魔僭聖之愆而佛慈曲為囑護以誡備不虞而已固非必無墮義而亦非多有沉淪者也智者當深研之二貪求經歷分七一定發愛求阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷此飛奮起之意經歷即如今人心好遊方之類但此志大欲如諸佛遊剎土也二魔遣邪附爾時天魔候得其便飛精附人口説經法三客邪投擾其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座説法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有番前自變乃變他成佛然身既成佛則遊蕩之心何愁不遂亦所以投其欲也四主人惑亂是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲淫逸其心者自恃遇聖放蕩無畏也五按其言狀口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智消滅言佛菩薩來某處應化即遊行世間之事亦投其所好故渴慕之漸以生邪背正也六出名示害此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難魃鬼即遇風成形者也七教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄此諸餘意並準前科三貪求契合分七一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合愛綿㳷者環師所謂欲密契於妙理是也澄靜深不動也契合者不假形聲默然開悟也二魔遣邪附爾時天魔候得其便飛精附人口説經法三客邪投擾其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座説法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口説偈或自誦經各各歡娛得未曾有番前外變以現內開溫陵曰自開悟下皆密契之事也四主人惑亂是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲綿愛者纏綿生愛欲以遂其所求也五按其言狀口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟見者見其密默開心之勝事遂并其妖言總信受也六出名示害此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難魅鬼即遇畜成形者也七教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄四貪求辨析分七一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三魔地中心愛根本窮覽物化性之始終精爽其心貪求辨析心愛根本即環師所謂愛窮萬化之本是也窮覽二句即如佛言現前松直棘屈等皆了元因也此佛智邊事初心希求真妄想也精爽其心猶言奮精神竭心力也求辨析者欲現前一一分明也二魔遣邪附爾時天魔候得其便飛精附人口説經法三客邪投擾其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座説法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相威神即魔力也諸人即領魔法旨遞相轉化者也將佛下即轉化之言涅槃菩提法身三常住果也此中推世法而謬濫佛法及撥無淨土金相近時滿耳皆此魔言即魔使者聞者速掩耳避之四主人惑亂其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲亡失先心者以先心本欲辨析萬法深本今因魔摧伏反以肉身相生最鄙淺事為化理元而謂佛三常住果亦不出此乃至撥無佛境但執目前是則初求妙智終淪至愚豈非大失其辨析之初心甚顛倒也五按其言狀口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言大意無非誘人恣淫破戒壞大定爾六出名示害此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難蠱鬼即遇蟲成形者也七教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄五貪求冥感分七一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感懸應即多生有緣諸聖來應化也周流者求之不止也精研者竭誠求之也冥感者即希感動於本善知識也二魔遣邪附爾時天魔候得其便飛精附人口説經法三客邪投擾其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座説法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛粘如膠漆得未曾有正詐現於冥感懸應之魔事也四主人惑亂是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲五按其言狀口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此詐陳於冥感懸應之言皆投其愛求之欲也六出名示害此名癘鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難癘鬼即遇衰成形者七教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄六貪求靜謐此科似是貪求宿命以詳玩魔事皆宿命通恐與下科顛倒差誤又與上科皆為宿命但上多示知過去此多示知未來分為五一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入剋己辛勤樂處陰寂貪求靜謐深入即窮極定境也陰寂靜謐皆禪定極境法華所謂深固幽遠無人能到之處也初心不應躁欲求之然且不但只求寂靜意欲靜極發通備知幽隱之事此所以招感魔事也二魔遣邪附爾時天魔候得其便飛精附人口説經法三邪惑事言又三一邪附人至其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座説法二現邪惑事令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌溫陵曰邪定能具五通本業即宿業也畜生後報也此二宿命通也知肇他心通詰露眼耳通也彼雖實具五通誑惑豈肯盡實如先世妻妾預變畜生皆憑威力詐現非實特以他心眼耳前知等通不虗故并其誑惑詐現亦不敢不信也重加精苦如斷五味裸四肢等謗訐雖似言語猶是狀其行事惑人之態也三説邪惑言口中好言未然禍福及至其時毫髮無失據此乃知此中雖備四種通而未來宿命通偏多也四出名示害此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難大力鬼即上上品神通力大之鬼也五教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄七貪求宿命詳玩魔事酷似靜謐之事蓋寶藏符讖皆陰寂隱微之類且不似上科了然顯於宿通也我故疑恐譯人一時誤相倒換理或有之再詳分五一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命愛知見者即欲通達宿命二魔遣邪附爾時天魔候得其便飛精附人口説經法三邪惑事言又三一邪附人至其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座説法二現邪惑事是人無端於説法處得大寶珠其魔或時化為畜生口銜其珠及雜珍寶簡策符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌是人皆指貪求本人而言聽法得珠令其心惑也魔化銜寶蓋未附人時先現此而後方附之也彼人却指被附邪人誘聽人而藏珠者先以暗埋後對衆出之誘人驚信也食藥食少而能肥充皆惑人之事也三邪惑之言口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人詳其言意皆但陰隱之事不似宿命宜味之四出名示害此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師俱陷王難五教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄八貪求神力亦分為五一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力雖言神通實多神變異前多取諸通溫陵曰化元萬化之本也欲乘之以發神變耳二魔遣邪附爾時天魔候得其便飛精附人口説經法三邪惑事言分三一邪附人至其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座説法二邪惑之事是人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙惟於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌種種皆神變惑人之事而不堪刀兵顯是邪魅身著下皆引誘壞教之意三説邪惑言口中常説神通自在或復令人旁見佛土鬼力惑人非有真實讚歎行淫不毀粗行將諸猥媟以為傳法四出名示害此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難五教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄九貪求深空分五一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空入滅非涅槃但欲空身存沒自在二魔遣邪附爾時天魔候得其便飛情附人口説經法三邪惑事言又三一邪附人至其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座説法二現邪惑事於大衆內其形忽空衆無所見還從虗空特然而出存沒自在或現其身洞如琉璃或垂手足作旃檀氣或大小便如厚石蜜誹謗戒律輕賤出家溫陵曰欲入滅定以趣空寂也從空出沒等因其好空故依詃惑厚味濃也夫身淨肢香而又便蜜真可以駭俗惑人却乃毀戒律而賤出家故愚人不敢不遵依不知毀戒等即可以驗其為魔而神怪何足畏乎三説邪惑言口中常説無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果撥無貪欲違佛背經顯是魔而惑之者真由主人自心狂迷而已宜悟之四出名示害此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難金玉等雖無情物而精怪依附遂成類生無想之屬即草木精魅久成魔黨也五教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄十貪求永歲分五一定發愛求又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住此中所希羅漢境界行開之後自然得之今此躁求故招魔事孤山曰變易者斷見思盡生法性土故受變易今頓欲變粗身為細質易短壽為長齡從此分斷延入彼土也二魔遣邪附爾時天魔侯得其便飛精附人口説經法三邪惑事言又為三一邪附人至其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座説法二現邪惑事好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此心信疑佛現前瞬息萬里五通中神境通也今乃自現神境至遠成近令他數步至近成遠故淺智寡聞驚異其為佛也三説邪惑言口中常説十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得夫衆生諸佛等皆由他生即是無始元佛其長壽豈有紀極亦所以投其愛求之本念也四出名示害此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞孤山曰自在天即欲界第六天上別有魔王居處亦他化自在天攝溫陵曰陀羅尼經有遮文茶毗舍童子即毗舍遮鬼隸四天王已發心則護人未發心則害人以彼定力虗明為利故食其精氣或不因師者不因魔附之師而親見魔現也獨言即彼惑行人言也既自見魔現與之行欲他人不見謂彼獨言彼實與魔言也若妖魅者即此行人亦即似妖魅矣前人彼人皆指被惑行人而言未詳者未能審察其是魔非聖也五教悟戒迷汝當先覺不入輪回迷惑不知墮無間獄中間十境已竟三示勸末世分二一預示魔事又分三一妄稱極果阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺言出家修道者或附比丘或自現比丘等按前十種惟第十有自現金剛美女餘皆附人行人當知凡現通稱佛必魔無疑以聖必不泄也二以淫成化讚歎淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑近則九生多逾百世令真修行總為魔眷魔師魔子且指前十淫淫下明其害延後世多壞行人也溫陵曰涅槃經云末世魔眷屬現比丘羅漢等像混壞正法非毀戒律其意同此也三陷魔墮獄命終之後必為魔民失正遍知墮無間獄二深勸悲救又二一正申勸詞汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見觀佛遺囑足知阿難四分入滅亦假示現而依佛留願在世冥救也必矣即今法教弘通孰非尊者悲救之力哉正心謂見諦真正深信謂樂欲無厭正知見謂慧眼圓明洞照魔姦也二轉激報恩我今度汝已出生死汝遵佛語名報佛恩欽聞斯囑而不痛心淚下者木石人也四結害囑護又分為三一示因交互阿難如是十種禪那現境皆是想陰用心交互故現斯事二迷則成害衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄謂言登聖者言其不惟惑魔為聖兼亦自任聖流也三囑令保護汝等必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道阿難所以結集流通令普聞經即其事也想陰魔相已竟
