body:
  text: 京都西湖沙門交光真鑑述二六入開合原無此科即內六處耳分二一總徵復次阿難云何六入本如來藏妙真如性入者璿師謂境入之處是也觀下吸字正與入字相應以六根各能吸入所對之塵故也二別釋又分為六一眼入又分三一妄依真起阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相即彼者吳興謂取前能喻之眼為今所喻之法是也意云即彼目見空華固是目睛瞪發勞相更兼目與勞諸所妄見又同是菩提心上之勞相也如言子固是父之所生而兼父與子又同是祖之所生也兼目與勞即見與見緣也但前一勞字指空華言後二勞字皆指目所對之妄塵言也雖單重目而非塵無以表見故須兼之觀下當自省矣二辨妄無實又分二一無有實體又分二一托塵妄現因于明暗二種妄塵發見居中吸此塵象名為見性首二句是所托之塵次二句是妄現之見末句因得其名可見但有其名而已只是根攬塵而成名不可交互平言二離塵無體此見離彼明暗二塵畢竟無體前文但約離明見暗而顯見之不隨明滅今若明暗雙離畢竟見性作何形狀可見但是托塵妄現而實無其體也問前取根性離塵有體異彼緣心今云明暗雙離畢竟無體何異緣心之無體乎答淺論之前因衆生離緣心不見真心乃就根中指性令識真心然自是心非眼之後但惟顯性不復論根所以極表其離塵有體之真今因已領真性尚執六根別有體相未融一性更須令知六入無自體相所以極破其離塵無體之妄雖説見性乃根中局執之自性非同前離眼廓周之見性也是前顯性而此破相所以異矣更深究之此之破相亦欲其離相即妙真如性耳則顯性之旨依舊同矣豈如緣心真破其一定無體哉四卷末阿難亦有此問再當參互觀之二無所從來上科推妄此科驗知後放此又二一總以標列如是阿難當知是見非明暗來非於根出不於空生約世情根出乃為正計餘二防轉計而已二徵起逐破又分三一不從塵來何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明首三字總徵寄居此科耳明暗既以相反生滅自爾互換同前因緣之破可知二不從根來若從根生必無明暗如是見精本無自性必無下三句一氣讀之如云若謂單根能生見性則雙離明暗而見精本無自體也三不從空來若於空出前矚塵象歸當見根又空自觀何闕汝入空包根塵若能出見則根塵俱成可見且墮外物見我矣三結妄歸真是故當知眼入虗妄本非因緣非自然性無有實體故虗無所從來故妄然所以無實自體者以其體即真如所以不從三處者以其出自藏性本即是非因緣非自然之妙性詐現眼入而已下皆放此説之眼入已竟二耳入分三一妄依真起阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相瞪目以見空華變為塞耳以聞頭響準上前一勞字指頭內虗聲而後二勞字指耳所對一切聲也自此以下皆當請看上文以例之無不明矣蓋目瞪發勞止見空華菩提發勞則見聞嗅嘗覺知齊發故皆言瞪發勞相二辨妄無實又分二一無有實體又分二一托塵妄現因于動靜二種妄塵發聞居中吸此塵象名聽聞性動即有聲靜即無聲二離塵無體此聞離彼動靜二塵畢竟無體二無所從來又分二一總以標列如是阿難當知是聞非動靜來非於根出不於空生二徵起逐破又分三一不從塵來何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜二不從根來若從根生必無動靜如是聞體本無自性三不從空生若於空出有聞成性即非虗空又空自聞何關汝入此惟以有性非空小異於歸當見根之文餘並準上可知三結妄歸真是故當知耳入虗妄本非因緣非自然性準上耳入已竟三鼻入又分三一妄依真起阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相冷觸本是身入所對之塵此因畜鼻之勞無別香臭但有冷觸姑借之以例諸香臭氣同一妄耳且此益驗上文後二勞字便指諸色諸聲也二辨妄無實又二一無有實體又二一托塵妄現因于通塞二種妄塵發聞居中吸此塵象名臭聞性塞者但謂無臭不必氣之不通二離塵無體此聞離彼通塞二塵畢竟無體二無所從來又分二一總以標列當知是聞非通塞來非於根出不於空生二徵起逐破又分三一不從塵來何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸二不從根來若從根生必無通塞如是聞機本無自性機者但是變文不必説其發聞以正破根生故三不從空來若從空出是聞自當回嗅汝鼻空自有聞何關汝入回嗅汝鼻同上歸當見根三結妄歸真是故當知鼻入虗妄本非因緣非自然性準上鼻入已竟四舌入又分三一妄依真起阿難譬如有人以舌舐吻熟舐令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相此經了義雖六塵各二而前三妄依真起科中惟明動通此下三入皆雙用所加淡離滅是也二辨妄無實又分二一無有實體又分二一托塵妄現因甜苦淡二種妄塵發知居中吸此塵象名知味性二離塵無體此知味性離彼甜苦及淡二塵畢竟無體二無所從來又分二一總以標列如是阿難當知如是嘗苦淡知非甜苦來非因淡有又非根出不於空生二徵起逐破又三一不從塵來何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相二不從根來若從舌生必無甜淡及與苦塵斯知味根本無自性三不從空來若於空出虗空自味非汝口知又空自知何關汝入自味非口似異上而重下如云但以虗空自當知味不必用口然後乃知庶不重下文矣三結妄歸真是故當知舌入虗妄本非因緣非自然性凖上舌入已竟五身入又分三一妄依真起阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因于勞觸兼身與勞同是菩提瞪發勞相此以二手俱是身根無別觸塵徒以冷熱互勝妄成合離之覺説為虗妄勞相而身入一切妄覺皆類於此以此合覺之觸者即指冷熱相涉之觸也顯於離知者蓋身家離塵權小不達故以合覺形顯之如云合時知合自顯離時亦必知離矣從初至此是舉合離二覺涉勢二句是總承結斷其為虗勞而已二辨妄無實又分二一無有實體又分二一托塵妄現因于離合二種妄塵發覺居中吸此塵象名知覺性二離塵無體此知覺體離彼離合違順二塵畢竟無體違順即合離中之違順故惟二塵蓋或離或合覺苦即是違覺樂即是順也二無所從來又分為二一總以標列如是阿難當知是覺非離合來非違順有不於根出又非空生二徵起逐破又分為三一不從塵來何以故若合時來離當已滅云何覺離違順二相亦復如是雖開四相終惟二塵二不從根來若從根出必無離合違順四相則汝身知元無自性三不從空來必於空出空自知覺何關汝入此入並下入俱於是科缺前二句但有後二句三結妄歸真是故當知身入虗妄本非因緣非自然性準上身入已竟六意入又分為三一妄依真起阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相準上諸入根皆惟一如眼但名見耳但名聞等塵皆分二如色分明暗聲分動靜等今意亦當但名為知而法亦但當分為生滅故知寤寐憶忘生住異滅八字參互成文而已實皆法塵實惟生滅二義而已又準上眠寤亦當作假設取例之意如目瞪成勞則見空華意倦成勞則現眠寤是也至於憶忘但顯眠寤之相寤即覽塵眠即失憶矣此方舉畢假設之事是其下承上假設之事為例一切憶忘皆同眠寤因以釋成意根之相顛倒者首尾循還之意生住異滅亦即是憶忘而各分前後耳初憶為生正憶為住始忘為異忘盡為滅吸習二句吳興謂吸習此相中歸意根四相剎那前後不雜是也稱意知根者就便釋名而已勿多發明恐濫於下文名覺知性矣二辨妄無實分二一無有實體又分二一托塵妄現因于生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性生滅總該前八不止住異也見聞二句依孤山意所謂憶則逆緣謝落五塵忘則昏住不及之境也逆流即生塵不及即滅塵耳名覺知性者言但塵之憶忘假名知性而已二離塵無體此覺知性離彼寤寐生滅二塵畢竟無體寤寐不同上之眠寤彼是假設取於睡時此是法塵但約神思昏明而已非指睡時即生滅故但二塵二無所從來分為二一總以標列如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生二徵起逐破分三一不從塵來何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者寤寐但廣破意仍即生滅則師謂為受二字皆是知字變文成句耳二不從根來若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性此以寤寐二字通該生滅等八字也此節稍難發明準上諸文詳來如云若汝執定惟根自出而無關寤寐殊不知此二塵常自隨身開合無時暫離若汝覺知之根離此二塵畢竟無體方與諸文相類身開合指身中肉心狀如蓮華開則明而合則昏矣三不從空來若從空生自是空知何關汝入三結妄歸真是故當知意入虗妄本非因緣非自然性此處當明入處界三科破法有三種差別一者約緣破言不局本法廣破外緣也如滅火不徑朴火但抽去其薪火自滅矣以火無自體也二者更互破言二法相依而立即須更互破之如蛟水相依兩皆為患除之者驅蛟絶水之本泄水破蛟之居也三者從要破此有兩種一者二法從要破如兩木相倚而立但推倒一邊二皆倒矣二者三法從要破如筋膠角三合為弓而膠為其要但除去其膠則筋角皆不成弓矣故此六入全是約緣破塵即其緣也下十二處兼更互及二法從要破也眼色耳聲四處更互破也餘八處二法從要破也又惟身觸二處獨約根破餘六處皆獨約塵破也後十八界全是三法從要破也然文雖從要而意實並破非同六入正意在根也詳其結處蓋可見矣六入已竟三十二處此蓋開色合心為愚色而不愚心者説也色本是一開為五根六塵成十一處故曰開色心若對上五陰則合受想行識之四對下十八界則合六識及意根之七總收為意之一處故曰合心分二一總徵復次阿難云何十二處本如來藏妙真如性處方所也又定在也六根六塵故有十二相教權立言根一定在內塵一定在外又眼惟對色耳惟對聲各有方所定在今融歸一性正皆破彼方所定在也徵意準上二別破分為六一眼色處分四一標舉二處阿難汝且觀此祇陀樹林及諸泉池觀之一字即是根處下即塵處後皆倣此二雙以徵起於意云何此等為是色生眼見眼生色相約凡小心外有法根塵不干即不中此難此約權宗心法相生意謂色現而後起見離色則見無可表故説色生眼見又眼觀而後色顯離見則色不可得故説眼生色相此固權宗曲引法執者漸入唯識之境實非無生了義也故此徵起破之三分文難破又分二一破見生色阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是見空非色色性應銷者言眼既生色眼具色性見空非色色性應失矣銷則顯發一切都無者言性相相待而生色性既銷色相應泯矣色相既無誰明空質者言空色相際而顯色相既無空應不顯矣空亦如是者言眼生空相例此可知矣二破色生見若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色比上易省非色見銷者言既無能生之色自無所生之見無見全無所明故曰誰明空色準上科仍當有空亦如是句也四結妄歸真是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性無處所者無內外定在之住處此尚明其無處虗妄者並體一無也蓋相生之計正由妄執眼色實有二處不達一體故對待起此妄計今約相妄則無體偽現尚無二處説誰相生耶約性真則見色一體本來但是一非因緣非自然之妙性而已和誰相生耶後皆放此夫觀始曰俱無處所次曰二處虗妄顯是平破不同上之正破六入塵惟帶言而已也眼色二處竟二耳聲處分為四一標舉二處阿難汝更聽此秪陀園中食辦擊鼓衆集撞鐘鐘鼓音聲前後相續根塵準上二雙以徵起於意云何此等為是聲來耳邊耳往聲處詳下破意此中當缺一句為無來往蓋有來往是凡小妄情無來往是法相戲論所謂離中知也今並破之是則雙徵者應是雙徵有來往及無來往之二計矣三分文難破又分三一破聲至耳阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處此約聲一聞多以破也喻中一身尚不能並往二處法中一聲豈能遍至多耳可見計聲往耳邊者妄也喻意不可難以神通二破耳至聲若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往聲鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響此約聞一聲多以破也喻意仍前法中一耳豈能遍往多聲可見計耳往聲邊者亦妄也三破無來往若無來往亦復無聞無往來者耳根聲塵各住本位兩不相到據此則應聲發耳不能聞譬城園二人各不相到決不相知又如薪火各住一處終不成燒然則法相所謂離中知者亦戲論耳豈了義哉四結妄歸真是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性承上有往來及無往來二計俱非如此是果何故而然哉亦由相妄性真而已自相妄言當知聽與音聲各皆周遍俱無一定處所即聽與聲二處自體亦不可得權小妄局了無實義是則尚無二處説誰來往及不來往自性真言當知聽與音聲非畢竟無法但惟一非因緣非自然之妙性而已實無二體和誰來往及不來往耶問既惟一體離知何過答一體非二豈得言離若實有離安能有知斯則由無二相而惟一性故二計俱非由二計俱非方顯其惟一體而無二處當知一體無二惟此二處偏顯故此詳明餘皆準此思之耳聲二處竟三鼻香處分四一標舉二處阿難汝又嗅此爐中旃檀此香若復然於一銖室羅筏城四十里內同時聞氣四十里同時聞氣即顯鼻不蒙煙之相舊注疑其有違法相合中之知不知此是法性了義正破法相豈反以彼而難此據法性根塵各皆周遍一體無分而離知合知皆為戲論但常香鼻必蒙煙不顯合知為不了義惟此異香不待蒙煙正可因之以明根塵各遍不待合知之了義故佛取之有深意也且諸物皆有異者不止旃檀如藥樹見色而愈病塗鼓聞聲而毒人梟目晝暗而夜明麥草秋榮而夏稿豈可皆泥於常而不信其異乎二詳以徵起於意云何此香為復生旃檀木生於汝鼻為生於空此惟單徵香塵了無生處二法從要破也三分文難破分三一破從鼻生又分二一按定鼻生須出阿難若復此香生於汝鼻稱鼻所生當從鼻出二依出轉破其謬又分二一體用不相應鼻非旃檀云何鼻中有旃檀氣肉體而非香體何有發香之用二名義不相應稱汝聞香當於鼻入鼻中出香説聞非義聞字即名以入為義出非義也二破從空生若生於空空性常恆香應常在何藉爐中爇此枯木三破從木生若生於木則此香質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠四十里內云何已聞此可見尚不許是異香殊勝之力以但常情習執許之則墮香生於木何況必欲同常香之蒙煙乎無生了義甚深難解沉思可也四結妄歸真是故當知香鼻與聞俱無處所即嗅與香二處虗妄本非因緣非自然性鼻聞二字似兼浮塵勝義二根以根對塵仍為二處非有三法也承上詳究香塵尚無生處而嗅性豈有處所哉故曰俱無處所即嗅與香二處生體了不可得齊此結妄至於歸真意同於上鼻香二處已竟四舌味處分為四一標舉二處阿難汝常二時衆中持鉢其間或遇酥酪醍醐名為上味此中舌處不顯寄隱遇字之中二詳以徵起於意云何此味為復生於空中生於舌中為生食中三分文難破分三一破從舌生又三一按定一舌阿難若復此味生於汝舌在汝口中秪有一舌二當成一味其舌爾時已成酥味遇黑石蜜應不推移石蜜溫陵言即沙糖也由言舌自生味故招此難言舌既生味當如樹之生果或酸或甜但成一味今若元生酥味豈能遇糖而變三兩途難破又二一不變即失舌義若不變移不名知味舌以知味為義約此即失知味之義二變移即須多體若變移者舌非多體云何多味一舌之知成多舌之過也依前樹喻若欲兼生多果之味須有多種之樹法中若欲變移多味理須具有多舌云何多味而一舌之知能遍生哉二破從食生又二一食不自知若生於食食非有識云何自知二轉成他知又食自知即同他食何預於汝名味之知言他自知何干於汝而汝舌稱有嘗味之知乎三破從空生分四一標令噉空若生於空汝噉虗空當作何味二按定一味必其虗空若作鹹味三展轉成謬又三一通身常鹹謬既鹹汝舌亦鹹汝面則此界人同於海魚二知鹹味淡謬既常受鹹了不知淡言鹹味無時而脫何由而知淡三形對并失謬若不識淡亦不覺鹹言鹹淡相待而顯今既如海魚常處鹹中曾不識淡為何狀豈覺己所處為鹹哉故俱無辨矣四竟失味義必無所知云何名味言味托知顯今一無所知則味塵全失矣四結妄歸真是故當知味舌與嘗俱無處所即嘗與味二俱虗妄本非因緣非自然性舌嘗同前亦指二根此亦辨塵況根而相妄性真結意皆準上文可知舌味二處已竟五身觸處此當先知觸不同於諸塵蓋諸塵皆持業釋如色即是塵也獨觸為依主釋身所觸之塵也故單塵未及身觸但惟是色不名為觸以身觸知方以得名而觸即身分之覺也是必具能知之用者方能成觸所觸而無知者但受觸而已豈能自成其觸哉明此而下之破意可領矣分為三一標舉二處阿難汝常晨朝以手摩頭當知觸塵固與諸塵不同而此處佛所舉之觸塵復與諸觸塵不同也吳興前謂五陰用喻明法六入假設取例十二處以下皆現前實法不假喻例由疏向親此説頗好然前鼻香及此二處雖非假設亦有取例之意良以同時遠聞旃檀獨有特借之以顯非木非鼻根塵各遍因以例諸香皆爾然猶有根塵之分今此手頭皆是身根無外觸塵假摩以成觸相而根塵互不可分因例諸觸皆類此之虗妄自顯其無二處而惟一性矣二開途難破開為二觸一觸之兩途也諸處徵辭該盡全文故先徵後開此處徵意所該一途故先開而後徵也分二一約二觸破因下改轉一觸故知此約二觸蓋因頭手二皆有知人或有執二皆成觸故作此破也又三一徵定能觸於意云何此摩所知誰為能觸能為在手為復在頭觸之由成須能所相合故徵能觸是誰二破不成二若在於手頭則無知云何成觸若在於頭手則無用云何名觸言能觸若在於手惟手有知但能成手之觸其頭即應無知被觸而已云何復成頭之觸哉下文頭手互番可知無用即無知名猶成也三防轉二知若各各有則汝阿難應有二身此因所觸無知被破故轉計能所二各有知以救前過即以二身之謬破之約二觸破竟二約一觸破分三一按定一體若頭與手一觸所生則手與頭當為一體一觸所生謂手頭但成一觸番前兩觸也當為一體者因觸定體無復能所意蓋按定而下遂破之二破一不成若一體者觸則無成承上言若能所既泯對待斯絶何成觸義三防轉二體若二體者觸誰為在在能非所在所非能不應虗空與汝成觸觸既是一能所但從一邊二體既共一觸能所須從於觸在猶屬也故須先究此觸屬能屬所一觸若屬於能則二體皆從觸而成能誰為所觸故曰在能非所下句番上可知末承上云二體皆能豈虗空與汝成所二體皆所豈虗空與汝成能耶三結妄歸真是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性覺觸者所覺之觸也與身者與能覺之身也夫約二觸則一知二知了不可定約一觸則一體二體無所適從故知身觸二處無實處所無實體相矣然二相既虗一性自顯故曰本即是非因緣云云身觸二處已竟六意法處分四一標舉二處阿難汝常意中所緣善惡無記三性生成法則此有二説一者準諸處則意中二字為根下皆法塵而三性即法塵所具如忽然善事影子現於意中即善性法塵餘二準此無記即非善非惡之事唯識云善惡不可記別名無記性則不專昏住而昏住亦攝其中依此説則生成乃自然之意法則者法塵之定則也二者異諸處則意中屬根所緣即指法塵善惡等六字是所帶之識生成法則者言意中所緣法塵乃意識三性中生成法則也良以法塵不同色等有實性境此惟意識之獨影耳識不起則終不現故須帶識而言是彼生成且合唯識宗中前六識俱通三性前説於文似順後説於教實合矣智者詳之二雙以徵起此法為復即心所生為當離心別有方所此中心字依前説即是意根而意根即第七識心若約處攝百法則八王意處總收依後説則第六識心也然作意根者理長三分文難破又分二一破即心所生阿難若即心者法則非塵非心所緣云何成處非塵言即心也非心所緣者言心不自緣也是心所緣方成法處非心云云二破離心別有分二一總詰若離於心別有方所則法自性為知非知法自性者法塵之自性也此但雙詰知與非知兩途而已二各破分二一約有知破又分二一轉塵為心知則名心言法塵若許有知即當是心向下却雙詰此心異於汝耶即是汝耶方乃雙破異即二異即皆謬又分二一異已成他謬異汝非塵同他心量汝字即指兩説中根識承上言法塵既即是心然則此心若與汝根識別異不是一體則別是一心豈不同他人心量乎二即已何二謬即汝即心云何汝心更二於汝若即汝心則應不相對待無有二相今何心境相對宛然與汝為二乎約有知破已竟二約無知破又分四一檢非徵處若非知者此塵既非色聲香味離合冷暖及虗空相當於何在此檢其非彼五塵而徵其定在何處也言既離心而又無知當即是外塵即當有所表示然此塵既非色云云等相當於何在乎二明其無在今於色空都無表示言世間惟有色空名一切處今於云云則畢竟無所在也三防其轉計不應人間更有空外恐轉計云此塵更在色空之外然色容有外空豈有外故曰不應云云四竟不成處心非所緣處從誰立承上言既畢竟無定在處則非心之所能緣且原依心之所緣方立法處今既非心所緣則法處從誰立乎四結妄歸真是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性相妄性真準上可知十二處已竟四十八界此開色開心為心法俱愚者説也界攝百法頌曰根塵各五界十色隨自名八王歸七心八十二皆法蓋意根界即第七識而七八相依故第八亦意根所收也法塵尋常但屬色法或曰法塵無相而有影故半心半色即應十分半色七分半心分二一總徵復次阿難云何十八界本如來藏妙真如性根塵識皆六故成十八界者依古解種族也各成界限不相雜亂之意惟依十八種族為正又釋為因不與破意相關蓋惟破其界限融歸一性非破其能生諸法故不用之二別破分六一眼色識界分四一標舉三界阿難如汝所明眼色為緣生於眼識如汝所明者吳興謂就小乘所解因緣生法而破之是也彼所謂眼根色塵內外相對於其中間生於眼識內外中間故成三界矣下皆放此二雙以徵起此識為復因眼所生以眼為界因色所生以色為界三惟徵詰於識準前弓喻從要而破可知也又如三家比鄰而住徹其中家左右界墻則三家界限俱不成矣承上生於眼識徵起二為字當作名字訓之良以根塵各有別名而識則無之若不係以根塵無所分別然係根義多而於自在位不濫故諸經多係於根今依權小根塵皆生乎識則應二係不定故佛雙舉詰之如云汝謂眼色生識為復因眼所生以眼名界而謂之眼識界乎為復因色所生以色名界而謂之色識界乎觀後結處前三係塵後三係根蓋可見矣後皆準此三分合難破又三一破因眼生又二一無塵廢識阿難若因眼生既無色空無可分別縱有汝識欲將何用無塵不用識也二無表非界汝見又非青黃赤白無所表示從何立界單根不立界也蓋根塵相對表示內外然後識界立於中間今無塵單根而根之自體又無青等則是但惟一體無復內外以表示將以何為中間而立於識界乎二破因色生此科文法如繩床腳十字交義兩頭互到故俗呼為交床本意元是變與不變皆應不識空皆應不立界而交錯成文乃前以從變為不識空而後以不變為不識空前以不變為不立界而後以從變為不立界文極巧矣就分為四一從變不識空若因色生空無色時汝識應滅云何識知是虗空性二不變不成界若色變時汝亦識其色相遷變汝識不遷界從何立言若諸色遷變已歸滅盡而汝識又識其色相遷變則是汝識不隨色遷滅矣下乃結成破意云色滅而汝識不遷是識獨存無復對待更與何法分限而立其界乎三從變不成界從變則變界相自無此言非但不遷無以立界縱從其遷變則應已歸變滅而並其界相皆無矣從何立界乎四不變不識空不變則恆既從色生應不識知虗空所在此言非但變滅不能識空縱使不變即成恆性既從色生則應惟恆識色不復識空之所在矣三破共相生若兼二種眼色共生合則中離離則兩合體性雜亂云何成界合離二句前句上合字與後句上離字皆屬根塵前句下離字與後句下合字皆屬於識合則中離者言此根塵若合一處其間自無空隙容識而中界之識即應離而在旁何成中界又此根塵若離在兩處則所生之識亦當分在兩處而與之各合即環師所謂半合根半合境亦不得為中界末二句謂兩合則雜中離則亂故曰體性雜亂何能成中界乎四結妄歸真是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性此可分前半至三處都無作結相之妄分後半至科盡作歸性之真三處都無者言所生眼識既不成界能生眼色何得成緣良以中界既無內外叵得所謂為緣生識不過順世權立都無實義矣色界者色識界也此係塵以為別名而又略一識字後二科放此言此三界約相全妄約性全真本惟一非因緣非自然之性而已豈有三相可得哉下五科放此眼色識三界已竟二耳聲識界分四一標舉三界阿難又汝所明耳聲為緣生於耳識二雙以徵起此識為復因耳所生以耳為界因聲所生以聲為界三分合難破此下諸界不同前界但惟破識無生今雖亦約於識却乃專破根塵了不可得後方結言無可立界平破之旨於此益明下皆放此分三一破因耳生分三一約勝義根破阿難若因耳生動靜二相既不現前根不成知必無所知和尚無成識何形貌勝義根者清淨八法所成許具聞義又聖人所見之境肉眼不見也長水曰若無前境根自無知若實無知更有何識二約浮塵根破浮塵根者即肉耳也粗浮八法所成本無聞義二根科名並依長水又分為二一離塵無聞若取耳聞無動靜故聞無所成取耳聞者即取肉耳能聞也末二句破意且同上科二徒肉非界云何耳形雜色觸塵名為識界云何者有況又意雜色觸者於浮根四塵略舉其二謂色可覩見觸可執捉有形之物若徒取此無情所攝非心識倫也云何立識界乎三約二根結破則耳識界復從誰立言識於二根畢竟從誰立界乎破因耳生已竟二破因聲生又二一約根塵雙失破若生於聲識因聲有則不關聞無聞則亡聲相所在長水曰聲能生識何假於聞若無有聞聲亦不有二約根塵雙存破又分三一證成聞識識從聲生許聲因聞而有聲相聞應聞識首句牒定也許聲二句言兼許有聞也意欲救前所破末句仍以破之言識因聲生即當與聲為一則聞聲時豈免聞識之過二兩途俱非不聞非界聞則同聲非界者聲非生識之界也同聲易知雖顯雙非意猶明其必至聞識三躡成無知識已被聞誰知聞識若無知者終如草木躡上聞識遂成無知之過也言識不同聲方可分別於聲今已被聞即同於無知之聲境復有誰來知此聞識乎末二句結破遂墮於無情之過也三破共相生不應聲聞雜成中界界無中位則內外相復從何成言若謂根塵共生則不應聲聞交雜以成中界蓋既曰交雜即不成中矣下言必有中位方分內外今無中界何分內外界乎四結妄歸真是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性此後準上耳聲識三界已竟三鼻香識界又分四一標舉三界阿難又汝所明鼻香為緣生於鼻識二雙以徵起此識為復因鼻所生以鼻為界因香所生以香為界準上三分合難破分三一破因鼻生三一雙詰二根阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取嗅知動搖之性二約浮塵根破二一先轉其體若取肉形肉質乃身身知即觸謂鼻根轉為身根鼻知轉為觸塵也二次失其名名身非鼻名觸即塵雙表無鼻名也謂名身則是身名非鼻名名觸則即塵名非鼻名三躡破非界鼻尚無名云何立界三約勝義根破二一總詰知性若取嗅知又汝心中以何為知二詳分難破又三一非肉知以肉為知則肉之知元觸非鼻即同上之身知即觸二非空知又分二一轉知屬空而廢肉以空為知空則自知肉應非覺空指鼻孔肉指鼻頭此科方墮鼻肉不覺之過二攬空為自而廢身如是則應虗空是汝汝身非知今日阿難應無所在蓋由鼻孔之空既有知性則一切虗空皆應是汝又鼻上之肉既無知性則汝遍身之肉皆應非知下躡此二意遂成無在之過蓋約空是汝則虗空無在而汝亦應無在約身無知則縱身有在而亦應不覺其在於何處也三非香知不可濫下香生之文此因破鼻生識界而遂追究取何為鼻既破浮塵復究勝義之知依何為體由是破肉與空而遂及於香是蓋破香具鼻根之知非同下之破香生識也又分為二一轉自成他謬以香為知知自屬香何預於汝預干也言既轉將自知成他香知彼自有知何干於汝乎二攬他為自謬謂攬外香塵為己鼻生也又二一縱外成內若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木暫縱外塵為內根生二氣鼻從破二一從氣破鼻從氣之二破鼻之一也又三一離氣嗅鼻二物不來汝自嗅鼻為香為臭二必不兼聞臭則非香香則非臭言若汝鼻本惟是臭必不兼聞於香是香反此三兼聞墮二若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體此因謬執香臭俱生於鼻故作此破也言若雙生香臭須當雙具二鼻也此二鼻非指肉鼻即指勝義靈知故下躡二鼻便索二身二從鼻破氣從鼻之一破氣之二也又分二一因根合塵若鼻是一香臭無二言氣既鼻生而鼻又惟一所生香臭即當渾一無分二合塵廢界臭既為香香復成臭二性不有界從誰立首二句牒合香臭而互奪也末二句有兩説結破一説因互奪而至俱無如是則根知尚自無體識界從誰立乎又説兩氣互同無一定之分辨何所了別而立識界乎並通二破因香生分三一成不知香又二一縱成香生若因香生識因香有二以喻難法如眼有見不能觀眼因香有故應不知香見因眼有既不見眼識因香有應不知香二兩途俱非知即非生不知非識溫陵曰若曰能知即非香生若曰不知即不名識皆不可也三二界俱破香非知有香界不成識不知香因界則非從香建立因界即指識界以界具因義故也承上言若不知香豈但非識而已哉將必并香識二界俱不成立矣何以故蓋香非云云香非知有者香不由識而顯也據此即應香界不成以香必假知而顯離知豈得自成乎識不知香者識不緣香而發也據此即應識界不立以識必托香而立無香豈得自立乎仍總結云亡識壞界其過無窮豈可謂識因香生乎三破共相生既無中間不成內外彼諸聞性畢竟虗妄據上所破則中間識界既以叵得而內外根塵亦復不成夫內外不成則能共生者無實中界不立則所共生者非真嗅聞之識豈不畢竟虗妄哉四結妄歸真是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性準上鼻香識三界已竟四舌味識界分四一標舉三界阿難又汝所明舌味為緣生於舌識二雙以徵起此識為復因舌所生以舌為界因味所生以味為界三分文難破分四一破舌生分二一根轉塵亡阿難若因舌生則諸世間甘蔗烏梅黃蓮石鹽細辛薑桂都無有味前四味可知後三味同一辣味都無有味者約上識因舌生則是不假外之味塵而舌之體上自能分別成味故云爾也二教嘗難破二一教自嘗舌汝自嘗舌為甜為苦躡上舌自有味而成難也二兩途俱非又分二一舌苦誰嘗若舌性苦誰來嘗舌舌不自嘗孰為知覺若舌性苦者舉一味以為例也誰來嘗舌者先反問也下二句申正義也孰為知覺者言舌既不自嘗其舌孰從而知覺其為苦乎二非苦何界舌性非苦味自不生云何立界言舌性若本自非苦則諸味皆自不生於舌無可了別云何立識界乎破舌生已竟二破味生又復分為二一不成知味若因味生識自為味同於舌根應不自嘗云何識知是味非味識自為味者識即是味也味不自知同於舌不自嘗遂結無知二更成相壞又三一以多壞一又一切味非一物生味既多生識應多體以味之多壞識之一也謂能生之味本是多體則所生之識亦應非一如母多子亦應多也二以一壞多識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別以識之一壞味之多也謂所生之識本惟一體而能生之味亦應非多如子一母亦應一也吳興曰鹹淡甘辛略舉四味和合者衆味共成也俱生者本性不易也變異者燒煮異本也豫謂變異者正是醞釀酒醋之類而燒煮猶次之矣三躡失名義分別既無則不名識云何復名舌味識界躡無分別遂失識名以識正惟分別是其義也三破空生不應虗空生汝心識按前雙徵不合有此科且諸界皆無屬之味生又頗無意味疑若衍文殊未敢定然佛語自在依孤山意別開一科無傷四破共生舌味和合即於是中元無自性云何界生元無自性者言合而為一無兩開各自之性也云何界生者言根塵既已合一尚無自性豈有中間空隙以容識界之生乎孤山曰初因舌破自生二因味破他生三空不生破無因生四和合破共生此意亦好別界不全又當知彼是般若密意但破四生妄計以顯諸法無生而已此更直指一性以顯諸計皆妄方為真了義也四結妄歸真是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性舌界者舌識界也此與下二科皆係根以為別名餘并準上舌味識三界已竟五身觸識界分四一標舉三界阿難又汝所明身觸為緣生於身識二雙以徵起此識為復因身所生以身為界因觸所生以觸為界三分合難破又分為三一破因身生阿難若因身生必無合離二覺觀緣身何所識溫陵曰覺觀即身識而以合離二境為緣若無緣則無識矣二破因觸生若因觸生必無汝身誰有非身知合離者躡無身而決其必不知合離矣三破共相生三一標定合顯阿難物不觸知身知有觸物不觸知者徒物不能自觸而知也身知有觸者必因合身方知有觸也先以標定觸知必因身合而顯所以張下正破之本矣二正破共生又分為三一所生無兼相知身即觸知觸即身即觸非身即身非觸科云所生者即識也無兼相者無雙兼根塵之相也首二句約雙即破其不得為共生也二知字即承用上科合顯之知也承上如云身觸合處其知性固歷然而顯若即因此而計其共生則當審此知性知身乎知觸乎若言知身則此知即是觸知何以故觸者身之對也此之知性必與觸一而後可對知於身也知觸即身反此番之末當結云此但屬於一邊何以為共生乎當記二即字乃是知即觸知即身不可誤作身即觸觸即身也次二句雙非破其不得為共生也如云此知也既單屬觸便不得兼屬於身故曰即觸非身既單屬身便不得兼屬於觸故曰即身非觸末當結云竟不得兼於二邊何以為共生乎亦但記二非字乃是知非身知非觸不可誤作觸非身身非觸也二能生無對相身觸二相元無處所合身即為身自體性離身即是虗空等相科云能生謂身根觸塵無對相者無對立內外之二相也首二句標定下四句釋成標中之義合身離身皆以觸言前二句謂觸與身合即成一體不可復分後二句謂觸與身離即與虗空同相等即同也此蓋言其並上一體亦無也未合離皆無二相意蓋顯其二相尚無處所何得為能共生識之本乎三能所互不成內外不成中云何立中不復立內外性空前二句因能生根塵不成致所生之識不成後二句因所生之識不成致能生根塵不成中與內外亦同上解但顛倒其義故曰互不成也正破共生已竟三總以結破則汝識生從誰立界此方顯結不能共生也言三皆無位界無從立何有共生之理四結妄歸真是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性準上身觸識三界已竟六意法識界分為四一標舉三界阿難又汝所明意法為緣生於意識二雙以徵起此識為復因意所生以意為界因法所生以法為界三分合難破分二一破因意生二一根塵存亡破阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用於汝下三句塵存則意存也言意中必有所思之法塵而後顯意根之相若無下二句塵亡則意亡也若無前所思之法塵意根亦無所生矣末二句躡之正破意之生識也離緣者離法塵也無形者意根無形也言離法則意根無形若是則根塵悉泯識將焉用哉此與前耳聲識界中約勝義科其意全同二根識同異破又分三一雙審同異又汝識心與諸思量兼了別性為同為異管見意好詳經意本是單舉首句對下二句為論故首句作識而下二句同作根於理為順蓋正取思量為意根而略帶八識了別之性也故兼者即帶也重輕之分允當矣二別為致詰又分二一詰同意同意即意云何所生識若同意則與意無別無復能所云何是意所生乎二詰異意又二一正破異意異意不同應無所識知性具於意根識既與根別異即當墮於無情故曰應無所識二兩途俱非若無所識云何意生若有所識云何識意言異意無知即與意為非類云何名為意生之識異意有知即為二體兩不相干云何名為生識之意大科正破意生故也別為致詰已竟三雙承結破惟同與異二性無成界云何立根識莫辨其為一為二憑何立識界乎二破因法生又三一外不涉內若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝首句標定此法字猶指內對法塵向下即歷舉外之實法但對前之五根而非意根所攝此科先表外之實體決不入於意根之中二內無自體又三一牒標令觀汝識決定依於法生汝今諦觀法法何狀此中三法字皆指內對法塵也首二句牒標也次二句令觀也何狀者詰其有何自體可得乎二離外無體若離色空動靜通塞合離生滅越此諸相終無所得色空等猶指外塵缺略甜淡惟生滅二字方是法塵以此結後者言離此諸外塵生滅影子欲別有實體超前諸相而獨存不可得也越者超於外也三決托外影生則色空諸法等生滅則色空諸法等滅言生則是色空諸法之影子生離彼諸相決不更有實生之體滅亦如是三躡意結破所因既無因生有識作何形相相狀不有界云何生承上言外之實法既不入於內而內又無自體之實法則法塵畢竟虗妄則師云所因者即法塵也所因之法自無實狀則因之生識復作何狀耶狀不有則界亦亡矣此闕根境合辨之科愚謂意法本自無相非同前五根塵有實性境況分破中又極明其虗無故無復共生之相可破非闕文也四結妄歸真是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性準上會通四科即性常住已竟此科可為理事無礙法界之由致雖不全具彼之諸門但悟此而自可達彼諸門之義故曰由致良以凡夫著於事相而全不見理權教隔乎事理而兩不通融故皆不能入理事無礙法界今經且將事相一一融歸於理即彼十門中全事皆理門也既達諸事即理則衆妙之門自相次而洞開矣非彼由致而何哉三圓彰七大即性周遍人皆知此科理趣深廣必勝前科實多不能較其所以勝舊注謂前近取身後遠取物又云前悟一身後融萬法皆非也良以前四科除六入餘皆如來對機各立一一皆該內外盡萬法如五陰中色攝十一謂五根六塵五根即同見大六塵即前五大而後四陰即識大以此類推處界更顯然該於七大若惟執此較量前後攝法全同曾無優劣何有四科專於內而七大專於外耶前淺後深之故元不係此請申正義當知四科即七大中別相七大即四科上總相法本無殊但四科方談其一一皆是性真而未嘗言其一一皆周法界如指香柴煤炭一一言其是火而未及言一一皆可洞燒林野至後七大方談其一一皆周法界故總名為大如方説出諸火每一星皆有洞燒之極量也蓋前顯法法當體真常後乃顯法法圓融周遍矣豈離前法而別有哉此固淺深之正義也分二科一阿難轉疑雙非又分二一執權疑實阿難白佛言世尊如來常説和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬如來二句舉昔所立一大宗名也蓋佛初立教以和合因緣為宗同條而共貫故統言之益以符前旨趣相關也一切下四句撮略一宗之大義也一切世間謂一者根身即衆生情世間也二者器界即無情器世間也皆各具多種變化四大謂地火水風諸經中但談四大發明猶言出現也夫阿難躡前四科起疑而總陳四大足顯大之為名但是四科總相非有別法不然前未顯排四大今何舉之為疑乎齊此是執星權義云何下疑今教也撥毀曰排斥逐曰擯詞雖似平而意獨疑其排擯因緣如曰排擯自然則無可疑今何並因緣而二俱排擯乎意怪大違自教之宗也斯義即排擯旨趣屬收也歸也言此雙非之旨畢竟為何等教法中所收屬耶二請佛開示惟垂哀愍開示衆生中道了義無戲論法中道則不滯二邊了義則顯明究竟戲論反此謂偏枯不中覆密有餘之説也夫萬法因緣而有生正屬有門戲論權應初心之言而阿難反執之為了義今經剖相出性而斯妙性不滯於有為故非因緣不墮於無為故非自然正中道了義而阿難見其一切排擯反疑為偏空戲論此固常情迷惑顛倒溺有怖空之故習故佛於下文深責之問佛於示見處已將因緣和合等破盡何阿難今又疑之答前約見性而論故阿難但領性體非因緣等而諸法因緣之執如故焉今聞陰入處界悉非因緣和合是以又起斯疑也蓋前疑一性而此疑萬相耳善須辨之二佛與進示圓旨分三一責迷許説二一責迷又二一明應求施教爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦言昔因緣之教但為欣取小乘者説今因汝厭離小乘希冀菩提故説第一義諦是知排擯因緣等正棄戲論而示了義也求菩提者自淫室歸來即求十方如來得成菩提等然求佛果即是厭小乘也二責取捨昏吝如何復將世間戲論妄想因緣而自纏繞汝雖多聞如説藥人真藥現前不能分別如來説為真可憐愍此法喻互有影略蓋阿難本有二失一吝於舊聞而不能頓捨二昏於今教而不能識取今乃於法中獨責吝於舊聞於喻中獨責昏於今教若全二意應云汝方厭權乘而求正覺我正擯戲論而談了義汝即當盡捐因緣之舊聞而欣領超情之了義可也何乃纏繞舊聞而昏疑了義如人説藥實未親採誤執假藥而真藥現前反疑棄之豈不甚可愍哉二許説汝今諦聽吾當為汝分別開示亦令當來修大乘者通達實相初正被當機也亦令下普被未來也大揀於小實揀於權實相者終實教中皆取為體未可偏目無相三如來藏渾然畢具方始相應經自佛與阿難釋迷悶即責其不達實相今七大科中又復標許則知三大科所出藏性即是實相在六根尅體所具妙精明元在四科全相所即妙真如性在七大當體所本如來藏心以至清淨本然周遍法界方是一切法真實之相如是知者即為通達實相矣二阿難佇聽阿難默然承佛聖旨三正與開示分二一總喻性相此中所用即比量中同異二喻同喻者與法相類正明於法也異喻者與法相反反顯於法也今經異喻居先而同喻居後至下分科自見又三一牒取前語阿難如汝所言四大和合發明世間種種變化二異喻別明又二一明非不和合阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色和合與不和合以性相相望而論諸大即相也諸大之性即如來藏心也首二句牒定也不能雜和者言性應不能隨緣成相也是法固反言而喻亦反顯意則正明性能隨緣而成相永異虗空之頑斷故非不和合也問阿難惟執和合佛何並不和合無兼破乎答二計相待若不兼破則破和合之後阿難必又以為非和合矣故佛首破之杜轉計也二明非是和合若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息首句標定也同於變化者言與相同遷也始終與生滅稍不同始終者細相也生滅者大分也故生滅各有始終如生為住始住為生終異為滅始滅為異終始終相成者謂因始有終因終復始也生滅相續者謂生而接至於滅滅而復繼以生也又生滅兼乎無情生死局於有識生死死生者順次而言也生生死死者間隔而論也如云今生之於來生前死之於後死也又或如轉蛻業化則生而復生故曰生生如中陰命終則死而復死故曰死死如旋二句言性無不變之體常隨相遷竟不能復於無始終等也此亦法固反言而喻亦反顯也意則正明相實不能變性不同火輪之不息故非是和合也問今何現成輪轉答月岸不移雲舟見動若果真動豈能悟之而頓息乎異喻別明已竟三同喻總明阿難如水成冰冰還成水上言性相不同彼二物故為異喻此言性相惟同此二相故曰同喻以冰水非二物故言二相正明性相本非二物但有隨緣不變二義而已此緣更用同喻番前異喻故重呼阿難以起之言性雖一味能隨緣而成相既不如虗空之一於不和當如何等乎當如水能成冰蓋水雖一體自能結之成冰無所和合而能現和合之相豈可謂之一定屬於非和合乎相雖萬殊能融而歸性既不如火輪之不息當如何等乎當如冰還成水蓋水雖凝結成冰融之而依然是水但似和合而終無變遷豈可謂之一定屬於和合乎還字當玩足顯不變正因不變故還為水正於還為水處見其非真和合若真和合則變矣如青黃和合即變為緣豈能還為青黃乎總立量云諸大性相是有法非不和合非和合為宗隨緣不變故為因同喻如水冰冰水異喻如虗空火輪此意妙甚宜珍玩之又當知阿難惟問四大之相而佛則雙約性相答之良以權教所談雖依性説相而性是密意不言即性阿難久習其教迷性循相故和非和計展轉不能忘也今佛與之洗前舊見故性相雙舉而仍以性融相蓋必相得性融始可以雙祛二計也且説四科時實即一一與之融相歸性阿難領之未徹故重申而極顯之總喻性相已竟二別詳七大就分為七科一地大又三一標性約析汝觀地性粗為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性首句標性者令其追究根元性體也鄰虗者與空為鄰也至者自粗相七分而析展轉至鄰虗也次三句言此鄰虗者乃析彼極微色邊際相為七分以成此鄰虗之名也極微色邊際相作一句讀之言此極微乃色法之邊際過此將無色相可謂極微矣然取一極微又析七分方成鄰虗則微之又微極之更極者也末二句言更析遂至於空矣二就析詳辨又分二一因析入而定生出阿難若此鄰虗析成虗空當知虗空出生色相此之妄計大似愚者見空華滅於虗空遂計空中出華大抵不達萬相真源出於藏心者未有能出此計者也故西域凡小共計無異與此方太虗凝結成形者皆相似也二總牒起而詳推破又二一初標牒汝今問言由和合故出生世間諸變化相牒定原問欲舉鄰虗而拶成和空之謬令其無遁辭也二詳破又為三一約空無數量破汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗破意全在用幾虗空一句蓋和合須有數量或二或三和合為一故難云用幾云云末二句遮轉救也設救云我言和合但合色相非謂合空以成色相故此遮云不應云云良以諸餘粗色若言是彼細色合成容或可通今此鄰虗向下更無細者唯有虗空故須合空若不合空豈是鄰虗合成鄰虗耶設許合成當有三謬一者合自成自謬蓋唯合他成自而未有合自成自者也二者合一成一謬蓋唯有合多成一者未有合一成一者也三者合細成細謬蓋唯有合細成粗者未有合細成細者也是則若執諸相和合須此鄰虗亦是和合若此鄰虗既是和合須是和空而成蓋令其無遁詞也二約色不成空破此以對待例顯其謬也蓋阿難所執諸相色空各居其半即應皆是和合故此反破空非和合用以例顯色非和合也又二一故難成空之謬又鄰虗塵析入空者用幾色相合成虗空言色之邊際鄰於空既須合空而成色空之邊際鄰於色亦須合色而成空蓋是順彼所執以為難也然空者下有缺當補云當知色相出生虗空却接以末二句讀之後仍有反難救詞當申救云既言析入何又詰其合成而阿難不敢如是難者以析色為空是彼小乘之自教諸相和合是今阿難之自語故今順彼自語違彼自教正以顯彼自語與自教互違乃墮宗九過中之二過也是以佛雖故違縱難而阿難亦不能施辨何以故順析入而非和合則違今自語依和合而違折入則背昔自宗兩處負墮故默然而不敢辨此意妙甚二例明成色之謬若色合時合色非空若空合時合空非色此申正義而例破之也四句不平蓋以上二句例明下二句也如云若知合色不可成空即知合空不可為色矣可見上科但是故難意在此科相例而明矣色不成空破已竟三約空無合義破色猶可析空云何合上句縱下句奪也色猶可析者猶可析而歸空也然猶可亦是權許之辭其實析色但自析色虗空實非析色之成空云何合者言空決無合義也虗空略有四義不可言合一無形礙二無數量三無邊際四無變動據此四義云何可合乎後當番轉申正意云若知空之不可合則知鄰虗非和合而成鄰虗既非和合則地大元非和合而有和合之計豈實義耶是則阿難惟據粗相如來究至細塵良以既執諸相和合須以至細之塵為元始也然細塵與空為鄰必至合空之謬故惟明一空不可合則和合之計自可番轉而破盡矣妙甚妙甚三結顯斥執分二一結顯又分為二科一全體圓融汝元不知如來藏中性色真空性空真色清淨本然周遍法界此科與陰等俱稱如來藏理無不融而義有差別中之一字意味即殊當以喻明如大富長者藏中寶物無限每有宅舍必出藏寶廣列堂閣之間然但千萬分中之一分而已深藏而未發現者實無邊量故上四科如方指堂閣之寶説其皆是藏中之物今此七大如説此但藏中少分而彼未發現者一一充滿但隨時處應用若干即出若干耳只此已發未發較其淺深當立見也汝元不知者意貫下科此科文分五段一源委二相融三離過四元具五匝滿如來一句指其源委也良由不知地大之源委本是如來藏中之物方乃妄謂從空出色謬起和合之計故此一句所以指之也性色二句明相融也權外多計性為空理而不知內有空色相融故此二句所以明之也變地為色有三義一者標本示廣蓋地為諸色之本而所該攝甚廣無情則金木瓦石等有情則毛膚骨肉等皆地也故色所攝法地當十之七八二者義具揀異蓋色有顏色形質堅礙三義而各有滿分少分顏色以黑白可別為滿分形質以當體可捉為滿分堅礙以體不相入為滿分故水於礙義不滿火於質礙俱不滿風於色質全缺而礙亦不滿惟地大三義具滿故易名為色揀異彼三缺而不滿也三者示同諸經蓋凡般若等諸經舉法與空相融者皆色法為首以等八十餘科今實示同彼意故易以色名也性則言其非相亦即理而非事也真則言其非俗亦即體而非用也性色真空者言性具之色即真體之空也性空真色者言性具之空即真體之色也性色真色以性融大之辭真空性空直目性體之意顛倒言之又以總成融即矣此以性真二字無別故影互用之若不影互應有四句如云性色真空真空性色性空真色真色性空字句方全經以義該文簡故影互之問此與般若等尋常所談色即空空即色為同否耶曰實大不同蓋般若等惟據目前所對已發現諸相而言其即空即色等意今此不對目前諸相惟深談如來藏中渾涵未發即色空融一如此也後經所謂先非水火正此意矣故此性色真色非但揀於實等諸色實顯異於事相俗諦中即空之色也性空真空非但揀於斷等諸空實顯異於事相真諦中即色之空也舊以體用真俗理事並言者欠研究耳不知此但全體而大用尚在下科具眼者詳之清淨二字見離過也良以色尚檢於般若即空之色豈墮凡夫之染色空尚檢於般若即色之空豈墮二乘之滯空自來離過絶非二清淨中屬自性清淨也本然二字表元具也如來藏中元有之故物所謂悉天真之本具非緣起之新成此句揀於權教菩薩修成之惑也周遍一句示匝滿也極於無外曰周周即匝也貫於無內曰遍遍即滿也前雖以寶藏為喻非世間之寶藏可比良以世間寶藏若衆寶具全決不能一一匝滿若一寶匝滿決不能種種具全此則二義皆不為礙故每舉一大即周匝遍滿於法界而互不相礙也法界者法有軌持二義界有性分二義軌即隨緣持即不變性即體空分即成事總則統於一真別則開等多種今此法界合一真則無容別議望多種則正周遍於理法界冥周遍於一切法界耳以一切離一真悉不可得矣由是冥中總統之故方能隨應循發無不足也二大用無限隨衆生心應所知量此約其本具妙用能隨能應不與循業相同舊於此二句仍連循業發現通為一氣及詳下諸大實從隨心應量處斷之因得其分屬之本意請詳下解衆生攝盡九界有情心以根性言有勝有劣量以心知言有大有小若但以劣心小量致之則所以應之以粗少之色者固無不副其心而無不滿其量也若能以勝心大量致之則所以應之以廣妙之色者亦無不副其心而無不滿其量也世出世間有為無為亦復如是通上科論之則上科是性是體是真是理此科是相是用是俗是事故知上之色空早露相用等釋者非也且既從性起相便知全相即性體用等亦復如是所以説地大即藏中之性也又當知陰等四科皆先剖破相妄然後結顯性真故以破相之義猶半同於空宗今此七大乃窮自性海淵涵流出諸法故純標性真杳無虗妄字面誠法性宗之獨談非惟逈超般若而亦不異於前文也結顯一科已竟二斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義此方約迷位及悟人因位而言先問云體既本然周遍而用又隨心應量則稱體作用無不自在何必循業乎答正由無始未悟久迷本有以致全不自在豈惟迷位必循染業而後能發縱是悟人亦須循淨業而後能現是故此之四字雙具兩種不自在意一者世出世間一切淨妙之色若不循彼種種淨業雖欲發現不可得也二者三塗四惡一切苦穢之色若不戒彼種種染業雖欲不發現不可得也蓋不戒即是循也故此四字非但只表不循業則不得發現兼表循業則不得不發現而二俱無自由分矣然此四字正是致下二惑之由故分屬下文良以業之起也似有由藉故世間淺智衆生執此生起之近由而遂惑為因緣性曾不達圓融不變之體周遍法界何所藉於因緣業之成也似難改移故世間無智衆生執此難改之現量而遂惑為自然性曾不達無限隨緣之用隨心應量何得泥於自然是皆為一循業之所惑耳向使只隨心應量而不必循業則衆生皆應達唯心之旨而不至種種惑矣問悟人既須循業佛循業否答佛在因位循之却即菩薩因滿果發之後但惟隨心尚無量之可應何有業之可循惟除示現無實業也故知稱體作用無不自在惟佛能之問現見菩薩作用自在何言惟佛能之答菩薩修行未畢正由循業所發故今非揀其不能作用自在但揀其非是不循業耳然惟圓實菩薩所循大自在業所發十玄妙色與果人敵體相似焉問何為大自在業答應即華嚴十玄妙觀及本經耳門三昧是也又所應之知即解悟也所循之業即修行也若惟務修行而不求圓解則三祇六度終無實果正以知自局而量自有限也若但專務多聞而不策圓修則恆沙妙理秪益戲論正以業不循而果終不發也以此而知圓解圓修不可不相應矣識心即六識也辨析不混曰分別詳細較量曰計度即遍計執也但徒也徒有言説即情有也都無實義者即理無也此則和合即兼於因緣中不和合即兼於自然中矣又解但凡也凡有言説者推類廣指之詞如和合及諸重疊是非之計皆在其中二釋俱通夫不知體用及惑執二計阿難與世間義應互該影略而已此全科意後皆準之地大已竟二火大分三一標性約求阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火無我者溫陵所謂火無體寓物成形是也故執火者須憑柴等離柴等則無當體可捉也𭬥李曰陽燧者崔豹古今注云以銅為之如鏡之狀照物則影倒向日則火出淮南子曰陽燧火方諸也論衡曰於五月丙午日銷鍊五方石圓如鏡中央窪豫亦曾見映日光影注處即燒然水晶珠注燒全同也二就求詳辨分四一舉例阿難名和合者如我與汝一千二百五十比丘今為一衆衆雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓此舉和合之例亦異喻也意顯下火大不同此例也此之破法蓋約分開之相以破和合之計蓋必有分開之相以為和合之本然後方同和合故舉一衆和合而分開各有氏族以為定例至下開合二科而火無生處足顯和合之計為妄矣婆羅門此云淨裔溫陵曰優樓頻螺此云木爪林迦葉波此云大龜氏瞿曇此云日種後代改姓釋迦耳二牒定阿難若此火性因和合有三標徵彼手執鏡於日求火此火為從鐘中而出為從艾出為於日來彼手下標也此火下徵也四逐破分二一開破例審又分二一開破又三一破從日生阿難若日來者自然燒汝手中之艾來處林木皆應受焚自能二句猶是牒定之辭來處二句方是破意言燒林何異燒艾也二破從鏡生若鏡中出自能於鏡出然于艾鏡何不鎔紆汝手執尚無熱相云何融泮自能二句亦牒也鏡何一句破也紆屈也紆汝三句證也三破從艾生若生於艾何藉日鏡光明相接然後火生二例審汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此例審者比例而審其所從來也鏡因三句取例也火從二句審之也此審有二意一者且破和合蓋上科三處無生已顯不同舍利弗等各有氏族所生而此之例審又言況彼三物各有從來而此火何所從來既無從來其何以為和合之本乎足見其非和合性也二者更索源委意謂彼三各有來處而此火何獨無所從來乎欲人審其來源也開破例審一科已竟二合破直審又二一合破日鏡相遠非和非合上言無從生之處但顯無和合之本此則正明無和合之實也言凡謂之和合者須同一處交雜安有懸遠相隔而為和合者哉缺艾語略耳艾亦同鏡與日遠也二直審不應人光無從自有此之直審與前例審不同彼云從何歷此者疑問令人審識之辭此云不應無從者決定斷其有本之謂也一疑一決所以不同文雖寄于合破科中而意仍雙承上文云開之既無從生之處合之又無和合之相此火豈無所從來而自有乎躍然而未説破到下文文説破也又開合所分四科以次酷似不他生不自生不共生不無因生文雖似而旨各別彼因人執萬法有生故詳破生相顯其無生而已此因昧法真源而妄謂出於和合故隨破隨審令其悟真本源也就求詳辨已竟三結顯斥執又二一結顯又分二一全體圓融汝猶不知如來藏中性火真空性空真火清淨本然周遍法界準上二大用無限又二一正明大用隨衆生心應所知量準上二驗其無限阿難當知世人一處執鏡一處火生遍法界執滿世間起起遍世間寧有方所蓋就上求火之事以推開徵驗可見隨心應量無有限極也此取凡夫現境尚無限極聖人分上愈可知矣結顯已竟二斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義準上火大已竟三水大分三一標性約求阿難水性不定流息無恆如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻樂是諸師等於白月晝手執方諸承月中水流息如雨露之有無川源之溢竭水性大槩如此迦毗羅此云青色斫迦羅此云鴛鴦鉢頭摩訶薩多未詳溫陵曰四皆外道善幻術者也其曰求太陰精及承月中水者順諸師計從月出也十五夜為望望前為白月望後為黑月月當正午光皎如晝故稱為晝方諸陰燧水精珠也孤山引高誘注淮南子乃云大蛤拭熱向月則水生也而經文明白言珠況珠亦蛤出以珠取水應亦拭熱矣二就求詳辨又為二一徵起此水為復從珠中出空中自有為從月來二逐破又分為二一開破例審又二一開破又三一破從月生阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降經臨也即照臨之謂也遠方者言珠比所經林木尚為隔遠又如月當正南則自珠以南之林木皆是所經近處或珠在平地則高阜以上之林木皆是所經近處此是以遠證近之必流也下四句則是流與不流皆不當理矣二破從珠生若從珠出則此珠中常應流水何待中宵承白月晝三破從空生若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行二例審汝更諦觀有從天陟珠因手持承珠水盤本人敷設水從何方流注於此除空添盤者以空無從來不可取例盤無與水人不疑生故兩科互為去取也開破例審已竟二合破直審又分二一合破月珠相遠非和非合二直審不應水精無從自有準上可知就求詳辨已竟三結顯斥執分二一結顯又二一全體圓融汝尚不知如來藏中性水真空性空真水清淨本然周遍法界義皆準上二大用無限又二一正明大用隨衆生心應所知量二驗其無限一處執珠一處水出遍法界執滿法界生生滿世間寧有方所二斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義準上水大已竟四風大分三一標性約拂阿難風性無體動靜不常汝常整衣入於大衆僧伽梨角動及傍人則有微風拂彼人面風之動靜不常人所易見當不止於垂衣拂衣但約衣發辨而已僧伽黎此云大衣二就拂詳辨又二一徵起此風為復出袈裟角發於虗空生彼人面袈裟此云壞色若從義而翻則離塵出世等種種多譯茲不繁引二逐破又二一開破例審又二一開破又為三一破從衣生阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今説法會中垂衣汝看我衣風何所在不應衣中有藏風地汝乃三句言衣即風風性不住故應離體我今六句令傍觀察審也二破從空生若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出此有三破仍含多義汝衣二句不應藉緣破也言既云空生即當自生何假衣動為緣乎空性六句體性相異破也言空以常住為體性風以生滅為體性故首二句以風從空則應同常次二句以空從風則應同滅今皆不然可見體性畢竟異矣末二句申滅空之謬以足空之無滅而已若有四句名實相乖破也言義須與名相應名須與體相當今約無情則生滅乃有形質之義虗空乃無形質之名故曰若有生滅則非虗空見名義不相應也又虗空表以無物為體風出則是有物非虗故曰名為虗空云何風出見名體不相當也三破從面生若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂自汝整衣云何倒拂者何得只待汝整衣之時而又倒拂於彼不拂於汝也蓋出於彼面而又拂彼面故曰倒拂也二例審汝審諦觀整衣在法面屬彼人虗空寂然不參流動風自誰方鼓動來此虗空二句非取從來之例却即是風空性隔之意亦現前可別之相不宜泥也二合破直審又二一合破風空性隔非和非合此只就風與空性體乖隔而説非和非合與前二大稍異良以風從空生人所常執故多破空生如此方言虗能生風其見一也佛語隨宜無定耳二直審不應風性無從自有準上就拂詳辨已竟三結顯斥執又分二一結顯又為二一全體圓融汝宛不知如來藏中性風真空性空真風清淨本然周遍法界二大用無限又曲分為二科一正明大用隨衆生心應所知量二驗其無限阿難如汝一人微動服衣有微風出遍法界拂滿國土生周遍世間寧有方所二斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義準上風大已竟五空大分四一標性約鑿阿難空性無形因色顯發如室羅城去河遙處諸剎剎種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少首二句言其自無形表對色方顯唯識謂之空一顯色不必局於鑿土方顯溫陵曰西天貴賤族分四姓如此方四民剎帝利王族也婆羅門淨志也亦云淨行以守道居正潔白其操也毗舍商賈也首陀農夫也是為四姓頗羅墮利根也旃陀羅魁膾也此又智愚之族也名義集云旃陀羅此云屠者屠殺人畜者也西天淫殺同賤殺者猶目為惡人國法令其搖鈴執幟警人異路不與良民同行故亦翻嚴幟也二就鑿詳辨又二一徵起此空為當因土所出因鑿所有無因自生二逐破又二一開破列審又二一開破又曲分三一依無因破阿難若復此空無因自生未鑿土前何不無礙惟見大地逈無通達逈遠貌謂極目而視也言未鑿無空明因鑿有何成無因耶二依出土破又為二一破有出入若因土出則土出時應見空入若土先出無空入者云何虗空因土而出既未鑿之先原不見空則必謂出土而後成空故此即約出土而難也意謂既言空因土出而後有須土先出而空後入如開池引水者可也故曰則土出時應見空入然土出可見空入何相故曰若土云云言既無空入之相則計因土出而有空者妄情而已也二破無出入若無出入則應空土元無異因無異則同則土出時空何不出防轉記也仍承上難必言土自出入空何出入故即約空無出入以難也意謂既言空無出入則土未出時應即有空而空土一體不分故曰則應空土元無異因也一體遂成同出之謬故難曰無異云云三依鑿以破又為二一破因鑿以出若因鑿出則鑿出空應非出土意謂既言空獨因鑿不因出土即應惟以鑿空何必鑿土故曰則鑿出空應非出土二破不因鑿出不因鑿出鑿自出土云何見空意謂若言空非因鑿與鑿無干鑿應惟出於土應不見空今何隨鑿隨見虗空開破已竟二列審汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出疊言審諦令極詳察也隨方運轉選地施功也土因地移者土從地中移出也無因非是實法故不取例從來二合破直審又二一合破鑿空虗實不相為用非和非合意言鑿須鑿實空乃是虗前風空言其性乖此鑿空謂其用皆背不成和合相生之義矣二直審不應虗空無從自出準上就鑿詳辨已竟三合會警悟吳興曰四大後所以點空均名五大者蓋諸經常談惟四而已此既異彼故特言之下根識中其例亦爾此解全得此科之來意也又二一融性合會若此虗空性圓周遍本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅融性謂融結空性合會謂會同四大首三句結空之性也若此二字承上破審説下圓周遍三字重一圓字良以尋常論空亦言周遍然有色法礙處即不圓滿是言周遍而非圓周遍也今言空性圓滿色不為礙故曰圓周遍矣此句結其即是性真也不動搖同後無生滅蓋周遍表其非此有而彼無此無而彼有圓滿意也不動表其非先無而後有今有而後無常住意也此句結其離諸妄相也以上結定空大向下方是合四成五之意中三句先以合會其名現前即指目前所對已發現之法説其皆藏性逈與結顯處別矣均名五大語會五大名同實乃新許空為大也末三句後以會合其體也性真圓融即前性圓周遍本無生滅即前本不動搖但上是單結空大此是合同五大皆如來藏一句文總五大意通上下上通性真圓融下通本無生滅總與申其源委然記但是以四例空又當知非但此一新得大名雖彼四者舊稱為大亦惟據其處處皆有言之而實相礙互闕非真大也自今融以藏性圓融常住方為真大是則雖非新得大名而實逈非舊比也如迦葉等舊雖久稱聲聞羅漢必經法華開顯方乃即真矣二警令發悟阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入上科方以空大會同四大是欲將四大例明空大此科舉四大令其因空反觀却是欲將空大發明四大也昏者情識常暗迷者動惑於邪也由昏故迷相因而致然前執四大諸相皆和合即其事也然既暗惑於邪必背馳於正故即不悟四大元如來藏非和非合亦非不和合也下却教其觀空大以審其有出有入乎及無出入乎意蓋令其若悟虗空周遍不動非出非入非不出入即悟四大圓融常住非和非合非不和合矣經文明皆雙遣二邊舊注皆墮一邊所以不敢取也四結顯斥執又二一結顯又二一全體圓融汝全不知如來藏中性覺真空性空真覺清淨本然周遍法界性覺真空二句比前變其文而復顛倒其意也以前俱用本大與空相融此則本大即是空字若準前相融則合兩句皆云性空真空文不可別也今將前指性之空換為覺字即改寂為照義無傷也則此中空字乃是虗空之空字若照前不顛倒合云性空真覺性覺真空今文上下交換然亦無礙但令人覺其文耳二大用無限又分二一正明大用隨衆生心應所知量二驗其無限阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所三斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義義皆準上空大已竟六見大即根大也總攝六根但舉眼根以為例耳然但取根中之性非取浮塵故惟言見等而不言眼等意可見也分為四一標性約塵阿難見覺無知因色空有如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此中全約見之與塵為同異等以破和合之妄執然其別名塵相二三開合不定應先總釋不過色空明暗之四互為隱顯耳如總言色空是合明暗以對空只言明暗是開色攝空也若言明暗空是開色以對空如言見空是空攝色而對見也至文再指庶不惑矣見覺者猶言見性也無知者離塵無別所知因色空有釋成上句也以雙離明暗無復見之自相故言因色空有此即合明暗以對空矣方以標定向下歷舉目前現塵也朝明夕昏晝之明暗也白月黑月夜之明暗也等即等於空耳因見分析者因此塵而見得分析也方表見托塵立不可言塵因見分析以此單破見之和合非破塵也此中乃是開色攝空二就塵詳辨又二一徵起此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異擕李曰此問四句一同二異三或同或異四非同非異但經文分兩同兩異各成一句斯解與下破處相合此中亦開色對空也二逐破又分二一開破例審又二一開破又四一破同牒中開色對空破中開色攝空又三一牒起徵詞阿難此見若復與明與暗及與虗空元一體者二約塵顯謬又曲分為二科一標定相亡則明與暗二體相亡暗時無明明時無暗此是先將外塵互相凌奪之相標定也前半總明後半別明也二正以顯謬若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗言既與暗一體則明時暗亡見安得而不亡哉於明亦然末二句言隨暗而滅云何復見於明隨明亦然其謬當自顯矣三結成非同若明暗殊見無生滅一云何成此躡上意而結成也言明暗任殊而見體恆在自然顯其非是一體以上皆開色攝空也破同已竟二破異此科牒中開色攝空破中開色對空又三一牒起徵辭若此見精與暗與明非一體者二顯不離塵又二一離塵令觀汝離明暗及與虗空分析見元作何形相二離塵無體離明離暗及離虗空是見元同龜毛兔角直斷之也此亦設言離而顯其無自體也三結成非異明暗虗空三事俱異從何立見俱異之異訓作離字讀之蓋言三者俱離則此見元無自體故曰從何立見也破異已竟三破或同或異明暗相背云何或同離三元無云何或異悉是上義但撮合一處耳上二句開色攝空也下二句開色對空也四破非同非異分空分見本無邊畔云何非同見暗見明性非遷改云何非異分空二句以空攝色而對見也見暗二句言塵殊見一顯然不同故曰云何非異此却開色攝空也二例審汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地知是見精因何所出汝更三句壘言以教其著眼之意初云細審次細不徒細而加以微細審不徒審而加以詳審次諦觀已是切察而又審於諦審於觀也此亦開色對空而加通壅盡其詳也二合破直審又二一合破見覺空頑非和非合蓋以性體異而言其不成和合也此亦以空攝色而對乎見也二直審不應見精無從自出準上就塵詳辨已竟三合會警悟又二一融性合會若見聞知性圓周遍本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅科意準上此總該六根覺兼鼻舌身而不言者略也性圓二句亦同上科向下不動與動搖皆就相言空之相即不動四相猶動合會以性俱不動矣餘準上二警令發悟阿難汝性沉淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異沉淪者溺於權見無超拔之智也此不悟與當觀叫應如前然其中法則不同上不悟者四大而當觀者空大也此則不悟者見大而當觀者亦見大也生滅就自體言同異對外塵言意令若悟見等非生滅同異亦非不生滅同異則知見等藏性圓常非和合亦非不和合更深悟也合會警悟已竟四結顯斥執又二一結顯又二一全體圓融汝曾不知如來藏中性見覺明覺精明見清淨本然周遍法界性見覺明者言性中之見即覺上之明也覺精明見者言真覺之精即性明之見也性見明見猶言性色真色以性融大之辭覺明覺精猶言真空性空直目性體之意合而言之不過性見相即而已此如來藏中未發真體不可以覺明為無明清淨亦稍不同當云全見而覺非凡夫根結之見全覺而見非二乘冥寂之覺故曰清淨也本然同前二大用無限又二一正明大用隨衆生心應所知量二總類六根又二一類全體如一見根見周法界聽嗅嘗觸覺觸覺知妙德瑩然遍周法界見周法界者牒前見之遍周法界也溫陵曰嘗觸即舌根以味合方覺故亦名觸覺觸覺知身意二根也妙德者言見聞等即妙性之德用瑩然者靈明不昧也即略上覺明覺精之意遍周法界言皆同見之全體圓融也二類大用圓滿十虗寧有方所言發為大用隨心應量圓滿云云十虗作十法界亦可如見聞等隨量大小極盡其量即滿十虗若約起成根身或成一根身乃至普現無量根身皆其隨心應量之大用二斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義義並準上問此既惟取根中之性則前已開顯其全為性體今何勞復融之而為大乎答約此經別意則開悟證入皆依六根故前特開顯為性之全體約諸經通意則惟如來藏方為性之總相故今仍以六根融入如來藏也又諸教有定相總別有圓融不定約定相則如來藏恆為總相而萬法皆其別相也約圓旨則萬法實皆可互為總別故前依圓旨取別為總見精遂成全性總相而萬法皆其別相今依定相則如來藏依舊是總而見與六大依舊是別然雖總別不定仍知二意無乖良以前之開顯今之融入俱有初後二相前之初相自根中荐出及其後相則會萬法為一體而根身器界皆是其中幻影當即是此中如來藏也今之初相亦自目前明暗辨起與前根中薦出無異及其後相則合會結顯性真圓融周遍法界當亦與前開顯中之後相無有異也但此中七大皆許同是圓融又是依圓旨之萬法互含也而彼中見性獨許冠於萬法又是本經之別旨宗要也故前欲其巧於悟修而此欲其圓於見解矣具眼者辨之見大已竟七識大名為四科一標約根塵又二一標舉三法阿難識性無源因于六種根塵妄出汝今遍觀此會聖衆用目循歷標雖全標三法意但約根塵以辨識而已識性觀下但因六種根塵是惟約於前六而所以無七八者以八即前之根大而七亦即是意根故也性字猶言體相非謂真性無源者狀如野燒起滅無從也因根塵者假托而起也此以上標定也汝今下舉約現前眼識因根塵而妄起者以例餘五皆然觀即根也聖衆即塵也循歷即識也二揀別根識揀雖對塵而混濫之意殊不關塵良以識塵體性自別而根識自來難分故特與揀別之又分二一揀明根相其目周視但如鏡中無別分析萬象對照一念不生正是根相二揀明識相汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗此即眼識仍兼隨眼家明了意識然眼識名隨念分別但對性境初起一念不帶名言隨眼意識名計度分別亦對性境起第二念計執名字如標文殊等是也然此自眼家以例餘四皆然至於意家離前五識獨頭自緣獨影塵境亦在例中二就根塵辨又分為二一徵起此識了知為生於見為生於相為生虗空為無所因突然而出問虗空尚可屬塵無因似非就根塵辨答云須約不依根等方成無因故亦是就根塵辨二逐破又二一開破例審又分為二一開破又曲分為四一破因根生阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識見即根也此言去塵無根則根已先無自體憑何者以發識哉二破因塵生若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發相即塵也此言除根無塵則塵已無自相何能發識不從一句除根也既不二句猶是牒上除根之意明暗二句方是轉成無塵之過明暗色空相即互用彼相二句結成其非也三破因空生又二一牒徵開義若生於空非相非見上句牒徵辭也下句開成二義也二分合例破又曲分為二一分二破非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立非見三句同上去根無塵非相三句同上除塵無根二合二破處此二非空則同無有非同物縱發汝識欲何分別溫陵曰處此非相非見之間識體若空則同龜毛識體若有非同物象既自無體安能有用耶四破無因生若無所因突然而出何不日中別識明月言日中無月分別明月之識既不得起然則識豈無因生乎但經是反詰之辭開破已竟二例審汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出見託二句根塵也可狀二句色空也言此四者各不相混詳察此識從何出乎開破例審已竟二合破直審又二一合破識動見澄非和非合聞聽覺知亦復如是溫陵曰識有分別名動見無分別名澄識動見澄性相隔異見與識隔聞知亦然皆非和合也二直審不應識緣無從自出準上就根塵辨竟三合會警悟又二一融性合會若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅本無所從者不從根塵諸緣所出也了別見聞覺知者管見謂會前根大是也準前二大當知下俱無本大而舊謂別指六識既異前文而又缺根大何成七數乎管見非之當矣性非從所亦不屬諸緣之意也餘並準上二警令發悟阿難汝心粗浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有粗浮者乏於精切之深慧而惑於著相之淺談不字雙貫悟字與發明二字了知即是覺知譯之誤耳或了知屬意識而缺一覺字非誤則略智者詳之依後説則覺兼三識並影略也例上科惟指本大六識而言同異對根塵言空有就自體言餘準上三結顯斥執又二科一結顯又二一全體圓融汝元不知如來藏中性識明知覺明真識妙覺湛然遍周法界性識明知者性真之識即妙明之知覺明真識者本覺之明即性真之識也性識真識以性融大之辭也明知覺明直目性體之意也總是性識融即之意清淨本然變為妙覺湛然者良以根塵雖相倚立在象猶是歷然至於識之為相自來常若空華故上諸大皆言清淨本然者承上性大相融雙言其皆離過而本具也至於識大既先元無體相又經融入覺性故周遍舍吐皆惟約覺性言之是以直稱妙覺即性體而不必又言其清淨湛然即性明而不必又言其元具矣遍周法界者蓋覺性如鏡識但如影知影即鏡體則惟約鏡之遍周而説影之遍周矣或約圓極境界則亦直説念包十方三世然是頓説有宗無因若徵其因仍用前説如云何以故識無自相即覺性故而鏡影即其同喻也二大用無限含吐十虗寧有方所此無隨心應量者有二意一者衆生自知前文諸大因衆生以根為稟定塵為外物俱無自在之分故佛乃説與隨心應量顯其亦是惟心自在之法至於識心則衆生自來皆知其是隨我自在之法故不必又言其隨心應量也二者即是自法謂心即識心量即識量不復自隨自應如眼不見眼也含吐十虗亦約覺性轉顯然有含有吐相亦不同如云運想則含不想則吐也若依圓極照前科説結顯已竟二斥執循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義諸識各由種子方起種子須由宿業故須循業勝如上二界無種不起前五劣如水母缺種不起眼家根識餘並準上問此經首先正破識心如七處曲搜三迷決了名義皆妄畢竟無體乃至顯見文中又復旁兼相形而破未嘗少假寬容何後於十八界即已許為如來藏心妙真如性至此愈稱其周遍法界含吐十虗是即性之全體而同彼開顯見性之極量何前乃妄之至而後則真之極乎答前約初心悟修須從方便決擇真妄捨生死根本取涅槃妙心則識須破盡決定不用後約圓解普融無法不真無法不如乃至剎塵念劫無非一真法界何況識心不融法界懸示中雙具二門此意詳盡宜研味之又當知前之四科方一一鎔歸於理未言俱周法界故惟是理事無礙之由致今七大總攝上陰等諸事而言其一一俱周法界所以為事事無礙之由致也蓋彼觀取事如理融為十門總因良以惟事則彼此相礙惟理則無復可融今由一一事皆如理融悉無邊際方有此事事無礙玄門是雖尅體而論似方與事如理門符契無二其實由此總因則相入相在等衆妙之門無不洞開矣問若爾三法界由致無不具在何又言且談一真答三法界同以攝事歸理而為由致此對阿難之妄執而一一會妄以歸真正惟攝事歸理融相入性而已尚未及於從性起相從理成事是則三藏之中正惟屬於空如來藏而有人強以三觀三諦判之者欠研審也智者思之如來破妄顯真一大科已竟二阿難悟謝發心分二科一承示開悟此皆經家所敘也又二一敘承示爾時阿難及諸大衆蒙佛如來微妙開示通承破妄顯真科中諸文為言良以此大開解功夫非近今當總前撮其大要令知微妙之實破妄心有三一七破以密示無處二重徵以顯呵非心三縱奪以決其無體是所以破妄心者可謂極微細而盡精妙矣顯真心文中亦三一示見等而剋就根性以指其實體二示陰等廣融諸相以明其一體三示地等而極顯圓融以彰其全體是所以顯真心者亦可謂極微細而盡精妙矣且指根性融諸相時兼以對顯依正萬相之妄而相妄性真之旨纖悉昭徹矣故經家總以結述於此以彰下開悟之大本耳二敘開悟夫奢摩他微密觀照雖應圓照三如來藏此由阿難初悟一真心體是方顯其照徹空如來藏矣然而理智圓融境無偏僻是即惟妙覺明圓照理法界矣分二一悟周遍又二一總標身心蕩然得無罣礙身謂法身心謂真心蕩然周遍貌下文分科詳釋無罣礙者妄身妄心不復繫罣隔礙也蓋法身真心本自現成而無始恆為妄身妄心繫罣隔礙曾不知覺了無自在今於言下開通故得大自在得大受用矣二詳敘又二一心蕩然又曲分為二一標能遍意是諸大衆各各自知心遍十方衆則位兼深淺知則悟兼證解譬如有衆處暗境中本自空廓曠蕩以暗無所見誤執狹隘此之位深而證知者或色陰已盡十方洞開如暗忽得光明親見空廓也位淺而解知者或色陰未盡隨言發大勝解如暗中聞人説境本量頓覺虗豁無邊不復作狹隘之想也遍十方者極盡十方之量也作十法界亦可二徹悟依報又二一轉大為小見十方空如觀手中所持葉物虗空是依報最大者更是器界所依故并屬依報手中葉物即貝葉也緣彼方以貝葉書字故手中常持之見空如葉者以虗空無大不容而真心更大百千萬倍不可為喻由心觀空故空小如葉耳此科多領七大即心遍周法界之旨而成此悟也二轉他為自一切世間諸所有物皆即菩提妙明元心首二句即器界萬法俱屬依報菩提指本覺果體前文所謂此見及緣元是菩提妙淨明體是也妙明元即如來藏心蓋凡小觀物非心權教謂物為妄今悟全物皆心純真無妄也此科多領上陰等四科皆即藏性而成此悟矣至此則斥破妄心之旨方以極領更不認緣塵分別以為心更不惑為色身之內更不迷己為物而是見非見及四大和合諸疑渙然冰釋也心蕩然已竟二身蕩然又分二一標能包義心精遍圓含裹十方身以含裹為相四大和合含裹五臟是為肉身心精遍圓含裹十方是為法身故佛祖凡言不離身中及身是道場等語皆謂法身非謂肉身行人悟此法身本來元具則行住坐臥身常無邊而無量剎海皆悉轉入身中蓋世人尋常皆謂空裹界界裹身身裹心重重拘縛曾無超越今忽心裹十方身包空外內外轉換大小變更真所謂妙能轉物常住此身者方可承當咳唾掉背無非祖意四卷文云身含十方無盡虗空故知此為法身況與下文生身相形而言又且不重上文二徹悟正報又二一轉粗為細反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡所生肉身乃屬正報此因領上法身虗豁曠蕩包越虗空之外故見肉身渺小而更浮假如此蓋相形而見也十方虗空喻能形之法身微塵喻所形之肉身若存若亡狀其渺漠將淪於盡蓋平日粗重者於此至輕細而不足為纍也二轉實為虗如湛巨海流一浮漚起滅無從湛明不動巨表無邊起滅無從者起無從來滅無從去也蓋平日堅實者於此至浮虗而不覺其有也此二科多領前不失科中色身外洎山河乃至咸是真心中物及不分科中并所想相如虗空華本無所有等意而成此悟也至此則身境客塵之旨方以領極更不認五蘊四大以為身更不惑為我所不執為實有矣悟周遍已竟二悟常住了然自知獲本妙心常住不滅此科與上科義齊而文為甚短者以周遍全是常住之因涅槃亦以遍為常義良以遍法界既皆即心則萬劫此法界萬劫此心豈復有滅乎故不勞多文而一語結定矣了然自知者指掌分明不由他悟也説雖憑佛悟由自己亦親見實到自信自肯之意本妙心者本來面目恆遍一切但惟迷不自知非今新得也常無始終住無去來無始終去來故永不滅矣此亦領上不滅不失不還及非因非緣清淨本然等意而成此悟矣經家於佛説之後偈讚之前特詳敘此者正以示奢摩他祕奧觀體令行人於此著眼蓋通前三卷功夫全為揭露此至妙至密之觀體也良以衆生常輪回權乘不究竟皆緣未見此體猶如生育故也行人若能於斯所敘心境一如不犯思惟物物頭頭了然在目渾是妙心自體亦不費纖毫功力身心本來廓周沙界但不馳散如是積之歲月而不心開者未之有也當知本惟一體若語正因本性即空如來藏以一味真如更無餘物故若略兼了因即奢摩他祕密觀照以親見自心非作意思惟故若更不避彌天過犯則西來直指正法眼藏即此而已但彼直入無分別此由方便分別至此無分別處其歸一也問此似意盡無餘然奢摩他未竟後二藏未談彼是何意答微密觀照此方了其密字以體屬隱奧故也後乃兼用盡其精細始屬微字宜斟分之承示開悟已竟二讚謝發心分為二一禮謝標偈禮佛合掌得未曾有於如來前説偈讚佛得未曾有言從來未得此等妙悟而今始得之除圓教菩薩元具圓解者其餘凡小權教皆得未曾有也又圓教初心或增深解或成新證者亦然二正陳偈詞又二一讚謝妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身此下方是阿難之言初二句讚也標偈中惟標讚佛以法即佛德故不雙標而解中仍分佛法首句讚佛也孤山曰妙湛讚真諦般若德也總持讚俗諦解脫德不動讚中諦法身德也又即三而一故曰妙湛即一而三故曰總持非三非一故曰不動尊者十號之一由證此三號世中尊惟應讚佛三德加三諦助明而已中諦即第一義諦仍當補即一即三方完又此因感前開示而讚故讚意應與開示相關良以前所示者生佛等具故因己悟而方見佛德也初於剋就根性中十番正示二見番顯悟得澄清覺海朗耀性天浩然無際即佛般若德也本此故以妙湛讚之次於會通四科中萬相融攝總別發揮悟得諸相皆性萬物一心森然畢具即佛解脫德也本此故以總持讚之後於圓彰七大中合會大性均顯遍周悟得根根塵塵俱滿法界悉無起滅各不往來居然交徹即佛法身德也本此故以不動讚之三一交互及尊字如前然三德是所證尊即能證之人次四字讚法佛前云有三摩提名大佛頂首楞嚴王是也其實方與究竟堅固相應王乃尊統諸法之稱也世希有三字雙嘆佛法皆難遭也緣此娑婆界佛出世固難正使出于世説是法復難俱如優曇華暫時一現耳末二句謝也上句謝破妄顛倒想者謂我法二執分別也如執緣塵分別以為心相計五蘊四大以為身相迷心為在色身之內認物為己迷己為物身心萬法謂為各自有體性相四大悉疑和合因緣等皆是億劫之所惑者今實併銷之矣下句謝顯真僧祇者如孤山所引婆沙論明三阿僧祇劫修六度行百劫種相好因然後獲五分法身乃至如唯識云地前歷一僧祇初地至七地滿二僧祇八地至等覺是三僧祇然後獲究竟法身今云不歷以教旨大殊故但辨明教旨自無可疑舊注不辨教旨橫生疑惑以致紛然無定今與決之然舊之所以致惑者有二因緣一者執婆沙唯識權教不了之義二者礙下除惑願成及方證二果之文今請以圓頓教旨明之二惑自解良以此經多分終實接入圓頓按頓教之旨未悟之先法身本自現成一念回光便同本得所謂但離妄緣即如如佛尚不復論證與不證成與不成豈同權漸之教必歷僧祇而後獲乎若執乎彼而不信乎此是由執走者之遲而不信飛者之速也何膠柱之深哉若更按圓教之旨則行布不礙圓融故雖未及斷惑究竟不妨全獲法身全體即佛如前開示迷心於色身之中者既名為性顛倒至後開悟見心於太虗之外者豈不號為正遍知哉正遍知即成正覺而獲法身矣然則執現果而不許阿難獲法身者失旨之甚也又圓融不礙行布故雖全獲法身不妨更除細惑更歷諸果更成究竟寶王也此經後云理則頓悟乘悟併消事非頓除因次第盡可為明證矣如是則雖却後更歷僧祇以成究竟佛果當亦與此不歷之前先獲法身了不相礙也何況圓頓悟後之修念念是佛雖進斷通惑亦與權漸修者日劫相倍至於住後斷別惑以去一生有圓曠劫之果者矣如是則雖謂其却後更不歷乎僧祇亦無礙也若更取於延促同時之玄旨愈不可以長短拘矣問若此則阿難與善財龍女同乎答不盡同也良以圓人雖不因果條然而亦有初心究竟之別論初心則無不同望究竟則惑有淺深根有利鈍龍女惑盡故彈指功圓善財利根故一生事辦是初心與究竟頓齊也今此會中如二人者應亦非少但約阿難所示一類當機多是中根而又具惑者也且惟同彼二人發心而舊證初果居然未移下之願成寶王希登上覺方求齊彼二人之究竟耳然諸聖惟重初心故此現獲法身意非淺淺經云發心究竟二不別如是二心先心難則可見矣至於證悟解悟均獲本有法身殊不係此而為差別矣二發心又二一正發大心又二一總期報恩願今得果成寶王還度如是恆沙衆將此深心奉塵剎是則名為報佛恩正以前獲法身方是初心故今於悟後方發洪願以取究竟也首二句大端是自利以上求佛界利他以下度衆生溫陵以首句為智心次句為悲心下四字雙運二心而束為深心無可議者而孤山以首句為佛道誓成次句為衆生誓度字面顯然而攝餘二誓似為顛倒今當以首句攝煩惱誓斷蓋必斷盡煩惱方究竟佛道也以次句攝法門誓學蓋必備達法門方廣度衆生也願今二字雙貫下成佛度生觀今字便有求其不久即成不待僧祇之意得果者得究竟菩提也寶王亦同儒書稱位為大寶也還度者言不止惟願成佛更還願度衆生非謂待成後度也奉塵剎雙含侍佛度生偏屬似非莫若以莊嚴佛土釋之頗切塵剎二意仍不失也報佛恩者蓋雙運二種深心以莊嚴一切佛土為報佛微妙開示之恩也二別求證除又分二一於度生求證伏請世尊為證明五濁惡世誓先入如一衆生未成佛終不於此取泥洹請證明者求以威神加被令其終不違於本願也五濁謂劫濁見濁煩惱濁衆生濁命濁與此經後所説者不同意獨指於娑婆一類若穢界中百歲以後濁惡世時諸惡熾盛剛強難化者也先入有二意一對剎蓋塵剎雖期俱入而必先五濁者慈救急於苦難之深者亦如周文必先寡此悲愍心也二對人蓋五濁人所怯入故願勇於先入倡先率衆此勇猛心也泥洹此云滅度涅槃別名如則師所引二種皆應兼之一不取二乘獨得泥洹二不取諸佛泥洹即如地藏所謂衆生度盡方證菩提此廣大心也此欲度盡衆生隱然須兼法門誓學也二於成佛求除大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場能破衆生惑之堅體曰大雄能拔衆生惑之深根曰大力究竟以與衆生二嚴之樂曰大慈究竟以拔衆生二死之苦曰大悲希求也審詳也微細惑方該塵沙及根本無明別惑如下答滿慈者是也若約阿難一類所求思惑亦應該之八卷結經畢阿難得證斷除三界修心六品微細煩惱敘謝乃稱如來善開衆生微細沉惑斯為明證也然此希除者求佛以大雄大力加之破其體而拔其根也早字與今字同登無上覺者求佛以大悲加之盡二死而究竟法身坐道場者求佛以大慈加之滿二嚴而現座説法方是果後度生矣此觀求除細惑顯然兼乎煩惱誓斷也正發大心竟二結以深誓舜若多性可銷亡爍迦羅心無動轉溫陵曰舜若多此云空爍迦羅此云堅固謂空性無體尚可銷亡我心堅固終無動轉動轉即退轉也總承前上求下化而深誓其心即虗空有盡我願無窮也從入正宗至此説法當為一周名破妄顯真周初銷倒想説空如來藏一大科已竟
