body:
  text: 京都西湖沙門交光真鑑述三顯見不滅此示常義分三一會眾領悟更請又二一敘述眾悟又曲分三一得悟安樂爾時阿難及諸大眾聞佛示誨身心泰然泰然者從佛呵為非心即起驚疑及聞離塵斷滅轉更不安所以然者正以離識心外更不見心今蒙根中指出宛然別有寂然不動驚疑頓息所以安樂二悔前迷執念無始來失却本心妄認緣塵分別影事見不動心方顯識為塵影故悔迷真逐妄三以喻狀喜今日開悟如失乳兒忽遇慈母背真執妄如兒背母慧命懸危如失乳將死今見本心如忽遇慈母慧命復續如食乳而生二通別兩請又二一會眾通請合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性首句謝前請後心即指前見性小乘雖知身是無常但一向迷見為眼同身壞滅今雖乍領即是不動之心然迷混之久實無智辯以自發明此見如何不與色身同滅故求佛發明之二匿王別請此以別除斷見乃是旁兼故科別請然以王發起者有二意一以就王之老相易示變遷二以顯身之無常至貴不免問佛指根性正意元為改權宗生滅之因以立成佛真因地心何暇且破凡夫最淺斷滅之見答權小鈍滯固可矜憐凡外迷淪猶宜哀救況喪本受輪禍孽莫甚於斷見佛慈平等故因此處可以警悟乃兼與除之非正為也此方名教多言人死靈隨氣散無復存者是為大惑請沉玩於斯焉分為四科一教前邪惑時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃迦旃延此云剪髮毗羅胝此云不作外道六師之二說道不同皆以斷見為主涅槃多義而猶以不生滅為要義得涅槃者一性恒常遠離生滅今反以身死性即斷滅為涅槃真邪說也蓋匿王未聞佛教先受此惑矣二教後仍疑我雖值佛今猶狐疑狐乃疑獸過水聽氷必多反覆人有疑者似之此亦示同故云爾也三願聞不滅云何發揮證知此心不生滅地此心即指見性求佛顯示此性果不生滅則宿疑無不決了四明眾心同今此大眾諸有漏者咸皆願聞據除斷見麤惑則此有漏似惟指於界內凡夫二乘有學若辨見性真常則雖小乘四果別教三賢亦須普指以彼自來未明見性是真常心故二如來徵顯不滅分三一顯身有變又二一略彰變滅又曲分三一徵定必滅佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅其意可知二徵定滅由分為三一怪問預知佛言大王汝未曾滅云何知滅二略舉變相世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞三明知必滅殞亡不息決知此身當從滅盡因今遷謝而不住知終必滅而後已何待死而後知滅哉只此數語已即可以警念無常劇貪世務者寧不惕然三印許其言佛言如是印其所說不謬略彰雙滅已竟二詳敘變滅分三一令較量老少又二一故問令敘大王汝今生齡已從衰老顏貌何如童子之時前言總略未盡精詳今故舉老少之懸殊者令其相較激引之而欲其詳敘也二甚言不同世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頹齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時佛問老少王加長成三時發明以顯不同耄者只表老而昏忘不必局定歲數下枯悴釋衰昏昧釋耄髮白面皺又顯然可驗其不久者也老年者安可恬不知懼二令詳敘變狀又二一如來引問佛言大王汝之形容應不頓朽二匿王具答分二一不覺漸至王言世尊變化密移我誠不覺寒暑遷流漸至於此密移不覺莊生亦喻夜壑負舟彼謂造化密移豈知行陰所遷二徵釋推知又二一麤推且限十年何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十于今六十又過于二觀五十時宛然強壯任運不覺作意推度始得知之此科時寬人雖可覺然亦豈知二十三十比前童年已為衰老是則少者當亦可以警無常矣二細推乃至剎那世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧惟一紀二紀實惟年變豈惟年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住此科推至極促之時方是凡夫麤心所不覺者尚書殂謂魂升於天落謂魄歸於地乃死之別名今經但以壯色日去為殂老相日遷為落紀者十二年也牒前寬數變其文耳自年以至剎那方是密移之不覺者也剎那至短攝在念間教中謂一念具九十剎那以利刃透九十紙為一念凖分剎那三乃總結必滅故知我身終從變滅此雖如來令其詳敘肉身念念遷謝之相將欲顯後見性全無遷謝然亦可以為觀身無常之厭然權小厭之取灰斷果求變易身乃其舊見今令依圓人見解不離根中頓領常性而已顯身有變已竟二指見無變分四科一徵定不知佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知滅中不滅正王所昧使其早知何由惑於斷見二許以指示佛言我今示汝不生滅性三引敘觀河大王汝年幾時見恒河水王言我生三歲慈母携我謁耆婆天經過此流爾時即知是恒河水耆婆此云長命謁此天神求長命也四詳彰不變又二一先彰所見不變所見即恒河中水欲因所見之水不異引顯能見之性不變耳又分為三一躡前變滅佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變二令較所見則汝三歲見此河時至年十三其水云何三直答不變王言如三歲時宛然無異乃至于今年六十二亦無有異先彰所見不變已竟二次彰能見不變能見即根中見性因所顯能易於開悟耳分三一躡前身變佛言汝今自傷髮白面皺其面必定皺於童年二令較能見則汝今時觀此恒河與昔童時觀河之見有童耄不三直答不變王言不也世尊問約老而聰明不衰者可說不變然多有老眼昏暗者則何通之答自是眼暗非關見性若但論眼則固有少而昏盲者何待老來且前指見科中已有盲人矚暗之喻彼許全見黑暗亦無損於見體豈止昏華乎當知此中但是就匿王不病之眼以驗見性不變而已非說肉眼能不變也豈可故取病眼為難乎指見不變一科已竟三正申二性以前通請中願聞生滅與不生滅二發明性如來已引觀河驗定至此乃申二性以結歸前之所請也又分二一詳與區分又二一因皺以分變與不變佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變二因變以分滅與不滅變者受滅彼不變者元無生滅云何於中受汝生死匿王既因身之衰變而預知身之必滅何不因見之不變而預知此見死後必不滅乎可以深發省悟矣於中者即於身中也受生死者與身同受生滅也言既不與身同變必不與身同滅矣往往宗家謂不離身中即有不滅性體正謂根中見聞等性非謂方寸之中臟腑之內別有性命即同阿難初執身內識心二責留斷見而猶引彼末伽黎等都言此身死後全滅末伽黎此云不見道等者等前請中二人皆一類斷見外道故佛責與王請互舉之如來徵顯不滅一科已竟三王等極為喜慶王聞是言信知身後捨生趣生與諸大眾踊躍歡喜得未曾有王本為除凡夫斷見之惑示同就問故此即惟就王結彼一類懷斷見者方喜其有趣生之性而已非普結會眾同有是喜也以捨生趣生正四相中人相權小喜此是損非益也問權小豈無喜乎曰必喜離識心外別有此本常之性自此而修大定成菩提端有望矣曰經家何故只就王結曰王是旁兼之問意中惟就此機會決了斷見而已斷見既除其意已盡何不結了問為何不結會眾之喜曰此有二意一者小悟之喜不必重結謂逐節開悟之喜此科之首已敘身心泰然等若使再結還同前語何用重繁二者大悟之喜須待後結以心未大開餘疑未盡阿難等方欲種種興問何暇結喜直待三卷末方結云各各自知心徧十方乃至獲本妙心常住不滅禮佛合掌得未曾有始是普會之喜也顯見不滅已竟四顯見不失此若據其科名亦足前常字之義蓋上科約未來說如云盡未來際究竟不滅此科約過去說如云從無始來本有不遺既惟約於竪窮其屬常字無疑若據文中發明體周萬法量極虗空亦可以當如來後示周圓之義又前文求示寂常心性上二科已答寂常二字此科廣大周圓誠為心性全體是答心性二字三釋俱通宜細詳之分二一阿難因悟反疑前語阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢上惟舉見此復兼聞足顯佛言隨便其實四性六精俱攝見性之中矣必不生滅是起疑之端在上科中文云彼不變者元無生滅是也遺失真性顛倒行事正是所疑却在不動科中是彼全文因後疑前非是疑佛自語相違但問佛既云不滅以何因緣前說遺失故佛下示但因顛倒而說遺失非因斷滅而說遺失也可見非真遣失故通章全示顛倒不失之相諸註但明顛倒全忘不失不知何以銷阿難之疑請詳今解當自辯其得失二如來發明因倒說失此中舊註差錯若不預以辯明非惟經之本旨終不顯彰即今正解反似差錯矣註云順垂為正逆竪為倒此言非是且與後結合處語相乖反蓋為錯會首尾相換四字故致差誤至此不知首尾相換正明不失非說顛倒良以臂之正倒元無一定阿難與佛俱惟順於世間但取臂之雖倒不失人所易明心之雖倒不失人所難曉以易例難而已請觀今解分二一即臂倒無失為喻又三一定臂之倒相即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間眾生以此為倒而我不知誰正誰倒母陀羅手此云印手相好也不知誰正誰倒者正以臂無一定倒正故但順於世間說此下垂為倒二定臂之正相佛告阿難若世間人以此為倒即世間人將何為正阿難言如來竪臂兜羅綿手上指於空則名為正佛意亦以臂無一定正倒既世人以此為倒即依之為倒遂問世人以何為正亦將依之以為正也但欲取喻不失而已非辯正倒之是非也三明顛倒非失佛即竪臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視即竪臂者即依上指為正也若此顛倒首尾相換者此二句正明顛倒無失蓋佛上竪時已順世間成正却言若將此臂顛倒下垂但是將上竪之首換為下垂之尾而已豈將此臂真遺失哉末二句一者同也倍者多也如言心之顛倒不失世人固所難知臂之顛倒不失乃世人同見而無差異多見而非一人蓋言明白易見宜當就喻發悟也且與下合喻全無乖反矣二以心倒無失合喻分四一據名略以合定則知汝身與諸如來清淨法身比類發明如來之身名正徧知汝等之身號性顛倒清淨法身者即相即性即有即空現前三十二相即是法身非比相宗最後佛身有為無漏非比空宗破相為妄報化非真此之性宗山河全露萬相皆如說報化與法身異體者當墮地獄比類發明者即令依臂悟身心也達心包萬法為正知達萬法皆心為徧知如來達此名正徧知身如臂上指非新得也執色身包心為倒知執心外有法為倒見凡小執此號性顛倒身如臂下垂非真失也此但略合詳合更在下文二徵顯身無正倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒于時阿難與諸大眾瞪瞢瞻佛目睛不瞬不知身心顛倒所在此雖示身無倒相亦見阿難等不明顛倒實義意謂凡物名相多不相離故令循名而覓相如以黑為名者若對白物必歷然有黑相可見與白者逈別今汝身既以顛倒為名對我正徧之身亦當歷然有顛倒之相與我正徧者逈別而後可也今隨汝觀顛倒果何在乎由是眾等竟不得其倒正之相然所以不得者斯名有三義甚深不同諸名一者不在當體義蓋名雖在身而義乃從心故也二者非可相見義但可義求非如有形之物可以相取也三者更不在心義以顛倒但眾生執迷之見而心實不依之以真成顛倒故知此顛倒也在心尚不可得在身豈可得見乎下文方具示令以義求矣三詳示正倒從心分三一標如來慈悲告眾佛興慈悲哀愍阿難及諸大眾發海潮音徧告同會愍其顛倒尚不知其所在何由而有發悟之期應不失時名海潮音以其瞪瞢瞻望適當可教之時也二引昔教以明正相此科正合喻臂之上竪分三一示為尋常之教諸善男子我常說言佛所說法皆到一切智地而眾生隨類各解如一切唯心造凡小解為業造權教解為識造圓頓直了真心變現今約深義重明昔教也二萬法惟心所現色心諸緣及心所使諸所緣法惟心所現色即十一色法心即八識心法諸緣即生心之四緣生色之二緣心所使即五十一心所法諸所緣法廣至善惡邪正世出世間一切事業因果法門等惟心者惟眾生本具一真法界之心亦即如來藏心乃變現萬法之實體故曰惟心所現此科重一現字見萬法即心也問前謂見性是黎耶體即如來藏心又即萬法實體似為能現今色心之心既該八識則黎耶已為所現而惟心之心當另有純真之心何得仍取如來藏心以釋之答前七等但為所現真心但為能現而此黎耶能所俱進以對真心降為所現以對萬法升為能現蓋與真心本無二體但惟帶妄而已故今斯文任說真心亦惟屬於示見不失以眾生現量離此無別可指經中偏是此義待至下科當極明之三萬法常在心中汝身汝心皆是妙明真精妙心中所現物身即五根心即八識及諸心所其餘俱攝皆字之中不屬空有曰妙遠離晦昧曰明萬法實體曰真精具此諸義曰妙心中所現物者言妙心如海而萬法如海中之影心包無外而萬法皆在心中此科重一中字見心包萬法也合上科萬法即心此科心包萬法即是心之正相恒不昧此即正徧知身仍當補云如我竪手等無有異豈別有所得耶此意必有但文略耳引昔教以明正相竟三責遺認以明倒相遺謂遺真認謂認妄責其但因遺真認妄遂成顛倒耳足知是迷顛倒非心顛倒也又分三一怪責遺真認妄云何汝等遺失本妙圓妙明心寶明妙性認悟中迷前問意何因緣故說為遺失此科即其因緣也蓋是遺真認妄全不覺知雖未遺失義同遺失矣本妙二字另說言其不假修成本來空有不覊自在解脫之意下圓妙明心寶明妙性二句相對圓乃通融流動用之相也寶乃清淨堅實體之相也故依環師解心之與性體用互稱心則從妙起明圓融照了如鏡之光性則即明而妙凝然湛寂如鏡之體此解甚好心性單言各兼體用心性對舉體用暫分因文立意而已非一定也此正責其遺真末句責其認妄悟即上二科萬法即心心包法外迷則敵體相番謂法皆心外心墮法中認悟中迷者謂見雖迷執顛倒而真心與萬法實不曾依之果成顛倒如人迷東為西方實不轉乃是於不顛倒中而妄計顛倒故曰認悟中迷二詳彰認遺之相上科但是標下此科全以釋成分二一法說又二一彰認妄之相又曲分為四一誤認器界晦昧為空空晦暗中結暗為色此科即誤認山河諸法心外實有正番萬法即心然此科及下科圓師之註甚好今全取之晦昧為空者迷性明故而成無明由此無明變成頑空即下經云迷妄有虗空也空晦暗中結暗為色者所變頑空與能變無明二法和合變起四大為山河依報外色即想澄成國土也二誤認根身色雜妄想想相為身此科即妄認五蘊四大為自身相也圓師云以四大色雜妄想心變起眾生正報內色想謂妄心相謂妄色色心和合五陰備矣即知覺乃眾生也三誤認心性聚緣內搖趣外奔逸昏擾擾相以為心性此科即妄認緣塵分別為自心相聚緣者環師以圓覺妄有緣氣於中積聚釋之最是但愚意與圭峯所解不同夫緣氣者即精神魂魄等潛住五臟者乃我執習氣之所妄成於中者於身中也積聚者結為命根繫於生死耳蓋我執雖徹底虗無而積劫堅執妄理相應保之則生斷之則死所謂從畢竟無成畢竟有矣內搖者如云有動乎中必搖其精現見勞慮太過者五臟隨病此眾生所以多不信身中本無性命也趣外奔逸者逐境緣慮也此二句雖總言妄識而聚緣二字連持命根似為第八功能內搖外奔騰躍妄想似為前六業用昏擾擾相者聚緣迷執故昏內搖外奔故擾誤認此昏擾者以為靈用而妄稱心性問前謂見性是八識實體今復以聚緣為八識功能得失何分哉答此識真妄和合故見性取其一分真理聚緣取其一分妄情凡言八識去後來先等者皆以妄情言耳後倣此四遂成顛倒一迷為心決定惑為色身之內上二科尚是顛倒之由此科方成大顛倒矣蓋心反轉入身中萬法俱包心外正番心包萬法所以為顛倒也嗚呼自非佛了義之教誰不計其性命在於身中萬法但為心外者乎然命在身中道教計之特甚法居心外小乘在教猶然正徧知覺亦甚深哉二彰遺真之相不知色身外洎山河虗空大地咸是妙明真心中物心在身中但惟顛倒之見妄執而已豈無邊大心果依其妄見而轉入於身哉正同迷東為西而東實不西也故身及虗空依舊在於心中而大心依舊包於法外但迷時不覺知耳斯則不知二字便是顛倒豈有實體可得哉法說已竟二喻說分二一喻遺真認妄譬如澄清百千大海棄之惟認一浮漚體遺失包虗空大地之心而不認如棄百千大海但認蕞爾身中有我之心如認一漚二喻以妄為真目為全潮窮盡瀛渤展轉倒執乃謂身中方寸之心能包虗空大地如說一漚全包大海問此何異於一毛孔中包盡剎海答彼達諸法性全法界故一毛稱性即包無餘如說真摩尼珠價直一國誠不虗矣此不達諸法實相但將昏擾妄想謬計身中而又倒執能包虗空大地是尚無體可得憑何廣包如說水泡價直一國真大迷妄安可同乎詳彰認遺之相竟三深責迷倒之甚汝等即是迷中倍人遺大心而認浮想如棄海認漚已為迷矣又復執浮想為大心如說漚為海更是加一倍迷矣故曰迷中倍人詳示正倒從心已竟四結合前喻無失如我垂手等無差別如來說為可憐愍者此方攝上認妄遺真之倒執而結歸前喻但同下垂之臂而已豈真有所遺失哉法喻方不乖反向使上竪為倒當云如我竪手何得云垂手乎詳之如來說為可愍者如云使其真己遺失似猶不足深憫今本無遺失而常如遺失似懷珠困窮故親友矜嘆而切責也此中雙明雖顛倒而不失雖不失而顛倒知前義則不孤本有知後義則不廢修行亦性修不礙之旨也前阿難聞呵非心驚謂捨此更無將同土木如來安慰許以真心有體而已非正開示真心也譬如許人以物後日方以與之長水彼處即謂開示真心以許為與何有實惠哉故此不失科中正倒二相方是開示真心之正文而阿難到此方知於緣塵外更有如此廣大心體而如來所許果爾非虗請與前之許辭對觀甚有味矣可見通釋佛經能詳語脉為妙不可潦草錯會然此科似顯心一周而下六番搜其餘疑而已顯見不失已竟五顯見無還自上科觀之佛之開示可謂盡心吐露矣特阿難未能極領種種疑之故有下文諸科向使於見性略有破意是助其疑矣更肯領之乎破妄見之言足知其非是也此科還者去也科名獨標去意而文中具有來意顯無去來耳按阿難前求兼足寂常二義分四一阿難求決取捨又四一述聞法雖悟本心阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地悲救者救其顛倒受淪也深誨者誨其極領正徧知也感佛深慈故至垂泣矣觀雖之一字便是尚有所疑而未能極領之意也末二句述前三科包括虗空曰圓周徧萬法曰滿此即述上不失科意常即不滅住即不動更述上之二科耳二明不捨悟法緣心而我悟佛現說法音現心緣心𠃔所瞻仰此述承教悟道而全歸功於聽法緣慮之心也阿難多聞重法之人於此一種緣法領悟之心更所難捨意云別種緣心或可捨擲今我悟佛所說法時現用緣心承聽領納方倚用之豈可遽捨乎三明未敢認取本心徒獲此心未敢認為本元心地此心即指上所說妙明心體也正因不捨悟法緣心故言徒獲圓滿常住真心反不敢認為本元心地以認此須當捨彼今既不忍捨彼緣心故亦不敢認取於此又若捨此緣法之心却後將何承領佛法縱不惜此緣心而獨不重於佛法乎此與下文云何得知是我真性一類反疑真心之意舊將此心指於緣心殊無意味良以彼尚堅執不捨何又不敢認乎四願如來與決取捨願佛哀愍宣示圓音拔我疑根歸無上道圓音有三不可思議一者殊方異類皆同本音二者大小淺深隨解皆益三者有緣隔遠皆同目前疑根者緣心真心兩持不決根心難拔故求佛拔之無上道即阿耨菩提如人惑於岐路導師指之方可決一而歸二如來破顯二心破謂破緣心顯謂顯見性也分二一破緣心有還又分三一先破所緣之法即現說法音也不捨緣心深故既全為於重法故須破法非真而緣心自捨矣分三一法說佛告阿難汝等尚以緣心聽法此法亦緣非得法性緣心之緣攀緣也法緣之緣塵緣也以法音即聲塵攝故亦非真若落紙墨更是色塵末句正出非真之故法性者真理也圓師云教詮真理理是眾生之心故知妙明心地方是真理豈可即執聲教為真理哉二喻說又分二一因法觀心喻如人以手指月示人彼人因指當應看月上人字喻說法者下二人字喻聽法者指喻於法月喻聽法者之自心標指示月喻說法顯心因指當應看月喻聞教自合觀心耳二執法忘心喻又為二一正舉執忘若復觀指以為月體喻但惟執佛聲教不解反觀自心者也二雙出二過就分二一併法俱失過此人豈惟亡失月輪亦亡其指何以故以所標指為明月故合法當云此人豈惟不達自心亦復不知教意何以故以他聲教為己自心自他不分安知教意耶二兼迷法相過豈惟亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故合法當云此人豈惟不知教意兼亦不了教心體相何以故教以聲塵為體以自無覺照為相心以靈知為體以本有覺照為相斯人即以無照之塵為有照之心有照無照二不別故對詳法喻歷歷可見三結定汝亦如是言汝之迷心迷教及迷教心體相亦如亡月亡指及亡明暗者無以異也先破所緣之法已竟二正破能緣之心揀前先破方拔不捨緣心之根柢非正破緣心故也分三一正破緣聲之心揀後緣色等俱為兼帶以但因不捨緣佛聲教之心而起破也又二一縱言離聲當有若以分別我說法音為汝心者此心自應離分別音有分別性分別法音乃取能分別者為己真心即不捨緣心也此心下縱之令離聲塵更覓分別之自性耳二喻明離聲無性又分二一舉喻又二一正以客喻譬如有客寄宿旅亭暫止便去終不常住前佛但以客喻身境予謂兼喻緣身境之心此佛以客正喻緣心二反以主顯而掌亭人都無所去名為亭主此雖但以反顯緣心非主而實即以見性為主人也二法合又二一先合主喻此亦如是若真汝心則無所去言當如亭主也二後合客喻云何離聲無分別性離聲無性者言何但如客之暫止便去耶正破緣聲之心已竟二兼破緣色之心斯則豈惟聲分別心分別我容離諸色相無分別性聲分別心者聲上分別心也離色無性與離聲無性一例可知三廣至緣法之心如是乃至分別都無非色非空拘舍離等昧為冥諦離諸法緣無分別性如是乃至者例上聲色二塵中間超過香味觸并法處所攝半分生塵留彼半分滅塵結為冥諦耳分別都無者前之五塵及法處生塵皆不行分別所謂內守幽閑也非色非空者如八定後三所緣即離前四所緣一切色等故非色復離空無邊處所緣無邊虗空故非空蓋自識無邊處乃至非非想處所緣皆是此境即法處滅塵耳拘舍離華言未詳即末伽黎連此三字方成一名乃其母名亦連母為名之例也昧者不達而妄立也冥者冥然莫辨諦者妄稱真實耳蓋外道立二十五諦首號冥諦彼謂冥初生覺是萬法之元始尊為極則之理今非色非空正齊此見矣末二句諸字助語與前離諸色相一樣意謂縱使心之分別都無亦但離於麤分別耳微細流注固所未覺縱使境之色空都盡亦但離於麤境耳滅塵影事固不能離若離諸法塵之緣即無分別之性與上之離聲色而無性者一類無別也正破能緣之心已竟三結指此心有還則汝心性各有所還云何為主總承上六處緣心各隨本塵而生亦隨本塵而滅如影隨人元隨何人而來者亦即還隱何人而去故云有還云何為主者言但是暫止便去之客何以為無去無來常住之主人乎破緣心有還一科已竟二顯本心無還此中專顯真心無去無來常住為主大異緣慮客心暫止便去所以令阿難決定捨客而取主人翁矣分二一阿難求示無還阿難言若我心性各有所還則如來說妙明元心云何無還惟垂哀愍為我宣說二如來詳與顯示又分為四一指喻見精切真佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影且汝見我見精明元者言汝見我之時即此能見之體靈明之用出自本元也此乃稱舉其名下方喻其切真矣雖非妙精明者微露帶妄之意也以此心既為六精之一而又在處明了不昧固已現具精明之體特以二種顛倒見妄未除故言雖非妙精明也蓋表其已具精明而但欠於妙耳然觀雖之一字亦暫以抑之而喻中隨即揚其切真如第二月非是月影者蓋月有三相第一是天上淨月第二是人以手揑目望月遂成二輪取其揑出者為第二月第三是水中月影意以第一月喻純真之心第二月喻見精明元第三月喻緣塵分別今言見精如第二月者明其雖非即真而實與真心非有異體但帶無明除之即真亦如二月非與真月有虗實之差懸遠之隔但多一揑放之即淨矣非是月影者明其非同緣塵之心但是前塵之影乃如水中月其與真月上下懸隔虗實不倫矣意欲令人決定捨於第三月而決定認取第二月則第一月不遠即在矣問何不即指純真之心而乃用此曲示費此申明乎答前言待下科而極明者正此處也蓋究竟離妄純真之心惟佛乃具等覺尚帶生相無明何況地前諸位乃至五住凡夫現前何有純真之心然而真雖不純體終不變如金在鑛離鑛無金特鑛有真偽非金師莫能辨識耳故佛直指根性為心如指鑛說金金即在鑛非離鑛外而別有金也此處秪因其無明未剖尚有歡於妙之一字故佛略抑揚之意在表其切真耳非如緣塵呵其非心無體也諸註於此發妄太過如輕加緣塵之名將濫同於三月強索有還之處似公抗於佛言縱有理據殊妨領悟徒引人之猶豫不敢直認見性為心其失非小不知眾生現量離此根中之性別無可指故諸祖指示率多取於六根門頭者奉佛密旨也行人時中但請認取此性萬無一失譬如收買金鑛者時下雖非精金真金終不外鑛而得使其棄鑛求金非惟并金亦棄將必惑於鍮石而真金終不可見矣豈不大可惜哉二許示無還之旨汝應諦聽今當示汝無所還地即見精明元無還也三備彰八相皆還舊將八還辯見對前七處徵心予前已辯七徵固是潦草之言而又獨以此八還為辨見仍以對前七徵尤為孟浪之語前後十番皆示見性而獨指八還餘皆辯於何法乎且前七處乃七大科豈與此一科為對耶今總改之云七處破心十番顯見則非惟法數相稱而心妄見真之旨亦攸分矣又復分為三科一具列八相阿難此大講堂洞開東方日輪升天則有明耀中夜黑月雲霧晦瞑則復昏暗戶牖之隙則復見通墻宇之間則復觀壅分別之處則復見緣頑虗之中徧是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨此八種俱是色塵俱是眼家所對之境俱各有體有相如日輪是體明耀是相夜晦是體昏暗是相乃至戶牖墻宇分別空性昏塵澄霽俱是體通壅緣虗淨俱是相此八塵作四對意各取其相之相反為對也謂明暗乃至淨相反惟空虗塵體相顛倒下文還處自見分別即前塵分別指種種諸物而言如松棘鵠烏雜在之處也緣指種種異相而言如直曲白玄差異之相也下頑虗則是全無諸物之處徧是空性者逈然惟見一空相而已蓋緣是異色空是同色同異相反生成對偶且經後文虗空為同世界為異即其證矣舊註乃以分別作分別之心則下緣字與上何別而又如何見之且下虗空與何為對蓋八種俱取塵相有還對顯見性不與塵而俱還離塵別有全性所以異前大科中緣心與塵俱還離塵無性也何必此中又加分別之心乎字同意別善須辯之二各還本因又二一許還本因阿難汝咸看此諸變化相吾今各還本所因處諸變化相即上八種相本所因處即上八種體二徵起詳釋又分為二一釋成一相云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日是故還日者如云隨日輪而俱來者亦與日輪而俱去也二以類俱成暗還黑月通還戶牖壅還墻宇緣還分別頑虗還空𡋯還塵清明還霽此中觀虗之還空之還塵足驗前之體相顛倒其餘例日可知各還本因已竟三更明該盡則諸世間一切所有不出斯類亦惟取於眼家所對色相而已備彰八相皆還已竟四獨顯見性無還汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別見亦言八種者由前列八相時一一相中皆須對於見性若無見性憑誰取相乎故見亦隨相而言八種矣當欲誰還者言見性於此八相之中畢竟與何相而俱還乎此方難問下乃徵釋明其實無還也蓋與一相俱還者諸相復將何見今諸相任遷一一皆見足知八塵於見性之中自相往來自相凌奪而此見體朗然常住不動不遷豈同前來緣塵之心與塵俱還乎如來破顯二心已竟三承前判決取捨諸可還者自然非汝不汝還者非汝而誰諸可還者總述前聲色等六種緣心皆與塵而俱還者也自然非汝者言其既皆屬塵自不屬汝決定汝當棄捨而不須執悋矣不汝還者總述後八種見精不與塵而俱還者也非汝而誰者言既不屬塵自屬汝之本心決定汝當認取而不可猶豫矣四結嘆自迷淪溺則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍心即見性本字總貫妙淨明之三字是本有現具不從修得之意不為諸塵所遷而緣心不能超勝曰本妙不為諸塵所蔽而緣心不能障礙曰本明不為諸塵所染而緣心不能疑混曰本淨迷悶者執悋緣心也喪本者反疑棄於本妙明淨也受輪漂溺皆其自取所以可愍也顯見無還已竟六顯見不雜此一大科舊註似全不知問處何疑答處何釋總成錯解故不勝其辯正但請詳究今解當自覺是非顯然不難辯矣又分為二科一阿難以物見混雜疑自性阿難言我雖識此見性無還云何得知是我真性此疑蓋謂承佛上示雖知此見不與諸相俱還而實常與水陸空行等物混雜無分今於諸物之中將辯何者是我見性何者是物相乎言其不可分析也由此問意詳下答意自然應合分明只重我字不重真字故吳興之解非是二如來以物見分明顯自性分四一先列能所欲與揀擇分析先須列下能見之性與所見之物然後乃可於中擇而分之也就分為二一列能見之性又分為二一聖眾見又曲分三一聲聞見佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中菴摩羅果阿難方證初果故云未得無漏天眼亦未遠見故仗佛神力方見初禪按初禪但能見一四天下耳阿那律此云無滅昔因其施供受福不滅是佛從弟晝眠被訶精進失目遂證四果得天眼見大千如觀掌果今云閻浮提豈反劣於初果恐是娑婆界三字而筆受者誤也且四見從狹向寬其序可詳菴摩羅此云難分別桃柰相疑生熟難分此方所無也二菩薩見諸菩薩等見百千界一大千為界菩薩所見累至百千其實地上更多雖亦至廣總皆有限三如來見十方如來窮盡微塵清淨國土無所不矚窮盡則無限量數如微塵則不可數佛眼所觀淨穢皆同清淨聖眾見已竟二凡品見眾生洞視不過分寸不過分寸有二意一者對勝說劣意自諸聖極於如來較至眾生縱窮其量亦不過分寸而已二收盡含生意上既齊於如來下必齊於蜎蝡故廣至窮盡國士狹至不過分寸也蓋言見量雖殊均為能見之性而已列能見之性已竟二列所見之物阿難且吾與汝觀四天王所住宮殿中間徧覽水陸空行雖有昏明種種形像無非前塵分別留礙此則獨約阿難所親見者欲其自審擇也四天王即居須彌四面東持國南增長西廣目北多聞住山腰而齊日月四萬二千由旬之高曰水曰陸曰空行舉此三處即上自四天下至大地一切物相所在之處前塵者目前諸塵遇住不過曰留障隔不通曰礙謂留礙於視耳先列能所已竟二就中揀擇又二一先令自擇汝應於此分別自他於此者即於能見所見之中也自即見性他即諸物先令自擇者欲其隨教自審庶得真知耳二次與代擇今吾將汝擇於見中誰是我體誰為物相代擇者知其自不能分令其假佛智辯轉得分明耳將汝者將阿難之見也擇於見中者擇於佛之見中也體即見體也就中揀擇竟三物見分明又四一正言物不是見阿難極汝見源從日月宮是物非汝至七金山周徧諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝極盡也見源即眼根也如云盡汝眼力也日月宮最上物相也七金山等居中物相也須彌外七重圍之一持雙二持軸三擔木四善見五馬耳六象鼻七魚嘴皆以純金為體此中光明最多故言種種也漸漸下最下物相也雲騰鳥飛自金山視之亦居最下汝字對物即見性也三番言物非汝故此科是正言物不是見也二正言見不是物阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性上科徧言物皆非見此科仍於諸物之中擇出見性顯然非物故此科是正言見不是物也然分擇之法亦惟約於有無差殊而揀別耳蓋諸物羅列於見性之中者千態萬狀是有差殊見性徧見於諸物之上者朗然一照是無差殊然此無差殊之體何甞混雜於有差殊之物相乎故結言誠汝見性而不是物也三反辯見不是物上二科已將物象見性分析明白自此科與下科乃反其辭而辯之以番顯前二科令其增明而已此科番顯前見不是物之科承上意云物有殊而見無殊足知見不是物矣由是即番轉云若見是物則汝云云其語意自見矣舊因此意不明以致管見疑其不接別有闕文真以訛傳訛也又二一辯定非物分二一先用轉難破其可見又三一是物必成可見若見是物則汝亦可見吾之見此科番上科云若我無殊之見性見於差別物時此見即是彼物則見性當成可見故汝亦可見吾之見何以故見既是物當成差別之相豈不歷然可見乎理實不然亦暫縱以顯其謬耳二可見必依同見若同見者名為見吾文因難省故此二句別為一科意云見吾之見實無迹之可憑若取於彼我同見物時即彼同見之物遂謂見吾之見耶三難其當見不見吾不見時何不見吾不見之處言吾觀物實無一定有時縱目取相則見物有時收視離相則不見汝若當吾見物之時依彼同見之物謬言見吾之見若當吾收視離相不見物時何不并吾不見之體亦見之而指其所在耶意明不見之時既不能見同見之時亦豈真能見哉不過謬執而已先用轉難破其可見已竟二躡開兩途俱證非物躡上不見之處而開或見或不見之兩途俱反證於見性之非物耳此科本旨極為簡妙而文稍隱略從古註家展轉支離釋之本意越晦如五重結歸存三隱二枉費工巧悉皆非是請詳今解當或失笑就此分為二科一以可見證成若見不見自然非彼不見之相若見不見者言汝若執言我已見汝不見之處矣自然者不待費力也彼不見之相即差別諸物也蓋正當不見之時是性是我不見之體諸物是彼不見之相自然非彼不見之相者言我見既已離物汝又見我自體此則不消費力辯之我見自然非彼不見之物相矣何以故已離物而又另見豈尚混為物乎此處經文人成錯解者正因此科非彼不見之相一句所誤今雙約見物時與不見物時而更重申之蓋正當見物之時見性為我能見之體諸物是彼所見之相及至不見物時則見性為我能不見之體諸物是彼所不見之相故今言非彼不見之相者非彼所不見之相也蓋指諸物而言即是非物二字連上自然二字即同下文自然非物之句故我科言可見與不可見二途俱證成非物而已二以不見證成若不見吾不見之地自然非物此比上科更容易言當我不見之時汝若不能見我之見體此更不消費力辯之自然我見非物矣何以故可見尚然非物而況不可得見豈猶同於物相乎是知二科本來簡捷如此智者詳之辯定非物已竟二結成自性云何非汝承上言既不可見而又展轉皆非是物云何非汝之自性乎反辯見不是物已竟四反辯物不是見番前正言物不見見科也分二一物混例成人混又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立此處稍為隱略故舊亦無所歸屬當於見物之時下補一句云若物是見則明白矣科言物混者有情無情不可分也人混者汝見我見不可辯也物雖可以總該今與人相例且屬無情意云汝今徧見差別物時若彼諸物即皆是見汝見物時物亦即當見汝有情無情之體性紛亂混雜無復情器之分是物混也末三句遂例云有情無情尚不可分有情與有情益不可辯是故汝見我時反成我見於汝世間諸人無不皆然壞世間彼我之相莫能安立矣亦是暫縱理所必無正義全在下科番顯二人分例成物分阿難若汝見時是汝非我見性周徧非汝而誰此科是轉顯正義言汝見我時若一定只是汝見而非我見彼我分明曾無壞亂是人分也末二句遂例云有情與有情尚不混濫則汝見性雖周徧一切諸物有情無情判然逈別何至混成諸物而非汝之自性耶四責疑自性云何自疑汝之真性性汝不真取我求實自疑真性者本是自性而疑混於物也性汝不真取我求實者言真性在汝自不信其為真而取吾言以求其實迷之甚也顯見不雜已竟七顯見無礙無還不雜二科已示其必為自性而不雜科中兼明體之周遍遂復疑之以為真性當有定體何無一定周徧真我應得自在何乃動被物礙佛釋斯疑故有此科無礙之示也分二一阿難疑見不定而有礙又三一躡上疑端阿難白佛言世尊若此見性必我非餘此處文亦闕略若此見性下補一句云本來周徧則真性真我二種疑端方全且與下文相叫應矣二雙舉兩見我與如來觀四天王勝藏寶殿居日月宮此見周圓徧娑婆國退歸精舍秪見伽藍清心戶堂但瞻簷廡勝藏寶殿者天王殿中眾寶俱在故稱勝藏日月宮皆摩尼寶成宮殿臺池天人充滿日宮雖火摩尼成而亦清涼同月但光勝下注成熱耳請試火鏡光注成燒體實不熱則可知矣阿難隨佛或時居之孤山謂初天惟見一四天下言徧娑婆國即指一小剎而言非大千也伽藍此云園此且舉其徧與不徧兩種見量下方怪問而擬度也三陳疑以請分三一怪問不定世尊此見如是其體本來周徧一界今在室中唯滿一室意疑既云周徧即當常徧今在天本徧一界在室何唯一室而若此大小之不定乎二擬度由礙為復此見縮大為小為當墻宇夾令斷絕承上不定而隨情妄擬兩楹不決言我一界之見忽遷而但滿一室者為是此見內室所局縮大為小耶為是因墻所隔夾之令斷耶是必為室墻所礙而致然耳縮雖見體自縮亦須因局乃爾如過卑門身前鞠脊是亦由礙也此固常情計度必不越此兩楹然亦安之而不知疑阿難代為問辯凡我究心之人由此問端而研佛答處將必大有啟悟者矣切須珍重三總結疑請我今不知斯義所在願垂弘慈為我敷演斯義即大小縮斷所在猶言定在也言於四義定在何義求佛與決也二如來各出其由而教之分二一總示大略佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮諸所事業該餘方圓上下等類前塵即天宮精舍諸物等類也明不定但由於物耳舒縮意該斷續若言縮斷則意完矣意明見本不因礙而有縮有斷則見體畢竟非物之能礙而眾生妄見其有大小之遷者別有元由而實不自知也元由在下諸科二詳與釋教釋謂出其元由教謂授以解脫方法分二一喻塵教忘此科以喻明塵即所以出其不定由塵而教其忘塵即解脫矣又二一明不定由塵又二一示二皆無定二謂安與不定又三一略舉一喻譬如方器中見方空喻一界見大也方圓本以互顯今舉一可以類知矣二開途兩問吾復問汝此方器中所見方空為復定方為不定方喻法中一界之見為復定大為不定大三兩義俱非若定方者別安圓器空應不圓若不定者在方器中應無方空法中若定大者入室見應不小若不定者在界應不周徧意明界室等塵若存則定與不定二義皆不可定謂其有定有不定皆非是矣二示義性無在汝言不知斯義所在義性如是云何為在言諸塵不除則義性本無定與不定何得必欲求其定在乎示不定由塵已竟二教忘塵自徧阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在雙標方圓而下惟論方者語略而意必兼也法中云欲令入無大小但忘界室不應說言更除見性大小之相何以故見性本無大小大小但由於塵塵忘而大小泯矣見性更何所除乎亦猶虗空本無方圓方圓但由於器器除而方圓泯矣虗空更何所除乎然忘塵功夫在起行因中但是觀想亦惟達界室本空頓息執持非更想空縱觀純熟心地豁然泯身空廓不見界室始是似無礙非真也然此處最難透過若取著之以為極致墮一色邊不復更開矣直待觀行功極色陰消盡十方洞開無復幽暗身界內外影相方明如見掌果方是真無礙也此即入位果中至此即大小等惑永不起矣然亦但是體無礙非用無礙大用無礙更在下科又當知此之忘塵與後耳根圓通中入流忘所塵異功齊喻塵教忘已竟二斥謬教轉分二一顯謬出由又二一以反難顯謬若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築墻宇能夾見斷穿為小竇寧無續跡是義不然令覺觀日之時豈是用力挽見舒於日邊若覺觀日非舒自知入室非縮矣又令察穿竇時豈是續見宛有續迹若覺穿無續迹自知夾無斷痕矣二出成礙之由一切眾生從無始來迷己為物失於本心為物所轉故於是中觀大觀小此迷四重一迷物二失心三被轉四成礙意明見本不可礙而物本不能礙然眾生畢竟成礙者非由物礙而有縮有斷但由無始不達萬物皆已而迷己為物遂失萬物一體之本心物既不屬於自心則非惟不隨心轉而反以轉心是故動為物礙而觀大觀小皆無自由分也四重可別是知物本是心迷之為物則礙心亦如冰本是水結之為冰則礙水可見成礙之由正在自迷而為物轉耳豈由縮斷而然乎問觀小是為物轉觀大何亦爾耶答如見一界則局一界正為界轉豈能通於界外及轉界於室中乎同是物轉無疑矣顯謬出由竟二教以轉物又二一標轉物同佛若能轉物則同如來此且略翻第四成礙以作下科總標之辭轉物者即以小攝大以大入小小中現大大中現小等諸玄門妙用也蓋十玄門惟佛究竟故能此即同如來矣其惟直顯無障礙之大用下二科方乃四重詳番二明自在無礙又分為二一體自在身心圓明不動道場迷時身則蕞爾彌封滯殻心則闇然逐境偏局所以被轉成礙今則萬物一體圓而不偏達物皆己明而不昧身若虗空心安如海萬物皆在身心之中何物能遷動於身心故曰不動道場蓋身心即法界之道場矣此即番前三重明字番第一迷物圓字番第二失心不動番第三被轉二用自在於一毛端徧能含受十方國土毛端即身毛孔中正報之最小者也十方國土依報之最大者也毛端含十方即小攝大十方在毛端即大入小毛中看國而國不小即小中現大國外觀毛而毛不大即大中現小此即事事無礙法界十玄門中廣狹自在無礙門也舊註不達毛端國土二皆屬事而以事理體用對釋復不許用其亦草率不察理事法界中安有斯門乎此科方番前第四成礙即觀大觀小句也彼乃正為依礙大被小遷此則非惟不能礙不能遷且更能以正報之極小而容依報之極大以成無障礙之妙用矣何如其自在乎又此較前忘塵境界更是甚深彼方圓照此則圓用蓋照用具足圓融亦性能之極致矣乎又若未得斯義豈惟見局一界不成周徧雖見百千界亦非周徧何以故以有分限故以不能於諸法通融互見故若得斯義則非惟一室之小不礙周徧雖一毛端亦不礙於周徧何以故以無分限故以即於一毛端見徹十方國土故一一毛端一一塵中無不皆然嗚呼深哉見性之妙無以加矣又此科與上科合論上科見性於諸塵中照體獨立分明不混可當阿難所求四義中明字之義此科見性於諸塵中圓融照了無障無礙可當四義中妙字之義顯見無礙已竟八顯見不分夫見性量括十方體含萬法其與萬法非即非離惟其非即也故能靈光獨耀逈脫根塵身界無干生死不繫眾生不達斯義則混淆真妄沉溺輪迴既無智以自分終何由而得脫乎惟其非離也故能塵剎混融萬物一體用彌法界存泯自由眾生未達斯義則沉冥滯寂灰斷纏空既自昧其家珍亦何由而能用乎故前自指見以來不動不滅不還不雜及無礙之前半皆約不即之義分真析妄以決擇乎離塵獨立之體今此不分之科乃約不離義泯妄合真以顯洩乎與物混融之妙雖不失科與無礙之後半辭義亦融非今不分之正義矣將使眾生明乎不即之義則不淪生死明乎不離之義則不滯涅槃若相背而實相成也難云既與物不分即成萬物是見何得文中又言無是見乎答文殊喻中明言有是則成二體不得成一體矣要須無是無非方成一體之妙蓋一體即是不分當知不分者是非雙絕之旨也分二一阿難執身見各體而疑見在前究此疑之所自來蓋由上文諸科多與明此見性離塵獨立乃至身境亦無相干遂以自己平日所認身心對今新領見性細推度之覺此見體湛然滿前似與身心判而為二遂起兩重能所之解一者約分別以起謂身心為能分別見性為所分別二者約見以起謂見性為能見身心為所見是執見性身心各自有體遂起斯疑至於山河萬相與見各體更不待言分四一領上義而定前相阿難白佛言世尊若此見精必我妙性今此妙性現在我前此科即疑之總意下二科疑懼皆依此前相而成二標認見必遺身心見必我真我今身心復是何物言若依佛今旨將此湛然現前之見性必認為真我則我平日所認之身心謂之何物乎意恐外認見性必至內遺身心矣三懼墮於過失分三一約分別以定親疎而今身心分別有實彼見無別分辯我身此科正從第一重能所而來蓋約分別而成者也言我身心實能分別彼之見性而彼見性曾不能分別我之身心我誠覺其能分別者為甚親而彼不能分別者為甚疎也親疎意約彼我二字見之二明向疎背親之過若實我心令我今見見性實我而身非我此科從二重能所而來蓋約見而成者也言彼見性若果實是我心主宰於我令其外見萬物內見自身則無別分辯之疎者既是於我而分別有實之親者反非是我親疎倒換不免背親向疎之過矣三引佛言反正其失何殊如來先所難言物能見我言見性既在身心之前又能內見自身即同物能見我然物能見我佛前已斥其謬今何不為謬乎不依孤山將見性轉成萬物以釋物能見我彼蓋惑於下文佛約萬物以辯見性而云然也不知下有別意請詳下解自知四求如來開示惟垂大慈開發未悟欲佛發明認見何得不遺身心見身何得不同物見耶總會上文佛則諄諄責之警其認妄為真阿難則種種疑之反恐認真遺妄此固凡夫我執濃厚者必然之情良由不達認妄者必至遺真而識真者必能融妄何至有所遺哉詳佛答處自見真妄徧融之旨趣矣二如來約萬法一體而破前相問阿難既惟約身心而疑見性在前佛何不即約身心見性無有二體以釋其疑而必約萬法一體以破之者何也答此有四意一者易破前相蓋阿難執見性在前佛言須同萬物分明指出既是非竟無定指則了無前相可見既不在前豈與身心為二乎二者以疎例親就眾生之情見身心至親萬物至疎今會疎遠之萬物尚與此見一體況親執之身心獨有二體乎三者兼除二執蓋身心者我執之親依萬物者法執之顯境據前問辭我執己自熾然而法執尚猶微隱今若順其語而但說見性身心一體則非惟法執不能兼破彼將又執見性身心合為我體而以萬法為他體其為二執益增上矣故佛總與普對萬法悉顯其無自無他則二執蕩然無遺矣四者雙銷二疑蓋身心是其所親定聞非一而起疑屬現行疑萬物是其所疎定聞非一而不怪屬種子疑若更待其疑萬物與見性非一必且疑不及矣故就此問竝與決了所以雙銷種現也夫惟破一前相而四義具存所以必約萬法而不約身心也可謂至妙矣又分為三一直斥妄擬前相佛告阿難今汝所言見在汝前是義非實問意雖多惟此在前是其謬本故佛下但破一前相而諸疑盡釋矣二辯定本無是非分二一以無是非發其疑又四一辯無是非此中大段雖似易明而其句意參差須申明之夫據能辯義邊有即物有離物據所辯法邊有是見有非見然經文用義以辯法或單或雙至文指之又分為二一無是見此雙用即離而單遣是見也又三一如來問又曲分為二一縱成決其可指若實汝前汝實見者則此見精既有方所非無指示在前則必可指此意易明斯惟決其可指下方令其對物指之二教其對物指陳又三一在前皆可指陳且今與汝坐祇陀林徧觀林渠及與殿堂上至日月前對恒河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著師子自無所畏威懾禽獸佛坐此座表其具四無畏威懾魔外也二躡之教其指見若必其見現在汝前汝應以手確實指陳何者是見三立格防其混濫立格防濫者先將阿難答處立成格式便絲毫不能混濫故下阿難兩處答辭皆順佛格式而不違矣所謂雙用即離而單遣是見者在此科中又分二一即物須不壞相阿難當知若空是見既已成見何者是空若物是見既已是見何者為物言即物有見須當不壞物之本相如即壁成畵不妨壁畫兩存故舉例云若空是見何者是空等問是見無空是見無物則是義已成何必又要空物仍存答此順阿難迷執成難阿難元執身心見性物相皆各自有體相方起前疑何曾悟得總為一體今若有見即無空無物便成一體無有二相與前自語相違況既成乎一體又不容更說是見如一文殊無是文殊也二離物須顯自體汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑披剝析出即是離物意精明淨妙即是見元義相物不能雜曰精物不能障曰明物不能染曰淨物不能縛曰妙二阿難答又二一即物無是見阿難言我今於此重閣講堂遠洎恒河上觀日月舉手所指縱目所觀指皆是物無是見者不能即物而不壞本相也二離物無是見世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性不能離物而自體分明也三佛印許佛言如是如是雙許即離皆無是見無是見已竟二無非見分三一如來問又二一述言揲定其意佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者如汝所言下述阿難之言則汝下揲定其意如云據汝所言則諸物之中決定無是見矣二對物教明非見又三一撮略諸物今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊同前可指諸物但撮略其辭二重躡前文必無見精受汝所指躡前揲定之文三正教明見汝又發明此諸物中何者非見二阿難答三一無非見阿難言我實徧見此祇陀林不知是中何者非見此方直以標定無有非見下出所以二徵釋何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空此中單用即物而兼帶雙明非是也以離物無憑說於非見故單用即意又即見者是見也復云何樹者即何者是樹也然此本明無非復兼無是者有二義一者領前格式覆審致詳也二者遮止矯亂恐聞無非番又墮是示此雙絕令息反覆蓋權人之妙旨存焉三總結我又思惟是萬象中微細發明無非見者言既朗見一物不遺便不能於一物上發明非見也三佛印許佛言如是如是許其無一物而非見也問前言此一大科惟明一體不離之義今許無非見似合一體不離之義何乃首許無是見耶若萬物皆無是見何成一體之義乎答說是說非皆不成乎一體此義待下文佛以文殊為喻中當自明矣姑少俟之辯無是非已竟二大眾惶悚於是大眾非無學者聞佛此言茫然不知是義終始一時惶悚失其所守非無學者會通其意應指小乘深位或權漸初心良以滿慈尚如聾聞遠蚋豈小乘有學遽能不疑乎是義者即無是見無非見之二義也不知終始者後度不測其終前推莫尋其始也蓋凡義之淺者即始可以見終由終必不昧始今則後以度佛未說之旨竟不能測此義之歸趣是不知其終也前以推佛已說之言初不能尋此義之由來是不知其始也舊註意指無是見為始無非見為終此已無甚意味然不云終則物無非見而云終則見性非物不云始則物無是見而云始則見性是物此固違反經文失之千里而後更以現在我前為始此阿難所迷執者愈無謂矣失其所守者意謂或是或非決於一定則可為守今則雙許俱無曾無一定故驚疑而失所守也三佛慈安慰如來知其魂慮變慴心生憐愍安慰阿難及諸大眾諸善男子無上法王是真實語如所如說不誑不妄非末伽黎四種不死矯亂論議汝諦思惟無忝哀慕慴亦惶悚之意無上者證極之號法王者於法自在之稱真實只作一決定意如說苦決定苦說樂決定樂通真俗諦如所如方是稱理之談上如字即稱下所如二字即真如理不誑者無賺誤之過不妄者無虗偽之愆惟具四相不必強同五語矣不死者終不決於一定也又教中言此外道妄謂有不死天一生不亂答人者當生彼天矯亂論議在十卷行陰魔中四種謂亦變亦恒亦生亦滅亦有亦無亦增亦減皆持兩可終無決定今無是見無非見決定雙遣不俱不立豈同彼矯亂不定哉忝者孤負之意哀是佛哀慕是眾慕蓋當機者佛哀愍之望其領悟眾期慕之望其啟發此乃囑令研審不可孤負上下之望也四文殊代問復分三一代問之意是時文殊師利法王子愍諸四眾二代問之儀在大眾中即從座起頂禮佛足合掌恭敬而白佛言二代問之辭又分為四一標眾疑世尊此諸大眾不悟如來發明二種精見色空是非是義二種即是與非是二種義也色空總該諸物末句蓋以一義字雙貫上是與非是成二義也是義者即無是見之義也非是義者即無非見之義也一往讀之缺二無字語之略耳二述眾意世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖應有所指者怪其不能指出也應無所矚者怪其不能無矚也義即無是無非二義所歸即彼二義因由三檢眾過非是疇昔善根輕尠言其非同淺善根人執有不定是非輕疑佛言矯亂者也四求佛示惟願如來大慈發明此諸物象與此見精元是何物於其中間無是非是求佛說出元是何物則無是非之因緣自彰顯矣末句以一無字雙貫下是與非是也如云此見與物元是何物而乃無是又無非是乎合前是非是義乃是上貫此是下貫似此二種句法最多後皆倣此以無是非發其疑竟二曉以無是非之故上科文殊述眾但疑何故無是而又無非是故佛此科曉其故也分三初一真無是非當知此科全是諸聖圓觀大定行人切宜究心若常住此境界念念不昧成佛何疑分四一舉諸聖正定佛告文殊及諸大眾十方如來及大菩薩於其自住三摩地中大菩薩獨取圓頓教中深心之眾自有二義一自獨也不共凡外權小之意二自從也從發心位直至成佛位中住者常在之意所謂那伽常在定無有不定時通於四儀非獨取坐非有入出也三摩地即前三摩提首楞圓定之總名也然此定非制心強作乃是性本如是無始迷之今不昧而已二了妄無實體見與見緣并所想相如虗空華本無所有上科文殊雙舉諸物與見精為問今亦雙舉以答故知此科見之一字即舉見精見緣想相四字即舉諸物然見緣即六塵色空等物想即六處識心相即六根身相前文云想相為身蓋合根識以成身相今此想相并指心身也蓋此中并將見性與外之萬物內之身心總成合會明其萬殊則妄而一體元真也本科明妄皆如目病見空中華非作故無本性無故三達妄即一真此見及緣元是菩提妙淨明體想相攝入緣中故知緣之一字并攝根塵識三乃與見精為對耳元是二字正答文殊之問彼問見精物相元是何物今答云元是菩提妙淨明體也此於三種中真性菩提耳蓋指本覺真心從本以來不可縛不可染不可蔽之本體此是攝妄歸真亦是攝用歸體矣四結無是無非云何於中有是非是意明諸物若與見精有二體者可說是見及與非是見也今惟一菩提妙淨明體憑何說是及說非是哉此所以無是見亦無非見也問佛初惟以見為性而曲明其不與身心萬物為侶似謂見獨真而餘皆妄令人獨依見性也今乃論妄則降見性同是空華論真則升諸法同為真體固是理極之論其奈人之用心將何所適從乎答下文雖有本喻不釋斯難今仍更助一喻庶有發明一真如大海中水見精如水之光諸所物相如水中之影特因愚者認影為實反忘其水今欲令其捨影認水其柰水體瑩徹不見其形故且令其認彼水面之光故一一斥影為妄讚光為真欲其即光以識水也而彼愚者復報光影各自有體橫起是非故復明其光影二皆無有自體全惟一水是其實體故知光影雖曰皆虗然以光較影則影有生滅光無去來影各偏局光通周徧又光影雖皆即水然取影則有淪溺之危識光明有得水之益且影自是外境所暎而光實自體無餘耳然則由斯喻而詳彼見精之與萬法雖同妄同真而得失差別仍判然矣一真無是非竟二於一真總喻又二一佛喻一真索是非文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如汝文殊者舉文殊一身喻一真之體也更有下二句索是以喻萬物是見也末句索非以喻萬物非見也無字即非字當時只合著一非字為妙譯人略傷巧耳意云如汝文殊但惟一身今就此身之中更有是文殊之處乎為有非文殊之處乎二文殊直答無二相此科吳興三配俱是然因其隱略難明分三一領惟一相如是世尊我真文殊如是世尊者領諾佛旨而直答也我真文殊者言惟我一身而已答前一真之喻也二答無二相又二一無是相無是文殊何以故若有是者則二文殊答前色空無是見之喻也無是文殊者言我既惟一身不可更說於是此一句斷定何以故乃徵起釋成也言其但說於是須二文殊一是一非方可對非說是今乃惟一故無是也反言以顯之也二無非相然我今日非無文殊答前色空無非見之喻也承上言尚不容於說是而況更可說於非乎蓋非無二宇意既相同即可換過云無非文殊即明快矣又順無字別作一說於佛問處當云副本體而更有方可說是并本體而全無方可說非今汝文殊為副本體而更有是文殊耶為并本體而全無文殊耶至於答處亦順此為對不必改非而對是也斯則是非在有無下落一層耳於文頗順而意稍難省姑存備考三結無二相於中實無是非二相一故無二三總以法合喻佛言此見妙明與諸空塵亦復如是此蓋雙舉見與諸物言其即如文殊但惟一體所以無是見而亦無非見也一體即菩提妙淨明體耳辯定本無是非已竟三教出是非之法前欲曉以無是非之故故從二妄合成一真乃於一真總喻而總合今欲教以出是非之法故從一真起為二妄乃於真妄別喻而別合上有法喻合之三科今亦準下復分為三一曲顯真妄二相本是妙明無上菩提淨圓真心妄為色空及與聞見本是者對下妄為先出其實相也妙明者寂照不二之意無上菩提者惟取本覺果體不取樹下證得者此之果體人人本具雖佛隨相證得亦無絲毫加尚但證本有而已故曰無上本無染污曰淨本無欠缺曰圓總上諸義為一真心以上明其本惟一真心體而已妄為者對上本是出其妄相也言其本從一真詐現二分色空即相分所攝聞見即見分所攝然而既云妄為即非實有雖非實有宛見差殊故多迷也二別舉真妄二喻又復分為二科一二月終墮是非如第二月誰為是月又誰非月如字承妄為二分而言此之二分如揑目所見二輪然與前不同前單喻見此則兼喻色空又則因此乃知見精如帶揑之本體色空如揑出之旁輪既見二輪二俱墮妄矣誰是誰非者舊註直作明無是非似乃仍合文殊之喻頗失參差今則合詞在於下文與上無干乃是迷者擬度之辭意以揑出二輪雖非實有宛見差殊苟昧者但惟執此則必妄擬其誰為是月又誰非月是非往復終不能忘此則永墮是非必不能出矣二一月方出是非文殊但一月真中間自無是月非月若知本月但惟一體元無二輪自無是非可言永出妄擬之戲論舊註二月已無是非何用一月且與下文何屬乎三以法各合二喻分二一合二月終墮是非是以汝今觀是與塵種種發明名為妄想不能於中出是非是是以二字正承上二喻而來此處塵字與種種字所含非淺乃是佛慈指教須將問處盡與決了見即見精塵則內而身心外而萬物咸皆該盡心亦屬塵者以其為塵影故也種種發明者約身心而言見性在前約萬物而言是見非見俱是虗妄亂想不得真實而竟不能出是見與非是見也正猶觀第二月而恣其擬度終不出於是月非月之妄論也二合一月方出是非由是真精妙覺明性故能令汝出指非指克體而言曰真精約照用而言曰妙覺明合斯體用而總明為性持業釋也蓋前會妄歸真攝用於體故曰體及其從真起妄屬隨緣用故曰心此則會融體用故曰性總一真而已矣如曰汝如了知見精與身心萬物元一真性本惟一體方得頓悟萬法悉無自他之別肯復擬見性於身心之前而言其可指度見性於萬物之內而言其不可指哉正猶觀第一月則妄擬莫施是非自盡矣蓋此指字正應前既有方所非無指示之指也且初堅執在前似妄謂可指及對物詳辨又似謂不可指也是皆妄想所惑擬度紛然今乃既悟一真斯疑頓絕矣故曰出指出非指也示見不分已竟九示見超情自然因緣皆是妄情計執今此見性竝不屬此故曰超情分二一正遣情計又二一隨問別遣又二一非自然又二一阿難約徧常義而疑自然又三一領性徧常阿難白佛言世尊誠如法王所說覺緣徧十方界湛然常住性非生滅覺謂真性緣即萬法總言徧十方界者領上不混無礙二科中見性周徧而不遺不分二科更領見性與萬法同體周徧故成此徧義也湛然常住者領上不動無還二科性無生滅領上不滅一科總攝之而成此常義也二躡之起疑又二一疑濫於外計與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我徧滿十方有何差別梵志此云淨裔謂是梵天苗裔即婆羅門云先者古人也娑毗迦羅現首卷冥諦現無還科中外道二十五諦中第一諦也本是法塵中滅塵非色非空之境謬稱冥性常住作諸諦冥初之本源也夫外道窮理深者但伏六識現行種子全迷末那具在所執冥諦似非八識應惟法塵投灰苦行外道也真我徧滿十方者外道所執我相不出三種一大小二微細三廣大此廣大我也或即神我乃二十五之末後諦耳然所以非真者象外取空別有自體此但分別影事豈正覺乎有何差別者言如來說周徧常住外道亦說何以異乎二疑違於自宗又二一舉昔宗世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界楞伽此云不可往惟神通可達佛曾在此說楞伽經大慧者彼會當機菩薩也斯義者即差別之義蓋廣辨內教與外道所以不同之義外道說自然者大義謂內而心性外而萬物悉本無因自然而然斯則撥無因果不立修證故佛廣說因緣以破之因謂親因種子緣謂助發資緣內而三乘等性須由宿生根種復假諸教助緣方生諸果外而百糓等物亦須根種為因土等為緣方生芽等非彼境界者大異於彼所說也二疑今違我今觀此觀性自然非生非滅遠離一切虗妄顛倒似非因緣自然二字判定下出其故末句正疑違宗本有不遺故非生究竟不壞故非滅即常義也一真一體故遠離虗妄無自無他故遠離顛倒即徧義也涅槃每以不徧為無常因足見徧是常因而二字合為一義故總惑為自然當知述領徧常不為差謬目為自然方是大差末言大似違反昔宗濫彼自然矣三求佛開示與彼自然云何開示不入羣邪獲真實心妙覺明性承上既似外計又異因緣則我教亦有自然之義矣然不知與彼自然何不同乎願佛顯示之蓋恐一涉於邪又成虗偽復入昏冥故言不入羣邪方得真實妙覺也二如來約隨緣義以破之分二一直斥其非佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然蓋阿難實以為自然而但求不同於外道不知何但不同亦且了無自然之意故佛惟破自然而不復分別外道也言詞善巧曰方便理趣究竟曰真實二詳破其非又復分二一牒索自然之體阿難若必自然自須甄明有自然體二即與甄明見性又二一標列詰問汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自以明為自者以見明為本然體也餘放此二詳與難破阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明應不見暗者言見明既是其本然不變之體只合見明及至明去暗來即應斷滅全不見暗方成自然餘放此說今皆不然悉能隨變隨見何成自然非自然已竟二非因緣又分二一阿難番自然而疑因緣阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性阿難因領性體本來徧常似不合於昔之因緣而但不知此本然徧常云何符合因緣之旨乎是誠未了今教亦且超然不墮因緣二如來以不變義以破之分二一躡問對現佛言汝言因緣吾復問汝汝今因見見性現前汝今因見下應補明等二字其意方完言其對境始現也二別為破斥又二一破因又分二一標列此見為復因明有見因暗有見因空有見因塞有見二逐破阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗若因明有應不見暗者言其既以明為生見之種子及其以暗代明即如以沙易糓則苗何以生反其因也餘放此二破緣又二一標列復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見二逐破阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞若緣空有應不見塞者言其既以空為生見之助緣及其以塞而代空如以火而易水則蓮何以發反其緣也餘放此問自然因緣皆約明等為破有何別乎答見性作自體明等作他法破自然則顯自體全能隨他法是隨緣義見其非自然滯一之體破因緣則顯他法不能變自體是不變義見其非因緣所生之法二義皎然是則明等雖同取義各別矣隨問別遣已竟二更與迭拂雙承上非自然非因緣二大科重重拂迹也又分三一拂己說者當知如是精覺妙明非因非緣亦非自然不變之真體曰精覺隨緣之靈用曰妙明末二句申言體既不變故非因緣用既隨緣故非自然通下雖皆疊拂之文然上文但惟反詰之辭此則方申其正義二拂未說者非不自然無非不非無是非是此中缺非不因緣一句但是遺脫理應有之蓋恐聞非自然而遂謂不自然故曰非不自然恐聞非因緣而遂謂不因緣故亦應云非不因緣二非不中兩箇不字即是前非自然非因緣上兩箇非字此以雙非遣兩非也合云非非自然非非因緣當自省矣後恐又落於二非不中故復以一無字竝遣前單非與雙非也如云固無非自然非因緣亦無非非自然非非因緣也上二句無非也下二句無不非也至於無是非是者又恐人聞諸非盡遣終歸一是故此遺之云無是自然無是因緣也又恐人聞既不存是還成非是復遣之云無非是自然無非是因緣也初一層無是也次一層無非是也當知無非不非為躡遣蓋總躡前義而全遣也無是非是為對遣蓋防其對非成是而對遣也三情盡法真離一切相即一切法此二句推廣印定也上句盡其餘執也末句推廣而言不獨見性但能離相則即一切法無不皆真也相謂一切情計之相非謂法之自相也是可見法本無差情計成過諸情蕩盡法法元真但用忘情無勞壞相也又當知盡遣之後方得全真非是亦遣亦存竟成不定矣溫陵意謂離徧計知即圓成實與此解同缺依他起者且超略而論也理實下文釋迷悶科中方遣依他起矣又當知隨問別遣科如以藥除病更與疊拂科如種種消解諸藥毒耳正遣情計已竟二責其滯情分二一正責用情汝今云何於中措心以諸世間戲論名相而得分別於中者於精覺妙明中也措心者作意妄想也諸世間者相宗中有學者世間非學者世間自然者外道所宗即非學者世間戲論因緣者權乘所宗即學者世間戲論蓋言此理離名絕相逈非諸世間戲論所能及之而子云何云云責其迷也二喻明無益如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉顯見超情已竟十顯見離見常途情見二字不甚相異但分本末俱屬徧計此則情與彼同見與彼異即指見精自體耳夫見精既曰真妄和合則可約義而分真妄二見問懸示中不許心見為二今何又言二見答此但約真見帶妄時即名妄見離妄時即名真見豈真有二體耶如第二月尚不許其為影豈許其有二體乎今言離見者即真見離於自體中一分妄見而已非謂離身邊等見也此即離依他起性矣分二一阿難以今教而質昔宗又分二一躡今教阿難白佛言世尊必妙覺性非因非緣上科自然因緣二皆被斥而不問自然者以非自教也因緣自教一旦盡違故獨躡之騰疑起問不已也二質昔宗世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何阿難所引見性蓋是眼識如來所示乃是根中之性規矩謂愚法聲聞不分根識信乎如來知其心麤且不與分但就語破之大乘眼識九緣方生小乘法中麤具四緣缺一不可然皆眼識得生之緣而舊註迷為萬法之緣誤之甚也心指第六識以小乘不達七八心法惟一也儒云心不在焉視而不見是也順世淺解此為確論目前不空不明何以有見無心無眼更不待言所以必墮因緣今示見精全不托此下文自明末問意云豈今是而昔非耶抑今昔同而我未達耶二如來深明其權實不同分二一明昔宗非第一義又二一直斷其非佛言阿難我說世間諸因緣相非第一義此明昔教與今教大不同也言我昔說因緣但為對治自然及邪因緣誘引小乘一時權宜之說非今所說第一修證了義之教也何得取彼而難此乎二明其不了又二一定世間義又二一如來雙徵阿難吾復問汝諸世間人說我能見云何名見云何不見探其所藉之緣二阿難雙答阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見單舉明緣顯四中缺一不見餘可例知二正明不了又三一無明非是無見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見無明便謂無見常情皆然故躡此以應不見暗詰之汝謂無明既已無見即當并暗不見然決無此理由是下三句乃申其正義焉二雙以例成不見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見此反例顯謬言若明暗相例遂至二皆無見豈不大謬三結申正義雙見若復二相自相凌奪非汝見性於中暫無如是則知二俱名見云何不見上科但是因謬反顯實無二不見理故乘其必悟而申以正義令知明暗中俱是見也當知順世間惟許明見不許暗見須假多緣今自指見以來即取暗中有見然則暗中之見尚不用眼何假空明及分別耶是則顯一暗中之見則四緣俱破故曰舉一該餘明昔宗非第一義已竟二示今教為第一義蓋雖總明第一義而其中兩重有淺有深有已說有未說亦即是結定已說而發起未說也分三一先定離緣是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞此一重為淺為已說蓋自體離緣之義從引盲人矚暗直至非因非緣文中屢有此義今重顯疊定者以起下文耳又顯從前所說皆離緣第一義已自超乎因緣宗矣其曰見明之時見非是明者言能見之性非即所見之境能所判然不難分辯餘三放此二例成離見四義成就汝復應知見見之時見非是見此一重為深為未說更顯向後說者皆離見第一義也而因緣中義益逈乎其不可及矣四義即明暗空塞之四成就者成就能例之法也前已重重發明見精中真妄和合今此上一見字即見精中本體真見下一見字即見精中所帶一分無明妄見從無始來此之真見常墮妄見之中如人墮水豈復見水後於聞教得悟之時忽爾真見現前方能徹見妄體然纔一見時則斯真見之體已即脫于妄見不復墮于其中故曰見見之時見非是見非是二字即脫出之意如人必登於岸方能見水故纔一見水已即不在水中矣良以上之四義皆以能見之性見於所見之境而性即非境今亦例此以能見之真見見於所見之妄見而真見即非妄見矣此義難分辯故以四義易辯者而例顯之然見之所以為妄而真見所以非妄見者待佛後釋迷悶處自發明之通上十番示見則帶妄顯真已極將剖妄而出真故此以發其端也三責而勉之又二一責之見猶離見見不能及云何復說因緣自然及和合相見猶離見者言此真見尚猶離於見精之自相也見不能及者見精亦自不能及也良以有妄見時真見全隱及至真見現前時妄見已空故終不能及也云何下方責其執悋昔宗愈不可及矣和合未說而言及和合相者蓋與因緣一類戲論不相捨離者也二勉之汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路局溺舊聞曰狹得少為足曰劣乏甄別之智曰無識徧計依他了無干涉曰清淨實相者空宗性宗曲直稍別空宗謂凡所有相皆是虗妄是雖空色不二須見諸相非相方為實相依此則須破妄相而後顯實相性宗則山河全露法身萬相當體真實依此則即相直顯實相下文二意具有自此乃至陰入處界盡處半同空宗以皆破妄顯真故也然隨遮隨表異空宗之無表故曰半同七大方同後義故佛重標至文再明達此方到果海故曰妙菩提路極勉其不可中路而懈退矣通上十科論之初科則顯其脫根脫塵逈然而靈光獨耀二科則顯其離身離境凝然而本不動搖三科則顯其盡未來際究竟不滅四科則顯其從無始來本有不遺五科則顯其無往無還挺物表而常住六科則顯其不雜不亂超象外以孤標七科則顯其性元自在轉萬物而大小何局八科則顯其體本混融譬一月而是非莫辯九科則顯其諸情不墮遠越乎外計權宗十科則顯其自相亦離轉入於純真無妄顯見至此可謂顯之至矣舊解總將如是顯意而悉為破見此予所以不得已而重疏之一端也特惟就眾生迷位而尚有二種見妄未除故曰帶妄顯真耳帶妄顯真已竟二剖妄出真二種顛倒見妄如璞蘊玉而見之真精如玉在璞故帶妄示真如指璞說玉雖珍貴非虗而麤石未剖美玉未瑩此科剖妄出真如剖璞出玉精瑩煥發矣是以前之破識破至無體乃為真破此之剖妄實體反露所謂不畢竟破似破而實顯也可槩以為破乎分二一請許懸應所請意遠應在後文非局本科故佛隨請而許亦非局近是以并云懸應分二一阿難述請又分二一述意又二一述未開阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開因緣等四義世間戲論中所必具者故後二前雖未問而今則竝陳然總云未開者有二意一者言總意別別指後二而言四義未盡開也二者義有相關謂和合與因緣相關不和合與自然相關倘屬後二則前二亦未全離故總云未開耳然意中惟望更說後二決無望佛重拂前二故舊說非是也二述迷悶而今更聞見見非見重增迷悶本惟望佛次第更談和合等義今因不達見見非見迷悶是急故先希釋此也述意已竟二哀請伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨慧目觀空者也佛啟清淨實相而阿難又乞慧目則此下圓發空如來藏無疑矣纖疑在念則覺不明淨是須釋迷悶而開未開夫然後覺心無不明淨矣二佛慈許說分二一將示妙修爾時世尊憐愍阿難及諸大眾將欲敷演大陀羅尼諸三摩提妙修行路此經家敘佛意也觀將欲二字則其意甚遠在五六卷蓋凡欲事妙修先求真智廣開真智皆所以為妙修之地故佛方近談微密觀照而經家先遙敘此其旨深矣陀羅尼此云總持謂總一切法持無量義正以解固欲其周圓而修當執其簡要此經了義之修最為簡要陀羅尼雖通顯密且就顯言故圭峯疏釋不取多字一字偏取無字即淨圓覺心今應亦取無字即圓湛不生滅根性也諸三摩提總目二十五圓通妙修行路密指耳門意言諸圓通中妙耳門也以此二句釋上陀羅尼顯修門中耳根圓通即大總持也不依舊註平派定慧止觀等按後阿難請入華屋即有得陀羅尼入佛知見之語及佛許云開無上乘妙修行路又云於佛如來妙三摩提不生疲倦語意全合足徵此處是預指後之修門也二先開真智又三一明其未了告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了寄斥多聞者但恣口耳未了實義奢摩他即性具本定微密觀照即本具照體朗然現前也檢異起心對境思惟麤觀曰微檢異制身靜坐出入定相曰密又離妄絕相曰微即相無相曰密故今所說見見非見乃至七大徧周正離妄絕相微妙觀照下文滿慈二答正即相無相祕密觀照是知此意照盡三如來藏是謂真智必由此真智方能造後妙修也二正許開示汝今諦聽吾當為汝分別開示三兼被未來亦令將來諸有漏者獲菩提果有漏尚令成佛無漏不待言矣二分別開示分二一釋其迷悶阿難以未開迷悶二者竝陳而迷悶更急故佛今則先與釋其迷悶前已辯明此中并無重拂因緣自然之意勿強索之分三一雙標二見於一妄見分之為二非真妄二見分二一總出其過阿難一切眾生輪迴世間由二顛倒分別見妄當處發生當業輪轉此明見妄若存有此等過故須剖析而離之一切眾生不止凡夫亦兼小聖輪迴世間不止七趣分段亦兼二乘變易以此是凡小俱迷之境而結尾期在圓滿菩提不生滅性故也然此二句方以總標大患下乃推原皆由見妄能現境起業而致然也言二者即下同別之二也云顛倒分別者正見妄之體相也謂迷別為同本是己心別業自現之境而視為心外同他共住之境迷同為別本是自惑所現與眾同分之境而視為心外與己無干之境迷虗為實本是惑業虗影而視為心外實有定相之物此之三迷舊解但了後一前二罔知至下當發明之恒作如是見解故曰顛倒分別然此分別乃任運歷然不昧而已所謂微細流注分別非作意計度麤分別也總謂之見妄者體即陀那細識見分中和合一分深惑下文諸佛所稱俱生無明生死結根是也此方出見妄體相末二句正明其現境起業為引發輪迴之本也當字去聲當處者全法界心徧成迷惑之處本非處而言處耳發生者盡法界徧現情與無情一切世界下文謂無同異中熾然成異者是也此蓋但由惑現未及業招方是同分境現耳當業者即於當處惑境之中取著造業也輪轉者隨業受報次第遷流成無邊輪迴也此蓋不但惑現更由業招即是別業境成也即處與業二俱言當者顯二意一當處顯不動意如夢所見無量多境無量奔馳不離床枕寸步無移二當業顯無物意言惟是自業幻成妄取妄受更別無物也是則見妄能招如是大患故不可不了悟而遠離也二別列其名云何二見一者眾生別業妄見二者眾生同分妄見夫唯心境界極盡十方唯我一心本無親疎遠近之分今為見妄所迷不能同佛全體住持全體受用於是有見其自所住持現得受用而為親近之境有見其他所住持非己受用而為疎遠之境然親近者不惟惑現而更兼業繫蓋自業發明還自取著非心外實有與他共住之處故曰別業妄見特由顛倒分別乃妄見其心外實有與他共住豈真實哉其疎遠者雖非業繫而但由惑現蓋與眾同惑而還同眾見非心外實有與己無干之境故曰同分妄見亦由顛倒分別乃妄見其心外實有與己無干豈真實哉當知此與舊說不同舊謂別業約一人同分約多人便與萬法唯心相背今惟約阿難一心兼具此二種妄見但約業別別見惑同同見分之耳却自阿難以例一切眾生人人皆具此二種妄見方為盡理二各舉易例舊說目眚災象二皆為喻以喻後之一處多處則背戾後文其過無窮不暇委辯今竝是法如字乃是舉法之辭但有難覺易知之分後文有證良以親近之境雖為別業實亦與眾共住同見誠難覺其為別為虗也至於眚見燈輪則又別中之別虗上之虗是乃最易知其為別為妄者矣疎遠之境雖為同分然見其與己懸隔而又各受用不一誠難覺其為同為妄也至於瘴惡灾象則又同中之同妄中之妄是尚可易知其為同為虗也故佛舉眚影災象易知者將以例後一處多處之難知者焉問佛後合明何無同別答如來言不虗發語必開迷既標顛倒又列差別別業同分必是眾生迷昧之境前標既有可不隨明後結若無何勞強贅曲順金言而已然合明處略之者正意歸重見妄以釋迷悶故也就分為二一別業妄見分為四科一先以徵起云何名為別業妄見二陳其所見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊目雖浮根而眾生聚見於眼即見精所寄之處眚雖浮根之病而實因有見性方有斯病亦即見性之病而燈輪即見病之影但好眼為無明根本見病而赤眚為浮根枝末見病身境為根本見病之影而燈輪為枝末見病之影以此眚影為例即有兩重易知一者易知其為別業以於燈輪明知其為自己獨見之境二者易知其為妄見以又明知燈輪非實有也故先陳此取為能例意在例後兩重難知焉又佛向下即離妄因等科皆就此易知能例之法而寄辯詳明到下所例一言以蔽也故此須當一一配例明白庶至下文不費詞而自明矣目惟取其所具之見性與後見身境者同體無別但此雙帶本末二病而後惟有本無末故用相例焉眚例無明燈例界內輪例身境當與下文相為照應無差忒矣三了無其實又復分為二一審於二處於意云何此夜燈明所現圓光為是燈色為當見色例云此三界內所現身境為彼界內實有耶為汝見性實有耶二難其即離又二一難即燈即見阿難此若燈色則非眚人何不同見而此圓影惟眚之觀若是見色見已成色則彼眚人見圓影者名為何等先以非眚不見破即燈非眚人以例諸佛蓋斷盡無明同無眚病例曰若身境是界內實有而斷盡無明之人如何不見何必惟有無明者然後見之乎次以色不自見破即見例曰若以身境即是見性實有則見性已成身境即不能以自見而今見身境者復是何物以見之乎二難離燈離見復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影先以傍觀無體破離燈例曰若復轉計身境離彼界內而別更有體則夫界外涅槃應當更見身境蓋二乘出三界外即空不見問與佛何異答佛即三界不見身境如非眚人即燈不見毛輪二乘如帶眚人離燈向於屏等方不見也非真不見若復來依舊有矣次以非眼莫矚破離見例曰若復轉計身境離見性而別有自體則憑誰知有身境今何無明之人必用見性見之乎了無其實已竟四詳示妄因上科但舉即離皆非足顯虗妄而未出虗妄根由及無病見體此科方具示之分為五一正指妄因是故當知色實在燈見病為影色實在燈者言彼五色實須在燈上而後現也以屏等不出無離燈理見病為影者言雖不離燈現而實非即燈之影乃見上眚病之影也見病二字正是真實妄因然上句例山河實須在界內方見而亦非即界內實有但是根本見病之影而已二見體無干影見俱眚見眚非病首句牒前病影也上見字指見病言字之略也應云影與見病俱是一眚而已意明影病一體未有影非目病亦未有目病無影者也故合影與病方稱為眚故曰影見俱眚次句特指能見眚之見體常自非病而與眚本不相干矣以若見即是眚應不自見今既宛然見眚豈能見之見體即所見之眚病乎此意最重正惟有此無病見體所以見見即非見也不指有智眚人而言後文有照至當指之三誡人妄情終不應言是燈是見於是中有非燈非見觀不應二字明是誡止之辭蓋言既惟病影一無實體則說即說離皆不中理故誡止之四喻明所以如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見此方是喻非體非影者準下文既以月形見體對辨是非此應即是以見體月影而雙標也故非體者非見體所有也非影者非月影所現也下之徵釋正出第二月真實妄因惟在一揑字而已以揑則有不揑則無故也同前燈輪真實妄因惟在一病字而已故曰見病為影亦以病則現不病則不現故也末二句吳註只取雙是雙離而已形月形也雙是形與非形者猶言是月非月也雙離見與非見者猶言非見是見也蓋離見即非見離非見即是見也文法之巧耳大端以月對見而雙遣揑輪之是非意在喻明以燈對見而雙遣眚輪之即離耳是非亦即離也五以法合顯此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見承上可見二月非實惟揑是其根元燈輪本無惟眚乃其病本夫既徹底虗妄憑何說其即離又既離即皆非尤見徹底虗妄矣蓋眚與無明皆如揑也燈輪身境皆如二月也例之易見別業妄見已竟二同分妄見又分三一先以徵起云何名為同分妄見與前徵對二陳其所見又二一總舉洲國又二一海中洲數阿難此閻浮提除大海水中間平陸有三千洲大海即七金山外醎水海也平陸即無水地水環陸地曰洲一大餘小故數滿三千此惟須彌之南一面洲也二洲中國數又分二一大洲國數正中大洲東西括量大國凡有二千三百大洲即指閻浮舉大國以略小國也二小洲國數其餘小洲在諸海中其間或有三兩百國或一或二至于三十四十五十此皆布於大洲之外者也總舉洲國已竟二別舉所見又二一兩國同洲阿難若復此中有一小洲只有兩國舉最小之洲最少之國以況大多也二一國所見惟一國人同感惡緣則彼小洲當土眾生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹蜺種種惡相暈適珮玦皆兼日月環匝曰暈薄蝕曰適珮玦近日月灾氣之狀也彗孛飛流星之災象星芒偏指曰彗四出曰孛橫去曰飛下注曰流負耳虹蜺單是日之灾象夾日而成負耳映日而成虹蜺末句該盡其餘之意陳其所見已竟三了無其實但此國見彼國眾生本所不見亦復不聞同一天象此有彼無足知非實此說妄處比別業中既略即離復缺妄因略者意欲準上缺者留待下進退文中例出也然此亦有兩重易知一者易知其為同分以其明知與舉國見同也二者易知其為妄見以又明知他國不見也故先陳此取為能例亦欲例後兩重難知者焉各舉易例已竟三進退合明分二一總標例法阿難吾今為汝以此二事進退合明此科舊解標雖在此却乃隔後多文別取數句以為其義遂致管見謂為錯簡欲以改移其文今於印本雖未敢動而傳講者皆抄寫指授以為確論今反覆詳之乃是不識本旨反謂經差若果改移大亂佛旨痛宜戒之當知齊此標後直至迷悶科終三番相例皆是進退合明正文又進退亦異舊說蓋佛談經如人入宅從前向後為進從後番前為退然亦有兩說竝於理通智者審之一者若約例處現文則三節分屬進退合明謂初例例汝今日觀見山河是進以合明次例例彼妄見別業一人是退以合明後例例閻浮提三千洲中復是進以合明二者若約結處深意則三節各有進退合明謂初結皆是乃至所成約燈輪依正進退合明次結俱是乃至所生約灾象燈輪進退合明後結同是乃至妄死約灾象諸國進退合明至文一一指之自見二依法取例又二一例明別業又三一舉能例法牒定眚妄雖總牒前別業而意多取於詳示妄因中義以作今能例之法耳又四一促舉前法阿難如彼眾生別業妄見此科總舉下三科詳牒也觀佛直呼前之眚輪以為別業妄見何得執為譬喻此一驗矣二妄境似有矚燈光中所現圓影雖現似境三妄體本無終彼見者目眚所成眚即見勞非色所造見勞者即見病妄發勞相也非色所造者非實色所造也蓋言惟是一眚所現更無他物即前影見俱眚句耳四真體非病然見眚者終無見咎蓋見眚者即能見眚之自體也良以眚不見眚而見眚者乃見之真體彼固無恙故曰無咎此即前見眚非病句耳二就所例法進退合明約前分屬言總意別後義正齊分二一總成例意例汝今日以目觀見山河國土及諸眾生皆是無始見病所成例者同是一例言無異也今日目觀者明現前親住親見近境異後懸遠之處也次二句依正可知無始見病者即根本無明初成業識轉生見相二分則見如眚瞖相如燈輪從此浩劫莫復清淨故曰無始見病此科是第一進退合明若依前義三節分屬此屬進以合明謂進前文燈輪易知之別業合明後文依正難知之別業則結文皆是二字但惟徧舉國土眾生而已言此國土眾生皆是無始根本見病之影與燈輪枝末見病之影一例而無別也此說順而易於省解若依後義三節各有進退例處同前無異惟於結處差別皆是二字乃是雙舉燈輪依正而言皆是無始見病之影故具足進退之義蓋進前燈輪以合明後之依正則此依正固無始見性所帶根本見病之影與燈輪而同一例也退後依正以合明前之燈輪則此燈輪亦無始見性所帶本末見病之影與依正同一例也雖久暫不一而無非見病展轉幻生矣此說稍難領會而意則圓足思之問目眚但一時之疾今亦謂為無始見病恐非佛意答此正據佛意下文於眚妄瘴惡相例之後亦結俱是無始見妄所生故知然矣但比身境更多一轉所謂雙帶本末二病而已推末由本故本末同結之問燈輪合明依正固是以易知例難知依正合明燈輪取何意耶答依正虗妄固比燈輪難知而目眚遠因亦是無明轉生猶不易曉故佛互相發明有深意存焉要顯本末見病皆無始無明之過也後皆倣此二詳應前文又分為三一合明妄境似有見與見緣似現前境見即目見緣即國土眾生二合明妄體本無元我覺明見所緣眚覺見即眚覺明即本覺墮於無明之中者也見所緣眚者見自所帶無明之影也覺見即眚者謂覺明所見無明之影即是眚病此句宛是影見俱眚之意也三合明真體非病本覺明心覺緣非眚緣字雙指見與見緣妄見對覺心亦是覺心之所緣故妄見屬諸緣之中是則覺心能覺諸緣者而謂之非眚正以合前見體能見眚者而謂之非病顯然孚契乃知凡言見眚皆指見之本體非謂有智眚人當於此而照驗聖言正以此體本來離妄所以到下文纔覺即離更無留難故知詳應之科雖足例意而正為下釋悶張本也此阿難所見身境等即有兩重難知一者難知其為別業以己見與眾不異也二者難知其為妄見以又因同見實信其必有也故以前眚影中兩重易知者而例之以知焉問身境同見何以類眚影之別見答眾生依自心法界而迷起夢境法界唯心夢境非有故為別為虗見同眾人不過業同同見耳豈同外教共一而實有乎譬如千燈一室各別光滿又如羣瞖觀燈似同輪而實各病及其一人愈而只消一人之輪始知非共一而非實有矣就所例法進退合明已竟三結見見即離釋迷悶圓覺云知幻即離正同見見非見故科名擬之分二一令取上義轉釋取上覺緣非眚一句之義轉釋前見見非見之迷悶也又分二一用上顯離覺所覺眚覺非眚中覺所覺眚即上覺緣二字覺非眚中即上非眚二字意謂覺本是真眚本是妄未覺眚時覺常墮於眚中纔覺是眚覺早出於眚外故別業中許多發揮只為成就此二句意在顯其真本超脫釋前迷悶之情也二轉釋前語此實見見云何復名覺聞知見實字亦即字之意見見乃是前語上科覺字即上見字眚字即下見字故覺眚即釋見見非眚即釋非見意云覺眚即脫於眚便是見見即脫於見云何復名為見我所以言非見也兼聞知覺者一體同具也為因見見難省故變字轉顯非兩法也二令對目前會釋指向目前便類宗通更加說破仍歸教意又二一通指是眚者釋妄見是故汝今見我及汝并諸世間十類眾生皆即見眚非見眚者見我者即觀佛相好也故知自惑未除雖觀佛勝相亦是眚影及汝者指阿難自身也世間即上山河國土十類眾生同前十種異生皆即見眚者皆即見上之眚病也非見眚者非是能見眚之真體也此二句判定是妄非真矣二別指非眚者釋非見彼見真精性非眚者故不名見彼者指法之辭見真精者即能見眚真精也又解彼見仍指妄見真精方目真見而此真精是彼妄見真實之體故曰彼見真精性非眚者言是乃性體而非眚妄也此二句判定是真非妄矣末句結歸釋疑夫妄非真而真非妄故知真見性本常離於妄我所以謂真見見于妄見之時即脫於見而不可復名以見也汝何迷悶于此哉是則世界眾生既惟自心別業妄影則凡夫不必欣上厭下種種取著二乘不必怖有淪空種種厭離速惟務求見見而除一己之深惑即不墮於妄身境矣此於三道中初悟惑道了三本空猶是近離而非遠離遠離之意在後同分尾中例明別業已竟二例明同分分三一舉能例法進退合明舊說進退合明單屬此科首六句蓋因其文有往復之狀而成誤也以致管見踵之欲以取前標辭加於此科之上而并將全科移於本覺常住之後復取前云何名為同分一節經文補置此處則三番進退及首尾相收之旨俱失之矣若更依彼法喻參之謬亂尤甚傳講者畏於悖註而敢於違經痛宜戒止且今詳究經文毫髮不錯由是曲順本意解之仍於各文詳申其故智者請加研味庶有發明當知此科乃是第二番進退合明若依前義分屬進退此屬退以合明蓋退後同分以合明前之別業也此亦容易省會分三一促舉前法阿難如彼眾生同分妄見上文別業未例之前先促舉云如彼眾生別業妄見今此同分未例之前亦促舉云如彼眾生同分妄見顯然對待誰敢妄移蓋總以舉前一國所觀種種灾象也然此科具能所二例若遠對後科例閻浮等則此為能例彼為所例若近對本科別業妄見則此為所例別業為能例所以難省其故至下自見請先記之二取例別業問灾象既為同分易知之例即當直以例後閻浮提等何必又取例於別業答前文促舉之下即以牒定眚妄者全以牒前詳示妄因科也蓋必妄因成而後可例下身境之同妄矣今此促舉之下亦當牒定妄因其柰前之災象文中元缺詳示妄因佛意不欲另示妄因正欲留待此處取例於別業之妄因焉所以無牒辭而加取例耳問何故如此答眚影灾象雖皆易例而灾象比於眚影稍似難知故此亦是以易例難令知同彼眚影一例虗妄然後妄因成而可以例下閻浮等也後問略同吳興又二一逆以取例例彼妄見別業一人蓋先舉能例後就所例乃為順例今翻以所例倒就能例故曰逆以取例逆即退也故約前義屬退合明問何故如此答促舉同分之易知將以例後同分之難知故不得不首舉同分以對前別業中促舉之科然特為自缺妄因須取例於別業又不得不退就別業而逆取之矣二順以釋成上文不得已而能所倒置終為不順理須回文釋之故曰順釋問豈非依舊進合答但望促舉之科能所顛倒畢竟是退又復曲分二一回文標同一病目人同彼一國依舊以能例別業居先所例同分居後而略以標同下科詳以例出矣二例出妄因彼見圓影眚妄所生此眾同分所見不詳同見業中瘴惡所起此舉別業但惟眚影是其妄因以例同分但惟瘴惡是其妄因豈有天象之實體哉三合明同本俱是無始見妄所生惟此俱是二字無有二說但依後義雙舉燈輪灾象而言其俱是等也正因此處推知前之皆是後之同是咸有進退合明之義生謂轉生恣生也據現前雖皆一時之事而展轉推本故俱是無始見妄從本恣末而生也進退合明者進燈輪以合明灾象則灾象固一國之眚醫也退灾象以合明燈輪則燈輪亦一人之瘴惡也故曰俱是無始見妄展轉恣生矣二就所例而進退合明上之一國灾象既例眚影妄因已彰即為此節能例之法而此閻浮等乃為所例由是就之而進退合明矣此即第三番進退合明若依前分屬之義亦是言總意別但屬進以合明謂進前一國灾象合明後諸剎也若依後義正齊分二一普例世間分二一器世間又二一從狹至廣例閻浮提三千洲中兼四大海娑婆世界并泊十方首一例字正承上同分妄因以為此節之能例故也海本是一因須彌四面有四大洲故海亦隨洲稱四大也裟婆世界有百億四天下本師一佛剎土耳十方則諸剎土無量無邊沙塵莫盡其數二總標有漏諸有漏國諸字總指廣狹諸土有漏義見前無漏下對當機且指同居二情世間及諸眾生即上諸國眾生也合情與器二種世間皆自心與眾同分所見之境不取眾人皆為能見也普例世間竟二合明同妄復分為二一合明前六字同是覺明無漏妙心見聞覺知虗妄病緣若依前義則同是二字亦惟徧舉諸國而言同是無漏等此乃合前能例中俱是無始見妄六字也但彼只言無始見妄而不言所依之真此則覺明無漏妙心乃其所依之真見聞覺知虗妄病緣乃其所起之妄承上例下云此之十方各所見世界眾生雖各種種不同與彼一國所見不祥同為一例同是云云覺明無漏妙心即是在纏之體覺明不必泥作無明應是覺湛明性此自其本淨而言無漏自其無染而言正反於上有漏也蓋其體非無明不屬諸有而又欲境諸見逈不相干故也總此本淨不染二意故曰妙心持業釋也見等皆指妄者而言連下虗妄病通為一顛倒分別見妄而兼聞覺知者一體所具也此所謂能生諸緣緣所遺者而緣之一字即指上世界眾生如云此諸世界眾生皆即見等妄病之緣而已二合明前二字和合妄生和合妄死合前能例中所生二字也但上無死字意亦深含然此死字意是滅字方通無情蓋通本上來必兼依正世界則成住壞空眾生則生老病死二俱言和合者言生不自生以和合發起故生滅不自滅以和合終盡故滅也然既虗妄病緣所為則於本無中而妄見生滅故皆曰妄耳又當知二乘見界內是生界外是滅矣上解但依前義分屬有進無退若依後義進退兼具應云進一國以合明於十方則塵剎固即瘴惡之虗陳退十方以合明於一國則瘴惡亦即生滅之妄現故結之曰同是覺明等此中亦有兩重難知一者難知為同以淨穢苦樂逈別也二者難知為妄以與塵剎見同也故以前瘴惡中兩重易知者而例知焉問隔異無干何為同分現見各有何為我妄答自心無明稱法界而無際一切生界依無明而住持故見生界未消殞者自心無明未除也無明未除則無邊生死皆同分耳可同凡小苟安自足謂無干乎譬如病目見華遍空同我眼病豈以近遠而分自他虗實乎此小註與前別業小註中意亦是破迷要義但經文前顯後隱故小書之以備觀就所例法進退合明已竟三結離見即覺教取證圓覺云離幻即覺即同此意故科名擬之敵體番上文同是等而了前大標中總出之過以結歸也上是從真起妄此是反妄歸真分二一離見又曲分為二一離見緣若能遠離諸和合緣及不和合番上緣字及和合二句而了前標中當處二句也意曰生滅深惑雖由見妄而業果循還現溺見緣若能首先遠離云云遠離者了知苦果皆由業招妄招妄現於是不造諸業斷世生緣即遠離諸和合也既不趣生亦無老死即遠離不和合也若兼二乘則不見界內為實有即離和合不見界外為真滅即離不和合也斯則業果二道先已息矣二正離見則復滅除諸生死因番上見聞覺知虗妄病而了前二種顛倒見妄也蓋二種見妄正無明深惑即業果由之以起乃生死親因也滅除之者即後耳根圓通中斷二執證三空窮至生相而惑道竝盡矣三道既盡齊此屬於反妄二即覺又分二一極證二果圓滿菩提不生滅性菩提是智果見妄除而惑盡故圓滿智果不生滅性即涅槃是斷果見緣除而業果盡故圓滿斷果二永斷輪迴清淨本心本覺常住此即完復上之覺明無漏妙心而了標中輪迴世間矣然涅槃由斷尚帶修心菩提由智亦兼始覺今復言本心清淨本覺常住者表二義一表皆但還復本有非從外得二表要必圓滿涅槃而後本心清淨圓滿菩提而後本覺常住性修雙即而前所謂輪迴世間者於此永絕矣二科皆屬歸真是則別業後釋迷悶中全顯此心不變之體常自離妄而極勸人之了悟同分後教修證中全顯此心隨緣之用與妄相應而極勸人之修證修無了悟則畢竟鈍滯無歸悟不修證安得現前受用修心者務請不取見緣不隨見妄而觀塵剎依正全影全心念念不昧是謂常住三摩地中固知取證無疑而庶不負佛詳勸之至意矣釋其迷悶已竟二開其未開前阿難述意以請中先述未開後述迷悶而佛與先釋迷悶者先其所急也今迷悶已釋次應開所未開矣分二一牒前述意又分為二一牒已開阿難汝雖先悟本覺妙明性非因緣非自然性先之一字遠指之辭分明指前超情科中先悟也舊註欲以成就重拂之說乃釋為二見中度其已悟是不以己意曲從經文番以經文曲從己意未敢聞命二牒未開而猶未明如是覺元非和合生及不和合二逐意發明又二一破和合又復分為二科一總舉妄惑阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者以前塵問者對前塵而辯問也語兼因緣者驗旨趣之相關也言此本是世間之義汝乃泥之而疑菩提心亦和合耶菩提既帶證字作佛果亦可心字仍指本覺蓋佛果依本覺心而始證故本覺即是證菩提之心二別為破斥分二一破和和者如水和土之類又分二一舉法標列則汝今者妙淨見精為與明和為與暗和為與通和為與塞和仍用見精者以真見無別異體況此現與明對得以施辯矣二破一例餘又分二一破一又分為四科一不見和相若明和者且汝觀明當明現前何處雜見見相可辯雜何形像可見曰相見相可辯者言所見之相分明可辯也即指所對明相而言言彼明相雖分明可辯若言見與之雜何有交雜之相可見乎不可釋辯為分以可分即墮非和也而況理實不可分乎二不具和體實質曰體又分二一離即雙絕若非見者云何見明若即見者云何見見凡物之雜和者必先相離而後相即乃得成和今離即雙絕何由而成和乎文中非見即非皆望明相為言初云此明若非是見則應無所矚今乃云何見明是初無相離矣次云此明若即是見則見不自見今乃云何見見是後亦無相和矣然此科方是無和體之由也二躡成破意必見圓滿何處和明若明圓滿不合見和此科方正破無和體也躡前云此明既不非見則全體皆見而必見圓滿何處容明而與之和乎既不即見則全體皆明而必明圓滿更不合容於見而與之和矣三不得和名見必異明雜則失彼性明名字召體曰名性本也言此見若果先異明而後雜明即當失彼本明名字另立名字如水被土雜而另名為泥也今何但名為明而無被雜之異名乎四不成和義雜失明性和明非義孚名曰義首句躡上起下言既被雜已失明性則本明既失即不當仍謂之和明今仍謂之和明非其實義矣破一已竟二例餘彼暗與通及諸羣塞亦復如是破和已竟二破合資中曰合者如蓋合函之類又分二一舉法標列復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合二破一例餘又二一破一又分為三科一正破合明若明合者至於暗時明相已滅此見即不與諸暗合云何見暗溫陵曰合則附而不離故合明既不相離則明滅隨滅不復合暗既不合暗憑何以見於暗乎二防破轉計若見暗時不與暗合與明合者應非見明恐轉計之云前見明時實與明合今雖見暗却不與合乃破之云若見暗時不與暗合是既見時不合則必合時不見是故汝前言與明合者應非見明三躡歸正破既不見明云何明合了明非暗言明尚不見云何與明合而知明非暗乎二例餘彼暗與通及諸羣塞亦復如是破和合科已竟二破俱非又復分為二一承示轉惑阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶妙覺元既屬根中之性此句標根次句兼塵次句該識正辯根性連帶塵識非則俱非也真際曰和合不成即非和合形對必然也二逐意發明分為二一牒惑示問佛言汝今又言覺非和合吾復問汝二別為破斥又復分為二一破非和又曲分為二一總各標列此妙見精非和合者為非明和為非暗和為非通和為非塞和二破一例餘分二一破一又三一定其有畔若非明和則見與明必有邊畔體相雜入既謂之和故體不相入方為非和如磚石竝砌二體各不相入而中間必有邊畔故先定其邊畔也二索其畔處汝且諦觀何處是明何處是見在見在明自何為畔倘許有畔即對見明索其指出三攝成破意阿難若明際中必無見者則不相及自不知其明相所在畔云何成言縱有邊畔則亦如磚石之不相入見中無明明中無見今以見望明為辯故單言明中無見則已不知明在何處齊何處而分畔故云畔云何成不成畔義則自不成非和義矣二例餘彼暗與通及諸羣塞亦復如是破非和已竟二破非合又分二一總各標列又妙見精非和合者為非明合為非暗合為非通合為非塞合二破一例餘分二一破一又二一明其乖角若非明合則見與明性相乖角如耳與明了不相觸非合即離故逈不相遇方為非合故經自喻明之與耳也如人合目以耳聽明終不知其所在豈非了不觸乎二躡成破意見且不知明相所在云何甄明合非合理二例餘彼暗與通及諸羣塞亦復如是此後無結尾者以本屬前超情科中餘意故不另結必欲結之可准前文云當知如是精覺妙明非和非合非不和合乃至隨汝執捉自此顯見已極而奢摩他從根指心方便亦盡向後轉名如來藏性不復呼為見性之偏名矣問上既帶妄未顯純真剖妄之後似當更顯何但補超情尾而更別無說乎答此有二義一者純真言語道斷故此蓋不但見性諸法窮至真際皆不可說經云諸法寂滅相不可以言宣等其文非一二者前文已即顯真故謂若依方便言顯無言則前表見即識精明元真妄和合則十番所顯即其本具之真何干於妄二見所破即其本具之妄何礙於真況先顯後破別有其故前已表明豈可因其未及除妄而遂疑所顯非真耶倘必疑佛顯真非實亦應疑佛破妄是虗破顯俱不信受是外道非佛弟子三者後不出此真性故良以四科七大所顯如來藏性非別有體即此見性轉名藏性耳豈可謂此後更別無說乎又此科可以為理法界之由致若不由此方便從於根中識取迥脫根塵廣大寂常靈知之自性將何以入真空絕相之法界耶然但謂之由致非惟約此即為理法界也剋就根性直指真心已竟二會通四科即性常住四科即五陰六入十二處十八界也前科言寂常妙明之心最親切處現具根中故剋就根性直指真心然雖近具根中而實量周法界遍為萬法實體今於萬相中一一剖相出性是以齊此不復稱其見性之別名乃舉其總名曰如來藏心妙真如性但是總別異稱體惟一而已矣分二一總為剖出剖謂剖開相之妄出謂顯出性之真又二一剖出但知虗法此一類法顯然不實人皆易見然凡外權小亦但皆知其相之妄而實皆不達其性之真故佛特為剖相而出性焉又二一舉法自相阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡蓋上文妄見即見之相妄也真精即見之性真也故此承上言不但見精相妄而性真汝猶未明云云然此科且舉其自來本相而未明真妄開妄出真在下科中浮塵幻化如陽𦦨空華乾城夢境與上文燈輪灾象皆是也當處出生言來無所從隨處滅盡言去無所止也二剖相出性幻妄稱相其性真為妙覺明體首句剖相幻妄猶言虗偽也稱即名也言其徒有虗偽名相而已末二句出性也言彼實無自性其性即眾生妙覺明之實體而已無相而能現相故稱為妙覺明准前即覺湛明性良以妙覺明體如鏡浮塵幻化如鏡上之影影雖至虗離鏡則無故全影即鏡是知影之體即鏡體矣所以諸相至虗偽者其體皆至實以其即妙覺明體故也然先以開出乎此而後以例明陰入等法者有二妙義存焉一者比類知妄謂因幻化等相不實而知陰入等相不實也二者比類信真謂彼等至虗之法尚是真覺之體況此陰入等法猶非真覺之體乎皆信之無疑矣二剖出似實有法此一類法與前法雖皆依他起性而則法人易識其為虗斯法人難覺其為妄是故凡外執為實有二乘計成心外大乘法相宗人猶言似有不無今之科名略依彼立惟圓實宗人方了依他無性即是圓成茲佛剖相令知依他無性也出性令知即是圓成也分二一歷舉諸法如是乃至五陰六入從十二處至十八界承上言不但此等浮幻之法其相妄而其性真也如是乃至五陰云云此科且舉平日所談諸世間法以推論性相亦是不離目前令見實相也五陰即色受想行識六入即眼耳鼻舌身意六根也十二處即前六根加色聲香味觸法六塵也十八界即六根六塵更加眼識耳識鼻識舌識身識意識之六也別經三科此加六入而已各盡萬法不過色心二字對機開合故廣略殊至後詳釋二剖相出性又二一觀相生滅全妄因緣和合虗妄有生因緣別離虗妄名滅因緣解現前超情科中今惟解明色陰餘可例知如五根六塵合為色陰須於前世對此諸法取著薰種納於賴耶識中所謂因也至於中有自求父母之時即父母為境引發憎愛所謂緣也此固因緣和合由是在胎而結五根出胎而住六塵名之為生若深究此生亦同夢等來無所從當處出生故曰虗妄有生然此因緣本是生滅之法隨前業力而為修短之限限盡即當分散此固因緣別離由是五根六塵一時俱失名之為滅若深究此滅亦同夢等去無所止隨處滅盡故曰虗妄名滅色陰如是餘一切法亦復如是二論性即妄皆真又二一妄本是真殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性生滅去來者蓋入處界不過色心二法約色則有生滅約心則有去來言此生滅去來既皆虗妄既無自體而所以能現乎此者果是何物當知本如來藏云云如來藏總目眾生本覺性體言眾生心中隱覆如來故名如來藏即起信論中之一心也一心開二門一者心真如門二者心生滅門眾生順生死流故生滅全顯而真如全隱然生滅無體而其體全是真如故佛明此生滅去來即眾生如來藏中妙真如性隨緣詐現而已其常住等八字皆稱此真如之德也本無生滅曰常住不滯明寂曰妙明本無去來曰不動不徧空界曰周圓常住不動離於凡夫之生死妙明周圓揀於二乘之涅槃此固各就多分若確論則仍各全揀復兼權乘具此眾妙故曰妙真如性亦即前十番所顯見性之全體也二真本無妄性真常中求於去來迷悟生死了無所得言不觀妄是真如故妄似有體今既是真常性體則去來迷悟生死於真常中亦是幻妄稱相杳無實之可得矣如覩鏡中之物不知是鏡中之影固悞謂有體纔知是鏡中之影則惟鏡而已豈復有一物之可得哉添迷悟二字約人即是凡聖約法即生死涅槃蓋迷悟在人而理中實無迷悟之體可得如迷東為西者從迷至悟東常不轉何有真實迷悟差別之體哉總為剖出已竟二別為剖出即前四科一一詳列而剖出也就分為四一五陰又復分為二科一總徵阿難云何五陰本如來藏妙真如性陰字去聲蓋覆也新譯五蘊謂積聚有為今從舊譯謂蓋覆真性也二義兼之始備此蓋合色開心為愚於心不愚於色者說耳然徵問之意以陰等本是世間有為之法今上科一旦許即藏性故須徵起釋明然妙真如性影略常住等義後皆倣此二別釋分五一色陰既合五根六塵為一色陰則非惟色身亦兼器界又復分三一舉喻合法又二一舉喻又分二一依於本無阿難譬如有人以清淨目觀晴明空惟一晴虗逈無所有二起成有相其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相金剛以無相為非相故此以華滅為非相蓋見空華者非但見生亦見於滅其曰復有一切取喻良多後當釋出自見矣二合法色陰當知亦復如是以妙覺明圓照法界如以淨目觀晴空也清淨本然一法叵得如晴虗無有也此其所依之真合喻中依於本無性覺必明妄為明覺如人無故瞪目也勞久發塵而十一色法彌滿亂生如虗空見華也四空與舜若多神乃至二乘涅槃妄解色滅如見非相也若無此破彼等妄謂離於色陰矣此其所起之妄合喻中起成有相二就喻詳辯又二一標非二處阿難是諸狂華非從空來非從目出雖以目喻覺明空喻法界然如珠自照本無二相目空誠有二相合此詳辯稍不能通懸求佛意但是以目觀見身界無異觀見空華故辯得空華無所從生無所還滅則身界自可信解然立此兩處亦非無旨空來破凡小計色從心外有也目出破權教不忘色從心內生也問萬法唯心何又破從心內生乎答法雖唯心而實亦不曾生故終亦無所滅此圓頓人一悟無生全妄即真權人不忘法從心而有生故須滅妄始真請詳下目出之破當自見矣二分文各破又二一非從空來又三一出必有入如是阿難若空來者既從空來還從空入二不成空體若有出入即非虗空莫說實體但約虗空既無內外自無出入凡有出入即不成虗空矣三不成空義空若非空自不容其華相起滅如阿難體不容阿難首句方言便是實體蓋轉一步也次二句謂華本空體今空既非空則自不容於自體之華方合下喻蓋由虗空以容為義無所不容豈自華亦不容乎自字與容字俱重末二句以喻明喻言自體不容於自體決無是理與前十九界七塵同意乃必無之事也此是展轉不通之義說畢取次結歸云既無自不容自之理則無空不容華之義不容之義不成則非空之體不立非空不立出入何憑而計從空出者無有是處矣就喻順解已竟若約法中計色從心外有者亦說色法俱從空出西域凡小推論身界成壞皆是微塵聚散而析塵無已必至虗空故執諸色皆從空出此方儒道經書不一而意旨皆謂虗以生氣氣以成形是萬相固本於一氣而一氣乃始於太虗質之西域則從無而有旨趣大同然法喻既皆虗空則其出入破法准喻無異大柢世智不達太虗何所從來身界豈窮根本但見萬有皆從無起遂謂無為有源豈知非其源乎二非從目出又分為三一出必有入若目出者既從目出還從目入二約入以破雖出入竝言而破意不在出字惟在旋字故曰約入以破又二一有見即此華性從目出故當合有見若有見者去既華空旋合見眼二無見若無見者出既瞖空旋當翳眼言體既無見而徒能遮障則旋豈不翳於眼乎三約出以破又見華時目應無翳云何晴空號清明眼若果華從目出則凡見華者華已出目皆當無翳而號清明眼何今見必睛空一無華相然後為無翳而號清明眼乎准此破色從心生者云迷時色既出心悟時色應入心有知入當見心無知入當障心又迷者色出心應無障悟者色入心應有障云何無障然後號清淨心乎思之三結妄歸真是故當知色陰虗妄本非因緣非自然性二處求之既無從出足知虗妄本無生體曰虗循業偽現曰妄此句結其相妄末二句即是結其性真如云相既虗妄而能現者竟何物乎本即是非因緣非自然之妙真如性也然非因等即前常住等蓋常住不動則體恒無變故非因緣妙明周圓則隨緣遍現故非自然夫性本非外豈從心外而有性本無生何曾心內有生此二處所以俱非也大異舊說智者著眼下皆倣此色陰已竟二受陰此下開一心法為四陰也前三即徧行心所行陰即思後一仍合八識心王略開為四耳今此受者領納為義唯識云領以為境令生覺受數不出三謂對違順雙非之境而生苦樂捨之三受焉又分為三一舉喻合法又二一舉喻又二一依於本無阿難譬如有人手足宴安百骸調適忽如忘生性無違順此就自法為喻也以所用即身識領受觸塵但事出假設受局一識故得為喻耳無違順但無苦樂二受忘生正是捨受喻故淺言二起成有相其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相本無外塵觸之而妄覺瀝滑等也二合法受陰當知亦復如是以其喻即自法故不必法喻配合但當了喻之妄而會法之妄也夫藏性無受如人晏安迷生諸受如摩覺澀等二就喻詳辯又復分二科一標非二處阿難是諸幻觸不從空來不從掌出四陰皆心眾生認為己靈不同色陰計從內外但計實有今亦以二處無從顯其虗而非實耳或以根塵分配亦可思之二分文各破又二一非從空來如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸二非從掌出又三一約出破之若從掌出應非待合此不待合與下不同蓋言掌能出觸則孤掌即出何須待合乎二約入破之又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤跡反顯既不覺入自然非掌出也三出入破必有覺心知出知入自有一物身中往來何待合知要名為觸此觸之自體既能往來則無時而不可出何須待合乎此約出入故不同上三結妄歸真是故當知受陰虗妄本非因緣非自然性准前可知受陰已竟三想陰唯識云想能安立自境分齊前五隨念第六計度七八憶持然各緣各境故有分齊憶持謂於境領納之後攝其全體印持不忘與間斷浮想不同分三一舉喻合法又分二一舉喻阿難譬如有人談說酢梅口中水出思蹋懸崖足心酸澀此亦就自法為喻也作喻故單取意識之懸想而已二合法想陰當知亦復如是例諸想皆同於此可見目前身界為想所分別憶持者皆如念中之酸味思裏之懸崖本非實有而堅滯不忘者想陰覆之也二就喻詳辯又分三一標非二處阿難如是酢說不從梅生從非口入酢說語略謂酢說所引之水也二展轉推破如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出生入皆指水言梅不談則非梅生口不聞則非口入耳不出則非耳致但追究得此水無所從來自顯想陰不實矣三比類發明想蹋懸崖與說相類酸澀同上口水應云崖不思則非崖生足未觸則非足入心不酸澀則非獨由心酸澀無所從來足顯想陰之虗矣三結妄歸真是故當知想陰虗妄本非因緣非自然性准前可知想陰已竟四行陰唯識此陰即徧行之思亦即業行於百法中攝法最多遷流為義分三一舉喻合法又分二一舉喻阿難譬如瀑流波浪相續前際後際不相踰越不相踰越者前不待後後不及前也二合法行陰當知亦復如是此陰常解謂心心不住念念遷流而實有麤有細若究其根心潛伏之本乃比前二為細如後經言生機綱紐是也然內由此念則外之造業趣果無量麤相似瀑流之不可遏故約迷途則細隱而麤彰約修位則麤盡而細顯今約迷途故譬彼瀑流矣又既屬於徧行則各識皆具麤屬前六細乃七八耳二就喻詳辯又分二一標非即離阿難如是流性不因空生不因水有亦非水性非離空水首三句總是非即意首句又是非即空而次二句又是非即水也然因水尚疎謂因彼生此如父子非一水性即親為自體非水性者謂非水一定之性也末句非離意總番三句也二分文各破又二一非即空水又分二一非即空如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺二非即水又分二一非即因水若因水有則此瀑流性應非水有所有相今應現在性應非水者言體應不與水一也有所有相者言若別有自體也二非即水性若即水性則澄清時應非水體性當一定故有流既為水性無流必失水體矣三非離空水若離空水空非有外水外無流言此流於空於水皆不能離空非有外豈能離空水外無流豈能離水乎就喻順釋已竟若約法釋則空喻外境水喻內心流即行陰若計境生則境應有知一切無情悉能有念若計因心則應別有自體若計即心本性則行陰盡者反失心性行豈即心境乎若計離於心境則境實無邊而心外無行行豈離心境乎思之三結妄歸真是故當知行陰虗妄本非因緣非自然性准前行陰已竟五識陰分為三一舉喻合法又二一舉喻阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國虗空喻識足知非破無體無性但破其無去來耳良以八識全收八海七浪而八非畢竟無體之法其體即藏性也厥旨深哉頻伽譯好聲鳥也瓶形象之二合法識陰當知亦復如是孤山曰瓶喻妄業空喻妄識業牽識走如瓶擎空行捨身受身如餉他國愚謂但約現身尤益日用身即喻瓶空乃喻識千里萬里但是身之往來識常不動以總攝藏識識海周徧矣二就喻詳辯又二一標非來入阿難如是虗空非彼方來非此方入二分文各破又二一非彼方來如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空去字亦是來字譯之誤耳於本瓶地者彼方元置瓶之地也二非此方入若此方入開孔倒瓶應見空出捨身如彼方來而前身之識未甞少受身如此方入也而後身之識未甞來問識以了別為義死身現無了別何言非少生身現具了別何言非入答周徧約冥具之體了別約迷中之用體常不動用可牽移然而迷則任牽悟則同體佛正欲眾生悟全體而周大用故喻識如虗空令知身死非去未死之先本不偏局於此也身生非來未生之先本亦常徧於此也但因不了互成明昧業遷使然今了徧周勿順妄業更於現身往來萬里不隨身轉常冥不動之體色盡洞開無復明昧矣三結妄歸真是故當知識陰虗妄本非因緣非自然性准前通論五陰色想皆據當體而破受據所受之塵以破行識皆據妄狀而破然前四破無自體後一但破往來又雖破其相妄實皆顯其性真五陰已竟
