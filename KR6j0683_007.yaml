惡而略兼後二人天教正惟生善而略兼後一諸雜趣正惟歡喜謂且救護拔苦令其生喜亦可漸向上三矣今獨論祕呪四悉諸師所列皆從劣向勝為序一世界歡喜者謂隨方利物如持之以脫難求財等而天台所謂誦神王名部落驚懼者但脫鬼難一途而已二為人生善者如未得戒者令其得戒未精進者令其精進等而天台比於軍號相應無所訶禁者亦明生善無礙而已三對治破惡者如令淫心頓歇等而天台譬彼貧人詐瞋聞偈頓息者亦以喻明誦呪之人不自知其惡破之由也四第一義入理者如入無生忍等是也而天台喻以智臣解語餘人不知者亦但喻其呪力發悟之由人所不測也大端明祕密四悉利益非如顯教可知其故若可測知何貴祕密行人但當確信堅持無勞思議也正說神呪已竟二說呪利益分二一諸佛要用可見非但衆生離此呪而無賴諸佛離此而亦缺用多矣又分為三一指示全名阿難是佛頂光聚悉怛多般怛囉祕密伽陀微妙章句頂光聚三字據實元於頂光化佛說之仍各有表頂表尊勝光表威靈聚表神用伽陀明其呪中有頌大段曰章如分五會是也細分曰句微妙者明其隱微奧妙不可測也二備彰諸用又三一總標因果出生十方一切諸佛十方如來因此呪心得成無上正遍知覺出生二字明作密因得成二字表助極果見佛初心究竟皆不能離誠要用總相也二別列要用又復分為六科一降魔制外用十方如來執此呪心降伏諸魔制諸外道以呪威力令無惑亂也二現身說法用十方如來乘此呪心坐寶蓮華應微塵國十方如來含此呪心於微塵國轉大法輪乘者依憑之意呪心者但依吳興通指全呪為呪心即心呪之謂也蓋祕密藏中精要之法故稱呪心若是則心字是喻類如般若心經之心非指悉怛等六字為心也彼是呪名耳又詳跢姪他乃即說呪曰則唵字以下方是正呪不過八句三十四字前皆三寶并諸外護威名及實語助呪之類若不能全持者可從唵字持之亦如準提九聖字之例是也坐蓮普應者現佛身成道相也含者內祕為本之意謂本此密理以演顯教也三自他授記用十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記摩授者謂以呪加持令必成佛此可喻於蜾螺呪螟蛉也自蒙授記者可見有持此呪者佛知必成佛道故授記也四救苦救難用十方如來依此呪心能於十方拔濟羣苦所謂地獄餓鬼畜生盲聾瘖啞冤憎會苦愛別離苦求不得苦五陰熾盛大小諸橫同時解脫賊難兵難王難獄難風火水難饑渴貧窮應念銷散此中所具八苦八難亦與常途別異尋常以生老病死配冤憎等後四為八苦今以三途及根缺配之為八也而又贅以大小諸橫盡其餘苦耳如藥師諸橫是也八難亦與諸經不同今以賊兵王獄風水火饑為八也饑渴即是饑饉又贅以貧窮亦盡其餘難耳五事師嗣法用十方如來隨此呪心能於十方事善知識四威儀中供養如意恆沙如來會中推為大法王子呪力能令四事具足及得他心故成事師之用又能開心通達法要故成嗣法之用六攝親轉小用十方如來行此呪心能於十方攝受親因令諸小乘聞祕密藏不生驚怖親因即歷劫親緣也攝受如提獎阿難是也祕密實乘必廢三立一小乘聞多驚疑呪力能令決了不疑也三總結始終十方如來誦此呪心成無上覺坐菩提樹入大涅槃十方如來傳此呪心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨前節從初成道以至入涅槃次節自正法以至末法皆憑呪力可謂始終全用不能離也三更明無盡若我說是佛頂光聚般怛囉呪從旦至暮音聲相聯字句中間亦不重疊經恆沙劫終不能盡此無盡方約諸佛要用已自無盡非並衆生用也諸佛要用已竟二衆生利賴此衆生理該九界文多就人二一別指勝名亦說此呪名如來頂比上全名此為略目獨稱佛頂特顯尊勝欲衆生至敬奉持勿慢易也二備彰威力分三一首示行人必賴以勸持又二一正誦方遠魔汝等有學未盡輪回發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處夫小乘三果以前未出分段故云未盡輪回此即如前欲入道場尅期取證者也不持必定招魔故前道場中教專持也今文不持下反言激勸必當持也由是而知一切行人誰不當持哀今世現見山中靜修叢林多廢持呪往往發風發顛縱不成顛亦多見於怖人媚人境界皆此弊也聖言豈有虗乎問何無菩薩答此有三義不缺菩薩一者佛用已該如自果未成蒙佛授記事善知識推法王子是也二者借名該大如七信前借小聖名十地去為大羅漢故知圓通道場取羅漢者決菩薩根性及己回心而非定性也三者生有深位如決定菩提了知沙劫悟無生忍何非菩薩二開許不誦書帶阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白㲲書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害白㲲天竺之物紙類也有價直無量者此土無之二詳伸護生助道以出由所以必勸持帶者正由力能護助故曰出由又前勸持中略說助道護生故此言詳伸也又二一總標二意阿難我今為汝更說此呪救護世間得大無和成就衆生出世間智末四句二句護生二句助道也二別列多功分二一約衆生以顯各益又三一救護災難又為二一紀時指人若我滅後末世衆生有能自誦若教他誦二正明救難分二一惡緣不能成害當知如是誦持衆生火不能燒水不能溺大毒小毒所不能害二惡生不能加害分二一不能加害又三一加呪不著如是乃至龍天鬼神精祇魔魅所有惡呪皆不能著二加毒即化心得正受一切呪詛厭蟲毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味溫陵曰金銀入藥或能發毒心得正受呪力持成三昧也問上却惡呪何不須於正受答惡呪非形磈之物可以正呪遮令不得加身何須自身三昧今有形之毒已入身中非自身三昧安能化為甘露故須正受三起惡不得一切惡星并諸鬼神磣心毒人於如是人不能起惡二仍加守護頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護溫陵曰以誦呪利彼故諸惡鬼王皆領深恩救護災難已竟二助成道業分六一資發通明為下諸科張本不先發通明則隔陰多昏豈能長劫脫惡生勝以至證果乎又分三一明聖眷護呪阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍約果德皆深位菩薩約現身則力士奮威之相蓋護灾鬼神可以與力助道非菩薩不可是以首明菩薩陰侍二舉散心亦從設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子此約悠悠修行之人未決定常住三摩地者但常持呪故亦隨從非放逸穢惡之輩三況菩提心人又分三一先以標人何況決定菩提心者此須常住三摩中而又持呪希求速得圓滿菩提是也本經所宗即耳根圓通為妙三摩提二冥加開發此諸金剛菩薩藏王精心陰速發彼神識菩薩能以神力加被令人心開陰暗速催也良以菩薩心精與行人心精通吻一體無二而菩薩心力兼彼呪力故能暗催行人令其開心矣三圓證通明是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑溫陵曰即所謂成就衆生出世間智也記憶雖但似於宿命然河沙紀劫而又云周遍決洞三世且了知無疑似涉三明何況沙劫逈超小乘八萬當知仍是菩薩殊勝六通三明矣二遠離雜趣生雜趣中或染惡習或墮重苦深妨道業修心人皆發願不生雜趣故此科在助道業中分三一標時至果從第一劫乃至後身第一劫初發決定菩提心時後身即因滿降生成佛之身可見全為中間修行時得無妨礙也二不生神鬼生生不生藥叉羅剎及富單那迦吒富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處藥叉羅剎等現觀音圓通富單那加云迦吒者亦眷屬類也三不生貧賤是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處背念曰誦圖印曰寫密佩曰藏貧則困苦賤則役苦皆妨道業離不可樂定生可樂也長水曰以持尊勝也三常生佛前常隨佛學修證必速分三一共佛功德此諸衆生縱其自身不作福業十方如來所有功德悉與此人此科尚是生佛界之由以多福德因緣方生今持呪能感諸佛惠錫功德故得定生彌陀經謂念佛即是多福當由慧錫二共佛生處由是得於恆河沙阿僧祇不可說不可說劫常與諸佛同生一處由是者由前佛錫功德故得常共佛生也三共佛熏修無量功德如惡叉聚同處熏修永無分散此方生後功德既常隨佛凡佛功德一一有分故得生必際會親炙熏染長劫而不離也四衆行成就又分為五一成具戒律是故能令破戒之人戒根清淨未得戒者令其得戒二成精進行未精進者令得精進三成智慧行無智慧者令得智慧四成清淨行不清淨者速得清淨五成齊戒行不持齊戒自成齊戒人有宿障屢欲齊戒不得成就呪能成之或業礙地礙及無師無壇不得齊戒許但持呪同於齊戒諸罪消滅分為四一破戒罪滅又分二一輕重齊銷阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時消滅溫陵曰未受時者未持呪時也可見持呪之後不可更造也二食噉並宥縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過此有三說酌量觀經之一字似未持之前經過之事持呪之後悉皆宥之非持呪之人縱恣無度也又或持呪人有不得已偶經此事竝可宥之亦非縱恣也或真慈開許不能具齊戒者亦聽持之旋可消罪如水投湯之喻顯呪殊勝而已準前未受之語前二說理長若參四律三漸之文則真修希證之人清淨持之為上也二違式罪滅分二一不淨即淨設著不淨破弊衣服一行一住悉同清淨此亦行頭陀行清貧不備令持之勿疑非富饒故意為此二不壇即壇縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也前之壇法極難全備此許無壇持呪勿疑功德差別也況若更能常住大定是真寂滅場地當亦愈於徒有壇相而不具定心者矣三極重罪滅若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮此未發心持呪之前所犯可仗呪力滅盡不可更疑不盡決非令持呪無畏肆犯此惡也孤山曰比丘四棄即殺盜淫妄四根本重罪梵語波羅夷此云棄謂犯此者永棄佛法邊外猶如死尸大海不受也比丘尼復加四棄曰觸八覆隨即第五不得染心男身相觸第六不得染心男捉手捉衣入屏處屏處共立共語共行身相倚相期等八事第七不得覆他重罪第八不得隨舉大僧供給衣食即為僧所舉未作共住法者不得隨彼也通上故名八棄僧所舉者即舉訐之義也四極遠罪滅又分為二科一積罪未懺阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔二以呪滅盡若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯消雪解讀誦者不書亦可不解誦者書帶安置兼之尤妙六速悟無生不久皆得悟無生忍圓實初住便證此忍別教當在地上詳前發通乃是定心成就所發今悟無生乃是慧心成就所發前但了知不昧未必實證萬法無生應知後位深於前位況得此忍之後罪福皆空聖凡情盡可以魔佛一如方能遍涉苦惡諸趣而無礙無擇故知此科超前諸科而為助道之成功矣又所謂出世間智者發通成始而無生成終也按六料前四即為人生善悉檀第五對治破惡第六第一義入理也而前之救難後之應求乃世界歡喜悉檀也餘可類知助成道業已竟三稱遂願求前救難屬悲拔苦此應求屬慈與樂分二一生前願求分四一求男女復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多怛般囉者便生福德智慧男女二求長命求長命者即得長命三求果報欲求果報速圓滿者速得圓滿此中福利果報及修行果報似皆渾含若修行果報通上三悉大端助道業中已有修行果報此應多是福利果報四求身色身命色力亦復如是此是長命復兼聰明不衰百體康健者也二命終往生命終之後隨願往生十方國土必定不生邊地下賤何況雜形此約稱願故別於助道也約衆生以顯各利已竟二約國土以顯普益前明各人誦帶各得其益此惟書寫安置以普益合國合邑等此正世界悉檀也分三一諸難消除又分三一先舉難處阿難若諸國土州縣聚落饑荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地二安城迎供又分為二科一教以安呪寫此神呪安城四門并諸支提或脫闍上溫陵曰支提此云可供養處即淨剎之通稱也脫闍云幢二供佩身家令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地三結難消除一切災厄悉皆消滅二兆民豐樂阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五豐殷兆庶安樂此須約舉國咸知信敬或君臣守令悉遇知音教民敬重方獲靈通譬持呪者多久方靈暫時豈能速效此亦如是至敬方靈若也呪雖遍有束之高閣曾無敬禮或更置於偎褻之地塵穢不收而責呪無驗者亦惑之甚也餘皆放此思之三惡星不現分為二一略標亦復能鎮一切惡星隨方變怪灾障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢二詳釋又分為二科一釋諸星現灾阿難是娑婆界有八萬四千灾變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種灾異溫陵曰八萬四千應衆生煩惱業也二十八則四方之紀八則五行之經及羅計孛也順則福應逆則災應所謂惠迪吉從逆凶也能生灾異者亦應其逆而已如彗孛飛流應同分非星之為也二釋鎮銷方量有此呪地悉皆消滅十二由旬成結界地諸惡灾祥永不能入溫陵曰以呪力叶乎百順故惡變悉滅於天灾祥不入其境祥吉凶之先兆也二詳伸護生助道以出由已竟三承明行人必證以結勸初科勸持是舉初修却魔以示勸此科結勸明言決定開心是舉終證以欣勸也分二一承明故說保安承明佛說本意多為保安行人爾又分二一保護安隱是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安隱二遠離魔冤更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害二正示無過必證又三一舉現未之人汝及衆生諸有學人及未來世諸修行者二明不犯四過依我壇場如法持戒所受戒主逢清淨僧持此呪心不生疑悔四過謂一壇差二戒缺三師穢四疑悔犯一則難現生取證遠因而已故知前之開許非許真修之輩也三決必得心通是善男子於此父母所生之身不得心通十方如來便為妄語父母生身言不待後身方證也吳興曰心通者據前所說不出三義一者證果即端坐百日有利根者不起于座得須陀洹也二者發解謂縱其身心聖果未成決定自知成佛不謬三者宿命是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑矣如來重說已竟三會衆願護問呪自有力何勞人護答唵字後方為正呪前皆歸請三寶威力或各心呪以諸聖護生願同故也又有八部神王名號固亦有本願而兼遵佛敕且以護生功德嚴自果也至於凡類小神霑呪妙力脫苦得樂所謂皆領深恩守護也是以行人持呪自力又兼外護他力由是持帶功德巍巍不可測知矣問真慈之於行人無不可護何必令其持呪方護答呪有神功令其先生自力又假呼請為緣且呪如天子之敕故領敕者尊勝幹國諸王臣無不護之否則卑劣無幹莫之護也又持呪如讀書人必為世用王臣無不作養薦拔之不讀無用則養薦何施又行人如戰士呪如利刃甲胄諸聖如助戰之人故甲兵具者可以助其必勝不具則助何益哉略述少義足明呪護須兼持者可勿疑矣分二一外衆護持以具世間之相未標菩薩之號故云外也然其權實不定若權現則皆內祕菩薩外乃假名若實凡夫則外乃實號也又分五一金剛力士衆說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誠心保護如是修菩提者此現具執金剛身不同後之菩薩也修菩提者以持呪修耳根圓通為上後皆放此二兩天統尊衆爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願審猶果也一生如願謂令現生取證及心通也此入理悉檀若作事事如願即餘三悉矣三八部統尊衆復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿誓常護令大果速成就也四照臨主宰衆復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏師伯亦主宰統尊之稱年歲巡官即四直功曹之類特護道場者是於尅期取證之人倍護令不畏魔非全不護隨便修衆也五地祇天神衆復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事山海神川嶽主也土地地祗類也水陸空行舉三居以該多衆也萬物精祇如主樹木苗稼等神以上皆有形之類下該無形風神王似舜若多主空神也經云其形如風無色界天無業果色皆無形類也而同言稽首者或仗佛威光暫能現身也溫陵謂補全三界四大亦通但缺火神外衆護持已竟二內聖護持本跡雙彰故標內教之聖分三科一指人敘儀爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言證究竟堅固之理故稱金剛祕跡護持故稱藏慈威尊勝折攝並行故稱王菩薩是其常儀降魔則現持杵忿怒金剛之相故云爾二顯本久護世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩地正修行者功業久成即歷位斷證已極不取涅槃但不偏取寂滅而實圓住三祕密藏常隨下表其不捨衆生帶果行因以酬護生本願皆自顯其本三正明護持分為四一定散俱護世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人道場經行俱攝心正定之時即反聞自性入流亡所等時也乃至下亦是發心起修之後但初心間斷有時散心菩薩亦不以其散心而不護也由是而觀持呪修行之人亦當自知尊重不應作破戒穢行以仰愧於菩薩也二魔魅盡祛分為二一正明盡祛縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外大自在亦色界魔天二開除發心除彼發心樂修禪者彼指諸小鬼神發心好禪彼亦自護行人故不祛除許令親近三違越必滅世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵殞壞也寶杵擬之即碎不待觸擊孤山曰以上羣靈皆獲本心住首楞嚴能建大義示現菩薩諸天鬼神等像護持行人耳而言以寶杵碎首者若涅槃殺闡提仙預誅淨行皆由住無緣慈得一子地乃能如是四常令如意恆令此人所作如願如願準前自初喻華屋請修以至此文當為巧修正助周夫二修雖皆最初方便而耳門深入是為正修而道場持呪皆為助行是知方便修人自分利鈍二根根稍利者固不必道場等助而自可解耳根以入圓通如阿難是也根稍鈍而不能促入者方用後門助之問此既一周何無證悟之人答證悟在正行之末此但助行故無證悟其於經題四實法中正屬修證了義耳說三摩提令依妙心一門深入一大科已竟三說禪那令住圓定歷位修證此答阿難妙禪那之請也然與上科皆不離前性定華屋前如得門而入此如升堂入室之次第但兼前緣了二因定慧雙融為勝耳分二一阿難謝教請位又三一具儀陳白阿難即從座起頂禮佛足而白佛言二謝教之言又分為二一述過謝益此與上科亦可總屬上謝修之尾奈文理連下今作謝前請後之科又二一述多聞未修我輩愚鈍好為多聞於諸漏心未求出離諸漏心謂微細煩惱住地深惑不止四住愚則難明鈍則難斷況耽強記而未專求故久未出離也二謝蒙教獲益蒙佛慈誨得正薰修身心快然獲大饒益慈誨即前選根加行二門開示也正助分明進修無惑故快然饒益也二正以請位又分二一確指果前世尊如是修證佛三摩地未到涅槃二歷請諸位云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩乾慧信前一位也長水曰信住行向及加行名四十四心也前是舉其中位下乃原始要終故所謂漸次者即最初乾慧之前三漸次也當云其始也用何漸次發足修行其終也詣何方所深入地上末二句易知窮極因位也深研此文當有錯簡至何二句當在三摩地下則始終順序不費曲釋今作先舉中位而後要始終乃將錯就錯終不順也試詳之此問中所顯五十九位以彼欲明修因故但問因位加妙覺成六十位矣三拜同衆仰作是語已五體投地大衆一心佇佛慈音瞪瞢瞻仰二如來對示緣起緣起謂染淨二緣皆依心起衆生依本覺而起不覺即染緣起而遂成十二類生無邊生死諸聖依不覺而起始覺即淨緣起而遂成六十聖位無邊果海分為三科一如來讚許爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩地求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝說懸者遠也先也懸示者言未及深證預先懸遠而談所歷諸位乃至極證寶所亦無不委示也無上正修者顯此中所示皆了義修證非同不了義也二大衆誠聽阿難大衆合掌刳心默然受教刳者刮剔也刳心謂虗淨其心絶無疑質辨難但惟一心渴仰承聽之也三正以說示又二一總以略標復分為二科一所依真如佛言阿難當知妙性圓明離諸名相本來無有世界衆生妙性即真如在生滅門即本覺圓明謂純是無上知覺名言未彰義相未涉故離諸名相凡言世界衆生且兼依正名相是假法依正是實法又首句是圓成實性為能離次句是遍計執性末句是依他起性為所離也二所起生滅依真如而有生滅分二一略示染緣起因妄有生因生有滅生滅名妄因妄有生者即依無明而展轉遂至無情發生有情受生也滅即無情之壞而有情之死此對待必然也二略示淨緣起滅妄名真是稱如來無上菩提及大涅槃二轉依號發真歸元則世界衆生一皆消殞由是生滅已復真常故曰滅妄名真此是實果下但稱出果名而已約名真二字稱菩提以菩提即真智也約滅妄二字稱涅槃以涅槃即無生滅也然菩提轉煩惱而涅槃轉生死故曰二轉依號也二各以詳示分為二科一詳示染緣起則遍成輪回又二一勸識顛倒須識顛倒染果後可番取淨果此所以未談聖位而先敘輪回之故也又三一按定問意阿難汝今欲修真三摩地直詣如來大涅槃者真三摩地但宗耳門圓通直詣二字即具含果前諸位涅槃即極果也二勸先識倒先當識此衆生世界二顛倒因凡言衆生世界則世界即情世間惟正非依吳興曰世界顛倒蓋指正報即十二類生也答阿難所入地位位由悟入悟必由迷迷之為凡悟之為聖皆正報之事非器界之謂也此蓋於一正報分約因果成二倒耳至後自見矣三結歸所問顛倒不生斯則如來真三摩地阿難原問佛三摩地中位次今云不顛倒即正定所謂位由悟入也二徵釋二倒又二一徵釋衆生顛倒又分為三一徵起阿難云何名為衆生顛倒二正釋分三一順流成有順之一字即任運所起俱生之惑窮源而論雖遠依無明雙兼二執而近約分段親依仍多界內之思惑耳成有者蓋從本無生死中順流而起生死之業也分三一推敘從無而有阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有溫陵曰性明心指真如體也性明圓言不守自性也由其不守自性故因妄明而發妄性因妄性而生妄見於是從無相真成有相妄明圓即能流動之意故不守自性乃隨緣義也妄明即無明妄性即業識性妄見即二執俱生以上竝屬於惑下之從無成有者即業成必招果報之相此有字即十二因緣中有支乃任運趣生之業也然究竟二字即展轉取著造作成就之意故此有且勿作身相會之下世界內分段二字方是身相也二曉示雖有恆無此有所有非因所因住所住相了無根本上有字即能有之惑下所有即業也次句總明無因蓋明此業非真能因此惑非真所因也住者相續之謂也方生曰有相總不斷曰住蓋有為能住惑為所住末句總言二相悉皆無本可據也既無因無本所以雖有恆無也三判決依無妄立本此無住建立世界及諸衆生吳興曰本此無住者住即依也推本至末了無所依也無住即了無根本之惑業也此世界在衆生之上而又加一及字即所兼帶之依報山河大地等也如云此無住本不但為衆生之本而山河大地及與衆生皆依之而建立也若是生先界後方是說情世間舊注不達界生先後之辨有依有正輒分總別不顧與上徵辭矛盾缺研究耳又真心亦有無住之義如無住處涅槃乃不滯一法之謂非今經意也順流成有已竟二邪復成非邪之一字即欣厭所起分別之惑若窮源而論仍同上科遠依無明及兼法執若近約分段親依亦多界內之見惑也成非者蓋因久流生死疲厭求復不知出要展轉邪修也分為三一本無可復迷本圓明是生虗妄妄性無體非有所依妄業不能虧曰本圓妄惑不能蔽曰本明此本圓明即不變之性體衆生特為迷此不變之性故生虗妄惑業而追窮妄性了無實體亦無依據總言真不變而妄本空也然妄既本空則妄無可離真既不變則真無可復矣二諸復皆非既無可離可復則凡求復者皆非真也又二科一先以況顯又二一先明正復猶非將欲復真欲真已非真真如性此舉內教小乘及大乘權漸順正理而復真者尚皆非真得於真如之性亦以其於無可離者而強離於無可復者而強復故也此可見惟圓頓人不離之離不復之復方為得矣二況顯邪復益非非真求復宛成非相此指一切外道不見正理種種邪修盡是非真求復也宛成非相者言顯然墮於邪妄因果展轉支離違遠圓通背涅槃城同後陰魔之黨矣二後以詳陳非生非住非心非法展轉發生此竝屬惑即是見惑下科方結為業至後世界方以說身即果故舊釋身受非是今非生即非因計因謂妄計邪修為生果之因也非住即非果計果謂妄計諸無常處為常住之果也非心即邪智也總攝一切邪妄見解標樹宗旨各各自謂明本來心也非法即邪境也總攝一切邪妄修證建立法門各各自謂得無上法也末句總結謂邪因邪果邪智邪境互相引發故展轉發生諸復皆非已竟三結惑成業生力發明熏以成業生力即邪惑之力發明即依惑造作薰習也蓋初薰始稱發明薰久習定所謂業已成矣不可改移也亦是薰成業種必招邪果之隨眠也三總明招感同業相感因有感業相滅相生總承前二科俱生分別二種惑業明招感互滅互生之果報也良以衆生所以受分段生死者必親依見思二惑造業招感然見思互有輕重或等分且窮其初起必思先而見後故經中前後歷敘之其於俱生惑業略而顯妄多以任運簡易而妄源不可不首彰也於分別則顯妄少而惑業詳以邪計多端而妄源不勞於重敘也至此科乃雙承總明招感也同業者以業同必同聚也相感者以聚久不無順逆二事互相感動其心也因有感業者亦成業種之意如以順事相感動者則成恩愛不捨之業種以逆事相感動者則成冤恨不捨之業種末句略彰隔生之酬報以見惑業所以為生緣也以冤恨聚者則相滅以恩愛聚者則相生此亦約現業以定來果非正談果報在下世界顛倒科中正釋已竟三結成由是故有衆生顛倒由是者即由此二惑二業之故也故知衆生乃約因而說也徵釋衆生顛倒一科已竟二徵釋世界顛倒分三一徵起阿難云何名為世界顛倒二正釋分二一釋成世界名數又二一釋成名字是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成此科釋成世界二字前之惑業為能有今之正報為所有因果成就由是分段生死之身從無生而妄生約此分段根身建立有情之界而界之名字由此而得也又此妄生本非能因所因本無能住所住自是念念遷流不住之法因此三世相續而成而世之名字由此而得也二釋成數量三世四方和合相涉變化衆生成十二類身之四方即左右前後此約世界本數交涉三四四三宛轉十二皆應數而成變化二推由六想成輪問既曰推由豈不是因答此取受生時循聲逐色而取著成輪所謂潤生而非潤業故屬果不屬因也分為三一示吸塵次第是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法吳興曰最後知法者知即意根法即法塵以後例前則有聞聲見色等義況云六亂妄想是知見聞覺知皆歸妄想夫受生雖由外塵引心而最初先由自心發動方乃聞聲等也故曰因動有聲且塵來應心聲必先至亦以聲最通遠而耳又偏利故聲居六亂之先循聲必至覓色故次曰因聲見色近色則必至聞香聞香則必至覺觸覺觸則必至嘗味嘗味則必至知法知法謂緣想不捨也蓋是由疏轉親漸成逼近取著之相一切衆生顛倒趣生皆由此也二明成業輪轉六亂妄想成業性故十二區分由此輪轉業者習也性者不可改轉之意所謂習以性成也莫作業因會之塵雖惟六而一因一有迭至六句則成十二故感十二區分輪轉且因有二字即根塵故亦合乎十二數矣三結循塵旋復是故世間聲香味觸窮十二變為一旋復略舉四塵仍攝十二故曰窮十二變旋復者周而復始之義也正釋一科已竟三結成此之結成世界文甚詳而多者要顯染緣起而遍成之輪回故番成淨緣亦有多位矣分為三一總以結成乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想乘此輪倒者即乘上之根塵旋復此猶迭上潤生無明起下文所成之界是有下方詳所成世界每四生各為一聚後八生不出色想分別迷真成妄色心二字盡之矣此方列名至下經文自釋二別以詳列二一別列類生夫輪回顛倒和合亂想諸類雖可通具而各以偏勝故有差別又三一卵胎濕化四生吳興曰依㲉而起曰卵生含藏而出曰胎生假潤而興曰濕生無而忽有曰化生如是四生由內心思業為因外㲉胎藏濕潤為緣藉緣多少而成次第卵生具四所以先說胎生具三濕生具二化生惟一謂思業也此依瑜伽分為四科一卵生阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞溫陵曰卵惟想生虗妄即想也想體輕舉名動顛倒卵以氣交名和合氣成想多升沉名飛沉亂想故感魚鳥飛沉之類也十二類各八萬四千者各由八萬四千煩惱感變也羯邏藍云凝滑入胎初位胎卵未分之相也羯邏藍等在胎之位隨取成文非各局一也二胎生由因世界雜染輪回欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞溫陵曰胎因情有雜染即情也情生於愛名欲顛倒胎以精交名和合滋成情有偏正名橫竪亂想故感人畜橫竪之類遏蒲曇云皰即胎卵漸分之相也偏正者按後情想均等生於人間正也情多想少流入旁生偏也世教言人得五常之全畜得五常之偏環師意多在後說也三濕生由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞溫陵曰濕以合感執著即合也合由愛滯觸境趣附名趣顛倒濕以陽生名和合暖成所趣無定名翻覆亂想故感蠢蠕翻覆之類也蔽尸云軟肉濕生初相也既不入胎故無前二位矣濕生染香應改聞香趣附四化生由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞溫陵曰化以離應變易即離也離此託彼名假顛倒觸類而變名和合觸成轉故趣新名新故亂想故感報亦爾蛻脫故趣新也如蟲為蝶轉行為飛如為蛤蛻飛為潛凡以不同形而相禪皆轉蛻也羯南云硬肉蛻即成體無軟相也自下皆稱羯南者諸類通稱止此若第五鉢羅奢佉曰成形則各隨狀貌非通稱也吳興曰無而忽有理合在茲天如曰若論天獄鬼等皆有化相則嶽師無而忽有之說亦有理焉宜備取之化生染處名和合觸成經云地獄及諸天一一皆化生轉托業化即宜收盡以天染處地獄聞腥故也但速疾無難而已是皆轉托業化非無而忽有意生妙化也二色想有無四生分四一有色由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞資中曰事日月水火和合光明堅執不捨名為留礙障隔不通名障顛倒精明顯著因此受生故名色相星辰日月吉者為休凶者為咎至于爝火蚌珠皆是此類溫陵曰一切精明神物皆精耀也其想已結成精耀故但有色而已涅槃云八十神皆因留礙想元成此精耀此雖至精至神亦未離乎乘彼輪轉顛倒相也二無色由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沉其類充塞溫陵曰厭有著空滅身歸無名銷散輪回迷漏無聞名惑顛倒厭有歸無則依晦昧空故和合暗成而名陰隱亂想即無色界外道類也此有想無色而不成業體故亦稱羯南又有惑業昏重形色銷磨體合空昧識附陰隱亦空散銷沉類也此之二類前類即無色界天不止外道亦兼凡夫聖人聖即鈍根那含惟無業果色而有定果也更應別屬空散謂散心即空無色相也後類即主空神方純外道二色俱無更應別屬銷沉謂惡取空昧銷磨沉沒也又解中謂有想無色而又不成業體憑何亦稱羯南仍當云雖無業體不妨業繫有生故亦稱羯南取義而稱也三有想由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞溫陵曰虗妄失真邪著影像無所託陰從憶想生於罔象中潛結狀貌其神不明而幽為鬼精不全而散為靈無有實色但有想相罔相者似無不無之意蓋神鬼精靈相不可見而實暗中有相故曰陰隱潛結衆生邪慕靈通逐影憶想時或愰忽見之久當生墮其類矣四無想由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯槁亂想如是故有無想羯南流轉國土精神化為草木金石其類充塞資中曰外道計無情有命金石堅牢或習定灰凝思專枯槁心隨境變遇物成形如華表生精黃頭化石之類是也溫陵曰不了諦理固守愚癡癡鈍之極則頑冥無知而精神化為土木金石也三有無俱非四生此之四生妄之甚誠如溫陵所謂迷情愈妄化理轉乖也分四一非有色由因世界相待輪回僞顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞溫陵曰水母之類以水沫為體以蝦為目本非有色待物成色不能自用待物有用迷失天真綿著浮僞彼此異質染緣相合故曰因依資中曰和合巧僞屈己從他或假託因依遞為形勢資身養命業果相循不從自類受身故名非有色相等有情身內八萬戶蟲竝是此類此生若約水母亦有身形體如豆粉狀類裍褥人取食之故不屬無色特以待他形用不能自全色力而言非有色也資中取類戶蟲亦似矣二非無色由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由是故有非無色相無色羯南流轉國土呪詛厭生其類充塞溫陵曰邪業相引使性情顛倒而乘呪託識不由生理妄隨呼召即世間邪術呪詛精魅厭物因而有生者也資中引蝦蟆以聲附卵收類似寬不切呪詛現見世間有呪樟柳木人令其說報吉凶故溫陵之解為是此若推論因果必是生生好為呪詛害物傷生因果相酬等流相似故受此生也三非有想由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞溫陵曰二妄相合性情罔昧異質相成生理回互如彼蒲盧本為桑蟲非有蜂想而成蜂想吳興曰以異質故非有想相以相成故成想羯南資中有解因果似倒此必因中好為誣罔取他納為己有故果中亦被他物取為己有四非無想由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞若推論此生原為懷冤圖報而來故曰非無想也而輪回顛倒皆以冤殺為名且以父母生養至恩至愛而被吞食之苦以子蒙至恩至愛而返逆吞食若有快於雪恨者此誠不忍聞見而怪之甚也故曰怪成食父母想此若推論因果必是蒙人至恩至愛而反以負恩讐害世間現見此事亦甚多也而被冤對來酬此恨故成斯生舊注獨此生推原不甚明爽故別解之孤山曰土梟破鏡按史記孝武本紀云祠黃帝用一梟鏡孟康曰梟鳥名也食母破鏡獸名也食父黃帝欲絶其類使百祠皆用之破鏡如貙而虎眼今云鳥者恐譯人誤或鳥字合是等字後人妄改耳別列類生已竟三勒成名數是名衆生十二種類
