body:
  text: 京都西湖沙門交光真鑑述上卷開釋四重已竟三總結遠魔分三一酬問重訂嚴戒阿難汝問攝心我今先說入三摩地修學妙門求菩薩道要先持此四種律儀皎如氷霜初問道場便說云何攝心入三摩地故佛結酬前問也妙門即耳門也末句言持之潔白無點污也二拔本必不滋末自不能生一切枝葉心三口四生必無因四重為諸罪根本餘為枝葉心三謂貪嗔癡口四即小妄綺語兩舌惡口良以既經細絶粗必不生也問淫殺盜是極粗身業何反謂其細於心三大妄語是極重口業何反謂其細於口四答淫殺盜若約身犯極粗今從心念絶之令一念不生故細於心三大妄獲罪雖重而約稱因果不實則比惡口等似未同其粗鄙故猶細於四口矣三絶塵決定遠魔阿難如是四事若不遺失心尚不緣色香味觸一切魔事云何發生不遺失即不漏落一念於四重中也於六塵而但舉四塵語之略也蓋塵依念住念絶而塵何所依魔托塵入塵忘而魔何所托故能遠魔也正教持戒竟二助以呪力分為二科一正以勸持讚勝又分為三科一戒不能除若有宿習不能滅除宿習謂過去惑業種子也溫陵曰現業易制自行可違宿習難除必假神力今夫行人好正而固邪欲潔而偏染隱然若有驅䇿而不能已宿習之使也二轉教呪遣汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉無上神呪佛頂光詳現初救阿難時溫陵曰摩訶薩怛多般怛囉此云大白傘蓋即藏心也量廓沙界曰大體絶妄染曰白用覆一切曰傘蓋顯呪全是真心體用祕密章句威力無量能除宿昔惑業習種其實苦報亦能除之今四重正屬惑業故云然也三讚呪最勝斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪溫陵曰無見頂者華嚴九地知識自說為佛乳母初生親捧持諦觀不見頂示頂法不可以見見也佛已入定便表無為光中化佛顯是無為心佛此首二句表本覺究竟二妙果也頂者理極無上之相蓮者稱真敷行之相此經令行人先明本具極理實相知見是為從頂發輝此屬密因然後稱真修證是為坐寶蓮華此屬顯因即修證了義故此中二句表密顯二妙因也末句總結如來現相見呪中具詮如是極為殊勝當深信持之必令戒成也二況顯除習無難又二一促舉無修尚證又三一舉愛習甚深且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫二示蒙宣脫證我一宣揚愛心永脫成阿羅漢吳興曰愛心永脫指初聞呪得阿那含也成阿羅漢指前文殊簡圓通後也四果雖由聞法推其拔脫之力仍當歸功於呪非呪拔脫何由而得聞法以至證羅漢哉三表無修速資彼尚淫女無心修行神力冥資速證無學但依如來歸功呪力二況顯發心必除分二一明發無上心云何汝等在會聲聞求最上乘決定成佛本以學人不同本以淫女也發無上心不同無心修行也二喻除之最易譬如以塵揚于順風有何艱險吳興曰塵譬宿習風如神呪順風揚塵散之則易誦呪除習脫之匪難呪力雖如風而復助無上心人故更是順風宿習雖如塵而有學宿習更是微塵反顯淫女乃為多塵而無心修行猶如逆風也歷明預先嚴戒已竟二略示場中定慧溫陵謂初標三學而終止四戒者定慧已備前文似亦知定慧屬前圓通然亦不於場中說定慧處表彰耳門遂令行人不知道場中所修復是何門豈前語亦大略言之而非見徹之論乎且此初請略說文中但詳於戒而生定生慧無處表彰豈標徒具三而釋之惟一乎以定慧既不越前即不如說戒之詳而已豈全無耶是故今科略示場中定慧也又分為二科一因戒生定分三一牒戒擇師又三一牒前持戒若有末世欲坐道場先持比丘清淨禁戒前雖科為預先嚴戒理實但以詳明四戒當嚴所以此科方是於未入道場之前實起持戒之行是以下科方教擇師也從心止絶前之四事故曰清淨不可更添別戒二正教擇師要當選擇戒清淨者第一沙門以為其師三不遇難成若其不遇真清淨僧汝戒律儀必不成就二誦呪結界戒成已後著新淨衣然香間居誦此心佛所說神呪一百八遍然後結界建立道場真際曰誦呪百八表滅百八煩惱也道場詳在後請上二科方是因戒意耳三定中求佛求於十方現住國土無上如來放大悲光來灌其頂此科方是所生之定良以衆生心水淨諸佛影現中若非定中必無求現之理故知此已在定求也然定即反聞自性入流忘所但加求佛灌頂之念而已因戒生定竟二因定發慧又二一約戒願久定前不兼後後必兼前前科但牒戒而生定此雖總標因定而文中雙牒戒定為因又加發願類求灌頂也又為三一歷舉行人阿難如是末世清淨比丘若比丘尼白衣檀越白衣兼優婆塞優婆夷雖不擇僧俗而男女決定各從其類必非男女混同一場也二牒戒明願心滅貪淫持佛淨戒於道場中發菩薩願首句略舉淫戒次句總該後三戒菩薩願不出四洪亦所以為感佛機也三尅期久定出入澡浴六時行道如是不寐經三七日凡出道場而復入則必澡浴外潔其身也六時行道即專注反聞經行排遣內攝其心也晝夜十二時六時行道六時靜坐均調昏散矣如子時行道丑時靜坐寅時行道卯時坐等是也然行中坐中所習皆反聞自性入流亡所而已末二句結成尅期久定不寐有二意一除昏睡不覺二戒忘失反聞此科正牒定而明因定二字下科乃生慧也二許顯加發慧我自現身至其人前摩頂安慰令其開悟定心為生慧之親因摩頂安慰佛之威力為助緣所謂啐啄同時朗然大悟也然開悟渾含淺深諸相不可一定若得動靜不生發須陀洹見道之慧若得聞所聞盡發阿羅漢人空慧若得空所空滅成法空慧若得寂滅現前發圓通無上知覺慧也孤山曰若見此像當觀空寂是佛顯然是魔則滅初請略說一科已竟二重請詳示分二一重請說道場前雖言入道場而未說道場如何建設故重請說之又分為二科一阿難重請又分為二科一述己開悟阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成自揣但習反聞不須道場可成無學即聞所聞盡等三空諸果位也二代請軌則末法修行建立道場云何結界合佛世尊清淨軌則二世尊重說分三一道場建設此中表法理所不無然亦聖心所知之境本難盡測姑就古人舊說存之以備觀覽實非修行正要學者亦不必過泥而反誤耳門正修之旨趣矣詳之又分五一所建壇式又二科一塗壇地又二一正用牛糞和香佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛惟飲雪山清水其糞微細可取其糞和合旃檀以泥其地溫陵曰法王法言即事即理法不孤起事不唐設如華嚴一字法門海墨書而不盡五位行相即世諦以彰明凡所設施必有取像則此壇場用度無非表法也山為高土雪山純淨上信也大力白牛純淨大根也香草清水妙善淨智也茹退充實遺餘也上旃檀為十香之首十度之總萬行之冠也長水曰雪山牛乳純是醍醐所有茹退最為香潔茹者食也退即糞也十度謂施戒忍進定慧方便願力智也二揀用黃土合香又四一揀不堪用若非雪山其牛臭穢不堪塗地略一糞字二別用黃土別於平原穿去地皮五尺已下取其黃土溫陵曰原為平土中信也地皮未淨也五數之中黃色之中取中中淨信也三合十種香和上旃檀沉水蘇合熏陵金白膠青木零陵甘松及雞舌香溫陵曰十香十波羅蜜法香也四細羅塗地以此十種細羅為粉合土成泥以塗場地溫陵曰細羅為粉推之以為微妙萬行也夫欲取如來寂滅場地必本於廣大信心而資乎淨智妙善以養成純一大根充實遺餘猶足以合法香冠十度故可嚴成寂滅場地也上信大根有不可得則求其次焉故取中中信心雖未能冠乎十度萬行而能具之者亦可以嚴成二定壇相方圓丈六為八角壇長水謂壇乃除地之墠似是若壘土為之經當明言層級今並無之顯是平地塗為八角也溫陵曰壇寂滅坦實之體也體具八正故為八角為攝八邪故方丈六二所設莊嚴分四一壇心華鉢壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉溫陵曰壇心蓮華中道妙行也蓮之為物華實同體染淨同源表妙行大致也用金銀銅木所造者表妙行云為也金銀百鍊愈精而不變銅剛而能同義之像也木能上草以覆其下仁之像也夫依體起行精而不變剛而能同或以義制或以仁覆無過不及凡皆會于中道乃所以為妙行也鉢為應器表隨量應物也露為陰澤以秋降八月秋之中也水中華葉即仁覆之行隨澤所施此又隨量應物陰利潛化之表也二鉢外列鏡取八圓鏡各安其方圍繞華鉢溫陵曰圓鏡大圓鏡智也各安八方圍繞華鉢者智行相依隨方圓應也三鏡外華爐鏡外建立十六蓮華十六香爐間華鋪設莊嚴香罏溫陵曰鏡外蓮華香爐各十六而間設者華表妙行香表妙德鏡外即正智之外方便建立使邪正相攝德行相熏庶久而俱化兩忘邪正也四爐焚沉水純燒沉水無令見火溫陵曰純燒沉水無令見火者反德藏用滅伏覺觀然後能契寂滅場地也三所獻供養分為二一八味陳供取白牛乳置十六器乳為煎餅并諸沙糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩溫陵曰表以法喜禪悅獻二尊也權教開許乳酪實教遮禁而復取以享奉者意在融權實同邪正故八味亦各十六圍繞華外表融權攝邪之法喜隨行施設也二兩時致享每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩溫陵曰佛以日中受食故每以日中致享中夜例日中也蜜成於華表和融法行也酥成於乳表和融法味也半為中數三為成數小香爐方寸覺心也以香沐炭發覺之法也藥王然身先服兜樓婆香意取發𦦨故取沐炭然令猛熾投酥蜜於炎爐燒令煙盡者行法既成不可終滯當於覺心勇猛煅煉使習氣併鑠緣影俱亡豁然如所謂紅爐點雪者然後為佛所享四所奉尊像又復分為三科一四外幡華令其四外遍懸幡華溫陵曰四外幡華外行嚴飾也二四壁內聖又二一總標於壇室中四壁敷設十方如來及諸菩薩所有形像二別列分二一當陽五如來應於當陽張盧舍那釋迦彌勒阿閦彌陀溫陵曰當陽正位盧舍那等寂場真主也彌勒當來真主也阿閦居東彌陀居西智悲真主也二左右二菩薩諸大變化觀音形像兼金剛藏安其左右溫陵曰諸大變化觀音形像上同下合真主也金剛藏常領金剛護持呪人伏魔斷障真主也三門側外護帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置溫陵曰門側左右釋梵等衆有力外護也末法修行凡賴於此一有闕焉必不成就烏芻火頭金剛藍地迦青面金剛軍剎利金剛異號也毗俱胝三目持鬟髻是也頻那夜迦即猪頭象鼻二使者五所取照映又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉溫陵曰壇中之鏡混物有依行人之智也空中之鏡離物無依諸佛之智也混物有依者方能照物未能照己必得乎離物無依住智交相為用然後物我互照心境雙融諸佛衆生身土相入不勞動步不待擬心法法遍周事事無礙舉目千聖齊現觸處萬像昭然一華一香遍供塵剎一行一相充擴無窮不假神通不涉情謂寂場法法本如是也道場建設竟二修證節次分二一三七初成定慧又分為二科一三七功夫就分為三科初一七禮誦行道於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍溫陵曰凡所蘄向以歸依三寶為最初方便故初七日至誠頂禮如來菩薩羅漢名號所以假其不思議力發行助道也他力也次二七專心發願第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教若圖總略不出四洪溫陵曰依毗尼教專心發願也行願堅強則得大勇猛吳興曰先有願教者如梵網經十大願等是也後三七一向持呪第三七中於十二時一向持佛般怛囉呪溫陵曰時無間歇呪無遍限一向誦持遂能以精誠感格進力克功也二末日定慧分三一佛現摩頂至第七日十方如來一時出現鏡交光處承佛摩頂此可見前三七中亦具粗略定心但兼禮念願呪非不攝心反聞也若心水不淨佛何由而現乎溫陵曰鏡交光處則生佛智照感應道交也二定心成就即於道場修三摩地此方專習反聞不令一念緣彼聲塵專注前解聞中妙境所謂入流亡所也此應坐習為多時或經行排遣但一味反聞無間三慧心成就能令如是末世修學身心明淨猶如琉璃首句顯定心為親因道場持呪等為助緣因緣力故所以能令也末二句發慧妙境也身心意兼真妄約明字但是真身真心大智慧光明顯現之相而淨字雖亦說真兼顯妄身妄心了不可得為真淨之所以也末句雙喻明淨且真身真心即是聞性聲塵忘而六塵俱捐故極明淨此在定中發慧暫得與寂滅現前境界相應也三七初成定慧已竟二百日頓證聖果分三一先防不成由不清淨阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就不成就者但是不能尅期取證警擇師友不可濫取非人二正示期滿有證初果從三七後端坐安居經一百日有利根者不起于座得須陀洹利根謂惑障俱輕慧性明悟者也孤山曰陀洹按位即圓初信若依涅槃乃是初入別圓地住也依初解則當齊於動靜不生斷八十八使亦但位齊小乘見道非真取小果也依後解則當徹至寂滅現前位齊別教初地圓教初住二釋俱通涅槃借小乘四果名位以次當大乘住行向地矣三後開未成亦見佛性縱其身心聖果未成決定自知成佛不謬若依圓師前解則位在五觀依後解則位在十信次於所證必然之理即是了了見於佛性自信本來尊貴亦不患於不證所謂已到不疑之地矣修證節次已竟三結答酬請汝問道場建立如是吳興曰壇法行相此土末世行之惟艱然所誦呪下文亦許不入道場故使有緣隨器受益重請說道場已竟二重請說神呪分三一會衆重請又分二一述己自請又為三一述遭術遇救又三一述多聞未證阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為恃愛前已釋過小乘以四果為無為二述被邪呪禁遭彼梵天邪術所禁心雖明了力不自由初果力弱故也三述賴呪轉救賴遇文殊令我解脫須補文殊將呪往護二敘蒙呪未聞雖蒙如來佛頂神呪冥獲其力尚未親聞天如曰昔阿難密承呪力得解淫難故曰冥獲未聞三請重宣廣利惟願大慈重為宣說悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫身解脫者謂消業離苦也意解脫者謂破惑證真也二同衆普請于時會中一切大衆普皆作禮佇聞如來祕密章句二如來重說分二一正說神呪又三一呪前光相又四一如來放頂光爾時世尊從肉髻中涌百寶光斯光所表具足多義今略分釋之此科與次科表顯中之密以自如來當身所現也肉髻即無見頂表法身理從頂放光表依理起智光具百寶表智含萬用二光中現如來光中涌出千葉寶蓮有化如來坐寶華中光中涌蓮表依智發行化佛坐蓮表行嚴妙果三化佛放頂光頂放十道百寶光明此科與次科表密中之密以又從化佛重現也斯即所謂從佛頂中之佛頂放寶光中之寶光表斯呪尊中之尊妙中之妙也十光亦表十力深智具足萬用無求不應見攝受之慈四光中現金剛一一光明皆遍示現十恆河沙金剛密跡擎山持杵遍虗空界表無量祕密神用降伏魔外無惡不摧見折伏之威二大衆欽聽大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣說神呪畏謂畏其威愛謂愛其慈抱懷也衆生以此二懷承順如來而神化無所留滯矣呪中密具此諸妙理故表彰之三神呪章句南無薩怛他蘇伽多耶阿羅訶帝三藐三菩陀寫一薩怛他佛陀俱知瑟尼釤二南無薩婆勃陀地薩跢弊三毗迦切南無薩多南三藐三菩陀俱知南四娑舍囉婆迦僧伽喃五南無廬雞阿羅漢跢喃六南無蘇盧多波那喃七南無娑羯唎陀伽彌喃八南無盧雞三藐伽跢喃九三藐伽波囉底波多那喃十南無提婆離瑟赧十一南無悉陀耶毗地耶陀囉離瑟赧十二舍波奴揭囉訶娑訶娑囉摩他喃十三南無跋囉訶摩泥十四南無因陀囉耶十五南無婆伽婆帝十六嚧陀囉耶十七烏摩般帝十八裟醯夜耶十九南無婆伽婆帝二十那囉野拏耶二十一槃遮摩訶三慕陀囉二十二南無悉羯唎多耶二十三南無婆伽婆帝二十四摩訶迦羅耶二十五地唎般剌那伽囉二十六毗陀囉波拏迦囉耶二十七阿地目帝二十八尸摩舍那泥婆悉泥二十九摩怛唎伽拏三十南無悉羯唎多耶三十一南無婆伽婆帝三十二多他伽跢俱囉耶三十三南無般頭摩俱囉耶三十四南無跋闍囉俱囉耶三十五南無摩尼俱囉耶三十六南無伽闍俱囉耶三十七南無婆伽婆帝三十八帝唎茶輸囉西那三十九波囉訶囉拏囉闍耶四十跢他伽多耶四十一南無婆伽婆帝四十二南無阿彌多婆耶四十三哆他伽多耶四十四阿囉訶帝四十五三藐三菩陀耶四十六南無婆伽婆帝四十七阿芻耶四十八跢他伽多耶四十九阿囉訶帝五十三藐三菩陀耶五十一南無婆伽婆帝五十二沙闍耶俱嚧吠柱唎耶五十三般囉婆囉闍耶五十四跢他伽多耶五十五南無婆伽婆帝五十六三補師毖多五十七薩憐捺囉剌闍耶五十八跢他伽多耶五十九阿囉訶帝六十