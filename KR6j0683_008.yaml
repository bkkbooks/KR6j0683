body:
  text: 京都西湖沙門交光真鑑述別以詳列已竟三申結互妄又二一正申互具喻明阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生孤山曰各具即互具也以一一類心妄種皆具一則現起名事造餘則冥伏名理具揑華喻其虗妄也亂發喻其互具也二推結倒真成妄顛倒妙圓真淨明心具足如斯虗妄亂想上喻虗妄此推即真但由顛倒本真故即具足衆妄也具足者言總括種現互具當成一百四十四生是雖生死無邊畢竟顛倒非實而淨明真體固自若也番染成淨而進階聖位復何難哉此固對示二緣起之本意也詳示染緣起則遍成輪回已竟二詳示淨緣起則歷成諸位以真如有不變之體故能隨緣不定前既隨染緣而遍成衆生今豈不隨淨緣而遍成聖位乎分四一正答因果諸位此之因果有縱有奪若縱之則前前皆為後後之因後後俱為前前之果若奪之則惟佛為果而等覺以前皆因也故知舊注於此判證而不言修非為確論矣問約奪則因有諸位果惟一位何以通言因果諸位乎答圓融果相從初發心即自具足何妨說諸但有性具修成之別而已分為十科一漸次三位前問至何漸次得修行目斯言修習等正修行目也此中應知乾慧以前三漸次位則圓家五品十信盡攝於中乾慧以後所立十信乃是初住開出十心經文顯然蓋圓家住前不取證故不列位所以此經與華嚴皆於信位不分十也至文再指分二一教立位番染又分二一法說汝今修證佛三摩地於是本因元所亂想立三漸次方得除滅觀此立位之初便以修證平言豈可分判前為修而此為證乎三摩地即經耳門三昧舊注不達經文一貫此處全不知是重敘圓通以為諸住最初方便往往別判致令經文脉絡永不通也本因亂想即前飛沉等各八萬四千也三漸除滅即教其番染成淨也二喻說如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露既貯毒蜜何言淨器蓋須取於本來元淨而又毒所不能染者如金玉之器是也用比根中不生滅性本來元淨而又具不變之體也毒蜜喻五辛淫殺等湯灰喻忘塵盡根甘露喻所安立聖位也三漸次法喻可了二示所立之位又二一徵起列名云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業首二句徵起一者下六句列名每各二句皆上句明修下句明斷修指研真謂入三摩地漸取耳根圓通也斷指斷妄謂除五辛戒三重及消十二處也今初第一修習者初於聞中入流亡所時也蓋始以習學收拾循聲散心數數反聞自性而有間斷未成一片故曰修習位也如其不然則斷除五辛言除足矣而說修習者修習何事耶下二放此除其助因者寄此位以明五辛之當斷蓋五辛非惟但助淫恚展轉力能引魔則何惡不至實乃四重之助因也故應於此初修即首除之第二真修者即所入既寂動靜不生時也蓋忘動功夫入手已成一片乃至靜塵亦將漸忘故曰真修蓋自來持戒不足以當真修之名而真三摩地始克當耳刳其正性者寄此位刮剔淨絶四種根本重罪乃諸惡之正性故應此位刳之良以帶四心而修禪皆似而非真必落魔鬼等道故也第三增進者即如是漸增聞所聞盡時也此與前之圓通增修字同愈無可疑且前漸次修斷異體而猶未顯明此則修斷一相更何疑異哉良以此中所修者固聞性而所斷者即根塵故違其現業者以流根奔塵即名現業忘塵盡根即名為違問此中方以忘塵盡根前二位何以遽說忘塵返聞耶答前二位漸以修學此位收功根塵圓泯非前漸習豈能遽至是哉二條分別釋就分三一除其助因又為三一徵起云何助因此惟徵助因而不徵修習者以修習在前圓通中說明而列名處但表當此位以除助因而已故至此止惟徵釋助因不復重徵修習亦如道場中惟詳說戒之例也下放此二詳釋又三一標依食住阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切衆生皆依食住既言十二類生即局界內不能自全者不能如法性身人無庸於食也然標必依食住者見界內衆生身命慧命安危所係修習者不可不知所檢擇而戒斷也溫陵曰四食者人間段食謂所餐必有分段鬼神觸食但歆觸而飽禪天思食食至或但思之而飽識天識食既無形色但以識想歆觸謂但觸其氣也禪天無飲食法宜但取於思之而飽仍恐但以禪悅為思非思食物識想何異思食殆是惟以識定續命義言以識為食此約勝者而言劣如地獄餓鬼歷劫但以業識不能斷命是亦識食思食類也俟更考之二教斷辛毒阿難一切衆生食甘故生食毒故死是諸衆生求三摩地當斷世間五種辛菜無毒曰甘非局甜味也首三句舉身命安危係於食之甘毒引明慧命所係尤宜慎擇也求三摩地足見當於修習圓通時也五種辛菜正危慧命之大毒故應絶之孤山曰五辛者楞伽經云葱蒜韭薤興渠也應法師云興渠梵音訛也正云興宜慈愍三藏云根如蘿蔔出土辛臭慈愍冬至彼土不見其苗則此方無故不翻也三深明其過又四一發淫增恚過是五種辛熟食發淫生噉增恚熟食必壯相火故發淫生噉必動肝氣故增恚佛智所鑑不爽毫釐物性必然宜敬信而戒之二天遠鬼近過如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日消長無利益今以世人具齊戒者尚於食辛之人多畏避之何況天仙餓鬼歆於不淨故常親近天遠故福日消鬼近故長無利益常見天時疫厲世人咸謂辛能避瘟由經觀之斯蓋招瘟之端而世人業力所使顛倒滋禍如此不可不知所警也三無護遭魔過是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚淫怒癡上天仙不聽經此聖善不護定上招餓鬼此引魔王見過轉深也非禁戒繫縛為小乘讚三毒無礙為大道則四重等無惡不造是誠助諸惡之因痛宜戒之四成魔墮獄過命終自為魔王眷屬受魔福盡墮無間獄上皆現在惡因此屬當來苦果是則世人緣一臭惡之味引致阿鼻極苦有何難捨而不勇斷之哉三結成阿難修菩提者永斷五辛是則名為第一增進修行漸次觀此首標修菩提者而後言斷辛足見第一漸次必兼修習圓通若徒斷五辛何以遽謂之增進修行乎而又何以目為修菩提乎二刳其正性正性謂淫殺盜妄等上之五辛但能助發於此而已今此正彼本惡之體也分為三一徵起云何正性二詳釋又二一教令持戒又三一首示定因戒生阿難如是衆生入三摩地要先嚴持清淨戒律反聞功夫入手方為入三摩地所謂真修之位見其深於前文修習言求也然要先云者承前位功夫聞斷不能入手故示特加嚴戒而後能功夫入手得三摩地所謂因戒生定也二次示先斷淫殺又三一正教永斷永斷淫心不飧酒肉以火淨食無噉生氣淫殺為諸惡上首故令先斷而後可從諸律淫須從心止絶不飲酒預遮昏亂毀犯不飱肉即是斷殺六卷四重律中皆以食肉屬於殺生以火淨食又戒殺之至也凡生鮮之物不經火者皆不敢食示無情生長者尚不忍損況有情生活者豈忍殺害乎問至此方斷豈前位猶許食酒肉乎答此為根利而自來未秉齊戒者故作如是漸斷耳若先具齊戒者不在此例又西天權小未斷者多故令回心漸斷此方純秉大乘凡修行者無不先斷故無俟後斷也二反言決定阿難是修行人若不斷淫及與殺生出三界者無有是處相生相殺未已故也二特教觀淫當觀淫欲猶如毒蛇如見怨賊淫為生殺之深源且根心慣習最難頓捨故偏令觀之溫陵曰淫如毒蛇怨賊者能害法身殺慧命故也三後教漸進戒品先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起此處方全該四重四棄即淫殺盜妄而尼加觸八覆隨亦多妨淫也執身謂禁七支猶粗下進菩薩律儀方細準前道場中說菩薩亦但於四重律從心止絶一念不生為細非三千八萬也二戒成利益分二科一生死解脫又二一斷淫殺所脫禁戒成就則於世間永無相生相殺之業斷淫則不相生斷殺則不相殺蓋無生殺業因則無生殺果報也二斷偷劫所脫偷劫不行無相負纍亦於世間不還宿債偷謂竊取劫謂強取無負纍者無負債之業纍也據經文似惟說盜吳興補大妄語及判觀行似有理據其略曰不妄故不還宿債以大妄語貪其供養故約位言之此應在圓家觀行之中即別十信而小七賢也二業報清淨是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險清淨人躡前持戒三摩提次表大定然定是正行戒但助行耳肉眼觀見十方即色陰盡相後文云十方洞開無復幽暗是也按位當在初信齊小初果舊判觀行於後違經至陰魔中詳辨今竝別判勿泥舊聞次四句受陰盡相後文云去住自由無復留礙又云得意生身隨往無礙今言覩佛聞法又言親奉則須親到非遙見聞而下更言得通游界則愈與後文合也按位當在二三兩信齊小二果末二句想陰盡相後文云於覺明心如去塵垢一倫生死首尾圓照今言宿命清淨則明是去塵垢而照生死也又言得無艱險者既以徹通宿命除己願力永不誤入惡趣所謂離諸生死險難惡道也按位當在四五兩信對小三果此之業報略假戒為助行全本耳門妙定修發通該十信前五備顯六根清淨觀見十方則眼根清淨聞法親奉則耳根清淨得通游界則鼻舌身根清淨以三皆合知相依遠到也宿命無艱則意根清淨三結成是則名為第二增進修行漸次此中前半以諸戒助成正定即觀行位後半業報即齊五信并小三果在圓通中方至動靜不生三違其現業分三一徵起云何現業二詳釋分為三科一根塵雙泯又為二一牒前持戒離塵阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸前文屢牒三摩地而此不牒者以前初心全假戒扶則戒相顯著而定相隱微恐人忘定故屢牒之此中全彰旋根妙定故不勞牒定但惟牒戒為後定因以見因戒生定之妙旨也故首舉清淨持戒之人即牒前半所持諸戒而特申無貪淫者固因其為四重之首壞定之魁以警人必除之意然亦自此句下正牒後半果報中五信三果諸人以印許其力量所至也蓋五信三果則欲界九品思惑已盡豈留淫心故許其心必無貪淫也仍是忘塵極功故復許其六塵不多流逸然許其不多而不許其絶無者以根未盡而相待仍存故但以無漏而薰有漏從多漸少而已非全無漏故不全許耳全分無漏在下科中二進獲塵忘根盡因不流逸旋元自歸塵既不緣根無所偶返流全一六用不行首句躡上忘塵功夫也蓋心無貪淫猶是戒相而塵不流逸即顯定成但淺而非深今復躡之以進銷根性故深於前即圓通漸增位也應是六信次下表彰反聞契性也中二句正明因忘塵而必至盡根以根全倚塵而立故也末二句結成入一忘六所謂但得六銷猶未忘一小乘涅槃正當此際準圓通即聞所聞盡時也按位當在第七信位齊小之四果二妙性圓彰此中三子科即應是圓通中覺空滅之三結而前二科語不相類者以菩薩所談是解結功夫此中表彰即彼功夫所證境界惟第三科語意全同足驗前二亦不謬矣分三一依報明淨十方國土皎然清淨譬如琉璃內懸明月此即盡聞不住所證境界首二句即山河大地應念化為無上知覺正由不住內自覺境法執蕩然故融及世界無復情器之分皎然洞開之貌下喻但表明徹蓋明月在有礙物中不能透徹便如二乘但明內境不與外法融通也今菩薩覺所覺空表裡洞徹故如月在琉璃豈有不透徹者乎此當八信相似色自在也二正報妙圓身心快然妙圓平等獲大安隱此即空覺極圓所證境界前方空智此復空空既不為智所勞亦不為空所縛故身心快然極為脫灑蓋是法身蕩然真心廓爾之意妙圓者無縛故妙無礙故圓平等有三一身量心量俱周法界二有情無情同體不分三自心生佛吻無高下此當九信相似心自在也以身心一如身亦心也三諸佛理現一切如來密圓淨妙皆現其中此則顯然全同寂滅現前但彼約自心此約佛理二義平等也密謂祕密深固幽遠無人能到之境也圓謂圓融交徹互攝重重無盡之境也淨謂清淨明相精純纖塵不立之境也妙謂神妙一切變現皆不為礙之境也此四佛境現菩薩依正之中此當十信相似慈雲覆涅槃海也蓋圓頓理融故令似位全似地上耳三許速證位是人即獲無生法忍從是漸修隨所發行安立聖位此之結尾是預許後之諸位故言從是漸修即者速也即獲者猶言不久當證也無生法忍即初住所證聖位通指徹於等覺也溫陵曰華嚴十忍第三曰無生法忍謂不見有少法生不見有少法滅離諸情垢無作無願安住是道名之曰忍吳興曰此中別指初住以上名為聖位若下文云以三增進故能成五十五位真菩提路三結成是則名為第三增進修行漸次漸次三位已竟二乾慧一位此位分明束前漸次中所含十信總成一位而孤山說合十信為乾慧理在不疑但亦有圓滿成就之意舊注非之者秪因彼見通教乾慧名同務欲同之不知此名若同通教餘名當同別教今餘位既皆借別名圓此位亦應借通名圓何得名實皆同於通教乎當知通教乾慧在於信前但對五品此圓乾慧乃在信後圓收十信豈惟於文為順而實於理大通也分三一不受後有阿難是善男子欲愛乾枯根境不偶現前殘質不復續生此科束前七信而顯其圓滿成就也由前心無貪淫故至此而欲愛乾枯蓋前位但得身心俱斷此則復將斷性亦無故曰乾枯是欲界生緣逈不相及也由前六用不行故至此而根境不偶蓋前位但得六塵初泯此則復至心境絶待故曰不偶蓋根塵雙絶種現俱銷是三界生緣逈不相及也末二句正明不受後有也現前殘質果縛僅存也不復續生子縛永絶也蓋續生以根境為因欲愛為緣乾枯不偶則因緣雙絶果報無托不受後有復何疑哉此顯實分段身已盡無界內繫縛也問菩薩不取涅槃何言不受後有答此言不受業縛之後有非如羅漢并無悲願自在之妙身也問此與前永無相生相殺等何異答大不同也彼但且免生殺酬償惡報而已善淨生緣尚未絶也觀下淨報猶云父母肉身蓋可驗矣此則二十五有無復生緣無復業牽之身但隨悲願自在去住自在受生而已舊注強以抑同五品故不得不以彼而濫此耳況在根境不偶之後顯是七信顧乃執言名義雖同粗細有異豈有名義全同而猶分粗細者乎甚非的確之論也二定名乾慧執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地此科束後三信而顯其圓滿成就也執心嶽師謂即人法二執之心是也若爾豈合在十信前耶由前身心快然等故至此則二執惑盡雙空智純也由前國土皎然等故至此則慧體圓明而照用遍界也由前佛理全現故至此則成就慧身不由他悟也末二句遂以結成乾慧之名釋義在下科中三出其所以欲習初乾未與如來法流水接現種習三習氣最細今言欲習初乾者謂欲愛最細習氣即斷性也初得乾枯也而未得如來真如法流之水以潤之故曰乾有其慧也入初住分真則與真如法流水接矣又說結名元承多義而釋義單約欲言似偏缺也或可欲作欲愛習作二執習氣乾即盡也詳之此位分明相似等覺金剛心中初乾慧地而名亦相同益可見也通論三漸次位第一位名字位中初向觀行第二位合五品及前五信第三位後五信耳然此信等諸位皆依天台圓位非取別教又經文但分三漸本不曾分信等今因有三了簡故須指明一者顯後非信以經文於此位後別有十信名借常途義開初住却將常途十信暗含三漸次中若不分明釋出鮮有不將後信濫於常途如舊注所云也二者顯牒圓通此三漸位但是重束圓通助正始末以為後位初心方便然圓通歷證三空實居十信若不此處指明人見經文後有十信將屈圓通墮於觀行因茲所以一一指明也舊注錯亂惟孤山說乾慧合十信為是然亦不說三漸中已含十信乾慧合之前別後總成四位耳乾慧一位已竟三信位十位此中論名全與常途信名不差一字論義則與常途信義逈不相同況後初住明言發此十心又云十用涉入圓成一心故孤山說為初住開出理無可疑且於中六位皆標住字更是可憑舊注非之不當其引金剛十八住而云何必住位方受住名即應五十五位通名為住何獨於住前十位特特以加之乎其為住位開出愈無疑矣故今立科名從十信而義惟遵經銷歸初住耳就分十一信心即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住此心者躡前乾慧心中中流入者按修圓通初心雖直觀聞性不著空有是亦絶待靈心之中道而粗垢先落人法雙消未免任運趨於圓明之空性非中道純真也至此位俱空不生前之中道於斯益純故曰中中流入蓋言中而復中順法流水而深入也六根互用曰圓情器雙超曰妙開敷者如華始開也次二句明乘此心開益增進也從真妙圓者言此非同前位妙真似圓乃似妙真圓也重發真妙者略一圓字字蓋使真妙者益進於妙真圓者益進於圓應是根塵互周身土重重漸廣如華正開也妙信者親見心佛衆生三無差別非同比量之信常住者堅固不動非同前位輕若鴻毛也妄想滅盡者固是我想法想及非法想俱時蕩盡亦是聖凡見息因果情忘耳末二句總攝前意結成信心蓋純中道非同前位兼帶趨空也親見此理深忍樂欲故名修心乃成就之相住即常住不退也後皆放此此即五根中之信根又此位既攝前乾慧所成而乾慧合前三漸所含十信故知此位乃究竟前之十信而抵於成就所以獨標信住若作常途十信初心豈能當此圓妙常住無餘等義乎二念心真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住初二句全躡前位真表非似明了由親見也圓通即前圓妙以根根塵塵無不交徹故稱一切圓通下文方成本位念心由前一切圓通故陰不覆處不局界不隔也因此遂能遠憶過未至無數劫習氣者業力所熏隨眠種習也按惟識不出三種謂名言我執有支也今言捨受多是有支即異熟識也然一切之言亦兼餘二又在我執位中即是種子若在法執位中乃種子所遺微細習影如畢陵之慢身子之嗔是也今過去多我位粗者未來多法位細者且捨受與習氣二事若未來習氣已盡而獨憶捨受若悲願習氣出三種外亦盡未來問入住菩薩何有捨受之事答圓頓人不取變易常於分段得大自在故也此屬宿命漏盡二通五根中念根故結念住常途二信圓通尚遠今斯位即云一切圓通豈是常途在住位無疑矣又前位是深信本有佛性此位是憶念近習種性此二位所以別也三精進心妙圓純真真精發化無始習氣通一精明惟以精明進趣真淨名精進心首四句躡前二位以成就一精字初二句躡信心初句正躡解在本位次句明其積久而能化也真精者言妙圓純真之觀力漸久精明也發化者觀智強而能起鎔妄之力用也蓋由精故化至化益精耳次二句躡念心上句正躡解在本位下句明其并前習影鎔盡無餘而皆成智慧也故曰通一精明蓋前位本有近習未融為一至此盡鎔為一精明智體矣次二句躡前精字加以進字而雙以成就精進二義蓋精明即菩提體亦如如智體真淨即涅槃體亦如如理體今言以精明而進趣真淨蓋純以如如智契如如理矣問理智一如何言進趣答體雖無二而方便隨順不無趣相所謂不趣之趣性不礙修之旨也末句結名精進五根中進根也四慧心心精現前純以智慧名慧心住溫陵曰妄習既盡故心精現前前位雙兼智理而成此位別約智成上位方言轉惑習而成智慧此惑破故真心顯現心現故菩提之體無復妄雜矣末句結名五定心執持智明周遍寂湛寂妙常凝名定心住此位別約理成以寂照分屬寂定屬理故耳首句躡前位也前位以見心朗徹故智慧純明而此智明若無定力以執持之則妄念起而偏局不遍正念失而間斷不常所謂無寂之照如風中之燈矣故第二句明遍寂第三句明常寂皆大定之相也末句結名五根之中定根也以上屬五根如果木之種初插根於地也六不退心定光發明明性深入惟進無退名不退心自此以下屬五力如果木結根既久有不可拔之力用也此科進力也首二句復雙躡定慧蓋定慧偏枯多遭退失首句定以發慧心不動而理畢現也次句慧以入定鑑既徹而定愈深也定慧互資交發無盡故有進無退末句結名七護法心心進安然保持不失十方如來氣分交接名護法心此定力也首句躡前進力而言心進者明非粗行事相可見者乃自心寂照雙流之精進也而又安然者申前位雖云不退而勤勇無間尚覺涉於功夫此不覺用力故曰安然保持同前執持顯屬定門蓋進安已成定力故恆保持無所漏落如來氣分即法身氣分不出妙覺真精此亦由定境冥周故能與諸佛心精通吻末句結名護法者有二義若約保持為護則是內護心法若約定力伏魔亦能外護佛之法輪也八回向心覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心此慧力也首句躡前定力所持覺體妙力即慧力也次二句蓋言前位如來氣分初接已即蒙佛慈光攝受而尚有自他之分此則久與融一他佛慈光即己心佛慈光然不妨自他歷然故復回此慈光仍向他佛智境朗然安住而亦實無二體然約不妨歷然故如二鏡相寫傳耀無盡蓋惟兩鏡對照影中含影即已重重不必多鏡故惟喻自他二佛而諸佛在於言外可知亦不必加末句結名回向亦有二義若向他佛是向佛道若向自佛是向真如前位二義與此位二義皆以前一義為正而後乃餘義亦所必有也九戒心心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住此信力也首句躡前位明自心與佛光吻合得佛不動之體次二句明得理次二句明不動常凝即佛大定屬心無上妙淨即大寂滅海屬境得佛此理心境恆一如也安住無為者遠離有為功用住持無功用道無遺失者毫髮不漏落於有為之境總是不動之意末句結名戒心者以不犯遺失之過故名為戒然此以一念有為即名破戒可謂甚深戒乎又奉戒依於篤信故五力中屬信力十願心住戒自在能遊十方所去隨願名願心住此念力也首句躡前戒心而言自在者以前位尚局不動之體至此漸發自在之用也中二句即隨願往生淨土無所留難乃得大自在之意耳結名願心屬念力者願即心念而生淨土者全憑想念故也前位住佛法身此位參佛色身又通論十心前六修自心後四合佛德矣信位十位已竟四住位十位住有二意一者堅固常住意對前漸次中所含諸信雖不同別教輕如鴻毛然亦未同斯位行念皆不退也二者生住佛家意以今現文全顯生法王家也亦是安住華屋非同三摩提三漸次中方得入門故大科名令住圓定實自斯位始矣就分為十一發心住阿難是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住以真下二句總躡前十位之言也真即真如心也蓋真如心中本來具足十心妙用不以方便發之終不顯現故今即依本真如心方便發起十種妙心然謂之真方便者亦顯非比常途十信相似方便而已次句心精發輝者即十種心光顯現也十用涉入圓成一心者蓋初從一心而發十用後攝十用圓成一心則十心一心安有二體且斯位元因發此十心名發心住則知離前十心無此住體又知此位合十為一便知前位開一為十何言非開出乎此當即如中陰攬先業而初成陰體也二治地住心中發明如淨琉璃內現精金以前妙心履以成地名治地住初句躡前所發之心而言心中發明者蓋心為能發明之智理為所發明之境下琉璃喻智精金喻理而言以前妙心者即以前十用所成初住之心履以成地者智契於理令理精明結名治地住也此如中陰乘彼業力結為境界於中妄成依止處也三修行住心地涉知俱得明了遊履十方得無留礙名修行住首句躡前心地而言涉知者蓋心與地互相涉知也以心即智亦即始覺地即理亦即本覺同一覺體故曰俱得明了遊履無礙者以見之明而行之到也此如中陰見遠如在目前所去速疾山壁不礙也末句結名四生貴住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住首句躡前修行也言與佛同者以依理起行行不越理本始同一正覺故也此如中陰與父母業同故相會合矣孤山曰分真智與究竟智等名行與佛同分證理與究竟理等名受佛氣分如中陰下以喻明之究竟權智如父實智如母任運相合名自求父母密齊果德如陰信冥通斯即秉佛遺體初託聖胎也五具足住既遊道胎親奉覺胤如胎已成人相不缺名方便具足住首句躡前入胎而言遊者如永嘉云潛幽靈於法界又云常獨行常獨步達者同遊涅槃路此正遊道胎時節也如有福中陰處母胎見華林殿堂親奉覺胤者謂攬佛權實二智凝結聖胎也如中陰攬父母赤白二陰而結凝滑等也形成不缺者謂見聞等圓通妙用具足一切方便善巧克肖於佛無所乏少如中陰六根成就克肖父母也末句結名華嚴釋名言此菩薩多諸方便善巧也六正心住容貌如佛心相亦同名正心住孤山曰容貌喻應用心相喻理智首句躡前外貌同佛而加以內心亦同以成此正心之位然圓師所謂理智固指真中二理權實二智而法界無障礙之理智亦應分同七不退住身心合成日益增長名不退住首句躡前外貌內心而言合成者謂表裏如一成佛身心也日益增長謂深以擴克漸成熟也末句結名前第六信定慧不退此相性不退也八童真住十身靈相一時具足名童真住雙躡前外身內心增長至此皆已具足以十身中除菩提法智屬於內心餘皆屬於外身故也溫陵曰十身者菩提身願身化身力身莊嚴身威勢身意生身福身法身智身也資中曰十身靈相即盧舍那也聲聞身緣覺身菩薩身如來身法身智身國土身業報身衆生身虗空身則師云溫陵所解菩提身等即是資中所解如來身中之所開出者也九王子住形成出胎親為佛子名法王子住形成二字躡前十身具足也而言出胎者以前位十身初成未大顯著至此赫奕熾盛故說出胎親為佛子者按華嚴此位菩薩習學法王十種親密之事自善巧以至讚歎故云爾也末句結名是知凡稱法王子者皆須九住後也十灌頂住表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住首句躡前出胎之後又以長成也孤山曰表以成人堪行佛事也太子世子異其文耳春秋曰會太子於首止禮云文王世子皆天子之子也陳列灌頂者華嚴云轉輪聖王所生太子母是正后身相具足坐白象寶妙金之座張大網縵奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位菩薩受職亦復如是諸佛智水灌其頂故名為受大智職菩薩彼第十法雲地名灌頂菩薩今此十住亦分得也然圓教分真以來悉有應用論智力不無優劣故初住百佛世界現十界相利祐衆生位位竪入倍倍增勝經中所明各就一義若論一位具諸位功德則十義俱遍十住既爾下去皆然約位至此統界實多華嚴此位世界衆生皆稱無數而斯經文如分委之喻似亦可分統藏海之剎種也其所謂智水灌頂者按華嚴此位菩薩其已成就及當習學共二十種智故云爾也又若對權教此齊十地而彼妙覺密齊二行於四禪天諸佛智光悉灌其頂今此位鄰近而加以圓人智強故即灌頂矣溫陵曰自發心至生貴名入聖胎自方便具足至童真名長養聖胎至王子住名出胎至此乃名灌頂王子再通上喻之十信前六心如人回心初造善業後四心如人加以念佛造往生淨業初住如以一生十種善淨之業圓成報終往生之中陰二三住如往生陰無繫縛也四住如中陰求佛接引入蓮胎也五住至八住如華中長養也九住如華開見佛十住如親蒙授記也以喻詳法歷然可見住位十位已竟五行位十位前十住方生佛家乃至領佛家業此十行乃攝行佛事也又大乘初心固即二利兼行而信住位中利他未勝故此經前二十四位中竝無顯標度生事業今十行中利他之事漸彰顯矣以華嚴對校明是六度而後五度乃開智度為五亦不與常途十度同也就分十一歡喜行阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行此施度也華嚴首標此菩薩為大施主也成佛子已躡上出胎灌頂也具足諸佛妙德者按華嚴此菩薩學習諸佛本所修行乃至演說諸佛本所修行如是十句皆言諸佛本所修行是也十方隨順者即廣行布施也華嚴云隨諸方土有貧乏處以願力故往生於彼豪貴大富財寶無盡行財施乃至身肉不吝行法施則與說三世平等乃至菩提涅槃是為十方隨順也結名歡喜者華嚴云衆生乞求菩薩倍復歡喜曰此衆是我福田是我善友等也亦云令諸衆生歡喜滿足是也而餘文亦有體達三空不著相意無煩備引矣二饒益行善能利益一切衆生名饒益行此戒度也華嚴此行首標護持淨戒而以不著色聲等五欲為本乃至不生一念欲想何況從事善能利益衆生者華嚴云令一切衆生住無上戒乃至菩提涅槃又自得度令他得度乃至自快樂令他快樂凡有十句皆雙標二利故結名饒益以戒德而饒益也三無嗔行自覺覺他得無違拒名無嗔恨行此忍度也華嚴首標此菩薩常修忍法彼名無違逆行即無違拒也凡有辱來違拒不受即是不忍今無違拒當即是忍華嚴謂無量罵辱打辱皆能歡喜忍辱是也今言自覺覺他得無違拒者亦如華嚴云菩薩思惟自身與苦樂皆無所有即自覺也又云我當解了廣為人說即覺他也又總結云自得覺悟令他覺悟與今經文全同皆謂覺悟毀辱虗妄應無違拒也結名無嗔行者如金剛云若有我相人相等於支解時應生嗔恨是知無嗔恨方為真忍也四無盡行種類出生窮未來際三世平等十方通達名無盡行此進度也華嚴首標此菩薩修諸精進且自第一精進乃至普遍精進共十種精進種類出生華嚴謂阿鼻盡出皆得成佛皆入無餘涅槃然後自果方成夫衆生極至阿鼻成佛則盡其種類即如金剛所謂十二類生皆入無餘涅槃而滅度之謂也出生即出生諸佛也盡未來際者謂海滴剎塵盡劫苦行終無一念悔恨是也三世平等者文云但為知三世平等性故而行精進是也十方通達者文云但為知一切法界而行精進是也以十方即十法界故耳夫種類出生即第一心盡未來際即常心三世平等即不顛倒心十方通達即廣大心四皆無盡故結名無盡之行然華嚴無屈撓行直表精進而已此申四種無盡見精進之殊勝也五離癡亂行一切合同種種法門得無差誤名離癡亂行此禪度也華嚴首言此菩薩心無散亂堅固不動等是也一切合同種種法門即以一念定心持一切法也華嚴云能持出世諸法言說乃至能持建立受想行識自性言說又云善入一切諸禪定門知諸三昧同一體性是也得無差誤者如云菩薩聞無量法經無量劫不忘不失是也結名無癡亂者良以定中不能持諸法門是為癡定於諸法門不免差誤仍是亂心今持種種法而又無差誤是癡與亂俱離也又梵語禪那此云靜慮今離癡是慮離亂是靜故屬禪度無疑六善現行則於同中顯現羣異一一異相各各見同名善現行此智度也此下五行與華嚴名雖多同而義貫不類亦與常途後五度逈殊細詳乃是總一智度而開之為五種甚深般若例如六根本惑而開見為五也所以融前五度中萬行皆令成至德矣今此一行乃理事無礙智亦二諦融通智也同中現異者即理不礙事亦真融通於俗也異相見同者即事不礙理亦以俗融通於真也而結名善現行者明此菩薩於一一行事理雙顯真俗竝融矣七無著行如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行此事事無礙智即十玄門中廣狹無礙自在門也然亦略舉一門而此菩薩應亦十玄竝融也十方微塵現十方界者如經云華藏世界無數塵一一塵中見法界是也溫陵曰此由善現行充擴圓融也塵中現剎名現界不壞塵相名現塵不相留礙者界入塵而界不小是小不留礙於大也塵含界而塵不大是大不留礙於小也結名無著行者明此一有執著安能小大竝融如此三祖云極大同小永無邊表極小同大忘絶境界永無與忘絶即無著也八尊重行種種現前咸是第一波羅蜜多名尊重行此究竟彼岸智也種種現前等躡前二無礙智而明其取證究竟自利之極果也梵語波羅蜜多此云到彼岸蓋生死為此岸涅槃為彼岸今言第一即佛無餘大涅槃也又種種咸是者如四卷云種種變現皆合如來涅槃妙德是也然全屬般若者以前五度若無般若皆墮事相惟招果報不達涅槃今五度萬行皆以法界無障礙智融之所以皆達彼岸莫非第一波羅蜜也結名尊重行者以大涅槃是佛極果亦即如來頂相故也華嚴名難得行者行行皆到彼岸誠不易得矣九善法行如是圓融能成十方諸佛軌則名善法行此軌物生解智也華嚴此行專名說法無礙如是圓融等亦躡前二無礙智而明其建立究竟利他之教法也而諸佛軌則者即開示衆生無量法門然既躡二無礙之圓融則惟取六相十玄等所謂一字法門海墨書而不盡者也末句結名可知十真實行一一皆是清淨無漏一真無為性本然故名真實行此不違實相智亦會緣入實智也一一者固躡二無礙自利利他諸行而實總前九度俱該也清淨無漏謂非貪染於凡外欲有無明一真無為謂非劬勞於權小肯綮修證性本然故者作二句之由意明從性起修不妨全修即性所以清淨不屬諸漏本然不墮有為也又解清淨無漏揀異三界有漏一真無為揀異二乘有為性本然故揀異權漸修成亦通結名真實者由無漏則非離妄修究竟成真因也故名真行由無為則非所作性畢竟有實果也故名實行又通論智度所開五行前二是般若之體以二法界無障礙智乃甚深般若故也次二是般若之用謂波羅蜜乃趨果自利之用佛軌則乃說法利他之用故也末一攝前體用并前五度萬行總以銷歸自性會性歸元也行位十位竟六回向十位準華嚴回向即是發願圭峯謂不過三處即衆生佛道真如也華嚴文極浩汗意多遍兼三處今經文簡各有隱顯如衆生顯餘二則隱佛道真如顯隱亦然顯者正當發揮而隱者亦以意含非全無也故此經與華嚴文雖不類而旨無不合也又華嚴位位多明菩薩修證德業故文義汪洋此經多推得名所以故文詞省約也此二經差別之意就分為十一離相回向阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅除度相回無為心向涅槃路名救護一切衆生離衆生相回向此與次位皆回向衆生也是善男子指已修十行人也滿足神通總攝前八行也蓋從初行以至第八現塵現界神通已極無少缺缺成佛事已躡第九行也蓋成佛軌則即成佛事純潔精真躡第十行也蓋清淨無漏即純潔一真無為即精真遠諸留患總攝十行而結定也蓋十行備成則界內不為諸有留患界外不為滯空留患即雙超世出世間也此上皆躡前文向下方屬本位華嚴首標六波羅蜜全同今經躡上十行之意當者正也蓋言正度衆生之時即滅度相表非前後也度即滅度之度然此二句全同金剛經云我皆令入無餘涅槃而滅度之實無衆生得滅度者次二句乃釋成回向二字專承滅除度相而來夫既度盡衆生不取度相則回有為行入無為心是回入真因也背生死途向涅槃路是趨向真果也二句各說同成一趣真之意非以上句成就下句若作成下之意當云回入無為以趨向涅槃良以常處有為而不回入無為終不能達涅槃之路故也此之十位理應圓滿中道以從賢向聖故方言度生而隨滅度相彰中道也舊注謂回真智而向俗悲既不順其文而亦不得其意也十向之後更當詳申結名救護衆生者如華嚴始於救離三塗而極至住佛所住當亦是破五住離二死方為畢竟救護也末句同於滅除度相華嚴亦謂不著衆生相以至想見不顛倒是也二經旨同斯經取要言之耳二不壞回向壞其可壞遠離諸離名不壞回向壞即上文滅除也可壞即上文度相也諸離即上文離衆生相也蓋離衆生相時則於衆生之四相五蘊皆離故曰諸離應即是我法二空相也今復遠離於此者蓋不畢竟取著於我法二空相也如云雖滅除度相而超乎愛見之境亦不取著二空而壞乎度生之悲華嚴云雖知一切法空寂而不於空起心念是也結名不壞者即不壞度生事業也華嚴此位依舊廣興布施是也合上位論之上位言雖度生而不著生相此位言雖不著相而不妨度生正悲智雙運自他二利之中道也三等佛回向本覺湛然覺齊佛覺名等一切佛回向此下四位皆回向佛道也此位先明智同佛智蓋即本覺智同佛究竟覺智也本覺湛然者心佛顯現覺海澄停如華嚴謂廣大清淨是也覺齊佛覺者謂與一切如來心精通吻稱合妙覺法身圓滿無二結名等一切佛者謂與諸佛法身平等所謂我與如來寶覺真心無二圓滿也四至處回向精真發明地如佛地名至一切處回向此位次明境同佛境蓋即因地境界同佛果地境界也精真即本覺體發明即發揮妙用地如佛地者正表發揮自己因地心中所含無邊境界全同諸佛果地理上所現無量剎土也結名至一切處者即盡佛境界之意華嚴此位說菩薩廣修供養遍至佛處而後言三業普入一切世界以作佛事乃至於一毛孔中普入一切世界等是也五無盡回向世界如來互相涉入得無罣礙名無盡功德藏回向此躡前二位而成互融也世界即所至之處如來即所等之佛前二位中猶分自他故說自覺佛覺自地佛地今此融一不分故但言世界如來即自他渾具也互涉之意如云以世界而涉如來則一一毛孔中有無量寶剎莊嚴微妙以如來而涉世界則一一微塵內有無量如來轉大法輪得無罣礙者言世界正涉如來時不礙如來即入世界如來正涉世界時不礙世界即入如來問前二位中元以智境分釋似以性相為對今既雙承何又變為依正互涉之對耶答佛於智同之位結名處即言等一切佛已即取於證智人身故此位但承二結名語以言如來身與世界涉也若取智性與境相對言則一無形一有形說涉不便況依正之相非智性不融故說互融時智性在其中矣結名無盡功德藏者以佛身佛界各具無量莊嚴備表無盡功德故云爾矣華嚴明此菩薩以普賢大願行為根本以華藏無邊世界莊嚴顯功德故其文如雲如林此經乃復言簡而盡義富而妙矣乎六平等回向於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向此佛地即躡前功德之藏菩薩證此即同如來果地則是因前已先具足佛果蓋圓頓上乘先以頓同如來果地法應爾也地中各各者以此藏中功德無盡如六度萬行萬德莊嚴皆其本有故言各各爾生清淨因者依彼本有一一隨緣各起無修之修譬如依金造器器器皆金豈不純一清淨故云生清淨因依因發揮取涅槃道者蓋前則從果生因此復乘因剋果實乃因果互徹性修雙即之旨也涅槃是佛究竟極果故此地與前住位所履之地不同彼是自心理地此是如來果地結言隨順平等者順自心與佛心平等也足見不達自心與佛果地全同不是從果修因者皆非順性之修言善根者表此方是成佛真因必生實果矣華嚴名堅固善根文與斯經稍不類多言布施身命回向衆生而已七等觀回向真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向此位文似回向衆生而實是回向佛道首句躡上清淨因及平等善根即真根也此根全修即性而此性攝盡衆生故曰皆我本性然我根既成衆生齊成故曰性圓成就蓋成就真根即成就佛道也不失衆生者以若觀見生非心外一成皆成則無生可度失大悲心不可也菩薩雖見自他圓成不妨仍度苦惱衆生是以華嚴此位依舊廣行二施結言隨順等觀者順自心與生心平等也足知不見一成一切皆成不於成就而仍行悲度者皆非隨順自性也然謂之等觀衆生者觀其自他同根而仍以見智悲無礙而已合前位則心佛衆生三無差別之理彰矣八真如回向即一切法離一切相惟即與離二無所著名真如相回向此下三位皆回向真如也即一切法者如華嚴初文不過世出世間諸法所謂世界衆生法門業行等也離一切相者即後文云不著世間不取衆生知一切法無有自性皆悉寂滅等也即離無著者如後文又廣陳譬如真如一百七十相細詳其意但以此經不即不離似便該盡足見斯經以約收博之妙蓋不著即超有也不著離超空也乃雙超空有之中道也華嚴於真如相後說十平等即中也結名真如相者真如以無著為相故也若準前相躡而解則前之度生成佛攝盡萬法即一切法也離衆生相同本來佛離一切相也下方是本位於此即離二無所著方契真如相矣足見入理轉深之意九解脫回向真得所如十方無礙名無縛解脫回向首句躡二無著已得與真如一相也十方即十法界也無礙即法界無障礙大解脫蓋前位理無礙此位則理事事事二無礙也華嚴以六十二番無著無縛解脫心修普賢行彌滿法界且得一百五十六種甚微細智其餘法界安往而不自在乎結名無縛解脫者即入法界不可思議解脫良以前位方得離繫解脫此位轉得自在解脫故結名十無量回向性德圓成法界量滅名法界無量回向首句躡前二位而來蓋無著獲性德之全體無礙獲性德之大用體用備具故言性德圓成若依孤山所謂三德妙性圓成亦躡前合後則無著即般若無礙即解脫無量即法身矣法界量滅者良由體無不遍而用無不周是以一塵一毛皆等法界無復限量是則量滅者即無量也華嚴此位專以法施善根莊嚴一切佛剎從遍法界無量自在身乃至遍法界無量利生善根共二十句皆言法界無量復有住法界無量及安住法界無量共三十六句皆法界量滅之意結名可知問八結真如九十不結何以俱言回向真如答九之無礙十之無量皆真如相故三同一處也三處雖以區分而實位位圓滿中道一悲不礙智二智不壞悲三本妙合覺四因果同地五依正互融六性修雙即七自他同根八即離雙超九真俗自在十體用圓極所以華嚴說位至此動地雨華諸天供養歌讚也又此名位在別教稱為外凡而此圓實位中自初住已即齊彼地上至此更超彼佛一十八位大非別教所仰視也回向十位已竟七加行四位擕李曰據瓔珞等經皆不別列四加行位若惟識等論則以地前四十心為外凡資糧位十回向後別明暖等為內凡加行位焉吳興謂借別名圓者名意略同而實不同也惟識謂加行者加功用行以近初地見道從凡入聖是大關節須加功行此即名意略同之處問此經佛判六十聖位何同惟識復分凡聖答與奪同別二俱無礙若約圓初頓悟本佛故與其同是聖位若斟別淺深則信解之視真修不妨有凡聖之別但此圓凡已超別聲遠矣分為二一結前起後阿難是善男子盡是清淨四十一心次成四種妙圓加行溫陵曰四十一心者乾慧一信住行向各十小乘通教皆有四加而非妙非圓故此特標妙圓加行以先悟本成而後起無修證之修證故曰清淨然特謂之妙圓者以從初位至於住滿雖皆純用中道而文中未嘗顯言利生之事是則趣真之智居多十行位中始以明言度生是則出俗之悲最勝十回向文中顯然真俗互融悲智等運位位願願圓滿中道故今躡十向而談加行最為妙圓謂於諦理非三非一曰妙即一即三曰圓問華嚴位位俱有度生何無真俗中之次第答二皆佛言各有所主當互發明前不云乎華嚴演功業故詞泛廣而渾同楞嚴原立名故詞切要而區別相資而不相礙也問既由純中而趍真出俗又由真俗而圓滿純中即應極證此位何以復加而十地何以復修乎答十信似修而實但滿其信心三賢似修而實但極其解心皆非真修也今信解滿極將入真修故說加行矣是則尚非真修豈可輒言證極乎問信前豈無信解修耶答皆似信似解而已縱有修相亦但發似信似解之功夫耳尚非似修豈濫真修又未入五品與既入之位復有散定二心之別然則進修次第思過半矣夫歷六十而均稱聖位者尊其頓悟也列十科而區分諸位不廢修成也達性修之無礙者斯可與議道哉二別明四位此異惟識位位各有能發定所發觀及所觀法今詳經文但以心佛二字對辨四句而成四位蓋是以心攝衆生以佛攝真如即是總躡前三處也不止第十開出就分四一暖地位即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地據相攝之義固十向總躡據顯然之文仍有別躡之處此位似躡覺齊佛覺而來則師云前之佛覺雖曰能齊未能正證今將趨聖果故即用佛覺為己因心復加功行以求正證初入因位未即得果故譬鑽火方得暖相前但發願希求此則實用進取又前佛見未忘未能泯為己心此方泯佛見而但惟一心猶云佛即心也因位即指本位果則指初地也惟識此位入明得定發下尋思觀創觀名義自性差別皆空而已二頂地位又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地此位似躡地如佛地而來以所履即地相也吳興曰依暖地心修佛果智智觀於心故如足履地心相垂盡故若依非依高山喻當位之心虗空喻所依之理心相未盡故下微礙礙至於微明心相無多也蓋前位佛見雖泯心見猶存至此則復泯心相而但惟一覺猶云心即佛也惟識此位入明增定發上尋思觀重觀名等四法皆惟心變也三忍地位心佛二同善得中道如忍事人非懷非出名為忍地此位但以總承前二位雙存心佛故曰二同猶云即心即佛也因果交徹故曰善得中道溫陵謂因果兩忘乃濫下位矣其以將證未證配非懷非出不差於忍事而言非懷非出者蓋既能容忍非如常人之懷恨故曰非懷然尚存忍受非如至人之頓忘故曰非出其於所忍之事將忘未忘比於忍地菩薩將證未證恰相似也惟識此位入印順定發下如實觀印前四法是空四世第一位數量銷滅迷覺中道二無所目名世第一地首句標此亦總承前三位而雙泯心佛故曰數量銷滅蓋有心有佛因果位別皆是數量此則方是因果兩忘猶云非心非佛也次二句釋數銷也以迷覺二字雙貫下之中道然迷中道者非謂迷了中道蓋迷即未覺位也故迷中道者即未覺位中因人所修之中道耳覺中道者亦非謂覺了中道蓋覺即大覺位也故覺中道者即大覺位中果所證之中道也是則迷中道仍是菩薩因心覺中道仍是佛之果智於此二無所目者蓋下不見自心上不見佛智而心佛兩忘不存數量於世間法中最為第一是顯登地方為出世成佛方為出世第一也惟識此位入無間定發上如實觀印二取空伏除二障俱生分別也夫初位佛即是心次位心即是佛三位即心即佛四位非心非佛故不離心佛二字而四位章章矣然此中特引惟識者有三意一令人就明惟識以彼名既同此安可不察其義二顯彼不同此蓋既達彼義便見名同義別三明此深彼淺蓋彼初地方齊此之初住故彼地前四加即此住前十心所以四定四觀略似十心中定慧根力而實偏圓異旨況此四加已超彼佛一十八位之上豈可同年語哉又孤山謂此十向開出義亦無差理猶未盡蓋凡進證一位必有入住出之三心今四加在向地兩楹之際應是十向出心而初地入心倘不另開合前合後無不可者後之等覺金剛放此推之加行四位已竟八地上十位溫陵曰十地者蘊積前法至於成實一切佛法依此發生故謂之地也約此則有二義一者成實義蓋地以堅實為體故也二者發生義蓋地以發生為用故也據前四卷末如來但立因果二地文云得元明覺無生滅性為因地心然後圓成果地修證則是但以初住圓通本心為因地而以佛究竟妙覺為果地中間皆圓成果地之位也今考禪那聖位本文二住即名治地而以前妙心履以成地又回向第四云精真發明地如佛地至四加位位位稱地此皆因地也蓋地亦訓階良以十地方是真因而地前說地乃此真因之階地也今此十地應亦果地攝也雖佛地方是真果而此十地乃進證真果之階地也又以修證而言則十地既稱真修影顯地前皆是似修佛位既是真證則十地但惟似證是則初心究竟理雖頓同而歷位淺深序仍不濫圓融行部二無礙矣就分為十科一歡喜地阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地大菩提者五菩提中應是無上菩提據本經四卷佛自結名無上菩提者乃以非一切即一切及雙離雙即三如來藏為全體以一多相即大小無礙乃至遍包融攝為大用是也此位方以通達而未證極仍是明心菩提見道位也前云三有衆生出世二乘以所知心不能測度今則惟許此位菩薩不惟通達而且善通達也然此二句似方標定次二句乃釋此也覺通如來者即自心本覺與佛心妙覺圓融無二所謂惟妙覺明圓照法界即覺通也盡佛境界者亦以三藏四義四相全體大用攝盡佛之妙境此二句表其正由覺通如來盡佛境界所以通達無上菩提然通之一字乃實證親見非同文字比知又當知覺通二句乃躡前四加中即心即佛彼方將證未證此則實證又彼縱覺通而未盡境此則不但通而且盡所以增勝而為聖位矣華嚴說此菩薩善知諸地障與對治等十句皆言善知亦似通達末後結以轉入佛地方似盡境然通達地上修因之事恐未合此無上菩提二經之旨似稍別也智者詳之結名歡喜者於所希望初得通達故也金光明云初證得出世之心昔所未得而今始得於大事用如其所願悉皆成就生極喜樂也二離垢地異性入同同性亦滅名離垢地躡前位則覺通如來即九界異性入一佛境名異性入同始證必不忘於佛境而佛境當情即此便為清淨本然中之微垢也是須將此同性亦復滅除方所謂離垢清淨又若躡前四加中非心非佛彼方加功此亦實證也又彼非心非佛數量銷滅方是異性入同此復將此同性亦滅進證體垢亦見增勝而成二地聖位矣華嚴金光皆表離諸破戒之垢旨似頗異不必強同若以墮異墮同即名破戒此固甚深而亦似強合矣三發光地淨極明生名發光地淨極二字全躡離垢而言前位方以離垢未至離離今復將離垢之離亦復遠離是為淨極真覺顯露是為明生譬如古鏡離垢之後更加拂拭則淨而生明自然之理蓋生佛異同情垢細障既淨無餘則本有照用顯泄而不容遏密所謂淨極光通達也華嚴明此菩薩大發真淨六種神通意相似也結發光即生明也四焰慧地明極覺滿名𦦨慧地明極躡前明生蓋前位如火始然光明始生未至明滿此位則如火熾然成大猛聚惟識與金光皆言燒煩惱薪此雖理深亦必有微細惑障為其所爍絶也而言覺滿者蓋明稱性故言覺滿所謂寂照含虗空也華嚴此位全修助道三十七品所謂菩提分法似正燒薪之意然文中乃表生法王家似同此經四住不可不詳細玩此諸地上文多約其所證理之淺深以立位次不同彼經多陳修斷來哲無黨但究義而較分劑不可秪觀文之廣略而分勝劣也結名焰慧者表如𦦨之慧有𦦨絶之勝用而已五難勝地一切同異所不能至名難勝地首二句以初地覺通如來異性滅而惟一佛境二地同性滅而佛境亦忘初復清淨本然了無罣礙自此復經兩地由淨而明由明而滿則前之異同遠離之久故至此杳不相及蓋理極圓融無復同異之可見結名難勝者一切世出世間逈不能齊況能過勝乎惟識謂此地真俗兩智行相相違合令相應極難勝故是彼真俗似類同異然彼合之最勝此則逈脫難齊權實偏圓旨趣有殊但相似而已六現前地無為真如性淨明露名現前地夫自地前加功用行由賢希聖乃至入地銷異滅同明生覺滿由是逈超同異而有為功用最勝勝極無能勝者然而極盡有為則無為真如性方顯現故以現前名地良以圓頓人發心即頓悟真如妙性忘情佛境然而五住未破心垢未除其於真如尚屬比知豈即親證今由似修而歷真修極盡有為功行將至無功用行故於斯地真如方始顯現初得親證然而真如全體大用當在八九兩地而八地真無功用此地方到無為始顯真如而已又此但約性顯而名現前華嚴金光多明功行顯現似亦殊旨故不煩引也七遠行地盡真如際名遠行地前位真如方得顯現尚未全彰況能行盡此則盡其實際莫不徹至溫陵曰同異不至則真如淨性明露現前矣真如現前分證則局盡際乃遠逈超極造故名遠行吳興曰盡真如際者斯是無際之際理既無際行豈近乎此經從五地同異不至則有為功用即已畢竟六地無為真理即已現前至此則真際全彰華嚴此地方明功用極至且但言功用殊勝而總不言本理顯現似亦殊旨智者詳之八不動地一真如心名不動地溫陵曰既盡其際乃全得其體一真凝常故名不動六地真如方以顯現七地方以全彰而實未即用為己心今言一真如心者己心佛心二俱圓泯惟一真如本心即一真如法界而已名以不動者動即變也而如理精真一無變異故云爾也菩薩當住此地根身器界一塵一毛悉是真如自心所謂徹法底源無動無壞故以不動名之蓋自初心領悟者至此而親證不謬矣華嚴此地方明十身互作又於此地而列十地別名亦有童真之號至偈明乎八住頗似同此經八住合前四住生貴之意推度不可不甄別也更俟後文以通伸詳辨九善慧地又二一正明本地發真如用名善慧地前位是得真如全體此位是發真如大用稱體起用自然之理華嚴金光多指功行而此經似說本真自體自用前位如一塵一毛皆清淨本然周遍法界此位則一一互攝互入即遍即包等十玄業用皆真如用也結名善慧應即法界無障礙智也問七行之塵界互現五向之依正互涉與斯何異答七行方有是行五向方有是願未說親證本真自體自用法爾本具者顯現發揮此真修位中相似親證故大不同詳此十聖行相與華嚴多所不同故推聖言以求至理非敢妄生去取若華嚴惟識金光皆言此地具四無礙辨為大法師最善說法然華嚴發明說法境界亦大不思議謂其能令有情無情遍演法音等資中曰華嚴名此菩薩具四無礙智作大法師演說無量阿僧祇句義無有窮盡故名發真如用豫謂說法固亦可以說為發用然方是大用中一用耳故明用不遺說法而說法豈盡大用耶餘地皆不盡同此何必同乎故須具足十玄方為稱真之用然亦豈遺說法二結釋通名阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位諸之一字非但只指九地已往者乃通指上位或惟四加以至九地以佛於四加前總結過四十一心顯彼是修位前諸方便心也此復總結故宜但從四加顯修位耳修習下二句以自初心頓悟妙真如性由是歷位修斷以至於此真如全體大用親造實到無缺無餘故云爾也又若二句別以分屬自四加至六地修習畢功以次位即入無為故也自七地至九地功德圓滿謂真如本具性功德畢顯又後位但惟取證故也末二句明標自此地以前通名修習而實彰顯後三位修意少而證意多也此亦不違相宗但以十地總修習位也十法雲地慈陰妙雲䨱涅槃海名法雲地舊解多種似各偏缺而名義亦不相顧吳興以上句屬於慈而次句以衆生本寂滅相為涅槃海是但利生也溫陵亦以上句總屬於慈而但標為自己果德却以下句為如來果海謂兩相稱合是乃人分自他而法惟目果也又法雲二字惟識謂大法智雲含衆德水充滿法身金光明謂法身如虗空智慧如大雲皆能遍滿覆一切故華嚴謂受大智職增長無量智慧功德名為住法雲地是皆似以法為法身雲為智雲總是理智孚契之意今別解之上八字為義末四字結名義中慈妙是法慈目利他之悲妙旨自利之智陰雲是喻陰取庇潤之相雲取充滿之體悲如陰而智如雲二者俱有蓋覆之意故下句覆者稱合圓遍也良以悲智陰雲是十地圓滿因德涅槃海是十地將證未證之果德涅槃略取圓寂為義真無不圓而妄無不寂之謂海者喻此果德之量橫亘竪窮廣無邊而深無底菩薩悲智圓滿切鄰斯果故於斯地方以稱合而無少缺闕也故知前非無智無悲但至此而稱合涅槃為勝耳然亦不說稱合佛德恐濫等覺結名法雲地者以名召義則法之一字雙含悲智雲之一字該攝於陰而攝用歸體以此二字之名召上八字之義可謂名義相孚矣通上經論考之經固佛言論亦佛意豈敢妄生敬慢輕起抑場但旨寓於文而聖語錯綜實無定相固不可私於所習而失其公評亦不應避嫌而隱佛實義夫惟識金光文義皆同雖華嚴事用洪廣語意亦無大殊獨此經文辭簡而義逈殊了無符同之相且華嚴四地方說生法王家而此經四住明言譬如中陰自求父母陰信冥通入如來種似全同彼生法王家至於四地但言明極覺滿了無生貴之意又華嚴八地方說十身相作而異名中亦言是童真住此經八住已云十身靈相一時具足名童真住至八地但云一真如心了無十身童真之語又華嚴九地明言法王子住而此經獨於九住受法王子名至九地但云發真如用杳無王子之稱又華嚴十地顯言灌頂受職而斯經十住明言如國大王分委太子陳列灌頂等至十地但云慈陰妙雲覆涅槃海了無灌頂之相是華嚴四八九十地位皆同斯經住位餘地亦但名字多同義亦不類至於兩經住位亦但名字多同而義各差殊凡若此者豈可謾不加察哉吳興遽以地住十身之同而抑華嚴為別固大不可以二經皆但借名別教以誘彼而已而義實皆天淵也管見責之固當然但高推華嚴亦不詳訂異同之由似亦未盡理也今有比度試與智者商之非敢執為定說也斯經具二無礙法界各一分意旨頗同華嚴但辭有廣略耳然亦未有更比華嚴超越之理問今何現以十住同華嚴之十地耶答佛語自在應有兩途一者融攝意蓋圓旨一攝一切則初住即應攝初行初向初地如是乃至十住即應攝十行十向十地若此則應十十各同何止住地四位之同耶二者開合意蓋佛語無定或開前而合後或合前而開後今楞嚴恐或合華嚴住行向為十信亦如天台合別家二十三位為後三信是也請言其相答以五根初植為住義以進定二力收定散諸行以第八慧力明言回向九戒十願皆向意也由此十信合彼三十故得以此經十住遂對華嚴十地問若是則住後諸位復是何位答俱應是等覺開出耳問等覺一位安得有此多義答華嚴十定十通十忍與斯後位法數正均但建立異耳楞嚴分取同他謂每於十位皆分取定通忍三而同他權教立行向加地之名亦所以誘引於彼也請明其相答如十行中前四度是忍皆須勤勇無間故也禪度是定後五智度是通神通與智互相資發故也十向則初二是忍蓋十忍中無生最勝二向無生可以意得也中五是通一總四別總意可知至一切處不過十方三世乃眼耳宿命三通也次三向神境漏盡他心如次三通也後三真如皆自性定可以意得加地則三別一總四加全作於忍勤勇無間意也初地至四地是通蓋通達盡境則眼耳神境宿命他心皆極增盛離垢可當漏盡明生明極仍是最勝三明五地至九地是定前一引起後四皆自性增勝定也十地是三之總慈悲無緣忍也智慧無障礙通也稱合涅槃定也此之開合但因二經住地之位既同恐須如是開合理或然矣又華嚴等覺一位含攝甚多恐是楞嚴行等諸位然上聖境界惟證乃知終不執定姑存之以供智者玩適取捨隨心亦不必深誚也地上十位已竟九等覺一位起信等諸經論中亦有於十地後不開此位者乃合入十地耳或目為果合入妙覺然而因有多分果惟一位合入十地為正總不若今經另開問行向地等既即定通忍應即等覺憑何又開答等覺義長攝廣前義不攝覺際入交何妨另開分為二科一正明本位如來逆流如是菩薩順行而至覺際入交名為等覺此位將明菩薩始覺等於如來妙覺故先舉如來而言逆流者蓋謂如來已先證入妙覺果海無復進取但惟不捨衆生倒駕慈航逆流而出而此菩薩乃言順行而至者謂其進取未竟方趣果海順流而入也覺際入交者菩薩始覺與佛妙覺分劑正齊但有順逆之不同耳譬如入海採寶者前商已得諸寶逆流而出到於海門後商方以進取順流而入亦到海門是二船恰齊但前商船頭向外後商船頭向內為不同耳吳興曰瓔珞經云等覺照寂妙覺寂照即其義焉溫陵曰十地菩薩混俗度生與如來同但所趨逆順與如來異蓋如來逆流出同萬物菩薩順流入趨妙覺已至覺際故名入交與佛無間故名等覺即解脫道前無間道也二出所得慧阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地首二句通前總躡見始終同名乾慧而實名同義別耳言從乾慧至等覺者中間所攝五十四位并能攝二位共五十六總以結盡是覺即指等覺金剛心者解脫道前無間極力至堅至利能斷無明生相微細惑體故云爾也然連此以稱乾慧者顯是究竟乾慧揀異前之初心乾慧也溫陵曰前名乾慧以未與如來法流水接此名乾慧以未與如來妙莊嚴海接吳興曰以障妙覺無明初乾未與究竟如來法流水接故也初乾即是始獲蓋表前位皆未能得此慧至此始得初乾矣諸師於此或但合入等覺或更別開一位愚謂詳玩是覺始獲四字則合於等覺固無不可然更玩至已二字斷是等之後心則別開亦通今但取五十五位則合之為是取單復十二及六十聖位則開之乃宜以佛語自在類多開合無定不應執於一也十妙覺一位如是重重單復十二方盡妙覺成無上道初八字結上因位盡也一字但局一位為單一字總包十位為復十二者或單或復共成十二也當依溫陵取一乾二信三住四行五向六暖七頂八忍九世十地十一等十二金也於中乾暖頂忍世等金七位為單信住行向地五位為復也末八字正明究竟果位總前位皆趨此果至此方收成功獲無上正真之實果也盡妙覺者謂因位初心圓人始覺雖漸次而深以本始未一能所未忘皆未盡妙乃至等覺亦但至齊而尚未能一今於最後一剎那間證入斯位但惟本覺無別始覺能所淨盡寂照一如萬事萬理劃然一體故稱為妙也究實其體不越前四卷中三如來藏其用不越彼四義四相所謂十玄德相十玄業用一時具足而窮玄極妙不可思議矣無上道者以圓頓初心雖與如來同一覺道而圓融不礙行部位位皆以前前為下後後為上則知因中諸位莫不有上斯位則證極而無復加上故云無上道也所謂無上菩提無上涅槃等皆其異號正答因果諸位一大科已竟二總揀非實非染是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入種種地即指上因地與果地也果地雖一因地重重故言種種金剛者即前所謂金剛王寶覺蓋自初住圓通之位已即分證位位轉深至等覺則究竟金剛心也故知金剛乃甚深般若之名是即實相之觀照所謂如珠有光還照珠體前劣後勝一體而已觀察者即以金剛寶覺照之也溫陵曰種種地單復十二位也十喻者幻人陽𦦨水月空華谷響乾城夢影像化也深喻者喻此金剛所照之修皆如幻等所謂如幻三摩提無一實體終不著相永明云修習空華梵行等是也總表無修之修正以揀彼凡小執於事相之實修也奢摩他前文考佛答處已作自性本具圓定而以照見於此為微密觀照至於毗婆舍那前文問答皆無是名按深密經佛以無分別觀為奢摩他以差別觀為毗婆舍那似分照真俗之意今詳味斯經語脉似不全同彼意良以無分別之語固不違於性定而差別云者仍可參詳今言奢摩他中顯是於自性定中又言用諸如來毗婆舍那而下復贅以清淨修證顯是從性起修則毗婆舍那全歸修意蓋是不離自性定中雙用即定之慧與夫即慧之定而定慧圓融之意也然更須知仍是合性修兼定慧雙收前二以結歸禪那而已末言漸次深入者蓋是圓融不礙行部而務臻究竟寶所終不化城中止矣三歸重初心勸進阿難如是皆以三增進故善能成就五十五位真菩提路此之歸重初心以勸進欲人由下學以上達也良以圓人頓悟雖窮盡因果而發足進取須重初心故今此經談位既始於三種漸次而學者豈可不從此以䇿力哉故此節深意誠在此耳吳興曰三增進者即漸次也前三文下皆結示云是名增進修行漸次又云從是漸修隨所發行安立聖位五十五位者除前乾慧由信至等覺是也問何故除乾慧而又不取妙覺答既言真菩提路則顯乾慧非真妙覺非路四判決邪正令辨作是觀者名為正觀若他觀者名為邪觀欲人捨邪而歸正也吳興曰須知圓教之外三乘所修皆屬邪觀此對勝揀劣為邪非叛道之邪也孤山曰圓教地位以六即配則十信為相似即初住以後為分真即妙覺為究竟即此天台所判圓教所獨漸教有六無即頓教有即無六今行部不礙圓融故六而常即所以六位皆佛圓融不礙行部故即而常六所以六位不濫至於諸位所斷無明所證真如隨佛自在分合而為多少何敢定數華嚴百界倍增但可準知未必定依其數也良以斯經位次不定依彼故耳一正說經一大科已竟二說經名夫義者名之實而名者義之表是故因義以定名由名以表義名義常相須也今正宗委談三分所詮經義略備而能詮經名不彰則何以辨義而成總持耶故即說經名焉溫陵曰正宗未終而遽結經名由初示密因次開修證而卒乎極果則經之正範畢矣結經後文尚屬正宗舊名助道分者特助道而已故後別列乃正助之辨也分二一文殊請名又二一具禮陳白爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言初以阿難當機者欲進多聞人於大定也而終以文殊為請名表總持全經非根本大智不可也二請名問持當何名是經我及衆生云何奉持凡問經名必兼請持法而答名之後多不詳答奉持略結而已良由名以略文總攝多義得其名即得其總持之要矣故不別答受持之法也二如來備說分五一從境智為名佛告文殊師利是經名大佛頂悉怛多般怛羅無上寶印十方如來清淨海眼首句標告及是經二字文局第一義通五題下不重標詳玩五題皆顯密雙彰而義則互通以顯密無二但廣略持解力用異宜而已今第一名初十三字彰密楞嚴也分雖各屬而釋則合用下皆放此密題全當科之境字境即諦也為智所對文用三重喻表一佛頂二白傘三寶印雖亦是喻而直以稱法非待法合此之謂表法也首三字表理體屬真諦前總題中通表蓋是因題立意此對下文但表理體也大之一字貫下白傘仍作稱讚之詞佛頂具二義一無上而最尊二無見而最妙正以表一真法界故以大稱悉等六字此云白傘蓋七卷中元有摩訶二字故亦應有大意今因上大字貫下故不重標傘蓋雖亦可作二物今以含覆用同故但為一此對佛頂當表事用俗諦若連摩訶即當體大而以白傘異相用二大今緣佛頂表體大已代摩訶故得六字皆但屬於相用白衆色之本今表萬用清淨乃即真之俗非同染著之用也傘蓋正表萬德張施慈悲普覆為佛果要用作衆生依怙也末句總攝上體用真俗而為第一義諦以圓融絶待更無法能過之故云無上也寶印者即海印心印也華嚴云二諦融通三昧印又云海印三昧威神力法句經云森羅及萬相一法之所印即諸佛祖以心印心相傳之心印也末八字顯題也十方如來明諸佛同證也清淨者離分別絶能所之意海即心海眼即智也謂照心海之智眼也上密題中所詮表之三諦是即心海全體大用以智圓照此之心海名曰海眼然須離諸分別一念不生方以默契又如珠之有光還照珠體體即照而照即體始為清淨海眼二從機益為名亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海諸題顯密分明獨此題似乎惟顯無密然準四推之當亦意具良以救度慶喜性尼皆憑呪力故此題前十八字當是稱祕呪之功能也而阿難登伽正以舉此經之當機也故凡務多聞而未全定力者皆準阿難凡欲惑熾然不思出要者皆準登伽末八字表利益也菩提心即前三諦圓融之心遍知海即前遍照三諦之海眼也此蓋但於前題中加當機獲益勸人欣此入此也問前總題中不許立諦只言三藏今何說諦而不說藏答前為斥絶三觀故竝諦不許今為明境用諦而三諦仍即三藏而已三從性修為名亦名如來密因修證了義亦名下上四字為密下四字為顯總題中分屬明白以如來密因為性具者蓋諸佛須見自心果性本有依此起修方成真因權小皆所不知故曰密因修證了義者言雖知本有不墮無修無證不妨有修有證然依無修證而起修證故曰了義非同染實之修不了義也又盡理顯談非就機覆相也廣如總題中解蓋密因仍是前之境智但加修證而已恐悟人具見自心理智天然而不加修證亦終不能究竟所以勸人不可徒欣仍當修此證此也四從要妙為名亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名下上七字為顯為最妙大方廣取起信釋乃一心所具三義華嚴作所證之法三字以次為體相用之三大此乃三字竝列不同總題之讚詞也此大乃直目性體橫亘竪窮無邊無底相乃義相德相具足恆沙性功德故大方二字即性相對也廣指用言以上性相皆屬於體稱體之用無盡無量無障無礙如十玄妙用是也益以見斯經旨同華嚴矣蓮華取義甚多且略取於方華即果處染常淨二義亦即表於一心三大之法因果交徹本具而非修生染淨不二融即而非擇滅王以自在為義因果染淨俱得自在故稱為王益見斯經指同法華矣然則性相體用交徹圓融至妙無以加焉末八字為密為最要佛母表其有出生義陀羅尼此云總持明其具含攝意七卷說呪利益中亦稱其能出生一切諸佛顯文中亦言十方薄伽梵一路涅槃門俱佛母意也陀羅尼既總一切法持無量義合於上佛母一表出生多佛一表舍攝多義豈非至道要術哉此蓋復於有志希修證者具示以最妙最要之處信乎可以彈指超無學也五依因果為名亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持亦名下四字為密餘皆顯也吳興曰此經從天竺灌頂部中流出蓋約密言名灌頂章句有誦持者則如來智水灌其心頂亦如剎利之受職也此中所取因果有二一者密題為果以灌頂受佛職故職即果也下皆屬於因行以諸菩薩萬行為別行如前四度首楞嚴三字為大定之名乃定慧雙融後二度也前之四度皆依此而運方成第一波羅蜜故為總行若準起信論中五行則此之萬行即彼前四行此之首楞嚴即彼第五止觀雙融行也合此總別因行方以感彼佛職之果欲欣果者務修行也二者密題中既曰智水灌頂即屬文殊大智菩薩萬行即屬普賢大行智行總之為因首楞嚴即毗盧萬德圓融究竟堅固之大果也良以佛說斯經無非欲衆生修大因而證大果故此末題終歸因果也如華嚴法華二題可類見矣汝當奉持文局於此而義總結五題以上五中境智機益性修要妙因果皆當信奉受持蓋必以智照境隨機受益從性起修盡其要妙滿其因果方為能奉持也夫既說全經而又備陳經目則如來所以應求而說者可謂悉委悉盡矣故如來委說一大科已竟三阿難悟證阿難示現多間遲鈍初以一果聞經中間但表開悟竝無敘證今至經終方明進證無非大權引物耳分二一敘所聞又三一結標時衆說是語已即時阿難及諸大衆二聞經義理得蒙如來開示密印般怛羅義此舉密稱顯見顯密同義也密印者祕密心印也如偈云真非真恐迷我常不開演正祕密意也奢摩他中三如來藏三摩提中圓妙耳門解巾示結皆所以傳心印也大白傘蓋本以名呪今言示彼之義即指顯文竝文所詮莫非無外之心清淨之體普覆之用是大白傘三字可以收盡全經所以但舉於此義而敘所聞經也三聞經名目兼聞此經了義名目前之五名皆詮盡理直指之了義非就機覆相之名目也蓋名標總相義演別相得其別相可以開悟得其總相可以奉持蓋開悟宜詳而奉持宜簡然總別互收利益齊等故雙述顯益也二敘悟證分二一同悟禪那頓悟禪那修進聖位增上妙理心慮虗凝前標時衆非止阿難故知此悟乃大衆同悟也首句標悟禪那者按經從初歷談但言奢摩他及三摩提而未言禪那直至此處始一稱之下連修進聖位足顯談聖位處乃是說禪那耳蓋即全性而修三一圓融妙極難思之定慧也然其實體即前三如來藏之正因略兼了緣二因而已其曰修進聖位足見諸位多行位也增上殊勝也蓋逈超權漸乃圓頓之極則焉心慮虗凝者全經朗徹萬象一心海印森羅言思不及之境也二別證二果斷除三界修心六品微細煩惱悟雖同衆證則各別故此二果別就阿難非大衆皆但證二果也溫陵曰修道所斷之惑小乘於三界九地地各九品斷欲界前六品而證二果斷後三品而證三果斷上界各九品而證無學思惑於修道位中斷之故曰修心然全分即通三界故言三界修心所謂言通也六品仍在欲界斷之所謂意別也微細揀非見惑之粗耳阿難備聞全經而但進二果既由示表多聞之劣不勞曲會強增華嶽之高矣請位至此名圓位因果周經中具示妙定始終已竟二經後別詳初心緊要此後諸文仍是正宗問正宗未盡何遽結經答順序而談無所隔間義窮言盡故應結成如由悟而入由入修證從因至果性定歸元言義俱周豈不應結乎然而正談三分速欲知其始終故文中雖亦略言諸趣諸魔不暇詳敘恐葛藤恣蔓而支離間隔於本文也其奈義有關要理應委知故於經後詳發是則既不隔間於正文又以不失於要義也其關要深故待於各科首發明之分為二一談七趣勸離以警淹留修楞嚴者於人仙天趣不應耽戀其果於修羅三塗不應誤犯其因然後能逈超有漏而速階聖位也故自經初每曰輪轉曰諸趣曰輪回曰淪溺乃至十二類生皆以謂此而不及詳言故此委談勸離所以警淹留也又分二一阿難請問又為二一述謝前益即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沉惑令我今日身心快然得大饒益問此既謝前得益何不分屬上文答此之禮拜雙具二意一則謝前一為請後若屬前文則請後無拜禮有缺也故屬下可兼二意經中凡訶斥處皆屬折伏之威凡示勸處皆屬攝受之德慈音無遮者至教無吝惜下愚不檢擇也巧示曰善開微細惑開謝破妄也身心快然謝顯真也其實進修取證皆所以終破妄顯真之功耳故二意謝盡全經二更請後談分二一總問諸趣又分三一領惟心真實又二一心體本真世尊若此妙明真淨妙心本來遍圓此先直就心體以領遍圓所謂彌滿清淨中不容他也二萬法惟心如是乃至大地草木蠕動含靈本元真如即是如來成佛真體此方就萬法以會遍圓即是如來四字應在本元之上下言本如即性具之理佛體即修成之實所謂物物闡遮那之形名名播如來之號二問何有諸趣佛體真實云何復有地獄餓鬼畜生修羅人天等道首句躡上萬法惟心無障無礙云何下敵體番之以問如何却有障礙違心之七趣以有等字該仙蓋約方聞未證之時觀之現見違礙自心不得自在故言云何復有等也三質自然因緣世尊此道為復本來自有為是衆生妄習生起本來自有者疑是無因本具也因緣可知二別詳地獄七趣雖皆障礙而地獄猶劇苦處更當謹戒是以復詳問之分為三一略舉墮人淫怒癡為三毒惡習招獄之最重者故略舉之以該其餘也分三一貪淫墮者世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄此犯有三一犯淫二謗戒三誤人漸至極重故墮阿鼻報則有二一現報謂身火燒然二生報即墮無間獄也二怒癡隨者琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷入阿鼻地獄此二合說琉璃屬怒善星邪見屬癡溫陵曰琉璃匿王太子廢父自立挾宿嫌誅釋種佛記其七日當入地獄王泛海以避水中自然燒滅宿嫌舊恨也有遠近二因緣遠謂琉璃多劫前曾為大魚釋種前身共食之此為遠因近謂琉璃今世為釋種之甥因禮來賓強坐佛座釋種罵之懷恨誓殺此是近緣善星亦佛堂弟撥無因果經文甚明生陷者謂連肉身陷下具足現生二報以業力強勝故耳二雙質同別此諸地獄為有定處為復自然彼彼發業各各私受吳興曰問意有二謂別業同報別業別報初問淫殺妄三即別業也為有定處即同報也為復自然下次問別業別報據下答意皆是別業同報耳三求示護戒惟垂大慈開發童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯發開童蒙者以此屬人天乘事故言開發幼童蒙昧也令諸下明其嚴戒正此更詳地獄之本意然於三摩提中道場之始所以嚴戒四重者豈不大有助乎二如來詳答分二一讚許佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝說快哉者合意而喜之讚辭也下二句明其所以蓋犯淫無報法空無果皆顯然邪見琉璃為嗔心所蔽不復知有惡報亦隱然有邪見為主宰也凡墮阿鼻多由邪巧之見至於修羅乃至仙與人天凡有耽戀而視之為樂為脫殊不知其為苦為縛者皆邪見攝況皆障首楞嚴故佛云耳二說示分三一備明諸趣又二一略示升墜根由又為三一約積習分判情想又為二一依真妄分內外阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分本真淨者蓋言妄染招報之因皆依無妄無染之真心中起也妄見即惑妄習即業此二為因故分內外下自釋之二釋成墜升所以衆生但見六趣升墜而不知正因故與釋之分二一釋墜所以墜謂三塗分三一略釋其名阿難內分即是衆生分內但言貪戀本趣而不求出離者俱為內分則不勞辨難蓋凡在升墜不定之時若但戀於本位而不求增進者必至於墜事事皆然復何疑乎二轉愛屬水人間水惟趣下而情皆化水足知從墜無疑矣又二一正明愛水因諸愛染發起妄情情積不休能生愛水愛有總別二意總謂諸情皆屬於愛愛即情也別如世說喜怒哀樂愛惡欲為七情愛居其一而已今總意也良以七情中怒惡似與愛反而實由人之損我所愛方怒方惡縱曰性情之正是亦惑境為實皆愛情為本故總屬愛也最初對境起著為愛染深貪極戀堅執不捨為妄情情積不休者慣習深厚潛滋貪業也能生愛水者墜業已成下墮所不免也二歷舉驗證是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液此但舉事以驗情必化水而已恨雖恨彼害己實亦憐己受害之苦而發悲是即七情中怒惡貪財光潤者曾聞有人忽拾大銀一錠舉身流汗是也餘皆易知三結墜原名阿難諸愛雖別流結是同潤濕不升自然從墜此名內分流即流水結謂受縛上皆從墜所以末句原其因此立名內分也墜之所以竟二釋升所以分三一略釋其名阿難外分即是衆生分外明非本趣也二轉想屬飛飛必上升而想必飛騰故也分二一正明想飛因諸渴仰發明虗想想積不休能生勝氣初聞勝境發心希望為渴仰想極神馳意常遠越為虗想想積不休者想久觀成也能生勝氣者必成超舉之妙因也二歷舉驗證是故衆生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命亦舉事以驗想必成飛而已然此外分雖但局在界內至於引事乃是廣取豈皆局哉持戒漸離業纍故輕清雄毅者亦有高舉無畏之狀以乘呪神力故也輕身命亦視如鴻毛無復重纍故亦屬於超脫餘皆可知三結升原名阿難諸想雖別輕舉是同飛動不沉自然超越此名外分約積習分判情想已竟二約臨終別示升墜分二一約臨終相現阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交孤山曰生從順習死從變流者以一切衆生皆愛生而惡死也是故生則順其習死則逆其習此文辭互略應云生從存住故順習死從變流故逆習也未捨暖觸謂現陰之末中後陰之初也溫陵曰逆順相交謂方死方生之間也一切善惡之業即於是時隨其情想輕重而感變焉末二句似乎當在暖觸之下為順恐是謄譯之訛耳二判墜升分量又三一升而不墜又二一先示純想極升又二一無兼止於天上純想即飛必生天上論生天應從四王以上蓋生於天上而卜居於天不同游者又按下純情惟局極重阿鼻此之純想乃統三界諸天故知純情報狹而純想報寬也二有兼往生佛國若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生兼謂除善禪之外而有兼行六度願見諸佛者也二後示雜想差別又二一正論雜想情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙輕舉非遠者謂竪不越四天橫不出輪圍游者暫到而已不同生者得常居住喻如羣臣至天子宮闕暫時非久去往也真際曰情少想多此通舉也理宜等降四類分之一情九想即為飛仙二情八想為大力鬼王三情七想為飛行夜叉四情六想為地行羅剎二兼論護教其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下綏安也法忍如無生法忍之類住佛座下者即溫陵所謂八部之類是也二不升不墜情想均等不飛不墜生於人間想明斯聰情幽斯鈍均等即五情五想孤山曰由昔情想感今聰鈍是知言均等者總報之業也言幽明者別報之業也由所習情想各在強弱致有聰鈍之異圓師所說聰鈍蓋於人中分於二類意謂想明即是想強情弱所以世間有聰明者情幽即是情強想弱所以世間有暗鈍者此說似通但恐違於均等然豫別有說焉但於總報大槩俱有一分聰處如覺觀知解推度事理勝彼下趣故佛表其由具五想想體明達所以有此聰利也俱有一分鈍處如不具神通不能飛舉劣彼上趣故佛表其由具五情情體幽閉所以有此暗鈍也三墜而不升分為二一先示雜情差別又分三一墜畜生情多想少流入橫生重為毛羣輕為羽族情多想少者真際謂六情四想是也溫陵曰橫生者情多故淪變帶想故飛舉而業重不能但為毛羣耳二墜餓鬼七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫真際曰七情三想墜為餓鬼溫陵曰俱舍說大地最下有金水風輪有八寒八熱地獄在三輪之上此文說沉下水火風輪又似地獄在三輪之下疑此所指非地下三輪乃地獄三輪也言水輪火際即寒獄第八也受氣猛火謂受火氣以成身故常被火燒或得水飲亦化為火故曰水害己也三墜地獄九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄真際曰八情二想生有間獄九情一想生無間獄經文缺八情二想意中必有節師補之是也然諸師皆謂八獄前七為有間第八為無間今詳後文另有極重阿鼻獨為一獄則知前八俱稱無間但較之後一或苦稍輕或時少短其有間獄當如後文十八等獄方通也溫陵曰下洞火輪即八熱獄也身入風火二交過地謂超寒獄入熱獄也二後示純情極墜分二一無兼止於阿鼻純情即沉入阿鼻獄溫陵曰阿鼻此云無間謂受罪苦具身量劫數壽命五者皆無遮間名五無間此惟情業最重者墜入至劫壞乃出二有兼更生十方若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄溫陵曰若兼謗大乘等則此劫雖壞更入十方阿鼻無有出期以謗令無窮人墮邪見故三結有處以顯別同循造惡業雖則自招衆同分中兼有元地前問此諸地獄為有定處為各私受此答造雖各私報有定處乃是別造同受也元地即答定處耳一略示升墜根由已竟二詳示墜升因果上科示情想為升墜因由清濁雖殊要之皆為繫縛三界之羈鎖非解脫世間之法故總屬於惑此科所言因果應即是業與苦也諸天雖樂而亦壞行二苦所攝故不出三道也分為七大科一地獄趣此雖諸趣竝列而本科兼答別詳地獄分二一發明因習果交又分三一躡前標後阿難此等皆是彼諸衆生自業所感造十習因受六交報此文分明連結上科似非別起然上科情想意足下更無文且向下相連七趣俱有詳文故知別為詳示但前論情想自勝向劣今詳因果自劣向勝二劣相接語勢就便躡之以起非仍屬上也感字非同凡小但是招意此乃化意謂地獄本無自心業力之所化作悟之即空故華嚴偈云應觀法界性一切唯心造能破地獄經中所謂一一皆了元因信哉下文因果中一切苦具皆顯心之化作其旨深矣二開因示果又分二一列十習因以明感招十習謂一淫二貪三慢四嗔五詐六誑七冤八見九枉十訟既云為習即當屬業而貪等仍帶惑名則分屬亦兼惑業今以根隨分之貪瞋慢見四根本也淫即貪業之首冤即隨瞋之恨詐即隨貪之諂誑亦貪分之隨枉訟即隨瞋之害又約成業以十惡收之淫正身三之一而瞋冤攝殺詐誑攝盜詐誑又攝妄言綺語兩舌之三枉訟又攝妄言兩舌惡口之三貪嗔即意三之二見即攝於癡分則身三口四意三無不周備矣雖亦有果但是帶言說因為多故單言十因也就分十一淫習溫陵曰惡業起於情惑而淫為情惑之最故前後皆首明之分四一正明感招云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動首四字總徵十科凡言交者結搆之始發者臨時之動後皆倣此接者染心會合磨者貪求觸樂感火之故下喻自明舒王云淫習研磨不休自耗其精則火界熾然於其生也尚有痟渴內熱等疾則其死也見大猛火宜矣二即喻驗知如人以手自相磨觸暖相見前三所感苦事二習相然故有鐵床銅柱諸事二習現行種子也所謂業習種習之二蓋業習所以薰種種習所以辦果下皆倣此相然謂成焚燒之事也鐵床等即火床火柱准別經中皆言化玉女引罪人抱之即燒也四引聖示戒是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑色目者命名呼召之意猶言名色名目也欲火者隨因示果令知驚懼也菩薩避淫非是勉強忍愛乃是惟見其為火坑而驚避之無毫髮之愛也以菩薩了見過去淫火劇苦如在目前故也此蓋欲人敬畏佛戒而勉學菩薩耳後皆放此二貪習貪乃吸取諸欲之總名而淫為上首既以別開則財食等餘欲皆此習收之分四一正明感招二者貪習交計發於相吸吸攬不止如是故有積寒堅冰於中凍冽計執也謂執我我所故起貪也吸者攬取為己有也貪之感水如人思食口則水出而吸之感寒下喻自明矣二即喻驗知如人以口吸縮風氣有冷觸生三所愛苦事二習相陵故有吒吒波波羅羅青赤白蓮寒冰等事陵侵也奪也業習起貪主於侵取種習起苦竟以奪欲吒吒等忍寒聲也蓮冰色也四引聖示戒是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海瘴者癘氣也能令人輒病或復致死海已當避何況更有瘴癘之氣甚言可驚避也餘意準上三慢習分四一正明感召三者慢習交陵發於相恃馳流不息如是故有騰逸奔流積波為水陵欺也虐也恃倚也如倚財倚勢等也馳流逆上奔流也慢情本屬於水而性高舉如水逆奔故曰馳流不息如是下方明其感召於水也二即喻驗知如人口舌自相綿味因而水發綿味即舌自絞嗽也三所感苦事二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事鼓如風之鼓物皆上騰之意也四引聖示戒是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺見慢謂見自心之慢非謂見他慢也後皆放此孤山曰癡水者或云西土有水飲之則癡如此方之貪泉也溺者以水兼泥易陷難拔之處巨溺益可畏矣四瞋習分四一正明感召四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵梱劒樹劒輪斧鉞鎗鋸交衝即彼此抵突也忤欺陵也結而不息積久轉盛也溫陵曰心屬火氣屬金瞋者由心作氣而反動其心加之衝擊抵忤則心火轉盛氣金轉剛故云爾也肺屬金而主氣亦妄理相應之謂梱即棍也此亦方明感招如修羅之雨等也二即喻驗知如人銜冤殺氣飛動望氣者能見其相三所感苦事二習相擊故有宮割斬斫銼刺槌擊諸事擊觸也亦發也截根曰宮刖殘曰割斫則斷首銼乃碎尸耳四引聖示戒是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮名利刀劍直以果召因也五詐習亦分為四一正明感召五者詐習交誘發於相調引起不住如是故有繩木絞校誘哄誘也調以諂言勾引也如是下亦方明感召諂盲引誘如繩牽匣於人故感繩絞木校也孤山曰校枷也易云屨校滅趾荷校滅耳二即喻驗知如水浸田草木生長行諂詐者心浸漬之久而後能繫縛於人不能動脫故如水浸田草木滋蔓也三所感苦事二習相延故有杻械枷鎖鞭杖檛棒諸事鎖者繩類餘皆木也四引聖示戒是故十方一切如來色目奸僞同名讒賊菩薩見詐如畏豺狼惟此即因定名溫陵曰讒賊奸詐敗正者也六誑習上習主於浸引斯習主於眩惑此詐誑之分也亦分四一正明感召六者誑習交欺發於相罔誣罔不止飛心造奸如是故有塵土屎尿穢汙不淨欺瞞也罔誣也誣虗為實誣有為無等也飛心運心也造奸設智也神出鬼沒令人迷惑墮其計中溫陵曰誑者以狂言欺人其志誣罔其心飛揚者是也二即喻驗知如塵隨風各無所見溫陵曰如風鼓塵使人無見也三所感苦事二習相加故有沒溺騰擲飛墜漂淪諸事誑能陷害於人故受沒溺誑須飛心鼓揚故受騰舉拋擲也飛墜自騰而溺漂淪自溺而騰也四引聖示戒是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺此坐以至重至毒之名乃所以深戒之也七冤習亦分為四一正明感召七者冤習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲嫌憎也投即墜也礰亦石也常思以毒中人之所感也匣貯等皆暗藏冤害所感也孤山曰囊撲囊貯而撲殺之史記始皇以囊撲兩弟二即喻驗知如陰毒人懷抱畜惡上句喻能感之心下句喻所感之相畜積也二所感苦事二習相吞故有投擲擒捉擊射拋撮諸事吞亦滅沒之意不出上二所感惟撮屬藏害餘皆毒中之感耳四引聖示戒是故十方一切如來色目冤家名違害鬼菩薩見冤如飲鴆酒違害鬼違背正理暗中害人鬼之最惡者也鴆鳥最毒毛羽瀝酒令腸寸斷八見習五利惡見執邪謗正令無量人墮大陷坑所以罪莫大焉分四一正明感召八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍明妄分別也違拒相反諍論也溫陵曰見習有五一薩迦耶此云身見謂執身有我種種計著二邊見於一切法執斷執常三邪見邪悟錯解撥無因果四見取非果計果如以無想為涅槃之類五戒禁取非因計因如持牛狗戒為生天因之類此五總名惡見順邪反正故云發於違拒出生相反由其違反故感王吏證執之境權詐鞠推之報經缺邊見該在諸業之中又見戒禁取巧收二見謂見取見與戒禁取見即五利使也二即喻驗知如行路人來往相見溫陵曰路人相見一往一回喻所見違反也邪見不特與正違反亦自互相違反如斷常互違等此猶違他亦復違自如自語相違自教相違等是也三所感苦事二習相交故有勘問權詐考訊推鞠察訪披究照明善惡童子手執文簿辭辨諸事交對待也邪見無不對待此皆邪妄分別謗正所招諸苦事耳四引聖示戒是故十方一切如來色目惡見同名見坑菩薩見諸虗妄偏執如臨毒壑溫陵曰是五惡見能陷法身故名見坑能致業苦故如毒壑行人當疾滅之九枉習以本無之事誣賴於人為枉亦分四一正明感召九者枉習交加發於誣謗如是故有合山合石碾磑耕磨加謂加罪於人也合山謂見兩山來合罪人無逃避處也合石謂二石夾之也餘皆可知溫陵所謂逼壓於人感報如之是也二即喻驗知如讒賊人逼枉良善上句喻能感惡因下句喻所感惡境蓋讒賊逼枉良善如惡業必招惡境且感應相似也三所感苦事二習相排故有押捺槌按蹙漉衡度諸事排擠挫也相排者業習排人種習排己押捺壓伏槌按打撲也蹙漉榨淋出血衡度以迫窄孔中衡度其身如拔絲之狀也四引聖示戒是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹靂溫陵曰讒能傷人故名讒虎以可驚怖故名霹靂十訟習上習誣人本無此習詰人所覆然以奏於君告于官為大訟而私下表揚於衆亦訟之類而已舊說反言非訟于官豈彼官訟反非地獄之業哉分四一正明感召十者訟習交喧發於藏覆如是故有鑑見照燭喧諍也藏覆者人陰私隱暗惡事也鑑等即所謂業鏡臺前蓋好發人之隱惡而感召陰府乃照出己私正感應之妙也二即喻驗知如於日中不能藏影我發人覆如好立於日中神照我私如不能藏身影也今現見攻人之惡者人亦攻其惡此必然之理也三所感苦事二習相陳故有惡友業鏡火珠披露宿業對驗諸事陳獻白也業習中獻白人事種習中獻白己事故曰二習交陳惡友冤家執對也火珠照同業鏡四引聖示戒是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海惟此習示戒不同諸文皆戒本習此文本是訟習訟乃發人之覆也今不戒訟而戒覆意欲拔惹訟之根本故自在變其文耳溫陵曰陰賊發則自害覆罪適足以自壓自墜故如戴山履海也問總標十習而文中各言二習環師釋為能所一向宗之今言業習與種習雖亦稍明似未極顯請更詳之答諸文首三句即業習所為之實事是招果之因也第二句不休不止等積熏成種也如是下即命終之初種習所發之境是引果之緣也如人下取喻令驗其妄理相應耳二習下方言果中所受實事故皆結以諸事良以業習具因種習發緣衆生平日既以恣造業因而不知能招後苦命終復以領著境緣而不達妄發由是因緣具足豈不成辦地獄種種苦事所以文中至此皆承上而言二習相然相陵等以顯由因緣而後事辦耳故知下品往生者雖具苦因而火車相現急急念佛是但不領種習所發之境緣遂壞苦事不成獄果此所謂有因無緣即不生也但彼仗憑佛力非己智分則夫悟心之人不但地獄一切繫縛事業平日固當努力突絶其因更記臨終勿領其緣有轉身處則陰境現前不隨他去方於生死少分得其自在切須自忖若也道力未充未能作主則念佛往生更仗他力萬無一失矣生死要關故此詳敘智者宜究心焉列十習因以明感召科已竟二列六交果以明報應分二一徵標云何六報阿難一切衆生六識造業所招惡報從六根出吳興曰造業招報根識必俱今以識為業而報從根者蓋業竝由心報多約色故也所名六交報者璿師云因與果交今則不爾但是果時六根於惡報互遍也二徵列惡報從六根出者是上標中所釋故復徵也分六一見報又三一臨終見墜云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘煙入無間獄首二句亦是總徵六報之義寄居此耳次句仍是總標見報此見下方是釋本科文斯固眼根所出果報然由果推因是乃因中眼識及眼家俱意識造業偏多故惡報所出偏以眼根為主如世因貪美色而造罪者是也溫陵曰見覺屬火故感猛火六交皆直入無間者就重言耳成論云極善極惡皆無中陰所以直入二本根發相發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐此已入獄最初所發非同上科先見等方是引果之緣然每報俱有二相多是前文所說十二塵相溫陵曰畏見於境恐藏于心三正詳交報如是見火燒聽能為鑊湯洋銅燒息能為黑烟紫焰燒味能為焦丸鏡糜燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界此決由於造業之時雖眼識為主而諸識必互助之如貪美色者雖由眼識所取而耳取淫聲身著淫觸等何所不全而今互報固其宜矣譬如世之罪人分正佐耳嶽師引體知用背為釋不必然矣此無本根燒見但是闕文不必曲為之說溫陵曰聞聽屬水故燒聽能為鑊湯洋銅鼻嗅主氣故燒息能為黑烟紫𦦨舌主味九糜味類也身主觸灰炭觸類也心正屬火燒之轉熾故迸灑煽鼓二聞報分三一臨終見墜二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄溫陵曰聞聽屬水故觀聽旋復則水不能溺依之造業則能感波濤二本根發相發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沉沒文變開閉二聽意仍動靜二塵三正詳交報如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蠱周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄溫陵曰注聞發聲故為責罪詰情之事注見能為雷吼者聞波屬陰見火為陽陰陽相薄成雷故也注息為雨霧水隨氣變也注味為膿血水隨味變也注觸為畜鬼水隨形變也注意為雷雹意出於心水火交感也一切物理莫不因五行乘陰陽以變化故此隨根轉變之事皆不出此嶽師引易經離為目為火坎為耳為水亦皆意也大抵萬物不出陰陽五行世智所知非窮源見萬化不出自心六根見聞等所變乃世智之所不知而世尊窮源之論意在明此諸師引之釋文就末明本則無不可而結歸皆不出此相符世間顛倒本末則大不可甚哉世智之迷人也義學者著眼辨之三嗅報亦分為三一臨終見墜三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近亡者神識從地涌出入無間獄資中曰鼻根造業貪嗅諸香故招毒氣以受其報二本根發相發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地二塵顯然三正詳交報如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛沙礰擊碎身體溫陵曰質礙也履通也嗅業所依不離通塞故衝息為能質履也衝見為火炬衝聽為沒溺洋沸則見覺屬火聞聽屬水明矣饑餒乖爽由味隨氣變也綻折爛壞由體隨氣變也衝思為灰沙氣依土感也四味報亦分為三一臨終見墜四者味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界亡者神識下透桂網倒懸其頭入無間獄孤山曰準眼耳鼻云見聞嗅此應云嘗報言味報者從所嘗為名也貪味則網捕燒野以取禽獸故見鐵網猛𦦨之相反逆弄兵火攻陷陳更是首惡皆應墮此言透網倒懸足顯墜時皆頭向下耳二本根發相發明二相一者吸氣結成寒冰凍冽身肉二者吐氣飛為猛火焦爛骨髓不取嘗苦嘗淡而取吸氣吐氣亦自在變用而已吸氣必寒吐氣必熱故以發明二種苦相耳三正詳交報如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為努為射歷思則能為飛熱鐵從空而下孤山曰為承為忍謂發言承領忍聲甘受也溫陵曰舌噉生命使彼承忍故歷嘗發苦使己承忍依見貪味故能為然金石依聽發惡故能為利兵刃依嗅恣貪籠取羣味故能為大鐵籠觸味傷物故感弓箭以自傷緣味思物故感飛鐵以充味五觸報又分三一臨終見墜五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼獅子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄獨此見相偏惡偏多者以淫者染合貪觸積罪如山敗化傷倫起殺起盜無所不至孤山曰合山刀劒竝由貪著男女身分而感也二本根發相發明二相一者合觸合山逼體骨肉血潰二者離觸刀劒觸身心肝屠裂二塵顯然觸身即分身屠裂即剖析皆離相也三正詳交報如是合觸歷觸則能為道為觀為聽為按歷見則能為燒為爇歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙溫陵曰道趣獄路也觀獄王門闕兩觀也廳按皆治罪之處皆身觸所依也括袋所以收氣也思業飄蕩故感飛墜之事剚插刃於肉也剚射考縛則相因旁舉也六思報分三一臨終見墜六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄溫陵曰思屬土而飄蕩故先見惡風吹壞國土之事二本根發相發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍此當生滅二塵今改為迷覺而又皆反言於迷而說不覺於覺而說不迷耳溫陵曰思業所依不出迷覺荒奔迷思也知苦覺思也三正詳交報如是邪思結思則能為方為所結見則能為鑑為證結聽則能為大合石為冰為霜為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰溫陵曰思必有所故結思則為受罪方所見能鑑證故結見則為證罪人事結聽則為大合石等水土交感也車船檻乃息氣乘亂思所變也嘗即舌根聲所自發也大小以下皆言其身乃觸業乘亂思所變也開因示果已竟三總結妄造阿難是名地獄十因六果皆是衆生迷妄所造迷妄所造者言其但是自心循業妄發如夢如幻更無外境非如諸經且就實談也地獄如是餘趣皆然經云一一皆了元因信不誣矣行人倘能悟徹尚當習住無生法忍努力莫循其業斯境了不可得不然達妄雖明仍以玩習而循其業則自心地獄忽然現前則極力擺脫亦難矣可不懼哉發明因習果交一大科已竟二分析因殊果別上科但明地獄因以習成果以交報已知大分因果俱是如此然地獄數有多少苦有重輕各各差別未審何等因入何等獄故與略分析之令人觸類而知也然大約因以圓兼者為重單獨者為輕果以因重者獄少因輕者獄多也分二一約惡業根境以分重輕於圓造者渾言惡業於別造者分說根境根即六根境即十習蓋泛論根所對境惟云六塵今別約墮獄之因乃取十習中所具六塵為境舉能該所故云境即十習也分二一依圓別以判非各非兼為圓有各有兼為別也又為二一極圓極重無間若諸衆生惡業圓造入阿鼻獄受無量苦經無量劫資中曰六根十因具足同造入阿鼻獄大無間也經無量劫極長時也於五無間偏舉劫數及壽命耳因中更說於一切時無不圓造方與下異時有別又詳此文則極重無間分明獨為一獄不在下八之中故譯人不番阿鼻意在別下文耳何必旁引曲釋狃為下八之一耶二稍別稍輕無間六根各造及彼所作兼境兼根是人則入八無間獄首句明根因全而但不同時及彼下又有根境同時但缺而不具各兼根兼境境即因也吳興曰此亦六根具造十因但前後異時故云各耳若加二三等則名兼境兼根不經多劫故知此罪次重於前二依具缺以判兼三為具不兼為缺分為三一具三入重獄身口意三作殺盜淫是人則入十八地獄此除上無間以下之獄而別論三品以分乎重輕若望上無間惟當是輕也身口意兼三根也殺盜淫兼三境也故云具造問此與上兼根兼境何異答有二不同一者注加二三更等四五此則惟三二者彼約一時兼二三等若論一生具犯六根十習此則一生惟兼三者而已故不同也十八獄者吳興引泥犁經云火獄有八寒獄有十數既符合證之何礙即謂十八鬲子意亦無差也二缺一入中獄三業不兼中間或為一殺一盜是人則入三十六地獄一殺一盜謂具殺盜之二而缺一淫也然或字表有影略之文更當具云或為一殺一淫或為一淫一盜又據下文既雙論根境之缺此亦應然若錯落具陳應有九句一身口犯殺盜二身口犯殺淫三身口犯淫盜四身意犯殺盜五身意犯殺淫六身意犯淫盜七口意犯殺盜八口意犯殺淫九口意犯淫盜方盡根境各皆具二缺一之數也至於此與下科地獄名目既無考據闕之可耳三缺二入輕獄見見一根單犯一業是人則入一百八地獄見見者依吳興作能見所見此指人偏見偏好之一事但一根境各缺於二此不難見亦有九句蓋以身殺身盜身淫為三句而口意亦然故成九句嶽師謂各有根本方便不同劫數長短差別等此意應有觀彼獄數之多或亦緣此別別處之故也又此亦但論於根業同缺尚未論及根業互以具缺相對更有十二句如以身口意犯二惡則有三句復以殺盜淫對二根亦有三句皆上具而下缺可以意得又以身口意犯一惡則有三句復以殺盜淫對一根亦有三句皆可以意得也約惡業根境以分重輕科已竟二結別造同受以明妄發由是衆生別作別造於世界中入同分地妄想發生非本來有吳興曰上文五節惡業不同即別作別造也所感獄報各從其類即入同分地也妄想發生竝酬阿難疑問阿難前疑為有定處為各私受今結答入同分地非私受也又疑為本自有為生妄習今結答妄生非本有也夫知生之由己應悟滅亦由己滅之何如絶其惡業而已學人慎勿聞其虗幻遂忽略而不絶其業當知虗幻不但地獄即今目前苦事亦是虗幻由前業力宛然堅實卒難得脫卒難堪忍豈可不自忖乎是知佛慧不可不領而佛戒亦不可不遵矣地獄已竟二諸鬼趣此與諸趣竝列為七世俗及淺學皆不揀別故合中陰與地獄一槩悉謂之鬼今與揀明有二不同一者與中陰不同蓋人之初死罪福皆劣者未即受生倐然有身名中陰身此屬無而忽有之化生也類多裸形三尺自覺六根皆利去來迅疾無所隔礙他觀如影而已七日死而復生長壽者不過七七短者於二三七即受生矣俗謂鬼魂非鬼也二者與地獄不同世俗咸謂地獄中即皆是鬼若然二趣應合為一何得分為二趣應知多種不同今且論其受生之異論明地獄純是化生而鬼具胎卵濕化間有父母兄弟等眷屬但其勝者稱神劣者名鬼世俗却不知神即福德之鬼然斯趣勝少劣多論分九品惟上上品謂之多財即諸名神上中以下即皆不堪若從上趣墮者多在上上今從地獄出必參中下應非上上也分為三一躡前起後復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形非破下直至燒然躡前也初三句略舉重罪非謗也破犯也不惟犯一切戒且謗一切戒為妄立或言無罪無福自陷陷人故罪重也次句惟犯無謗又菩薩律儀該於輕細不盡粗重故稍輕也第三句屬於謗法涅槃至理尚毀謗之餘法可知此即斷滅佛種故罪非輕若三句各自單犯略分輕得若一人全犯乃是戒乘雙絶其罪莫過此者良以佛用戒乘二事拔濟世間互為緩急尚且不可何況雙滅絶之塞斷衆生出苦之路故罪至重焉四句該餘輕重諸罪也以上略舉地獄惡因第五句略結地獄惡報末二句起後鬼趣可知二詳列諸鬼夫地獄既以十習為因今出為鬼離前餘習當以何為種性乎環師謂其不必局配是厭於推詳也若隨情釋之其不至於遺背佛旨者幾希今皆推詳配之非鑿也懼遺背也但佛語自在稍不次焉分十一怪鬼若於本因貪物為罪是人罪畢遇物成形名為怪鬼此貪之餘習也環師謂吝著不釋故附物為怪是也如金銀鏡劒等又依石附木者皆是也此習分明是貪攝二魃鬼貪色為罪是人罪畢遇風成形名為魃鬼此淫之餘習也原因貪美色而造罪不正求和傷正和氣餘習為風魃鬼能令亢旱無雨況淫多致殺殺尤召旱也三魅鬼貪惑為罪是人罪畢遇畜成形名為魅鬼此誑之餘習也惑即誑惑也誑者改形變幻迷惑於人故為鬼附於妖獸怪禽如棖鬼附虎及雞鼠成精等是也四蠱毒鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼此瞋之餘習也瞋毒餘習故附毒蟲蠱害於人南方有妖術令人成蠱病皆此鬼主之也五癘鬼貪憶為罪是人罪畢遇衰成形名為癘鬼此冤之餘習也冤者追想宿恨不忘伺衰求報故為疫癘之鬼散瘟行瘧等類是也六餓鬼貪慠為罪是人罪畢遇氣成形名為餓鬼此慢之體習也環師所謂傲者虗驕恃氣故乘饑虗氣為餓鬼是也豫謂淫之召旱慢之感饑皆增上報也雖非等流亦非無因以彼惑之深重轉致之力也如淫重轉致於殺殺以召旱即其因也論謂餘習為人種田仍感風雹增上報也故知慢重轉致於吝吝以感饑即其因也良以慢之隨惑即是於驕儒典謂驕吝互相資生今觀驕慢者於己財法無不慳吝蓋護己所長欲以驕人之短故也問餓鬼為一趣總名何於慢者獨受其稱又餓乃苦報也經言腹大咽小歷劫不聞漿水常被焚燒今詳十習地獄苦均何至為鬼慢獨苦重耶答唯識論說鬼之全趣分九品上之勝者神通可移河嶽富樂亦如人天下之劣者具受小咽炬口之苦究其從來有四不同一勝趣貶墜二修帶瞋殺此二多居上品三獄前華報四獄後餘殃而聖人示現者不與焉然獄前多居下品獄後多居中品故知此之慢感餓鬼罪畢從輕非下品之極苦仍是苦均十種者也彼九種者亦各有苦但慢感與餓相應故受總中別名非獨苦也況餓為一趣總名乃從多受稱以此趣上中與下皆不免饑虗但輕重之間耳問此竝論七趣應取全分何得只取從獄出者答佛急欲人之厭苦故從地獄順序而談一期之論也然惟鬼趣偏取從獄出者畜人偏取從鬼從畜而全分則以意中該之餘趣不然不應為例斯就總名故辨七魘鬼貪罔為罪是人罪畢遇幽為形名為魘鬼此枉之餘習也罔即誣枉逼壓良善而為鬼魘覆於人令不能動固其餘習分明也八魍魎鬼貪明為罪是人罪畢遇精為形名魍魎鬼此見之餘習也明為私作聰明而無正慧精如十卷說諸年老成精是也求邪見尊邪師所謂貪明也故餘習惟附精靈為魍魎鬼焉九役使鬼貪成為罪是人罪畢遇明為形名役使鬼此詐之餘習也諂詐誘人貪成己私所謂貪成為罪也明呪也此因中專以詐術牽制驅使於人故為鬼專被人呪術役使不得自在而番以成就人之呪願也十傳送鬼貪黨為罪是人罪畢遇人為形名傳送鬼此訟之餘習也訟者結黨朋證所謂貪黨也故遇人成形即環師謂附巫祝而傳吉凶是也良以因中結黨以傳遞人隱暗之事而訐露之今為鬼亦附人發泄傳說吉凶正合其餘習也詳列諸鬼已竟三結妄推無阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有按前文獨阿鼻為純情除阿鼻外八情二想生有間九情一想生無間今言皆純情者一者舉重該輕二者顯情獨為墜落根本業火燒乾者以情屬水情罪報盡故曰燒乾總表地獄因窮果盡下句方明升於斯趣此等下結妄也若悟下推無也悟菩提者如從夢醒何法可得妙則不受業縛圓則不容他物明則了無幽暗諸趣皆空何況鬼趣故曰本無有也諸鬼趣已竟三畜生趣畜生亦有上趣貶墜及修帶瞋殺者如龍王迦樓羅王等今亦順序而談惟取從鬼來者餘以意該之分四一躡前起後復次阿難鬼業既盡則情與想二俱成空方於世間與元負人冤對相值身為畜生酬其宿債鬼業下躡前嶽師謂情即地獄之純情想即鬼趣之妄想非前文外分之想此意詳之非是上言七情三想為鬼何得無想但以純情乾得三分便作三分之想非新起勝想也今言二空亦但是舊業餘習已盡方於下起後償債之意耳夫情想俱空當以何者潤生畜趣正取前造惡因時冤對無量今為酬錢酬命了此二種宿債故受畜生之身耳二詳列諸畜亦分十一梟類物怪之鬼物銷報盡生於世間多為梟類物銷者所著之物毀壞也報盡者彼鬼隨亦壽終而死也梟不孝惡鳥也生食父母及其養雛亦遭雛之食噉此鬼生為梟類者謂死而轉生梟中世俗不知鬼死方趣生也後皆倣此然所以為梟之由固如環師所謂土梟附塊即邪著餘習也以此鳥不卵但取污穢之土塊孚之成雛此惟取其有似於怪鬼之著物而已其彼餘習之惡餘報之苦豈無深故況佛總標酬債此酬何債耶當知怪鬼既由貪習而貪習重者多相傾奪互為坑殺乃是酬斯債耳又環師謂各言多者約業習多分言之未必盡然斯言是矣後皆倣此由是而知貪習之輕者未必盡為梟類也二咎徵風魃之鬼風銷報盡生於世間多為咎徵環師謂咎徵乃凶事前驗如鼯鼠呼人商羊舞水之類是也夫旱魃為災而變畜仍以兆灾固其餘習也三狐類一切異類畜魅之鬼畜死報盡生於世間多為狐類一切異類如止觀所說十二時中察彼子鼠丑牛等一切畜鬼是也然魅鬼原於誑惑之習而轉為妖惑之狐固宜四毒類蟲蠱之鬼蠱滅報盡生於世間多為毒類毒顙蛇蝎等也五蛔類衰癘之鬼衰窮報盡生於世間多為蛔類癘鬼原由冤習作疫癘入人身中為病今乃囚閉人身中與之銷食同其安危習使然也六食類受氣之鬼氣銷報盡生於世間多為食類慢習驕吝負缺必多作鬼受饑為畜充食償負缺也七服類綿幽之鬼幽銷報盡生於世間多為服類綿著也幽暗也暗中魘著於人之鬼也服類環師謂蠶蟲牛馬二意也蠶蟲能成衣服則服類者衣服之類也牛馬可以服乘則服類者服乘之類也枉魘之習作鬼魘人為畜乃被人衣之乘之者酬其逼壓於人之債也八應類和精之鬼和銷報盡生於世間多為應類明見之習作鬼和諸精靈故為應類之畜環師謂能知節序即社燕塞鴻之類是也九休徵明靈之鬼明滅報盡生於世間多為休徵明靈者於明呪呈靈驗也滅者呪力盡也蓋呪以持力發靈力盡無驗鬼亦報終而轉生休徵之畜環師謂嘉鳳祥麟之類問此習此鬼何幸為此吉善美慶之畜耶答此鬼由業力故雖被呪所驅使而或遇三寶呪力資薰稍稍銷其惡習罪苦故得參預禎祥善類也若遇邪驅殺盜等呪未必盡為休徵也問如來總標酬債此等蕭散之物酬何債耶答或被網羅售賣籠繫玩好或利益人或遞相吞噉如斯等類何者非酬債處耶十循類一切諸類依人之鬼人亡報盡生於世間多為循類首二句明附巫之鬼亦多種也所附巫死而鬼亦報終為循類者如猫犬等依順人者是也詳列諸畜已竟三結妄推無阿難是等皆以業火乾枯酬其宿債旁為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有是等下躡獄鬼二趣旁者橫行也故亦名旁生然旁寬畜狹以畜者養也明其無力自活待人畜養不該有力自養者故狹也此等下方是結妄推無以亦皆之言準上可知四通前結答如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結三途已畢將入善趣故此總申結之意欲塞斷三塗之路耳如汝下牒前所問墮獄之人如是惡業四字是例上三人并該一切墮落三塗之惡業也蓋阿難偏詳地獄如來并結三途明其同一罪罰之苦趣故也本自發明者良以衆生自心如來藏中無所不具倘自循於何等之業即自發明何者之報譬如米中諸味皆具成糖成醋成酒隨其造時即自發明不從外得非從下乃至來受正明不從外也此意學人還更著眼不同世間所說自惹官刑之意蓋世間雖知禍是自招而猶執官刑乃是外境今表三塗皆是自心變化妄境全如夢中并無外物故云菩提心中虗妄凝結彼韓歐等謂佛自私造恐嚇於人何曾夢見斯旨耶由是應悟不但三途現今目前所對世間山河大地苦事樂事皆是虗想凝結住此悟境則萬法本空豈待造作但須時中不昧而已祖云放過即不可欽哉至訓也畜生趣已竟四人趣此趣來處除聖人示現諸趣皆通以人趣為修進通途諸趣皆願為之求轉身之速也故諸佛但於人中成佛裴公序圓覺勉勸詳矣且勝劣無量差別富貴慈善者似天聰明者似仙剛暴似修羅貧賤者似鬼愚癡者似畜囚繫者似獄夫相似既多則知來處必多今此亦由順序而談故偏取從畜來者餘并意中該之耳分三一躡前警起夫此一科頗似前趣餘文再四研之當是警起人趣之文也良以獄後諸趣皆以復次發端今談畜畢而以復次起之至下列人科頭別無復次之語意可知也且夫地獄苦盡鬼趣習終而畜又債畢今起為人將何為潤生之由乎故此文中徵剩索命二意乃諸畜所以潤生而為人也然則斯段經文非畜起為人之端乎而科言警起者用表佛意欲人警悟於諸畜生存心而不可過其力止殺而不可賤其命也分二一負債反復徵償又分為三一明本償先債復次阿難從是畜生酬償先債鬼之為畜元以酬債為潤生之端故前趣起結皆有酬債之言既云酬債債滿即住則兩無干矣二因越分反徵若彼酬者分越所酬此等衆生還復為人反徵其剩分越者所償過於本債也徵剩者索遠所過之數也即乘此因緣還復為人矣問酬滿壽終或轉別生則可無越若酬滿而彼自不死不轉則凡心何以知其當止乎答喂養不到非禮苦役鞭䇿過度則必分越於此切宜存心至於死轉必有冥主之者不足慮也三隨勝劣償直分為二一有力人償如彼有力兼有福德則於人中不捨人身酬還彼力有力謂有保持人身之力也兼有福德者則不但不失人身且為富貴之人也有力而遇反徵必遭彼之負奪福德而遇反徵但惟濫叨過償之類而已二無力畜償若無福者還為畜生償彼餘直無福當是無力若有力而但無福仍以人償已現上科還為畜生者是人轉為畜也償彼餘直者酬還彼畜生餘剩之債也負債反覆徵償已竟二負命吞殺不已又分三一先明剩債易償阿難當知若用錢物或役其力償足自停此科乃是說反償餘直者元所缺也若用錢物如䭾腳售錢之類或役其力如自供使用之類蓋言於此二端分越所酬則止缺彼之錢力而不缺彼命或以人償或變畜償償足自停言無難也二正明負命難解如於中間殺彼身命或食其肉如是乃至輕微塵劫相食相誅猶如轉輪互為高下無有休息此科方言若不但過用錢力而又於中殺命食肉則生生相讐相殺無了期也高下即強弱也強則能食能誅弱則被食被誅互換強弱遞相食誅也三惟許法佛能止除奢摩他及佛出世不可停寢奢摩他是法乃返妄契真之正定明自力得道也佛出世則與之釋冤明他力解救也惟二事方得停止若除此二事之外必不能止甚言當警戒之不宜恣殺食也躡前警起科已竟二正列人類亦分為十一頑類汝今應知彼梟倫者酬足復形生人道中參合頑類頑謂惡而且愚不可化為一毫之善者也則師謂梟以附塊相食故餘習頑嚚不義是也言參合者雜廁於其中也蓋人之每類亦有勝劣十畜但以類習相似者參雜於中非彼頑之一類皆梟所化也且如頑嚚亦有富貴等者必非梟化以彼初自三塗而出必鮮福力是知十類參合皆取近貧賤者是也二異類彼咎徵者酬足復形生人道中參合異類則師謂咎徵本於妖淫餘習復為妖異者是也然即旱時所生頂上口眼等小兒及一切身根返常怪異者皆是也魃鬼無形此已人形出必兆灾仍咎徵之餘孽也三庸類彼狐倫者酬足復形生人道中參於庸類庸者鄙也則師所謂庸鄙無識是也惑人之報理必感愚今此類原因誑惑之習墮為妖惑之狐初得為人豈不庸鄙無識哉四狠類彼毒倫者酬足復形生人道中參合狠類害物無慈曰狠此類易知五微類彼蛔倫者酬足復形生人道中參合微類則師謂蛔以衰氣附物故衰微不齒是也如鄙賤寒苦百事不利者是也六柔類彼食倫者酬足復形生人道中參合柔類則師所謂食倫出於餓噉故柔怯不勇也七勞類彼服倫者酬足復形生人道中參合勞類則師謂勞役不息者是也然既云酬足非復酬債秪為自勞耳又觀此服參勞類足知前取牛馬服乘之義居多也八文類彼應倫者酬足復形生人道中參於文類參文類者通字義解陰陽流落不偶人也九明類彼休徵者酬足復形生人道中參合明類由乘明呪之力故附世智辨聰之類效人小用無大智焉十達類彼諸循倫酬足復形生人道中參於達類達者諳練世故曉解人情者也循畜久久依人故為人附於斯類則師云是等皆非正報乃餘習所偶故云參合後三皆便巧雜伎世智辨聰者非賢達文明之事也正列人類已竟總結可憐阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者宿債畢酬者齊為畜時償債已滿少有不滿不得為人足知十類復形多取徵剩一分非論全趣故此等凶多吉少苦多樂少是以動佛哀愍耳業計顛倒者不忘債與命也為徵債而相生為索命而相殺皆非好緣聚會遇如來方與解釋修正法方得解脫不逢此二則生殺無休所以可憐憫也觀此結處與前警起全合足知彼科乃人趣正文也人趣已竟五諸仙趣前三途順序而談不出十習為業種人趣雖善以躡諸畜酬足復形是以偏取一類初得人身下劣衆生故皆猶帶十習餘氣今惟從此仙趣以上方與十習無干矣夫仙道起於衆生厭懼無常想身常住妄設多途無非志於長生不死不知此身乃真心中顛倒錯認與依草附木者勝劣雖殊而尅論顛倒一等無異今因怖死而又妄修長生是錯之又錯展轉支離迷不知返可勝惜哉然西竺上古外道宗摩醯首羅天為主及佛出世號一切智人隨機權立尚列人乘豈無仙道亦聞觀音為仙乘教主也顧此方大乘機純小乘猶不傳習豈務雜乘故藏教未聞其至也此方仙道與儒同源而老莊皆儒之太上清淨者也學仙者附會之及詳味於張馬丘劉等方術皆略祖老氏而盛宗太極乾坤坎離之說淵源於易然亦志在於長生不死而已分三一躡前標後阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙從人者但從人身修即人身證非局前十類之人正覺即本覺真心三摩地即首楞正定不如是正覺正修而邪悟五蘊身中有性命可修養之使長不死所謂存想固形十類修法不同而存想固形乃總妄念也山林人不及處即名山洞府神仙隱跡之鄉經中謂七金山中有一山乃神仙所居道家謂崑崙倒景應即此山非須彌也夫人既不及純是仙居即同分總報長水謂無別總報非是二正列諸仙此但約其固形之術不同而分之也未及論其持戒積德之事至下練心處明之分十一地行仙阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙前五行字作平聲讀之從地至天皆約步履重輕近遠高下分勝劣也應是從劣至勝為序以見漸至遺世高蹈之意然此科與下科分重與輕也且二俱是藥而此言餌者蓋炮煉和合為丸作餅之意於此服食而得功效故曰食道圓成地行仙者但百體康壯壽年延永而未得輕飛止於地上行者也二飛行仙堅固草木而不休息藥道圓成名飛行仙草木如紫芝黃精菖蒲松柏之類然此且作久服身輕行步如飛乃至升高越壑之意以飛空尚在後文故也此言藥而異前餌者熟與生之別也又此對下科近遠之分耳三遊行仙堅固金石而不休息化道圓成名遊行仙堅固金石如烹煎鉛永煉養丹砂號九轉大還者是也化道遊行者化銷凡骨而成輕妙之身瞬息萬里周行不怠者也四空行仙堅固動止而不休息氣精圓成名空行仙堅固動止者如撫摩搬弄運氣調身動靜以時起居必慎者也氣精圓成者所謂煉精還氣煉氣還神煉神還虗也空行者方是羽化飛升虗空遊行也然與下科仍有高下之分以空非天上故也五天行仙堅固津液而不休息潤德圓成名天行仙此是吐故納新如環師所謂鼓天池咽玉液是也能令水升火降而結內丹故曰潤德圓成此復超空行而能至天上故號天行也六通行仙堅固精色而不休息吸粹圓成名通行仙此下五行字方作去聲讀之功行之謂也堅固精色名通行者如環師所謂服虹飲霧粹氣潛通是也豫亦曾見仙書言朝閉目以向東方而採日精飲之夜採月華乃至服五星等是謂精色而言通行者亦以精神流貫而與造化交通也七道行仙堅固呪禁而不休息術法圓成名道行仙此專持呪自成仙道內教持准提等亦許成仙道是也兼以呪棗書符以愈瘡病禁毒驅魅以利羣生等有濟世道心故名道行也八照行仙堅固思念而不休息思憶圓成名照行仙環師所謂澄凝精思久而照應或存想頂門而出神或繫心臍輪而煉丹皆思憶圓成也此文似失次應以或存二句釋堅固思念思憶圓成後以澄凝二句釋照行方為順序豫又見仙書初繫心臍下透尾閭升夾脊乃至達泥洹方以衝頂出神皆思憶所為也九精行仙堅固交遘而不休息感應圓成名精行仙環師謂內以坎男離女匹配夫妻是也所謂嬰兒姹女即坎離交而取坎填離以結仙胎之謂也至於用女子為鼎器而採助淫穢內教固闢為魔論而仙道亦鄙為下品此為投人之欲狂迷者多惑之正人君子絶口遠之可也嘗謂道教末流順人之欲故人易從內教本來奪人之欲故人難奉今夫財色長壽人之大欲也道者以鉛汞泥水二鍾金丹投其財色之欲又以精氣內丹順其戀生之心誰不樂從至於內教檀度梵行逆其財色之心而又令觀身如毒蛇棄身如涕唾苟不達其深故誰不難之曾不知存三為生死之根棄三為解脫之要茲欲窮其深故更待後文詳之十絶行仙堅固變化而不休息覺悟圓成名絶行仙此悟通化理能大幻化如劉根左慈之類甚至移山倒水妙絶一世者故稱絶行仙也此中覺悟如莊子觀化談子達化之悟非正覺中真悟正列諸仙已竟三判同輪回阿難是等皆於人中煉心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣上之十種乃修門各別此之煉心乃操行總同如持戒積德救濟纍功而言不修正覺者以不達本心真常萬形自體又不了死因生妄生死二非顧乃怖死留生長生為號豈覺言長僅以勝短說生終以待滅詎識無生之至理本常之妙體哉故云不修正覺也別得生理者謂於正覺外別得延生妄理壽千萬歲者妄修功滿妄理相應也問世無不貪生為樂惡死為苦今羅漢菩薩動經纍劫方成縱一生得歸淨土者亦不免於現死忽聞仙道現世壽千萬歲志見不定者多興苟就之心何以示之答妙哉問也誰不為斯言所誤哉蓋彼言現世長生者亦約多生功滿至末後一生方見其現得也若推彼前身其苦修不得而死者不知其幾世也豈人人初修而即現得哉若但觀其果之現成而不推其因之久積則佛惟六年成道而佛會聞法者立談之間證果入位不可勝數豈獨神仙現世可成哉問初修何知必不現得答初修者前生已成短壽定業因種或數世仙業未圓則無生成仙骨故不現得必宿世仙道染心生生苦積功力乃成長壽定業因種方得生有仙骨自然現求現得矣是知末後成仙必不易形方得長生縱令尸解亦是隱形而去非真死也吳興謂其命終轉生非是休止下明其不雜人居亦非天上宛然自為同分耳斯亦下方是正判輪回是知神仙千萬歲滿但是後死非真不死譬如松柏但是後凋非真不凋第以過人之壽人不見其死而已矣妄想流轉者以身中本無性命主宰而迷執為有生死俱如夢幻而妄生愛憎非妄想而何不修三昧者不習住楞嚴定也報盡受輪者以仙劣於天天尚不出輪回況於仙乎夫初修不能現得得之不出輪回何如念佛求生西方一生即得金身浩劫永出輪回而無緣不信者痛哉痛哉問修仙者妄謂釋教修性不修命萬劫陰靈難入聖惑此言者甚多請此附辨以覺深迷答彼所說性命二俱非真蓋指身中神魂為性身中氣結命根為命故說單修性者但得陰魂鬼仙無長生身形兼修命者方得輕妙長生之身而誇形神俱妙安知佛所說性是人人本有真如性海乃無量天地無量萬物之本體證此性者豈惟但能現無量妙身兼能現無量天地萬物其所現者豈惟但能令住百千萬歲雖塵沙浩劫亦可令住且欲收即收一塵不立欲現即現萬法全彰得大自在得大受用方謂真如佛性斯言信不及者請細閲前文顯性處自然悟彼無知而妄謗矣諸仙趣已竟六諸天趣天趣與仙趣逈然不同世人仙天不分而學仙者濫附於天且謂諸天皆彼祖仙今略辨之仙以人身而戀長生最怕捨身受身諸天皆捨前身而受天身豈其類哉又仙處海山如蓬萊崑崙皆非天上四王忉利尚無卜居況上界乎況色界乎是知天趣最為界內尊勝之流逈非仙與鬼神之類也分二一正列諸天又分為三一六欲此乃自須彌腰頂二天以至空居四天共有六重皆有飲食淫欲睡眠具足三欲故號欲天其男女嫁娶妻妾亦如人間又二一分欲重輕就分六一四王天阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄瑩生明命終之後鄰於日月如是一類名四天王天六欲天福固總由十善而致今惟約欲以分者因名究實也以此六總名欲天而淫為上首故約淫之重輕以分下上次第至於十善乃三界總因不待言也不求常住四字亦三界總因以不求出世間修本常理但希世間有盡樂果諸天皆然況於仚乎當知此句又局於此而義通最後也己色為淫非己之色為邪淫此人妻妾皆具而但於非己之色不外流逸必言心者言其不但身不敢犯而心亦無一念也澄瑩生明者以欲念有節意多收斂皎潔不污心地光明然須更兼十善精研方能如是後皆放此言命終之後顯是捨前身而方受天身非同仙道問轉生何反勝於長生答長生如補浣舊衣終無殊勝諸天轉生如脫弊垢而換珍御勝劣天淵特愚人扭於戀身鄙習顛倒謂長生為勝耳況天身化生研妙豈同胎生苦穢誠非彼所夢見也此天住須彌腰正齊日月故鄰之也名四王者以山腰四面有持國等四王各據一面而居之矣二忉利天於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天此人但有一妻仍於妻之淫愛減少疏淡而不頻數濃厚淨味不全者間有淫念起時然亦勝前多矣超日月明者前天僅齊此高一倍故也在須彌山頂以非空居故猶為人間之頂又首二句勝前次二句劣後孤山曰忉利此云三十三帝釋統焉三𦦨摩天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天此人不逢欲境淫念必不自起逢時未交之前亦自起念暫交者但了一時之念無留戀之情去即釋然不復追想此於淨中必有全味漸向定心故言動少靜多齊此能感空居朗住也問空居者宮殿池樹皆何所踞答七寶琉璃大地無異但欲下時即虗豁無礙例如人間大地聖賢天鬼皆能上下虗豁無礙當知萬法虗妄業力使然故虗實竝現昧者誠未達也此天較須彌更高一倍故日月不及而身殿自光遍周互照須𦦨摩此云時分環師謂以蓮華開合分晝夜是也又當知此人不逢無念勝前天也逢之暫念劣後天也四兜率天一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三灾不及如是一類名兜率陀天此人比前人一切時中自己全無淫念但應彼淫境迫觸不能拒絶準下詳此必於交時不能無味精微即內院妙境精而非粗微而難見粗心衆生所不能窺外院尚不知處何況餘天故言不接等也三灾不及者即法華所謂我此土不毀而衆見燒盡之意也問此論七趣輪轉之事似與外天相應何乃單舉內院而反遺外天以致餘天不倫嘗聞三菩薩修兜率內院尚未全升當必別有修門豈此少欲即能升耶答按後文諸天中聖凡備悉如五那含等是也豈此處肯不言內院耶但疑梵本或先言外天而後兼內院譯者於過省文而分析缺詳以致宛似全遺外院而實不全遺今私意推度首三句似正外天之因而缺其果命終下似正內院之果而缺其因因果互影略耳不知是否不然此天何幸以少欲劣功而遽獲超三禪之勝報哉或者曰佛自省文以勝該劣而外天但令人意得之亦通五變化天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天此人無念應境皆同前人但交時無味勝前人耳橫陳者即現前淫境迫拶力不自由也彼則畢竟無心故全無味如嚼蠟然越化者能超越下天能變化樂具樂其自所變化故名樂變化此以心拘自化因果俱劣後天六他化天無世間心同世行事於行事交了然超越命終之後遍能超出化無化境如是一類名他化自在天無世間心者心希上界不樂世間但隨世間權同妻室至於交時不但無味而且神遊外境了不干涉也溫陵曰化即第五天無化即下天也諸欲樂境不勞自化皆由他化而自在受用名他化自在是因之心超勝前心拘果之他化勝前自化分欲重輕已竟二判屬欲界阿難如是六天形雖出動心迹尚交自此以還名為欲界動字單約欲躁動為言世人於此無節制者其動最亂莫可羈勒若瀑流若逸火若奔馬無可為喻昏狂纍墜常溺三途故此六欲諸天以漸節制而向於靜故曰出動蓋初天且止外動二天內動亦減三天遇境方動四天境迫不違五天交中無味六天形合心超皆是以漸出離欲中亂動心迹尚交者謂前四天尚兼心交以有味故後二天但是迹交以無味故也自此以還者齊此天以下直至阿鼻皆欲界攝也以三欲事同男女相具也嶽師引天台言十善外前三天各兼功行後三天各兼禪定不但只輕淫欲希生天者不可不知其引俱舍六天受欲重輕乃果中事非今經修因之旨也俱舍頌云六受欲交抱執手笑視淫彼解異豫所聞曾聞教中有偈云四王忉利同一道焰摩執手兜率笑化樂相視他暫視此是六天真快樂一道應即交抱而分形交勾抱亦可且統紀謂形交無液非同人間也夫淫欲乃墜縛根本六欲以輕而漸升四禪以絶而高舉是則不捨欲心上界猶不可希況望出三界修三摩地耶此所以阿難必緣是而起教也緣縛習重卒不能斷者亦須慚厭發願或往生求畢竟離慎勿附會華嚴等上聖境界以自欺自陷於魔說也此間別有欲界魔天欲境威權皆出諸天之上此經攝於第六故不別說六欲已竟
