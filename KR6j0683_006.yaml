body:
  text: 京都西湖沙門交光真鑒述二觀音廣陳以當此方之機故廣陳盡妙欲人專修於此也問娑婆豈無別門而入者耶答偈云自餘諸方便乃至淺深同説法備悉此意意以同途長修淺深共入惟取耳門而餘門不及間有別門入者亦仗威即事而已然此應云觀音耳根以對前總科彰其廣陳而意含耳根於觀音二字中矣分三一作禮陳白爾時觀世音菩薩即從座起頂禮佛足而白佛言觀世音名具彰二利之德而所觀不同法華中如來釋云苦惱衆生一心稱名菩薩即時觀其音聲皆得解脫以是名觀世音據此則所觀者即世間音聲蓋果門惟顯利他之盛德也今經菩薩自釋云由我觀聽十方圓明故觀音名遍十方界據此則所觀者即聽音根性蓋因門多彰自利之深源也是則二經互為隱顯而名之圓妙見矣此意略同孤山今正談修門故且依後義觀字隨俗雖作平聲理實應是去聲良以納聲為聞遠理為觀特取達理故於音聲不言聞而言觀也又所達之理非音聲中理乃耳根中性理也然必托音聲方彰聞性故又不言觀耳根而惟稱觀世音也更須當知利他自利雖別而能利之法同彰耳根殊勝無二意矣二陳白之言分三一本師傳授反聞又三一古佛同名世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音彼佛因中或亦由斯證入故其名號以因彰果或佛鑒時機應從此入故其名號與逗機之教乃相應耳二從佛發心我於彼佛發菩提心菩提心不越三心四願一者善心即煩惱無盡誓願斷法門無量誓願學二者悲心即衆生無邊誓願度三者直心即佛道無上誓願成按起信論第一直心謂正念真如第二善心謂廣修無量善法第三悲心謂度衆生無量後約三處回向則真如佛道性修異旨而四願中佛道必兼真如故合之無差也此心最為貴重初發即如王子處胎貴壓羣臣諸佛護念萬聖加持華嚴百喻未足以盡其盛德又言不發此心所修諸行盡為魔所攝持故欲修耳根圓通者先須發此大道心也三秉受法門彼佛教我從聞思修入三摩地既發大心須秉聖教凡修行者不秉聖教或恣己意或信邪師其過無量故此次明秉受自佛也彼佛即指觀世音佛此之三慧惟聞慧不同常途故思修亦別約常途聞即多聞謂聞經解意功夫其體即耳識及耳家俱意識所發勝解分別今此聞字即指耳根中聞性體即無分別如如智理而已思即不著空有一味反聞外脫聲塵內冥智理且約靜習在禪功夫也修謂達於萬行與此禪觀不相違背所謂咳唾掉背無不定時何況一切善行此約初心修進便應具足若更入位料簡應以六即揀之聞慧應在名字思慧應通觀行相似修慧應入分證若更以見道修道揀之聞思俱在見道而修慧即修道位是則後二分別淺深天隔若就觀音本門三説聞字皆須惟指耳門以音聞雖皆教體而聞為真教體也人三摩地者名通初後初但定成之號而更約後心即證入圓通之境寂滅現前也雙承動靜無違方為定成然此動靜與下二塵不同此約靜入禪定動涉萬行二時為言若靜合動違終不名為大定成就也本師傳授反聞已竟二次第解結修證此科方是正行一經云要理宜詳細敷陳故今所解稍為完備不避繁文觀者幸勿厭多非同長水流變三疊殊無關要當知上之發心是願而此為依願之行其願不虗也上之秉受是教此為依教之修其教不負也然此中分科以三空六結分之者蓋三空是五卷中佛自所説長水亦知順此分科但未能發揮委悉至於六結乃為以義推知非穿鑿也良以佛綰巾時特以詳彰結解俱有次第而説解次第但列三空似惟三重而意含六結前釋稍明今此正是解結正文豈不投前所説況細尋文理六節分明非強分也分三一初解三結先得人空又三一脫動塵初於聞中入流亡所初者發決定心起修下手之初也按如來立教常儀行人若有罪障及未具戒先須懺求端應誓斷四愆如後道場所明今約無障具戒之人故徑談大定行人宜自諒之聞中二字即所見之性亦所趣之理今為所入之門亦所照之境首宜分明不可墮於二種差誤前粗後細最當辨識一者不是肉耳之中以此聞性本惟藏識心海一體而具六用在眼為見在耳為聞乃至在意為知今取第二故曰聞中於經最初取見為例以例餘五委悉發渾如十番示後離二見妄乃為妙淨見精結云清淨本心本覺常住今之聞中即彼見中以其體無二也又四科七大轉名如來藏心周遍十虗圓含萬法今此聞中即彼藏心中也又一真法界圓具三藏非一切法即一切法離即離非是即非即是名無上菩提如來知見今此聞中即彼三藏體中也良以見道分中極力發明者正於修時總持用之所謂躡解成行大陀羅尼也若別為一法則前之開示俱成無用矣是知此之聞中乃平吞萬相盡空法界之中也二者不是耳識之中以此聞性雖有聲無聲明鑑了然絲毫不昧而會無分別亦同見性但如鏡中無別分析且離念相者方等虗空亦常亦遍有念即偏局一處剎那生滅不偏不常此即緣聲之識若墮此中依舊是經初如來所破緣塵分別影事而七重破處等文全無用矣是知此之聞中乃一念不生圓照法界之中亦即一乘寂滅場地真阿練若正修行處若於經中未即了然可於靜習坐中體認的當多於五更起坐夜氣清明萬籟初動之時一念不生覺此聞性廓然而圓朗然而照山壁不隔晦暗不昏大小遠近音聲鑑徹無遺乃至微風動樹足履鳴階亦所不昧假如東方數里之外洪鐘發響固歷歷分明西方同時數里之外羣鼓喧聲亦琅琅不昧如是乃至南陌悲號北街笑語車輪馬足一一俱現圓聞之中如影現大圓鏡中毫髮無隱也至於寂然無聲時則聞靜愈無邊際然但借觀音聲彰能聞之體為聞中不取所聞動靜之境為聞中也到此始知妙性本具不是修成但是平日以亂心緣慮遮障孤負不自覺耳又當知此聞中內而所執定實身心外而所執定實器界了無蹤迹可得一片虗靈浩無邊際萬法森然唯心所具交徹互融之妙皆在其中非有非空即空即有妙極不容思議之境也亦即祖師正法眼藏涅槃妙心但彼不局一門或多示意根而言了知為異耳珍重珍重此句先以決定所照之境下句方是工夫入者旋反也流有二意一流謂法流即聞性也入流者旋轉聞聲之聞反聞自性也二流者注也順聞奔聲外注謂之出流反聞照性內注謂之入流二釋俱通此亦須是一念不生回光反照專注以聞自性令前妙境湛然常明不得一息間斷即宗下所謂綿密功夫也問見聞覺知同一根性永嘉謂起知知於知此非無緣知如手自作拳非是不拳手今云久聞聞自性若準永嘉應云起聞聞於聞此非無緣聞如手自作拳非是不拳手二義何得不違答彼約根塵已銷妙性顯後不可更有二知今約初心起修方作亡塵方便故須暫假反聞以為入門若到聞所聞盡亦是根塵已銷之後更不存於二聞也且此最初入流亡所同彼最初息念亡塵豈遽同彼知滅對遺之後耶故欲會同佛祖之言須知前後次第則無違矣此二字即是合覺下二字乃是背塵亡者脫也所即聲塵也故上二字即旋聞下二字即與聲脫也約前四卷末第二決定義中詳明根結全由法塵故塵亡而結自盡今解耳根其所應亡當即是動靜二塵動謂有聲靜謂無聲今初先亡動塵仍有二種一者屈曲聲謂有意味者如言語歌曲之類是也二者徑直聲謂無意味者如風水鳥獸鐘鼓等聲是也其最有力能牽心流轉者屈曲聲也先須斷此永不接緣然此屈曲復有二種一者世俗屈曲二者道理屈曲世俗復有二種一者無力二者有力無力謂評品古今文章事物他方昔日不干己事但恣散亂無增長煩惱之力故云無力也有力謂説諸欲境令心起貪説諸不平令心發怒背面譽毀當面稱譏一切切己利害之言令人不覺喜瞋陡發忘失正念是也此皆世俗曲屈也道理屈曲者如説內外邪正道理乃至法門宗説玄妙意趣令人不覺隨言生解擬議思量若許攀緣於此亦是尋聲流轉最障本聞所以宗門於佛祖言教如生冤家也問止絶世俗似無不可何於道理勝思亦杜絶之答躡解成行行起解絶解若不絶則無漏之行終不能成況真心實際動念則乖豈容留解而許尋道理屈曲聲乎故後偈云將心持佛佛何不自聞聞是更偏忌道理屈曲也如新産家忌人往來觸犯則疏客親友二俱止絶方可無虞若但斷疏客而容親友往來則觸犯之害終不免也世俗屈曲如疏客道理屈曲如親友所以二者俱當止絶也行人初心首先於此諸屈曲聲一切不緣惟以內向聞性湛然朗然安住不動則一切粗顯分別永息不起矣至於水流風動鐘鳴鼓響等一切徑直之聲更是難亡須使入流功夫細心專切久自亡盡問反聞功成豈一切諸聲如醉睡中皆昧然不覺耶答非也諸聲任有行人但惟圓照聞性不漏落流注於聲而已問不緣曲屈之聲止其分別易以稽考不緣徑直之聲止其取著難以考驗又此諸聲縱令心不取著其如諸聲亂發攪擾聞中何以驗其不隨聲轉耶答反聞自性專切者聞性常自分明如對清秋之月無一息之昏暗且不注一聲而諸聲普皆不昧若稍取著於聲當有二驗一者聞性先以遽昏不復分明二者偏注一聲餘聲悉昧更以喻明譬如人眩水不能自渡賴人牽之而過彼人教其仰面視天不得一息視水若一息忘教視水隨即運倒此亦如是反聞自性猶如視天不復尋聲如不視水更無流轉之患猶無溺水之患也是知聲不可除而但當反聞專切亦如水不可除而但當仰天專切也問此之衆聲畢竟不昧耶亦有寂滅之時耶答昧不同滅心昏為昧聲銷為滅反聞自性久益精明終無昧時外脫聲塵久漸銷落終有盡日良以性是本有聲是本空故也問聲今現有何為本空答如人夢雷妄成震恐其雷本空而正在夢時亦似現有豈真有耶現前諸聲亦復如是問諸聲不實既如夢幻銷落之後畢竟一無所聞則道成者皆如聾人耶答不然此非真滅但以銷落聚聞之根近蔽之聲暫沈枯寂即同色陰區宇如有目人處大暗室也不久心聞洞開遍滿虗空所謂發本明耀必將上聞有頂下聞無間乃至最近蟲行蟻鬬素所不能聞者皆當聞之何況餘聲如聾之疑鄙劣甚矣問此之入流亡所但於靜坐時習之耶亦於涉事時習之耶答若但取於靜坐何用詳辨曲屈等聲正須動靜一如方成大定耳問靜坐易忘今即不問臨事實難今請問之假如有人涉事訪一故人於路用功但惟反聞自性而餘聲悉不取著正當聞性湛然忽於中途隔墻聞彼故人言語此聲不尋則廢其訪問之事若尋之豈不成流轉耶答此聲許尋而不妨不成流轉以偈云衆生迷本聞尋聲故流轉汝若於尋聲時不迷本聞此但尋聲豈即流轉問請分尋聲流轉與尋聲不流轉之相答汝正反聞自性時有當尋之聲現前一味尋之而聞性全成迷昧者此即流轉若當尋聲時而聞性分明依然不昧此但暫尋即還亦謂之得用即休何得同謂之流轉耶以此為例凡涉諸事皆當準此思之大抵初心靜習時得力為多靜定若成漸能涉事不昧若初學靜定未成而遽希涉事不昧者良難問涉事不昧既曰良難則初學反聞恐難理事兩全答世諦之人寧廢理以圖全事修行之人寧廢事以圖全理今初心修進誰要你依舊精研世事務求兩全耶當知反聞入手之人雖處世間惟求省事省言日用家常騰騰任運得靜且靜萬不得已一事一言用了即休且正當用時分毫不昧言差事差不顧不悔惟圖反聞無間心便怡然問祖師何言這邊那邊都不缺用答此是大亡已久絶後再蘇死中發活方能名臻其妙非謂初心便能如是也問此節舊解多補天台三止觀意謂為修行妙宗今何不用答彼自別為入門非此經旨且三觀初心不離六識思惟而入今經首廢六識不用將何入三觀耶斯經圓融妙理全是藏心本具詳在奢摩他中發揮而行人未修之時先成圓解及至修時行起解絶但一反聞極為簡便不勞廣立止觀宗門所謂單刀直入是也且入流乃合覺照理即簡妙之觀忘所乃背塵息妄即簡妙之止久久定成則圓融密妙體用皆從本地流出所謂故發真如妙覺明性也問前綰巾時如來親喻當從中道解之今但反聞不明中道豈合結心之喻耶答詳佛左右偏掣之喻蓋指三界凡夫著有之修出世二乘沉空之證故偈云汝觀交中性空有二俱非今此未反聞時圓解已成正反聞時豈墮彼二既不墮於空有即是最簡易之中道允合結心之喻何必廣立止觀枉用贅瘤之中道真所謂為蛇添足殊可笑也前綰巾中三空之下所助治病之喻正當此用詳玩之可也問初心進功節度及修中防犯境界可得聞乎答此功雖不專於靜坐而初心亦須靜習偏多所謂大忘人世大死一番惟知反聞自性而一切散善尚不為之何況俗事宗教聖言尚如生冤家相似何況俗言縱有人來問道即端心反聞信手拈答一二句即休其餘拜佛燒香衣食賓客呼喚動轉皆極令聞性分明且當此際既以全提聞性而聞性即全法界則動轉咳唾一一俱周法界即是全身受用至於靜中恆令不昧夜則披衣端坐排遣昏散專注聞中惺寂雙流昏沉至極須臾假寐即起經行直待聞性明利時依然靜坐如宗門云一念萬年萬年一念是也問設有夢中流轉時如何答初心夢中或有流轉醒來隨即收攝不必悔惜久當夢中亦如醒時反聞便是寤寐恆一好消息也但時時求佛菩薩加令心開如此用功時一切皆忘即如後文所説如有目人處大暗室所謂色陰區宇中也切不可嫌其迷悶蓋根塵俱泯自當如此功夫極到當自有發本明耀之時勿躁求也然心光逼極或見本師現身摩頂加被當依後道場所説默驗魔佛愈加專切或發善境如後陰魔中最初十種者勿作聖解但當加功反聞而已且於入流亡所之時正是心精通䐇與十方諸聖共一鼻孔之時而功極動魔正當此際依後聖教悟則無咎切不可中途成狂也然此脫亡動塵功夫必至忽然萬籟俱消惟一聞性明耀日月狀如雨霽天空風停海湛極為寂靜當此之時豈惟一切聲消身心世界蕩然一空虗豁自在方是旋聞脫聲入手時節此境極為虗豁自在寂靜輕安最忌過善取著但惟一種平懷精進不輟則無量妙境將次漸開一取著之隨得隨失永不可復矣記之記之二脫動靜所入既寂動靜二相了然不生上科方離動結此科動靜二結兼除蓋動除靜現自然之理加功雙遣自然之勞故今言所者即忘所言入者即入流也所入既寂者謂亡所入流二俱成靜也蓋初雖忘所而所豈易亡初雖入流流豈易入雖云努力一念不生未免動靜間發心心收攝非寂靜也至此亡所而所無不亡入流而流無不入羣動俱息收攝情忘故云所入既寂也由是而知前之亡所且惟亡動今之既寂乃是動結已除靜結方顯也次二句方乃動靜雙除也是雖兼動雙言其實單遣既寂而惟除靜塵耳然言了然不生者蓋約既寂之後加功進力以至寂靜亦亡二塵俱不可得也問亡動即是亡聲而聲塵與聞性如黑白相違易於分辨故亡之則易至於靜塵與聞性相順聞性至靜而靜塵亦靜俱無邊際俱無分別如風空莫辨水乳難分誠難剖析故亡之恐為不易如何示之答但患聞性未能了見分明若了然自見聞性安有混淆之理良以聞性是心靜塵是境心則靈知不昧境則冥頑無知境自境心自心如爾為爾我為我有何難分譬如世俗凡夫入一深山無人之處皆能了別山中寂靜其實於己聞性絲毫不覺及來閙市其靜全失以前靜境全是山靜故離山豈復有靜世人但取境靜者離境無有不失者也此猶外境甚粗又有行人未見自心但習攝念成定展轉深入憑彼定力覺無邊際亦靜塵境界定力盡時無有不失者也此為內境比前更細若未能悟心不見聞性誠不識此二種俱為靜塵非心靜也若能悟心了見聞性自覺此性本來至靜寂然無邊非由攝念所成亦非託外境界不知反聞者故全不覺若能一味反聞則性靜恆在居山居市其靜不易也入定出定其靜恆然也縱不發明未反聞前從無始來本自常靜何況了見反聞之後豈復有得失可言哉若是則聞性本與靜塵無干反聞專切者亡之甚易何難之有哉大抵亡動之後別無伎倆反聞功夫展轉深切聞性增明則動靜二塵逈然雙脫矣至此則亡塵極明功夫位當圓之初信於二乘則齊初果問何以知然答金剛經云名為入流而實無所入又云以不入色聲香味觸法名須陀洹此亡聲塵時六塵俱亡故知然也惟入流二字大小逈殊小乘入流但是攝心入深三昧彼謂法性實是三無為境而已此經猶為法塵分別影事豈同此之反聞自性乎故知證雖位齊而入理深淺大不同也三脫聞根如是漸增聞所聞盡上科全以亡塵此科方以盡根如是者承上之辭漸增者加功進行之意下句不依舊注舉塵顯根之説蓋上聞字乃旋倒之聞機下聞字乃所聞之聞性以前因圖作亡塵方便故立能所二聞令其聞根而亡塵今塵相既盡故外無所對則根亦不存能聞之聞機與所聞之聞性二俱除滅故曰聞所聞盡也後文云塵既不緣根無所偶反流全一六用不行正此之謂也問既全以根性增明而方以雙亡動靜今復將根性亦亡豈不全成斷滅答但以盡根那云滅性問根與性為二耶答非二亦非一也問當如何等答根如冰性如水冰水本無別體故非二然冰結而隔水融而通故非一矣今言根盡但如冰融豈如水涸哉問前言二塵亡後惟覺聞性極為寂靜湛無邊際今盡內根復作何相以別於此答前作方便脫彼二塵故暫執聞性為內二塵為外背外向內宛然內根恆在細詳經云聞中又云入流中之與入顯根為內彰彰矣及至二塵蕩亡已無外相既不對外內相漸消以至泯然豁然無復內外即根盡之相以是而知前言無邊際者非真無也以二塵為限即是邊際今二塵既盡無復限隔方是真無邊際若約三空考之到此即得人空前此以根對塵塵為他相根為我相排他立我背他向我我相宛然至是根塵俱泯能所兩亡無復自他惟一法性不分內外粗細四相應盡無遺定位當至七信齊於別之七住小乘四果阿羅漢位而見思惑盡當證我空真如即前如來所説此根初解先得人空矣又當知此是菩薩高證圓之七信但約斷見思證人空謂齊小之四果非真實同羅漢如世之進士初品暫同吏員極品豈真名位與之全同乎當知六通十八變等皆應殊勝至下當更顯其不同亦如進士資格權位名分皆非吏員可仰視矣初解三結先得人空已竟二次解二結成法解脫前示倫次中除法執科已明法執粗者先於入流亡所時早已斷盡至此惟除細法執焉分二科一脫覺觀盡聞不住覺所覺空盡聞二字牒前聞所聞盡即二聞雙泯之境不住謂加功進行透過斯境不鈍滯於此也以見盡聞若住增慢同倫化城永閉矣末句即新證也蓋盡聞之後根塵逈脫湛一無邊之境現前故今言覺者即照此境之智也所覺者即此湛一之境也盡聞若住則智境恆對能所仍存終為勝進之障即溈山所謂具足心境也今言覺所覺空者謂能覺之智與所覺之境二俱空寂泯然無復對待也此雖境智雙舉而能覺所覺二俱言覺覺心分也於智為多若吝惜此心以為般若真智而不能捨置者是為妄生愛智之法愛也又此望後為斷法執分別問法執分別應隨前粗法執斷之那於此中猶有分別答此俱生中微細流注分別非粗分別也其實似是覺觀不忘義説分別耳二脫重空空覺極圓空所空滅空覺之空牒上覺所覺空之空而言空覺者顯是重空之智也極圓者謂增修滿其分量之意末句促舉空者即此重空之智所空者即前科智與境也空所空滅者蓋言重空之智并前智境一切滅盡無餘也良以重空之智初起未圓則能空所空二俱宛在今空覺極圓則非惟所空智境息滅而重空之智亦復隨滅如以木鑽木火出則二木俱盡矣此雖重空亦智而能空所空二俱言空空境屬也於理為似若吝措此境以為實際理地是為妄生愛理之法愛也又此望前為斷法執俱生蓋能所二空已離前科微細分別而任運存此微礙緣影而已此影滅盡成法解脫而真光將露矣此之二結已超小乘而過之然定位於圓教即八之十信於別教即八之十住及十行十向二十三位而塵沙惑盡矣當知此諸菩薩比定性回小者大有不同以菩薩於粗法執先已斷伏而定性全法方以伏斷所以遲鈍也又此以菩薩所陳空覺極圓同前如來所説空性圓明故知此之空所空滅即前所謂法解脫矣次解二結成法解脫已竟後解一結俱空不生生滅既滅寂滅現前生滅二字通前動靜根覺空滅六結全收粗細不同要之皆生滅心也初解動滅靜生次解塵滅根生理雖無生而有滅有存生滅宛然下皆放此三解根滅覺生四解覺滅空生五解空滅滅生到此若住最後滅相則當為滅相所覆恆處俱空應是一種頂墮細障故猶名第六滅結也百尺竿頭更須進步祖師所謂向下猶有事在亦名末後著也然此不復更勞著力滅除即儒典所謂化不可為而本經所謂無功用道也但無住著之心以俟一剎那頃本理現前則此之滅相即逈脫矣如末句是也然所謂寂者非對動之寂從無始來本自不動之寂也所謂滅者非對生之滅從無始來本無生之滅也此是本覺理體如來藏性真如實際清淨本然周遍法界亦名大寂滅海亦名大光明藏所謂寂照含空惟以番上生滅且單言寂滅實乃真心全體而萬用皆具於中此理現前則山河大地應念化為無上知覺根隔合開六根互相為用而下之諸科一切勝用皆從此發焉約其所至之位應在初住雖分斷一分無明分證一分真理而一斷一切斷一證一切證四十二地功德隱然具足其與別教初地位雖言齊而歷別之與圓融實天地懸殊矣通前次第解結一科會於四卷末節入流即守於真常亡所即棄諸生滅盡聞即根塵識心應念消落二覺即識情為垢二空即想相為塵而前空後滅即二俱遠離寂滅現前即法眼清明而毫無差爽矣若會永嘉奢摩他文入流即息念亡所即亡塵亦應放其文云流非亡所而不入所非入流而不亡亡所則入流而亡入流則亡所而入此四句可齊於動靜不生又云亡所而入則入無能入入流而亡則亡無所亡此二句根塵俱泯可齊於聞所聞盡又云亡無所亡則塵遺非對入無能入則念滅非知此二句無對無知可齊於覺所覺空又云知滅對遺一向冥寂此二句可齊於空所空滅又云閴爾無寄妙性天然此二句可齊於生滅既滅寂滅現前亦似吻合而無間矣但永嘉似乎都攝六根或專意根經乃專攝耳根為異耳又永嘉方談最初銷顯向後更有修治斯經己談深證高位向後惟彰發用今與合會而觀節文宛似令知圓頓初後無有異心行者不可委於高位而視為不切己也又永嘉歌云心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真此令盡其微細法愛而正合後三細結其所謂心是根者即覺結也法是塵者即空結也其所謂心法雙忘者即生滅既滅正除最後滅結而所謂性即真者即寂滅現前佛祖一揆初無二道學者宜著眼焉次第解結修證已竟三詳演所獲殊勝上是圓通因行此乃圓通果用此中三科文廣纍積篇章故云詳演而菩薩自語元標殊勝故作科名問因行為造修之要理宜詳演而文何甚略果用待功成自顯似應且略而文何甚詳答詳明果用激勸欣修固不應略而因行示人修要尤當加詳今所述因行不過數語者良以此經如來與菩薩相同演一圓通因果前後互為詳略如來自四卷後半示二決定義乃至擊鐘驗常五卷前半證明別無結元至綰巾示結合有一卷經文詳説解根修習圓通至為委悉豈止如今用之廣哉而所以説果用者秪云山河大地應念化為無上知覺又云由是六根互相為用辭甚略也今菩薩説行若詳應重如來所示説用若略則無補如來闕文二俱非妙故應因行略而果用廣廣略皆適其宜矣但如來泛説解根而密指耳根菩薩顯然專説文似有隱顯通局而意實無異旨也行人欲究圓通因行之詳當取前經文與菩薩所説參互看之不必局菩薩之數語矣分為二一標列二本又二一總標忽然超越世出世間十方圓明獲二殊勝忽然即解脫道一剎那頃也蓋證入真體在一剎那而稱體起用亦即在於一剎那也超越即解脫纏縛之意不為界內有縛故超越世間不為界外空纏故超越出世間十方圓明乃寂照含空之意不止大千按華嚴當分身百界圓明即明通彌滿於百界又十方亦可作十法界圓明即一一界備達十如是也二殊勝即下列二種妙用盡菩薩從初發心即達心佛衆生三無差別故證自心時而即與佛生同體用矣然皆謂之殊勝者顯超權乘也蓋上同下合皆二乘所不能者故云然也二別列又分二一上合慈力一者上合十方諸佛本妙覺心與佛如來同一慈力先合本妙覺心是與諸佛同體同佛慈力是與諸佛同用在因同果處染常淨故曰本妙覺心人人本具故才證即上合也依吳興力字作悲字蓋佛具與樂之慈必兼拔苦之悲理應然也二下合悲仰二者下合十方一切六道衆生與諸衆生同一悲仰六道衆生下亦應有本妙覺心四字譯文略之耳以佛與衆生同具本心而菩薩證此心時上下俱合合則先同其體然後能同其慈力悲仰之二用也經家於衆生略之有二意一者佛下已明衆生不異故不重標二者諸佛妙心已證有力須顯其合方成勝用衆生妙心未證無力不須顯合合則無畏勝用反不能同雖俱通而前義為正矣悲者哀求拔苦仰者希望與樂意同吳興所説標列二本已竟二承演三科承演者以下各科皆有承上子科故也就分為三一三十二應又三一標承慈力世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土由我下乃至同慈力故標承授受出三昧名以彰妙應體用洪源上聞字即指聞性本覺之體而言聞熏者即所謂本覺內熏也下聞字即旋倒聞機之聞始覺之智而言聞修者以此反聞進修圓通也然初稱如幻謂始覺權假暫用隨銷非同執實染修也終結金剛者謂本覺究顯永無銷壞而仍具摧堅之能非如權乘畢竟非實也又初假二聞故如幻終成一性故如金剛此上方明得體與佛二句乃明同用體用兼具方以成末三句之妙應耳菩薩隨機赴感為應衆生希應者須竭妙感若無妙感固不可妄議慈應之不周矣遊諸國土者即無剎不現身也溫陵曰三十二應者現十法界身圓應羣機也開之有三十二合惟四聖六凡攝盡羣類二條列妙應又二一應希求心希慈與樂各求稱心也又二一應求聖乘即出世間四聖乘也約能求人除佛惟三約所現身四聖皆具今能求人仍四者於緣覺而加獨覺耳就分四一菩薩世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為説法令其解脫既曰諸菩薩則各教皆有不局別圓但凡菩薩無不希成佛身故現佛身應其機也勝解者各隨所修法門因行已極而所起證悟之智也現圓圓字作滿字釋之言智證將滿之時也擕李曰勝解現圓者各約自乘理智將欲現前得此名也後皆放此孤山曰若入相似三摩地進修中道無漏則分真勝解現圓乃至若修金剛無漏則究竟勝解現圓大士皆現佛身為説頓法令得分真究竟解脫問等覺菩薩豈假初住現佛説法耶答聞法得解何必求人復假勝身彌增內慧且天魔現為佛像毱多尚乃致禮況初住菩薩妙理所現等覺雖尊孰敢不仰此説但約等覺決無於劣計我勝之慢習若約觀音初證似在初住而圓頓上根固有一生事辦所謂從初發心即成正覺漸起大用豈可定常局為初住哉其為等覺説法理無可疑不必更説元是古佛解脫亦即一剎那證入解脫道也二獨覺若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為説法令其解脫此下三科皆稱有學者以各門在修習位者功極皆將證入無學之時也諸字但指一類多人而言下皆放此溫陵曰獨覺者出無佛世觀物變易自覺無生故號獨覺樂獨善寂求自然慧故曰寂靜妙明當知此非是天然外道蓋是多生受佛小教熏習當歷七生方證無學終不至於八生今第七生出無佛世證期已至忽然觸境證入似不歷教而實教於多生矣三緣覺若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為説法令其解脫溫陵曰緣覺者稟佛之教觀緣悟道者也知迷勝性由十二緣於是斷之自無明滅至憂悲苦惱滅則緣斷而勝性現矣性因緣斷而顯故曰緣斷勝性勝性即因緣無生之性也亦化城涅槃耳下科放此四聲聞若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為説法令其解脫擕李曰三果以前賢位聖位俱屬有學見道一十六心斷四諦下惑證生空理故曰得四諦空初果後進斷三界八十一品俱生品品皆證一分擇滅無為故云修道入滅應求聖乘已竟二應求雜趣即六凡也分二一諸天又分二一天主又分四一梵天王若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為説法令其解脫欲心明悟謂深達淫欲為招苦之本欲雖通於三五而淫為上首本經單論此句深知下句痛戒也此解脫乃成就其決定捨欲生梵之事是雖捨求皆具而更重希求即同下成就也且所修背捨亦名解脫孤山曰説法者如金光明云大梵天王説出欲論是也二帝釋天若諸衆生欲為天主統領諸天我於彼前現帝釋身而為説法令其成就孤山曰帝釋即欲界第二天主彼天橫有三十三天而帝釋統之説法謂十善也金光明云釋提桓因種種善論是也三自在天若諸衆生欲身自在遊行十方我於彼前現自在天身而為説法令其成就孤山曰自在天是欲界頂天具云婆舍跋提此云他化自在天假他所作以成己樂即魔王也或云自六天上別有魔王居處亦自在天攝欲身自在者顯其惟是正報如意耳下放此遊十方者六欲四洲之十方也或亦能至他界應不及色天之遠到耳再容總通四大自在若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為説法令其成就孤山曰大自在即色頂摩醯首羅天大論云三目八臂騎白牛執白拂者是也飛行虗空能至他界如法華言其能過五百萬億國推尋供佛是也初禪尚能何況色頂又統論諸天皆舉一以該其餘梵王似局初禪而實該四禪帝釋似局二欲而實該六欲二自在別舉魔天以二魔不在正天之屬故更舉之但闕四空或意含而文略然此與法華俱缺之意者此論現身而四空不樂身相故不為現縱有別者方便以利益之當亦不入此現身之例矣天主已竟二天臣分三一上將若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為説法令其成就此似四王主帥各有八將而韋馱為上首是也各統所部鬼神即八部之屬救護國土者還指人間國土所以摧魔護生也二四王若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就四王似應科入天主今文列於將後故屬臣類且四王自來係屬帝釋大臣分統四洲餘天上下未聞君臣之分如此也世界即須彌各面一切國土也三太子若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為説法令其成就溫陵曰四天太子即那吒之類能驅鬼神按統紀四天王各有太子九十一人驅使者即前諸將及八部也諸天已竟二人趣分四一世諦男子此未論秉佛教戒者也又為二一人主若諸衆生樂為人王我於彼前現人王身而為説法令其成就溫陵曰自金輪至粟散皆人王也粟散即國小王散於天下如粟之多問世之平人有妄志帝王者耶又何須假帝王身與其説遂心之法耶答此必有德懷仁不忍世亂發願世世為有道之王以理國菩薩為其現所欣之身與説生貴之因及帝王德業以熏隔生之種而已如修十善為輪王因是也豈教以篡奪之術哉後多放於此意推之二臣民分四一長者若諸衆生愛主族姓世間推讓我於彼前現長者身而為説法令其成就溫陵曰具十德為長者姓貴位高大富威猛智深年耆行淨禮備上嘆下歸故為族姓之主世間推讓也以此觀之西天稱長者非止年高蓋世臣大家而兼有德望者之稱然亦非現生可得之位也二居士若諸衆生愛談名言清淨自居我於彼前現居士身而為説法令其成就此有德無位或談道論德為人師範或著書立言垂教後世名言典章也如此方王通邵雍之類隱淪不仕者也三宰官若諸衆生愛治國土剖斷邑我於彼前現宰官身而為説法令其成就溫陵曰三台輔相州牧縣長悉號宰官也以上三科似此方儒教所攝四術士若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為説法令其成就溫陵曰婆羅門此云淨行四姓之一也愛諸數術即和合占相推步盈虗也此但釋數術而未明攝衛乃調護身壽即名醫輩耳此科似此方醫卜雜伎所攝如郭璞華陀之類是也西天最貴重之有十八姓世諦男子已竟二奉教男女謂奉戒者分二一出家二衆又二一比丘若有男子好學出家持諸戒律我於彼前現比丘身而為説法令其成就諸律謂自十戒以至進具二百五十也二比丘尼若有女人好學出家持諸禁戒我於彼前現比丘尼身而為説法令其成就諸戒亦自十戒進具五百也二在家二衆又為二一優婆塞若有男子樂持五戒我於彼前現優婆塞身而為説法令其成就孤山曰優婆塞此云近侍男以五戒自守堪任近侍出家比丘者也二優婆夷若有女子五戒自居我於彼前現優婆夷身而為説法令其成就孤山曰優婆夷此云近侍女亦奉五戒堪任近侍比丘尼奉教男女竟三世諦女人若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為説法令其成就內政即泛言一切婦道儒書云有閨門之修而無境外之志故曰內政然閨門為萬化之源故關於家國之治亂家通大夫以下國通諸候以上孤山曰女主即天子之后國夫人如論語君之妻曰君夫人命婦謂妻因夫榮者大家如後漢扶風曹世叔妻者同郡班彪之女名昭字惠姬和帝數召入宮令皇后貴人師事焉號曰大家家音姑四童真男女又曲分為二科一童男若有衆生不壞男根我於彼前現童男身而為説法令其成就即有志一生不犯女色者也二童女若有處女愛樂處身不求侵暴我於彼前現童女身而為説法令其成就處女亦名處子謂未出嫁之女也愛樂處身者願常為處女終不出嫁也不求者不願隨從之意謂堅貞自守縱有強施侵暴亦誓所不從也應希求心已竟二應厭離心前之希求是冀望勝事成就此之厭離是不樂本位思欲脫去也然多欲脫入人倫問餘趣則可天趣何反求人答人身意於修道出離裴公云可以整心慮趨菩提惟人道為能是也分二一八部衆孤山曰準普門品此闕迦樓羅即金翅鳥也乃譯文略之今但七易就分為七科一天衆若有諸天樂出天倫我現天身而為説法令其成就出與脫同成就者遂其脫離之願也後皆放此二龍衆若有諸龍樂出龍倫我現龍身而為説法令其成就自下七趣雖皆具神通福德威權均名惡趣各有苦惱是故多欲脫去為人以希修進也問焉知不欲脫入聖流而必言求人趣也答若求三乘聖果自入前希求中應求聖乘科不在此中矣三藥叉衆若有藥叉樂度本倫我於彼前現藥叉身而為説法令其成就度亦脫也孤山曰藥叉此云輕捷也四乾闥婆若乾闥婆樂脫其倫我於彼前現乾闥婆身而為説法令其成就孤山曰乾闥婆此云香陰新翻尋香行帝釋樂神也五阿修羅若阿修羅樂脫其倫我於彼前現阿修羅身而為説法令其成就孤山曰阿修羅云無端正以女美而男醜故從男彰名新翻非天以諂詐無天行故六緊那羅若緊那羅樂脫其倫我於彼前現緊那羅身而為説法令其成就孤山曰緊那羅形似人而頭有角因呼為疑神天帝絲竹樂神也小劣乾闥婆新翻歌神七摩呼羅若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為説法令其成就孤山曰摩呼羅伽什師云地龍也肇公云大蟒腹行者也八部衆已竟二人非人衆又分二一人衆若諸衆生樂人修人我現人身而為説法令其成就此是現在人中而求捨身之後復得人身蓋求不失人身世世修進者也二非人衆若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為説法令其成就長水曰有形如休咎精明等無形如空散銷沉等有想如神鬼精靈等無想如精神化為土木金石等皆非人也條列妙應已竟三結名出由是名妙淨三十二應入國土身皆以三昧聞薰聞修無作妙力自在成就是名下結名也皆以下出其由也心如海而諸身如海之印紋緣至而現則來無所從緣盡而沒則去無所止無礙無滯故稱妙淨之應也無作妙力者非如二乘作意之通菩薩所證大寂照海湛然不動緣對自現初無作為所謂無記之通亦如涅槃所謂慈善根力實無去來也自在成就者言無所不可現也吳興曰三十二應比普門品雖互有出沒大體是同總而言之無越十界於十界中兩經俱無菩薩并地獄身者或曰聖言之略耳或云觀音已是菩薩何須更現地獄苦重不可度也智者依正法華具現菩薩界身又準釋論菩薩亦化地獄故知十界不可闕焉三十二應已竟二十四無畏又復分三科一標承悲仰世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德我復下至悲仰故標承三昧名字及悲仰為無畏之本也名字解現前科然獨約方世六凡者良以上之希求未言在難是於平坦時別求勝事故兼三聖六凡今此多言在患難中故且略於三聖以參預聖乘者必皆上善多不與於惡難故也且上界之凡尚無諸難何況三乘聖賢問數言果縛若存雖羅漢不免如阿難淫難舍利弗鬼難是也何言無難答彼多示現非實縱實亦少今從多分惟凡故略三乘也令諸下正成無畏於我身心者蓋菩薩反聞證性時證全法界而與諸衆生冥同一心交參互徹據吳興言菩薩所證圓通之理遍在衆生悲仰之中是言菩薩在衆生身心中也二言參取乃知凡聖恆以冥合但待感而即應也無畏約衆生言蓋遭難者正在怖畏之中而蒙救得脫即無畏也功德約菩薩言救生脫怖實菩薩最妙功德也二條列無畏分四一八難無畏就分為八一苦惱難一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫苦惱雖通分約身心亦可蓋苦楚其身而惱亂其心也八難之中此一為總下七為別既以別列何用此總答別列不盡一切諸難皆攝此總科中矣首二句先出其由也溫陵曰不自觀音者不隨聲塵所起知見也以觀觀者謂旋倒聞機反照自性也苦惱衆生言觀聲者吳興直以衆生觀聲混同聞熏不思菩薩聞熏不聞聲而聞性衆生聞熏不聞性而聞聲是相反也於義全非良以法華楞嚴兩經互有詳略故反聞圓通因行也悲救衆生果用也法華因行略而果用詳故缺敘反聞而却加云衆生一心稱名菩薩即時觀其音聲皆得解脫楞嚴因行詳而果用略如首標不自觀音等辭條條詳備至説救苦乃缺稱名及菩薩觀彼稱名等意致使嶽師責令衆生亦用聞熏其實衆生在急難中幾人慣習聞熏縱有一二何名普救又衆生自能聞熏何待菩薩救拔是義不然但當依法華衆生一心稱名菩薩即時觀聲令脫也其文但於苦惱衆生下缺略蒙我二字試加讀之自見兩經同旨此以佛言證菩薩之言決無差爽後皆放此俱有稱名觀聲之意勿疑也二火燒難二者知見旋復令諸衆生設入大火火不能燒溫陵曰內外四大常相交感見覺屬火故見業交則見猛火今知見旋復則無見業是以火不能燒此亦稱名衆生火不能燒也問菩薩知見旋復何與衆生而即令衆生脫火答菩薩旋聞與聲脫時見亦旋而亦與色脫固火不能干然證極法界威神無量故令一心稱名者即為大悲威光所攝不墮火難如入山陰暑不能侵也此蓋自利餘力加以悲願故能如此無可疑矣擕李曰準天台釋火難有三種一果報火下從地獄上至初禪二惡業火通三界三煩惱火通三乘火難既爾他皆放此若三火通收則三聖亦應蒙救前標文中攝在一切二字之內此則窮研盡理之説不可不知三水溺難三者觀聽旋復令諸衆生大水所漂水不能溺大意同火四鬼害難四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害鬼神以陰隱為想因以殺害為墮緣故菩薩於反聞時內滅妄想外除殺業全超鬼神心行以此全超威力能令稱名者免於鬼害矣五刀兵難五者熏聞成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無動搖熏聞者當反聞時則本覺真聞內熏妄聞也成聞者成純真聞性也六根銷復者一根反源六根解脫也同於聲聽者聲與聞性皆無形法不畏刀割者今六根銷復全身泯於無形同彼聲聽能度兵戈如光水者三昧威力使然也如有神通者自能輕舉亦能輕舉他人之身是也刀壞身不壞如孫敬德身同光水刃過無傷如六祖但六祖自證之力耳六鬼見難六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥叉羅剎鳩槃茶鬼及毗舍遮富單那等雖近其傍目不能視孤山曰藥叉如前肇師云有三種一在地二在虗空三在天羅剎云可畏鳩槃茶厭魅鬼毗舍遮噉精氣鬼富單那熱病鬼溫陵曰聞熏精明爍彼幽暗故不能視也首二句言反聞功極發本明曜圓照法界也次二句言鬼神陰隱想習向暗背明反不堪於光耀如梟鳥夜視晝盲羅剎向日不見是也威攝衆生意準前知下可類通七枷鎖難七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著首句塵泯也次句根泯也三句雙承普收離繫無羈也能令下準前知普門感應中前人持名脫枷鎖者非止一人也八賊盜難八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫滅音即脫聲塵圓聞即證極根性遍融一切也然滅塵則無復外敵圓性則咸使內融故遍生慈力者能令磣心毒人悉化慈悲眷屬矣法華云念彼觀音力咸即起慈心是也八難無畏已竟二三毒無畏問八難現是苦境可説怖畏三毒隨自心行何畏之有答八難畏其現是苦果三毒畏其必成苦因然須約信因果知怕懼者而言非約肆行無信之人而説也法華云若人多於淫欲常念恭敬觀世音菩薩即得離欲乃至嗔癡亦然是皆約於知畏求離之人不然何發常念之心乎就分為三一貪毒九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲反聞離塵逈脫於色而色豈能劫於家寶乎能令準前二嗔毒十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚音但詮於耳家所對之境未詮諸過塵則詮於染蔽二過故純音無塵謂音雖不壞而已離染蔽之過即心境一如也或音字是聞字之誤則其義可了根塵融為一法故無能對之根亦無所對之塵無對所對而能令脫瞋者以瞋生於敵對違拒也今無對所對故瞋恚無由起矣三癡毒十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗溫陵曰癡由妄塵所蔽無明所覆銷塵則無蔽旋明則無覆故外之法界內之身心凝瑩朗徹離癡暗矣具足見惑為昏具足思惑為鈍具足無明為性障阿顛迦此云無善心又癡之最重者也吳興曰準天台釋三毒通界內外內謂見思外謂無明二乘以欣涅槃為貪厭生死為瞋迷中道為癡菩薩廣求佛法訶惡二乘未了佛性皆是三毒此等深意備知而已未必是此處本旨正意惟依初標所釋三毒無畏已竟三二求無畏問求男女者有何所畏答畏其終不得也菩薩遂其所求即脫其不得之畏矣就分為二一求男十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男首二句銷妄入真而一真無際次二句稱體起用而萬用全彰真俗具足子道備矣能遍下詳其與佛為子之事也擕李曰涉入世間不壞世界即方便智方便屬權權能幹事故生於男也如淨名云方便以為父即其義焉溫陵曰供佛足福稟法足慧而能紹繼法王有男之道故能應其求也由福慧二足故能與福德智慧之男非無自而然也二求女十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女圓通二字雙貫次二句而二句又貫下二句蓋通有明義故明照圓有含義故含界明照故立鏡智含界故立空藏具其實智故能承順祕密蓋承順即坤儀柔德受領即閨門能事故能應求女也此惟首三句與溫陵相反餘皆取彼意而省其文也擕李曰立大圓鏡空如來藏即屬實智實智詣理理能含育故生於女也如淨名云智度菩薩母即其義焉二求無畏已竟四持名無畏問持名者何所畏而説無畏答持名者或恐其功德不勝而懷猶豫或遇持多名者而懼其不及皆畏相也今持菩薩名者逈脫此二畏矣又曲分為四科一合界菩薩功德十四者此三千大千世界百億日月現住世間諸法王子有六十二億恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同此字即獨指娑婆三千大千百億日月者初於四洲六欲覆以初禪一日一月為一小世界如是千界覆以二禪名一小千其中日月當各一千積數小千復至一千覆以三禪名曰中千其中日月亦各千千復數中千滿至一千覆以四禪名曰三千大千以其三次言千也其中日月故稱百億舉大數也世間不止人間亦兼天上言現住者隨類化身同居利物也六二恆沙聖人現量所知菩薩飾行度生有二種一者隨自實行二者隨他權行今修法二句即隨自所修實行也隨順二句即隨他所欲以利物權行也二一已圓通遍含由我所得圓通本根發妙耳門然後身心微妙含容周遍法界前阿難求説文云雖復悟知一六亡義然由未達圓通本根今菩薩自言由我所得圓通本根可見耳門之修克順機宜應求與説何待選知耶然謂之本根者明一方木利之根謂之妙門者備乎離深圓之三妙也應化無方身之微妙含容也智悲無盡心之微妙含容也彌滿十界依正具足萬聖法門所謂周遍法界也三一號功齊衆號能令衆生持我名號與彼共持六十二億恆河沙諸法王子二人福德正等無異四更出同功之由世尊我一名號與彼衆多名號無異由我修習得真圓通孤山曰法華亦有此之較量及觀今經方曉彼意蓋此方衆生耳根利故受道者多所以觀音化勝餘根鈍故受道者少所以諸聖化劣是知行位雖齊對機有異總彼恆河沙數但敵觀音一人故使持名二福正等據此所説已自密簡圓通為未曉者更俟文殊詳擇又其顯然自任惟我得真圓通可見餘聖所得非真文殊之簡不過重明此語而已條列無畏竟三結名顯益是名十四施無畏力福備衆生施無畏力者據後文云十方微塵國土皆名我施無畏者是也備全也福備衆生者言其非但脫彼怖畏兼復全其福德矣良以前十一科秪脫怖畏後三科兼全福德故云然也十四無畏已竟三四不思議分為二科一總承圓通世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德文中雖渾承圓覺而意實總承上寂滅現前上同下合所謂心佛衆生三無差別之圓通也然上皆標從三昧尚約因心此則標從修證無上道故已涉果地似是等覺境界故溫陵多約等覺釋之後當總辨然謂之不思議者讚美德相以下所列德相至妙不可思惟至神不可擬議也謂之無作妙德者檢非有為作意所成乃任運自在成就者也二分條別列就分為四一同體形呪不思議謂一身之中現多頭多目多臂而於多頭能説多呪不離一身故曰同體形呪此誠不可思議者也又三一由根不隔一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺初獲之初即初於聞中之初也妙妙聞心者良以反聞自性之時則反聞之聞即始覺自性之性即本覺始本合一二俱成妙故曰妙妙聞心也心精遺聞即聞所聞盡遺者脫也蓋反聞之久惟一心精脫盡根相故曰遺聞見聞二句即一根反源六根解脫不分隔者見聞等不各局於本根即六解一忘也末二句極言克復一真法界本妙之體也交徹互用曰圓融無障無礙曰清淨萬用具足曰寶覺此固寂滅現前兼明圓用含攝之意二一體多用故我能現衆多妙容能説無邊祕密神呪於一身而現衆多容於多容而説無邊呪是誠不思議矣三偏詳現形溫陵曰首為六用之總臂表提接之悲目表照了之智各以本數充之以至八萬四千者表依根本六用根本智悲而泛應塵勞得大自在此十一地等覺妙行也或曰八萬四千特表法耳一身何所施乎是特以有思惟心測度菩薩圓通境界也夫身含十虗毛端現剎彼空與剎又不啻如首臂而已彼八萬四千首臂猶人之八萬四千毛孔耳未足異也聖人之言即事即理既曰不思議德無以限意思之議之八萬四千既應塵勞之數亦應對治塵勞具足八萬四千陀羅尼門然此妙容初住即應能現或數之多少不等耳經謂帝釋亦能現千手眼而揆其本位當圓之三住意可類推分三一備彰多相又為三一多首其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首溫陵曰爍迦羅云堅固不壞也二多臂二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂溫陵曰母陀羅此云印各有妙印也三多目二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目猶云金剛眼睛照徹塵勞照明佛法用也二差別護生或慈或威或定或慧救護衆生得大自在慈歡喜相也威忿怒相也定澄斂相也慧開照相也首臂目皆具四種差別救護衆生者慈以護其善根威以救其惡性定以護其昏散慧以救其迷淪也得大自在者不勞作意施為隨感而應曾無滯礙矣形能如此呪可例知亦應具此四種救護矣二異體形呪不思議異體者鑒機當現何形則以現之對機既多則所現之形無數各為説呪不同前科但於一身現多相貌也問此與三十二應何別答三十二應或隨所求或應同類而與説法今此不拘類求但觀應以何形説呪救護即為現之此其別也分二一由聞脫塵二者由我聞思脫出六塵如聲度垣不能為礙聞即聞性思即入忘功夫動靜二相了然不生即脫出六塵下喻可知二令生脫畏又為三一各形各呪故我妙能現一一形誦一一呪現一一形對各機而各現身也誦一一呪者於各身而説各呪也正見異體各現矣二雙顯護生其形其呪能以無畏施諸衆生或現身脫其怖或説呪脫其怖也問此與十四無畏何別答十四無畏但令衆生稱名自脫未論現形説呪豈混同哉三結得名稱是故十方微塵國土皆名我為施無畏者無畏施名遍聞塵剎者見救苦之功特勝也三破慳感求不思議三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍溫陵曰本根清淨則一切無著故令衆生捨諸慳著也求我哀愍者哀愍受之而為施作佛事也衆生慳心最為難破捨心最為難發求心不可強致今所過即感衆生破慳捨施哀求是誠不思議威神所使然也孰知其洪源但猶所習耳根清淨無著故能類感如此然則希感應者豈可他求哉四供養佛生不思議分二一由得究竟四者我得佛心證於究竟我得佛心者妙契諸佛淨圓真心也證於究竟者已入妙莊嚴海無量佛法寶藏悉現在前矣二故廣供養妙莊嚴海既入佛法寶藏既開具無量福慧手中能出無量珍寶身心能運無量神通故能生佛等供財法無盡矣分為二一上供十方佛能以珍寶種種供養十方如來種種供佛如行願品衣鬘香燈擬妙高而同四海盡虗空而遍法界等也二傍及六道品又復分三一總標及生傍及法界六道衆生問六道並該三塗何亦言供答菩薩直觀衆生具有如來智慧德相悉皆生心如佛想也然則財施令其得樂無畏施令其離苦法施令其革凡成聖皆以等心至心悉作供養也二歷舉應求求妻得妻求子得子求三昧得三昧求長壽得長壽妻子長壽俱屬財施蓋國城妻子謂之外財長壽身命謂之內財三昧屬於法施且三昧所攝法廣羅漢菩薩一切境位皆是長壽不止人間壽考仙天長報皆能應其求而與之三超至究竟如是乃至求大涅槃得大涅槃乃至二字超上財法二施中不能備舉者皆在其中財施如官位金銀等法施如一果二果乃至三賢十聖等皆是也大涅槃是佛究竟極果亦含況辭如云如來至尊極果尚與成就何況世財及與小果但辦誠求無不響應也通前論之夫圓人雖其發心究竟二無有別而前後德相神化不無優劣文中似可別焉寂滅現前上同下合似在初住三十二應親勞現身説法且所被之機皆知希求厭離上善易化之境似是三賢功能十四無畏但以名號威神能救下凡苦難而一名力敵多名似是十地神用四不思議中前三似是等覺德相第四自稱佛心究竟倣佛妙覺證極矣請研斯文不無據焉問初住圓通何濫深位乃至妙覺答圓人一地具四十二地功德無遺矣但化境廣狹所謂具體而微耳初住既爾位位皆然又此三科文雖廣博大約不出三施三十二應法施也十四無畏無畏施也四不思議二施兼財施也所謂檀含萬行信然陳白之言已竟三結答圓通分三一正結圓通佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩地成就菩提斯為第一我從下全彰圓通體用圓照三昧者反聞功成解根得體即寂滅現前也緣心自在者依溫陵作隨緣應化心得自在即應等三科也因入下具述始終因果因入流相得三摩地者最初反聞住圓湛不生滅性為因地心也成就菩提者然後圓成果地修證也末句結其殊勝也詳夫諸聖皆稱第一各尊所得耳非真第一也斯則對機真實文殊所謂圓通超餘者觀世音為最是乃真實第一也二兼明授記世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號彼佛如來即觀音如來夫歎善得而記同名者嘉其師資道合也且是因記而非果記應在初住始證之時若入地上乃至等覺當授果記而出佛名矣吳興曰按觀音三昧經及大悲經並云此菩薩過去久已成佛號正法明又悲華經説往昔寶藏如來授不瞬太子記名觀世音然則悲華與今經皆覆本垂迹之名耳今得圓通即太子後身也既示在因位則亦不妨歷示次第修證矣三更述名稱由我觀聽十方圓明故觀音名遍十方界此之更述名稱者一表人法同名無有二號見名實恰相孚也二表圓通周遍故感名稱周遍顯法門殊勝也大衆各説已竟三佛現瑞應蓋衆聖各述圓通則華屋諸門悉啓故佛復以瑞應之是諸聖以言顯而如來以相顯欲衆生承言玩相而發悟也分三一彰圓通總相夫圓通之理自他交徹豈惟果中如是雖因中亦然故今以諸佛表果諸聖表因光明互相灌注顯自他因果交徹也然雖普應諸聖其實交徹等妙耳根獨顯誠能諦觀聞根圓妙誰不本來交徹信乎因果一如也又分為二一以自徹他因果瑞爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂五體同放寶光表全身吐露也灌諸佛者以自果徹他果也灌列聖者以自因徹他因也然惟灌頂者表此圓通之理最為殊勝無上之法矣二以他徹自因果瑞彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢番他徹自其意可知也二顯圓通別相分四一聲色微妙瑞林木池沼皆演法音交光相羅如寶絲網溫陵曰圓通既現前則一切聲是佛聲一切色是佛色無非悟入之處無非圓通之理也二悟證相應瑞是諸大衆得未曾有一切普獲金剛三昧上二句歡喜即是悟意良以前既聞言今復見相言相互顯故極喜而徹悟也下二句即所證也無復生滅者可喻金剛今圓通之性現前即圓湛不生滅性猶如金剛不可破壞住持是性者故曰金剛三昧與所悟者相應不背也三行智妙嚴瑞即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色華分品色所以表行寶具光明所以表智今首四句萬行紛敷之瑞也末二句諸智妙嚴之瑞也四相性融一瑞此娑婆界大地山河俱時不現唯見十方微塵國土合成一界上三句表萬相俱融也下三句表一性究竟也三示圓通法樂梵唄詠歌自然敷奏此科固表衆生必獲圓通法樂然須總躡上之別相蓋初解聲色全心次方悟證因地次又真修行智末乃究竟果海故慶衆生必獲全益而梵唄敷奏極表法樂無窮也佛敕諸聖各説一科已竟二佛敕文殊揀選特命文殊有二意一本寂場之大智諸會之法眼二與觀音同證故擇妙門有專囑焉然所以必擇者亦具二意一者佛前雖令一門深入而竟未説出何門況今諸門並陳理宜決定一門縱使前文微露終非顯説今須決擇以分明指出耳根也二者列聖所以不對根智觀音所以曲合機宜非此一擇不能備彰無非欲令當機且擲諸門而獨取耳門分二一如來敕選又二一先示諸説平等又三一令觀能説諸聖於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢菩薩稱無學者以圓人修同無修説現於前先標數後分類耳二次示所説圓通各説最初成道方便皆言修習真實圓通各宗所修所證均稱方便真實耳三正明平等無別彼等修行實無優劣前後差別無優劣差別有二解一者若但約所至圓通無二則似所入之門不無巧拙遲速之不同但至處則齊耳是千徑九逵王城不二之意二者若詳佛語意既言彼等修行實無優劣等則似特表其所修之門亦各平等也依此則更有多意一者諸聖遠因散在十方各就方宜根隨方利何非妙門二者各有多生熟習順其種性何不易入三者各有多分煩惱對治所宜如藥投病自收捷效且因藥妙兼又登仙若復加佛威神即事捨於塵勞頭頭皆妙修矣所以諸聖之修實無差別也觀此佛尚不許修行有優劣豈許圓通有差別是則諸聖同一圓乘無疑矣而嶽師不能忘其小迹橫生執著故前卷與此科所注不顧佛旨務成己説公抗佛言此非小失不思楞嚴會上正以斥抑權小洪樹圓乘若實二乘豈敢參預普賢觀音等同述圓通特以諸聖從佛示生迹當類小而法華顯後本迹已明何須堅執乎二後出揀選本意既云平等何須又揀然有深意此中出之又為三一欲契對當機我今欲令阿難開悟二十五行誰當其根當根即對機也證處固皆平等而從入之門豈盡對此方之機耶豈盡可以常修學耶然對機常修但取於一門而已故不可不揀以令阿難專取也二欲垂範未來兼我滅後此界衆生入菩薩乘求無上道滅後衆生即我輩也菩薩乘真因也無上道極果也三問何門易成何方便門得易成就不對機則難對機則易故此結詰對機之門也詰即令選擇之意二文殊偈對分二一敘儀標偈文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神説偈對佛此之頂禮固尊師命言之常儀然亦即求加被故下明乘威神也是雖果後大人而順儀彰軌如此足警我慢流也二詳演偈文分六一發源開選又三一雙示二源又二一所依真源覺海性澄圓圓澄覺元妙覺海性者以覺海二字彰性之體量也蓋性以知覺為體以深廣為量故云覺海性也覺海二字有二釋一者作法喻雙彰顯本覺深廣即吳興所謂真覺之性譬如大海是也二者直稱覺性為海非是取喻水海蓋凡具深廣之量者皆稱為海如華嚴所謂剎海劫海等是也若必喻水海猶墮不齊之過以覺海橫無邊而竪無底非若水海尚有邊底也後説為優澄圓二字直説覺海義相莫依吳興説海澄圓轉喻寂照殊不順暢澄即是寂謂澄停湛寂無諸起滅也圓即是照謂圓融洞鑑無諸偏蔽也次句首三字牒承上文末二字明本來圓通也元即本也妙即圓通妙用也圓滿而本無虧缺通融而本無乖背耳大抵覺海指體言倣佛標體大也澄圓指相言倣佛標相大也元妙指用言倣佛標用大也此三大為諸妄所依故科云所依真源矣二能依妄源元明照生所所立照性亡真際曰於彼元明性上妄生照用而形所相有相當情無相即隱故照性亡元明性上妄生照用者即經前所謂性覺必明妄為明覺而形所相者即覺非所明因明立所也有相當情無相即隱者如雲起必障於日也首句似永嘉所謂倘顧還成能所末句似後知若生時前知早已滅也問所既妄立何不生汝妄能答凡經一重惑起有二功能一能隱覆二能生起今偈正表隱覆而前經乃明生起二義具有前後互影而互出耳然大意略同永嘉以此推原無始雖不全而永嘉所説禪心而意旨遙契故可類通之亦以見祖意與修多羅合也又此二照字前生後滅俱屬於妄不可謂後照為真亦如永嘉云二知既不並但得前知滅滅處為知境能所俱非真也又此生滅依前真起為萬法本故科妄源二略彰生滅此萬法粗生滅非前無明細生滅也躡上真妄和合遂談萬相森然具矣分二一萬法生起迷妄有虗空依空立世界想澄成國土知覺乃衆生首句即經前所謂晦昧為空也親依無明虗空先現耳次句即空晦暗中結暗為色也三句即溫陵所謂妄想凝結成無情國土也四句即彼謂妄識知覺成有情衆生也上二句空界顯彰下二句依正成就耳二萬法還滅問方彰生起何以遽談還滅答還滅即是歸元今選根深入正謀歸元之路故備彰生起之虗還滅之易以發其端分二一先彰劣妄空生大覺中如海一漚發有漏微塵國皆依空所生大而無外容盡塵剎而綽然有餘本非微劣而以大覺較之更大無量如海中一漚而虗空遂成至微劣矣有漏依吳興兼於有情是也此更言有漏塵剎尚依空生不出空外益見其微劣而虗妄矣二後明頓滅漚滅空本無況復諸三有長水曰漚滅下如云一人發真歸元十方虗空悉皆消殞等此處用三有即塵剎之三界謂欲有色有無色有也妙理無端妄成三界如水結冰物而不化故稱為有又取中九有更開二十五有依吳興雙含情器是也空漚於大覺海中本無而妄有故滅而復歸於本無至於三有又依空同體安危事一故包界外之虗空尚歸本無況空中之三有而豈不隨之頓滅耶意表由至虗故可速滅向使非虗豈能強滅乎三正明須選上言萬法可以還滅已引歸元之路故此科出歸元當選之由也分二一諸門平等歸元性無二方便有多門聖性無不通順逆皆方便首二句雙標一多初句明理惟是一次句明門乃多張如京畿是一入路多岐也末二句但出多門之由問理既是一門何故多答由聖性普融旁通萬法如天子宅中衢通萬國也故二十五門或順入或逆入無非入理方便如千徑九逵皆達帝京也孤山曰觀音耳根則順餘聖諸根則逆蓋對此方之機説也此説順逆二字如云順此方之機為順逆此方之機為逆也豫謂順塵識流宛轉達道曰順入即六塵六識火大乃至識大圓通也如順背京之路繞遠方到者也逆根性之外流而旋反入性曰逆入即六根及根大圓通也如逆背京之路回身即到者也請觀諸根圓通俱有旋反字面可見矣二須選當根初心入三昧遲速不同倫初入即最初方便三昧即各門正定也遲速不同者依前孤山則觀音順速而餘聖逆遲依後説則順流者遲逆流者速經云圓根與不圓根日劫相倍則可見惟是耳根於諸根中又其最速者然此二句正見須選故最初應有難云既皆方便是即平等何必又選答其奈對此方之機有當不當當則甚速不當甚遲豈可不選擇哉如趨京之路迂直千差豈皆捷徑亦不可不擇路而趨矣發源開選已竟二了揀諸門意在令捨也分四一揀六塵塵是無情於心最疏而又具障蔽染污二義疏則難轉蔽則難圓染則難通故並揀去而不用也就分為六一色塵不徹色想結成塵精了不能徹如何不明徹於是獲圓通首句言色憑妄想結為障蔽之塵次句言此色若以心精了之終不透徹良以色體元本結暗所成初心豈能了之使徹末二句牒結初心決不依之得圓通也二聲塵言偏音聲雜語言但伊名句味一非含一切云何獲圓通音聲即徑直聲語言即屈曲聲次二句偏説屈曲良以陳如從四諦入偏取屈曲故也伊者彼也一字直目為名詮自性也二字帶表為句詮差別也味即所含義理言音聲既落語言惟以取彼名句之味且此理圓言偏初心豈達一言遍該一切義理故依之恐其難取圓通矣三香塵不恆香以合中知離則元無有不恆其所覺云何獲圓通初心凡夫必待煙合於鼻方以覺香離則無復香相是香非常住不能令覺常恆覺不恆則香亦非恆豈能於香而得圓通哉四味塵不一味性非本然要以味時有其性不恆一云何獲圓通此與下之觸塵但變文耳而意皆同於香塵以三皆同屬合中知也本然即常然也次句言須待舌嘗味時方覺有味塵也末二句全同上科五觸塵不定觸以所觸明無所不明觸合離性非定云何獲圓通觸無自相雙依能所內依身根為能觸外依色塵為所觸中間方顯觸相今言以觸明者要待所觸之塵合於身時而觸相方明也末二句同上科六法塵不遍法稱為內塵憑塵必有所能所非遍涉云何獲圓通法塵非外五塵之實質乃五塵影子惟意中獨緣屬獨影境故曰內塵必有所者言必專一處也蓋意無有二起意緣時但專一境捨一緣一始終惟一能所皆局豈能遍涉不遍故初心難入圓通也揀六塵已竟二揀五根留取耳根故惟揀五問根能旋反轉之即性何亦揀之答根雖總皆近性勝彼塵識然六中圓缺不齊前文云圓根與不圓根日劫相倍今正揀去合者淺者與不圓者耳意令惟取耳根而已就分五一眼根不圓見性雖洞然明前不明後四維虧一半云何獲圓通洞然者明朗照了之意雖之一字縱許之辭次句奪其不圓也三句詳示不圓之數語略而忽四維四隅也必兼四方而但言四維者語之略也且千二功德四方八百四維四百今止缺後方及兩隅之四百是缺三分之一耳而言虧一半者語之忽也若實一半當惟六百學者善會其意可也虧缺難圓意則易知矣二鼻根缺中鼻息出入通現前無交氣支離匪涉入云何獲圓通鼻之功德出息入息及與中間各分四百今缺中間四百而已交氣即中間也支離者不相接續之意蓋出息盡而不能即入必少間斷而後方入入息亦然此即支離處也良以出息取香入息聞香此支離處全無功能故非圓滿匪者不也涉者交也入即鼻入也言若此間斷不交之入豈能速得圓通乎此與上科揀去不圓之根也三舌根不常舌非入無端因味生覺了味亡了無有云何獲圓通吳興曰首句語倒應是舌入非無端耳溫陵曰舌不因味而即能覺了乃為無端今者不然故曰非無端也末三句言其無離味之恆覺故難入圓通問耳離聲而聞靜説為常性何不舌離味而嘗淡亦説為常耶答耳為離知恆常普遍離聲聞靜更比聲圓人所易曉經云動若邇遙靜無邊際是也今舌根覺味之知不過三寸合知尚劣而離知淡相更為眇昧豈能同耳之常性彰顯乎故不例難也四身根不會身與所觸同各非圓覺觀涯量不冥會云何獲圓通首二句例前觸塵明其同是不圓之門也此所觸二字直指前之觸塵而言意謂前之觸塵我已揀其不圓今此身根亦全與彼觸塵同也此句標定次句申其相同之故圓覺觀者以圓之一字雙貫覺觀二字圓覺者獨立之全體也圓觀者絶待之全智也此身根與前觸塵各非此二者良以合中之知根塵相待而顯故前之觸塵離此身根其相即隱固無獨立之全體與夫絶待之全智也而此身根離前觸塵其知亦泯亦無獨立絶待全體全智也豈能圓覺觀乎大抵此二句總明須合而後有知也涯量猶言邊際也即身邊際與觸邊際也冥暗也會知也不冥會者言不能於遠離之時暗中有知如彼耳之於聲也此句是言離中無知也末句結非圓通總承合有離無故明難獲圓通矣此與上科揀去合知而淺之根也五意根雜念知根雜亂思湛了終無見想念不可脫云何獲圓通此文易了大抵此約初心凡夫欲依此意根求圓通者而斷其難獲也亂思即意識也諸識中惟意識最亂最為剛強難於制伏恆雜意中故湛了者即脫盡意識湛然了知之境也而言終無見者如非非想天入非非定研窮求其湛了終不可得報盡從墜是也末二句結非圓通蓋言圓通本是無分別定之勝果今想念不脫豈能得此果哉此科揀去非純離之根也揀五根已竟三揀六識此經首即斥破六處識心是為生死根本不可依之錯亂修習而諸聖自陳仍備此六門者見聖性無不通也文殊復揀去者仍順此經遮止誤用也若初心用此以求圓通則不成無上菩提乃至別成聲聞魔外者極多如六聖得正圓通者極少所以須揀去也就分為六一眼識無定識見雜三和詰本稱非相自體先無定云何獲圓通擕李曰論云二和生識謂根境和合識生其中今言三和者能所合説也識見二字亦似語倒應云見識即眼識也乃眼家隨念分別外對無情之色塵內依無分別之眼根而中間詐現隨念粗略分別是為眼識能依自體并所依根塵故曰雜三和也溫陵曰三者和合窮之本自無體故曰非相也末二句躡上結歸無定亦無定實之自體而已二耳識非初心聞洞十方生於大因力初心不能入云何獲圓通溫陵曰普賢用心聞故能知他方沙界外事此由修法界行大因所生非初心能入也由大因威力致耳識洞聞沙界非耳識自妙能順初心成此妙果故曰初心不能入也三鼻識有住鼻想本權機只令攝心住住成心所住云何獲圓通溫陵曰孫陀散亂佛欲攝住其心令觀鼻端此特權機而已蓋真心無住有住則妄矣鼻想者於鼻端作觀白之想也本權機者本為對治而權假設想非鼻識本有也以鼻識分別香臭為用非關端白故也次句明本意只為攝住散亂而已三句明不圓之故住則偏局一處何由而圓乎四舌識有漏説法弄音文開悟先成者名句非無漏云何獲圓通首句言説法雖由舌識然不免雜以音聲文字故曰弄音文也而能開悟成自果但由先世所成曠久辨才之力故得如此非彼一時舌識所能且名句乃不相應行有為所攝非無漏法豈以舌識參雜於此而成圓通乎五身識不遍持犯但束身非身無所束元非遍一切云何獲圓通吳興曰問波離執身次第執心俱得通利今何但云束身而已答聲聞執心亦防六聚七支之非況今言身識在其中矣此偈正揀身識其言束身正謂束於身識非謂身根而言識在其中者嶽師之混淆多此類也且觀下元非遍一切之句則知但束之語非惟只表遺心蓋表所遺者更多良以圓通之境當遍融身界萬法今但束身識局於身心無普融觀智豈得圓通乎六意識緣物神通本宿因何闕法分別念緣非離物云何獲圓通吳興曰目連神通由宿習所得雖云旋湛心光發宣非關於法分別而現又小乘神通皆是作意緣物則有離物則無法分別三字即意識別名蓋意識是法塵上分別性故也此句已明目連神變圓通元與意識無干次句又言縱由意識亦是緣塵而非離塵普遍之法亦難獲圓通矣物即塵也通觀揀識之文多明六聖所證各皆別有資藉非真由彼識心能至圓通也揀六識已竟四揀七大七大之中前五同塵第六同識第七同根比前但加廣大之相而揀意大同前也就分為七科一地大非通若以地性觀堅礙非通達有為非聖性云何獲圓通溫陵曰持地平填尚涉有為非實聖性遇佛平心方歸聖性而初心全涉有為故難獲圓通似為易見二水大非真若以水性觀想念非真實如如非覺觀云何獲圓通溫陵曰月光水觀未離想念難契如如蓋如如之理非覺觀之法故也如如者即圓通真實之體乃離念不動之法凡起心分別覺觀皆不相應反顯旋聞不屬覺觀明矣而強安三觀者尚當尋繹於此可也三火大非初若以火性觀厭有非真離非初心方便云何獲圓通身心俱斷斷性亦無方為真離今存厭斷故非真也又厭欲假説非真實本有之法也三句言非初心一定方便以初心不皆多欲而少欲無欲衆生何用於此而入圓通乎四風大有對若以風性觀動寂非無對對非無上覺云何獲圓通動寂有對則一動一寂便屬循還生滅無常之法故非無上覺體問反聞法門亦從動靜而入何殊於此答彼乃漸脫動靜二塵以取無動靜之聞性為初心方便此即取有動寂之風性為入門所以大不同也豈可以此難彼五空大非覺若以空性觀昏鈍先非覺無覺異菩提云何獲圓通溫陵曰晦昧為空故曰昏鈍此是窮源之解若就現相昏即冥也鈍即頑也虗空本以冥頑無所知覺為相菩提乃覺性智體明靈為相正與昏鈍相反就昏鈍處而取明靈之果如鑽冰取火固應難也世有尊太虗空為本性者當悟此矣六識大虗妄若以識性觀觀識非常住存心乃虗妄云何獲圓通溫陵曰彌勒惟修識觀而所觀之識念念生滅存心觀之已妄況獲圓通耶首句言發心即研窮識性以為入門也次句言能觀之觀心與所觀之識性二俱念念遷流悉不能住也愚意初心縱猛必墮識無邊處等定而已三句研窮之極縱有存住之心如説二乘所住涅槃但是識陰境界猶如湛流望如恬靜而實不住故曰乃虗妄也初心豈能依之頓入圓通乎七根大殊感諸行是無常念性元生滅因果今殊感云何獲圓通首句言凡有運動遷流皆屬行陰皆墮無常今勢至雖曰都攝六根而主於靜念相繼既曰淨念終成有念既曰相繼難免生滅故曰念性元生滅也三句言以此為因往生見佛則因果相應無有不可若以此生滅之因而求現證不生滅之圓通則因果不類決難得也通論二十四聖約其所證必等觀音而原其入門不從本根略有四緣所以當揀一者不對方宜二者不便初心三者別有資籍四者非常修學反顯耳根對方宜便初心不勞資籍通常可修也意在後偈預此明之至文再詳了揀諸門已竟三獨選耳根分二一備彰門妙此中所具四科一三四中正以番前四緣中三緣惟非常修學更在後文至文更指分四一隨方定門我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入此科顯其正對方宜番前不對方宜也蓋諸教體如來必隨一方機宜而立若教不投機化應不勝也溫陵曰聖人設教隨方不同或有佛土以佛光明而作佛事或有佛土以佛菩提樹而作佛事乃至或以園林臺觀或以虗空或以寂無説示如香積佛國無文字説但以衆香令諸天人得入律行而此方教體必藉音聞欲取正定必由聞入者各隨機緣故也此方二句意言此方衆生耳根偏利能由聞性遍達無量差別理事故佛對此一方機宜而以音聲施作佛事所以逗彼聞根之利也是則合音與聞乃為此方真清淨教體矣是雖常途惟取音聲為教似不兼聞而不知離彼聽者聞根則音聲泯然無托教體奚得而存耶末二句言教體既在音聞而欲入正定者豈可捨教體而別取哉故應惟從耳根聞性而入也良以聲教但為弄引聞性實為妙心故領悟雖以雙托音聞而修定但宜單取聞性故曰實以聞中入也是則從説選根以來直至此處惟此一句方以決定分明指出耳根為圓通本根至妙之法門矣又説音聞先即不平意言常途但以音聲為教體是隨相假體而非真實教體不知此方真實教體清淨本然周遍法界者不在於音而惟在聽音之聞性耳良以教詮藏性而聞性最近藏性故也末二句承之遂言以是義故大定惟從聞入似為簡直而順且更見音聲但為教體而聞性方為真教體智者詳之二讚人殊勝此科固是欲令欽人則必珍重其法亦是激勸羡果人者勉從其因行也分為二一略讚自利離苦得解脫良哉觀世音此科先讚能以聞性自利正嘆次第解結及標列二本科見利他之洪源若自利未勝安能利他離苦者離分段變易二種生死苦也即解結中人法俱空力也得解脫者得離繫自在二種解脫樂也然離繫即忽然超越世出世間自在即所獲二種殊勝且言自備利他體用故判屬自利也良善也良哉者讚其善能究竟自利亦讚善得圓通妙門獨超諸門矣二廣讚利他分四一總明常遍於恆沙劫中入微塵佛國劫數恆沙則時為極長顯常也國數微塵則處為極廣顯遍也此則方標常遍而利生之意尚在下科二自在護生得大自在力無畏施衆生二句嘆盡三科文義該攝絶妙一者兩句分嘆前二科以上句嘆三十二應隨緣自在説法以下句嘆十四無畏循聲救苦衆生二者兩句總嘆後一科以四不思議中明言救護衆生得大自在則上句正以嘆之又復明言其形其呪無畏施生則下句正以嘆之又且連上二句貫成四句則見此等妙用皆極沙劫之常皆盡塵剎之遍誠為巧妙若依舊注前兩句嘆首科不惟強添説法而又何獨遍常後兩句嘆後二科不惟偏缺遍常而又顛倒失次智者詳之三音備衆美妙音觀世音梵音海潮音溫陵曰以説法不滯為妙音尋聲救苦為觀音音性無著為梵音應不失時為潮音詳夫菩薩忘音塵而修聞性及至稱名嘆德乃獨取音而不取聞何也正表圓人不壞法相而初心忘塵但圖解根而已圓通之後一切妙用全在於音也豈如灰斷之果永壞無用也耶故今三十二應中之説法四不思議中之説呪皆妙音之力也十四無畏中之救八難四不思議中之施無畏皆觀世音之力也由法華以觀其音聲皆得解脫釋觀世音名故偏屬救苦矣十四無畏中之除三毒四不思議中之破慳吝皆梵音之力也以彼科明言修習清淨本根故屬梵音矣三十二應中之赴遍求十四無畏中之赴二求四不思議中之赴廣求皆能應不失時潮音之力也然此獨缺法華中勝彼世間音故致十四無畏中持名一科無所收屬以彼一名獨當一切菩薩之名正屬勝彼世間音也然就今經文收八妙音中亦稍為通以一名而頓含衆名功德亦甚為妙也四恩沾凡聖救世悉安寧出世獲常住上句恩沾於凡救世謂拔諸苦安寧謂與諸樂蓋既言救世則且指世間凡夫蒙益也下句恩沾於聖出世則先以革凡常住則究竟成聖然功迹亦不出於應等三科其意易見不必分屬也讚人殊勝已竟三示法真實此科見耳根元自真實決定速至圓通不勞資藉別因正番前別有資藉之緣耳分二一標啓佛述説我今啓如來如觀音所説上句啓佛啓即告也下句述説但述所説耳根而已非三真實俱出觀音自説也良以下三科乃是文殊取四卷末六根數量并擊鐘驗常等科中佛説語意而加發揮見耳門之本妙也二列三種真實就分三一圓真實譬如人靜居十方俱擊鼓十處一時聞此則圓真實此科取六根隨方數量中如耳周聽十方無遺之意而設言以發揮其圓也事出假設故言譬如而聞即實法故非譬喻也靜居檢非多事牽擾心時若當擾時則聞雖常圓殊不覺知十方俱擊鼓者一時同擊也十處一時聞者聞無先後也此見耳根聞性人人本來自圓喻如最大圓珠懸於空中周輝普照諸聲如影亂映齊現絲毫不昧故曰圓真實矣二通真實此科是文殊更加自意以發揮其通也又二一揀他非通目非觀障外口鼻亦復然身以合方知心念紛無緒孤山曰口鼻身俱合中知若將身以合方知句俱口鼻上其義方順蓋語倒耳斯言最是決倒無疑解者即當順序依此而解之目非觀障外者如隔窗紙不見外事隔皮膚不見臟腑是近而薄者尚成障隔況遠厚乎身以合方知口鼻亦復然者言三根略離尺寸了無覺知也心念紛無緒者明意根中常纏意識不能靜照也此歷言五根俱無現具靈通矣二顯自為通隔垣聽音響遐邇俱可聞五根所不齊是則通真實此科隨言耳根現具靈通隔垣聽音響者如隔垣墻聞砧杵語言悉不隔礙而顛倒之人但謂聲能透入而不知乃是聞性湛然四通八達無所隔礙也壇壁尚不能隔況紙膚乎遐邇二皆得聞者皆顯離中有知也遐邇俱聞何況尺寸之離乎五根所不齊者隔垣聽響眼根所不能齊遐邇俱聞則身口鼻所不能齊惟意不齊無文可據應是耳識易排以其力弱非強不障耳門之靜照非同意識之無緒故意根亦所不能齊也更當知同為根者尚不能齊何況塵識諸大非根之類者豈能齊哉此見聞性人人本來自通喻如洪水普為淹沒草舍竹籬悉皆通透一無隔礙故曰通真實矣此喻與上珠喻可與靜察聞性之體相者助一發明矣問遐邇俱可聞恐非極成之語今現見人之聞量不能遐遠大聲不過百里小聲限於數步何況寰中界外決不及聞若是則但能聞邇那云遐邇俱聞耶答但言遐不云極遐即是耳根現量可及之遐非謂越界極遐之聲也如汝所言百里數步豈非耳根現量中之遐邇乎經意正取於此數步百里之離知勝彼三根但能合覺而於離中雖尺寸亦不能知也然此亦但約於未解之前現具之通故不及於極遐若既解之後聚聞已開方能周聞界外所以須解若本通即周沙界何勞復解乎何況今耳但是聞動不及至遐而聞靜亦無邊際經云動若邇遙靜無邊際是也遐邇俱聞之語何可輒起疑難之哉三常真實此中全取擊鐘驗常科中佛所説義也分二一對塵顯常對聲塵顯聞性常也又二一動靜無關音聲性動靜聞中為有無無聲號無聞非實聞無性音聲是總相動靜是別相謂音聲正起為動音聲滅盡為靜惟一音聲雙含動靜故曰音聲性動靜也聞中為有無者言動靜二相常於聞性湛然體中循還伏謝動則音聲歷然現有靜則音聲寂然向無無聲號無聞者言世人顛倒於無聲而妄説無聞也末句言據理而論自是聲無非是聞性無也二生滅雙離聲無既無滅聲有亦非生生滅二圓離是則常真實首句躡上科末句而牒聞性既不隨聲無而滅次句形對推知豈隨聲有而方生乎是則聞性湛然常住一任其中聲有則聞動聲無則聞靜而自體了無生滅之可見故曰生滅二圓離也末句結常真實以見聞性人人本來自常喻如虗空恆無起滅此句結意應在後科之未方成總結今隨文便寄結於此耳二離思顯常縱令在夢想不為不思無覺觀出思惟身心不能及夢想者以夢是第六獨頭意識所現故今言夢帶想正表夢是意識所為也不為不思無者言夢中雙以忘盡夢外動靜而了無所思似聞性暫成斷滅也今則尚聞杵音而惑杵為鐘是可見不為不思而遂成滅矣上覺即聞性本體下觀指聞性照用寤寐恆一不假思惟出思惟外也所以前揀月光如如非覺觀者正為彼是思惟覺觀故也可以反顯此出思惟之覺觀却是真如如體矣末句全同五根所不齊也身兼外四根心是內之意根爾色香味不能通於夢中觸雖可通而離亦不能至於意之緣法又已忘盡是可見五根皆不能接夢外之五塵而有覺也惟獨耳根能覺夢外之聲所以聲塵得通夢中一呼便覺超彼身心皆不及也前經佛於引夢之後遂表形銷命謝聞性決無間斷豈非決其為常真實乎凡此三種真實皆表人人現具未經解結修治已即有圓通常之三相若就此更以修證究竟圓通真同為高因於丘陵為下因於川澤必至易而至速也示法真實已竟四顯行當根此科番上不便初心明耳根最便於初心然既便於初心即可通常普修已該四義但文不甚顯故第四義屬下分三一舉此方教體今此娑婆國聲論得宣明娑婆此云堪忍以此界衆苦難忍惟具忍力者堪住故又具足苦境堪可成就行人忍力故然此一句據文但是指處約意仍有含蓄謂含蓄此方衆生耳根偏利之意以此方衆生能從耳根了別世出世法深細之意次句得字方有來歷正言佛對此方偏利之根立諸聲名句文一切經論甚深法義以對機故方得宣暢發明也然此句據文亦但説聲論得明就中亦有含蓄謂含蓄所宣明者無非皆為詮顯圓湛妙明之性而此妙性又秪在於能聞本根之中衆生當可由所聞聲論而反聞能聞之本根方為得旨矣若是則下科失旨之意自有來歷矣二明病在循聲又二一泛論失旨衆生迷本聞循聲故流轉此衆生非是普指異生但指狂慧學者而言意言此方耳根既利而如來聲論又明宜乎凡被聲教者皆當免於流轉而間有不免者正因不能由教而開悟能聞之本聞是為妙明心性而但循所聞聲教資益戲論故徒聞聲教而亦不免於流轉也二剋指證驗阿難縱強記不免落邪思對前泛論剋指一人所以登驗迷本聞而但循聲教者必不免於流轉也強記即多聞憶持也邪思即為物所轉逐邪境而被物牽去不自由也意言衆生若迷本聞非但少循聲教者不免流轉雖強記如阿難亦所不免也戒務多聞者甚不可迷本聞而但循聲教三顯應病與藥豈非隨所淪旋流獲無妄豈非二字承上決定之辭下八字病藥相當敵體對治也隨即循也所即聲塵淪即流轉也隨所淪者言循聲必流轉也旋流即返聞也無妄即真實常住不流轉之性也旋流獲無妄者意言既知循聲順流而不免流轉當知反聞旋流而必至無妄其與此方機根為病相投一切初心無不可用也故科顯行當根備彰門妙已竟二委示修巧法門空妙而修時不巧亦不足選也具簡要易速四義者為巧簡則不煩要則該總易則無難速則不鈍下文具有此相至則指之分三一出名教以反聞三一囑專聽而出名阿難汝諦聽我乘佛威力宣説金剛王如幻不思議佛母真三昧囑專聽而表乘威以見法非易説遭遇非常切宜鄭重金剛王同前五卷中五章殊勝文也彼有寶覺二字今含在三字中蓋聞根中不生滅性雙含理智是實相觀照二種般若同於金剛堅利體不可壞而能壞一切無明堅體故云爾也由圓乘方便巧立能所無修之修故曰如幻不思議者速疾超乎世出世間之意以前偈云如幻三摩提彈指超無學故知然也佛母者以前後偈皆云是諸佛一路涅槃之門可見出生諸佛故稱佛母也真三昧者言是自性正定非同引起諸三昧境故曰真也即此出名中簡等四義分明可見詳之二抑多聞而顯過汝聞微塵佛一切祕密門欲漏不先除蓄聞成過誤將以激其反聞先須出其不反聞之大錯也上二句顯其極為多聞蓋無數生中受持諸佛深法也欲漏不先除者蓋惟務多聞不修無漏勝業故欲漏深重種習未盡其餘諸漏未盡可知畜聞成過誤者言徒積多聞殊不得力而竟成墮淫之過誤也三決取捨而反聞將聞持佛佛何不自聞聞孤山曰謂將汝循聲之妄聞以持諸佛之言教何不反聞自性以求解脫乎上聞能聞之智下聞所觀之理上佛字即佛身下佛字即佛法上聞字即聞根下聞字即聞性而將聞之聞亦即指於具妙性之聞根也正言衆生不達本聞即是妙性無勞外求却乃日用不知反將本聞貪教不返惟希小利譬如以金碗乞食不知碗自可富於食也故敵體以警之曰汝將本聞妙性不自覺知但務受持諸佛佛法何不識取本聞而旋倒聞根以聞聞性乎良以佛教本欲人之修性今遺性而獨馳於教亦非教之本意故也此科方是教導反聞之正文也觀此但聞一聞性便勝無量多聞亦見其至簡而最要矣二法喻詳明修證上方舉妙門之勝名述不修之大錯以警其當修反聞而已而尚未言如何修如何證故此科詳之分三一法説又為二一歷示次第超越四卷末云由此無始衆生世界生纏縛故於器世界不能超越故下分科文義出彼而科名亦取彼也超越即解脫之意爾就分為二科一情界脫纏又二一脫塵盡根聞非自然生因聲有名字旋聞與聲脫能脫欲誰名此聞字正指所結之根非自然生者言其非是無故而有此結相也因聲有名字者言其正因聲塵當情而迷中以聞性攬塵斯結遂成根相即聽精映聲卷聲成根也從無始來遂有此耳根之名即根元目為清淨四大因名耳體也聚聞結滯無復解脫之相矣旋聞與聲脫者即入流亡所乃至動靜不生也蓋言既因攬聲而結須待脫聲而解故首須旋倒聞根反聞自性以求與聲脫也能脫即聞根也元因旋根而塵自脫故能脫即指聞根而已欲誰名者言塵已脫而根隨盡遂失前耳根之名惟一妙性而已然此二句即當如是漸增聞所聞盡也四句喻如水本因寒而結冰故冰須脫寒而還水矣二入一解六一根既返源六根成解脫此恐人疑但解一根餘根尚結不知根相雖六性體惟一本以一性而頓結六根所謂一結一切結也故解一根性而餘隨性脫所謂一解一切解也譬如片錦六華華雖各別而底線相連故拆一華而餘華皆壞華喻六根底線喻性其意可知此約橫喻故六根同一成壞不同巾之竪喻每約一根結則從性至塵由細漸粗解則從塵至性由粗漸細皆有次第六重如巾結解也然每一結成六根同成一結乃至六結皆然至解時每一結解六根同解一結以至六解皆然故解者從一根入一根之結盡六根之結齊盡當亦與華喻相成而不相背也智者詳之是則一根返源豈不至簡耶六根齊脫豈不至要耶夫至六根皆脫則衆生世界已自不能纏縛矣二器界超越此中不是情器根塵平言蓋言塵界全倚情根而立固未有情根脫復而塵界獨存者也故上科既已脫復情根而此科歸重超越器界而已分二一塵銷覺淨見聞如幻翳三界若空華聞復翳根除塵銷覺圓淨首二句喻明塵界全依情根而立幻翳者猶言虗翳也蓋空華但是目翳之影今情根既如翳而塵界但若空華則可見有則俱有無則俱無也次二句遂言今既一返六解而聞等已復於無即如翳根已除也而塵界應念隨銷便若空華湛然滅盡豈可復得哉由是情塵俱寂之後本覺之體圓滿清淨所謂逈脫根塵靈光獨耀矣此中但取翳華為喻不用幻喻夫根身解而器界隨銷其亦至易而甚速矣乎二淨極越界淨極光通達寂照含虗空却來觀世間猶如夢中事上言覺淨似初淨今言淨極則淨相轉深以至極淨亦可上言翳根初盡塵銷覺顯且約理體圓淨今既淨極則當覺遍塵剎矣光通達者心眼圓明真俗畢照夫淨極即寂光通即照而言含虗空者大覺海中空漚至小何況世界乎末二句言以含空之寂照觀察世間悉皆如夢了無罣礙甚言超越世界得大自在而無復拘滯矣問前言界如空華滅盡今何又見耶答圓乘銷塵非至灰斷但滅法執所執定實心外之界而唯心如夢境界宛在無礙但隨心出沒無定實矣次第超越已竟二因顯昔妄難干摩登伽在夢誰能留汝形此亦激阿難發奮進求脫根超界以雪前之悔恨也又見昔之所以被邪術所制無自由分者正由不能解根超界得大解脫也亦由不知根中圓湛妙心寂照含空無可拘制而但取緣塵影事為心妄認身中是以受制莫脫故如來首先徵破所執妄心而於根中指以所迷真心令其旋根取證也今偈意言汝若早識根中妙心而解根越界乃至寂照含空登伽在汝覺海夢中如漚如塵豈能留滯於汝哉極勵之也法説已竟二舉喻如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性吳興曰幻師譬真如幻作譬隨緣真妄和合變成六根如諸男女詳前法説既有情器雙超之旨則喻中亦應具之故一機但指幻呪抽牽也牽之令動也言男女諸根動雖不一而牽抽令動但一呪力故下息機即謂止呪也歸寂然者男女諸根皆不動也諸幻成無性者所依幻處亦泯於無也蓋凡幻人非無幻處如化城喻云重門高樓閣男女皆充滿上句幻處下句幻人也法中一機即一精明故喻之所謂雖見諸根動者喻六根之用雖殊也要以一機抽者喻惟一精明之體於中隨門異用也息機喻但旋一根精明之體令其還源也歸寂然者六根俱解脫也諸幻成無性者器界亦超越也一精明不合幻師但合幻呪至下發明三法合六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念銷成圓明淨妙一精明即真如與無明和合所成識精明元為六精之總體理實即是第八賴耶識亦即本經稱陀那細識也六根即是能依一精明即是所依故曰元依一精明也分成六和合者分攬六塵各成根相而精名亦別如在眼名見精在耳名聞精等名雖各別而體則仍是一精明故一精明合喻中一機六和合合喻中諸男女也當補二句云雖見六用殊惟一精明轉合喻中雖見二句方全一處成休復合喻中息機六用皆不成合喻中歸寂然然一處休復即從耳根解結其意可知齊此喻明情界脫纏已竟末二句合諸幻成無性塵垢即指器世間六塵所成垢染世界應念銷者如前經云山河大地應念化成無上知覺是也無情器之分曰圓無無明之蔽曰明無根塵之污曰淨無結縛之礙而互用變現曰妙故曰成圓明等此更喻明器界超越法喻詳明修證已竟三結示因果究竟餘塵尚諸學明極即如來此科尤見易而速也餘塵者斷無明未盡謂之有餘極而言之雖等覺亦爾故諸學指等覺以前諸有學菩薩也問前文稱菩薩一例無學今何又言有學答前位離佛遠顯超二乘故稱無學今鄰近如來對佛究竟無學故等覺亦是有學如臨至尊不敢稱尊也明極謂無明已盡而本明證極即如來無上菩提矣夫法門既妙而修證又巧乃至成佛無難所以惟當選於此門也獨選耳根已竟四普勸修持佛敕文殊惟選一門教衆深入故文殊上來選定耳門即以勸衆普修順佛意也然上文何不自聞之語但是激其決定取捨非勸修正文分為三一正普勸結通大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是首句呼之警勸也次二句正以勸修可知性成無上道舉果以欣動修心也蓋言聞性本即是圓湛不生滅性亦即菩提涅槃元清淨體乃成佛真因與果一如故判決此性定成無上道即極果也末句結答圓通以本意元為救選圓通故結言欲知真實圓通者而圓通實理但修如是聞性而已矣二明諸佛共由上科直言勸此科與下科是證信勸也又為二一總標諸佛此是微塵佛一路涅槃門前佛偈亦云十方薄伽梵一路涅槃門其意無殊但前尚泛此則確指耳根為異言是趨真寶所共由之路也二別列三世過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法斯門圓明如是法皆指耳根圓通也夫三世共由如此我獨何人而不由此常修之法門乎蓋由信佛而必信法也現未聖賢非佛而必成佛故總標中微塵佛數三示己身親證我亦從中證非惟觀世音蓋自不修而惟勸人修人或不從身先入而率人同入人皆樂與故文殊明已亦從耳根修證所以啓人之必信從也普勸修證已竟五結答請加分二一正以結答夫文殊承佛尊命檢選勸修上文選勸事竟當回復尊命故此結答乃回告於佛之言又二一觀音最合聖言誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最誠者信允之辭猶言誠然也如者遵從之意猶言如命也誠如佛世尊者言誠然如佛所命首表信從佛旨也次四句全以述前佛旨詢我諸方便者即前第一云二十五行誰當阿難之根也以救諸末劫者即前第二云兼我滅後此界衆生也求出世間人者即前第三云入菩薩乘也成就涅槃心者即前第四云求無上道也觀世音為最者言能於佛之前旨四義全順者惟觀音耳門最為第一也蓋耳根圓通即多聞者之聞根故能獨當阿難之根即順第一旨也人人現具淺深均修故能普救末劫即順第二旨也先得人空次解法執故能應求出世即順第三旨也生滅既滅寂滅現前故能成就涅槃即順第四旨也又前二顯契機後二顯契理機理雙契聖旨全孚此觀音之門所以獨超諸門矣二諸門未孚佛旨自餘諸方便皆是佛威神即事捨塵勞非是常修學淺深同説法即就也捨脫也佛威即事者佛以威神就其所遇之事加被之令脫塵勞也非是二字亦貫下句若是常修學則不必就其遇習之事但選妙性通常可修也諸門如那律失明畢陵觸刺等人不皆然故非是常修學矣若是同説法不分深淺二心同可宣説也諸門如普賢之大因滿慈之宿辨等但局深心沙陀之貪淫周利之闕誦等但局淺心非是同説法矣反顯通常可修淺深俱入仍是觀音耳門而已自觀音之外其餘二十四門姑且捨之不必雜取極欲其專修耳門也二請求加被求加有二意一者謙己推佛二者法深機淺信解須乘他力也分為二一禮讚求加頂禮如來藏無漏不思議願加被未來於此門無惑初句敬禮尊法也如來藏即目聞熏妙性屬黎耶識故論言佛説如來藏即是阿黎耶惡慧不能知本經即陀那微細識一體異名隨位稱也且云真非真恐迷我常不開演足見信解者少也頂禮恭敬顯斯法最尊重也然是稱法禮佛顯二寶一體耳次句深讚其難信解也由其體即菩提涅槃元清淨體染而不染難可測知故曰無漏不思議也法既甚深如此若非佛以威神加被信解良難故下惑之一字當有兩解一者惑謂疑惑無惑蓋欲加被衆生於此法門必信從而無疑惑也二者惑謂迷惑無惑蓋欲加被衆生於此法門必解悟而無迷惑也信解定而修證端有望矣二出其二故又二一遍對機宜方便易成就堪以教阿難及末劫沉淪此科與下科又出其所以但求加被此一門之故也方便者言其現先自具圓通之相從此加修最為善巧真初心方便也易成就者既未修之先本來現具圓通之相由是加修一反聞之間彈指可超無學乃至入住成佛不勞多劫豈不容易成就哉末二句言自當機以至末劫羣生無不可教見其收機無遺亦是顯然回復如來四旨中前二旨矣二一超一切但以此根修圓通超餘者首句但修一門次句便超一切門也連上科説以有此二義故獨請加被此之一門而不求加被別門也六總結義盡真實心如是溫陵曰真實心要如是而已長水曰真實心者文殊指已選圓通之心也二義雖皆可通而環師説勝經偈元以如是結尾而已二字得其義盡無餘之意如來教示一門深入科已竟三大衆承示開悟證入分二一阿難一類開悟此一類約修證種生但得頓悟未即頓證者也位多在於大乘觀行小乘方便若有名字人緣此新入五品是即微證然悟強證弱故但顯悟而已阿難示在初心初果又示多聞無力故與此一類權同未證此其宜也且圓頓教旨惟重徹悟不愁不證又既知其示現則雖不證亦何所屈況經文本無證意何必強與爭其有證乎必執有證敢定何位慎勿鑿也又二一正明開悟於是阿難及諸大衆身心了然得大開示此之身心了然與前五卷偈後身心皎然不同彼明身心結之次第與解之次第爾尚未知所入一門是為何門當云何修故此了然是的知從入之門獨在耳根兼亦備悉修法又明得耳解而六處之根齊解是身了然以根即身也明得聞復而六處之性齊復是心了然以性即心也此由與二十五聖并文殊委悉説盡故曰得大開示二復以喻明觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路菩提涅槃是究竟智理極果前多詳解即喻中之家而喻中歸家道路即耳根圓通所謂因地心也於道路而言明了是猶行客方知歸路而尚未知起行之相故不強説進證長水謂其未證非過二登伽一類證入此一類約修證種熟隨悟頓證者然圓頓乘悟即徹底證分淺深登伽顯呪不思議力所加持故頓能進證故與此等作一類也凡經敘證多從深至淺此中三科但約圓位一初住二七信三初信也就分三一得法眼淨普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨普會至恆沙舉能證人首句總舉次句人天三句小乘有學四五句大乘初心七八句總紀數也然小乘意含無學以齊七信故末三句判所證位初句所證真次句所斷妄末句所證果名也此得本心與三卷末阿難等獲本妙心同一心相但彼悟得此證得也良以圓人初後二心不別故初住即證得本覺真心矣中句即四卷末想相為塵識情為垢二俱遠離也覺所覺空則塵遠空所空滅則垢離矣得法眼淨者資中曰莊嚴論解法眼淨初地見道也若依圓教即十住初心也蓋生滅既滅寂滅現前即法眼淨矣此位是證徹圓通因地心成果地初步四卷末云則汝法眼應時清明是也二成阿羅漢性比丘尼聞説偈已成阿羅漢摩登伽今已出家故從尼稱而性字即登伽之華言阿羅漢即圓之七信借小聖名稱大凡位問安知非小答若聞圓乘而證小果譬如食純甘而得苦味無斯理也縱有小種先以取證以今法力不成定性增慢之流斷我伏法何非菩薩按圓通即此根初解先得人空而文齊於聞所聞盡同證斯位理合比上加多以登伽最劣舉劣況勝多證可知矣三發菩提心無量衆生皆發無等等阿耨多羅三藐三菩提心十恆河沙尚為有量今稱無量者愈不可名狀其多也吳興曰按天台釋法華分別功德品發菩提心初入十信也故仁王般若云十善菩薩發大心長別三界苦輪海據此位在初信已發直深大悲之三心按圓通當至動靜不生問阿難所證初果應齊圓之初信今聞經之衆昔未證而尚成新證何阿難先已證者反不列斯位耶答論斷見惑舊證非新何須列此若兼論發菩提心則阿難既云證小亦示緣生三心未顯故亦未列斯位中也選根直入一大科已竟二道場加行此科為圓根近下者説也然下科為初方便此科更為最初方便亦助前圓通而已分二一初請略説又二一阿難請又二一禮謝自悟阿難整衣服於大衆中合掌頂禮心迹圓明悲欣交集心謂本有真心迹謂修證事迹不達本有之心則積行𦢊腮徒勞無益不達修證之事則塵埋寶藏莫救貧窮今性修畢達故曰心亦圓明悲謂悲曠劫之雙迷欣謂欣一時之圓悟由此而取證有期故感激之深如此也二拜請度他分二一標意禮稱欲益未來諸衆生故稽首白佛大悲世尊二求請之言又二一述己請意又二一先明自悟我今已悟成佛法門是中修行得無疑惑經初原求得成菩提最初方便上二句表已悟此也下二句表已但於前門中修不勞道場也二後表為他顯道場專為他請也又二一引證佛言常聞如來説如是言自未得度先度人者菩薩發心自覺己圓能覺他者如來應世菩薩無明未盡猶非得度然雙明因人果人皆以利他為事而菩薩更顯速急吳興曰菩薩四誓以度人為先如來十號以應世為本也二願同菩薩我雖未度願度末劫一切衆生二正請道場又二一明聖遠邪興世尊此諸衆生去佛漸遠邪師説法如恆河沙欲佛説與定式邪説不得亂真也二求遠離魔事欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈魔事擾動定心不成修正覺心必至退屈故求遠魔也尋常一往便指耳門為最初方便今詳此請則耳門尚為初心方便道場方為最初方便也二如來説分三一如來讚許爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沉溺汝今諦聽當為汝説善哉有二意一善其發利他心得菩薩正行二善其請道場意得利他法要也餘意可知二會衆欽承阿難大衆唯然奉教三正與説示分二一繫舉三學又二一引律標意佛告阿難汝常聞我毗奈耶中宣説修行三決定義標義數也溫陵曰三藏之中毗奈耶律藏也此大小戒通稱也決定者決定修證依於此中義也二指實定名所謂攝心為戒因戒生定因定發慧是則名為三無漏學前標決定正謂決定依此三序無相踰越戒取攝心檢異權小粗從事相多約身口也今取一念不生目之為戒但番對諸惡以分各念其實念惟是一爾二持之中亦惟止持以此皆從微細心念即訶禁之故也因戒生定者緣攝心動少漸向於定如止風而波漸息也因定發慧者緣心靜極本明漸顯兼照萬法如波停水湛自體發光照涵絲髮也此若泛言通途皆爾今此所修仍是耳根圓通但為最初近下之根特加戒律道場持呪之三事故大科云加行也至於因戒所生之定慧仍是忘塵盡根妙定及彼定所得三空慧耳觀經文但惟詳戒而略於定慧可見也問前門何不用此答中根煩惱輕微無自起淫等四念且彼於忘塵時防護有力世俗曲屈已不容入安有自起四念何況道理徑直等聲一併止絶哉至於阿難初果已能不入色聲等六塵但加反聞尚不多費忘塵之力安有自起淫等之念耶故知斯門特為塵勞素重不待聲引而頻舉自發淫等四念乃至身口亦所未免者加四戒以為反聞之前方便加道場持呪以為正反聞時之助行也舊解全不知此杳無一字豈自此後別為一法門哉此非小失故特為警示學人珍重結名三無漏學者戒中已自不容一念漏於諸非何況定慧然此非但不漏落於三有而已以注心反聞兼不漏落空有二邊所以為真無漏而非小乘比也二別列三學分二一歷明預先嚴戒預先者未入道場之先也正以戒為定慧道場前方便故又二一正教持戒又分三一躡前徵起阿難云何攝心我名為戒二開釋四重律中所犯罪分輕重而淫殺盜妄最為重者也分四一斷淫溫陵曰諸經戒殺居首謂設化以慈悲為先此經淫戒居首為真修以離欲為本蓋欲氣粗濁染污妙明欲習狂迷易失正受續生死喪真常莫甚於此故須首戒而為清淨第一明誨也觀阿難起教示遭邪染而厥初發心先厭欲濁至於三漸次中一一首懲然後身心妙圓獲大安隱十信初心由欲愛乾枯而慧性圓明遂階等妙諸世間人由心不流逸澄瑩生明漸乎六天是故真修內攝必先離欲也又分為二科一曲分損益之相又三一首陳持犯利害又二一持則必出生死若諸世界六道衆生其心不淫則不隨其生死相續其心不淫則是於諸淫欲非但不動身口亦不生一念思想之心方為不犯方與攝心為戒相應餘三放此溫陵曰衆生皆因淫欲而正性命故纏生死若欲愛枯乾則殘質不續矣二犯則必落魔道又三一必不出塵汝修三昧本出塵勞淫心不除塵不可出三昧即耳根圓通塵勞即界內見思菩薩雖不實出三界亦須於見思自在不為生死所縛方為出塵勞矣今淫欲為塵勞上首故不除必不出矣二必墮魔類縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女多智謂慧能通達演説諸法禪定現前謂善入住出發妙境界也不斷淫者於禪定時不決定捨絶淫念縱其思惟也必落魔道者以境隨心召心逐境遷必互相引今所念既在欲境而欲境莫勝於魔如水就濕安有不墮於中者哉如陰魔中行空禪者却留塵勞廣化寶媛是也此蓋定慧心靈觸境流住方有斯墮若無定慧徒有淫習則直墮地獄安有魔宮之報乎上中下隨福厚薄以為階降耳三兼成增慢彼等諸魔亦有徒衆各各自謂成無上道未證謂證未得謂得七慢中增上慢也亦是非果計果二預辨魔佛教儀欲人辨識勿為魔所惑也分二一貪淫化世即魔教又三一預記末法我滅度後末法之中二魔盛宣淫多此魔民熾盛世間廣行貪淫為善知識此之魔民即先世帶淫修禪之輩來為教師神通智慧密教行淫以為佛事遞相傳授故曰廣行此盛行淫非止心念師徒皆當直墮阿鼻矣三陷人壞道令諸衆生落愛見坑失菩提路愛即思惑見即見惑淫愛為教思惑偏重然以淫為道故亦見惑中大顛倒分別矣二教人斷淫即佛誨汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨此中雖敕阿難而後人不必親待阿難凡遇知識憑經指誨絶淫念修圓通者即如阿難并釋迦及先佛親來至心依從之凡言淫欲無礙即魔王親來速當驚避矣廣如陰魔中辨三確定菩提成否衆生初心希菩提者宿因教熏善根及本覺內熏之力而難捨淫等者乃俱生曠劫深重習氣故多理欲交戰胸中正此兩難之際忽遇魔師密傳不礙菩提鮮不欣然從之故上科示以被繫落魔所以力止莫從也猶慮有習氣最重者自心姑息謂帶淫修禪雖不速得菩提久當得之故此與之決定不斷畢竟不成斷之方可希望也分二一喻不斷無成又三一舉帶淫修禪是故阿難若不斷淫修禪定者二喻沙不成飯如蒸沙石欲其成飯經百千劫只名熱沙何以故此非飯本沙石成故三合淫不成道汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三途必不能出如來涅槃何路修證首二句合蒸沙作飯次五句合經劫熱沙也淫禪妙悟即沙之暫熱相也以帶淫之念為根本而發妙悟故曰皆淫根也暫生魔宮恣造巨惡三途備歷求出無期末二句言淫非涅槃之本如沙非飯本故故無修證路也二勸深斷方成必使淫機身心俱斷斷性亦無於佛菩提斯可希冀此科正是今戒除心切至之言機者發動之由如弩牙也謂身之淫機由心使作心之淫機由念弛放一念不生方得身心俱斷斷性亦無者此更究深而論斷性若存終與欲對則欲之緣影未忘非竭絶也如病藥俱除方為無病人也二判決邪正之説如我此説名為佛説不如此説即波旬説令人切辨務從佛説而絶魔説也斷淫已竟二斷殺科意及文大意皆準前知一二不同者釋之而已此中所斷之殺非但人畜下至蠅虱蛇蝎等皆勿殺也亦非但親殺雖食肉服身亦所不許又非但只禁身口雖心念亦止絶矣分二一曲分損益之相又三一首陳持犯利害又二一持則必出生死阿難又諸世界六道衆生其心不殺則不隨其生死相續負命索償為生死緣故不殺則不續也二犯則必落神道又分三一必不出塵汝修三昧本出塵勞殺心不除塵不可出二必墮鬼神縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎鬼神雖分勝劣而均是惡趣故從人而入者謂之墮落也然惟識中有九品此三品蓋是上品內三品也中下多以慳吝為墮因而此上三品皆有力明神如川嶽等神通力洞無畏富樂一同人天斯則修禪不斷殺生為墮因也世之邪人固有積福求成神道而不知墮惡趣鄰地獄易墜難升也然須以定慧帶殺心者方墮斯類非是徒殺者所能墮也大力鬼即天行羅殺今人間尊奉稱帝稱天者多是此類也三兼成增慢彼諸鬼神亦有徒衆各各自謂成無上道二預辨鬼佛教儀又二一食肉化世即鬼教前斷殺生今言食肉者以因食肉而殺生者多故雖不親殺而財使轉殺傷生業同故經云為利殺衆生以財網諸肉二俱是惡業死墮號呌獄故食肉即殺生也世故有能捨食肉而不禁殺生往往見修行人不恕蠅虱等橫殺無數甚為非理又有能禁殺生而不捨肉二皆非理有志圓通者痛宜戒之又分三一預記末法我滅度後末法之中二鬼化食肉又二一述鬼化儀多此鬼神熾盛世間自言食肉得菩提路倡言食肉不礙成佛二廢權防難又三一明現在權化阿難我令比丘食五淨肉此肉皆我神力化生本無命根佛於藏通律中聽彼教聲聞菩薩除人蛇等二十種外許食三淨肉今言是佛在時神力所為則滅後豈可復食乎孤山曰五淨肉者律明三淨不見為我殺不聞為我殺不疑為我殺今言五者加自死鳥殘也二出權化之由汝婆羅門地多蒸濕加以沙石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味三明滅後非教奈何如來滅度之後食衆生肉名為釋子此可見凡佛許食肉者皆佛在權變漸引慈化耳及滅後即實奪命之肉可更食哉而深經廢權不許者皆將滅示實極護末法之誤墮也有志者務從實而不可引權自欺矣三陷苦增纏又為二一必陷苦海汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沉生死苦海非佛弟子心開者禪定中得力受用境界現前也然食肉障深似而非實皆大羅剎者以現行先同來報必隨故以果目因也必沉苦海者以羅剎增上轉惡必至極苦處矣二必不出纏如是之人相殺相吞相食未已云何是人得出三界以命債不了解脫無期何由出世哉二教人斷殺即佛誨汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨鬼佛化儀已竟三確定解脫得否又二一喻不斷難脫又分二一正喻是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大呌求人不聞此等名為欲隱彌露溫陵曰修禪避罪反乃行殺塞耳避人反乃高聲是欲隱彌露也避罪二字宜改出世二字方好二況顯清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食溫陵曰不故踏不故拔仁慈之至猶及草木況食衆生肉耶二勸深斷方脫二一舉能斷賞讚又二一正以舉讚若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界毳即褐衣也溫陵曰東方不無裘毳西土不無絲綿各以多分言也酬還宿債不遊三界者上句當在下譯人語倒也二徵起喻釋何以故服其身分皆為彼緣如人食其地中百穀足不離地溫陵曰足不離地者劫初之人體有飛光足若躡雲由乎食地肥啖香稻故其體堅重而足不離地也身分言絲等雖非身之血肉未必皆奪命然亦是彼身之一分用之則與彼成不離之緣矣二正勸斷許脫必使身心於諸衆生若身身分身心二途不服不食我説是人真解脫者溫陵曰身血肉骨髓也身分裘毳乳酪也身服食心貪求二途須併斷也二判決邪正之説如我此説名為佛説不如此説即波旬説斷殺已竟三斷盜此之偷盜非只竊人之物但言行詐異詃惑恐動乃至一念希取利養者皆是也分二一曲分損益之相又三一首陳持犯利害又二一持則必出生死阿難又復世界六道衆生其心不偷則不隨其生死相續心不偷忘其利欲貪得之心一念不起也二犯則必落邪道又三一必不出塵汝修三昧本出塵勞偷心不除塵不可出厭塵者方可以出塵貪世者豈能以越世二必墮妖邪縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著委曲取利其心回邪言行不正故墮邪類精靈者如山精水怪具諸神通似仙非仙似神非神妖魅者出沒世間每每著人或奪精氣或盜財物邪人即被著之人以其被著言行妖異惑亂於人三兼成增慢彼等羣邪亦有徒衆各各自謂成無上道二預辨妖佛教儀二科一潛匿詃惑即妖教又三一預記末法二多妖偷化我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散潛匿姦欺等者主於取財而妖言妖行或現妖通自言自在詐稱得道知識愚者不測傾家奉之三誤人墮獄又為三一先以己教相形我教比丘循乞方食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返方處也隨所到之處以清淨乞食即循方乞也首四句直標捨貪謂不積聚不自作也諸比丘下釋出捨貪之故陸宿曰旅水宿曰泊如過客也但依佛自釋本意不須多列二顯是違教倒説云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道首句言其內心本即是賊二句言外貌假借僧儀志惟竊利以如來為取利之媒故曰裨販如來如言斯人雖如來亦被所賣也造種種業皆言佛法者言無量莊飾皆為取利皆為墜墮業因而詐稱佛法若以前乞食真教相形較之豈是佛法本意特彼顛倒非法説法而已末三句破其謗正惑人之言此等姦人若以前乞食正教責之彼心自稱已為菩薩行反毀遵正教者為小乘道此又法説非法之顛倒也三正示疑誤深害由是疑誤無量衆生墮無間獄聽彼法説非法之言皆疑正教為小乘道而從妄謗聽彼非法説法之言皆誤以業因為真佛法而遵妄行悉墮阿鼻潛匿詃惑即妖教已竟二教人斷偷即佛誨分二一先出自已誨又四一教以捨身微因若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷三摩提即耳根圓通如幻三摩提也此句下義含慮有宿生盜業為障勝修乃修如是微因大凡燒然須為消宿障修大定方成妙因若為財利名譽仍獲大罪矣二許其畢債出世我説是人無始宿債一時酬畢長揖世間永脫諸漏長揖謂永辭也孤山曰盜者取他依報資於己身今損正報以供上聖故能翻破無始盜業三仰揚明其近道雖未即明無上覺路是人於法已決定心覺路即菩提路正謂圓通以方懺悔秉戒未臻定慧故曰未明已決定心者決定信其宿業必消覺路得明也溫陵曰一切難捨無過己身難捨能捨則自餘貪愛決能棄捨故曰是人於法已決定心若徒慕捨身勉強毀形現前盜業又復新作根心貪愛居然不改尚不免於業苦豈能決定明覺路哉四親證違此須償若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異成無為者證出世果也若不還生人間償其宿債有礙勝進及度生故須償也溫陵曰佛為宿詬比丘可食馬麥故果成於毗蘭邑食之示宿債必酬也二轉教先佛誨汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨預辨妖佛教儀已竟三確定三昧得否分二一喻其不斷難得是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復二勸其深斷方得分為二科一惟依了義捨施又分三一身捨貪吝若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生上餘謂衣鉢之外止持不貪也下餘謂自食已足之外作持能施亦不吝也二心捨慢嗔於大集會合掌禮衆有人捶詈同於稱讚上二句敬人能捨憍慢必觀佛性同體見人是佛也下二句忍已能捨嗔恨必觀真如平等知毀同譽也三身心捨盡必使身心二俱捐捨身肉骨血與衆生共首二句雙承上身心無間而力行檀度是必達四念處無復人執也末二句令盡其分量蓋捨至身肉骨血則身心寧復有遺餘哉蓋必觀察苦空無我無常不淨之物施作佛事耳問此前方便將次入道場以修定慧奈何遽捨身命答此謂不吝身分非捨身命以非出假大捨時節也凡此皆為成就無偷之心如云比丘觀智身心尚須并捨豈可復留偷心曲取奉身利養哉二不引權乘欺誑不將如來不了義説回為己解以誤初學不了義中聽畜百一所需但禁餘二或許不入大會避辱不受又布施多不及於身分今但依上了義教不依不了義教也末二句如因自己不能奉前三戒或遇初學疑問却乃不認己過曲引權乘以明無礙初學蒙昧亦信行之是內以自欺外以誑人莫大之罪也認過實言罪猶輕耳二印其得真三昧佛印是人得真三昧印即許也許其必證圓通也觀此深斷一科令人慚愧墮淚可見末法祖師立為叢林亦因時慈悲曲就利生非得已也處此者時時每愧不能取證不萌一毫念利養之心僅免罪戾或遇人引斯經為難實言愧謝末法未能切不可巧言無礙又或有傑士達此經即能奉了義戒誓取圓通者當愧服推仰莫曲引他過以飾己非至於主賓互競惟利是急當愧死矣曲分損益之相已竟二判決邪正之説如我所説名為佛説不如此説即波旬説斷偷已竟四斷妄妄語有二發言不實為小妄語妄稱證果為大妄語此中所斷大妄語也此須出口非同舉心分二一曲示戒勸之意又分四一首陳妄語大損又為三一躡標妄語成魔阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種如是躡前顯三行縱圓猶懼此罪何況三行未圓者乎大妄語且標名存下科自釋溫陵曰貪其供養求己尊勝名愛魔妄起邪見謂己齊聖名見魔二指實述其言意所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養得謂得道指理言也證謂證果指位言也須陀洹等即果阿羅漢即道蓋小乘理至羅漢而極故言道也乘同道位同果也求世尊勝要恭敬也求彼禮懺希供養也人於果人前懺悔必盛陳供養故三記其損善墮落是一顛迦消滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧溫陵曰一顛迦即一闡提貝多羅樹以刀斷則不復活喻大妄永絶善根三苦海三途也二表己禁敕顯偽佛有禁敕諸聖決不敢違若違泄者足知非聖分二一詳示真人必密又三一敕二聖冥化又為三一標隨類度生我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉真身如空應物現形故曰應身又二聖於上二土中別有法性妙身此於同居應緣而現也乃分得隨類化身耳亦或普現色身三昧所成也二詳順逆二相或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販或作下順相也以此類迹多清淨故如是下逆相也以此類迹全染污故所謂示衆有三毒又現邪見相也衆生應以此身得度者即應現之無準矣三約佛事則同與其同事稱讚佛乘令其身心入三摩地首句四攝之一也雙承淨染二事皆與之同若同其類而不同其事則矯拂其心不相順從衆假與同事意在得其歡心而遂稱讚佛乘以化之也此三摩地不定耳根二明祕言無泄終不自言我真菩薩真阿羅漢泄佛密因輕言末學輕言末學者輕易泄言於晚學之人也三許臨終陰付惟除命終陰有遺付既示現受生亦示現捨命陰暗也遺言付法欲警其必行然泄亦婉轉如杜順清涼之事故曰陰付二因顯泄言必偽云何是人惑亂衆生成大妄語住則不泄泄則不住此一定軌則如豐干等三聖是也若泄言仍住顯是邪人要求利養慎莫信之三轉教先佛明誨汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨意不異前四確定菩提成否分二一詳喻不斷無成又三一舉刻糞喻又二一先以喻明不得是故阿難若不斷其大妄語者如刻人糞為旃檀形欲求香氣無有是處二後以形顯違教我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法溫陵曰淨明云直心為道場無虗假故四儀行住坐臥也自稱者妄稱也上人法諸果人法也二舉妄號喻又為二一先以喻明取罪譬如窮人妄號帝王自取誅滅二後以況顯罪深況復法王如何妄竊諸果皆法王位也二舉噬臍喻又為二一先示因果虗偽因地不真果招迂曲以大妄語為因故不真求進反退求升反墜故曰果迂曲二後喻菩提不成求佛菩提如噬臍人欲誰成就溫陵曰左傳噬臍謂終莫能及也以妄語而求正覺如以自口而噬自臍豈可及哉二深許能斷必成若諸比丘心如直絃一切真實入三摩地永無魔事我印是人成就菩薩無上知覺溫陵曰向以迂曲故終莫成就此能絃直故印其成就也菩薩無上知覺即圓通真因地心然以因定果亦是無上菩提矣二判決邪正之説如我此説名為佛説不如此説即波旬説開釋四重大科已竟
