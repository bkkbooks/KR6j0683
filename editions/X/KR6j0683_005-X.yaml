body:
  text: 京都西湖沙門交光真鑑述二證釋別有結元疑證釋者照現諸佛同證以釋也舊註謂此牒前不見所結云何知解而重問若是則無味之甚良以上文明說六為賊媒自劫家寶具詳示根結之由解根之法又擊鐘驗過何阿難忽又不知六根是結而又勞佛重答甚無謂也當知阿難已領六根是結而今更請之結元即下諸佛所說俱生無明生死結根也不知六根當體即是離此別無故佛下答汝欲識知俱生無明生死結根惟汝六根更無他物是也分二一阿難別求結元又三一就喻索元阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解所結之元意謂離此六根向上別有深根以為結之本元也此特阿難妄生擬意必有此元而謂不知者必不能解耳二引人合喻又為二一先與合定世尊我及會中有學聲聞亦復如是二詳開合文又三一遠敘妄纏從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧此敘皆為不知結元終不能解也諸無明即五住地也俱滅生者常淪生死也阿難正以此俱生無明方為生死結根所謂結元也豈知六根即是哉得善根名出家者謂所得有學小果也隔日瘧者謂得果時暫似解脫而入生死時依舊被縛也理實不止有學雖彼無學羅漢不涉生死則已涉則成縛正由不達結處不關識心雖伏斷之終不得脫二願佛愍示惟願大慈哀愍淪溺今日身心云何是結從何名解云何是結者云何是結之本元也從何名解者言作何法以解之也經文語略故人多未明耳三兼被未來亦令未來苦難眾生得免輪迴不落三有三哀求指示作是語已普及大眾五體投地雨淚翹誠佇佛如來無上開示翹者如鳥張翼而望哺也阿難別求結元已竟二如來證無他物大約明六根外更無物為結元也分三一諸佛同證蓋不離六根即是妙性此為難信難解之法阿難自經初至此重重蒙示猶不委信深解而捨易求難故佛恐自言不能令其確信而照現諸佛同以證信也分四一愍眾摩頂又為三一愍念現在爾時世尊憐愍阿難及諸會中諸有學者此或上示無學已解斯但有學所疑故偏憐之二愍念未來亦為未來一切眾生為出世因作將來眼未來去聖愈遠信解愈難故普愍念之為出世因者修證有賴也作將來眼者信解不迷也三摩當機頂以閻浮檀紫金光手摩阿難頂摩頂惟作哀憫攝受之意愍眾摩頂已竟二動十方界即時十方普佛世界六種震動表六根將必解除也三感諸佛瑞分二一各放頂光微塵如來住世界者各有寶光從其頂出表此根中妙性乃尊而無上密而無見之法也二來灌佛頂其光同時於彼世界來祇陀林灌如來頂示同證此性無別性也三大眾喜慶是諸大眾得未曾有固是見瑞希有然亦表眾生同具致感同喜也四聞諸佛言分二一標普聞同音於是阿難及諸大眾俱聞十方微塵如來異口同音告阿難言異口同音者示諸佛同宣斯教非一佛獨說之言足可深信彌陀經云汝等當信受我語及諸佛所說即此意也亦即蓮經法說諸佛道同此經光中親令見聞尤當信受二述諸佛教言又二一告結無他物善哉阿難汝欲識知俱生無明使汝輪轉生死結根惟汝六根更無他物俱生無明即同體別惑最為生死深源而稱其為結根者結表固而不開根表續而不斷更無他物言此根性即是俱生無明之元首固結生死之深根離此六根更無結元也二告解無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物此復言其不但只是妄元仍是真元葢罪之魁而功之首也無上菩提屬智果即能證如如智也安樂等屬四德斷果即所證如如理也安樂即樂德解脫即我德我以自在為義故也寂靜即淨德妙常即常德更非他物者言離此根性無別真元矣良以根性本即菩提涅槃元清淨體經初佛早判為真本彼處人多不識我曾引此釋之諸佛同證已竟二如來解釋分為二一阿難未悟而述問阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪迴安樂妙常同是六根更非他物意疑如來常說法相最要略者亦有十八界等今何惟是六根而六塵六識皆不與耶二如來詳釋以除疑分為二一長行分三一直以標檢又分為二一標處一體佛告阿難根塵同源縛脫無二科言處者謂經之根塵攝十二處也阿難意中疑云若惟六根豈不遺乎六塵故此首句標告之云根之與塵執相而觀則根為內身而屬有情塵為外器而屬無情似永異也而不知本惟一心妄分情器遡流窮源仍惟一體豈真有十二處之各體耶斯即唯識宗相見皆依自證起矣次承上言由此根塵同源之故舉根而即以攝塵是以縛為凡流而受淪固此六根以為結縛之本脫為聖侶而自在亦此六根以為解脫之源豈有二物哉二檢識虗妄識性虗妄猶如空華阿難意中當復疑云根塵同源故舉根即以攝塵而六識何以不言故此復檢云識乃前塵虗妄相想猶若空華了無實體既非縛結之本又非解脫之要故結解惟根而竝不係於識也此處仍總結云六塵既無別體六識又極虗無故諸佛同言結解惟是六根也理實只此標檢之科所以釋諸佛之言者義盡無餘下文重釋重頌令其增明而已二重以釋成理本玄微而標文隱略恐未徹了故重以釋明然此中但釋所標而不釋所檢者以既檢去不用故也分二一重釋根塵同源阿難由塵發知因根有相相見無性同於交蘆由塵發知者即由六塵而後發六根之知也此句見六根要須托六塵而後立因根有相者即因六根而後有六塵之相也此句見六塵要須托六根而後有相見無性者言塵離根而固無獨立之自性根離塵而亦無獨立之自性也交蘆別是一種麤大過於常蘆生必二莖交抱而立二根盤結而連單則撲地不能自立又其體外實內空今言猶如交蘆者據長行似惟取於交倚不能自立亦如根塵各無自性同源一體所以引下文縛脫惟根而已據偈頌則仍取外實內空以喻根塵空有俱非也故今長行雖未顯章空有之義亦應暗含雙非之旨庶見下文立知無見甚有來歷矣二重釋縛脫無二是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨是故二字雖顯承上言根塵既無兩體是以縛脫但惟在根然亦暗承空有俱非而來更有意味知見即該六根之性立知者立空有二知也凡夫迷六根之性為有二乘晦六根之性為空俱不達空有俱非之旨也即無明本者凡夫即具足五住而長淪分段皆迷有以為之本也二乘即尚餘第五而未出變易皆晦空以為之本也無見者無空有二見也凡夫於根性除執有之見二乘於根性除偏空之見也涅槃即番上二種生死無漏真淨即離上五住無明斯即云者葢凡夫除前四住先得有餘涅槃無漏真淨所謂此根初解先得人空也二乘除第五住究竟無餘涅槃無漏真淨也因此經凡小當機故作是說若本來大根不必分約二人矣舊註二解俱非前解撥有取空不顧偈中空有俱非之語後解立真排妄不顧偈中妄真同妄之言夫重頌不遠居然抗違猶云竝符佛旨註疏豈易能哉學者宜慎重之問此之知見與法華知見及此經圓彰三藏之後所說知見同耶異耶答更無別法但說示泛切不同耳法華標名未及釋義解家隨情於經無證泛之甚也斯經金口自釋圓彰三藏即佛知見亦取眾生藏心本具非取修證所成然於眾生現前未曾指其具於何處是猶未的切也今此處於眾生現具六根中性指出如來知見方甚為的切而非泛也蓋以知即內之意根見即外之五根而此根性既周徧常住為菩提涅槃元清淨體而三藏圓具非如來知見而何單傳直指亦密指於此而已而顧謂之教外者欲其離文字迴光親見耳若即隨言作教外想是痴人前不得說夢也珍重之重以釋成已竟三總以結歸云何是中更容他物此即結歸諸佛本語也是中即結中與解中也意言結中惟是根結而更無他物能為結元解中惟是根解而亦無他物能為解元此諸佛所以同言更無他物也長行竟二偈頌分二一標頌爾時世尊欲重宣此意而說偈言二偈文分二科一祇夜頌前二一頌直以標檢二一超頌檢識虗妄法相宗五位唯識前四有為第五無為今偈文顯然雙破故知乃是超頌識性虗妄猶如空華葢佛頌長行多變文顛倒不次頌之天台解法華以超頌追頌科之是也前人不達超頌識性強作根塵同源等釋之文甚不類義豈得通不能闕疑故也今請別釋智者辯之又復分二一揀有為真性有為空緣生故如幻掌珍論偈義意全同全破唯識故與經同文辭小異上二句云真性有為空如幻緣生故第一句與經全同清涼謂其語倒應云有為真性空葢言有為之識有為無為經意別指前六有漏無漏無真自性故云空也此說極是至於次句若按比量則論偈仍倒謂因喻顛倒也經偈乃正葢上句是所立決定之宗下句緣生故三字推上立宗之因也葢言因其皆托緣生所以決定空無性也如幻二字是同喻彼鈔立量云有為是有法定空無性是宗法因云從緣生故同喻云如幻良以幻法從緣生幻法空無性有為從緣生有為空無性二揀無為無為無起滅不實如空華論偈云無為無有實不起如空華此則經偈不順比量謂宗因顛倒也論偈乃順葢經之上句無為合下句不實即論之無為無有實也是所立決定之宗經之無起滅即論之不起是推上立宗之因也葢言因其對起滅而立無起滅所以決定不實也當知即起滅而本無起滅則二義齊銷圓實義也對起滅而立無起滅則二皆非實權小義也以小則相外取空權則真須離妄故耳故彼鈔立量云無為是有法不實是宗法因云不起故同喻如空華良以空華無有起空華無有實無為無有起無為亦無實論又云若有有為法則有無為法既無有有為何得有無為耶末當結云識之有為與識之無為二皆非實我故曰識性虗妄猶如空華也問佛破識心何以知其竝無為而亦破耶答經初佛破識心破至深處一則曰縱滅見聞覺知猶為分別影事二則曰非色非空昧為冥諦離諸法緣無分別性三則曰現前雖成九次第定不得漏盡皆由執此妄想誤為真實誰謂但破有為而不破無為乎二追頌標處一體又二一頌根塵同源又曲分二一先以況顯言妄顯諸真妄真同二妄猶非真非真云何見所見此以真妄尚無二體況顯根塵豈有異源言妄顯諸真者泛言凡對妄所顯諸真也妄真同二妄者言二俱成妄畢竟非真也以妄居真外則妄實有體反乃不成妄義如影有實體影義不成也真居妄外則理不攝事反乃不成真義如鏡不現影鏡義不成也二義不成故二俱同妄矣猶非真非真者以猶非二字雙貫下真與非真即雙非真與妄也葢非真非妄正明真妄尚無二體矣云何見所見者見即根也舉眼根以攝餘五也所見即塵也舉色塵以攝餘五也正以況能見之根與所見之塵豈有異源乎決定非二體矣由是下科遂結定之二後以結定中間無實性是故若交蘆是故二字意當在中間上承前況顯意云所以根塵相倚而立中間無有各自實性但如交蘆有二相而無二體矣二頌縛脫無二結解同所因聖凡無二路結解約法聖凡約人結解即縛脫也同所因者同因六根也無二路者離根性更別無路也此亦承上而言根塵既無二體所以縛脫惟是六根離六根豈復別有結元哉頌直以標檢已竟二頌重以釋成又分二一頌重釋根塵同源汝觀交中性空有二俱非此須法喻雙釋喻中交蘆適言其有其中元空適言其空則其外元實法中根塵適言其有則其體空廓自在無繫適言其空則其用圓融周遍法界故曰空有二俱非也此長行缺略而偈頌詳具者耳二頌重釋縛脫無二迷晦即無明發明便解脫首句頌知見立知即無明本也言凡夫迷六根為有則失其自在無繫之體二乘晦六根為空則失其遍現互融之用故俱墮無明生死即五住二死解現長行次句頌知見無見等三句也發謂番迷發悟不復著有也明謂轉晦成明不復沉空也解脫謂遠離五住二死合前長行觀之義無不盡矣祇夜頌前已竟二伽陀開後分二一正以開後解結因次第六解一亦亡根選擇圓通入流成正覺首二句開後綰巾示倫科也解結因次第者如後文云此根初解乃至俱空不生是也此因解字在上故作是說據後文理實結之與解俱有次第依彼即應結字在上矣詳之六解一亦亡者如後文云若總解除尚不名一六云何成是也末二句開後冥授選根科也根選擇圓通者即後文徧選諸聖偏擇耳根是也入流成正覺者即入流亡所乃至寂滅現前等文是也二別彰五勝此備五種殊勝即是五章皆依根性發揮意顯此經正因其為根性法門以致五章俱勝豈可不委信之而別求結元乎此以體宗名用教相為序就分為五一體性精密陀那微細識習氣成暴流真非真恐迷我常不開演首句明其即妄而真陀那此云執持第八識受轉之別名佛前判二種根本時即呼根性為識精明元今復呼為陀那則根性為八識無疑然此經以如來藏性為體而八識即是藏性所以舉此以彰體勝也又權小欽仰陀那而忽慢六根不知根性即陀那體故示之令信重根性也深隱而非淺顯曰微精妙而非麤浮曰細當知經初十番所示即曲盡其微細矣次句明其即真而妄習氣即陀那所持種子也深密經云阿陀那識甚微細一切種子成暴流以此習種能引生諸趣根身器界流轉無停故如瀑流當知經初所說二種顛倒見妄為輪迴本者即此習氣矣末二句雙承上二句而言由其即是陀那細識故真由其帶持瀑流習氣故非真恐迷者言我若說其為真其奈帶持種子妄習不除眾生將迷妄為真未免瀑流漂轉也我若說其為非真其奈體即細識離此無真眾生將棄真為妄未免向外馳求也我常不開演者言由此真與非真二俱難言是故非時非機寧常密之而不言不令眾生墮彼二種之迷也經又云我於凡愚不開演恐彼分別執為我謂恐其執為真我也此但偏恐迷真而遺非真之迷不如本經義全矣問時機若對何以不迷答自然知其即真而不外覓又知其帶妄而不廢修何迷之有是知此法祕密時乃說之非輕易常說之法珍重珍重二宗趣簡要自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立承上科真與非真二俱易迷如此故此科憫其迷而示以出迷之要也即是宗趣首二句言起妄本無多法也意言迷雖易迷悟亦甚要原其最初但因不悟見相二分惟一自心而乃誤以能見之心妄取所見之境由是從無人無法非幻境中即無明業識中攬塵結根即見精映色結色成根等幻生法相人相所謂從非幻而成幻法也末三句言苟能了此則破妄亦其簡要也不取二字便是最簡最要處言前既妄見攬塵橫生幻法今乃旋根脫塵不復取著而已當知即是後圓通中入流亡所等功夫也無非幻者言此不取工夫極則必至人法俱空非幻之境亦逈然脫矣末二句以深況淺之詞言人法俱空之境理實即是無明業識中也尚亦不生而法相人相豈能存立乎若圖明白當云不取無俱空俱空尚不生人法云何立妙不可言是則以不取為宗以了幻為趣而簡要無以加矣此皆具取佛意非胸臆別說也三名稱尊勝是名妙蓮華金剛王寶覺妙蓮華者即妙法蓮華法喻雙舉也然妙法即指根中藏性眾生現具如蓮之方華即果也又根性即佛知見即實相體故知此經為法華堂奧也金剛王寶覺亦喻法雙舉也金剛王即最堅最利之至寶寶覺雙含實相觀照二種般若所謂如如智如如理也喻以金剛王顯其照法無有不空也故知此經為甚深般若也然前名詮顯一真本有後名詮顯萬妄本空而此根性法門亦即法華金剛二經之體是故名稱兼備二經之尊勝為諸經王四力用超越如幻三摩提彈指超無學三摩提此云等持謂定慧平等任持默指圓通中入流即照理之慧忘所即息妄之定等也而言如幻者圓人知真本有達妄本空無修而修無斷而斷故云如幻非如權小染實之修也又已悟本惟一心遠離能所而方便建立能聞所聞直至生滅既滅寂滅現前方將三重能所如幻之修次第脫盡所謂諸幻既消非幻不滅也彈指明最速也超無學者由其如幻故一修一切修一斷一切斷而此根初解先得人空已與無學齊力空性圓明成法解脫即超無學遠矣何況俱空不生乃至於無上知覺乎五教相究竟此阿毗達摩十方薄伽梵一路涅槃門阿毗達摩此云無比法即稱此根性教法非他教法可比雖云十方亦該三世薄伽梵於十號中與世尊互換出沒具足六義謂自在熾盛端嚴名稱吉祥尊貴多義故不番也一路者三世十方諸佛共由之達道也涅槃獨取萬德周圓五住永寂為義所謂無餘大涅槃究竟極樂之果地也然須以根中圓湛不生滅性為因地門戶故即以為入涅槃之門也夫既為無比教法而又與涅槃為門戶足顯斯經以無上醍醐為教相非酥酪之可及矣如來解釋已竟三大眾開悟於是阿難及諸大眾聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有吳興曰祇夜此云應頌又云重頌即頌上長行也伽陀此云諷頌亦略曰偈不因長行但諷美而頌之二頌合明故云雜糅精瑩此指能詮也妙理清徹此謂所詮也精者其詞微妙瑩者其語明透妙理如說根性即是藏性乃至菩提涅槃喻以蓮華金剛可謂理竅妙極矣絕無纖塵曰清盡其底源曰徹心目開明者謂心眼洞開徹見根性即如來藏頓息馳求無復狐疑矣阿難自此方以委信根性為修證之門不復致疑向下但論倫次及擇一門而已非是更疑也驗證以釋二疑已竟三綰巾以示倫次前偈云解結因次第六解一亦亡正開此科故此承彼而來然佛以六結而喻六根前人見其結數偶同於根數遂謂六結即喻眼耳等六以致喻中六結實有次第法中六根本無次第宛有法喻不齊之過却又不敢以過歸佛而強教後人不可以喻難法是何言歟佛號一切智人而說法先以帶過其何以折伏魔外而垂範人天哉決不然也蓋佛說六結本非即喻眼等橫列之六元是竪推其由真起妄從細向麤展轉六層而後根相備著及其反妄歸真從麤向細亦展轉六層而後根相解除且經文中結之次第與解之次第皆叮嚀具載俱不拘六層而文辭含攝不甚開顯至後觀音圓通逆次解之六結宛然取彼釋此何有法喻不齊之過智者詳之分三一阿難敘請又分三一敘已領阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句無遮有二一人無遮不擇下劣同施上法二法無遮不慳祕密闡露無餘皆以大悲愍念為本故能如此也性即根性此一字屬體下三字皆體中所具義相在染無染曰淨居縛不縛曰妙隨流不變曰常此句屬所詮了義曰真無虗曰實法句即前偈頌此句屬能詮已皆領悟故敘謝之二敘未明心猶未達六解一亡舒結倫次此作兩節而問故佛下亦作兩節答之六解一亡者六結既解一亦不存也舒結倫次者謂舒之與結皆有倫次也三請垂示惟垂大慈再愍斯會及與將來施以法音洗滌沉垢沉垢者即二執與俱空諸細惑也二如來巧示此中取喻非是但憑言說而綰巾示結言相竝彰令人易省誠至巧也分二一巧立喻本又二一元依一巾即時如來於師子座整涅槃僧斂僧伽梨攬七寶几引手於几取劫波羅天所奉華巾溫陵曰涅槃僧裏衣也僧伽梨大衣也劫波羅此云時分即夜摩天二綰成六結又二一歷問以顯次第於大眾前綰成一結示阿難言此名何等阿難大眾俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大眾又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大眾亦復如是次第酬佛此名為結疊華西天之帛價直無量今天獻尤為貴重可知一一問答而結即示結時元有倫次顯然不是橫喻眼耳等六以彼根結元非先眼後耳等也二故問以示結同佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來只許初時第二第三不名為結首五句經文稍以倒亂此疊華巾先實一條當為首二句下接我初綰巾等則文理不倒而意不隔矣此譯寫之誤也此科辯定文長似乎淡無情謂細詳實有關要按後圓通所解六重結相一動二靜三聞四覺五空六滅由前而後則疎親有異由後而前則細麤不同若不與之顯示結同則初心者或忽於疎而始無入門中途者或住於細而終無究竟故示一六結同正欲始終解盡矣誠哉須信佛語深也然不直說而乃故意反問以激阿難自說者將使因喻以詳法矣巧立喻本已竟二分答二問就分二一答六解一亡又二一示從至同而遂成至異此即先示從一成六也葢言未結之先一相不立六相何有所謂至同也既結之後六相定別一相奚存所謂至異也又二一就喻辯定又四一按定同異佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異二強異為同於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不此亦故問反激令其自辯可否也前五句猶是牒成一定次第吾今下方是故問可否也三阿難不計不也世尊六結若存斯第六名終非第一縱我歷生盡其明辯如何令是六結亂名四如來印定佛言如是六結不同循顧本因一巾所造令其雜亂終不得成意言六雖本於一成六在而序尚不可少亂一相豈能復見哉一相尚不可見豈復望其忘一哉就喻辯定已竟二以法合喻則汝六根亦復如是畢竟同中生畢竟異葢言真心本體一相尚不可得六結豈可得哉所謂畢竟同也及其從真起妄而六結已成則其序尚不可亂而其六豈能暫忘哉所謂成畢竟異也示從至同而遂成至異一科已竟二示除至異而仍成至同此即正示六解一亡也番轉上科其意可省分二一就喻辯定佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成嫌六不成者嫌之而不欲其成六結也願樂一成者惟願其還成一巾也鋒起者諍論紛然如兵戈競鬬也尚不名一者葢言既不對於六結亦不起乎一想也六云何成者言一想尚無六相安在哉二以法合喻佛言六解一亡亦復如是法中六固同名六結一乃轉名一真然一亡亦非竝其真體俱失但是既不對乎六結自不立乎一真而已答六解一亡竟二答舒結倫次分二一結之倫次又三一順次成結由汝無始心性狂亂知見妄發發妄不息勞見發塵心性即所依妙明本覺依此橫起無明為狂本經以演若狂性喻於無明故也無明所生三細為亂本經以如是擾亂指於三細故也此即第一結成圓通中當於滅結知見妄發即見法實有乃法執位即二三結成圓通中當於空覺二結二乘涅槃彷彿在茲勞見發塵即見我及我所乃人執位餘三結成圓通中勞見即當根結發塵即當靜動二結三界生死寧能外此此固從真起妄自細向麤結之倫次歷然可見矣二更以喻明如勞目精則有狂華於湛精明無因亂起湛精明即淨眼界也目睛與湛精明皆喻上之心性勞喻無明業識狂華喻法我二執境界即涅槃與生死也於湛精明無因亂起者喻於無法無人淨心中橫生諸結也三逆次合喻一切世間山河大地生死涅槃皆即狂勞顛倒華相上之法喻當從細漸麤以成諸結故名順次今此合文從麤向細故為逆次首二句即六塵境界正當動靜二結生死須依根身正當根之一結以上攝於人執涅槃全是法執正當覺空二結末二句攝歸無明業識而指同前喻也狂勞顛倒即無明業識正當滅結也華相雖合前喻然亦非說眼中空華乃言無明業識所發華相即指生死涅槃之妄境耳同前所謂菩提瞪發勞相但前顯依真此顯依妄張拙謂涅槃生死等空華者此也此雖逆於生起倫次而實順於解結倫次到下舒之倫次其義自明二舒之倫次分二一阿難求解倫次阿難言此勞同結云何解除夫勞兼山河大地生死涅槃阿難乃謂此勞同結足知六結不即指於眼耳等六明矣此則不惟顯舊註分明錯誤亦可驗我所分析之六結非鑿也二如來因問發明分二一先授舒之方法又分四一就喻巧示又三一引悟二邊不解如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊左掣譬觀六根為有則同凡夫之滯有而長淪生死豈能解根乎右牽譬觀六根為空則同二乘之斷空而永晦涅槃安得圓通乎所謂空有二俱非也當知上科生死涅槃正為此空有二非張本矣二引悟中道方解佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散三印定必用中道佛告阿難如是如是若欲除結當於結心結心雖譬中道然非兼彼空有合成中道亦非離彼空有別立中道乃是悟此根性體自在而無繫本不屬有不迷為有而已更不勞於觀空破有也達此根性用徧現而互融本不屬空不晦為空而已更不勞於觀有破空也如後耳根圓通既不執有亦不觀空惟一反聞忘塵頓入由是而二空漸證妙體現而有自破也俱空不生大用起而空自離也是則反聞自性即是結心雙超空有之中道也前人不達強以別安三觀其說支離真為蛇添足也又二邊不解合前知見立知即無明本中道方解合前知見無見斯即涅槃以此雙非空有之中道故即無見之謂也問雙非而不雙即恐非極中答佛既但言空有俱非固當惟奉佛語且體既非有何甞不即空用既非空何甞不即有乎就喻巧示已竟二明法精微阿難我說佛法從因緣生非取世間和合麤相佛說入道因緣隨機淺深麤細不出二種一者頓見本心但離妄緣迴光性地不假識心緣慮諸境自然雙融體用逈超有空由此而登妙覺所謂微細因緣也二者未獲本心依托意識生心立境互破有空假三昧力取證非真終無實果皆所謂世間心境和合麤因緣也以權小權許出世而圓乘律之仍屬世間故也今此解根法門正教不托識心而旋根即是迴光忘塵即是離緣由是乃至寂滅現前發大用真微細因緣也三示說不謬此科所以勸莫疑也分為二一統知染淨因緣如來發明世出世法知其本因隨所緣出孤山曰世謂六凡出世謂四聖六凡為染四聖番染俱淨然六凡以善惡不動業為因以趣生時各所見憎愛境界為緣四聖以多生積薰諸乘教理為因以新遇善知識聞法觸境為緣但權小比現二量多惟得其總相知之未盡如來現量一一別知其詳也二懸知極遠極細如是乃至恒沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由懸知有二一地遠懸知如界外雨滴二時遠懸知如松等元由元由指多劫遠由問無情何有多劫感招答無情勝劣皆有情共業罪福所感如佛對松棘必知此方眾生從無始來為有何等業感生此直松曲棘也餘可類知四勸修必證是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待是故承上言佛智如此則所說解法決無差謬所許證取決不賺誤是故汝當確信選根也諸妄銷亡者即想相為塵識情為垢二俱遠離也先授舒結方法已竟二後示舒之倫次舒法既得則結必將舒不明示以舒之倫次則何以驗其淺深而抵於成功耶故此方示以倫次矣分三一如來反問引悟阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不此以無次第故問令自辯也二阿難悟喻次第不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除六結同體者如云雖同一巾所造也觀此問答則似如來惟恐眾生迷誤成無次第故激其朗然陳說令知決有次第後人何得仍以一根返源六根解脫之證而抗其決無次第耶大抵秪因錯謂六結橫喻六根而不達竪推之義故差謬亦至於此耳三如來乘悟合明分三一總與合定佛言六根解除亦復如是二別開合文又三一先除我執此根初解先得人空按後圓通逆斷之次則此層中含攝三結謂一動二靜三聞也入流忘所是初忘動塵為除第一結動靜不生是次忘靜塵除第二結此當須陀還果斷於我執分別即見惑也次盡聞根除第三結此當後三果斷於我執俱生即思惑也所謂此根初解先得人空也以圓教菩薩常途則當七信此即解前勞見發塵盡世間山河生死也二次除法執空性圓明成法解脫按後圓通則此層中含攝二結覺所覺空先捨智愛即斷法執分別為除第四結空所空滅次捨理愛即斷法執俱生為除第五結所謂空性圓明成法解脫位也葢空人而不空法但得空性之少分而非圓明故法解脫位方得圓明且法執麤細有異執諸法心外實有麤法執也愛所修證勝法不能捨離細法執也今菩薩任運雙斷於忘所時麤執已盡而此二位盡其細執而已以圓教菩薩常途則當八九信此即解前知見妄發盡出世間涅槃也三後除空執解脫法已俱空不生按圓通此惟當於一結謂生滅既滅寂滅現前即脫俱空之境為除第六結也葢解脫法已即生滅既滅俱空不生即寂滅現前夫寂滅不是空境乃本有一真心體即理法界真如實相所謂山河大地應念化為無上知覺時也此若現前萬用齊發豈尚滯於空耶良以生滅既滅雖離前空相而滅相猶存若真寂滅不現前時則住俱空境永為滅相所覆名頂墮位故知寂滅現前方得俱空不生俱空不生方得寂滅現前更互資發如此此即解前心性狂亂盡狂勞顛倒過菩薩乾慧境也問前言空有俱非又言當用中道今何人法二空以破有俱空不生以破空耶答此藥病不分混濫之問難也譬如有人本因元氣受傷標現寒熱二病愚者或服熱藥或服寒藥皆不能愈智者不用熱藥亦不用寒藥但用直扶元氣之藥則此病初愈先退熱病熱病平復寒病亦除寒熱除已調理亦忘法中根性被縛如元氣受傷也有空二執俱結如標現寒熱二病也凡小用空有二邊皆不能解如愚人服寒熱二藥皆不能愈也今經令不著空有如不用寒熱二藥也惟令旋根脫塵如惟用直扶元氣之藥也此根初解先得人空如此病初愈先除熱症也空性圓明成法解脫如熱病平復寒病亦除也解脫法已俱空不生如寒熱除已調理亦忘也是喻中雖得寒熱二病俱除而智者初未嘗用寒熱二藥而所用者惟直扶元氣之藥也法中雖得有空俱破而行者初未嘗用有空之觀而所用者惟旋根脫塵之法也今乃因其所破之執而錯責所用之法誣其著於空有何異因其所愈之病而錯怪所用之藥誣其用於寒熱乎且人法二執圓教獨不當空乎豈可見圓人之證二空而遂責其偏空乎此固因果未別藥病不分之濫而舊註紛紛之辯皆此過矣別開合文已竟三出名顯證是名菩薩從三摩地得無生忍三摩地即如幻三摩提此屬妙因無生忍者華嚴第三忍言菩薩住此忍中不見有少法生不見有少法滅今經示見不分文云菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體此雖正示因地實與無生果地一如此屬妙果攝位雖寬今且目於初住位中如來巧示已竟三大眾悟明阿難及諸大眾蒙佛開示慧覺圓通得無疑惑慧即始覺乃照根性了倫次之妙智所謂道眼也覺即本覺乃根中圓湛之性所謂妙明心也圓通即六根互用周徧圓融之果初住向去分真之位也今雖未依次而解豁然而證實亦決定分明了無疑惑矣綰巾以示倫次竟四冥授以選本根前三大科皆惟教其決定從根解結且示以根結之由解根之法亦言當從一門而入但未分明指示何根可入故阿難至此方以求佛指明也分三一阿難請示本根又三一領前拜謝一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙身心皎然者即心目開明也快得無礙者即暢達而無所障隔也二正請開示分為四一自述迷悟以請雖復悟知一六亡義然猶未達圓通本根一六亡義即六解一亡之義是其所已悟也未達者即尚迷而未悟者也本根即此方對機之根也唯此科末二句是請中要語以後但是哀懇之辭二慶幸遭遇如來世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母飄零即諸趣流轉出無聖眷之濟曰孤入無涅槃之退藏曰露何心何慮葢當孤露之時慶其出於望外也預在也父子兄弟以天合者曰天倫君臣朋友以義合者曰人倫今為佛堂弟故在佛天倫中也於流轉時久無霑於法乳故如失乳兒蒙佛法乳無量故如忽遇慈母也三反言不可無進若復因此際會道成所得密言還同本悟則與未聞無有差別際會道成即師資道合也所得密言即前開示也還同本悟者反言惟守知解不加行證也末二句言徒聞無益也正表須加行證也四正求垂示祕嚴惟垂大悲惠我祕嚴成就如來最後開示惠祕嚴者求其恩施行證從入之妙門也最後開示者究竟全分之慈誨也三請後拜懇作是語已五體投地退藏密機冀佛冥授末二句以阿難大權備曉諸聖各具妙門却不顯然請佛敕眾各說但求佛禮畢即起默聽故曰退藏密機然意中望佛不勞自說但敕諸聖各說則當機自可因言默契故曰冀佛冥授葢上句不欲言請而下句乃以意請是則大權施設之宜師資簧鼓之意於茲備見之矣二佛敕諸聖各說此固順前意請然必令各說者一顯二十五門徧該諸法頭頭可入但取一門當此方機非謂聖性惟通一門也二取諸聖各皆親修現證非空談無驗之法也分三科一佛問諸聖為二一標所告之眾爾時世尊普告眾中諸大菩薩及諸漏盡大阿羅漢惟憑後文佛言彼等修行無優劣差別則此諸聖名位大小法門偏圓皆同一味圓實更不須疑何勞多辯若仍有大小偏圓則佛之後言乃成誑妄安有此理當知此經實在法華之後故經中直許二事修於菩提而曾無驚怪若在法華之前則此經已談實相及佛知見而聽眾各各自知心徧十方乃至獲心常住是其二執蕩然成佛無疑法華更何開顯縱令重說又何驚怪之甚哉且孤山謂教已開顯又云既經發迹皆指法華佛所顯發而吳興謬辯其非似謂孤山說諸聖各自開顯冤哉斯言孤山之屈何所伸乎且吳興執拗強引不了義經橫分大小而優劣差別宛然不混是已公抗佛旨末却又引佛言并偈乃謂開權顯實之正文殊不知汝分優劣差別若是佛言則非佛言若是則汝分優劣差別則非豈得二俱成是乎是始而橫說人非終亦自無決定其言類多如此智者當察孤山之言元順佛旨本無過差也二述告敕之言又分二一先按所成之果汝等菩薩及阿羅漢生我法中得成無學菩薩羅漢并稱無學者正以地上既通羅漢之名菩薩豈避無學之號何況達真了妄修即無修永嘉云絕學無為閑道人不除妄想不求真誌公云不起絲毫修學心無相光中常自在是菩薩無學之明證也二後問入圓方便吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地顯然不問現今深果但問最初方便不言七大攝入十八界中六塵攝前五大根識攝後二大二眾說本因二一眾聖略說以其均是入圓方便故須徧說可以擴人圓融見解又以其不當此方根性故但略說不欲行人亂修也分四一六塵圓通相宗謂塵是賴耶相分斯經謂是如來藏心行人能於一塵發悟則藏性現前故即六塵圓通問此與宗門見色聞聲入道者同耶異耶答不盡同而亦不盡異也宗門人據現生悟處未必是彼修習法門如靈雲豈以桃華為修門耶但是參究疑情逼拶功極忽於見色處瞥的透露而已今四諦不淨甞藥觀法多是所修法門功久證入若此則未敢言同也然宗門人亦有差別因緣具眼師家能預知之如緣在聲處決不於色處悟乃至於人於經棒喝言句等皆各一定不得錯亂推其過去未必不是彼熟習使然也不然則師家何預知之若此則與諸聖亦未敢言異也惟香嚴䟦陀等聞香覺觸等似一時忽然之事則與宗門現生之悟相似耳智者審之就分六一陳那聲塵分三科一作禮陳白憍陳那五比丘即從座起頂禮佛足而白佛言五比丘解現初卷二陳白之言分三一敘悟聲教我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦鹿苑雞園皆古帝王養畜之地五人棄佛於此自修佛成道日先尋度之故曰觀見如來最初成道也佛為五人三轉四諦而陳那先悟成阿羅漢故曰於佛音聲悟明四諦也二蒙印命名佛問比丘我初稱解如來印我名阿若多初稱解者最先解悟也阿若多此云解名實相孚解悟第一者也然最先得度亦前因也三音圓得證妙音密圓我於音聲得阿羅漢妙音密圓者葢佛以一音演說法眾生隨類各得解當說四諦時實行聲聞但領生滅之旨而妙音密圓徹於無作四諦達於如來藏心陳那密發深解證圓實理若大齊小借小果名位當七信以上葢大證相似永不稱於信名借所齊小果為名諸經皆然若名實全取則他經以十地為羅漢而圓人住位全與別地齊平故圓通位亦即是大乘羅漢此說尤妙後皆放此三結答圓通佛問圓通如我所證音聲為上音聲為上者此方真教體清淨在音聞是音聞二字皆為教體聞根乃觀音所證今聲塵是陳那所證葢於聲教得力發悟者也領佛四諦圓旨尋於名句開悟藏心者也葢法華開顯之後人天大眾誰不知佛諸大弟子內祕外現皆大菩薩且楞嚴會上無數大人論量圓通豈有實行聲聞不自忖量妄以偏劣淺悟敢自濫齊於大乘圓通乎縱彼狂妄而如來何緣妄許其無有優劣差別乎由是觀之竝依大乘圓悟無疑而諸不了經皆不必泥也陳那聲塵已竟二優波色塵分三一作禮陳白優波尼沙陀即從座起頂禮佛足而白佛言二陳白之言又分為三科一敘悟色性我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道觀不淨相生大厭離等者因多貪欲佛令作九想觀以對治之即五停心之一也葢佛所設觀門有共不共此大小乘共用之法且根之利鈍與煩惱輕重錯落四句此屬根利而煩惱重者由以圓根而多貪色慾故觀不淨以對治時仍發圓悟即長水所謂因觀色塵本如來藏也以從下超略九想觀耳空色二無者病愈藥除相無不盡也無學準前二蒙印命名如來印我名尼沙陀溫陵曰優波尼沙陀此翻近少亦云塵性謂微塵是色之少分也三色圓得果塵色既盡妙色密圓我從色相得阿羅漢前言空色二無但是相盡此言塵色既盡妙色密圓相盡性現也然仍稱妙色者則色仍不壞而普觀諸色皆即如來藏心周徧法界也羅漢準前可知三結答圓通佛問圓通如我所證色因為上以觀色為入圓之因也優波色塵已竟三香嚴香塵分三一作禮陳白香嚴童子即從座起頂禮佛足而白佛言二陳白之言分三一敘悟香塵又三一因觀有為我聞如來教我諦觀諸有為相諦觀者審實而觀也諸有為相解現前偈謂根塵識等也二靜處聞香我時辭佛宴晦清齋見諸比丘燒沉水香香氣寂然來入鼻中擕李曰晏安息也晦冥寂也清淨之室謂之清齋香乃有為中一法寂然者無相也三即香發明我觀此氣非木非空非烟非火去無所著來無所從由是意銷發明無漏吳興曰凡言性空必推四性今當以木為自烟火為他和合為共空為無因此似衍門觀幻有即空之相此觀四性達香塵生體了不可得而香之相盡其義頗通準佛破法如云徒木無火不香故曰非木香氣不同空性故曰非空燒於別物不香故曰非煙非火也香體既不可得故去無所著而來無所從由是意銷者入無分別也發明無漏者達熾然香體即如來藏心也二蒙印命名如來印我得香嚴號三香圓得果塵氣倐滅妙香密圓我從香嚴得阿羅漢香嚴以妙香莊嚴法身也塵氣二句亦相盡性現也羅漢準上三結答圓通佛問圓通如我所證香嚴為上此與䟦陀雖酷似宗門悟處而尚多假於分別以為入處宗家未必若是多惟功夫極則觸處洞然而已然彼於悟後見諦雖同而證之淺深隨於宿根實不可定而此之諸聖洞見藏心亦無不同而初心證位定在七信以上通於初住是證亦同也不然則不可同語圓通位矣後皆放此香嚴香塵已竟四藥王味塵分三一作禮陳白藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言五百梵天同行眷屬也二陳白之言又分三一敘悟味塵分三一宿因甞藥我無始劫為世良醫口中甞此娑婆世界草木金石名數凡有十萬八千二備達藥性如是悉知苦酢鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能徧知孤山曰眾味共成名和合直爾采用名俱生修鍊炮炙名變異三即味開悟承事如來了知味性非空非有非即身心非離身心分別味因從是開悟舌與藥觸熾然味現故非空雖觸舌現實無形相故非有又味是不可見有對色以有對故非空以不見故非有也身即舌也心即舌識也諸藥不來則舌與識不自現於苦等故非即身心舌識不甞諸藥豈能自現苦等故非離身心分別味因一一追究味因何有從是開悟者忽爾悟得熾然諸味元不從於諸藥及與身心本如來藏真如性也二蒙印命名蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子蒙佛無別號者即指釋迦塵劫為其導師也約初發悟時所證菩薩應亦七信以上通於初住也末二句明其今雖高證深位不改初名三覺味得果因味覺明位登菩薩覺明即藏心開悟也此仍結其最初方便因味得果而已三結答圓通佛問圓通如我所證味因為上藥王味塵已竟五䟦陀觸塵分三一作禮陳白䟦陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言孤山曰䟦陀婆羅此云賢守亦云賢護自守護賢德亦守護眾生開士菩薩別名自開悟而復能開悟眾生者之號也二陳白之言又三一敘悟觸塵又三一宿因入室我等先於威音王佛聞法出家於浴僧時隨例入室此即與常不輕同時增上慢之流也二即觸發悟忽悟水因既不洗塵亦不洗體中間安然得無所有水因者即水為導悟之因也此科當勿迷於論觸葢觸之為塵以身根而合色塵中間熾然覺其冷煖澁滑者是其相也今因沐浴時以身觸水以水合身中間熾然冷煖觸現由是追究此觸因何而有若言因洗塵垢而有耶則塵本無情何能現觸故經云既不洗塵者言既不因洗塵而現觸也若言因洗勝義根之覺體而有耶則覺知之體非洗可著故經云亦不洗體者言亦不因洗體而現觸也中間者推塵推體兩楹中間安然者即徹悟自在之相也得無所有者達此觸塵杳無來處相盡性現本如來藏妙真如性也三習留今證宿習無忘乃至今時從佛出家令得無學威音見諦是為初心今從釋迦證於深位二蒙印命名彼佛名我䟦陀婆羅三觸明得果妙觸宣明成佛子住即觸塵而悟入藏性所謂妙觸宣明也佛子住即是證於初住也三結答圓通佛問圓通如我所證觸因為上䟦陀觸塵已竟六迦葉法塵又分為三一作禮陳白摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言摩訶迦葉云大飲光檢三迦葉尼等自明二陳白之言分三一敘悟法塵又三一宿因感報我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫光金塗佛形像自爾以來世世生生身常圓滿紫金光聚以然燈塗佛二種勝因故感歷劫紫金身光袒衣吞日二兼同眷屬此紫金光比丘尼等即我眷屬同時發心尼兼身同餘惟果同三觀法得果我觀世間六塵變壞惟以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢觀六塵者正觀法塵為總前五為別葢觀前五塵謝落影子兼總別而稱六也變壞者葢法塵托意識暫現即過剎那剎那念念生滅厭此變壞加修空觀入滅盡定此定能滅意根空法塵也定深故能度劫甚久同暫溫陵謂今在雞足山待彌勒入此定也我以空法者觀破法塵相盡性現悟入藏心矣羅漢準前二蒙佛印可世尊說我頭陀為最溫陵曰頭陀新云杜多此翻抖擻以能抖擻法塵為號也三法明滅漏妙法開明銷滅諸漏法融藏心故妙開明藏心既入永無漏落故言銷滅果之實也三結答圓通佛問圓通如我所證法因為上六塵圓通已竟二五根圓通六根缺一者留耳根為殿後所以當此方之機也參詳五根四中俱有旋反字面以根性法門均是旋根脫塵之旨塵識不然細玩可見就分為五科一那律眼根分三一作禮陳白阿那律陀即從座起頂禮佛足而白佛言長水曰那律即阿㝹樓䭾此云無貧亦云如意乃白飯王子也過去世以一食施辟支感九十一劫受如意樂二陳白之言分四一因訶失目我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目孤山曰增一阿含云佛在給孤園為眾說法那律於中眼睡佛說偈訶云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字那律於是達曉不眠眼根便失二承示三昧世尊示我樂見照明金剛三昧樂見即旋見忘塵照明即發本明耀也準耳根圓通乃是反見見自性之功夫也謂之金剛三昧者表心眼現前如金剛堅固不可破壞非如肉眼易破壞也三遂得心眼我不因眼觀見十方精真洞然如觀掌果不因眼者不因肉眼也精真洞然者即如來藏心發本明耀心眼洞開也準耳門應云初於見中入流忘所所入既寂明暗二相了然不生此則位齊初果即應心光漸發如是漸增見所見盡此則位齊七信四果即應大發本明徹見十方也然既同於圓證則盡見不住乃至寂滅現前亦應齊等也舊註較量阿含諍分大小皆不必然以佛既開本均屬內祕凡所修證何法不圓四蒙佛印證如來印我成阿羅漢準前三結答圓通佛問圓通如我所證旋見循元斯為第一旋見即反見見自性循元即證入圓通也那律眼根已竟二周利鼻根分三一作禮陳白周利槃特迦即從座起頂禮佛足而白佛言溫陵曰槃特此云繼道長水曰特迦亦云蛇奴於路所生二陳白之言分四一因闕誦持我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前長水曰過去為大法師祕吝佛法不常教人後感愚鈍以宿善故遇佛出家五百比丘同教一偈經九十日不成別經有言教誦條帚則得條忘帚得帚忘條二奉教調息佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那長水曰佛令數息攝心因而了悟經雖云調即兼數意調者按天台止觀當離風氣喘等而幽綿自在也數則從一至十或至百而後逆數至一良以暗鈍遠因雖本愚痴近緣亦由雜亂故令數息攝住不雜餘緣然數出不數入雙數則病我時下觀息盡詳也得定則微細定深則窮盡四相出息入息皆具初起曰生不斷曰住漸微曰異已斷曰滅諸行即生等遷流剎那最短一念即具九十剎那言至微細也調息似六妙門數隨止餘似觀還淨在下科三開悟得果其心豁然得大無礙乃至漏盡成阿羅漢豁然無礙者即就鼻息窮盡處豁悟鼻根通於藏性所謂聖性無不通也然藏性澄清萬法朗鑑無復障隔豈有憶忘乎故曰得大無礙漏盡羅漢竝以準前四蒙佛印證住佛座下印成無學準前三結答圓通佛問圓通如我所證反息循空斯為第一反息循空者只是觀息反歸空滅即悟入藏性以成圓通果也問鼻以嗅為用今於旋根而不取反嗅乃取反息何也答嗅性正托於息所謂出息取香入息聞香也但此攝心何須反嗅及其發悟終因息盡故屬鼻根圓通周利鼻根已竟三憍梵舌根分三一作禮陳白憍梵鉢提即從座起頂禮佛足而白佛言溫陵曰憍梵鉢提此云牛呞牛凡不食亦事虗哨此人口如牛之哨乃輕弄報也二陳白之言又分四一口業招報我有口業於過去劫輕弄沙門世世生生有牛呞病見老僧無齒而食笑之說其似牛故世世感生牛舌常如牛呞口業可畏如此二奉教止觀如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物此佛本欲教以舌根圓通乃先令其止散入寂後教其從寂起照觀察甞性也故此首三句即先賜以數珠令其念佛也而謂之一味清淨心地法門者葢念佛時止諸雜緣純一淨念故也次二句即止散入寂先成念佛三昧也末二句即後教其從寂起照觀寂甞味知性非從根體亦非從物味也良以外味不來根不自甞故非體舌不觸知物不自味故非物也當知念佛非但遮謗而遮謗乃餘益耳二超離得果應念得超世間諸漏內脫身心外遺世界遠雖三有如鳥出籠離垢銷塵法眼清淨成阿羅漢了達甞性既不從根又不從味豁然悟其本是藏性然性現如日出漏盡如霜消故諸漏頓盡內脫身心即解根脫縛也外遺世界即超越器界也達三有本空方為遠離更無依正纏縛故如鳥出籠此即齊於四果七信方同四卷末文所謂根塵識心應念銷落也今言離垢銷塵法眼清淨者即彼文所謂想相為塵識情為垢二俱遠離則汝法眼應時清明也文全相似請詳彼解自知此證非是小乘之果宛然信滿入住矣四蒙佛印證如來親印登無學道準前三結答圓通佛問圓通如我所證還味旋知斯為第一還味旋知者即反觀甞味知性悟入藏心也矯梵舌根已竟四畢陵身根又分為三一作禮陳白畢陵伽婆蹉即從座起頂禮佛足而白佛言孤山曰名番餘習昔為婆羅門故餘習多慢如罵河神為婢非彼實心蓋習氣也二陳白之言分五一聞談苦諦我初發心從佛入道數聞如來說諸世間不可樂事發心即出家也世間不可樂事即四諦中苦諦也如三苦四苦八苦等也二注思傷足乞食城中心思法門不覺路中毒刺傷足舉身疼痛法門即苦諦也奉教思苦而適遇苦事實發悟之機也三研窮身覺又二一敘述二覺我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺首二句敘知痛之妄覺即身識也次三句敘無痛之真覺即身根覺性與見聞同等者也雖覺覺痛者言據上雖有能覺之心與所覺之痛而身根中無分別清淨覺心本無所覺之痛與能覺之痛覺也二研窮無二我又思惟如是一身寧有雙覺雙覺謂知痛之覺與覺清淨心也此起智轉思身既是一覺豈有二所謂一則真二則妄也四入空得果攝念未久身心忽空三七日中諸漏虗盡成阿羅漢攝念者即惟隨順無痛清淨之真覺而不復隨順知痛之妄覺也未久之間身心忽空者蓋攝心之極真純妄絕身心豁然同虗空矣諸漏虗盡者真覺藏性現前而欲有無明了不可得焉羅漢同前五蒙佛印證得親印記發明無學無學準前三結答圓通佛問圓通如我所證純覺遺身斯為第一純覺純一真覺也遺身身心忽空也一遺一純亦含旋意矣畢陵身根已竟五空生意根分三一作禮陳白須菩提即從座起頂禮佛足而白佛言二陳白之言分三一宿命知空又二一遠通宿命不忘我曠劫來心得無礙自憶受生如恒河沙心得無礙者即無隔陰之昏出胎之昧也二依正自他皆空初在母胎即知空寂如是乃至十方成空亦令眾生證得空性首二句正報空也在胎則能隨相受生知空則能達理不昧空寂者五蘊皆空生體了不可得也次二句依報空也自母身外洎山河大地悉同空寂也此即深心菩薩人法雙空境界以上總屬於自空末二句即出胎廣化眾生同悟空理空性且作人法二空真如未是顯了藏性以下文方顯了故夫處胎不昧人法雙空自是二乘及初心菩薩皆所不能何況具足二利大乘深位復何疑乎約談初心方便且在十信滿心二承教證入又為二一悟證自果蒙如來發性覺真空空性圓明得阿羅漢發者與之發明也性覺真空影性空真覺即如來藏心清淨本然周徧法界空性圓明即色空無礙所謂全體圓融大用無限若此而阿羅漢之證於十地大人復何所歉科言自果對下佛知見言非對眾生也二同佛知見頓入如來寶明空海同佛知見此似超入後心故言頓入寶明空海即所謂一真法界第一義空又曰畢竟空也此則寂同於佛矣佛知見即前圓彰三藏所謂大智慧光明義也此則照同於佛矣別經明須菩提乃過去青龍如來觀此則上句似同涅槃下句似同菩提此葢良由已經如來開顯故自說深心無復隱祕耳顯文明證如此而舊云皆作小宗分別無咎殊不知解深為淺抗佛誣聖烏得無罪幸戒之三蒙佛印許印成無學解脫性空我為無上小乘證空空縛非真解脫又是三昧非本性空斯則人法及與俱空一切解脫所證空理乃一真本有真空不空之性體也我為無上者窮盡空理更無加尚也陳白之言竟三結答圓通佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一諸相所謂我相人相眾生相壽者相及與法相也非空也諸相入非即人法雙空也非所非盡者即能非與所非俱盡也所非即上諸相能非即上諸非所謂非法相也是即空所空滅藥病雙除之意也旋法之法指一心法即意根中知性非謂法塵也旋法歸無者即旋知性歸於畢竟空也永嘉云有無俱遣不空空又云諸行無常一切空即是如來大圓覺此之謂也與耳根圓通較之此多顯體彼多顯用而宗家悟處雖於諸門徧有而主於此門者為尤多良以或明或暗多惟取於知之一字故也五根圓通已竟三六識圓通夫經初徵破識心呵為生死根本眾生誤認枉入輪迴權小依修竟無實果何今復可入圓通乎蓋前於識大徧周中已申斯辯今請重申夫識雖塵影虗妄之極而離一真見分無別自體譬影之於水雖極虗妄而離水無別自體但迷執者認識忘真而橫成流轉譬痴人認影忘水而誤遭淪溺利害非細不得不呵也倘悟者即識見真而識非真外圓通何疑如智者觀影知水而影非水外尚可得水之用豈遭其淪溺乎故此六聖并後彌勒皆能即識見真故皆證於圓通而無礙也宗門云起滅紛紛是何物此之謂也問如來何不直令人即識見真何必呵之而必教人依根入乎答偈云聖性無不通順逆皆方便初心入正定遲速不同倫正以塵識皆遲而惟根最速故也譬呵二乘豈是終不成佛但劫經塵點遲純之極故呵初學勿發是心也就分為六科一鶖子眼識前五識有二種難辯一者與前五根混以其難分別而隨念麤略頗似無分別之根性愚法聲聞罔不迷之故規矩云愚者難分識與根是也二者與五俱意識混以其雖麤略而隨念分別頗似意識之計度故小教不知前五非意識而心法惟一也吳興說識率多混濫亦是此迷然則性宗學者當勿忽於法相可也今請略明眼識之相餘四準知如眼照境時一念不動但如鏡中無別分析此眼根之見性也於中用目循歷黑白大小多少善惡等相歷然不混此不帶名言隨念麤略分別即眼識也由是次第標指追究分析無量差別此徧執名言計度詳細分別即眼家俱意識也又名明了意識今但取於第二眼識而根性與俱意但不得混濫之分三一作禮陳白舍利弗即從座起頂禮佛足而白佛言二陳白之言又分為三科一眼識夙利我曠劫來心見清淨如是受生如恒河沙世出世間種種變化一見則通獲無障礙此亦敘多生眼識久利也心見即眼識清淨即無障礙世出世間即一切凡聖境界種種變化即差別幻妄如事業法門因果等相一見二句謂不勞多力惟眼識隨念麤略分別即表裏洞徹此正顯其是眼識利也二逢教增悟我於路中逢迦葉波兄弟相逐宣說因緣悟心無際此迦葉即兄弟三人者名現目連通中別經謂逢馬勝者但取則師所云宣非一人彼此互出是也因緣當依上乘圓義而解如佛偈云因緣所生法我說即是空亦名為假名亦名中道義此四句依次即藏通別圓四教或每教俱該四句而鶖子所解決徹圓理故悟藏心周徧法界也三從佛高證從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生見覺即眼識明圓即證極得大無畏即說法具四無所畏以見之徹故說之無歉耳羅漢準前身子智慧第一聲德居長故稱長子從是而知身子智慧皆眼識利也次二句即釋成長子亦檢別於羅候聞佛說而悟法身故云從佛口生在教法中長養聖胎由是法身從微而著故曰從法化生別經言身子乃過去金龍如來則知七日達法半月證果皆示現而已總非真實何必諍其從人聞法之殊三結答圓通佛問圓通如我所證心見發光光極知見斯為第一心見發光即眼識證徹也同於靜極光通達光極知見同於寂照含虗空其朗鑑萬法之勝用可以知其源矣鶖子眼識已竟二普賢耳識分三一作禮陳白普賢菩薩即從座起頂禮佛足而白佛言擕李曰行彌法界曰普位隣極聖曰賢此非地前乃金剛喻定居眾伏頂名之為賢與文殊皆古佛影響大鈔中名位義多今但從要二陳白之言分三一輔化埀範我已曾與恒沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名紹佛家業故為法王之子菩薩根者圓頓根也普賢行即十願王舉一色一香俱周法界者也沙界十方凡修普賢行者皆從立名可謂垂範之極矣二耳識鑒機世尊我用心聞分別眾生所有知見溫陵曰心聞耳識也分別眾生知見者擇普賢行而成就之三普護行人若於他方恒沙界外有一眾生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我於其人暗中摩頂擁護安慰令其成就有一眾生者極言其不遺一人非謂止論一眾生也界以沙記則界中眾生益無量無數分身百千極言其多非局數也先於障輕者顯然加被次於縱彼下并言障重者冥中加被也末二句雙承冥顯二加言擁護令無魔障而速開發也安慰令無退墮而益精進也成就者淺位則普賢根成深位則等覺行成三結答圓通佛問圓通我說本因心聞發明分別自在斯為第一雖古佛久證而亦有最初本因故表其元從耳識而入也惟用耳識隨念分別普照羣機得大自在也普賢耳識已竟三孫陀鼻識分三一作禮陳白孫陀羅難陀即從座起頂禮佛足而白佛言二陳白之言又分為四科一出家心散我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏定心不成難以破惑故未剋果二奉教觀鼻世尊教我及拘絺羅觀鼻端白拘絺羅共稟鼻識法門同行者也鼻端即鼻尖也白乃注目諦觀鼻尖微有白相也因其散亂心多不成三昧教其惟觀此白住心不散三從鼻悟證又二一初見息烟而悟徹我初諦觀經三七日見鼻中氣出入如烟身心內明圓洞世界徧成虗淨猶如琉璃烟相漸銷鼻息成白溫陵曰息由風火而起鼓煩惱濁故其狀如烟昧者不覺惟諦觀能見六交見火燒息能為黑烟紫焰皆煩惱所發也淨觀發明則煩惱漸消故內明外虗而烟消成白身心下即定成之相上二句分言內外各明即內徹五臟外徹大千次二句總言明透而喻以琉璃末二句黑烟變白驗知煩惱銷也二次化息光而證果心開漏盡諸出入息化為光明照十方界得阿羅漢首句即藏心顯現煩惱無餘已轉煩惱而成菩提故息化為光合心境而一如故照十方界四蒙佛授記世尊記我當得菩提即當來成佛也三結答圓通佛問圓通我以銷息息久發明明圓滅漏斯為第一此亦不取嗅香時鼻識分別而但取觀息之意準前鼻根可知餘皆意在上文可了孫陀鼻識已竟四滿慈舌識分三一作禮陳白富樓那彌多羅尼子即從座起頂禮佛足而白佛言二陳白之言分三一宿辯說法此科先敘曠劫諸佛會下之事同法華經又二一久弘權實我曠劫來辯才無礙宣說苦空深達實相辯才即四無礙苦空二乘權義實相一乘實義二廣衍微妙如是乃至恒沙如來祕密法門我於眾中微妙開示得無所畏乃至者從一佛法藏乃至無量諸佛法藏祕密者盡其深玄也微妙者極其善巧也無畏者亦即四無所畏也二承教得果此科下方敘本尊釋迦會中之事又分二一承教音輪世尊知我有大辯才以音聲輪教我發揚知有大辯者即知前科曠劫大本也溫陵曰佛以身口意三輪應物無滯音聲即口輪也佛因材而篤復授以如來音輪益以輔揚大教所謂矢上加尖也二輔化得果我於佛前助佛轉輪因師子吼成阿羅漢助輪則上輔佛教師吼則下化眾生皆顯利他而成阿羅漢亦顯其不失自利據前自敘及法華佛敘其大本莫測豈止十地今就敘述圓通其果位且同眾例二蒙佛印許世尊印我說法無上此惟證其說法第一如法華經所敘是也三結答圓通佛問圓通我以法音降伏魔冤銷滅諸漏斯為第一魔冤應通內外內則心魔冤尤因說破而除滅外則天魔冤害因顯發而退藏銷漏即入圓通也問此何不取別味而獨取於說法乎答二俱舌識功能而說法為勝故偏取之然說法似須意識深細分別而今獨用舌識亦見說法自在但用隨念不勞計度而發無不盡也滿慈舌識已竟五波離身識分三一作禮陳白優波離即從座起頂禮佛足而白佛言孤山曰優波離云上首以持律為眾綱紀故或云近執佛為太子彼為親近執事臣故二陳白之言分三一親見成佛我親隨佛逾城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏先言貪欲者首舉欲漏也復言諸漏者撮略有漏及無明漏等耳此但初敘來由尚未干於身識也二秉戒得果承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢承佛教戒即授二百五十條聲聞戒也如是下即菩薩戒人知波離位居聲聞但秉麤戒今自敘乃極至菩薩八萬微細戒品足知是大菩薩示現也溫陵曰行住坐臥律儀各二百五十對三聚成三千復以三千配身口七支成二萬一千復配四分煩惱成八萬四千三聚者謂攝善法攝律儀攝眾生也四分煩惱謂多貪多嗔多痴及等分也性業者謂所戒之法體性即惡如殺盜淫等也遮業謂所戒之法體性非惡但能開諸惡門為前方便故止絕以遮諸惡如酒等是也末二句雖言所證之果而單戒豈能剋果當知身心寂滅即因戒所生之定成阿羅漢即因定所生之慧約外現即滅盡定與人空慧約內祕即楞嚴大定與圓通慧而羅漢亦準前矣三蒙佛印許我是如來眾中綱紀親印我心持戒修身眾推無上此印與名相孚為眾綱紀者實用稽察持犯功過也印心者印其持戒修身之清淨心也末句正明其為眾上首也三結答圓通佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一初且執身者葢因身犯尚多不暇細究心品也自在者即無毀犯也次第執心者葢因身已無犯不勞檢制然後細檢心品以至八萬也通達者當依圓師作所發之定慧無差以末二句即當歸結身識圓通故通利二字即是從身識而證入圓通之境也本文制身制心元無分於大小且不必辯至經後臨文再當辯之問此何不取覺觸之用而但取持戒功能答此亦以覺觸之用劣於持戒故爾也波離身識已竟六目連意識分三一作禮陳白大目犍連即從座起頂禮佛足而白佛言二陳白之言又分為三一遇教發心我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣說如來因緣深義我頓發心得大通達孤山曰優樓頻螺此云木瓜癃胸前有癃如木瓜故伽耶山名即象頭山也亦云城城近此山故兄弟三人故身子云逢迦葉波兄弟即其人也溫陵曰因緣深義謂非世間和合麤相亦當準前身子圓通中即彼圓義也發心即意識圓通大通達即至圓通境也問前言意識起滅無端今言圓通何以致然答了見意識起於藏心離藏心無別意識由是即入藏心而圓證也二蒙度證通如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢首三句度之為僧下五句證之成果著身自落皆佛神力隨言成就也我遊二句神境通也次二句總言神通第一也上科已得意識圓通之體此四句大發意識圓通之用證果準上三諸佛印許寧惟世尊十方如來歎我神力圓明清淨自在無畏首句明不惟釋迦印其神通第一次四句明諸佛同許也全發性真故圓明遠離依業故清淨無不如意故自在無能摧制故無畏三結答圓通佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一溫陵曰旋湛者旋意識而復妙湛也即轉意識而證如來藏心耳心光發宣即發神通妙用也次二句復以喻明也清瑩者水澄而萬象影現也澄濁喻旋意識久清喻發神通問此何不取緣慮法塵之用答作意運通正緣法塵之妙用也六識圓通已竟四七大圓通前五大即塵後二大即識與根雖不出前根塵識三而特具用徧廣大之象故別得大名就分為七一烏芻火大分為三科一作禮陳白烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言溫陵曰烏芻瑟摩此云火頭即火頭金剛二陳白之言又三一因欲得觀又二一宿生多欲我常先憶久遠劫前性多貪欲欲即淫欲諸聖遠劫俱有在凡實因不可作別端迴互而釋二遇佛授觀有佛出世名曰空王說多婬人成猛火聚教我徧觀百骸四支諸冷煖氣溫陵曰多婬之人本由煖觸迫發生為欲火死為業火業力增熾故成猛火聚也教我下即令觀身火大也末句冷字譯文誤耳應云諸煖觸氣方順火大而且合結文葢多婬之人既火大增熾而業火將起故令徧觀百骸四支中火大先欲其知懼而頓息淫心然後將錯就錯可成妙觀二觀成得名神光內凝化多婬心成智慧火從是諸佛皆呼召我名為火頭禪觀中徧見身中惟一火聚既怖且厭而遠離欲念然火雖熱腦而體具光明今婬心息而無復熱腦惟見光明即智慧火故曰神光內凝等也末三句雖表得名亦顯其為諸佛同印許矣三證果發心我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔冤住火光三昧者徧十方界惟一火光從此三昧成阿羅漢者由此正受發如來藏性火真空性空真火成因地心證七信以去入於住位也末三句發心護法者良以火光三昧雖是內境能現外相溫陵曰佛陀本傳云師入火光定其室如焚近世亦有梵僧至京師住是三昧人於夜見火光滿寺遠近奔救足知威力能怖魔冤三結答圓通佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶燄登無上覺斯為第一觀百骸四支中火大即是觀身察其皆由婬心熾盛所發即是觀心暖觸總目火大也婬心已息而不成業火故無礙也神光智火融於藏心周徧法界故流通漏銷者以智慧火燒煩惱薪何所不盡生大寶𦦨者火大圓通之妙用摧魔護法無量威力也登無上覺則顯明大本齊佛而示居輔化之位矣大抵諸聖德位相侔而迹有權實言有隱顯學者當略迹取本得意忘言不可妄分大小而岳師必待如此文明說方成半許何執泥之深乎且解中為一冷字所誤平釋四大觸塵濫五圓通安有此理火大圓通已竟二持地地大分為三科一作禮陳白持地菩薩即從座起頂禮佛足而白佛言先平外地因了心地遂持本悟圓證藏心故名持地二陳白之言又三一積平地行此科全敘平外地也又分為二一正取平地之行又三一從古佛世我念往昔普光如來出現於世二出家平地我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土要路指陸地言眾所必由之路也津口指水處言即渡頭也田地不取種植但重行路俯仰高深曰險左右迫狹曰隘不如法者不寬平也隘則必妨險則多損高則平之下則填之橋梁以利津口沙石以治要路三經多佛世如是勤苦經無量佛出現於世正取平地之行一科已竟二兼敘効力之行又分三一豐時全捨或有眾生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直闤市垣也闠市門也詣往也不取其直不受顧價葢別希勝報不邪命活也二饑年節取毗舍浮佛現在世時世多饑荒我為負人無問遠近惟取一錢吳興曰毗舍浮此云徧一切自在意以饑世乞食則難略取存命不多貪也三神力拔苦或有車牛被於泥溺我有神力為其推輪拔其苦惱願行所在而助以積劫福報故感具神力遂其願行耳積平地行已竟二蒙平心教夫平地之行志在普利效力之行不檢親疎其心亦久平矣何至此而方蒙平心之教乎蓋前屬事相平心未能悟理今令悟知內心外地本惟一體故惟務平心不分情器則境隨心轉無有不平較前豈不天淵乎又分二一因平地待佛時國大王延佛設齋我於爾時平地待佛時即佛在世時平地者即修佛過之路也二領平心之教毗舍如來摩頂謂我當平心地則世界地一切皆平摩頂者憫其事行久勞攝受加持令其歸理也平心地者通達有情無情俱為一體正報依報無分自他乃至凡聖因果等一切皆如是也世界地平者外由內感物隨心變也天台云心分垢淨見兩土之升沉故知娑婆心險感陵谷之高深極樂心平致地平之如掌此其驗也故如來因其惟務平地而特教平心令知要也三權實雙證因其文中有迴心故知由權入實以漸而入葢不定性中聲聞菩薩不定者也良由多劫願行便主利人非純求自利之輩分二一悟取權乘先取小果也又三一悟內外地同我即心開見身微塵與造世界所有微塵等無差別此之心開便與聲聞不同既達地大平等非惟不復執身為我亦將達法唯心矣二於諸觸自在微塵自性不相觸摩乃至刀兵亦無所觸此即分達法空知微塵自性空無所有則知能觸地大與所觸地大一切皆然故刀兵為外地大身為內地大以身觸刀如斬光截影了無所傷也肇法師云將身臨白刃猶若斬春風彼但證性無傷六祖延頸刺客三揮利刃俱如斬影是也三悟無生證果我於法性悟無生忍成阿羅漢此無生忍且取生空達蘊中畢竟無我也譬如打鐵麤垢先落耳以分達法空時尚悟地大了不可得況地大中我豈不速空乎此阿羅漢實證四果悟取權乘竟二迴證知見迴心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首蓋雖暫取生空而利人習性惟樂菩薩願行是以速即迴心也言今入者葢指賢劫為今未必獨指釋迦會中葢曠劫為事行菩薩至莊嚴劫尾方斷見思成阿羅漢賢劫初即迴向真乘諸如來意指賢劫四佛及十方現在如來也法華會上聞知見地者葢法華知見即此經如來藏性悟此為地所謂一乘寂滅場地首先證明者由其從凡入聖自權向實皆持地大為起行入理之門而今復聞此究竟性地機緣契合是以為法華證明上首也三結答圓通佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一此備敘前悟而已二塵即內外二地大也虗妄發塵者葢悟地大相妄而其性但是如來藏性循業妄現而已人知持地為法華上首而不知如來知見契彼究竟地大此經方以顯其大本矣塵銷智圓者相盡性現理智一如也成無上道者已入最上一乘之知見也持地地大已竟三月光水大分三一作禮陳白月光童子即從座起頂禮佛足而白佛言童子乃菩薩別名表童真德也世人即作幼童之想如塑畵善財是也又儒者聞大權經說孔子為定光童子則怒其𢍉小不知文殊為釋迦九世師祖而亦稱童子何有𢍉小之意乎月為水摩尼所成故號月光二陳白之言又三一古佛授觀我憶往昔恒河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地水天者證水大徹於性天也或此佛亦從此大入圓或佛具萬德而但觀時機當從此入故示號與觀相應耳末三句總示所授觀法其詳在下修習中當自見之二依觀久修又二一習觀初後初身後界以漸而入觀之序也分二一初觀身中觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同首二句總一略標無奪二字作不相乖異釋之與下一同二字相為叫應初從以下釋成無奪之意涕唾便利近外水相浸液精血涉內水相由外及內自內而外故曰身中旋復又涕唾津液水之清相精血便利水之濁相清濁雖異水性無別故曰水性一同即無奪之謂也然發解入觀必始身中者欲其深觀成時則我法二執俱空二後合界外見水身中與世界外浮幢王剎諸香水海等無差別觀內既熟引伸外廣資中曰準華嚴經華藏海中有大蓮華其蓮華中有諸香水一一香水海為諸佛剎世界之種華藏世界在香水中故云浮幢王剎華藏二十重累高如幢最為高大故稱王今觀身水與彼海同故曰浮幢王剎諸香水海也須更知華藏是總一大香水海其大蓮華是總蓮華其蓮華中有無量香水海一一海中各有一華上擎二十重剎種每重世界皆以剎塵增數紀之今觀水大惟論於海幢剎但帶言耳即此觀境大不思議誠非凡小權乘可及然充擴至此者欲其深觀成時則了達性水真空云云乃至周徧法界則我法二空不待言矣二觀成淺深上方領旨習觀此科乃觀成之相然先淺後深亦成之序也就分二一初成未得忘身二一標身未忘我於是時初成此觀但見其水未得無身是時即初授習時成此觀者即成身中水性一同之觀也但見其水者葢入定之時不見一物但見湛水徧十方界此句便是觀成之相末句正表初成尚淺未至空身也二即事以證證其尚為身累也又三一定中現水當為比丘室中安禪我有弟子窺窓觀室惟見清水徧在室中了無所見首句時也次句即作水觀入正受也滿室現水資中謂為定果色然此色係獨影境惟自見之而前之火觀今之水觀皆能令他人見之亦觀力殊勝不思議境也二投物心痛又二一正敘痛由童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頓覺心痛如舍利弗遭違害鬼舍利弗水邊入定由宿冤故被違害鬼一掌出定頭痛今出定心痛故言同彼二無知起惑我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失欲知羅漢有病無病當明子果二縛夫宿種今種應召來果而尚未受身者謂之子縛宿種所召今已受身即身應受謂之果縛若實行聲聞新證四果已將子縛斷盡不受後有然現身尚未灰滅則果縛猶存所有病苦即身應受故舍利頭痛畢陵眼痛皆斯類也問前言舍利古佛豈有果縛答既示同實行但依實行論耳若入滅後悲願再來則二縛俱無更無實病苦矣今此菩薩久證再來正同此類故起斯疑三除去如初如初謂無痛也分四一童子具陳爾時童子捷來我前說如上事捷速也二教以除去我則告言汝更見水可即開門入此水中除去瓦礫三復見依除童子奉教後入定時還復見水瓦礫宛然開門除出四出定無恙我後出定身質如初溫陵曰漢州綿竹縣水觀和尚迹同月光二後方亡身合界逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別逢無量佛則所經多劫可知住於淺定經時甚久而上敘久得羅漢則知羅漢果位雖具神通而受身不免身累且在定痴暗進退遲鈍悉可見矣如是乃至下明深觀方成之時也亡身合界真空無二者觀境極深且大性合真空所謂性水真空性空真水周徧法界回視此身如巨海一漚豈不易忘而得自在乎夫論觀行位中淺觀深觀皆難定於果位今約前淺觀已言久證羅漢則斯深觀成時合是超過七信而證於初住圓通之境大抵詳此菩薩亦是先權後實以漸次而入者也三今證菩薩今於如來得童真名預菩薩會如來指釋迦預在也菩薩會葢是深位非前信住可局也三結答圓通佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一一味即身中水性一同流通即界外剎海無二得無生忍即性合真空是因地心圓滿菩提即證徹法界是果地證也似與佛位齊矣月光水大已竟四琉璃風大又分三一作禮陳白琉璃光法王子即從座起頂禮佛足而白佛言取後所悟洞徹得琉璃號二陳白之言又三一古佛示觀又分為三一標遠劫佛名我憶往昔經恒沙劫有佛出世名無量聲聲乃臍輪風起鼓之而出此亦名合風大二示能觀本智開示菩薩本覺妙明本覺妙用具含三德本覺即法身妙即解脫明即般若據此科但是本智望下科所觀故此作能觀為發照之源也三示所觀風力觀此世界及眾生身皆是妄緣風力所轉此科尚是佛所示觀總言依正皆屬風力所轉詳在下科別示妄緣二字發風之端人知世間有風不知妄心緣動所感所謂搖明風出是也二觀破羣動即從本覺妙明發照而觀故此為所觀之妄境也又三一歷觀動同我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別吳興曰界為方位故安立世為遷流故動時界之安立風輪執持時之遷流風氣宣使身之動靜風力所轉心之動念風起之源諸動總該界等無有差別原歸上文通一風力二了動虗妄我時了覺此羣動性來無所從去無所至十方微塵顛倒眾生同一虗妄首四句自覺妄也來無二句同空華也若實有從有至即非虗妄末三句覺他同妄也十方微塵者且舉廣多眾生同一妄也三閱世喻狂如是乃至三千大千一世界內所有眾生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙上科是法此科是喻如是乃至者擴充極盡之辭三千下盡一世界喻意有二一喻其小而非大二喻其妄而非真良由以本覺妙明為體故空生大覺如海一漚極大成小也微塵國土漚滅本無諸有虗妄也觀心境同但偏風大耳觀破羣動已竟三頓證徹悟上科總是觀行此科是彼觀行所證也又三一逢佛速證逢佛未幾得無生忍逢佛即逢無量聲如來也未幾明取證之速也既了來無所從去無所至萬法當體皆無生滅即本覺體故速入無生忍位矣二心開事佛爾時心開乃見東方不動佛國為法王子事十方佛已悟無生故本覺心開見動中不動而親於東方不動如來為法王子乃至徧事克肖諸佛三身心無礙身心發光洞徹無礙此得名之由也了妄身心皆屬風力見法身真心洞徹如淨琉璃也三結答圓通佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一玅心斯為第一觀察風力了妄也悟菩提心達真也入三摩地證圓通也合十方佛同佛果也傳一妙心化眾生也妙心即性空真風性風真空心也琉璃風大已竟五空藏空大分三一作禮陳白虗空藏菩薩即從座起頂禮佛足而白佛言二陳白之言又三一標同佛證我與如來定光佛所得無邊身無邊身即佛十身中虗空身也與法雖無異體而義相須別法身離一切相而偏融一切此虗空身帶目前空一顯色而偏融空大清涼云混虗空為體性是也此科略以標盡下乃詳明二詳明神力由後文總結云此大神力故取為科名亦明所證無邊身相非同凡小所取頑斷沉冥無用之境也又二一空色無礙又為二一會色歸空爾時手執四大寶珠照明十方微塵佛剎化成虗空四大寶珠舊註誤因後文四大無依之句而斷四大二字作地水火風即以此為四珠不知四大是所觀之境須取能觀之智方有珠義按華嚴取海中有四寶珠能消海水喻菩薩有四智珠以消散善法愛等性海中波浪也今此約照空塵剎之智應是人空法空俱空真空四珠也當以大寶二字連珠字讀之大者表其稱性洪廣寶者彰其利用可珍也手執者明授持有自也然前三破迷第四證體下十方塵剎方是統言四大成空也塵剎具足依正即內外四大也虗空兼含遮表遮謂遮惑空無表謂表性空淨問所表真性何亦言空答妄盡真純成第一義空所謂彌滿清淨中不容他非謂真體亦斷滅也二融空即色又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際此科於三大中次得相大證般若德如珠之光亦如將前淨金成諸妙相也大圓鏡即大圓鏡智內放十光者從一鏡智而現十智同真如華嚴二世智乃至知無邊諸佛智或即十力亦可以十力元即十智況經明言神力問與前四智何別答前屬趨體智此屬起用智而大圓鏡乃總智體也灌十方空者照十法界窮極空理悉成嚴妙所謂大智慧光明徧一切處矣二依正無礙此科於三大中後得用大證解脫德如珠之影亦如將前金相種種運用成妙莊嚴也問前言十智已屬起用與此何別答十智雙屬體用望上科真空之體乃為照用望此科運為之用復為照體又與此科竝稱為用亦無不可葢彼是鑑照之用了因所成如燈照物也此是辦事之用緣因所成如燈下作為也分二一攝剎入身諸幢王剎來入鏡內涉入我身身同虗空不相妨礙首三句剎入身也圓鏡智即稱法身智體故能攝諸剎海悉入其中由理攝故事亦能攝故下言涉入我身此身即色身所謂菩薩於一毛孔中不可說剎次第入也末二句身包剎也所謂毛孔能受彼諸剎諸剎不能徧毛孔也一毛尚然況全身乎極小同大優有餘地故不妨礙也總顯能包之用二分身入剎身能善入微塵國土廣行佛事得大隨順上科雖有入有包而獨顯身之能包此科更顯身之能徧也所謂無剎不現身也於一一剎隨機普應現十法界身雲彌滿無盡也廣行佛事者於一一身上弘下化徧行無量諸利益事也得隨順意兼自他隨自即如意神通得大自在隨他即恒順眾生無量機緣也詳明神力已竟三總由觀空此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍神力總收上會色融空攝剎分身四科也由我下出神力之本蓋凡外小乘執四大心外實有成大障礙此菩薩觀四大離自心性無體可得故曰無依妄想生滅者所謂諸法不牢固常在於念中念起似有念息全無也虗空無二者言四大既同虗空虗空豈有差別佛國本同者葢四大為能成佛剎為所成四大既空無二相佛剎亦平等皆空所謂虗空為同同即空也於同發明者即悟性覺真空性空真覺清淨本然周徧法界也末句即寂滅現前入圓通境也三結答圓通佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一我以三句即空色無礙科妙力圓明即依正無礙科圓通極境也空藏空大已竟六彌勒識大分三一作禮陳白彌勒菩薩即從座起頂禮佛足而白佛言溫陵曰彌勒正云梅怛利曳那此翻慈氏為慈隆即世悲臻後劫愍物迷識故示迹發明也二陳白之言分三一上古得定分四一上古佛世我憶往昔經微塵劫有佛出世名日月燈明二出家求名我從彼佛而得出家心重世名好遊族姓此葢敘古在凡夫地內輕外重身雖出家心慕豪貴好遊族姓者喜親近國王大臣也此遠因實事不必回互解為貪著名相等意且前之多婬復作何意回互之乎況唯識正是名相豈不增病三教修惟識爾時世尊教我修習惟心識定入三摩地因其重世名族外求馳散故授以惟心識定令其通達萬境惟我心識變現一如夢幻生滅非實豈可不究明心識而反重其所變之境乎由是但自觀察惟識止其外慕馳散而定心成就所謂因病而藥者也四久習忘名歷劫以來以此三昧事恒沙佛求世名心歇滅無有惟識定深萬境如電外輕內重無復馳求故求名心滅此先顯對治悉檀破惡益也二中古定成分三一確指佛世至然燈佛出現於世二惟識極成我乃得成無上妙圓識心三昧積功雖歷多劫入理在一剎那葢前所習者不離五位惟識尚屬權宗至此窮極識理所謂性識明知覺明真識妙覺湛然徧周法界融入如來藏性故曰無上妙圓此方顯第一義悉檀入理益也三一切惟識上科方極惟識之體此科乃極惟識之用又為二一世界惟識乃至盡空如來國土淨穢有無皆是我心變化所現國土舉無情器界之總相有無即成壞也此雖以唯識為入門上科既曰無上妙圓則今所謂變化者亦非同相宗但由妄發乃達緣起即是性起種種變化皆生於妙圓真心矣二諸佛惟識世尊我了如是惟心識故識性流出無量如來吳興曰流出如來者從法身識性流出報應佛身也此說妙圓識性即為法身從法身而起應化其身無量雖理趨頗通然此但約自己不盡他佛似是無量身而非無量如來又須極果方能非是本具頓悟之境今解如來者有情根身之總相首句了即悟也承上結定轉起下文言我悟達惟識至於窮界萬法如此由是不但秪見世界惟識乃見藏識海中三世十方無量諸佛皆從流出所謂眾生心內諸佛時時成道是也又如華嚴中菩薩證真見佛無邊皆在身心出沒末當云如來尚惟識性流出況餘九界眾生流出可知三得補處記今得授記次補佛處夫窮極唯識圓證法界既見諸佛依正皆是自心而自心豈不成佛故得授補處記即補釋迦佛位次當作佛也三結答圓通佛問圓通我以諦觀十方惟識識心圓明入圓成實遠離依他及徧計執得無生忍斯為第一清涼引護法釋三性云一切心及心所由薰習力所變二分從緣生故皆依他起徧計依斯妄執定實有無一異俱不俱等此二方名遍計所執二空所顯圓滿成就諸法實性名圓成實資中引喻圓成如麻依他如繩徧計如蛇徧計有名無體依他有相無性惟圓成實是彼體性今言入後一者悟證真實體性也遠離前二者不復為名相所迷也此經圓成實性即如來藏心所以結入圓通彌勒識大已竟七勢至根大又復分為三一作禮陳白大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言溫陵曰觀經云以智慧光普照一切令離三塗得無上力名大勢至又言此菩薩舉足下足皆動一切世界震蕩三途令成解脫凡入諸佛會中必先震動故得是名且悲華經言往昔因中彌陀作輪王時觀音為長子勢至乃其次子今在極樂居於彌陀左右倫者類也二陳白之言分四一古佛親授念佛我憶往昔恒河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧大本彌陀自具十三號中有斯二名詳彌陀勢至同時發心所師佛號乃古如來非即彌陀二號既同餘十佛名或亦多同十三佛號以師資一道不異古今如釋迦觀音之類念佛三昧據下文即都攝六根淨念相繼也二詳喻感應道交此取天台觀經疏科名以眾生對佛此感彼應不同解入相應生佛一體也分二一先以二人為喻又分二一單憶無益譬如有人一專為憶一人專忘如是二人若逢不逢或見非見一專為憶喻佛念眾生也佛作菩薩時自果未圓尚於念念不捨眾生何況果後更無餘事惟念眾生豈非專憶之至乎一人專忘喻眾生不念佛者也以如來專念眾生之力故若逢或見如諸聖不違本願遊化娑婆故令眾生偶逢偶見之類是也以眾生無心念佛之力則雖逢不逢如佛在世時亦來此國住七日而眾生冥然不知良由不念業障佛亦無奈何矣是冥中或逢而顯中實不逢也雖見不見如見文殊者但覩老人貧婆之類是也是聖豈作意詐隱實由業覆而妄見劣相耳如薄福見寶為蛇為蛙豈彼無情之寶亦能變化詐隱其本相耶吳興引舍衛九億家證此略而未詳甞聞九億分三三億見佛聞法三億但聞名字三億名亦不聞不聞名者不與此例其但聞名字者即逢而不逢者也以但逢佛在世與之同國而未遭遇形聲也其前三億若更分之當亦有見佛而不聞法者即是或見不見以徒見不蒙法利故也諸義皆通取要言之以如來專憶故或逢若見以眾生專忘故不逢不見不能成決定逢決定見正意示人不想念佛者決無見佛往生之益二雙憶不離二人相憶二憶念深如是乃至從生至生同於形影不相乖異二人相憶喻生喻念同也意言眾生念佛能如佛念眾生非惟必成決定逢見且如形影常不相離正意示人想念佛者決定獲見佛往生之益矣二後以母子合喻又二一合單憶無益十方如來憐念眾生如母憶子若子逃逝雖憶何為首三句合一人專憶也世間慈念最切者莫過於母然子若悖逆過甚者母念或衰佛念眾生更過於母逆惡愈甚者佛念愈深故佛大悲心相常照阿鼻眾生是以求往生者不可思惟己惡而疑佛不來接引此乃不達佛心自生疑阻殊可憐也若子逃逝合一人專忘也雖憶何為合若逢不逢雖見不見也二合雙憶不離子若憶母如母憶時母子歷生不相違遠首二句合二憶念深末二句合彼生至生等三句也詳喻感應道交已竟三合喻顯示深益合喻謂兼合前二喻然但合雙憶不離不合單憶無益也深益即往生成佛二大利益分二一必定見佛益若眾生心憶佛念佛現前當來必定見佛憶佛兼事相圓融二種觀門念佛兼事一心及理一心二種三昧現前見佛謂不離現身於定中見或於夢中見也當來見佛謂報終陰壞見佛接引及彈指往生華開見佛也事相觀謂注心一方緣佛金身相好而已圓融觀謂以假空中三觀觀佛法報化三身舉一即三言三即一三一圓融也詳在觀經疏中事一心謂專心念佛無一毫雜緣而已理一心謂達法界一相舉一聲佛則全包法界圓住三身詳在彌陀略解所見之佛亦隨觀念理事而不無勝劣矣問勢至敘古今何全取西方法門證釋答菩薩明說此界攝人歸於淨土而所示觀念豈非導人觀念極樂應不必疑也二速得開心益上益雖具理觀理念皆可開心然且專說得見他佛未及正明自心開發顯露自佛果體故知上科但論見他佛此科乃說成自佛也分三一近佛故開去佛不遠不假方便自得心開去佛不遠有二意一者未獲往生在觀念中須取理觀理念說其不遠以全住三身圓持法界與佛同身共命故曰不遠不假方便者不用別門方便但由悟達他佛三身而本覺果體豁然顯現二者已得往生常親近佛不假方便自然心開者以近佛聞法及加被威力故速令心開果體顯現也所謂但得見彌陀何愁不開悟也又解先見色身而覩相佛則將隣法身而真佛不遠矣失本覺顯現則顯是自佛彰明奚止於惟見他佛耶二喻以香薰如染香人身有香氣喻中以近香故身亦成香法中以近佛故心亦成佛故知心開非同淺淺應即是本覺佛現也三出三昧名此則名曰香光莊嚴三昧名亦法門名不離觀佛念佛以佛法身香光莊嚴自性佛也四述己自利利他我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土首三句自利也此之述己念佛便非用分別識心所念乃攝根念也其法以一念不生六根湛寂不妨圓照三身洞徹四土遂至信滿入住證無生忍也由此反觀前之心開正相似覺發耳下三句利他也此界即娑婆界淨土即極樂界攝者以威力加持令不退念又臨終接引令其必獲往生三結答圓通佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一都攝六根者令六根不動也淨念相繼者即圓照三身四土也得三摩地即三昧成而證圓通境也若約現位迹在等覺或本已齊佛今追論初心一同眾之信滿入住矣夫各攝一根則屬六根圓通都攝六根則屬根大圓通舊註釋為意根當濫須菩薩所修矣通論二十五門尋常六塵皆始於色今始於聲而復留耳根在最後者正以諸門雖均是教體而不盡當此方之機偈云此方真教體清淨在音聞故今始於音而終於聞所以為教體之綱領而獨當此方之機且權小入門多循音教圓實法要直反聞根故二聖示迹淺深不同也又七大本先始於地大而此中火大為先以多婬召火合此經墮婬起教所以警多聞人先除欲漏也又七大終於識大而今終於根大者以勢至念佛圓通稍次觀音大本彌陀經云極樂清淨次於泥洹觀音所修乃諸佛一路涅槃之門正是泥洹極果今令不能修自心泥洹者其次莫若念佛求往生也此固經文不終彌勒而終於勢至之深意也諸聖略說已竟
