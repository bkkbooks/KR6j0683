body:
  text: 京都西湖沙門交光真鑑述經題次釋疏者疏決通釋之令無壅滯此註解之通名也而特標正脉者疏之別號也良以此經滿數萬言文雖長廣而聖言辭義雙妙首尾照應脉絡貫通無有不相照應不相通貫之處舊解多惟就文輙解更不首尾顧盼或未見本意冐昧推原以致前後不相照應語脉互成乖反今疏非敢意外穿鑒但惟曲順聖經本來語脉而疏導之務令前後照應語脉貫通而已緣此名正脉云初分為三一題目大佛頂如來密因修證了義諸菩薩萬行首楞嚴經一題該盡全經義固多攝滿二十字句數過於餘題文亦非少麤略釋之安能盡其理趣今解稍加委悉務令有所發明幸勿厭繁良以數萬言經而以數葉之文攝之何足為多乎此之全題即經中佛自所說五種題中略取十九字首三字分取第一題首三字也次八字全取第三題名也末八字分取第五題末八字也餘皆不取故云略取加一經字擇要選彼急切略其緩泛該廣上猶一往似有所略實以要該廣仍無所略蓋五題文雖似廣而約義則惟境智機益性修要妙因果而已詳後五題分科自見今密因為境了義為智菩薩為機修證為益性修即第三全題不必更該密因了義為妙萬行首楞嚴為要了義之修為因了義之證為果此即以此十九字該盡五題之廣曷嘗有缺略哉乃結集者善巧所成分為七段以便解釋謂一大二佛頂三如來密因四修證了義五諸菩薩萬行六首楞嚴七經也按五題皆顯密雙彰第二題密意雖似不顯前半實祕呪功能今七段中二三亦應兼表祕呪以呪元從頂光佛演又此呪出生諸佛故然從密則無容解釋不容番譯豈許解釋呪後明之且顯密決定不二經即顯呪呪即密經此以經義比度知呪故茲竝從顯釋而密義即寓於中夫七段雖共成一題而於中有虗有實有通有局首宜分別令無相濫一二七段皆虗而通中四段方是實法若於四段而論通局則上三段各有所局第四段為通上三段定之別相首楞嚴定之總體第一大者稱讚之詞具洪濶包含周徧眾多深奧元始恒常超勝八義尊貴玄妙二義佛頂表之由此諸義故稱大矣哉以此稱詞稱下諸法則知密因為大因了義為大義萬行為大行楞嚴為大定具此諸大是為大經也不敘稱佛頂者縱使稱之亦但稱其所表實法非稱相好故不敘也況彼尊妙亦同大意何勞更稱又密因是理了義是教萬行是行楞嚴是果以大定具含本覺究竟二果海也首標為大是欲受持斯經者依大教而解大理稱大理以起大行滿大行而證大果也既非實法故虗以單舉大字未定稱何法大故尚虗而未實舊傳直作體大非也以不與方廣竝列何定說為體大徧稱諸法故通也第二佛頂者佛身三十二相此其第一名無見頂相在青螺紺髮正中周圍紅色如春山吐日而頂不可見初降生時應持以九地為乳母上歷沙界終不能見今此標之以為表法作喻亦通但取義親疎不同耳用相似之物此類發明為喻終不以喻中物名直稱於法故疎而不親若取最勝名相直稱於法顯其最勝為表非但相似故最親也今將至尊無上至妙無見之佛頂直稱下之實法表其即是無相佛頂皆尊皆妙問行是功勳何為尊貴熾然修行何為無見答從性起修因該果海故仍尊貴又根於了義修即無修攝於楞嚴動元不動故五眼莫窺亦非實法故虗未定所表何法徧表諸法故通也法華為佛全身此經為如來頂顯斯經為法華中精要之義如知見實相佛慧等而更徹頓圓極旨如歇即菩提毛端現剎等蓋終實渾具佛身頓圓義極尊妙同佛頂相令其見題者知其非權漸之教中四段是大之所稱是佛頂所表是經之所詮故為實法今夫第三如來密因者如來十號之一倣同先德號也隨相釋則諸佛一身一智應用亦然故後佛如先佛之再來若入理釋隨教淺深難盡多種今據終實如為本覺來為始覺始本究竟名如來也即是果人亦即下諸菩薩道後之號密因者揀非事相修行顯因可見者此取如來在凡夫時於六根門頭頓悟圓湛不生滅妙明真心此心為四科七大根本實性具足三如來藏全體大用本來是佛豈惟但是因性亦乃即是果性以諸如來無別所證乃至證時更無毫髮增添所謂從初發心即成正覺經中佛自述云我以不滅不生合如來藏而如來藏惟妙覺明圓照法界等意則可見然所以為最密者以此即是二根本中真本所謂識精明元菩提涅槃元清淨體佛言一切眾生不成無上菩提乃至別成聲聞緣覺諸天外道魔王皆為不達此本錯亂修習至後偈中又言常不開演足顯根中所具如來藏性乃是難測難知最深最密之法問既即果性何復名因答見此性後方是究竟果因更須修成始獲究竟且密因二字遣兩種人過一者密字遣權教著相人過以彼不達密具本有果性塵劫修行終無實果二者因字遣圓教狂慧人過以彼不達此性方是真因自恃天真頓捐修證縱得離繫全缺莊嚴終無究竟此意妙甚經文首從請定至四卷前半身意輕安得未曾有即此密因也然此一段即是阿難所請三名中妙奢摩他以此三如來藏性即是自性本定而頓悟了達于茲者即微密觀照故也第四修證了義者以前段全彰自性本具天真現成然既曰密因豈礙修證是故雖歆藏性之己知更喻華屋之未入由是開決定義門示解結次第蓋必解六結動靜根覺空滅而越三空人空法空俱空方為了義之修獲二勝上同下合而發三用三十二應十四無畏四不思議方為了義之證然謂之了義者有二意一者用根不用識故蓋用識則以生滅為本修因如蒸沙作飯沙非飯本畢竟不成常住菩提故非了義用根則以不生滅性為因地心如依金作器器器皆金決定能成無上菩提故為了義又用根已為了義而特選耳根更是了義中之了義以其超二十四聖而獨妙為十方三世諸佛一路涅槃之要門安有修證了義能過於是乎二者從性起修因該果海故蓋依密因無修證果海中不妨幻修幻證故修而無修非事相之染修證而無證非新成之實證故為了義而非不了義也問道場加行之修是了義否答道場中定慧依舊是耳根圓通但加戒與道場及持呪耳同一了義故不別敘經文自四卷後半請華屋之門直至七卷前半百靈護呪即此了義也然此一段即是阿難所請三名中妙三摩提以此耳根圓通為第一如幻三摩提故也第五諸菩薩萬行者菩薩略梵語具云菩提薩埵此云覺有情蓋覺己分證識情未盡故又上求大覺下化有情故即是因人亦即上如來道前之號而言諸菩薩者即本經分證諸聖五十五位之數也萬行者即諸位中歷修之行如十信中全根力而植佛種十住中生佛家而成佛子十行中廣六度而行佛事十迴向中迴佛事而向佛心四加行泯心佛而滅數量十地契真如而覆涅槃等覺齊佛際而破生相其行應有無量今言萬明多非局定數也當知此之萬行躡前了義而更進深玄不但修同無修證同無證而且極盡精微至神至妙要之根柢於三如來藏歸極於無障礙法界請詳十行之後五足知諸行皆法界無障礙之大行也經文自七卷後半阿難請位至未結經名以前即此萬行也此一段即阿難所請三名中妙禪那耳以敘阿難悟處既言頓悟禪那修進聖位而佛又言奢摩他中用諸毗婆舍那顯是住持自性本定雙攝前二定慧圓融中中流入之行故也問了義之證何得不攝後位答無下萬行即應攝之此若攝盡萬行何歸況無上圓通豈容無證二殊勝等非證而何問位應是證行濫於修今以位為行豈不屈證為修答諸位正是行位復乃深入真修故成位次如果修終應是佛位當知菩薩之名因行未滿之號若因已滿即應失菩薩名又經者於修證下重標萬行亦是默示此分屬之意而識者寡矣問若此則圓通不具萬行而諸位不成了義豈非二大過耶答一皆善巧不為過咎蓋初心貴在精專尚檢別門豈嫌萬行縱使圓融勝解念念具足諸度亦惟理具而非事造故但稱為了義而不責以萬行者欲其精專而不雜亂也若玩文殊了揀諸門之偈則信此意非虗矣至後諸位了義況顯而知良以初心反聞尚為了義況入聖位深修則其了義不言可知第以諸位率能分身無量二利繁興故特標萬行亦默勸其圓滿諸度而不可得少為足若知八地中七勸之旨則信此意必有矣況依此分屬於經於定平妥隱順甚生次第智者鑒之總括上之三段全是阿難所請三名該盡正說全經歷收大定別目矣第六段首楞嚴者大定之總名也圓含上三別目而為一定全體當知此定逈不同於常途止觀蓋常途止觀全屬功夫而自性立為諦境與止觀相對其體各別不取自性即為定體故其為定初心與境為二必至純熟方得一如是則止觀全屬功夫不即自性的實論之但是引起定耳非自性定也此則不爾涅槃經佛自釋首楞嚴云一切事究竟堅固而古德即明其徹法底源不動不壞細詳其旨是皆分明取自心本具圓定為首楞嚴何甞取起心對境止觀為定哉更當知全取正因自性略以兼帶了緣二因為定全體即所兼帶了緣二因亦是性具非縱非橫不同權乘說為後得天台宗中亦有此意但彼止觀不即取正因本不動體為定而歸功偏推重於了因雖說性具實多修成意爾是故決定與此不同今經奢摩他即全取自性本具不動不滅不失不還四科五陰六入十二處十八界常住七大地水火風空見識徧周以至十惑無明與三細六麤三續世界眾生業果之妄本常虗假四義一為無量無量為一小中現大大中現小三藏一空二不空三空不空之真本自現成如是等義全與一切事究竟堅固徹法底源不動不壞若合符節是皆全取自心本具圓定為奢摩他若當機承教開解朗然照體現前即取此照體名微密觀照不取思惟修習為觀故加微密檢之此佛親自命名復何疑哉當知乃是全取正因本性略兼了因即開解也以初悟慧多然從性定而發故是即定之慧而為奢摩他體又全取正因本性略兼緣因即反聞也以初修定多然躡解而起故是即慧之定為三摩提體又全取正因本性雙兼緣了二因即定慧均等中中流入然但深入藏性本定故始終不離性定也為禪那體問既言承教開解顯是後得何言性具若爾何不未教先解答此正權宗所迷彼惟取於正解分別為了因而不知顛倒分別元與正解同體若元不具此體將何轉為正解乎以是了義教說無明即明也請以喻明正解分別如水東流顛倒分別如水西流今以顛倒轉為正解如改西流而作東流先無此流將何改轉緣因準此應知迷位一切妄作皆性具緣因天台謂逆修者是也諸家不詳此旨而以三止觀強判落落不合無處安插或補於言外或取一二相似之語以強釋之殊無情謂今有三義了揀此定一曰此是妙定正以性本自具天然不動不假修成縱在迷位動中其體本然故稱為妙不然何以謂徹法底源不動不壞之定哉據此則凡不即性而別取功夫為止觀者皆不妙之定也二曰此是圓定正以此定不但獨取自心不動乃統萬法萬事皆悉本來不動為一定體經云菩薩自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體蓋取心海本湛萬有停凝齊成一定不然何以為一切事不動不壞之定耶據此則凡不兼萬有而獨制一心不動者皆不圓之定也三曰此是大定正以此定縱在迷位尚本不曾動搖開解之後豈有出退當知此定自發解起行之後直至歷位成佛終無退出何況有壞不然何以為究竟堅固之定耶據此則凡有入住出縱經長時皆不為大定也詳此自知常途止觀了不相類矣經文前自請定後至請名即統包前三段所指全文是也雙攝大定總別以為一經之名妙莫加焉第七經者是詮上四實法文故虗徧詮諸法故通且是諸經通題但取能詮不取性離即真等義以既分虗實那依台宗兼屬所詮乎體則聲名句文假實兼具即修多羅一名四實中正取聖教半同席經又此方聖教稱經今譯為經顯是西方聖教又此訓常謂天下古今不易彼方釋聖教為顯示十方三世準則之意同而分量廣也其他貫攝等意避繁莫備欲知殊勝全隨所詮至於文詞之妙本於如來精義巧辯而加以房相潤色之工極為華藻流麗讀者無不三嘆夫經家既以題而冠經故茲釋惟據經而取義妙含無盡文稍加詳觀者幸研味焉古式有二一者作對釋略有六對一能讚所讚對二能表所表對三能詮所詮對可知四性修對即三四兩段也五動靜對即五六兩段也六總別對三四五段為別六段為總也二者離合釋略作四釋一者大佛頂為能讚表但是言相故劣如來密因等是所讚表乃性修等實理故勝佛頂下加之字依士釋也二經為能詮但聲名句文故劣上皆所詮是性修等妙義故勝經上加之字依主釋也三者經是教之自體上皆因果修證之用經上加即字持業釋也四者總六段是經之所有乃分取他名經上加非字有財釋也餘如減字曰大佛頂經或首楞嚴經推類上釋皆可作之又古式人法喻三或單或複或具斯題則全具焉此為不廢古式略備參考更有一意當伸疏中為泯是非舊解未善者多惟不取而已不復非之然似是而非人所難識者恐人持疑不決有礙取捨今於最初略出其一以例其餘即如舊解茲題仰揚發揮似為言簡理盡不知有二不便礙佛深旨一者疎略非體蓋釋經者先當尊經本文一一解釋之如密因即當說出是何等法於本經中何文即是一一釋畢倘有餘意更加發揮方為善疏今乃更不解釋密因等只管圇囫反覆拈弄是乃論量文體非解釋文體安能令文義雙暢乎此失猶輕二者昧旨屈經謂彼註如來下用宗門盡令把住將密因等一併掃却方是無修無證至極之理若是則是第一義諦全居經外特以下用宗門回途放行將密因等俯就眾生依舊許其有修有證順世權宜皆悉建立若是則斯經宗趣全成第二門頭將佛圓實極旨反出於金剛楞伽之下斯由全未通曉密因了義為何等法率爾莽論屈經之甚其失非小今試明之其曰如來果體其體本然何假密因而不知此之密因正是無修無證本然果體其曰菩薩道用其用無作孰為萬行而不知此之萬行根於了義修即無修攝於楞嚴動元不動正是無作道用如是而言何假孰為何異當面不識其人而猶稱名非毀者乎當知斯經非但理性為第一義萬事萬法皆第一義以一切事究竟堅固皆超大小名相之外故也安有第一義出於斯經之外者乎諸註類此者甚多後凡不取者不遑廣辯也題目已竟二譯人分三一主譯人天竺沙門般剌密諦譯天竺者譯主生處也西域國之總名此云月國有聖賢繼化如月照臨地當閻浮中心九萬餘里分畫五區七十餘國東西南北及中皆名天竺此師中天竺人即生佛之地也但此惟具總名未詳何國沙門釋子通稱此云勤息謂勤行善法息滅惡事又云息心達本源故號為沙門般剌密諦此云極量譯主別名天竺才智僧也譯者番字番音變梵語為華言也蓋西梵語字與此全殊若觀梵本非惟不知其語兼亦不識其字須先隨其梵音以此方之字易之名為番字番字之後方可讀之然但同呪仍不知其為何等語却須兼通兩國言音者一一變梵語為華言謂之番音特科為主譯者以此經未來盛名先至天台西向拜求一十八年終未得見彼國禁為國寶師潛匿航海賫來於唐中宗初年達廣州適遇房相請於制止寺譯成速迴以解責邊之難國王因師潛過罪責守邊官吏故也夫冐禁艱苦志益此方功莫大焉亦且通方智辯總統譯場以至功成身退誠宜首標以重元勳也二譯語人烏萇國沙門彌伽釋迦譯語烏萇國者名義集中烏仗那國訛云烏場與萇同音疑是此國此云苑古大國之苑囿也北天竺國之別名彌伽釋迦此云能降伏譯語者以密諦既總其事而無專司但稱為譯此則分職員名專司其事也亦云度語備通華梵變梵成華即是番音者耳三潤文人菩薩戒弟子前正議大夫同中書門下平章事房融筆受菩薩戒品繁不能載可通在家者受之經中謂王臣受位應先受此戒則不惟戒神擁護而守德防非終成聖種矣弟子者歸依三寶為大師也前者舊也以下官名乃其舊職現已謫在廣州但知南詮故云爾也正議者史稱正諫言官之名大夫者可大扶樹人才之尊官也同者僚佐非一與同協理也中書門下二俱內省左右相府之名然中書省多掌王言門下省多出政事融乃權兼兩省故竝書之平章者書云平章百姓平均也章顯也謂均理政務顯彰法度也事即政務法度等也房融即房琯之父文子俱相而融事略出琯之傳文謂相於武后末年而貶於中宗神龍元年舊紀番譯時年乃云神龍元年五月二十三日譯此或紀其開筆之時非譯成之時也筆受者亦譯場中分職專司之名秉筆確定文字者也最初番字須知二合三合彈舌引等當以此方何字代之至於番音則委問華梵務使相當然後下筆皆為難事帝王亦有親當此職者至於潤文古皆別立職員若筆受者或成拙俗而潤文者方潤色之房相亦兼此職故科名與經中互顯其功耳夫請譯筆受潤文而又奏入內庭雖未即得頒布後為神秀入內錄出復得家藏原本卒致流通然則融真大有功於斯經矣乎釋譯人竟三經文分三一序分夫序正流通三分始於道安而證於親光道安秦僧未見西科先科三分人皆非之後親光菩薩論至果然解經通用今初序者頭緒引起之意又分為二一六種證信序此序諸經通有亦名通序阿難於佛涅槃時請問佛令安置諸經之前證其有此方是佛經而生信受否則多偽不足信也六種者六成就也謂一信二聞三時四主五處六眾闕一不可故曰成就今隨文便均於廣略但分為三一標信與聞如是我聞如是者略作指法之詞我聞者略明授受之本溫陵謂如是之法我從佛聞是也此緣結集時阿難感變相好同佛眾疑阿難成佛釋迦再來諸佛降附唱此四字三疑頓息故必首標然六成就中如是二字第一信成就也乃是信順之詞謂信者言如是不信者言不如是也若依理釋謂聖人說法但顯真如唯如為是耳若宗本經一切事堅固為如離無常見為是蓋表信教信理之深方成傳持之道故曰信成就矣我聞二字第二聞成就也我即結集經主也然是隨世假我及法身真我非同凡夫外道所計聞者親說觀聽非展轉傳聞所謂此方真教體清淨在音聞不假音聞教體何立故曰聞成就也達耳入心記持無毫髮之遺文殊大不思議阿難亦能憶持沙劫諸佛清淨法藏今一佛四十年教何有差遺聖人境界非比世間若約中道理釋則以無我之真我不聞而能聞也二時主及處一時佛在室羅筏城祇桓精舍一時者第三時成就也蓋世事合會尚待昌期大法弘宣豈違嘉運故須良時方能成就取其師資道合始終說聽之時以佛說法殊方紀曆不可對同故總云一時若約理則心境理智凡聖本始一如之時也佛者第四主成就也簡略梵語具云佛陀耶此云覺者餘教不錄惟約當宗則始覺與本覺證齊而成究竟覺又自覺覺他覺行圓滿前三惟約自覺後三兼利他而自覺揀凡覺他揀小圓滿揀因也約人即娑婆教主中天竺迦毗羅國淨飯王太子出家成果十種通號之一別號釋迦牟尼非此大聖孰能演斯大法故曰主成就也在室下第五處成就也孤山曰室羅筏訛云舍衛此云豐德城中財寶五欲多聞解脫四皆豐足故以名也祇陀波斯匿王太子之名此云戰勝桓即林也園地本屬太子而給孤長者以金布買之少分未滿太子感動止之并施桓垣故特標之精舍即給孤所建華飾工巧純一清淨無諸喧雜也太子喜施感同長者故祗樹給園或竝稱或標首即今王像與給孤竝坐而世以為土地二郎真可笑也斯經非此勝地何以說之故曰處成就也凡佛說處各隨所見凡小見處穢土菩薩不離塵寰見處淨界但諸經隨宗文有隱顯而已此經悲接凡小意多故不明淨相也三廣列聽眾第六眾成就也座無知音說將誰聽今機感盈前不得不說故云然也分二一兼本迹以詳列二乘嘆德依乘惟迹無本今名列二乘德乃菩薩本迹雙彰也分四一據迹標數與大比丘眾千二百五十人俱據此則惟彰迹大有三義一數多二名重三德隆比丘此翻亦三一乞士二破惡三怖魔長水曰千二百五十者陳那等五人三迦葉兼徒一千舍利目連各兼徒一百耶舍長者五十人經略五人得果感恩常隨助化之眾也二彰本嘆德此科全以彰本蓋法華以前未經開迹顯本惟嘆聲聞之迹今已開顯無復餘乘即惟嘆其內祕菩薩之德故下更不詳嘆菩薩略顯而已又分二一總名似同皆是無漏大阿羅漢此是果名二乘久擅斯名今舉之以嘆菩薩祕德故似同而實大不同蓋二乘無漏方超三有菩薩無漏更越三空大者依涅槃作十地大人修大行以證大果不同二乘但取名重德隆為大阿羅漢三義亦別二乘應供止於天上人間菩薩應供通於世出世間二乘無生分段方脫菩薩無生變易亦離二乘殺賊四住方窮菩薩殺賊五住垂盡二別德逈異上科德之總相實雖異而名猶似同此則德之別相顯然菩薩作略皆非二乘所可同者故曰逈異又二一德體超異佛子住持善超諸有能於國土成就威儀首二句內心肖佛也佛子者已付家業真是佛子非滯草菴者也而口生法化是其子義住持者住法王家持如來藏此則明其證真之深諸有者略言三有廣開二十五有即三界受生之處超者不為諸有生緣所縛也小乘超之則須出三界外不敢復居非善超也今菩薩常不離三界即於生死無干所謂善超也此則明其脫妄之妙次二句外貌亦肖佛也有中形外自然之理國土同居土也成就威儀者身具相好業攝律儀也能於二字乃有二意一特表意以今示現聲聞之迹似不能具相好盡律儀而內祕實能二承上意以小乘不善超有果成則灰身滅智出三界外不能居士具儀也今由善超不離三界故能居土現儀耳此科為下諸用張本故曰德體二德用超異上雖內外充裕但是自利之體向下方顯利他之用又分二一上助佛化從佛轉輪妙堪遺囑從佛者非但隨從侍衛而已乃依而不違其軌轍也轉有流行不滯之相輪有摧碾運動之功蓋佛之法輪能摧碾眾生麤細煩惱運出眾生生死險道佛能轉之菩薩亦依其軌轍而轉之妙堪遺囑者以聲聞人願行非妙但取速滅如世老人不堪寄囑今實菩薩又已從轉法輪故智悲雙妙堪承遺囑也遺囑謂佛入滅時囑累菩薩弘法度生耳二下度眾生又分三一盡本界嚴淨毗尼弘範三界毗尼此云善治亦即云律戒之總名嚴淨作三分別嚴謂止持止諸惡也淨謂作持作諸善也又嚴以禁身口淨以制心意又於事戒則嚴於道戒則淨也弘開擴也範師範也三界者欲界色界無色界也娑婆敝惡戒律宜扶涅槃云戒是汝等大師故此亦嘆其戒德師範人天小乘於戒有缺漏未至嚴淨豈能弘範當知惟菩薩能之二盡十方應身無量度脫眾生緣感則應隨類化身如觀音三十二應無剎不現度脫眾生者說法令其度煩惱河脫淪溺苦如舟師度人也在法華乃普現色身三昧此經即圓通妙用似為定德所攝三盡未來拔漸未來越諸塵累拔者挽之令起濟者接之使過未來者後世無量劫中也越超出也塵累者八萬四千塵勞累墜有情於生死苦域者也言菩薩挽拔接濟未來無量有情使皆超出八萬四千塵勞不使累墜於生死苦域矣此非遺教結集不能令法久住利益無窮似屬慧德攝彰本嘆德竟三略舉上首其名曰大智舍利弗摩訶目犍連摩訶拘絺羅富樓那彌多羅尼子須菩提優波尼沙陀等而為上首大智者前示聲聞智慧第一則但盡生空智品冠絕小乘今既開顯應是圓照法界之大智且其深本已證金龍佛位何非一切種智舍利弗此云鶖子鶖乃水鳥是其母名母辯流歷似鶖之目故連母為名云是鶖之子也摩訶此云大同前大意目犍連此云采菽氏姓也名拘律陀此云無節樹世惟省文召姓而已神通第一者也拘絺羅此云大膝鶖子母舅富樓那此云滿願父名也彌多羅尼此云慈女母名也略云滿慈子連父母彰名說法第一者也須菩提此云善吉亦云空生解空第一者也淨本已證青龍佛位優波尼沙陀此云塵性因觀塵空得道此中譯名竝宗長水等則該多不能盡列上首者千二百眾之所推讓動靜遵從不敢先越者也四更盡勝劣復有無量辟支無學竝其初心同來佛所辟支譯兼二類一云獨覺出無佛世寂居觀化自悟者也一云緣覺出有佛世奉教觀十二緣得道者也上與長水解同今佛在世應惟緣覺或他方獨覺發通能遠赴佛會亦兼有也無學者果滿取證無復前進也初心總該二乘有學未至無學者也同來佛所者以此二眾臨期方來不比常隨眾也此中辟支迹勝聲聞初心劣前四果故科名盡勝劣矣彰本迹以詳列二乘竟二兼時會以略顯二眾又分二一標自恣顯有菩薩又二一時會先在眾又曲分三一時會誠求屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密意首二句雖標比丘但為表時帶言之耳十方下乃是正敘菩薩以上比丘既詳菩薩未敘故也屬者當也遇也休夏者佛制夏月護生避嫌九旬禁足安居不令乞食自恣者期滿解制即孤山所指七月十四十五十六日也考劾九旬德業自疑己過者自請問佛自不知過者恣任僧舉也十方者不止此界菩薩解見題目中咨請問也決求斷也心疑者細心深疑求佛剖斷也蓋菩薩迹勝道深不待人舉自請而已上皆標時會末二句乃是誠求欽敬奉侍瞻也佛有攝受之慈折伏之嚴竝行不背將求者機感初動也密意者祕密深法也二如來妙應即時如來敷坐宴安為諸會中宣示深奧敷坐宴安者展坐具而安處也深奧者超過權小終實妙理為此經類引即應密意之求也三會眾蒙益法筵清眾得未曾有清眾者超塵入理心境湛然意兼合會不止菩薩得未曾有者聞所未聞歡喜踴躍意時會先在眾已竟二音感後至眾迦陵仙音徧十方界恒沙菩薩來聚道場文殊師利而為上首迦陵頻伽此云妙聲鳥在㲉發聲已踰眾鳥佛音似之仙亦超世神化之名稱美佛音非取道教徧十方界者目連昔曾試佛音聲過無量世界還同座前此經凡聖根塵即性皆周無明覆者自不能聞如日大明瞽不自見恒沙菩薩者以恒河沙記菩薩之數言至多也恒之一字亦訛梵語正云殑伽此云天堂來狀其來處最高耳菩薩心聞無覆故尋佛妙音而來聚聽道場者隨相即說法之處約理乃一乘寂滅場地溫陵曰文殊師利此云妙德楞嚴會上為擇法眼故居上首也亦云妙吉祥等過去佛號龍種尊王現在北方歡喜寶積未來當成名曰普現法華會上是佛祖師華嚴表根本智而為諸佛之師今在此經作擇法眼蓋不捨因門影響輔化權稱上首而已標自恣顯有菩薩已竟二標齋供顯有人天天雖不顯而理亦應有旁證諸經皆有而正取流通中顯八部故科兼之曲分二一國王齋供時波斯匿王為其父王諱日營齋請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩孤山曰波斯匿此云勝軍溫陵曰即舍衛國王也過去龍光佛世位登四地亦大權也諱日者忌諱之日人子於親終之日言之即慟故隱諱而不敢言世教每歲茲辰服食俱變示慟如初而已內教令其作冥福以資之今其父王諱日適當自恣故修齋所以資親也宮掖者內庭左右如人肘掖珍羞者貴重食品也延亦迎請也請佛以下有六重見敬之至謂其處則內其迎則親其設則廣其羞則珍其味則妙其伴則同伴同者謂敬伴同主非急於主緩於伴者也二臣民齋供城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齋主長者齒德爵祿兼隆臣之屬也居士者愛談名言清淨自居似非有位隱者類耳同時飯僧者感佛化儀依教行施也然臣民惟佇於佛者敬先專主主臨而伴必至也佛敕分應者令無分別獲福平等若能等心而施則雖佛滅後福亦無不等矣六種證信序已竟二示墮發起序此序諸經各別又名別序以諸經各有事緣引起故各不同如大彌陀以色引法華以光引之類是也今經以示墮淫室為發起之端示墮者以阿難祕德同前上首非實聲聞故誤墮淫室但是示現以引發大教而已且此經欲明恃多聞而不習定者無力以敵欲魔何能超越生死故以多聞之人示墮發起正勸多聞者策力於大定耳然必用阿難者一以多聞第一固見其聞不足恃二以是佛堂弟亦見其他不足恃也此處既以顯泄阿難為大權菩薩知之即已至後文中但依所現聲聞見解發揮方能激引真實凡小良以深位假示淺位必能曲盡淺位情態如執迷謬辯感悟流涕皆所以盡其情態而旁發諸真實者之心曲令生慶快感悟耳不必又一一明其非真致多猶豫也分三一誤墮因緣因緣有四缺一不墮就分四一別請遠遊惟有阿難先受別請遠遊未還不遑僧次阿難此云慶喜佛成道日淨飯王弟斛飯王復報生子淨飯賜名慶喜是佛堂弟先受別請者先於自恣以前早受別種事緣所請矣遑暇也次列也夫既遠遊未還故不暇在此自恣赴齋之列也非此遠遊何以致墮故此為第一緣也二無侶獨歸既無上座及阿闍黎途中獨歸上座者佛言上更無人名上座又以歷夏淺深分上中下座歷四十夏者推為上座阿闍黎此云軌範能紏正弟子行者律制一僧遠出必以二師翊從所以嚴行止也今乃缺二師為侶所以為誤墮之第二緣也三無供循乞其日無供即時阿難執持應器於所遊城次第循乞其日無供者止宿之處無人獻齋也使其有供食之徑行應無墮事所以為第三緣也應器即鉢應己食量而為大小耳四欲行等慈發心平等行乞不擇淨穢也使其但依聲聞常法惟乞淨家亦應無墮故此第四緣更為誤墮之要也又分二一正行等慈心中初求最後檀越以為齋主無問淨穢剎剎尊姓及旃陀羅方行等慈不擇微賤發意圓成一切眾生無量功德初求者阿難前來未發此心今方始求也檀越此云施主言最後者謂從來無善心行施者也梵語剎利即華言尊姓謂王種也上至剎利則貴而淨者無遺也旃陀羅此云屠者殺生之家西域最鄙賤之不得與良家共居行持標幟人亦避之下至旃陀則賤而穢者無遺也又言不擇微賤者以雖貴賤兼舉而志普賤穢是今平等之新意也末三句又明其志願之普而大也意令無功德者亦成無量功德矣二表等慈由阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗已知者淨名會上早已知也世尊者總具十號之德而為天上人間所尊敬也故上開十號而世尊總之者義為長也訶斥責也蓋如來不以淨名之訶為非即知如來亦訶不必更訶況淨名顯泄彼是金粟如來其與釋迦何別乎須菩提捨貧乞富意在與續善根恐將墮落且無減剋之難大迦葉捨富乞貧意在憐其久苦與植樂因且避趨富之議是以無學尊位而為此不平之行故佛斥責其非也開闡無遮者懲上二人各有遮限今開發闡明無遮限之普心也度諸疑謗者度彼疑謗眾生令免疑謗蓋偏貧多致疑而偏富多致謗也誤墮因緣竟二正墮淫室又三一加意嚴戒緣彼城隍徐步郭門嚴整威儀肅恭齋法隍即城外無水之池郭門城門也齋法者臨齋法則也所以加意嚴戒者蓋由發心既不擇於淨穢須倍加矜持方期無礙矣二力不勝邪爾時阿難因乞食次經歷婬室遭大幻術摩登伽女以娑毗迦羅先梵天呪攝入婬席次即處也謂次第所經之處也幻術尋常以變化虗偽物像為術此則但是迷惑令人失其本心不覺隨從而已摩登伽此云本性此女多劫與阿難有婬愛之緣別有登伽經載之頗詳今更遇惑業習使然也娑毗伽羅此云金頭縛指而食半米為苦行者也所傳呪術稱梵天者妖術偽稱也攝入婬席者由阿難具佛二十相妙色美如銀登伽起愛呪巾覆食與之以呪力故阿難不覺隨入婬席也此事菩薩行之方能無礙而阿難示在聲聞初果彰顯力弱故不能勝邪也三戒體垂危婬躬撫摩將毀戒體戒體即護戒心以初果道共戒力故身雖近而心未動然曰將毀亦既險矣故科垂危有以將毀歸屬登伽迴護阿難不知示現何所不可安用迴護又若不垂危何須救之正墮婬室竟三如來救脫又三一速歸眾隨如來知彼婬術所加齋畢旋歸王及大臣長者居士俱來隨佛願聞法要知彼術加者以佛眼鑒徹無遠不在目前資中曰如來常儀齋畢說法今既速歸必有所為故眾隨而來也二說呪遣救于時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪敕文殊師利將呪往護于時者當將毀未毀之時不先不後也頂即肉髻百寶表萬用具含無求不應見攝受之慈無畏表羣邪竝伏無惡不摧見折伏之威然從頂放光而又以化佛轉說即環師所謂無為心佛無上心法是也且從頂發揮表尊中之尊密中之密也蓮座化佛亦明其為因果要用跏趺者疊足而坐具詳止觀神呪具四悉擅含精微之妙理有不測之威力也必敕文殊者非根本大智無以濟多聞之實用也三破邪救歸惡呪銷滅提獎阿難及摩登伽歸來佛所以神呪力邪呪既銷阿難如從夢醒登伽婬心頓歇宿善根發證前三果發心出家故亦同來耳登伽權實未定隨作無不可也序分已竟二正宗分正宗者序為始而流通為終此處於兩楹中間問答發揮經中正所尊尚之全意矣又分二一經中具示妙定始終此與後科雖俱為正宗而仍分正助此科為正後科為助也正科中惟答當機之問定故全經一定之始終更無別意也又分三一阿難哀求又分二一哀求妙定阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啟請十方如來得成菩提妙奢摩他三摩禪那最初方便頂禮悲泣感謝救拔恩也無始遠敘多生一向極言偏習道力即指定力特恨此之二過者一以表己墮由不是故起婬愛但是力不勝邪二以起下請定此復有二一者正恨偏聞無大定力二者兼悔小乘摧魔力弱故下請定正所以改偏聞之轍而必求佛定正所以迴小乘心也殷勤下正請定也言十方如來者求諸佛通修之法此已檢於小道又言得成菩提者更求徹證極果之因此復檢於權乘以權教雖習大乘終不能成無上菩提菩提此云覺道是佛三智圓滿無上究竟之果此但寄言簡別而下方出其定名妙之一字仍簡不妙而簡意更深即題中首楞嚴內所解性意圓意大意缺一即不為妙也良以奢摩等三是定之共名諸乘皆有不簡則濫彼諸定故也然更是阿難不達應修之定是何不共之名故舉共名而加以簡別求佛尅定開示故佛下文依彼所簡尅取首楞嚴王以示之大眾自然知彼首楞嚴定即十方如來得成菩提之定也然則首楞嚴王豈非妙定不共之名耶蓋共名大同不簡則濫不共之名元異不用重簡舊以楞嚴為總目而以奢摩等為別名蓋惟約合一為總開三為別固無所失而不知此之共與不共更是深意猶不可不知也至於奢摩等三名譯者不翻固隨尊重之例五不翻中尊重為一然其深意仍以此為殊勝之定難以常途之義律而齊之常途番奢摩他為止乃定之別名以寂靜為義三摩略一提字或是地字或更加波字或云波底或但云三昧皆梵音楚夏耳然三字皆去聲讀之此云正定或云正受圓覺疏翻為等至等謂平等住持雙離沉掉也至謂到勝定至勝位也銷幻為義禪那此云靜慮即定慧雙融而圓覺以寂滅為義此等諸義多皆取於修定功夫性定義少尚可通於諸乘今此大定義既殊常故應不必泥此常途之義也欲令義學者詳佛答處以定其義則萬無一失也良以佛智鑑機答處必與問處相應若不相應豈為契理契機之教故我懸示中明會解問答不相應也按佛答處仍有總標別答之二總標即首楞嚴王文云有三摩提名首楞嚴王乃至妙莊嚴路故知首楞嚴王即此三名之總目也固應即取題中性定之義以釋之決定無失若按別答更須有辯詳辯之文已現懸示此惟略牒有三第一不取天台止觀會釋以彼雖依性諦全取修成為定故此則全取性定略兼修成為義故第二不取三名齊具為圓惟依佛經三名順序而答以圓義別取三如來藏故第三不盡局於常途譯釋以須順佛下之答文局則不盡相應故了此三義則知下解雖異舊聞不成過咎也今夫奢摩他者按佛下答蓋取本具不動搖不生滅周圓之心開解照了為義即正因佛性略兼了因為奢摩他體乃性具即即定之慧也問既取自心便檢功夫何又號為定慧答圓實了義萬德皆具自性海中不取修得故佛亦呼奢摩他微密觀照是知觀照之名雖同微密之揀自別斯蓋取開解為觀照不取修習為觀照也定慧類此可知三摩提者按佛下答蓋即躡前開解性定而契入之行起解絕寂定為義亦即於正因佛性略兼緣因為三摩提體乃性具即慧之定也以此中聞性即前文開解見性亦即前三如來藏性實體躡此以成金剛三昧故也禪那者按佛下答蓋即於契入之後深位之中雙躡前之定慧中中流入歷位漸證至於究竟為義亦即於正因佛性略兼緣了二因為禪那體乃性具雙融之定慧也須從乾慧以後方屬禪那以第三漸次方始結言從是漸修隨所發行安立聖位而末敘阿難頓悟禪那修進聖位故也最初方便舊惟據諸圓通中有最初入道方便之語而一往指定耳門為最初方便古今雖皆遵信不疑今更有說智者裁之若果此處方是定之最初則如來即應於此處方出楞嚴總名方說奢他等則前之諸文但是談理皆非說定今既從前一半經文皆說大定何至中間方為最初當知三名下開解處契入處修證處應皆各有最初方便但前後隱而中間獨顯著耳然更知仍有兩重謂初方便與最初方便也如奢摩他中以悟見是心為初方便至後圓彰三藏方為極顯故此顯見方是初方便也而以了識非心為最初方便以若不知妄識非心終不能認見為心故破識為最初方便也三摩提中以反聞自性為初方便以聞所聞盡便出耳門至後四不思議方為極則故此但為初心以入道場為最初方便此中有三一持四重戒二入道場三持呪而道場中所生定慧依舊是耳門三昧故此持戒等三事更為圓通之最初方便也禪那中以十信為初方便以十心方成初住且佛言以真方便發此十心故知乃是後深位之初方便耳以乾慧地為最初方便以須二執乾枯純是智慧方可進發十心問何不取三漸次答前二漸次依舊是道場中戒第三漸次依舊是耳根圓通佛但牒言故非禪那中事也廣在懸示中辯若如是知非惟備達一切初機用心下手功夫前所謂耳根為最初方便者亦未曾遺且皆備在經之明文實非意外穿鑿幸兼取之三名係前經迷悟之要舊解全殊不得不少加辨別故涉文長幸勿厭繁二大眾欣聞於時復有恒沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨此定初門破識指根固即權教菩薩迷境及其深處雖等覺亦所應聞故與二乘同樂聞也等者所以等人天雜趣也阿難哀求已竟二如來委示分二一正說經分三一說奢摩他令悟妙心本具圓定此科正答阿難第一妙奢摩他之請妙心即近具根中遠為一切諸法實體乃至圓具三如來藏本來不動周圓自性定也令於是心開悟分明信解真正即是奢摩他微密觀照經文自此至四卷半引諸沉冥出於苦海即舊解判為見道分者也問此既判為奢摩他而修證二分莫非即三摩禪那耶曰然曰古人立見道而後修道修道而後證道似深有理何必改取定之三名判之有何發明而為是悖古違今之判耶答有四發明優於舊判故特改之一者顯經惟定蓋經始終惟說一首楞嚴大定今以三名判盡正宗足顯始終惟是一定舊判泛明三分定意湮晦豈不令人忘其為說定耶二者遵經明言蓋舊判理雖不差其奈但是隨己所見取義別判非經文現有明言今經三處顯然各有單標三名取之分科則是遵佛明言判佛文義有何差忒三者問答相應蓋阿難歷舉三名而佛答須要三名下落舊判只明見修證意而於三名竟不結歸全無下落今判按次以答三名豈不與問甚相應耶四者不遺舊意蓋今判不但只分三名仍帶開悟契入歷證之語何曾遺於見修證之舊意耶分為二科一初銷倒想說空如來藏初銷倒想者取阿難謝佛之語也蓋倒想不銷何能正見分明決擇真妄如來藏特用本文名言亦即自心本體便當依此分科更不別立諦等外名懸示中已經詳辯然大科下既以具示三如來藏而又含次第圓彰之別今於次第中即應首示空如來藏此空非斷無非滅色非相外等空以此中顯一切法不動不壞鈍是藏性真如更無纖毫外法如金獅子不鎔不毀全相皆金更無雜質所謂彌滿清淨中不容他蓋取即相皆性純真為空乃第一義空也此依心真如門會妄歸真令其知真本有而已問此中破妄亦多何非達妄本空答大凡破妄有畢竟破破至全無畢竟不用也此如說鍮石非金有不畢竟破即因顯破也本為欲顯其真奈彼有所覆障故須破其覆障方顯其真此如說鑛中有沙意欲其銷出真金也今此科中畢竟破意極少而不畢竟破最多大抵全為顯示一切事究竟堅固本定是其正意而破妄非其正意故他家於顯見中廣立破斷破常破身破境無數頭緒而正意反晦矣曰經文現破爭不發揮曰非禁發揮但勿判為科目以掩其正意耳分二一如來破妄顯真此中於識全破其妄於根多顯其真少破其妄於陰入處界一一破妄顯真於七大全顯其真蓋惟破識是畢竟破餘皆不畢竟破也又二一斥破所執妄心以開奢摩他路阿難初雖率諸小乘哀求妙定爭奈實行聲聞從慕佛乘別有妙定而實不知妙定非是識心所修兼亦不知識心之外別有真心即是本具奢摩他體豈惟聲聞不知一切凡外權小皆如生育不能達於妙奢摩邊際者皆由但知此識為心而更不知別有心也被此識塞斷奢摩他路故佛欲示妙奢摩他必須首破此心以開其路也蓋令其先悟此識非心方知別尋真性然後指以真心方可達於妙奢摩他之邊際矣故此破識乃奢摩他最初方便破至全無修習時畢竟不用也分三一取心判決又曲分為二一但取能發之心佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難白佛我見如來三十二相勝妙殊絕形體暎徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣麤濁腥臊交膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落深重恩愛約捨雖全該於父母妻子約下文自釋則男女欲愛為重三十二相始於頂肉髻終於足平滿勝者諸天輪王所不能及妙者端嚴美麗燦若芬華殊絕者無比不思議也暎徹者金色而明透也淨者離諸染穢明者一一分明紫金光聚者佛身光明無量含之則融於一體放之則無數妙色無邊利益備在觀佛三昧海經此中思惟二字即是能發之心乃意識計度分別下所破者破此而已然如來索問此心非是責其發心之非彼緣佛相而發心按法華仍是成佛緣種何過之有但認此思惟分別為己心相而不復知別有真心乃大差誤故須徵起詳破也問識心分別其用最多而獨取緣佛發心者以破之何也答分別既非真心則破須破盡若破穢惡則淨善仍留今於淨善之最勝者尚破斥之餘不待言而自盡矣此破識必從發心者之本意也又復應知懸示中說此識尚有五種勝用佛皆破盡此方破其第一緣佛相好心也二普判眾生誤認佛言善哉阿難汝等當知一切眾生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉凡佛言善哉有三意不定一者讚美意讚其言之善也二者喜幸意喜得其本意而可以施教也三者安慰意將次破斥先以愛語安慰也此取後二意耳一切眾生詳下二根本中則凡外權小皆兼有之常住則非生滅真心則非妄心性淨者本自無染明體者本自不昏即後文根中指出漸次開顯如來藏妙真如性此其所迷之真也故曰不知妄想者識心分別即上文所取思惟下文所破緣塵此其所執之妄也故曰用諸諸字助語詞猶於也莫作多種會之末二句言其本非真心錯認為真遭其賺誤遂致迷淪漩復浩劫莫出也按圓覺權小亦同輪轉以其未出變易故也二正與斥破又二一如來備破三迷然此妄想有三種非真而眾生因之以成三重迷執一者本非是心而似是心故眾生迷執以為是心二者本非有體而似有體故眾生迷執以為有體三者本非有處而似有處故眾生迷執以為有處今不直破前二非心無體但且奪其後一所執心處令其一一審察顯其了無住處欲彼自覺其妄必待七處情盡終不自悟然後訶其非心明其無體也就分三一密示妄識無處此中佛徵心處非謂此識果有一定處所阿難不知而佛獨知之也正以此識本無處所眾生述為有處故托阿難隨執隨破節節欲其悟此識本無處所而令其疑此識妄乃其密意也阿難示同眾生畢竟不悟此識無處而直待七番情盡猶恨己之不知真際所詣而求佛說處師資同一密機理應然也分三一按定徵處又二一按定又二一問定又二一教以直心應徵汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相研細究也真發明性謂真妄分明也又即了因性耳直心者正蒙徵難之時心中原作何解即照實說出不隱諱展轉心言不一也地位果位也通始終中間所歷位次委曲者紆迴留難也心言皆直即是直因三時地位不委曲即是直果如形影不差異也二雙徵能見能愛阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂雙徵本意下科總明二答定阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死二徵處佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝惟心與目今何所在塵勞者染污擾亂之意體即根隨煩惱極至八萬四千賊雖心目雙舉而意惟破心非欲心目竝破也緣此雙徵微意難知以致諸家誤謂破心之後次當破目遂將顯見之旨盡成破見之宗千載迷根實基於是懸示辯之未盡今當更與拔之其意有三一者密顯凡迷取捨顛倒故蓋根識不離而眼中見性即是菩提真本亦即奢摩他體眾生日用不知但惟認識為心隨識輪轉甚可哀憐故佛雙舉以觀阿難取何為心阿難果但以見為眼而終取愛樂為心於是極破非心之後所指妙明之心依舊即此能見之性而已豈有他哉二者媒賊相依責須連帶故蓋阿難既惟認賊為子佛欲破賊指迷其奈眼實賊媒引識奔色故佛責識流轉語須連帶於眼而言心目為咎也三者例眼顯然易徵處故佛知眾生迷識為心決定惑為色身之內恐阿難迯遁不肯直言故借眼之顯然在面取例而徵心在何處也是雖三意皆徵心帶目之由而最初之意甚深人所難見故舊註不悟此意反因之以成破見之迷甚可惜哉按定徵處已竟二隨執隨破古謂七處徵心亦是汙漫之言徵者逼索令其說處之意如上科云惟心與目今何所在是也詳下更無如是徵辭何立七徵向下七番但是隨執隨破若云七番破處則不謬矣就分為七一破在內又分為二一阿難引十生同計在內阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵秪在我面如是識心實居身內十種異生者十二生中除無色以其空散無身相也除無想以其土木無心相也其餘十生俱有心在身中之計青蓮華眼西域此蓮之極為纖長佛眼似之浮根肉眼檢異勝義四塵者色香味觸也秪與只同末二句結答定處乃是天上人間凡未能深達我空之理者任運皆作此計只此一計一切眾生所以囚繫胎獄桎梏肉身乃至三塗苦形自執妄認受無量苦展轉不能自脫者皆由此計以為障之深根也世間邪師開示於人猶言身為房舍心是主人甚可痛哉然此在內乃是本計觀後經云昏擾擾相以為心性一迷為心決定惑為色身之內是也其餘六處但是因佛一時破奪逼成轉計於中亦有同外異計者故須盡之二如來以不見身中為破又三一喻定次第定境定見也又三一定境內外佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祗陀林實在堂外給孤者即施園建舍檀越之名也本名須達多以此長者常周給孤獨貧病成別立此善名二定見次第阿難汝今堂中先何所見世尊我在堂中先見如來次觀大眾如是外望方矚林園三遠見之由阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見此科重訂要顯後不知內而見外之謬以身不如堂之戶牖開豁也二出定總名爾時世尊在大眾中舒金色臂摩阿難頂告示阿難及諸大眾有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨摩頂者慈愍攝受將以大法饒益之也三摩提者此云等持既是諸定共名復是全定總號不比阿難所請三名中三摩提彼總中之別例如色法十一之色不同六塵之色也大佛頂等方是此定不共之號一經所說全為此定隨便寄居於此耳佛頂楞嚴義現題中王者諸三昧中最為尊上又入此三昧一切三昧皆具其中具足萬行者不但只具諸定而萬行無有不具蓋一真湛寂不妨萬行繁興所謂念念具足六波羅蜜者是也十方如來一門超出者見其為諸聖共由脫離生死之要也妙莊嚴路者表其為直趨極果之達道蓋佛之極果號妙莊嚴海約性具本有萬德莊嚴此海須由大定方能趨入故為彼路問前言此中純談奢摩他無二名之雜今何此處標三摩提答已申總名揀於別目何得又難曰何名寄居答義既該於全經理合在於阿難哀求之下如來委說之初安之則首冠三名之外方是總目正居之地今佛隨便此處標許乃偏安奢摩破妄科中故言寄居也三正與決破三一按定所答佛告阿難如汝所言身在講堂戶牖開豁遠矚林園二反難失次又曲分為二一如來即喻反難亦有眾生在此堂中不見如來見堂外者此難明以違前安見次第科中所說而暗以順彼所計身中心相令彼易知其謬也二阿難於喻知謬阿難答言世尊在堂不見如來能見林泉無有是處三就謬難破又曲分為三一先與合定阿難汝亦如是合定者合前即喻反難科也汝亦如是者言汝所計身中之心亦如此在堂不見如來而反能見外者無以異也一句合定向下詳以發明矣二詳申其謬又分二一在內不見謬又曲分二一正難當見汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有眾生先見身中後觀外物一切明了者言凡心所在之處必能明了不昧也了知內身者言當先見臟腑也頗字詳經乃是多意言依汝所計心在身中即當世間多有眾生先見臟腑後觀外物今何無有此等一人惟就凡夫任運而論不取聖人及禪定所見縱此二種更別有理亦非心在身中且心在之處即當明了同彼見外仍當更真何待於聖人及禪定而後見乎二以淺況深縱不能見心肝脾胃爪生髮長筋轉脉搖誠合明了如何不知心肝脾胃深處也容許不見爪等最淺何亦不知乎爪髮皆取膚中生處非外相也二昧內知外謬必不內知云何知外設救之云心在臟腑重重包褁云何見內此是必不內知準此即應并外不見良以重重包褁既不同前戶牖開豁云何得遠瞻見今見不知內而反惟知外是與在堂不見如來而反見林泉者無異豈不謬乎有云眼即戶牖便成心在頭中豈成心在身中三遂與決破是故應知汝言覺了能知之心住在身內無有是處言汝知在堂不見如來能見林泉無有是處即應悟知心在身中不見身內反見身外者亦無有是處也只此一破初聞有緣者即當驚悟絕倒非佛妙典何嘗聞於他教有說心不在於身中者乎奇哉真師子吼也此中執內而疑尚未盡者更合第四釋之餘疑無不盡矣破在內竟二破在外分二一阿難引燈在室外為喻又三一轉成謬悟阿難稽首而白佛言我聞如來如是法音悟知我心實居身外悟知者於不見身內悟知不在身內於了見身外悟知必在身外奪內執外凡情必然二徵引燈喻所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切眾生不見身中獨見身外亦如燈光居在室外不能照室從譬如至後及庭際是先用異喻以反顯不同所以自番前執之非也一切下至不能照室方用同喻證明心在身外也三自決同佛是義必明將無所惑同佛了義得無妄耶皆決定之辭也無妄者言不同前在內之虗妄矣二如來以身心相知為破心在身外身當無知故以相知斥破其謬矣分二一先以喻明分二一如來喻明外不相干佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齋汝觀比丘一人食時諸人飽不循乞乃提獎次日之事摶食者有形段可摶取者也四食中揀非觸思識也宿齋者本日止齋也喻意但取諸人既分彼此便不相知若心在身外便同兩人亦分彼此當不相知矣此用異喻反顯決不同此也二阿難於喻了知不迷阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令眾飽二正與決破又曲分為三一合喻無干佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知順彼執外躡前異喻而反合無干言當同羅漢互不相飽二驗非無干我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外兜羅此云細香惟西竺有此綿佛手柔軟似之夫眼見是身之知心分別是心之知二知同時曾無兩體即此相知何有在外之相三遂與決破是故應知汝言覺了能知之心住在身外無有是處破在外已竟三破根裏破心在眼根之執也俗書云晝則神遊於目似此執也分二一阿難以琉璃合眼為喻分四一悟前轉記阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處知在一處者方明非前內外兩處也二承徵指處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏三引喻琉璃猶如有人取琉璃椀合其兩眼雖有物合而不留礙彼根隨見隨即分別以能合琉璃喻如眼根以所合兩眼喻如心體琉璃不礙眼見如眼根不礙心見隨見隨分別者領前身心相知之旨脫在外過也四脫前二謬然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故惟一在根之義雙脫前在內不見昧內知外二謬之過也如云既惟在根宜其不見於內也既惟在根宜其獨見於外也何謬之有二如來以法喻不齊為破分二一正破又分二一正辨不齊又三一先以按定法喻佛告阿難如汝所言潛根內者猶如琉璃二喻中實見琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃三法中不能見眼佛告阿難汝心若同琉璃合者當見山河何不見眼正辨不齊一科已竟二雙開兩破若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合見即眼不隨心不見即不合喻二俱墮矣二結破是故應知汝言覺了能知之心潛伏根裏如璃琉合無有是處破根裏竟四破內外又分為二一阿難以見明暗分外內又三一承前轉計阿難白佛言世尊我今又作如是思惟二正分內外又分為二科一先伸藏暗竅明是眾生身腑臟在中竅穴居外有藏則暗有竅則明二證成見外見內今我對佛開眼見明名為見外閉眼見暗名為見內由有竅則明故開眼見明方能見外由有藏則暗故合眼見暗即為見內何必朗見五臟而後為見內乎確論此計仍歸最初在內之執但惟脫前二謬為異今立二難二答即見其意難曰心既在內如何不見臟腑答曰有臟則暗故合眼云云即脫前在內不見之謬矣又難曰既不見內如何反見於外答曰有竅則明故開眼云云意謂不同臟腑之暗何得一例不見乎即脫前昧內知外之謬矣名雖別列實惟救前在內負墮之失故佛下文惟破見內而已科名破內外者但取七名各別耳二請決於佛是義云何因上三番負墮故不敢同前決定也二如來以不成見內為破分二一正破又二一破所見之暗不成在內又二一雙開對與不對佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼二雙破兩途皆非又二一對眼之非又二一正言不成內若與眼對暗在眼前云何成內二反顯不成內若成內者居暗室中無日月燈此室暗中皆汝焦腑若成內者言若許眼前之暗即是內之臟腑即當不須合眼但居無光暗室則眼前之暗皆是汝之焦腑然豈有此理哉焦腑者三焦臟腑也二不對之非若不對者云何成見二破能見之眼不得返觀又二一以合能而難開不能若離外見內對所成合眼見暗名為身中開眼見明何不見面離外見者即是合眼之時內對所成蓋縱許所對之暗不是外對身外之暗乃是內對身中臟腑之暗即是眼能返觀矣既能返觀即當合眼開眼二皆能之可也今合眼見暗獨能返觀身中何不開眼見明亦返觀面乎二雙破不見面與見面又二一破不見面若不見面內對不成躡上番之云開眼既不能返觀於面應知合眼亦不是返觀於身中矣二破見面此中有四重過就分為四一心眼在空過見面若成此了知心及與眼根乃在虗空何成在內此中本計心仍在內故今結難心并眼根俱不成在內責其自語相違也二他成己身過若在虗空自非汝體即應如來今見汝面亦是汝身在空離體又見汝面故非自體此下仍補番詞云汝若執言離體見面不妨仍是自體即當如來亦離汝體亦見汝面亦應是汝之身矣三身成不覺過汝眼已知身合非覺能見之眼既離體而有知所見之身離眼而自當無覺矣四轉成兩人過必汝執言身眼兩覺應有二知即汝一身應成兩佛二結破是故應知汝言見暗名見內者無有是處單結見內足見此計同在內矣破內外科已竟五破合處分二一阿難計隨所合處心則隨有本經謂趨外奔逸昏擾擾相以為心性古德謂攀緣妄識狀如野燒忽起忽滅豈可謂之真心今阿難四番被斥乃認隨所合處即是隨所攀緣認為心處正是奔逸昏擾何異野燒此光影門頭了無實體豈成心處良由屢被挨拶露出本相然猶不覺其妄亦曲盡迷態而已又三一謬引昔教阿難言我嘗聞佛開示四眾由心生故種種法生由法生故種種心生首二句見法不自生也次二句見心不自生也正顯二皆互倚妄現俱無生體心法皆空也今阿難失旨反證緣心有體有處在彼心法偶合之處可謂迷之甚矣二指體標處我今思惟即思惟體實我心性隨所合處心則隨有隨合隨有乃是隨其攀緣何法之時即作心在之處今世人妄謂想千里便到千里想萬里便到萬里即同此見猶作真心開示於人誠為可憐觀此宜當知非矣此計雖亦甚妄而比前乃無定處矣三總脫前過亦非內外中間三處中謂根裏二如來以無從來無定體為破無從來則不能隨合無定體則豈能隨有分二一正破又三一牒其所計而定有體佛告阿難汝今說言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然汝今下牒計中文略而意具是心下定有體者詳下破意須成有體而後可施破也首二句反言以決其必有體也下乃防其謬執而已恐彼謬云雖無體而不妨能合即拶之云若無體云云十八界外更加一界六塵外更加一塵是皆無體虗名同於龜毛兔角憑何以論合乎此科所以為下二破張本故下二科皆首標有體以起也二約無從來以破隨合又二一正審從來若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面首句標有體以起也教其以自手挃自身則知覺之體宛然現於所挃之處於是即詰此知覺之心從何而來蓋必因挃始來方成隨合也下難意顯二皆不見則是無所從矣尚無從來之相豈能隨合其處乎二因救轉辯又曲分為二科一阿難救見為眼阿難言見是其眼心知非眼為見非義為見非義者言將心責其令見非心義也二如來辯眼無見佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死若眼下心眼相俱破也乃是用喻以顯能見唯心以阿難喻心以門喻眼喻中門雖通見須有門內之人而後有見非人而門豈能見乎法中眼雖通見須有俱眼之心而後能見非心而眼豈能見乎則諸下離心獨眼破也乃是即事以驗徒眼不見可見知見皆屬於心豈可妄分見屬於眼乎約無從來以破隨合已竟三約無定體以破隨有又二一先開四相阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復徧體為不徧體二一一推破分四一破一體若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成一體者四支共一心體也四支應覺者言手足咸皆覺也下即難於咸覺矣挃應無在者言當不覺挃在何處方是咸覺而成一體之義矣末三句申正義以破之也若挃有所者若但覺一支有挃也一體不成者不成四支共一心體矣二破多體若多體者則成多人何體為汝一人惟有一心故多心即成多人何體為汝者以眾體各分一心故也三破徧體若徧體者同前所挃前是四支共一體此是一心滿四肢故言同前一體成難也四破不徧體若不徧者當汝觸頭亦觸其足頭有所覺足應無知今汝不然當汝二句同時齊觸也頭有二句言當一處覺一處不覺方為不徧今汝不然者言今齊觸齊覺何為不徧乎二結破是故應知隨所合處心則隨有無有是處無是處者承上結云來既無從豈有隨合之相體尚無定豈成隨有之義可見悉無是處也破合處竟六破中間分二一阿難計心在根塵之中又二一阿難泛說中間又二一謬引昔教阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不住內亦不在外實相者性宗空宗所說曲直不同大約說一心萬法不依妄執直談真實本相而已不在內不在外者真心實相也缺不在中間者今欲立心在中間故也論三不在真妄皆可發明若說妄心是明無體意實不在也若說真心是明周遍意反顯無所不在不滯在一處也今阿難混濫偏引真說以附會己之妄意意謂不在內者不在根也不在外者不在塵也可謂謬引矣二檢前立中如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間首三句檢定第一第二之謬計領旨知非也長水謂不字是又字極是與下重申中身心相知最相應合次四句重申二義不成皆所以檢去前之內外而不用末三句躡上內外不成之義泛言立中意取根塵兩楹中間特未分明耳二如來確定中相以彼說中不明故也又分二一雙徵兩在佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身處者身外境界也二雙示不成又二一在身不成若在身者在邊非中在中同內二在處不成若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂表中標竿也修房舍者必立之以表中位也首三句雙徵也次二句雙破皆不得成中也何以故下單以徵釋表則無定三阿難別出己見又分為二科一異佛現說阿難言我所說中非此二種二同佛昔說如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在阿難所引是佛相宗隨順世間之談不了義也此經於後十八界中一一破其相妄惟顯性真方是奢摩他今阿難求此而仍引權說以證心處正是多聞人循名昧義之狀耳眼有分別者言眼有知覺也此句但是定眼根在內而已以其既有知則必屬內身故也色塵無知者此句乃定色塵在外而已以其既無知則必屬外境故也末二句言根塵內外相對而識在中間作用分別故即指為心在之處此方分明說出根塵之中矣二如來以兼二不兼二為破分二一正破又二一雙開兩途佛言汝心若在根塵之中此之心體為復兼二為不兼二兼猶連屬也二者根與塵也如言汝心在根塵之中其體與根塵之二相連屬耶不相連屬耶二雙示俱非分二一兼二非中若兼二者物體雜亂物非體知成敵兩立云何為中首二句標定也物即塵也體即根也雜亂者言混合其心不得成中也後三句釋明也物非者塵非有知也體知者根是有知也成敵兩立者言汝心若與根塵連屬為體則半有知半無知對敵而立墮成二邊豈得為中二不兼更非兼二不成非知不知即無體性中何為相兼二不成者言心體與根塵二法全不連屬也非知不知者言此心體既非根之有知又非塵之不知也末二句言體性尚無憑何立中乎正破竟二結破是故應知當在中間無有是處破中間竟七破無著分為二一阿難以不著諸物為心又二一引佛昔教阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在覺知等正此妄心上文中間被破故此方取三處都無耳二釋成請決一切無著名之為心則我無著名為心不首二句是阿難自意釋成非佛本旨佛言三不在者正前二義中無體義也而阿難證成無著為心是謂心有體但無著而已然詳此語意雖不覺妄心無體而已逼成無處蓋既謂無著何有處乎妄計辭窮自至此耳此有伏難難曰佛之徵處本顯無處今已無處何得又破答曰佛之徵處固顯無處佛顯無處令悟無體今證無著即為心體是雖無處而執有體所以破也末二句不敢自決之意二如來以諸物有無為破此轉約物體以破心體也分為二科一正破又分二一雙徵有無佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無惟徵物體有無也世間虗空物在之處也水陸飛行分物之類也諸所二句總結釋成也末二句牒言汝謂不著諸物者則彼物體是有耶是無耶二雙示不成又二一無尚不成無則同於龜毛兔角云何不著龜毛兔角假設明無體也言諸物若本畢竟無體則汝謂心無所著不著於何者乎此是諸物無體不成無著之義矣二有豈能成又二一標定有不著者不可名無番上若言諸物有體我但不著次一句即斷定云若此不可名為無著也二釋成無相則無非無即相相有則在云何無著釋此承上當用何以故徵起下方釋之首二句無與有相番也如云無相則畢竟無物非無即當成有相矣第三句言有相與有著相因如云纔言有相早已著矣云何得無著乎在字作著字讀之此是諸物有體不成無著之義正破竟二結破是故應知一切無著名覺知心無有是處夫七處皆非則妄情已盡而世人計心之住處者不出於此至此則平日所恃以為心者杳無住處可跟究矣若此體察功夫初聞者其亦知珍重乎然詳此七番確定成處者惟四處而已謂一內二外三根裡及第六根塵之中是也第四還在內第五乃無定處第七并處亦無也又一四引眾同計二三己意推度後三引教謬釋有此差別智者辨之密示妄識無處已竟二顯呵妄識非心上科於前三種非真義中但拈第三有處之執而已今此科中呵為非心方破第一是心之執矣分三一阿難責躬請教又三一責請之儀爾時阿難在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言二責請之辭又分二一自責不知心處又二一責未證由恃憍憐我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏憍憐亦慈愛也如在家子弟多恃父兄之愛不自勤業習氣不忘故出家猶恃也末二句正明未勤修證無漏解現嘆德中矣二責墮淫由不知處不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣真際者既不悟所執之心為妄仍呼為真心實際詣字尋常訓往字今詳經來意似是在字之意譯人命辭稍未穩也良以上文佛雖破處而未分明說出非心及以無處故阿難求處之心未了尚自責其不知真心實際所在也二求佛別說真處躡上自責之詞既以不知心處為恨顯知問意必仍索處然此意亦是與人辯論一定之序佛既七番破其所說之處俱非阿難豈不望佛別說真處乎又二一正求說示惟願世尊大慈哀愍開示我等奢摩他路奢摩他路者意以不知心處則正觀無路可修願佛分明指出此心的在何處庶可為真觀之路此方是阿難真語意也二兼除惡見令諸闡提隳彌戾車闡提此云斷善根人意該一切外道隳壞也彌戾車此云惡見意謂佛若說出真處則我七番所說皆成邪見何況一切外道所說惡見豈不盡成隳壞三懇求同眾作是語已五體投地及諸大眾傾渴翹佇欽聞示誨傾渴者如渴思飲也翹佇者如鳥張望也欽敬也責躬請教竟二如來顯發非心分三一表現破顯諸相又分為五一表諸智將現爾時世尊從其面門放種種光其光晃耀如百千日面門謂眼耳鼻舌為執此識惟恣迷倒塞諸智門皆不現前今識將破諸智將現故以眾光表之二表眾識將破普佛世界六種震動六震者動踊震起吼擊也此正表六處妄識將破耳問據佛所破似惟第六今何言六處俱破乎答既云緣塵分別則前五非無分別況阿難明言眼色為緣生於眼識而佛以兼二等意破之既破眼識餘四并破可知三表覈蔽將開如是十方微塵國土一時開見為有此識緣塵自蔽逐念偏局常處暗冥無量智境皆不能見今將破顯故現此相表之四表分隔將合佛之威神令諸世界合成一界為有此識執法執我分別自他悉成隔越今識破自融為一故此表之五表流轉將息其世界中所有一切諸大菩薩皆住本國合掌承聽由認此識為心浩劫流轉縱得小乘涅槃亦如遠客他鄉不得住持本地全體照用今將破識還住本地全其照體故以是相表之二普示真妄二本本無而錯認為執此屬妄本所謂執似本有而不知為迷此屬真本所謂迷真分二一舉過出由二俱是過也又二一法說又二一歷舉眾過又三一任運受淪人過佛告阿難一切眾生從無始來種種顛倒業種自然如惡叉聚汎爾凡夫不知修行者也惡叉西域果名此方無之聚者每三果成一聚喻惑業苦三生必同聚矣二權小修學人過諸修行人不能得成無上菩提乃至別成聲聞緣覺不成無上菩提者即指權教菩薩於四禪成佛者方至圓之二行故也聲聞者聞四諦聲教也緣覺解現辟支皆秉小教者也三凡夫修學人過及成外道諸天魔王及魔眷屬外道叛佛正教心游道外者也諸天奉佛戒定欣求樂果不求出離者也魔羅此云殺者躭護欲境惱害正修者也皆取具增上果生居勝處有變有通自謂道成者耳二總出其由皆由不知二種根本錯亂修習即真妄二本錯亂者誤以妄者為真獨修於妄非真妄雜修也二喻說猶如煑沙欲成嘉饌縱經塵劫終不能得劫麼此云長時塵劫者微塵記彼劫數極長時也妄不成真故終不可得舉過出由竟二徵釋名體又二一徵起云何二種二正釋又分為二一所執妄本名體阿難一者無始生死根本則汝今者與諸眾生用攀緣心為自性者無始生死根本出其名也則汝下指其體也此體乃無體之妄體耳即上文思惟妄想七番不得其處及下文方將呵破者也二所迷真本名體二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者即前文所判常住真心性淨明體而加詳明也二者下出其名也則汝下指其體也此體方是實有之真體矣妄真皆稱無始者如金之與沙二俱無始不可詰其先後乃佛教中正說異外道之有始菩提者三種中真性菩提耳涅槃者義番圓寂真本圓而妄本寂也三種中性淨涅槃耳取次依本覺如如智理而言故云元清淨元即本也不取修斷障染所成今者現令即具不待後修識精元明者六根所具圓湛不生滅性識精乃其總名本惟一體若應六根而列別名當是見聞齅甞覺知六精也五卷諸佛證云汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物驗知菩提涅槃元清淨體決指六根中見聞等精所以破識之後首即顯見情為妙明本心也舊註全不達此故迷為破見耳又復當知佛釋偈文謂陀那細識正此識精然亦以識為名者乃是第八識海非比前六虗妄無體矣因是真修之本所以修圓通中直選耳根聞性亦此識精而斯經始終要用所以逈異於諸經者由此根性以為之本矣應知二本所含下文前短後長前至此卷半破識盡處後至二卷末破和合盡然真本寄標於此耳元明者本來自明非由修斷矣諸緣者前六轉識也楞伽云藏識海常住境界風所動種種諸識浪騰躍而轉生是知前六皆此識海所生諸浪故虗妄也緣所遺者言前六能遍緣一切而獨於本生識海自緣不及如眼所起見能遍見一切而自不見眼也縱使悟時須一念不生方能默契六識若動體即隱矣故學人不捨緣心畢竟如生盲不見性也由其執認緣心必遺元明故曰緣所遺也問惟識何言七緣第八見分為我答偈云隨緣執我量為非既是非量豈真能緣然謂之真本者真修根本以決定能成菩提涅槃故也正釋竟三結歸由諸眾生遺此本明雖終日行而不自覺枉入諸趣此結雖似單結迷真而實亦竝結執妄以迷真正由執妄也蓋因緣不及畢竟不見遂成永迷也雖終日行而不自覺者日用不知也如見聞等諸精無須臾離而竟不知其可以用為真修之本能至佛位所以終不見其全體得其大用也枉者屈也言本不當受而屈枉受之諸趣即七趣也蓋此識精眾生本有體遍十方用彌沙界非諸趣所能牢籠但由不覺甘受輪迴豈不屈枉哉警之至也普示執迷二本已竟二正斥妄識非心即前所徵愛樂妄心而今重舉重徵者良以破處示本文辭既長前之心相沉隱若不重舉徵令現前將對何者而施斥破之辭乎重徵之旨惟在此耳分三一如來重徵直呵又分三一應來垂問阿難汝今欲知奢摩他路願出生死今復問汝奢摩他路問答意別阿難以求知心處為路如來則以了此妄識無體無處而別覔真心為奢摩他路也二徵令現前又三一於見詳徵又三一總徵於見即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見五輪指者佛之指端皆有千輻輪紋屈者握而成拳相也二別徵所見佛言汝何所見阿難言我見如來舉臂屈指為光明拳耀我心目三別徵能見佛言汝將誰見阿難言我與大眾同將眼見此上三科方以徵定能見所見而未及徵心故大科名於見詳徵也此中先徵眼見密含深意現於前文徵處科下小註之中今因重徵當亦重申明之如來前文云將何所見誰為愛樂意已深含辭猶隱略此處有三審試太煞丁寧學者不可不著眼一則舉拳語阿難言汝今見否阿難言見二則曰汝何所見阿難答以見光明拳三則曰汝將誰見阿難又惟答以眼見如來可謂重重顯示阿難可謂頭頭錯過矣如來見阿難始終不能薦取不能直認見性為心只得落草盤桓更問以何為心當我拳耀也此意甚深難知故特為宗通者漏洩之問環師此處亦云金拳舉處直下要識本明塵相未除依舊認賊為子豈不徹了此意答此正所謂似則也似是則未是以環師未徹見性即是本明耳諍曰如來正舉拳徵見環師就此便說要識本明如何不徹見性答若果此處徹領見性即是本明到盲人矚暗章中不應隨眾說為破見也問彼却取何為本明耶答彼蓋泛領宗家所云正法眼藏涅槃妙心之名字為本明耳而實未能親領目前見性即是涅槃妙心所謂似現量而非真現量也知言者固不可以一語之偶合而濫許其全是也環師他處似是而非者尚多此其未透之源本也歟二就答徵心佛告阿難汝今答我如來屈指為光明拳耀汝心目汝目可見以何為心當我拳耀前文云將何所見誰為愛樂合此科當是兩番徵心而已三舉心以答阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心推窮尋逐之心即前阿難自述思惟愛樂及如來所判妄想攀緣之心也上文云由目觀見如來勝相心生愛樂合此科當是兩番自呈妄心但上文且惟破處此下方直破心矣徵令現前已竟三直呵非心佛言咄阿難此非汝心咄振聲呼警令大驚悟也前言三種非真意中此方說破第一非是心也重徵直訶已竟二阿難驚索名目阿難矍然避座合掌起立白佛此非我心當名何等矍然驚愕貌避離也經久自恃惟知有此一朝奪之無有不驚者矣三如來指名出過佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉前塵虗妄相想此六字乃其本名阿難既聞非心索要本名故佛直指本名以答也前塵者現前所對六塵也虗妄相想者言此思想必帶塵相虗妄暫現豈有實體哉故後顯發科中不過詳釋此名之義而已由汝下出其錯認之過患也認賊為子者本非心而錯認為心也失元常者即昧真心而不認取也如人既認賊為子更不求覓真子矣受輪轉者以所認非真常之心故長流生死如常遭賊子竊奪也顯呵妄識非心已竟三推破妄識無體此科方以說透識心徹底虗無斷滅全不是心矣分二一阿難述怖求示分四一述唯用此心又三一出家用此心阿難白佛言世尊我佛寵弟心愛佛故令我出家二作善用此心我心何獨供養如來乃至徧歷恒沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心此科及下科皆是假設擬度必不能外此心而別為用也三作惡用此心縱令謗法永退善根亦因此心二述舍此更無若此發明不是心者我乃無心同諸土木離此覺知更無所有末二句是依佛捨此更復揣摩則杳無別心可得也三述自他驚疑云何如來說此非心我實驚怖兼此大眾無不疑惑天上人間凡外權小無不說此為心故與阿難驚疑同也縱有禪定取證亦由制住此心而得故也四求如來開示惟垂大悲開示未悟且求開示如何此非我心如何名為前塵虗妄相想此尚未及求說真心也阿難述怖求示已竟二如來安慰顯發又二一安慰許有當知此科非是正說真心但由阿難驚怖離此更無故且許有以安慰其驚怖也又曲分為三一先標垂教深意爾時世尊開示阿難及諸大眾欲令心入無生法忍無生忍者別教初地以去方始證入圓教當住位所證住此忍者於三界內外不見有少法生不見有少法滅超情離見一一當體皆即真如實相亦即一切事究竟堅固也眾生不能證入於此者正由誤認生滅妄想為心故於此忍永隔而不能入今將破彼生滅顯發無生故經預標以示如來垂教利益之深耳至後敘開悟云世間所有皆即妙明獲本妙心常住不滅其即此忍之義相乎二示己常說唯心於師子座摩阿難頂而告之言如來常說諸法所生唯心所現一切因果世界微塵因心成體諸法所生者眾生迷其真源而妄謂萬物各有從生之法如金生水木生火之類是也惟心所現者聖教直指大本唯一真心體隨緣變現也二句敵體相番略以總標一切下詳以別列也因果具凡聖權實大至世界小至微塵具染淨麤妙因心成體者即唯心所現所謂萬法離真心乃至無芥子許可得也三舉況真心有體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體縷結如絲麻之類舉至細微以況麤大詰追問也根元體性亦是隨世間所說因緣及自相也虗空二字即名豁虗無礙為貌此舉無體者以況有體也自體無垢曰清淨處染不染曰妙淨湛寂虗靈曰明心性一切心者與一切法為心性也此心海廓周法界而一切諸法皆是真心海中所現影像無自體性但依此心為彼實性故也而自無體者正是況顯之詞言所現之物尚皆有體而能現之心豈反自無體乎決言真心必定有體汝但因執此妄心故以迷彼實體豈真離此更無所有乎安慰許有已竟二顯發虗偽上雖指名出過猶未明其何為虗偽故此始發之也然前文三種非真義中此科方以說破第二無體之義又復曲分為二科一托塵似有又二一反難離塵當有若汝執恡分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性執恡者堅執舊見而不捨也分別者散心任運之用覺觀者究理推度之用前麤後細二皆有分明不昧之相故曰所了知性此正妄識也必為心者決定認此為自心也此先按定向下方起難詞色香味觸略舉四塵諸塵更該聲法之二一切事業皆塵所成如云塵事塵業也然營業之初曰事事辦之後曰業別有全性者縱之令其離塵自有也二正言不能離塵又復曲分為二科一外緣不離如汝今者承聽我法此則因聲而有分別單舉聲塵者固取現對之境舉一例餘亦是以勝該劣矣此即破第二緣佛聲教心也二內守不離縱滅一切見聞覺知內守幽閑猶為法塵分別影事此見聞覺知約前五識及五俱意識而言以四攝六蓋合齅甞為一覺也滅者息此諸識外緣覺觀而不動也幽閑者內心寂境也此科方該諸修學人故此境即凡外權小在定所守之境亦彼取證以為法性者也法塵者指此境之本名如云本非法性元是法塵也分別即守此境之心也影事者言此境此心但是光影了無實體矣蓋凡外權小執此幽閑以為法性深處而不知尚是妄識所緣法塵又執守境之心已離外塵而非分別而不知未離法塵猶是分別也然此境所以為法塵之由者有二一者凡外小乘不達諸法本空但捨外而緣內如鏡外之物不除鏡中之影常在但相似不動而已實念念不忘外法豈能除其影乎影即法塵也二者權教菩薩雖達法空而未聞此經塵有十二今於幽閒之時雖離明動通甜合生之六而未離暗靜塞淡離滅之六也故亦是法塵也至於守境之心所以為分別之由者亦二一者境既法塵體非本有全托分別而後分明一不分別境即沉沒故恒分別譬如無波之流望如恬靜而實不住也二者凡外權小皆依六識思惟為觀六識印持為止離六識無別定慧之體故根本元是分別豈能擺脫乎夫境是法塵心是分別境固不能離心心猶不能離境自謂清淨實全垢污自謂寂定實全流注矣大凡上禪深教不明而好靜定者未有能出此境者矣然亦常處生滅終不自覺其非奉勸好禪定者尚當究心於斯經而後可乎抑又因是而知一切權乘有出入之定皆是微細分別蓋全以憑仗細分別心持彼寂境一不分別寂境即失名曰出定楞嚴大定豈如是乎請昧題中所解自知異於是矣此即破第四止散入寂心也托塵似有已竟二離塵實無又曲分為二科一暫縱離有即許為心我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心非敕汝執者不強其定依也但汝下教其自度也若離下方是縱詞有分別性者有離塵之自體也即真汝心者暫許之也二隨奪雜無不得為心又復曲分為三科一離無即是塵影若分別性離塵無體斯則前塵分別影事二塵影即同斷滅塵非常住若變滅時此心則同龜毛兔角全托諸塵而現分別之影塵若變滅心豈能存如形滅而影自亡故同龜毛兔角二乃無體之名故以之喻也三斷滅誰成至道則汝法身同於斷滅其誰修證無生法忍法身斷滅者順阿難意執緣塵之心為法身故也此所以權小法身尚非真實常住而終無實果以不離塵影所謂蒸沙作飯也無生忍同前如來備破三迷已竟二會眾知非無辯即時阿難與諸大眾默然自失默然者依佛微細揣摩自失者覺得離塵無體又前責己不知心處尚望佛言聞佛直呵非心驚疑諍辯及其蒙佛無體之示始知體尚本無安有住處三迷全破三執全消故默然無辯然則平日倚恃為心者一旦杳無體性無可跟尋而又未審何者為心即如人失其所寶之物故曰自失正與斥破已竟三結歸判辭佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果前文普判眾生誤認科云一切眾生生死相續皆由用諸妄想此想不真故有輪轉自判後即乃備破三迷破迷已畢故此仍以結歸前判以原其文也世間諸修學人即前一切眾生非但指於界內如此經以三賢四加尚名世間詳下文正指凡外小乘而意該於權教菩薩九次第定謂四禪四空加滅受想小乘法中前八凡位所成第九無漏聖位所成今云不得漏盡成羅漢者當知彼所謂無漏聖位皆一時權許誘進而已法華破云汝當觀察籌量所得涅槃非真實也既非真涅槃豈名真漏盡乎故長水謂十地為漏盡羅漢無可疑也極理而言權教之佛亦非以尚在圓之二行而已皆由下二句正歸判辭即前用妄想而有輪轉也由是知前生死必兼變易輪轉亦帶涅槃也末歸阿難意猶可見蓋小教許四果皆聖阿難已登初果而謂非聖豈破初而獨存於四乎決定以十地方為分證之聖果矣此即破第五界外取證心也斥破所執妄心以開奢摩他路已竟二顯示所遺真性令見如來藏體上科即是妄本已破而不用矣此科即是真本正修必用佛云眾生遺此本明枉入諸趣故科名承用遺字然而現具六根之中遍為一切法體故此科始從眼根開顯以至四科七大也分二一阿難捨妄求真久執妄識為心最所難捨今悟其妄方始捨之惟求真心矣又三一悲感陳言阿難聞已重復悲淚五體投地長跪合掌而白佛言凡悟深者而後發悲或悟妄而悲久苦或悟真而悲久失今此悟妄之悲也二追述痛悔此中二子科即示墮淫室二種深意文現於此就分為二科一悔恃如來不修大定自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝此科即他不足恃也惠者恩賜也三昧此云正定亦云正受入此正受不受一切餘境也代者替也如愚忙迫令他代食終不自飽失本心者因悟妄心而始知不見自心即非入道喻如捨父者生佛本來同一法身住持法身者似離而實合似疎而實親今阿難認妄遺真似合而實離似親而實疎所謂對面千里故云爾也觀此則不自修行而但求加被者亦可以警矣二悔恃多聞終無實得今日乃知雖有多聞若不修行與不聞等如人說食終不能飽此科即聞不足恃也觀此則徒恃學問而不實修者可以警矣三表迷求示世尊我等今者二障所纏良由不知寂常心性惟願如來哀愍窮露發妙明心開我道眼二障者煩惱及所知也煩惱障者即見思二惑見乃作意分別之惑即十結使思乃任運貪愛即貪嗔痴慢四結使前麤後細總屬我執所起能障人天勝妙好事故名事障煩惱即障持業釋耳所知障者亦二一者取境謂不達外境唯心而謂心外實有有所希取二者法愛於所修證不達性空而生愛著亦前麤而後細總是法執能障法空之理故名理障然所知二字不即是障正是法空之理依彼所障之理以為名故曰所知不是障被障障所知是能障所知之障依主釋耳亦名智障即法空之智同前理說阿難初果方脫見惑而思惑未盡是尚為煩惱所纏至於所知障渾然未解脫矣寂者不動搖也常者無生滅也因佛開示覺得前來所執之心分別喧動無有寂時起滅紛飛豈能常住由此方求寂然常住之心應知比前破處之後所求之意逈別前云溺於淫舍當由不知真際所詣是尚以妄識為真心責己不知真處但惟求處而已今云二障所纏良由不知寂常心性方始責己不知真心而別求真心矣窮露如窮身暴露無所棲藏也空有不羈曰妙體用朗鑑曰明真妄顯現決擇分明曰道眼又物不能礙曰妙物不能混曰明蓋寂常妙明之釋與下佛之答處皆有照應二如來極顯真體分三一放光表顯又復曲分為四科一真智洞開相即時如來從胸卍字涌出寶光其光晃昱有百千色前光表了妄之智此光表達真之智又即根本智如如性體後文如來自謂不滅不生惟妙覺明是也卍者彼方萬字也如來胸前萬德吉祥紋也光從此出亦表所開智萬德圓備光晃昱者見此智明踰日月色百千者見此智用等河沙二圓照法界相十方微塵普佛世界一時周徧非比前心一念偏局十方俱闇此智若開體徧法界即照窮法界亦即後文如來自言惟妙覺明圓照法界是也三上齊佛界相徧灌十方所有寶剎諸如來頂四下等生界相旋至阿難及諸大眾生佛法界本同一體今既照窮則生佛法界無不洞徹矣二普許開示告阿難言吾今為汝建大法幢亦令十方一切眾生獲妙微密性淨明心得清淨眼幢表摧邪立正獲妙下八字是如如理亦即奢摩他體獲妙二字略斷一斷雙貫下微密性與淨明心法界真理但惟一體自其本寂而言謂之性自其本覺而言謂之心今於性而稱微密謂隱微祕密即本寂無有形聲意也於心而稱淨明謂無染無蔽即本覺照體獨立意也而妙字同前空有不覊物不能破貫下性心當云妙微密性妙淨明心而經文省字成句耳二皆指理體而言末四字是如如智亦即微密觀照獲得同意重言得者足見理智對舉清淨眼者契理之智番前妄心全體緣塵故不清淨此智遠離分別諸塵不干稱理而周法界後經名清淨海眼是也又阿難求寂常心性而佛許以妙微密性求妙明心而許以妙淨明心求開道眼而許以得清淨眼亦請許相應矣三說盡真際盡其真心實際也若惟就其見聞覺知靈鑑無相之體而發揮之不達於四科不極於七大則猶未盡其際也今於四科七大悉顯其為一真不動周圓本定之心體故可謂盡其真如實際矣又此純談真如但示空如來藏未明起用故科真際也分三一尅就根性直指真心此經最殊勝處全在破識心而不用取根性為因心良以用識用根乃權實兩教之所由分用識而修者塵劫不成菩提從根而入者彈指可超無學若要決定成菩提決定證涅槃惟須直取根性為因地心而後可圓成果地也故舊註救起識心反言破見甚違經旨所以不得已而復解也且此根性尅體在於眾生現前本具見色聞聲等處率皆日用不知即祖家所謂不離動用中也然其體量徧周法界為四科七大之實體即祖家所謂動用收不得也今酬妙定之請而首先指於此者正以此性之體不假制伏而本來不動不勞續念而本無生滅不煩擴充而本來周徧皆與識心大相違反是即真奢摩他自性本定也幸惟一洗舊聞委搜佛旨當自見之又二一帶妄顯真問既曰顯真何又帶妄蓋此根中之性即第八根本識所謂識精元明緣所遺者此識據法相宗有三位名異而體不異自凡位至七地名黎耶識此云藏識自八地至等覺名異熟識佛位名陀那識此云執持亦云無垢前二真妄和合後一純真據圓教即應仍是真妄和合以彼佛位方是圓之二行無明未盡故也據阿難所稱菴摩羅識此云白淨方似圓教佛位純真之識再俟參考然度佛果後若無此識則過未因緣悉應忘失四雖一體而今所顯者但於凡夫分上正惟黎耶實體經後偈文亦稱陀那細識舉勝稱揚也其體全是真心而具無明雖具無明而眾生分上捨此無別真體非比前心無體非真也特以權小惟認前六識心以為勝用至於六根一向目為色法總攝無記故於修行分中不知不用常如遺失所謂眾生遺此本明也今佛於破妄之後應當機之懇求急欲其捨彼識心認此根性若不先以極顯其真何以使其決定取此新悟而捨彼舊執乎是以雖有二種顛倒見妄姑帶之而且不遽破故曰帶妄顯真直至十番顯後方乃一番破除非惟顯多破少而破處亦如脫衣露體豈同前之全破無體乎舊註自此總謂破妄見遂令學者不敢直認見體為心違佛本旨甚矣千載差誤不可不知分為十科一指見是心六根中性雖同一陀那細識而最便於目前開示者莫過於眼根中見性故惟從此顯發而餘可例知然此見性所以別於眼識者但取照色之時一如鏡中無別分析即是見性起念分別即屬於識聞等例此是可見祖師云毫釐有差天地懸隔最為格言學者當以細心甄別之又三一雙舉法喻現前又二一如來雙徵拳見阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見二阿難各答其由阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪捨端屈握示人故有拳相閻浮此云勝金須彌南面有此檀樹果汁入水沙石成金此金一粒置常金中悉皆失色佛之身色如之赩赤焰也又傳此金方寸暗夜室中照耀如晝佛身赤焰不但如金破暗之光二辨定眼見是心又分三一辨無眼有見顯其不假眼緣見性自結為根便局肉眼所謂聚見於眼眾生浩劫迷己為物但謂見性全屬肉眼無上勝性反成劣相略說其劣有三不及前心一者有形可見可捉不若識心不可見不可捉摸也二者有礙見前缺後見障內不見障外覩近限遠不若識心前後內外遠近皆可緣也三者易壞觸之即傷不若前心卒難損壞也以故眾生但認前心而曾不覺此眼中之見為妙性也今欲當機決定捨彼識心認此見性故須巧示令知此見非眼全不係眼而為有無判然有離眼之體是故但悟此見非關肉眼則豁同虗空無礙無邊所謂常住妙明不動周圓無窮妙義從此而漸顯方能逈超前心而今決取捨矣以故此科持辯無眼有見而下科判其是心非眼也又復曲分為三科一雙陳法喻令審佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不無拳無見義本不均試問令其推度而已二阿難未覺不齊阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類示同常情答也三如來斥非詳示又分為四一正斥其非佛告阿難汝言相類是義不然二明其不齊何以故如無手人拳畢竟滅彼無眼者非見全無手外無拳故手無拳滅眼見各體故眼滅見存非全無者但明不滅非謂半無或約瞽者但缺見明之用而尚有見暗之用故不全無若取體而不取用前說理正三令其詢驗所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前惟見黑暗更無他矚更無他矚者除見暗外更無別見也四結申有見以是義觀前塵自暗見何虧損暗相即塵然謂之前塵者以其對於眼前也末二句言所見之塵自暗而能見之體固無減也夫既無眼而有見則此見何干於眼而言無眼即無見乎辨無眼有見已竟二辨矚暗成見顯其不假明緣上科示內不依根此科示外不循塵良以眾生既以迷己為物瞢然與物無分何但無眼即謂為無見而無明亦謂其無見矣故此深明其暗中無損於見也又分為二一阿難疑於覩暗非見阿難言諸盲眼前惟覩黑暗云何成見但假此問以引起辯見是心耳二如來例明暗見無虧又復分為二科一雙詰二暗佛告阿難諸盲無眼惟觀黑暗與有眼人處於暗室二黑有別為無有別二雙答是同如是世尊此暗中人與彼羣盲二黑校量曾無有異此下語意稍為缺略宜結難於阿難云汝謂無眼黑中即為無見豈此有眼黑中亦無有見乎其意方完三辨見乃是心顯其離緣獨立分二一例明眼見之謬夫阿難初答眼無見滅次疑覩暗非見是乃執見全惟是眼乃大差謬今佛取例正顯斯謬也又二一初例成謬阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見無眼得眼而後見既名眼見無燈得燈而後見應名燈見其謬全同人所易見二轉成二謬若燈見者燈能有見自不名燈又則燈觀何關汝事一者燈當名見謬二者見不屬己謬寄燈見以責眼見之謬也二結申心見正義曲分二一取例非燈是故當知燈能顯色如是見者是眼非燈二轉例非眼眼能顯色如是見性是心非眼全番上初例之謬以申成正義有眼得燈者但借燈以顯色而所以見者決是眼而非燈此能例之喻人所共知由是以例無眼得眼者亦但借眼以顯色而所以見者決是心而非眼此所例之法人所未覺聞經者極宜省悟於此而認取見性為心矣觀佛前呵識心則曰非心今薦見性則曰是心明以應阿難真心之求但令知其離彼肉眼不藉明塵別有全性所謂靈光獨耀逈脫根塵極顯其真何甞破其為妄乎具眼者請深味之詳辯具在懸示辯定眼見是心已竟三未悟更希廣示阿難雖復得聞是言與諸大眾口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨是言即是心非眼之言口已默然者此中亦有微解仍具三重一者一向但知有眼方為有見無眼即為無見今驗盲人覩暗始知無眼有見而此見與眼殊不相干二者一向但知見明方可成見見暗不得成見今例有眼暗中同於無眼之暗始知見暗之時誠亦是見三者一向但知見惟是眼不名為心今觀有眼得燈無眼得眼皆但顯色始知見乃是心而此見精離彼肉眼別有自體誠異前心離塵無體矣默然之中反覆研味此意而已心未開悟者未大開悟也此中更有諸疑意謂我之所求因前緣心不寂不常非妙非明故別求寂常妙明之心今佛示我此見為心雖知即心不知此心亦具寂常妙明等義否耶末四句皆意請如來宣示此義耳按佛後文明示如來藏心乃云常住妙明不動於阿難之四義已同而但加周圓一義足成五義當知此下於見性九番開示乃所以答前四義而同後五義足徵此見即是如來藏心至文一一別示指見是心已竟二示見不動此科即示第一寂義也分三一辯定客塵二字此之二字若按字分義則客表不住塵明動搖反顯主乃常住空實不動則兼顯二義若按科分義則主空皆明不動以常住不滅之義自屬下科所顯而不動不滅皆可釋於住字故也又復曲分為三科一如來尋究原悟爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大眾我初成道於鹿園中為阿若多五比丘等及汝四眾言一切眾生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果鹿園者古國王養鹿之地五比丘者佛初為太子出家時王命隨侍者父族三人一阿此云馬勝二䟦提此云小賢三拘利華言未詳又云即摩訶男似是長子之稱母族二人一阿若多此云解本際二迦葉此云飲光共五比丘而阿若多為最先發解者也菩提取大乘之果羅漢取小乘之果是佛初轉法輪之意當時所說客塵之喻乃喻集諦反顯主空乃喻滅諦耳今但取能比之喻不取所喻之法以此中客塵但喻身境及緣身境之心主空俱喻見性故耳二陳那詳答二義又分為三一自陳得悟時憍陳那起立白佛我今長老於大眾中獨得解名因悟客塵二字成果憍陳那亦云憍陳如即阿若多之姓也此云火器亦事火之族二喻明客字世尊譬如行客投寄旅亭或宿或食食宿事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義俶整也三喻明塵字又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義三如來印許其說佛言如是此但印其所說舊喻動靜分明不混欲以彰下文所示孰為動者同於客塵孰為靜者同於主空耳辯定客塵二字已竟二正以顯見不動又復分為二科一對外境以顯不動外境比身尚為疎遠其與見性動靜易見故先顯之又分四一辯定所見即時如來於大眾中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌眾中開合百寶者貴重之稱輪掌者佛之手足中心各有一千輻輪相故云耳二辨定開合佛言阿難汝見我手眾中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手眾中開合我見如來手自開合非我見性有開有合當阿難端視佛時而其見性湛然盈滿於前乃視如來之手在此見性之中開合不住則佛手自同客塵而阿難見性何異主空此動靜顯然分明故先令辯定是誰開合則動靜自分於是阿難果答不謬三辨分動靜佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住躡上令其自分動靜也佛手不住者已判定佛手是動也下三句乃判定見性不動也但用況顯之詞故初學或不省解今詳與明之其曰尚無有靜者非言不靜也蓋靜必因動而顯如先時曾動今始不動方可說靜今此見性從來不動設說其靜尚為不可故曰尚無有靜也誰為無住者猶言豈有動乎無住即動也蓋明其非惟離動亦且動靜雙離所以發揮此性常不動搖從來至靜非由攝念而得制伏而然誠所謂天然自性之本定矣乎四印許其言佛言如是許其所分外境為動見性不動皆不謬也當知此中但舉佛手為一切外境之例既知佛手開合與此見性無干則凡一切萬相及諸世界任其紛亂動止皆與見性無干矣若人於萬相中忽然覻見此不動之性常恒不昧何至為境所奪妙之至也又宗家竪指伸拳發明於人者多密此意令人自見自悟但教家分明說透為異耳對外境顯不動已竟二就內身以顯不動內身比境親為自體其與見性動靜難分故更明之又四一光引頭動如來於是從輪掌中飛一寶光在阿難右即時阿難迴首右盻又放一光在阿難左阿難又則迴首左盻二審問動由佛告阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動此科但欲阿難說出因觀頭動方好辨於見性之動靜耳三辨分動靜阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動外境動而見性不動人或易知自頭動而見性不動人實難辨良以世人認見是眼故頭搖眼轉宛似見性亦動今阿難因佛上文說破見不屬眼已覺此見離眼獨立湛然滿前自是頭之動搖何干於見是以直答頭動而見不動也止亦靜也況顯意同上文耳四印許其言佛言如是許其所分頭為搖動見不動搖皆不謬也當知此中但取頭搖為發悟之端既知頭動而見恒不動則凡此身往來千里萬里乃至恒沙世界死此生彼而此見性常如虗空無所動也若人悟此恒常不隨身轉則日用中行住坐臥皆在自性定中誌公云不起絲毫修學心無相光中常自在者此也其與閉目想空自墮法塵之影者天淵懸絕矣又宗家從東過西乃至跳舞意亦顯此而迷者效之但弄精魂終不得旨也此意契合賞鑒者難道無人而其間不肯者當亦不少幸屈高見再委下文當必有首肯時節正以顯見不動已竟三普責自取流轉又分三一取昔所悟客塵於是如來普告大眾若復眾生以搖動者名之為塵以不住者名之為客此科二以字是知說意蓋心知口說皆決定以動為塵以不住為客此是述昔鹿苑所素明者牒之二令觀現前動靜汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷此科是令眾轉明現今大眾所見頭手不住而動者決是客塵見性住而不動者決是主空言當取昔所解為今領悟矣三正以怪責妄淪又二一怪其明知妄由身境云何汝今以動為身以動為境此科是佛怪問引起下文責之之詞因人多不省解以謬註錯亂言愈多而愈不明故號分為一科以便發明二以字照上科皆作知字說字讀之如云汝若不知身境是動或不曾說出身境是動是徹底迷昧固不足怪今汝云何明知明說動者為身動者為境依舊從始云云即接下之責詞無不明也此蓋緣譯人下得云何二字太早若將此二字移作下科之頭讀之自是明爽不費委曲釋矣試讀看二責其依舊認妄遺真又分二一曲分三障就分三一惑心從始洎終念念生滅接上意云既知既說動是身境便合了悟身境全是客塵不應執迷可也何乃依舊從始洎終於身境中念念生滅哉始終者遠則無始為始今生為終近則生為始而死為終下句即我法二執若認身境為我及我所便是我執若認身境心外實有便是法執既惟堅認執迷則必念念不離但於身境中生滅可謂惑之深矣二業遺失真性顛倒行事真性即指不動之見性既惟認妄便乃遺真全不認取下句即造妄業蓋認妄遺真事事顛倒非惟世間事業縱使種種修行皆名顛倒以其動執身境靜依法塵依法塵者還同身境曾不覺知本有天然不動之見性也三苦性心失真認物為己首句全牒上科二句言所依為心性者既非是不動之真體則所領為身命者豈本元之法身將見因差果謬必招認物為己之苦也蓋認物為己便是受身著境之苦果已成如凡夫妄認身為我境為我所身重而境輕權小妄認能證之心為我亦身也所證涅槃為我所亦境也境重而身輕圓覺云乃至證於清淨涅槃皆是我相圭峯解凡夫所執我相是迷識境權聖所執我相是迷智境雖麤細不同皆名認物為己用是觀之權聖涅槃尚是認物為己則凡夫身境豈非認物為己其與一切精怪依草附木攬為己身者顛倒是同也豈可不猛省而生厭患乎二總結長淪輪迴是中自取流轉輪迴即二種生死是中者身境之中也言塵劫輪迴皆因不離於身境凡夫於麤身境中為分段生死所輪權小於細身境中為變易生死所輪末句責其自取者言非有魔驅鬼制但由自棄不動之本性自取流轉之身境而已嘗謂纔學道者便知覓主人翁却乃多認攀緣不住之客而不知目前朗然常住之見性方是真主人翁纔聞般若者便說真空却乃閉目懸想搖動之法塵而不知目前廓然不動之見性正是真空快哉法王之妙示行人於此宜當反覆體認必有豁然時節始信孤負本有久矣
