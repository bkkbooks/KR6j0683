body:
  text: 京都西湖沙門交光真鑑述二審除細惑說後二如來藏此亦取三卷末阿難發心偈云希更審除微細惑以向下所談乃生妄之深源成礙之幽本故也後二藏者謂不空藏與空不空藏也古德解釋三藏有二義一者圓覺疏以隱覆含攝出生為三二者華嚴疏以體相用三大順次釋空等三藏今似後義而亦稍不同上之空藏全同以所顯之真正惟體大合下二藏意旨便殊蓋惟約體用單雙會釋空等三藏而合相於用亦非有缺漏矣至下分科更明分二一問答辨劾諸惑又二一滿慈躡前以質二疑此以滿慈請發者表下所談惑細理玄無學深位皆當究心非獨為有學說也故今表兩重勝前當機一者四住惑盡勝前惑未盡也二者四辨能說勝前但能強記也又二一泛敘有疑又二一讚嘆妙示爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦有折伏之勇曰威有攝受之慈曰德上契至理而下契劣機曰善為敷演談一諦而三諦具足且諦諦文文皆越小乘見解故號如來第一義諦二正舉疑情又二一自疑又二一敘昔未聞世尊常推說法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞分得如來最勝四辨故為說法第一法音下當補云回思昔日方顯敘昔喻言聾人聆蚋近已不聞況百步外大聲百步亦未必聞況蚊蚋聲極狀其自昔以來雖證無學雖善說法於斯妙法絶未得聞非謂今在會中尚如聾人等也二求今斷惑佛雖宣明今我除惑今猶未詳斯義究竟無疑惑地蓋彼平日惑山河等心外實有今佛上文宣明即心而又本空惑五大性互闕不周上文宣明各皆周遍令其除此二惑也斯義即本空周遍二義究竟無惑在下文確陳中見之二衆疑又二一有學明其習漏世尊如阿難輩雖則開悟習漏未除輩字全該有學那含亦在其中開悟者即前承佛妙示頓忘法執分別而於法空中勝解現前習漏未除者即彼我執中俱生細惑依然未破蓋深悟與淺證二不相礙然習漏既存則二執俱生尚深亦應盡與拔之二無學述其疑悔我等會中登無漏者雖盡諸漏今聞如來所說法音尚紆疑悔諸漏界內欲漏有漏無明漏也漏盡則不生三界此敘舊證已得我空顯下所疑是細法執却比有學能起現疑兼亦代彼發其種子今聞下正明未了紆者纏繞也疑悔二心所也疑屬根本悔屬不定自他法三疑中單屬疑法善惡二悔中單屬悔惡即悔前小乘錯亂修習也舊修已悔新聞尚疑故疑悔交纏未決定矣泛敘有疑已竟二確陳以請又二一確陳二疑又二一疑萬法生續又二一牒佛語世尊若復世間一切根塵陰處界等皆如來藏清淨本然此於萬法起疑故但牒彼陰等科中之語以彼皆如來藏便顯即心清淨本然便顯本空又清淨本然語雖現於七大科中而意惟取前四科以彼一一結妄顯本清淨一一歸真顯即藏心故也二正舉疑云何忽生山河大地諸有為相次第遷流終而復始此疑有二一疑始之忽生二疑終之相續云何者何因緣故也若於次第上重讀云何二疑自顯山河大地即世界諸有為相兼衆生業果齊此乃疑始之忽生意謂既即藏心本空最初何故忽生世界衆生業果耶次第遷流即兼上世界等三終而復始即是相續之意此二句方是疑終之相續意謂既即藏心本空縱使忽生亦應忽滅末後何緣浩劫遷流相續不斷耶此問求佛與說始生終續之詳非直怪問其不當生也故佛後分始終各答其詳二疑五大圓融又二一牒佛語又如來說地水火風本性圓融周遍法界湛然常住此文分明惟取七大周遍科中之語二正舉疑世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界據牒中則惟四大及舉疑則棄風而加空且風空俱與地礙故確論所疑但惟五大而不疑見識者以彼無形礙也首二句地水難容也次六句水火難容也又四句地空難容也上科所舉之疑文如一氣而疑有兩節此科所舉之疑文如三段而疑惟一意謂總疑有礙而已確陳所疑已竟二請佛開示而我不知是義攸往惟願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨是義二疑中義也攸所也往歸也言不知二義所歸趣也惟願下求佛釋疑開迷雲者欲佛說出生續之由圓融之故庶使迷雲頓破慧日洞明方到究竟無疑惑地矣滿慈躡前以質二疑竟二如來次第以除二惑分為三一佛慈許說又二一經家敘衆爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢經標無學特顯法深二正舉佛言四一示所說勝如來今日普為此會宣勝義中真勝義性佛言普為仍彰慈廣勝義中勝義者法相宗有四蘊處界為世間勝義四諦為道理勝義二空真如為證得勝義一真法界為勝義勝義彼但真俗不融為異法性所立勝義無差據佛後文答萬法生續則起於性本二覺答五大圓融則歸於一心三藏宛然皆一真法界二示所被機令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等此於普為中別舉當機以等餘衆均是四果言定性者謂彼尚未回心似應於此方回二空惟指人法言總意別蓋於人空已得而未兼得二空者也回向上乘者向了義大乘也若法華前已向上乘更開何權理不通也等者等有學及人天衆也三示所獲益皆獲一乘寂滅場地真阿練若正修行處一乘者一佛乘也即法華大白牛車寂滅場地即本覺果體萬妄本空一真清淨即下文所謂惟妙覺明圓照法界極而言之亦即三藏圓融之境也梵語阿練若亦云阿蘭若此云無喧雜世間可靜修處皆得稱焉然但為境靜是假非真寂滅場地乃本心本靜與境無干是真離喧雜古人所謂置之一處靜坐須臾皆謂此也住此修行譬依金作器器器皆金依果起因因因即果成佛正因莫正於此故曰正修行處離此即邪修矣四囑聽許說汝今諦聽當為汝說佛慈許說已竟二大衆欽承富樓那等欽佛法音默然承聽三正為宣說分二一正答滿慈又二一說不空藏以示生續之由此對上空藏彼約心真如門會妄歸真以顯藏心不變之體此約心生滅門從真起妄以顯藏心隨緣之用然用應有二一隨染緣起六凡用二隨淨緣起四聖用今為開迷成悟故且單取染用為言而全用更在下空不空藏中又二一正答初問又五一牒定所疑佛言富樓那如汝所言清淨本然云何忽生山河大地佛牒語略意必具含二舉所依真按起信論心生滅門中分二義一覺義二不覺義覺即所依真理不覺即能依無明故云依本覺而有不覺今答文全符論意故知此科即彼所依本覺又二一佛舉常說致問汝常不聞如來宣說性覺妙明本覺明妙如來常說者多為菩薩演其實義聲聞在會亦普聞知性覺本覺顯是所依覺義而性本異稱者各有詮表性表一真理體未涉事用故舊以三諦釋者不知其無俗諦也本表天然本具不論修為故舊以三觀釋者不達其非功夫也妙寂明照也妙明則即寂而照明妙則即照而寂二覺互影顯融也明雖似用亦體上照用非涉事用如來舉此於無明萬法之先正當空劫以前一段真理惟有寂照互融豈有事功但舉此者一顯無明萬法離此無依二顯寂照具足不假妄明二滿慈答以常聞富樓那言唯然世尊我常聞佛宣說斯義常聞者但領其文未通實義或依己教別解所謂一音演說隨類各解也一向且令權證故不破斥今與開權顯實故須發其惑而難破之又此問全似初問阿難見何發心皆是借舊見聞以發開示之端也三辨得妄本即後三法生續之源一指深本二示元妄根本妄而枝末全空可知又三一審得其惑又二一如來雙審真妄佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺此之審意躡上性覺二句而來故此首句覺字即性覺本覺之覺明字即妙明明妙之明然不取妙字而獨用明字者以有真妄二明而妄明獨為大迷之體故也汝稱覺明者蓋言汝說法時必常宣演也為復下正以雙舉審問也問意如云為是性本自明單稱為覺即含明意耶為是覺本不明須用加明於覺而雙稱明覺耶蓋單稱為覺不假妄明是為真覺雙稱明覺而務假妄明是為妄覺雙舉致問欲令滿慈自決取捨全似徵問阿難心在何處及以何為心皆欲逼出平生所誤認者而斥破之也二滿慈獨取於妄富樓那言若此不明名為覺者則無所明此答如云若此不用明之而即稱為覺則虗名為覺而實暗然無所明矣此蓋詞中反排無所明之真覺而意中深取有所明之妄覺矣此不明二字與上不同上是假言覺本不明也斯是承言若不明之也此答全似阿難諍言若此發明不是心者我乃無心同諸土木皆是被佛徵出素所迷執而不覺其非者也但阿難所執六處粗識滿慈所迷根本無明粗細淺深逈然別矣二斥為無明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性首二句全牒滿慈之言若無所明者即若此不明也則無明覺者即則無所明也次二句全失真性也末二句妄又非真也如云推汝之意將謂若無所明則無明覺殆惟恐其無明覺而必加明於覺也而不知一加所明則覺明二義皆雙失矣良以體外加明非體本有有生有滅時有時無由是約起心有所明時明則非覺以加明於覺非覺體之本有故也約忘心無所明時覺則非明以從來未悟覺體之本明故也此猶所謂有念無念同歸迷悶之意耳既非覺非明二義俱失全墮無明汝豈以無明為汝之覺湛明性哉而無明又非覺湛明性蓋無明即是不覺惟濁惟暗而安有湛明之義是汝始雖惟恐失乎明覺而終則至於全失真性全墮無明矣三結成妄本性覺必明妄為明覺上科既斥為全體無明由是承上而言汝於本具真覺番成無明者元無他故正以本性之覺必具本有之明所謂性覺必明也汝乃無故妄加明於覺上所謂妄為明覺也由是遂成根本無明萬妄依之而托始故知明覺二字便是生世界衆生業果之根柢矣此於十惑之中為第一惑親依真心本覺獨居九相之先別名獨頭生相根本不覺曰癡曰迷及無住本皆目此也有二功能一者能隱真覺之體二者能發萬有之相下文自見問生相無明等覺未了今言加明於覺意何淺近答此惑在三細前本非下位所知惟佛現量親見如來有勝方便能令初心比量而知借言加明於覺即是其相捨此方便則如啞人見賊叫喚不出矣法王自在豈如是哉曰借言非真寧不誤人答豈止不誤仍有大益如來親見等覺位中粗細諸念皆盡惟餘此念佛法不現此念忽盡便入妙覺果海故令頓根衆生但了法空心淨一念不生遙契如來涅槃妙心自具照體不用重起照察起照便同此中加明於覺永嘉云倘顧還成能所顧字便是明覺的明字能所者本惟一真本覺妄成能明之明所明之覺而能所俱非真矣佛祖一揆若合符節希頓入者宜究心焉辦得妄本已竟四正明生續原疑兩節忽生與相續也就分為二一初之忽生此科先答云何忽生山河有為之疑問諸經皆言妄為無始此經何獨說有初後答本來無始不妨說出始象熾然說始不乖無始之旨蓋佛之教言竝有二種一者假立二者稱真不假立而談則真亦不彰不稱真而說則假無究竟比如本無修證而說修證悉皆無礙況經論皆言最初一念不覺心動等俱依假立之義故此說始無所乖焉又二一最初微細此科即論之三細然章法不同但以惑對境分為二科良以聖賢以智了境凡夫以惑緣境竝皆連帶生起今約凡故用惑境相對分二一細惑覺非所明因明立所所既妄立生汝妄能此惟三細中之前二尚缺第三舊解三細全該轉現顛倒今解順序惟是業轉二相首二句即業相自證分也蓋上文明覺二字明為能明之妄明覺為所明之妄覺雖能所皆妄俱屬無明而剋體分別但能明之妄明是為無明而所明之妄覺即此科業相在上科但是帶言非本位也故此科佛接上文而言性覺本非所明之境特因妄加能明而遂立成所明耳由是而知因明之明字即上文能明之妄明亦即論之不覺所謂無明立所之所字即上文所明之妄覺亦即論之一念心動所謂業相至此方當其本位矣且論中以依不覺而心動說名為業此因妄明立所說名為業意固全同而此文較論猶有發明良以論言心動未明何故心動而經文說出元因加妄明於本覺而引此心動也所既二句即轉相見分也論標為能見相當知論中以依心動而轉成能見此因所立而轉成妄能意固全同而此亦較論文為有發明良以論言心動轉成能見而亦未明何故即成能見經乃說出因其妄以覺體為所見之相由妄所而引起妄能耳是則妄能顯然合彼能見二細境無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異此即現相相分也論標為境界相又自釋為能現相首句是能成之本無同異中即業相之中也唯識曰相見皆依自證起是也同者無差別境也異者有差別境也業相之中就實論之既一體一相能所不分故逈然無此二種境界也次句以下俱是所成之境熾然者火光盛貌雖表顯著然火光但明於夜亦表暗中顯著以此境界雖顯尚在本識中未大顯著故如火光明於暗夜之中也又雖在本識亦已熾然如火夜發豈同前二相一則無境界一則不可知哉昔人見說熾然度其顯著不敢定為細境而釋為六粗不察論文自釋生滅因緣釋至現識則曰所謂能現一切境界猶如明鏡現於色像又曰隨其五塵對至即現無有前後何乖今經熾然之說故知此科決是境界無疑熾然成異者言從此無同異中忽然見種種差別形器即結暗為色之始相此句是現有差別之境也異彼二句是現無差別之境即空生大覺始相上一異字是不同之意下二異字仍是前差別之境夫既異異而又因異可見全是傍顯之意蓋言非先異後同但是見異時傍顯無差別處便是同境立字取意即顯也常途約生起次第空漚先發界相後隨此約轉相見境先見界相傍顯虗空故作如是說也隨宜無不可耳末三句即倣佛有衆生相也然必同異發明者以上異之與同相形而顯此衆生之境不同上之二境良以倣佛有形貌差別殊於同境即不同虗空故曰無同倣佛有運動靈覺殊於異境即不同器界故曰無異問既即世界虗空衆生與下粗境何所差別答尚在本識中結暗忽現愰忽未定之相與彼粗境中三法作胚胎耳問論惟渾標境界而經乃三相具陳多少不類恐不相當答論之前標雖渾而後之自釋尤詳如前所引能現一切境界疏取瑜伽釋之謂具根身器界種子又五塵對現疏釋乃謂且舉五塵而實通現一切境界由此觀之論疏皆言一切境界何所不該奚以三相為多況器界之釋何非同異二境根身之語何非知覺衆生而種子不出情器且五塵尚不為多三相何嫌太廣是知此節科當現相則經論如出一轍矣復有人以此配屬三細其意誠迂問通上順釋三相甚生次第但釋因明立所則曰因妄為能明引起所明以立業相此雖經無能字推意補之亦通次經明言因所生能子即釋為業生轉相似亦自然之序但妄明既以業相為所明轉相亦以業相為所見此何別乎又轉相何不以境界為所見乎答汝言妄明以業相為所明此言非是蓋妄明最初依本覺起妄以本覺為所明本不期於業相其奈本覺元非可明之境由是本覺卒不可明而徒以帶出業相為所明耳故佛言覺非所明因明立所其旨顯然汝次言轉相妄以業相為所見斯言不差蓋轉相依業相起妄以業相為所見本不期於境界其奈業相元無可見之相由是業相卒不可見而徒以帶出境界為所見耳故佛言所既妄立生汝妄能無同異中熾然成異等其意更顯是故經文所之一字上下連帶二能而上隱下顯且上為生所之能下是所生之能如祖與孫何言無別能之一字上下連帶二所而上顯下隱且上為生能之所下為能生之所亦如祖孫那得混同至於攝論謂轉相所緣境不可知者正約其緣業相之初心為言而記主便指境界非也此二皆以心取心真隱似現所謂非幻成幻法也如人瞪目欲自見眼本不期於空華其奈眼非可見而徒以帶出空華耳以喻詳法居然可了問論無能所經何廣陳答文法不同耳論是次第下依上生故不彰能所經是鈎鎖上引下起故能所多陳觀經無明位中已即纍言所明何疑業相不為所耶會文取義經論無不合矣最初微細已竟二漸成粗顯此即論中六粗今亦以惑對境分為二科一粗惑如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱此即六粗之前五如是者承指上文之詞擾亂之意全在上科若寬取總因則三細起於真淨心中皆為動亂之相若尅就引生粗識則惟是境界一相所謂境界為緣長六粗是也以彼境界從無而有則有無相傾因異立同則同異互顯既而復以一異一同之界相顯發非同非異之有情是於藏識海中境風亂動已如空華亂飛豈不甚擾亂哉楞伽云識藏海常住境界風所動是也待者緣對也相待即是為緣之意生即長也勞等即粗識也豈非境界為緣而生長諸粗識乎楞伽云種種諸識浪騰躍而轉生是也然生勞二字即論中起成智相為第一粗論云依於境界起分別愛與不愛故疏云於前現識所現相上不了自心所現故創起慧數分別染淨執有定性夫創起慧數分別所謂轉生勞慮也問轉智二相俱緣境界有何差別答轉相緣境但如鏡中無別分析智相緣境不了心現執為外境分別染淨所謂分別事識矣此當法執俱生勞久二字即相續相為第二粗蓋久即相續不斷之相論云依於智故生其苦樂覺心起念相應不斷故疏以二覺不斷為自相續以又能引持生死為令他相續也此當法執分別上之分別略分染淨而已此則轉生苦樂覺受自他相續法執轉粗故名分別發塵二字即執取相為第三粗塵者染著之相論云心起著故起即發也彼云起著此云發塵同一旨耳疏云依諸凡夫取著轉深計我我所等也自相渾濁一句即計名字相為第四粗論依於妄執分別假名言相故疏云依前顛倒所執相上更立假名也今乃取其循名執相顛倒特甚以恰合於自相渾濁雖是一意而發塵尚淺故屬我執俱生渾濁已深故屬我執分別末二句即起業相為第五粗彼云起業此云引起塵等語意頗同論云依於名字循名取著造種種業故疏云謂執相計名依此粗惑發動身口造一切業即苦因也塵勞有八萬四千以十結使為體約身口七支及三世四心壘滿其數煩惱略言根本六及隨之二十若配塵勞數亦如之總即見思約未起屬惑即前執取名字二相今經明言引起乃是已起而成業之相且塵勞煩惱俱須約於身口七支而起業疏文亦言發動身口其義無乖以必發動方是起義也問粗境未成安得遽有身口答語雖約從初起次第而談理實無始豈真未成粗境之前而絶無身口哉且論亦約從初起亦須於第六中方成身口疏釋起業明用身口若必執第六方有身口則前相憑何起業而執取等憑何計我我所哉語雖有序而意須圓活不宜泥也況下粗境亦不是直待五識起畢然後有者第以言不頓彰巧敷陳耳神會之可也二粗境起為世界靜成虗空虗空為同世界為異彼無同異真有為法此即業繫苦相為第六粗論云以依業受報不自在故疏云業因已成招果必然循環諸道生死長縛此一科經文與論文名位雖同意旨各別論明萬法唯心故備明諸識而心相偏詳境相為略所以前境界相及此果報相亦皆就識隱略未詳彰其為惑所執之境也經答云何忽生山河等故心境雙舉而於境相尤詳所以前細境及此粗境文竝詳也於中備明世界虗空及衆生相且疏於業繫苦相科為受報今經世界虗空是依報衆生是正報意符受報然於中淨穢苦樂不得自在何乖論文但經且據初成無循還意以後另有三種相續惟此稍不合疏文耳以上會合經論畢下當按文釋之當知以上皆是展轉敘其緣由惟此六句方成確答問意首四句確答云何忽生山河大地末二句確答諸有為相總承上言由依性覺而動無明因無明而發心境緣心境而起塵勞等於是業力所使起為云云起靜勿指時言當指處說如云起成有相處則山河大地確然而成定相靜而無相處則空濶曠蕩顯然而見頑虗次二句明其不離前之細境但至此始確定而成就耳故二為字是即字意言此虗空即前同象至此始確定也此世界即前異相至此始成就也然此即當結云汝問云何忽生山河大地實由如是而生也末二句確答諸有為相亦明不離前境但文法轉換上是指後即前此是取前顯後言彼細境中無同無異之相至是而顯然確定以成衆生業果真有為法矣再結云汝問云何忽生諸有為相實由如是而生也通前雖俱屬忽生而仍有相待勞久之言者以從無而有須由微而著但約萬法初成一周而說忽生矣又約修時逆斷顯此次第權說初成次第將令觀順生之次第易於開悟而不至迷悶了逆斷之次第易於修證不至僭亂也又當知經自無明以至粗境多用能所上下連持者令知能所乃生萬有之端行人於真妄分明之後一念頓絶能所可以把定萬有坐還清淨本然所謂但離妄緣即如如佛矣初之忽生已竟二後之相續此科方答云何次第遷流終而復始之問也問意在前舉疑科中分三一世界相續此中義理雖似外論中五行相生之意而實不盡同不可以一一附合有二不便一者五行反明經義反晦二者令外教之人將謂不出己意良以外教正惟執乎五行能成世界而實不了其真源縱高推太極混沌等而終不識其為吾心之妄覺全體之無明今與分明指示正以異彼教意而舊解却將覺明釋之為水以濫彼天一生水之計仍出無極太極之下何以令彼祛除舊見而生新悟哉夫外教多歸化機於陰陽而吾宗直指化本於心性又且示天地之源出於吾心之無明此誠大異外說而極警誤執也弘教者直不挽外宗而令其明內旨反推內教而濫外宗失計之甚也至於內教所用名言多用四大而不名五行後之合變轉生但與五行略相似耳故今解於前之四法全準孤山四大為正而前三大顯然依於心起於後之四法別立名言略取溫陵父母氣分之說以助明而已又分三一生能成四大夫四大雖展轉相生而實總是能成以各具能成之力用故也其曰執持曰保持曰變化曰含皆其義也至後四法則皆不具斯義諦觀之當自見矣又曲分四一風大覺明空昧相待成搖故有風輪執持世界明覺者覺體之上已起妄明而妄明必發空漚空昧者頑空之體全是晦昧而昧晦與明乖角相待生搖者即溫陵所謂明昧相傾不覺心動也當知世間諸風全是妄心動蕩所感風輪持世者諸經言世界最下全依風輪而住此大顯然親依妄心而起矣二地大因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土孤山謂土與金皆是堅性俱屬地大是也蓋地性堅硬而堅莫過金故金是地大精實之體因空生搖者因空昧而心動也如人為睡所偃而發迷悶矣堅明立礙者覺明堅執而妄成有礙也如偃中堅執求通而妄覺有物相壓矣由此即感一切堅礙之相故言世之金寶皆是明覺體上一分堅執所感也如古有凝心結思化為石者亦是小驗此固靈心不思議之力用而業感必然之理也金輪持國者地大最下有金剛際此大亦顯然親依妄心而起矣三火大堅覺寶成搖明風出風金相摩故有火光為變化性此大固是風金二大轉生而堅覺搖明全帶妄心之相堅覺堅執之妄覺也立礙感金故寶成搖明動念之妄明也動成風相故風出此是生火之因起一堅一動故相摩生火如云一剛一柔相摩相蕩也為變化性者蓋火無持含之輪用而有化成之功能至後四居功方顯著也以上三大雖相待轉生而俱帶妄覺妄明之心相本宗固宜偏發明之豈可多用水土生木等意而晦之哉四水大寶明生潤火光上蒸故有水輪含十方界此大方獨用金火二大而不帶心相以上三番帶明此應不言可知寶明生潤者蓋寶上之明即含潤相如珠光出水即其驗也火光上蒸者火有蒸之氣即能成水如盛熱時萬物多被蒸而出水也然以寶明而又映以火光此水大所由起矣含兼承載涵潤意也十方界者諸世界下皆有水輪乃至諸論皆然別經言世界安立土輪下依金輪而同為地大金輪下依水輪水輪依風輪風輪依虗空而虗空無所依今約由心生起序未全同又顯究竟仍說虗空依無明而無明依本覺以見萬法始於真妄和合之心而離心悉無自體故內教惟以顯心方為得旨生能成四大已竟二生所成四居此之四法即上四法所成所謂世界國土也前曰持含曰變化即持含變化此四居也蓋器界元為衆生所居今於此四方顯衆生所居住處故曰四居然此與小教所謂萬法皆由四大和合變起文不相乖但小教未了四大畢竟是覺心變現也上文既明能成四大皆依心起至此所成四居但示四大轉變不復重明心起令由四大之唯心而達萬法之唯心也又分二一總成二居二居謂海為水居衆生住處洲為地居衆生住處以同依水火為能生故曰總成也又分二一示其由生火騰水降交發立堅濕為巨海乾為洲灘蓋四大雖均成變化功用而水火土三大於四居中功迹顯著至於風大執持摶擊功雖不少而於己成居上迹則不彰故不言之首二句正明火水二大為生海洲二居之因起火騰者火性本炎上也水降者水性本潤下也交發者水火既濟也立堅者結成器界也如陶器者賴惟功於水火矣次二句正所成之二居海亦由立堅而成者蓋海非獨目於水以注水之巨坎方謂之海故全是堅體也洲灘如四大洲及諸小洲是也二驗其氣分以是義故彼大海中火光常起彼洲灘中江河常注以是義故以是水火共生之義故彼大海本就濕之處似不應有火以不忘母之氣分故火光常起洲灘本就燥之處似不應有水以不忘父之氣分故江河常注蓋外教五行義中水之望火為我尅之妻故火為二居之母火之望水為尅我之夫故水為二居之父今大海克肖於父而不忘母之氣分故海中火起洲灘克肖於母而不忘父之氣分故洲有江河也餘皆準此思之二別成二居以二居生驗各說故曰別成揀異總成也又分二一成山居水勢劣火結為高山是故山石擊則成焰融則成水此山居衆生所住之處也初二句示其由生水劣火者如溫陵謂夫劣然後陰陽和而生子是也又以水為火之夫若太勝則勢必滅火豈能生他法哉今以水夫劣於火妻故成高山矣末三句驗其氣分準前思之可見融則成水者如煉五金之礦悉皆成汁是也二成林居土勢劣水抽為草木是故林藪遇燒成土因絞成水此林居衆生所住之處也首二句示其由生末三句驗其氣分義皆準前可知所成四居已竟三結成種相續交妄發生遞相為種以是因緣世界相續交妄發生者互以妄相生也遞相為種者初由妄心而生起大種次由展轉而備生四大後由諸大而成就四居於是羣生之依止器界具矣以是因緣者以是遞相為種之因緣也世界相續者成住壞空終而復始相續不斷凡成一番便是如此展轉生起所以自忽生之後永無清淨之期也世界相續已竟二衆生相續分三一推由成陰又分三一指無明本復次富樓那明妄非他覺明為咎明妄非他者言明得衆生必從妄起而此妄亦非他物即是真覺妄明為過咎耳意指不外前文生世界真妄本也夫覺明既屬能所向後惟從妄說矣此科同前忽生科中妄本二三相妄局所妄既立明理不踰以是因緣聽不出聲見不超色所妄既立即彼所既妄立業相也而明理不踰即彼生汝妄能轉相也理猶體也而明理二字已是妄能不踰二字乃是特加妄局之意以表能被所局也二句同彼細惑俱屬妄心尚未涉境下三句方涉境界即彼現相也而偏重衆生以是因緣者若通上科則無明為因能所妄局為緣若止本科則業相之所為因轉相之能為緣而能被所局即是因緣聽見屬心影略覺知聲色屬境影略香等不出不超俱是心被境局之意由上能被所局因緣成此心被境局礙相也此末二句頗似說根而委細參詳猶是本識中境界相所謂隨其五塵對至即現是也但為下文結根成陰之由二三陰成就色香味觸六妄成就由是分開見覺聞知同業相纏合離成化上二科總是詳推成陰之由此科方以妄成二陰前四句成中陰也色香味觸影略聲法六妄即六塵成就者粗境已著具足無缺也足顯上科聲色尚是本識細境未云成就矣由是分開見覺聞知者攬上六塵結塵以成六根而分開云者即經所謂旋令覺知壅令留礙體中相知用中相背也又云元以一精明分成六和合是已夫根塵成就則形兆潛彰然尚未趣生必當中陰之位經言中陰六根猛利勝於生身足為明徵問既無前陰何得此名中陰答理實無始何缺前陰但經從細向粗只得截流而談亦假立之旨也末二句方以轉成後陰生身溫陵曰同業即胎卵類因父母己三者業同故相纏著而有生合離即濕化類不因父母但由己業或合濕而成形即蠢蠕也或離異而託化如天獄等也總此推由成陰一科經文展轉四重鈎鎖次第一由無明而引起業轉妄局二由業轉而引起心境拘礙三由心境而引起根塵分隔四由根塵而引起四生繫縛由細而粗頗順文理兼合論旨舊作根塵識三釋者則根先結而塵後成固為顛倒由塵成而分六識何經可徵蓋經文只說攬塵結根而根成分隔不言塵分於識也由彼迷前文為根須以後文為識且將謂根塵識三文順界全而不達根相即是陰體用表衆生形相已著而識非形相義無關也推由成陰已竟二詳敘受生又二一委示胎生獨委悉開示於胎生者一則急於為人二則衆生悉以淫欲而正性命欲愛偏顯故也又三一舉親因見明色發明見想成異見成憎同想成愛流愛為種納想為胎中陰之想愛為受生之親因孤山曰妄心見妄境故云見明色發即於中陰見其父母也明見想成者依妄境起妄惑也異見謂父是所憎境同想謂母是所愛境女子託胎反此故涅槃明十二因緣無明有二一潤業無明謂過去煩惱也二潤生無明即託胎時於父母起憎愛也流愛為種者即最初注愛於母以為投胎之種納想為胎者即投種後愛著不捨以為增長成胎之由經後云想中傳命是也二明助緣交遘發生吸引同業父母之交遘為受生之助緣孤山曰交遘發生謂男女會合染心成就吸引同業謂吸引過去同業而入胎也上科以己纏父母為同業此以父母吸己為同業三結成胎故有因緣生羯羅藍遏蒲曇等故有因緣猶言以是因緣也孤山曰俱舍明胎中凡有五位一七名羯剌藍此云凝滑二七名頞部曇此云皰狀如瘡皰三七名閉尸此云軟肉四七名健南此云堅肉五七名鉢羅奢佉此云形位今略舉前二等取餘三二例示四生又二一總標成應胎卵濕化隨其所應胎卵濕化皆應也下文情想合離皆感也隨其所應者隨其所感而應之以四生也二各別指明卵惟想生胎因情有濕以合感化以離應上科分釋感應而經文偏用錯綜隨便而已溫陵釋四感好但合濫於應今少變云亂思不定曰想結愛迷戀曰情親付不動曰合捨此趣彼曰離以此四心感召而四生各類應之又曰卵無後三其實前前兼於後後而後後不兼前前其意始完詳敘受生已竟三結成相續情想合離更相變易所有受業逐其飛沉以是因緣衆生相續此只依感應二意結之義無不盡首二句即感之相續也更相變易者約一衆生則周而復始約群靈則彼此轉換溫陵謂四感有情皆具各以多分召彼四生以是經涉長時互成轉換也受業指受生胎等而言逐其飛沉即應之相續胎等各有飛沉末二句躡上結之準前可知衆生相續已竟三業果相續分三一業果指本示業果而又指本者明業果各本於自心之貪欲其絶貪而業果自息也又三一欲貪富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本吳興曰欲貪通乎四生今正約胎生言之又胎生復通今多就人倫辨之以其易見故也想愛同結者不專指受生時言亦兼在世時想念恩愛皆所以深結生緣愛不能離所以相生不斷欲貪為本方專指受生時元因愛欲而來也二殺貪貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本貪愛同滋言由有貪愛必有身命由有身命必賴滋養同滋者言彼此皆欲滋養身命所以貪不止而必至吞食也三盜貪以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本溫陵曰不與而取及陰取皆盜故以人食羊不與取也羊死為人互來相噉陰取也皆盜貪也吳興謂殺貪未論酬償先債盜貪約過去於身命財非理而取故互來相噉以責其盜也惡業俱生者以此惡業為續生之緣與生俱生也問世教論殺惟以忿爭殺人為重論盜惟以劫竊財命為重而食肉不與焉似得重輕之宜今經何獨論其所輕而反遺其所重乎答此有二義一者斷輕況重義蓋此方世教急於止亂且圖養民故惟斷現亂而不禁食肉今經欲絶生死須斷生緣故極至食肉皆併斷焉若悟輕者尚為生死之緣則重者不言可知非反遺於重也況真慈平等均為奪命何有重輕且約現生食肉似不為禍亂若約隔生酬償則禍亂亦均更待下義詳之二者絶本止末義蓋凡一切殺盜究其深本多起於食肉如八萬釋種遭琉璃之殺世人但知近緣罵詈不知遠因起於食魚之冤故此方不長太平緣太平時恣意食噉三五百年人之亭福者福終禍起畜之酬報者報盡為人皆帶殺冤遂成亂世乃至殺人無量故佛斷食肉乃聖智深遠拔本塞源之意經云世上欲免刀兵劫須是衆生不食肉外教君子未能信達者切勿輕非毀矣業果指本已竟二相續明長既示相續而又明長者表續生皆由互不相捨欲其能頓捨即不相續也又為二一殺盜無休汝負我命我還汝債以是因緣經百千劫常在生死首二句影略多辭則師補之未全具載當有八句如云汝負我命汝還我命我負汝命我還汝命債亦準此命屬殺債屬盜不出負還二字以是因緣者以是負還因緣也末二句言命債不了故生死亦不了矣二欲貪無盡汝愛我心我憐汝色以是因緣經百千劫常在纏縛首二句影略亦應八句各開則云汝愛我心我愛汝心憐色準知交錯則云汝愛我心我憐汝色番轉準知不出愛憐二字以是因緣以是愛憐因緣也末二句言愛憐不斷故纏縛不斷矣相續明長已竟三結成相續惟殺盛淫三為根本以是因緣業果相續歸重三貪為業果及與相續之正因緣也正明生續已竟五雙關結答分二一躡相續而結忽生富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生三種相續本答終而復始今總束之以結答忽生正顯忽生非別有法即生彼相續之三法意雙關也首二句躡上之辭顛倒有二義一者首尾相因義二者顛狂迷倒義覺明即是無明明了知性即是本真妄真和合總是業相下了字即能見相因了發相者依上業相起出能見而帶出境相也此四句無明三細皆備下妄見即緣此境相而起我法二執渾然涵彼前四粗也蓋三相續即彼後二而後二皆本無明三細二執而出故結答云汝問三種云何忽生皆是覺明乃至妄見所忽生也二躡忽生而結相續山河大地諸有為相次第遷流因此虗妄終而復始此科全牒問辭惟中間因此虗妄四字乃是結答之處夫山河大地諸有為相原問忽生今躡之而結答次第遷流等正顯相續非別有法即續彼忽生之三法亦雙關也結答意云汝問三種云何次第遷流當知但惟因此顛倒相續之虗妄故終而復始也是則前云從妄見生今云因此虗妄可見忽生相續渾一妄法了無實體之可得矣正答前問已竟二兼釋轉難又二一滿慈執因疑果又二一躡舉疑端富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相躡前所辨為起疑之端首四句本同佛心也妙覺指衆生現具在纏之體而言本妙覺明者言其未生山河時本無不妙元無諸染法也覺無不明元無諸障礙也與如來心不增減者佛心不增於生心生心不減於佛心也次三句頓生諸妄也無狀即無端無故二正陳疑難如來今得妙空明覺山河大地有為習漏何當復生得妙空明覺者復其無物之本體還其圓照之本明也言其亦同衆生本妙覺明未生山河等法之前也末三句正疑諸妄於何時生也山河大地是世界有為是衆生習漏是業果言如來復還之真覺元無異於衆生未妄之真覺則衆生既從真而起妄如來豈不亦當從真而起妄乎圓覺中金剛藏全難有三此經亦具但問非一人今滿慈所問同彼第三難曰十方異生本成佛道後起無明一切如來何時復生一切煩惱辭意全同均是執衆生因性之有始而疑如來果德之有終也答處再當配釋二佛分真妄喻釋據問意有兩種迷執俱當破斥一迷執妄法有始二迷執真覺有終今答不生不變皆惟且破後一有終之疑以後文另起何因有妄之問方破前一勿至混濫反誣經之重繁也又分二一喻妄不復生又二一喻無明本空無明為能生萬法之妄本未及論乎所生之萬法故取迷方之心喻之以迷心亦無相狀然意喻從初本空故終亦不復生也又二一舉喻辨定又二一舉喻佛告富樓邪譬如迷人於一聚落惑南為北聚落村居名也二辨定又二一辨始無所從此迷為復因迷而有因悟所出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟迷本無根者諸法展轉皆因無明而無明更無所因也又迷不自為生迷之根以原答因迷之難也悟非生迷者悟迷相反安得相生故亦不作生迷之根也問法中似從真心起妄喻中何不許悟生迷且迷方誰不先從於悟乎答法中正不許真能起妄惟說妄依真起如影依鏡現終非鏡自生也圭峯解圓覺種種幻化皆生覺心而辨其不說心生種種故知得失係於毫釐不可不辨且迷方者悟在他方迷在此方豈以他方之悟為此方之迷根乎理實入之忽迷初不得其起迷之本此亦可明妄之無始但不專重耳二辨終不復起佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊倐忽也縱迷者縱使先迷或久述也問今有迷方者雖受指示亦有久久不悟者何也答此言悟者亦須於指示之後久久觀省忽於一朝四方朗然轉正始為悟也此等悟後豈得復迷指示正如教下說得人法二空比解分明猶自依然二執不脫觀省云者正如宗下教人絶解久久及照參心忽然心空人法頓脫方為現量實悟永不復迷也舉喻辨定已竟二合法喻明又分為二一總示合意富樓那十方如來亦復如是言如來亦同悟後不復更迷也二詳盡合辭又二一合無所從此迷無本性畢竟空此迷即指無明言此無明既不以自體為本亦不以覺性為本無所從來徹底元空亦如迷方之迷心更無所因也二合不復起昔本無迷似有迷覺覺迷迷滅覺不生迷昔本無迷不可作衆生未妄以前解之即墮有始之過而順成佛果有終之難清涼云由來未曾悟故說妄無始是也只言自昔在迷時即無迷可得如迷方者正迷方時方實不移矣迷覺即前明覺似有迷覺者言當彼迷時似有能迷之妄心及所迷之妄覺如當迷方之時似有顛倒之迷心及移轉之方位也末二句承上言由此徹底虗無故不覺則已但一覺迷迷即頓滅以真性覺中本無無明也亦如迷方者但覺所迷之南本無有北則迷相頓滅以自來元無故滅無留滯也覺不生迷者言正當迷時己即無迷可得而況既覺之後豈復生於迷乎亦如惑南為北之時己即實無北相可得而況既悟是南之後安得北相復起於南乎上二句迷時似有下二句悟後永無也圓覺答難處無此喻而釋無明處却有此喻今喻無明義亦𠃔當文云種種顛倒猶如迷人四方易處等然彼猶兼喻身心此以下文更有空華以喻萬法故此專喻無明而已喻無明本空已竟二喻萬法現無據上文滿慈於萬法問生續之詳如來答無明為生續之本今佛上科先以喻明所答無明本來常空非研斷始空而此科更以喻明所問萬法現今即無非先無今有亦非今有後無圓覺答難處亦有此喻却是翳比無明華比萬法空比真體彼文三節平渾今經前有迷方喻無明彼有木金喻真體故此空華單喻萬法耳即前世界等三也分二一舉喻辨定又二一舉喻亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生首二句喻在凡時三種宛然次二句喻成佛時萬法寂爾末四句正喻疑佛何時起妄也二辨定汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧空元二句喻萬法自來本空生滅但是妄見次二句喻實執佛滅萬法已是顛倒妄情下敕令二句直斷待華為愚喻冀佛起妄者決定是愚人也云何下又反言以決其必為愚矣二合法釋明佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地如汝所解者言此待華更生之人誠如汝言決愚非慧云何下就言反詰也言汝既知於晴空而待華者乃為至愚云何乃於如來妙明中而待生山河等法與彼愚人何異哉通前本末元空如此說何復起只此二喻已足以通釋前難若但止此是惟達妄本空而猶未及明真本有故更說後之二喻也喻妄不復生已竟二喻真不復變理實不但成佛之後不復更變縱在迷時本體亦未嘗變豈成後而反變乎上二喻各喻各合此二喻總喻總合也蓋佛語錯綜自在耳又分二一總舉二喻又如金礦雜於精金其金一純更不成雜如木成灰不重為木金礦者蘊金之砂石也雜於精金者約金在礦時二物混和也一純者約出礦之後也更不雜者不復生礦也須知金之與礦二俱無始非金先礦後礦從金生故出礦之金不復生礦木灰無二不同金礦又以壞盡無還為相各有取意待合處自明也二總合二法諸佛如來菩提涅槃亦復如是菩提者樹下所成無上智德取其無明夢破五住究盡番轉一切煩惱出纏精真非比在纏所具蓋以完復本有如如智體亦即照體也涅槃者因窮果滿圓淨斷德取其遷流浪息二死永忘番轉一切轉回究竟寶所非比中止化城蓋以完復本來如如理性亦即寂體也亦復如是者以前科二喻己喻妄不復生今此二喻當獨喻真不復變故惟重菩提涅槃之不變而不重煩惱生死之不生茲有二解隨情去取一者別合謂各取類合也以菩提智光類於精金明淨故言菩提不復為煩惱亦猶精金不復重為礦也又以涅槃寂滅類於木灰燒盡故言涅槃不復成生死亦猶木灰不復重為木也二者總合謂就文合說也先合前喻云菩提涅槃既出乎煩惱生死則一成永成不復更變亦由金之出礦一純永純不復更雜於礦也次合後喻云煩惱生死既轉為菩提涅槃一滅永滅無復返還亦由木之成灰不復又成乎木也斯則後喻略涉於妄不復生似亦無傷二釋竝通四喻圓覺具有取喻稍別迷方彼則通喻無明身心此則局喻無明空華同喻萬法金礦彼喻圓覺此則喻菩提或兼喻涅槃木灰彼喻幻妄此則喻生死或兼喻煩惱旨亦大同也是則妄本無生而非成佛始滅真本無變而非成佛始生故知衆生分中尚自無生無變何況成佛者反有生而有變乎說不空藏以示生續之由已竟二說空不空藏以示圓融之故此答次問五大何得圓融之疑也夫空藏中破相顯性相既不有說誰無礙不空藏中從性起相相既宛然何得無礙是以前二藏中略開圓融之端而未竟無礙之說豈免滿慈之疑茲欲極彰無礙之由以銷執相之問須談空不空藏也蓋空即不空則性全即相而性固無礙不空即空則相全即性而相亦何所礙哉深研斯旨則向下微妙難解之文可領略矣分為二一正答次問又分為二一按定所疑富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相陵滅又徵虗空及諸大地俱遍法界不合相容首四句雖牒問而圓融遍界猶是述己所說以下方是彼之所疑然去風如空通喻五大二正以開示又二一就後一藏以銷疑此蓋雙躡前之二藏而繼以空不空藏銷前所疑用顯次第三藏也此中全由喻明性相而其疑得銷若不申明諸教性相迷悟分量則不知滿慈發疑之端并佛釋疑之妙夫二無礙理人天小乘決定雙迷極至法相破相亦均未徹法相真不隨緣相不即性破相方談相性二空有遮無表終未顯談即性何能盡發無礙之旨今斯圓旨語四科則全相皆性語七大則全性皆相且一一遍周無障無礙是尚遠越大乘之始教而滿慈依小乘法執舊見堅謂諸大本來相礙若如來藏空可說無礙今云備具諸大即當相礙豈有無礙之理斯則豈惟不達已發之相為無礙兼亦尚疑未發之性為有礙矣而如來釋疑非但只釋未發之性為無礙而兼亦詳釋已發之相尚無礙而況未發之性何得有礙乎故此科說性無礙其文最少釋相無礙其詞最多一以銷難況易一以發後圓修此意難辨至文再當示之又分二一喻明性相又二一舉喻又分二一標列性相喻又曲分為二一總以略標富樓那譬如虗空體非羣相而不拒彼諸相發揮吳興曰譬前如來藏性本非七大而不拒彼七大發生若更照後文配之則虗空譬如來藏體非羣相譬先非水火不拒發揮譬各現俱現也當知二俱是妙既曰先非諸大則非滯有而溺有者自成有礙既曰不拒發揮則非滯空而淪空者自失家珍也二徵起詳列所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映徵意非推其故但欲演略成詳耳然彼太虗空一句即是體非羣相而下即不拒發揮之詳也明等七者為相日等七者為緣虗空為親因明暗清濁為對餘不必強對然七相雖不配合七大而亦略應其數氣凝如煙霧之聚霾字從貍起於山獸騰踏令土蔽空或合風雨繽紛而下謂之霾水澄成映如海晴湛之時虗空交映朗然澄徹也二難釋相妄喻上科但雙喻性相而未喻相妄此科難釋方顯相妄然此妄字但是無有定實之意非如妄心妄想及貪嗔等妄也又分三一總舉雙徵於意云何如是殊方諸有為相為因彼生為復空有殊方且作同時各處而言蓋虗空無量此方明而彼方暗乃至霾映各現不同也有為者以其不遍不常異虗空無為之體故也彼字總指日等七緣對空雙詰正令指陳也二單舉別難若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不生光耀單舉日明以例餘六先緣後空各別難問也辭雖難問意則正明二皆不可指陳若彼下明非緣生也意言既是日明則當普天共成一日之體不應更見圓日若見圓日則自日之外云何不是空體之明而顧獨謂明屬於日乎問此日為例而雲等皆依此成難也然日有圓體雲等不然或滿虗空其何成難答雲等雖無圓相而有高相準日當云既是雲暗則當自地以上同為雲氣不應更見高雲若見高雲則自雲以下云何不是空體之暗而顧獨謂暗屬於雲乎若是下非因定有也言非虗空一定恆有之相也其文易知三直以釋難當知是明非日非空不異空日非日非空者非因緣也以雙難則互奪無定也不異空日者非不因緣也亦即非自然也以集離則畢竟無體也問虗空譬性明等七相譬七大日等七緣譬於何法答七大循業而發則日等譬七大各所循之業也理實亦是衆生所惑生七大之緣也藏性即七大親因也問前破七大不由因緣今何復立答今言非日非空即是雙破豈云立乎向下自顯問總標中惟空與相意取喻於藏性及七大也徵釋中宜只明其非空及不異空足矣何更加以七緣而言非日及不異日乎答若不加以日等有二不備一者顯妄不備蓋必二者皆非二者不異方顯宛轉虗妄無可指陳也若惟單就空言是尤有可指陳處也二者顯妙不備苟若但言非空而不言非日則但顯性無礙而不兼顯相無礙也若但言不異空而不言不異日則但顯不違性而不兼顯不壞相也又味此乃非一非異之旨試明之彼虗空惟是一味亦遍亦常七相各自差別不遍不常是虗空與七相非一也又虗空離彼七相則無自相七相離彼虗空則無自體是虗空與七相非異也又正由空非羣相方能不拒諸相發揮是由非一故非異也又正由不礙諸相方見虗空體非羣相是由非異故非一也由是則帝心理事事事二無礙玄門及下經文一多大小互現之要樞皆隱然開發矣一喻而盡妙如此學者加意研審可也舉喻已竟二法合分為二一先伸釋疑兩途此科正以直釋滿慈之疑準常諸文舉喻法合兩楹之間自來未有如此文橫隔於中者惟見或安於舉喻之前即是法說或安於法合之後乃是銷歸所疑或是申其正義於義皆順今置於此難為順銷姑且曲從現文承前喻意以先釋所疑然後以法合喻合喻之後到銷疑科盡處別有虗科審定淆訛就分為二一約相妄釋觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義承難釋中非日非空不異空日而言如云由此明相之妄不可指陳而觀七大之相元亦至妄悉無指陳若乃妄謂有可指陳如執空華實有已為迷妄若復詰其凌滅是猶復邀空華而期其更結空果真可謂迷中之迷妄中之妄云何詰其相凌滅乎凌滅該攝不容非局水火此即兼示已發現之相常自虗無說誰為礙奈何據今熾然凌滅宛然不容其故何也答下云汝以色空相傾相奪則傾奪二字即其故也是知凌滅不容病根在於衆生無始妄習傾奪非彼妄相真有是也其猶月運岸移惑本在於雲駛舟行之妄見非彼月岸真有是也又如夢見水火執為實有便見凌滅才知是夢便可橫身直過尚無燒溺豈有陵滅是知今之熾然宛然實由堅執之久而忘執之功未至耳傾奪之義請觀下文自見二約性真釋觀性元真惟妙覺明妙覺明心先非水火云何復問不相容者承標列中虗空體非羣相而言如云由此虗空廓然逈無諸相而觀七大之性元亦純真先非水火水火尚無說誰不相容乎理實滿慈之疑只消此科便釋盡矣而必兼前相妄者以難況易也意謂直約已發現之相尚無指陳不可凌滅何況未發現之性逈非水火豈應問其不相容乎意令滿慈非惟悟性之無礙兼亦竝悟相之無礙矣所謂問一得二也二後合前文兩喻又分二一合標列性相喻真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現此科羅合喻中兩科首二句合略標中體非羣相合詳列中彼太虗空真妙覺明者元真之妙覺明心也冥含萬有不滯一相之體耳汝以下合略標中不拒發揮合詳列中日照則明等七相也前五句各明各現也謂諸大現不同時各各自現也首八字先別舉空也明之一字即是循業之意亦應兼於神通即自在業力也汝以空明者即是循發空之業也大則如大千空劫及諸舜若多小則如鑿井出土等皆衆生循空業而發空相所謂以空明而有空現也極論小乘涅槃亦此類耳次十二字後總例四大也略釋水火巨則如大千火壞火現水壞水現細則如執鏡火現執珠水現乃至神通所現不假鏡珠皆是也大約是言諸大異時獨現而已末二句俱明俱現也所謂俱現之相者有二類一者同時異處如吹火者口中現風薪中現火鼓熾同時而口薪異處也神通如身上出水身下出火等燒注同時而上下異處也如此之類意淺易知詳下喻意不專為此也二者同時同處互呈齊現之相如一恆河人見水現鬼見火現也如一娑婆我淨土不毀而衆見燒盡乃至一切四土皆同一處而各見懸殊此皆相之俱現也精通如應身是一而能令見者千差圓音是一能令聽者萬別乃至一多大小同時同處炳然俱現者不可勝舉也問下文說相為妄何至引不思議神用為釋乎答正以相本無有定實故稱為妄亦正由相妄方有不測之神用向使相本定實則衆生法執為本然諸聖神通非性分也但業報依通者實未達此所以力盡則失也故惟實聖性發神用方能通達相妄以盡其妙耳明此則下之二種緣起皆可識其故矣末當結云此與虗空體非群相而不拒七相之發揮者何以異乎二合難釋相妄喻又分為二科一徵舉影喻云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去相之各現不足以表其宛轉虗妄而俱現之相方可以表之故單承俱現以合妄相之喻云何俱現合前喻中於意云何之徵也下釋復用喻者以俱現之妄難為法說故復用水日雙現之喻以釋明之是謂以喻合喻也水喻如來藏性影喻七大之相兩人各行喻循俱明之業東西各隨之日影喻俱現之大相此方平平舉喻未說其為虗妄也詳經本只用水中日影以水影一體明性相不二元不用天上之日故舊注非是二就喻明妄又三一境先無憑一東一西先無準的準定也的實也一日而現東西二影誰為定實喻一處而現水火二大亦誰為定實耶先無者言不待分別已自先無定實矣二戒止難詰不應難言此日是一云何各行各日既雙云何現一權以一日喻一恆河此日是一云何各行者喻恆河是一云何雙現耶各日既雙云何現一者喻水火既俱云何恆河是一耶三分別愈妄宛轉虗妄無可憑據此二句結破分別之愈妄要與上不應二字及先無二字俱相召應如云何故不應難詰乎假使境有定實猶可容辨難今既境先無定無實而顧於無定實之境宛轉辨難則難愈多而愈入於虗妄矣如孤山云同觀是一知二是虗各行既二驗一是妄然則一之與二孰可憑據哉但例恆河水火餘可類知方與俱現相應末後仍當合前難釋相妄之喻云觀此諸大俱現無可憑據如此其與空日生明無可指陳者何以異乎喻明性相已竟二申義釋疑此科虗設於此無有現在經文其文即前觀相觀性兩條文也反覆詳玩決是此處申明正義結釋前疑之正文不知何緣錯簡隔於法合之前甚失語脉多繕寫者之誤也前為尊經曲順現文科釋然訛誤豈容不辨今請莫移其處但試將彼文接此無可憑據之後讀之自見意趣無邊略出三妙妙莫加焉一者舉喻法合中無所隔二者喻明性相隨即申義釋疑結歸元問首尾應合收束得宜三者引起伏疑畢見下文來意置之彼處斯等意味悉皆失之智者幸惟審定就後一藏以銷疑竟二圓彰三藏以勸修由前次第三藏急於破迷成悟故俱就衆生迷境顯示未暇普收聖凡染淨二緣十界一如無二以畢彰藏心全體大用今既粗細二惑次第破盡妙明披露道眼近圓理宜罄竭諸佛之靈府而徹底顯示故此統會畢彰用顯圓融三藏也問前言引起伏疑可得聞歟答由前極談衆生現住迷境當體性相二俱無礙疑云若爾即應不揀聖凡同見無礙今何我等動成有礙而如來獨得無礙耶於是如來應念各示其由所以復有後文之圓示也舊注既不辨訛誤復不推此來意致令此處經文前無結歸而後無發起復何脉絡之可通哉閲斯文者幸研味之又分三一極顯圓融問七大結顯已判全體圓融而微妙開示下亦言極顯與斯何別乎答大不同也一者彼方各融一大縱窮七大亦止世間法耳茲則十界普融何可較量二者彼方融相入性未言融現一切無礙妙用亦難齊等且惟極顯空藏故佛但云清淨本然辭意可見特以周遍深於四科又第一義空非同灰斷故表圓融耳又分為二一依迷悟心對辨緣起此中番衆生之迷心成諸佛之智境全顯修成之意蓋衆生性雖本有若不依悟加修但發塵勞而無量自在無礙妙用皆不能發故圓乘悟前雖重本有而悟後須重修成也又二一約染緣起出有礙由又二一執成有礙又三一以相隱性富樓那汝以色空相傾相奪於如來藏此密銷我等何得動成有礙之伏疑也色空傾奪有二釋一約最初釋色即結暗所成者空即晦昧所為者傾奪即妄發見取也蓋始由心動妄發終由見取成就也二約稍近釋則以字即執字法執也傾奪總作背趨之意凡外等背空而趨有是以色而傾奪於空也權小等背有而趨空是以空而傾奪於色也蓋前連三細後截六粗故分初近耳二義竝通二全性皆相而如來藏隨為色空周遍法界此是真如隨緣與妄心相應而普成諸色空境界也三結成諸礙是故於中風動空澄日明雲暗於中者即於色空法界中也澄即靜也動靜交礙明暗互防於諸礙中略舉此四如是乃至地空不容水火陵滅皆例而知也執成有礙已竟二原始要終衆生迷悶背覺合塵故發塵勞有世間相此科撮文的指迷來之要重結上文也省略釋之迷悶即所起之惑內含三細及前四粗此亦連最初而釋若取淺近截流而談則下界與三塗有念為迷上界與二乘無念為悶所謂有念無念同歸迷悶也更通背覺合塵即所造之業違逆性真謂之背覺親順妄法名為合塵內含趣有趣空種種著相顛倒塵勞世間即所招之苦內含色空明暗一切障礙境界即第六粗末當結云汝等所以動成有礙者由此自迷自背之故耳豈性相之過哉約染緣起以出有礙之由已竟二約淨緣起出無礙由此密銷如來獨得無礙之伏疑也分二一融成無礙又曲分三一以性融相我以妙相不滅不生合如來藏番上以相隱性也當機者既疑如來何以獨得無礙佛因自陳無礙之由故首言我以也以猶用也妙明不滅不生者即揀別不用緣塵生滅識心所用者即經前指示六根中見聞覺知無分別不動之體融徹四科七大如來藏常住周圓妙真如性也合即融也如來藏即前隨為色空遍成生滅有礙之相者也意言我所以得一切無礙者豈有他術乎但惟用彼六根中圓湛不生滅性以融彼遍成色空生滅之如來藏而已然合之為言即脫塵旋根不外流逸之意宜莫過於耳根圓通矣二全相皆性而如來藏惟妙覺明圓照法界此科即當理法界言如來藏迷時縱成色空生滅而妄本常空相非實有今由以妙明常住之性融之而生滅妄相了不可得惟一妙淨本覺湛明之性圓融照了遍周法界所謂以如如智契如如理住持大光明藏亦即觀音寂滅現前無生忍位不見少法生滅但彼言寂此言照也有是圓教信滿入住以去之深心方契寂光之體向下則圓發大用即如來本因地心也三結成無礙此真如隨淨緣起之業用也前衆生逆性而真如尚隨染緣與妄理相應成世間相今況順性妙修安有不隨發妙用者乎然此中孚契理事無礙及事事無礙二種法界吳興科為列義示相今但依其分科而不取其釋義也就分為二一標發四義是故於中一為無量無量為一小中現大大中現小是故者承上理法界為此二界之總因蓋衆生由前迷事故全障理今佛悟理故能融事於中者即於理法界中也從體起用自然之理下之四義每二義各成一種無礙緣起俱通二界先約理事無礙法界言之理不可分故理惟一也事無紀極故事無量也然一與無量既互相為則二義於法界觀十門內八門俱收如理遍事理成事理即事皆一為無量也事遍理事顯理事即理皆無量為一也至於理奪事則無量為一也事隱理則一為無量也又理無分限理故大也事有分限事故小也然大之與小既互相現則二義於觀中十門內惟收二門即理事相遍門也意云以無邊真理一一全遍於一切塵中而理非小即小中現大也以一一微塵皆全含無邊真理而塵非大即大中現小也一塵亦可對理單作今以難而該易也此亦可以兼顯前之二義思之可見惟相非二門無交互意故不相當必欲收之同奪隱二門次約事事無礙法界言之取其簡明則前二義於華嚴疏十玄門中且收一多相容諸法相即二門如一塵一毛一身一界皆一也多塵多毛多身多界皆無量也互為之義且就相即門說之一塵即多塵一為無量也多塵即一塵無量為一也毛剎身等一多相即類此可推若收相容門則改即字為入字可以意得此之即入獨約同類法言若異類交錯而言則塵對毛剎身等或毛對塵剎身等相即相入皆可類知後二義且收廣狹自在因陀羅網二門微塵毛端皆小也無邊剎無邊身皆大也互現之義且就廣狹門說之無邊剎在微塵中而剎海不小小中現大也微塵包無邊剎而微塵不大大中現小也此句中字作處字會即大處現小也比上句更是難省舊注說為易知彼蓋濫同上句中字也後更有辨此雖具有大小皆約依報而言若依正交錯則如下示相經文又觀疏於各義皆帶非一非異以為總因今圖簡明皆不帶之又復當知四義亦應收盡此中十門恐繁未備如十世隔法中念劫無異塵剎何不可作剋意委搜門門皆爾特就明省者釋出令例知而已思之是則佛以十六字具含兩法界二十玄門辭義無礙安可涯涘問理界十門何獨不收答以不滅生合如來藏即是會色歸空融空即色空色無礙泯絶無寄何言不收今為顯本經耳根圓通故不暇敘然亦須知耳門入流即是此中含藏非有二也二別示其相不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪有義而必有相故此科即上四義之相也然須曉解義可統收相則難盡略舉例餘而已故今經文以八字為句亦作四句於上四義不必各句全承但隨文便以分屬之前二句單出理事無礙中前二義一多無礙之相且約遍包而顯二義也不動道場指理言即華嚴一真法界此經即如來藏妙真如性又一乘寂滅場地永離諸生滅等一切戲論之相極為真常寂靜故曰不動道場十方界即是事相橫該一切佛剎竪盡十法界矣不動道場為能遍十方界為所遍揆之二義則不動道場即是一理之全體遍十方界者即是於一一事中皆全體以遍之然以不動道場望十方界順讀經文是一為無量屬理不礙事即觀之一不礙異也以十方界望不動道場應逆其經文云遍十方界皆不動道場是無量為一屬事不礙理即觀之異不礙一也蓋法界觀中文義例皆如此通達彼者自信斯言下句準此次句即約能包所包以顯二義也十方虗空指事相之空吳興所謂必攝世界是也蓋此十方空與上十方界互影而語略也身為能包十方空為所包揆之二義身亦即是一理之全體含十方空者即是總包乎一切事法而無外也然以一身望十方空順讀其文是一為無量屬理不礙事即觀之一不礙異也以十方空望一身應逆其經文云十方虗空皆含於身中是無量為一屬事不礙理即觀之異不礙一也後二句單出事事無礙中後二義廣狹無礙之相也且約依正而顯無礙每一句中首尾即具二義初句即約正攝依而以依入正用顯二義也毛謂身毛正報別相又其最小者也大疏名為分正端猶處也實即毛孔之中寶王剎謂佛土依報總相普該諸剎乃其最大之相也大疏名為具依毛端現剎者經云菩薩於一毛孔中不可說剎次第入是也揆之二義順則由毛端而望寶剎雖處毛端而寶剎不小是小中現大即觀之狹不礙廣也逆則由寶剎而望毛端毛端雖包寶剎而毛端不大是大中現小即觀之廣不礙狹也中字準前末句即約依攝正而正入依以顯二義也微塵即隙中映日所見之塵依報別相亦其最小者也大疏名為分依轉法輪謂現身說法取所現之身為正報總相非只一身該盡無量身雲乃其最大之相也大疏名為具正塵中轉輪者經云於一塵中塵數佛各處菩薩衆會中是也二義亦順言之由塵望身則身處微塵而身相不小即小中現大而狹不礙廣也逆言之由身望塵則塵包身相而微塵不大即大中現小而廣不礙狹也此全準於觀疏二文兩義具足本無缺略舊注謂大中現小易明故略之者全不達此順逆相望雙具二玄將謂房中床榻盒裏碗碟之類為大中現小若爾何但易知仍是愚執定相豈成玄門甚至二門不分釋證皆謬如道場遍界既釋為理事無礙却證以不動而升不知斯文却屬事事無礙中通局無礙耳此類甚多清涼所謂不善他宗輒引輒釋是也逆成無礙已竟二原始要終滅塵合覺故發真如妙覺明性此科撮文的指修成之要以重結上文也敵體番上以滅塵合覺番上背覺合塵以故發真如妙覺明性番上故發塵勞有世間相此科末後性字應上科末後相字顯是以元真之性番元妄之相豈非融妄即真無上圓修之旨乎但上科衆生迷悶四字無有番詞然意必有而文從略也對彼迷悶二字應以悟達二字番之蓋省悟則不迷通達則不悶又悟謂悟真本有達謂達妄本空應云諸佛悟達滅塵云云良以一乘圓頓教理須以頓悟為先滅塵二字牒上以性融相之科蓋上文合字即今滅字皆是融意塵即相也滅塵者但是滅其二執生滅之塵即融相也合覺二字牒上全相皆性之科此合字與上小異契入意也所以牒上惟妙覺明圓照法界句也故發下八字牒結成無礙科也上諸無礙皆性發境界然離性無別境界全體作用故即是發性也依迷悟心對辨緣起已竟二依本來心圓彰藏性圓彰者不惟以一心而圓具三藏且於每一藏中即圓具十法界如非則十界俱非即則十界俱即融則十界俱融也然此文當有兩重了揀令義了然畢彰深妙初望前文辨差別有五對而科中已具前二一者迷悟本來對前科衆生迷而傾奪如來悟而合融有迷有悟似心有差別此科出本來心與迷悟了無交涉圓融自若也欲令衆生莫退屈而高推聖境矣二者緣起一真對按華嚴疏初重緣起法界以能照法義邊為文殊即前所謂惟妙覺明圓照法界也就能起法義邊為普賢即前所謂是故於中一為無量等文也以皆尚待能所故屬緣起法界次重一真法界即此科也以理智契合會緣歸實即歸一真法界前謂勝義中勝義者此也豫謂即毗盧身相矣三者足相足性對前釋疑處以說相無定實故無陵滅今前科言正由相無定實所以傾奪之則遍成有礙合融之則極成無礙以尚能成諸佛一切無礙妙用豈更疑其凌滅等耶又說性非水火故無不容今此科言不但只非水火而十界俱非乃至俱即俱融尚即本來圓融性海豈更疑其不容等耶四者修成性具對蓋謂前有合有發全顯修成之相亦是能證此科無合無發惟論一心圓該十界亦是所證五者體用用體對上為依全體之大用雖不離體而偏顯妙用此為攝大用之全體雖不缺用而偏顯妙體也次約本科勸尊經此中非一切即一切而又融拂一切酷似三諦三觀心粗浮而不沉玩者輒立諦觀不知詳佛深旨但是直指衆生現具本來之心便是如此圓融妙極衆生迷時諸佛證後常只如此了無增減也又復應知亦不離前根中所指圓妙明心但於十顯一破方以指明四科七大復進常遍今乃至此方極圓融而無以復加矣始終惟顯心性何曾與說觀門問不立觀門何由修證答汝不見下文阿難喻此心為華屋求門而入佛與說耳根圓通方是入此之門今何閲佛經而不遵候佛旨亂立觀門苟此處觀門已立便當依此修行觀音圓通何用哉吾宗義學幸勿專擅也且此中佛既三標如來藏心便當依佛判科不必別立名言就分三一圓彰空藏語中既以一心遍非諸法即同經初遍破諸法惟顯一真如心故即空如來藏但彼惟破世間此則兼非出世又二一牒舉藏心而如來藏本妙圓心而字承接上文之意如云妙性雖隨染淨二緣起成二相而如來藏云云却是顯真不隨迷悟而變也此經首即指妙明心而古德釋為寂照今詳此三標藏心皆以此二字互為重輕前單後復以別其空與不空耳今於空藏有妙無明應是重此妙字目其寂體耳而言本妙者本來虗寂無有一物如珠淨體本來非青非黃等而又係以圓心者明其但是不定屬於一法而已非灰斷偏空也二一切皆非不但只非六凡而亦竝非四聖也且又依佛後結但以世出世間分科又二一非世間此中二科是如來常說世間之法故該六凡法界然皆隨染緣而起者今此約於心體未涉染緣故皆非也又分二一攝非七大非心非空非地非水非風非火此非字即前先非水火之非攝謂心之一字攝根識二大六根之性前已明其為黎耶心意根復該末那心識大全攝前六心故此心字總攝餘之五大易明二攝非四科非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界此科據文但顯十八界而實以意攝陰入處收盡四科攝五陰者以五根六塵攝色陰以意根六識攝後四陰至於入處開之即是二非出世間此中四科是佛常說出世間法故該四聖法界然皆隨淨緣而起者今約心體未涉淨緣故皆非也分四一非緣覺法非明無明明無明盡如是乃至非老非死非老死盡此與非聲聞科頗似心經語但彼直約諸法空相故言無而此直約一心不屬諸法故言非也皆是取流轉還滅二門雙舉因緣之頭而雙超因緣之尾也惟最初多一明字為不同耳意謂無明無體體是本明故兼帶言之以見離本明外別無所謂無明斯即真心似不當非然對無明而立明乃是有待之法今此圓心絶待故亦非之也此即舉流轉因緣之頭也明無明盡者本明之上無明盡也然緣覺但盡我執無明而已此舉還滅因緣之頭也此於兩門十二支中俱各但舉一支即惑因也如是乃至者超中間十支也十支者二曰行即前陰業因連上無明乃過去二支因也三曰識謂投胎八識即中陰位也四曰名色即在胎五陰名即受想行識之四色即色陰也五曰六入即出胎六根現陰初生之位也六曰觸六根初能照境未成欣戚之時也七曰受對境能生欣戚時也自識至此名現在五支果也由惑業所感之苦果矣下放此八曰愛指誦說淫欲未知追求之時即現陰惑因也九曰取指追求淫欲未遂之時業因也十曰有指淫事得遂之時亦業因也自愛至此名現在三支因也十一曰生後因自胎而出生也不帶盡字是流轉十緣若各支下俱加一盡字是還滅十緣末句非老非死者即非第十二支流轉因緣之尾也老死共惟一支指後陰身從生所至之老死合前生支是未來二支苦果矣非老死盡者非第十二支還滅因緣之尾也斯亦謂盡分段而變易猶未盡也二非聲聞法非苦非集非滅非道非智非得前四為聲聞所修四諦法也苦諦謂世間果三界上下無非是苦以逼迫為性即三苦八苦等也二集諦謂世間因以招感為性即十結使并本隨煩惱聚集以招感苦果者三滅諦謂出世間果可證為性盡滅世間諸苦出三界外虗無寂靜所謂盡諸有結分段永離也四道諦謂出世間因可修為性即八正及三十七助道品所以能成滅諦之果者也後二智得者依孤山作小乘所證智理智謂生空之智理謂我空之理心經略疏通指上能空之智所空之理皆無今因係於四諦之後依孤山亦通況心經此句之後方標菩薩則前屬聲聞何傷三非菩薩法非檀那非尸羅非毗梨耶非羼提非禪那非般剌若非波羅蜜多孤山曰非檀那等先非能趨行非波羅蜜多者總非所趨理也此中多用梵文前六即六度也檀那此云布施財法無畏之三也尸羅此云持戒攝律儀善法衆生之三所謂三聚也毗梨耶此云精進專而不雜曰精勇往不退曰進此普對諸度萬行悉皆專勤也羼提此云忍辱有六相一力忍不忘嗔而但不報也二忘忍雅量容物處辱如無也三反忍反己自責不尤人也此三未必得理四觀忍外人內身皆達如夢也五喜忍喜其能成我之忍力又如力士試力而喜也六慈忍憐彼加辱者愚癡而發願度說也此三非得至理不能也此與刊定記小異大同也禪那此云靜慮初心則靜即止慮即觀行成則靜即定而慮即慧也種類極多此惟取於大乘權實漸頓偏圓等禪也般剌若此云智慧有三相謂文字觀照實相也亦種類甚多大約了妄達真契理如如等智也上六為能趨之行波羅蜜多此云到彼岸離生死此岸度煩惱中流到涅槃彼岸此一為所趨之理三句皆上半為法下半是喻以彼岸所喻是涅槃而涅槃即佛所證不生滅之理在菩薩方以趨之而未證極也故作六行所趨之理尋常贅於各度之下故云六波羅蜜此以一句總之耳又前五度不假般若導之皆事相之行不到彼岸故般若又為六度之要也四非如來法如是乃至非怛闥阿竭非阿羅訶三耶三菩非大涅槃非常非樂非我非淨如是者結上菩薩之法乃至之至從因至果之意非有超文顯前菩薩法即如來之因也孤山曰先非能證人後非所證法怛闥阿竭此云如來阿羅訶此云應供三耶三菩此云正遍知即十號之三也以號目人故即為能證之人略釋證真之極故稱如來二利之極故稱應供徹照真俗故稱正遍知他經所釋甚多不能繁引向下是所證之法涅槃此云無生滅謂遠離諸生死也又云圓寂謂萬德俱圓諸妄永寂也是四德之總體下四德乃其別相常者非惟二死永忘無諸生滅亦且世相常住究竟堅固也樂者非惟遠離諸生死苦亦且得不思議解脫受用無量法樂也我者非惟證真法身猶若虗空亦且山河草木全露法王也淨者非惟妙淨理體無諸染著亦且清淨遍周無染非淨也何不非菩提答三號中正遍知亦該之矣以惟獨約心體故凡聖俱非而直指人心者所以不存聖凡之見乃至心佛俱非也而法界觀立理與事非一者義𠃔合也圓具空藏已竟二圓具不空藏首既便即世間法理實即同十惑忽生山河大地等但此望彼有二了簡非是盡同一者彼方即於世間此則圓即十界二者彼隨染緣已起此約一心理具隨緣隨用皆可即之也既即萬法故定屬不空藏也分二一承上起下以是俱非世出世故以因也是此也孤山曰世結六凡出世結四聖正以此心寂體不滯一法方能成普即一切之用如摩尼珠由其不屬一切色方能遍現一切色故雖體不臨照而實用無不含向使墮於一色豈有遍現之用乎故躡空藏為不空之由二正明不空又二一牒舉藏心即如來藏元明心妙承上由心寂體遍非諸法故即如來藏云云元明對上本妙重一明字元亦本也元明者本明照用有涵具之意而復係之以心妙者見用但體含仍非滯有之用也二一切皆即非但即於四聖亦竝即於六凡然即者無施不可之意非便指於己現之用也此下法相皆同空藏但改即字其餘悉準上知分二一即世間又分為二一攝即七大即心即空即地即水即風即火二攝即四科即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界二即出世間又四一即緣覺法即明無明明無明盡如是乃至即老即死即老死盡二即聲聞法即苦即集即滅即道即智即得三即菩薩法即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多四即如來法如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨以十界諸法離此心無片事可得故惟據藏心之體便即十界之體隨所現而無不可者所以直指人心者信手拈來無有不是乃至心佛俱即也法界觀立理與事非異者義𠃔合也圓具不空已竟三融空不空上非與即皆對十界為言今此不復更陳十界但與拂融即非二字則空與不空合一圓融不可思議矣故此科應是圓具空不空藏而省略文也分為二一承上起下以是俱即世出世故承上不空遍即諸法故不墮於一法由遍即而又不墮故為融拂之由二會歸極則又分二一牒舉藏心即如來藏妙明心元躡上二科之本妙元明以雙標妙明二字泯合一心寂照融一張下圓中之本復係之以心元者兼明其本來元具非假於修成作為者也二即非圓融離即離非是即非即此中渾含世出世間一切融會離即離非雙遮前之二藏以顯此之一心圓神不滯之體固不定屬於即亦不定屬於非故曰離即離非也下句非即二字本是非二字而番說非即耳文之巧也是即是非者雙照前之二藏以顯此之一心隨宜自在之用全非而即全即而非所謂能即能非也故曰是即非即大約對萬法而獨顯心是圓融極至耳所以直指人心者有曰若要直捷會一切總不是若要委悉會一切無不是而法界觀立非異即非一非一即非異義𠃔合也舊注引淨明遣盡之說方是空藏中一切皆非意耳管見非之當矣夫顯心之談妙極於此問答原意宜此重伸良以義廣言長忘其最初本意則始終語脉不可通矣原夫佛酬阿難妙定之請捨置權小所修示以諸佛本定然斯定所以逈異者以是全彰自性本妙圓定釋者不可多用修意以仍濫於常途也況此奢摩他中純談本定曲顯性真而說修之意絶少從初三卷直指藏心本定之體顯次第空藏也而大衆各各自知心遍十方常住不滅斯則頓意成矣而圓意猶未彰也問七大何說圓融答彼約周遍說也復次滿慈頓興二難為後二藏之發起於是答萬法云何生續則略彰藏心隨染緣之用顯次第不空藏也斯則體用略備圓意已露而猶未具彰也復答五大不合相容且示性相二無礙理顯次第空不空藏也斯則且彰無礙釋彼有礙之疑而已至於即性之相無量不思議業用即相之性混融不思議妙體未極顯也更因當機之伏疑而與之備談染緣淨緣四義四相則一切圓用方以盡彰又與開二合二雙拂雙融而三一妙體方以極顯然用須證而後發故略帶修成體則本來現成故仍彰不變縱因修顯亦非修生所謂是了因之所了非生因之所生矣是則後之圓融三藏收前次第三藏而自心本具圓定方以極顯而無以復加矣閲斯文者幸加意焉極顯圓融已竟二普責思議如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見首二句責界內凡夫三有即欲有色有無色有也出世間即三有外也不責偏教菩薩者舉正為而略兼為耳以所下二句見不可思也以者用也所知心凡小各所證之理性也以彼證非妙未離能所各以本智為能知各據證境為所知今即以此所知心境比類推度謂佛無上菩提亦同此也然佛無上菩提是佛圓修圓發證極妙覺即前淨緣起中四義四相具足本始之究竟彰顯全體之妙用應即十十玄門法界無障礙智亦即不思議解脫如來自言我所得智慧微妙最第一者此也此誠非識所知非心所測豈可用所知心以妄測度哉正所謂儘思共度量不能測佛智也末二句見不可議也用世語言如陵滅不容之語因緣和合之言是也入者參雜於中也佛知見者法華標名而未釋義疏家隨自意明如三智五眼多從證得豈定合於佛意斯經佛口親談如來藏心發揮本有乃至末後極顯圓融三藏語竟乃責凡小用世語言入佛知見是則顯然以圓融三藏為佛知見復何疑哉又特取於生佛本來不變妙心不獨取於證得然則學者宜應惟佛是遵可也思議分言亦互影耳問菩提既取於修成則知見安知不獨取於證得者乎答此處縱不信其決定重本來心到五卷初佛釋根塵縛脫明指根性即是知見文云知見立知即無明本知見無見斯即涅槃可見佛於斯經前後發揮衆生根性即是開示佛之知見不爾但取佛所證得與衆生何關而必欲開示之乎是則法華標名而未釋義者於斯經方釋其義矣我故常曰斯經為法華堂奧者以此耳又當知菩提知見皆可互通此處菩提即是證得知見此處知見即是真性菩提因佛於菩提取無上者既分屬於修成故須知見但取於本來耳智者善須甄別普責思議已竟三結喻推失又二一喻智最要又分二一舉喻譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發四皆絲屬之樂琴今七絃瑟今二十五絃箜篌今十四絃琵琶今四絃古之絃數不同不繁引也喻圓具三藏之妙性即寶覺真心也妙音喻妙用即前一為無量等也妙指喻妙智所謂如如真智即前妙明不滅不生能合如來藏者也發字喻中即謂發音法中即謂發用所謂故發真如妙覺明性猶發音也二法合汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起首二句總與合定向下詳開合文寶覺真心合琴等也世之所稱為寶者略有三義一離垢穢二具光明三富財用今以本覺不變之體即離垢義圓照之相即光明義隨緣之用即財富義故稱寶覺也真心檢非緣慮等心然覺以照體言心以總相稱也不偏滯曰圓無缺減曰滿各各圓滿言人人皆本具合雖有妙音也以下合無指不發有二釋一者補缺釋以喻中缺有妙指能發妙音今度反顯必有則如我二句作法說正合之也海印即佛心常住三昧按指發光即動成妙用也二者局喻釋以喻中但說無指不發而總合又但言汝與衆生故也按指發光但作重以喻明以按指喻舉心以發光喻塵勞起也正以不具妙智故但發塵勞不發妙用正合無妙指不發妙音也海印者應是佛手印文不指佛心三昧及大用等釋也舉心塵起若剋取前文實即傾奪而隨為色空耳二責其不求由不勤求無上覺道愛念小乘得少為足此出其不發妙用之由而激勸其求也上文直言不發妙用而實未明言由無妙智至此方說出也無上覺道即佛智果所謂發妙用之妙智也若因果地而尋求因地即根中不生滅性佛初以之合如來藏者也小乘無志上求佛果故不勤求於此所以妙用終不發也末二句又出不求之故皆由愛小而失大也愛念其功省而利近得少為足者但以六通十八變等化城僞寶為足矣蓋激其速回小以取大也正答次問已竟二兼釋轉難分二一滿慈索妄因而擬進修滿慈依因緣舊宗知苦因集而後斷集脫苦等緣覺是義更明今聞諸妄起自無明乃欲知無明所因而剋苦斷之不知諸妄尚可推審其因獨此一法無因可推審也是知此問無明之因不同前問萬法生續之因也又此擬修乃是意取有三一者據佛前言由不勤求理宜奮求修法二者據今自語未究聖乘亦須究竟修之三者據後佛言何籍劬勞修證故知意中必有奮修之念佛方鑑機云然也又二一推較本末又二一推本無二富樓那言我與如來寶覺圓明真妙淨心無二圓滿我與如來者就己對佛推論以例衆生諸佛無不皆然見生佛本覺無不同也寶覺圓明者領前寶覺而加圓明二義圓即前之富有財用意明即前之離垢光明意真妙淨心者領前真心而加妙淨二義不滯一相曰妙不涉一塵曰淨無二圓滿者領前各各圓滿而但加同佛之意如云在佛無增在生無減也二較末懸殊而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常先以舉己久迷未復也然遭無始之妄者領初之忽生中意也久在輪回者領後之相續中意也聖乘未竟者領愛念小乘得少為足之責也孤山曰未究竟二意就外現則羅漢無明全在就內祕則菩薩有上地惑故未究竟也諸妄圓滅即極果斷德獨妙真常即究竟智德蓋世尊下即說如來獨得滅妄純真此領前辨果中妄不復生真不復變意耳二索請妄因敢問如來一切衆生何因有妄自蔽妙明受此淪溺承上問本既無二我等從無二中何故忽遭根本無明自蔽妙淨圓明之寶覺受此久至輪回聖乘未竟之淪溺竟與如來無妄純真者岐而為二乎然淪溺二字皆取喻於水淪者水之旋復也喻久在輪回溺者水之深處也喻聖乘未竟經說二乘墮無為深坑故也二如來喻無因而示頓歇分三一喻明無因又分四一牒惑起問佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝雖除疑一句是許其大疑已除蓋據其推本無二是信己本真稱佛圓常又己信佛永證乃至萬法生續之疑性相難融之惑皆已破矣餘惑未盡者尚不達此無明無因是以強索之也現前諸事者因現前諸事中偶有此一事也蓋就事引喻非假設之喻也二舉喻辨定汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故溫陵曰演若達多此云祠授從神乞得故也以為魑魅者自以為魑魅而驚怪也此中但取狂走惟喻最初根本無明獨頭橫起故說無因若依舊注句句解配則狂走最後反喻粗惑何得無因無狀同無故也夫無狀無故已自無因而更問何因者欲其自審也故滿慈於喻了知不謬矣三以法合喻二一舉法詳合又分二一直標無因佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄首二句先舉無妄之體以正顯妄本是無也妙覺明圓者以一覺字處於三義之中顯覺體具乎三義也無妄縛之曰妙無妄蔽之曰明無妄虧之曰圓本圓明妙者復表三義皆本具而非假修證也既稱下明虗妄與有因展轉相違蓋既妄則必無因有因則必非妄可見於妄而索因者不達妄理者也二極明虗妄又二一因空無始不可說自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返起信論無明與妄想皆是最初細惑互相引發凡有幾重茲不繁敘彼分二相稍殊無明最初癡相也妄想迷中動相也却後凡迷真處便是無明凡執似處便是妄想雖常互為因緣而實一虗妄無別因也今此妄想即同論中而迷字即彼無明首二句正明因空而說妄想自相成因更無別因次二句正明無始而說無明自相積集以至微塵紀劫終不得其因之始相末二句雙承妄想自因而無明無始雖佛八音四辨亦不能逆推而說其本始之因故曰猶不能返良以妄體本空無可說矣二妄空無生不可取如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人說夢中事心縱精明欲何因緣取夢中物首二句非是明其因迷生迷也因迷因悟上文已經雙破此是一番一正如是迷因指法之詞因迷自有者正因迷惑不達無因所以常自成有也蓋為迷妄因為有故并妄體亦皆成有故也下二句番迷成悟也識迷無因者達得迷無生因也妄無所依者自見諸妄悉皆本空也蓋為達妄因為無故并妄體亦空故也次二句結成無生言識得無因不但只達妄空亦達最初即未曾生而却後將何所滅乎後引夢喻以明不可取也得菩提者即如寤時人醒夢之後也宣說無明即如說夢中事也雖有大智不能取無明確實之體相即如心縱精明不能取夢中物也大約亦同不可說意特以取字別上說字以妄體別上妄因耳舉法詳合已竟二取喻帖合況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失首二句牒法也況字以上夢喻況下本喻如云只此夢喻已足顯其妄性無生況復云云首句牒妄因本空次句牒妄體亦空也如彼下四句帖喻妄因本空忽然下四句帖喻妄體亦空設使其頭真有得失不名為狂帖喻法中設使妙覺真有得失不名為妄今乃歇非外得未歇無失帖喻法中悟非外得迷非真失可見妄體本來無有也以法合喻已竟四結成無因富樓那妄性如是因何為在性即體也言妄之自己體性本來如是尚不可得況更索其因哉喻明無因已竟二示令頓歇圓頓教中知真本有何勞起修達妄本空不須強斷而強修強斷者盡屬怖頭狂走妙在歇狂當下即是然歇狂正是無修之修亦非同撥無放逸之流也分三一示無修之修又三一略除妄緣汝但不隨分別世間業果衆生三種相續詳但之一字即所以止其意中奮修之念如云汝究妄因將欲得其本因而苦修以斷之也今即悟其無因本空何必乃爾汝但云云分別二字至重應是緣粗境之粗惑總該法執對三種相續為三分別故下科呼為三緣也不隨二字便是頓修頓斷功夫蓋二乘我執已盡尚猶不了法空於三相續而分別心外實有長纏理障今教其於承示悟空之後但惟息此三種緣念分別而一切不隨即是頓斷法執也良以彼之三種相續本無因而未全空但惟依此隨念分別故常不即空今惟不隨彼自無依不空何待此誠頓悟家最為省力之修也思之夫觀三種相續文取初問科中之語則知此之頓修全籍初問中生續皆空以張其本也二妄因自絶三緣斷故三因不生上句牒上科意也蓋上科不隨三種分別即是斷三緣也而粗惑粗境已盡三因乃帶細境之細惑即三細中流注細念所以為前粗惑境之深因故亦對境成三不生者良以粗念除而功熟細念亦隨盡也三妄本亦盡則汝心中演若達多狂性自歇心中演若狂性者借喻直指根本無明良以前演若狂走之狂本喻根本無明故也歇者息也滅也由前達空之後粗細二念俱忘則根本無明豈能獨存亦泯然而息滅矣然歇字雙含伏斷兩意若約伏意則十信滿心圓伏無明若約斷意則等覺後心永斷無明也二示無證之證歇即菩提勝淨明心本周法界不從人得前皆滅妄此科證真也菩提智果之號本覺出纏三智圓滿之相勝淨明心極果之體合明體而兼舉也勝者超過一切無比無上之意淨者煩惱不能染明者無明不能昏也權小菩提下對凡外亦稱淨明而非勝淨明也心之一字亦顯唯心非別有也此亦雙含發心究竟二種菩提承前圓伏無明此為發心菩提初住位也雖斷一證一而圓融該徹四十二地即成正覺克肖究竟也承前永斷無明此為究竟菩提如來位也亦就滿慈已齊七信進則二果可階故作斯判若約初心具頓根者則雖觀行位中圓伏五住一超直入是亦菩提勝淨明心曾無優劣幸勿退屈祖云但離妄緣即如如佛𠃔合此中頓歇之意本周法界者但由歇而顯非由歇而始有也前云一切世間諸所有物皆即菩提妙明元心即周法界意也不從人得者縱使從人指示而實理備吾身非從人與如燈傳點而已三責劬勞修證何籍劬勞肯綮修證籍者假也須也吳興曰骨間肉曰肯筋肉結處曰綮出莊子技經肯綮之未嘗依管見作勞筋苦骨剋苦修行之意何籍者言不須作意苦求修證也良以頓人悟處高妙了達妄本空而真本有但息顛倒分別一念入無分別本空者無依而何所留本有者無覆而何所隱哉故不假於苦修證也此若滿慈意中無擬修之念則佛責何所謂乎然而欲希頓修者當先求於頓悟如其悟未大徹而妄撥事修自成陷墜亦愚惑之甚也慎之示令頓歇已竟三結喻推失又分三一本有不覺喻譬如有人於自衣中繫如意珠不自覺知衣喻三緣顛倒分別三因微細流念及狂性根本無明重重包裹之相珠喻菩提勝淨明心由此枝末與根本無明重包重裹故雖有而不覺知也二迷之非失喻窮露他方乞食馳走雖實貧窮珠不曾失纏空而乏於妙用為窮滯有而無所退藏曰露空有二皆邊地故如他方吳興曰求人天樂取偏小益猶乞食馳走珠不曾失者萬妄交馳一真宛在猶雖貧珠在也三悟之非得喻忽有智者指示其珠所願從心致大饒富方悟神珠非從外得吳興曰佛如智者教如示珠證理起用則致大饒富也溫陵曰末二句喻妄息真現不勞修證也致大饒富喻本周法界末二句喻不從人得也此中問處原同圓覺經金剛藏云若諸衆生本來成佛何故後有一切無明但一切意該本末而此經以末從本亦言諸妄悉無因而本空也問此之頓歇與耳根圓通同耶異耶答歇意同而就位有異也若博地凡夫名字位中聞斯法門悟徹真有妄空從耳門入流忘所即是不隨世間分別三緣頓斷也若仍隨分別三緣不斷何名入流忘所耶自此由忘而不生由不生而盡由盡而空由空而滅一路休歇自淺之深直至寂滅現前即是菩提勝淨明心現前矣此則全同也若滿慈七信位後根結已盡何用番前又從耳門而入但從覺所覺空頓歇法執分別俱生至寂滅現前則勝淨明心亦現前矣蓋前位人法二執齊歇此位但歇法執故云就位有異耳正答滿慈已竟二兼示阿難阿難本是當機以此疑接附滿慈問中而起故曰兼示也分二一阿難躡佛語而執因緣此阿難第三番疑因緣也最初第一於顯見超情科中疑見性不由因緣第二於圓彰七大科前疑萬法不由因緣今此第三乃疑證果成道何亦不屬因緣有果無因誠大可疑意蓋聞佛久排因緣而語中又帶因緣既說因緣又言何籍修證故起斯問是則前疑性相今疑因果矣分三一起問即時阿難在大衆中頂禮佛足起立白佛二正問又復曲分為四一躡牒佛言世尊現說殺盜淫業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得現說殺盜淫者依天如作略牒業果而意該世界衆生若是則業字應是等字之誤而緣字即是分別非即指殺等業也此說極好以滿慈三業絶無豈佛更說令斷之乎二證成怪問斯則因緣皎然明白云何如來頓棄因緣首二句證成佛言現說因緣下二句怪問既說因緣何又頓棄而言迷妄無因何籍修證以至多明今教不屬因緣耶三昔教有益我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏首二句自受益也世尊下他受益也梵志者西竺出家者之通稱謂其有清淨志行者也經載目連等最初於途中相遇波離迦葉等聞說生滅四諦因緣開悟信從然後見佛成羅漢果也四今濫自然今說菩提不從因緣則王舍城拘舍梨等所說自然成第一義觀今說二字即指現說無因本空歇即菩提何籍修證等語而為頓棄因緣之意不必取前文也外道自然如八萬劫後自然成道猶如縷丸極處停止皆自然不假修證之意也正問已竟三結問惟垂大悲開發迷悶意謂約佛之言則仍帶因緣究佛之意則頓棄因緣今請決定仍是因緣耶必非因緣耶決一則不迷悶矣二如來拂深情而責執恪又二一就喻拂情又二一拂情伸意又三一即喻揆情佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是即喻者即取前喻揆情者揆度阿難兩種情執也如云汝所謂因緣自然者今且就前狂喻以推之汝必謂狂性云云理窮於是者言汝不過執此為因緣為自然出此二途則情盡理窮也大意忖度阿難之意而先以按定下方破也此但說喻若約法中須得無明因緣滅除菩提自然而出若此則本空本有二意俱失全成兩種執情矣二雙拂二計又分為二一約頭雙拂約頭者法中蓋指菩提不墮二計也又二一拂自然阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走首二句標定頭為自然也本自其然者牒上句意猶言既是自然也無然非自者猶云無非自然也言其常應自然而有不得驚其忽無而發狂也末二句即詰問其何故忽驚無頭而狂走乎因緣亦只是故字意不取照鏡但表其既狂便不屬於自然而已法中謂本性若屬自然衆生即當常自見性不復有迷淪者今何故復有迷而馳背者乎可見菩提不屬於自然也大端破自然只破自然切不可謂以因緣破自然交破即屬矯亂如前辨也二拂因緣又二一對詞反詰若自然頭因緣故狂何不自然因緣故失文雖雙舉實惟獨重因緣語雖帶狂實惟獨約頭辨若自然頭者頭本先有也因緣故狂者照鏡因緣而遂怖無頭也若此則全非真因緣何以故若實因緣何不此頭元自然有照鏡因緣遂真失乎必真失其頭而後為真實因緣也法中如云若菩提妙性先自然有而後假無明因緣背馳不見遂謂此性全屬因緣即當真失其性方信因緣不妄今何不由因緣真失乎詰令自審也二正結其非本頭不失狂怖妄出曾無變易何籍因緣首二句是申其正意以結定頭在不失而無端狂怖妄謂無頭而已末二句是出其非為因緣如云正當妄怖無頭之時而本頭實無變易及覺有頭狂歇之後而此頭何假因緣法中合云性本不失無端迷背似失而已然正當迷背似失之時而本性實無變易及見性破迷之後此性何假因緣哉此亦破因緣只破因緣非以自然而破因緣也大約言此頭若是自然當無狂怖此頭若是因緣當須真失今由有怖故非自然又由無失故非因緣以法詳喻歷然可見但是雙非決無雙是若用互破則前墮是因緣後墮是自然故曰矯亂觀後文尚須重重遣盡豈此中反令雙非而番成雙是乎二約狂雙拂約狂者法中蓋指無明不墮二計也分二一拂自然本狂自然本有狂怖未狂之際狂何所潛本狂自然者若狂本出於自然也本有狂怖者言即當本來常有狂怖也下二句詰問可知若以合法則未狂之語法喻難齊良以喻中真有未狂之際法中實無未妄之時若爾當墮無明有始之過只可義取之云清淨本然之中妄何所潛如諸祖謂空劫以前亦是義立而已二拂因緣不狂自然頭本無妄何為狂走不狂自然者若不是狂出於自然也又說首二字顛倒應是狂不自然即反說因緣耳蓋此句先以番成因緣下二句方躡上詰問以破之也頭本無妄者即同頭本不失也末句正詰問也法合當云若謂妄非自然而有因緣然性本不失何因緣而背馳乎雙拂二計一科已竟三躡伸己意若悟本頭識知狂走因緣自然俱為戲論是故我言三緣斷故即菩提心此即躡上破辭而重伸己說歇即菩提之意首句是躡上約頭雙拂而悟頭之非自然非因緣也次句是躡上約狂雙拂而知狂之非自然非因緣也下二句接云若如是解則二計俱為戲論而全無實義矣法合當云若悟覺性本具又知無明本虗二計誠為戲論矣以上躡前結束已定是故下就伸己意也如云由是二俱戲論之故我故前說但使三種分別戲論之緣斷除即真菩提心矣良以法執未除者於三種相續不忘分別正是戲論前云不隨分別者所以止絶戲論耳戲論止而無明無依菩提離障不真何俟哉拂情伸意已竟二疊拂諸情分三一先出兩重生滅又二一約菩提出生滅菩提心生生滅心滅此但生滅承上言三緣斷故雖即菩提而不可更作生菩提想何以故若菩提心生則生滅心滅此則仍是生滅之心非真菩提心也二約自然出生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅承上言不但此為生滅之心縱使滅生俱盡無功用道亦不可更生自然想何以故若自然心生則生滅心滅此亦全是生滅之心非真無功用道也此重更難察識故下偏喻之先出兩重生滅已竟二喻明自然非真無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性承上問言何為自然猶是生滅良以計無生滅為自然者蓋對彼生滅之不自然而立非真本有也若以喻明正如世間因雜和成一體者名和合性對此和合而遂將非和合者稱本然性則此本然二字元是對待番顯增立之法豈本有哉本然即自然也三極盡妄情方是本然非然和合非合合然俱離離合俱非此句方名無戲論法本然即自然就喻而用也和合即因緣取類而稱也本然非然者本然與非本然也和合非合者和合與非和合也合然俱離者和合與非和合固俱離也本然與非本然亦俱離也若單遣則反淺於前句矣離合俱非者離與不離又復雙離之也此離合的合字不與和合的合字相干蓋是對離說合故即不離也末二句方許其真無戲論矣蓋遣之又遣以至無遣方契真無功用道真菩提心也是由識知狂走則因不墮於二計覺悟本頭則果不墮於二計而真無功用即真因也真菩提心即真果也故知阿難此番之辨全辨因果也就喻拂情已竟二切責執恪分二一抑斥戲論又二一直斥耽著戲論舊說世尊教阿難歷劫勤修不可徒恃多聞如是則與前何藉劬勞肯綮修證意相矛盾若約對位淺深則博地凡夫豈得一超直入若約多聞寄斥則因緣六度寧免塵劫腮當知不捨戲論歷劫無功能捨戲論何須歷劫必謂捨戲論而又當歷劫則不藉劬勞之語終乖前後矣請詳今解本意自見復分為二一判果難成菩提涅槃尚在遙遠非汝歷劫辛勤修證首句智斷二果號也承上如云據汝所執所問則極果尚在遙遠非汝歷劫辛勤所能修證意謂縱經塵劫修行亦終不能實證也此且斷定難成下科方出其所以也二出其所以雖復憶持十方如來十二部經清淨妙理如恆河沙秪益戲論蓋言我所以斷汝歷劫難成極果者正以汝雖憶多經本皆離戲論而清淨詮了義之妙理汝反取之以資益戲論所以難成也意謂若能遠離戲論則歇即菩薩尚不藉於劬勞亦何有於歷劫難成哉直斥耽著戲論竟二現證戲論無功又二一自全無力汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難言其若憑自己多聞全無道力可免淫術之難也二仗呪方免何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫夫乘佛呪力一時頓證三果超斷見惑八十八使進斷思惑欲界九品故曰成精進林勝多曰林以其進速而證多故以稱也報居不還不來欲界故曰愛河乾枯欲愛溺人無異瀑河故以喻也夫阿難固是權人登伽亦不定實但一見多聞無功示居初果一顯呪力功大速證第三義無不盡至於一期勝會見解俱圓本皆信位而但依小稱者取其名位勝而令凡小生敬羡耳抑斥戲論已竟二激修無漏又分二一正勸勤修無漏是故阿難汝雖歷劫憶恃如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦常不開演曰祕密不可思議曰妙嚴一日者番上歷劫也無漏業者捨權歸實遠離戲論行起解絶入無分別即不漏落於戲論分別而已若以下文取之即須反聞自性所謂將心持佛佛何不自聞聞也初不漏落於循聲以次而深重重脫之重重無漏矣憎愛現對摩登耶輸何須玄釋且阿難既示初果但就初果論之教載須陀洹人隔生多淫後有畫瓶之悔又羅漢斷愛而憎習全在如淨明會上天華著身是也夫憎習被縛如獼猴推粘求脫若是則潤生之根抵尚在何用他說況在淫室時既稱將壞戒體足顯救之遲而未必不壞也何待隔生至於遠離功亦非淺約戒則須身心俱斷先以絶愛斷性亦無後以絶憎約定慧則須寂照含空摩登在夢至此豈惟但無憎愛亦乃情器俱超而更妙能轉物矣二更舉劣機激責分三一單舉登伽破障如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼宿為淫女四字具含三障宿為業障也淫習煩惱障也女身報障也故下文銷其愛欲則煩惱障已破名之以性則業障已除作比丘尼則報障現轉顯呪力能破三障障消性顯故成性比丘尼也二兼與耶輸同益承上文所謂三障既開不證何俟故此科顯益又分二一開悟益與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦女身之報全由欲愛深重今緣宿命開通洞知纍劫苦本皆因貪愛而悔悟深切也二修證益一念熏修無漏善故或得出纏或蒙授記激勸之旨偏屬此科前責阿難不如一日修無漏業令出二苦今舉劣機一念薰修即得出纏受記正相應也上二句二人之修也薰修無漏者乘悔悟心止貪愛水不外流逸一念回光湛居性定恆無漏落也下二句別言二人之證也出纏是登伽所證即出貪愛纏縛若約三果即如愛河乾枯之解授記是耶輸所得已證四果法華蒙記成佛號具足千萬光相如來進證應入住位矣兼與耶輸同益已竟三詰責阿難自欺如何自欺尚留觀聽承上言耶輸女身已為劣弱而登伽淫女更是下劣此等劣機今尚以一念薰修即皆高證而汝以丈夫根智徒守多聞淹於下位自欺云者蓋現見薰修有益而不修明知戲論無功而固執留者戀也觀聽即見聞也尚留觀聽者言尚戀見聞分別而耽著戲論也當知阿難此番辨問最有關要良以前既排盡因緣後復將談修證若一向有修有證則違前自言若一向非因非緣則廢後修證此誠聖言宛似互違而不可不辨也今明真本無變猶夫頭本無失而何有實修實證固非一向墮於因緣也又明妄之現迷猶夫狂之現起而豈終無修無證亦非一向墮於自然也由是則知斯經無修無證固不礙空有修證而有修有證仍不礙於無修證也前後之文無復矛盾之可議矣其旨亦甚微妙也哉問答辨劾已竟二大衆領悟感謝此科通結前滿慈阿難等銷疑悟理也以答滿慈之後尚無領悟之文故知此科非單結阿難因緣之問也分二一領悟阿難及諸大衆聞佛示誨疑惑銷除心悟實相身意輕安得未曾有示誨總承前正答滿慈及兼示阿難之文而言惑除者通指正答中萬法生續性相圓融轉難中何當復起何因有妄及兼示中頓棄因緣五重深惑皆除也心悟實相者按前文佛慈許說科中所謂真勝義性一乘寂滅場地真阿練若正修行處是則初句實相總名也次句實相果地也末句實相因地也法華以實相為體一乘因果為宗正孚斯義答中生續本空及性相無礙即寂滅場地不隨分別及遠離憎愛即正修行處而實相炳然昭著矣通前更論有三處表顯實相一者十番示見之尾佛責聲聞不達實相則下談離二見妄及四科藏性即皆顯實相也二者七大之前許令當來修大乘者通達實相則下談七大遍周及阿難承示開悟處皆顯實相也三者即此處經家敘衆已悟實相逆知說後二藏一大科中全以發揮實相如上所解也若揀差別則前二顯實相常遍後一顯實相圓融矣又當知就心性謂之如來知見統萬法謂之一乘實相是可見法華渾標名字此經方以釋義我故曰斯經乃法華之堂奧也輕安定相也定慧互倚故躡慧成定頓銷粗重戲論得無分別回光湛然渾一實相法華所謂其心安如海是也極慶其聞所未聞故曰得未曾有滿慈至此方到究竟無疑惑地而阿難亦從此更不復疑因緣自然矣二感謝又二一感謝之儀重復悲淚頂禮佛足長詭合掌而白佛言重復悲淚者以前悲淚雖多感悟猶淺此則所悟既徹而悲感益深故標重復耳二感謝之言又為二一稱讚善開無上大悲清淨寶王善開我心清淨即智也讚佛為證極悲智利樂無盡之寶王善開心者言我等惑妄重封權宗固閉佛善令其開通而豁然見諦也二詳申謝益能以如是種種因緣方便提獎引諸沉冥出於苦海首三句申上善開之意如是指上之詞種種因緣者推妄發真微細因緣非世間和合粗相也方便即善巧也提謂提撕以警其迷執獎謂獎勸以振其疲怠末二句謝其深益引謂誘掖沉謂陷溺冥謂障蔽苦海謂憎愛二苦海也此固謝前而語意首標重復悲淚末望究竟出苦亦所以啓後修門矣自滿慈發問至此復為一周名無生無礙周良以阿難於三卷末承佛破妄顯真之示而開悟者但初悟所執之妄初見所遺之真故方謝其銷我倒想隨請其更除細惑故四卷之初滿慈代舉生續圓融之二問而佛答初問則深窮萬法始於無明而本空無生答次問則圓彰性相是佛菩提知見而融徹無礙與夫三番轉難則審除細惑無餘而無生無礙之旨愈明矣故曰無生無礙周也奢摩他文齊此已盡又當知前周初明二執分別純屬悟境此周搜抉二執俱生兼啓修意良以細惑要因修所斷故又若結歸性定則前周中談空如來藏以直指自心本具妙定之體極顯其常住周遍此一周中談後二如來藏乃至圓融三藏以詳發自心本具妙定體用極顯其無礙圓融此即十方如來得成菩提妙圓真心不假修習如如本定三名中即妙奢摩他而徹悟此者即微密觀照也又此心此定一切衆生乃至權小悉不測知所以錯亂修習終無實果故於經題四實法中正屬如來密因也而舊注謂見道分者亦齊於此餘意在下周中說奢摩他令悟妙心本具圓定已竟二說三摩提令依妙心一門深入此科次答阿難妙三摩提之請也蓋據經文於建立義門科下即親命名妙三摩提向後通一大科遍稱三摩提號或三摩地但梵音小異耳乃至二十五聖無不云然故今首判屬之然舊注科為修道理雖不差義亦小濫按天台判圓住同於別地方謂真修而住前未全許為修也今圓通根之初解始得人空正在信位蓋是似修而未入真修舊注判此為修而判後為證豈此無位而後無修耶況此中明以前之性定妙心喻為華屋而圓通方喻入門足見升堂入室更在後修諸位也應知此科論修尚在修之初門論證不無證之初位以圓通功就亦信滿而入住也是則謂此科全該修位固不可而謂此科一無證位猶不可也是故今科按定屬三摩提而遵經標一門深入庶乎其離彼二過也不知具眼者以為何如分二一選根直入前已屢明此經所以異於權小者惟在用根而不用識故前顯真始於根性今談修證惟選本根證入圓通也又分三一阿難說喻求門證入又四一述領佛旨又二一領開心之旨世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎上言善開我心此方敘述心開之相亦總攝上科二周全分開示之力明心體圓融包含周遍今所述心遍十方即遍意含育寶剎即包意表其於此信解無疑成大開悟矣二領勸修之旨如來復責多聞無功不逮修習逮及也述此乃見請修實為順佛之旨也二正喻須門我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入宿陸曰旅宿水曰泊春秋係王於天譯者準用指人主也迷心如常棲旅泊開心如忽賜華屋即喻上遍界含剎之心屋必得門可居心亦假門始入此方舉喻下科乃合喻而求門也三求佛指示二一普求入大之路惟願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲知來無餘涅槃本發心路蒙暗即宮墻外望畢竟也乃究竟必欲得之誓不中止也無餘涅槃者以小乘止斷四住見思尚餘五住如來權許有餘涅槃猶如化城今欲進趨五住究盡之寶所故求導師舊由之路也合前華屋正欲得門而入之矣二別求有學總持令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見別為有學而更請者正求初心方便要使具足五住無明者亦得入門也向下圓通先得人空道場方許一果蓋可見矣疇昔攀緣即無始來我法二執分別承前開示已悟知見而不能入者二執障之也故須攝伏之陀羅尼解見二卷一念總持三藏圓入之法也後文一念反聞不勞諸觀乃至寂滅現前知見即入矣四拜懇候教作是語已五體投地在會一心佇佛慈旨二如來教示一門深入分四一分門以定二義又二一欲開修路又二一標所為之機又分二一令在會者安心爾時世尊哀愍會中緣覺聲聞於菩提心未自在者佛慈雖云普為而二乘猶為當機故特舉之意兼有學非獨無學也回小向大即二乘發菩提心未自在者即不得其門而入者也二令當來者發心及為當來佛滅度後末法衆生發菩提心此衆生不獨凡外亦兼小乘與上科互影略也二明所說之法開無上乘妙修行路無上乘即一佛乘然理實一乘同教猶為有上而一乘別教方為無上妙修行路即下耳根圓通欲開修路已竟二建立義門分三一標示又為二一本其發心勤求宣示阿難及諸大衆汝等決定發菩提心於佛如來妙三摩提不生疲倦小乘原於五百由旬中路疲倦而戀止化城今如已滅化城決定進趨寶所故不復疲倦妙三摩提即趨寶所之路也二教其究心義門應當先明發覺初心二決定義即從本覺而發始覺也初心即最初起修之正念也決定者即定見定依無猶豫也二徵起云何初心二義決定三分判又分為二一決定以因同果澄濁頓入涅槃義以因同果四字便是第一決定之宗澄濁等便是此宗之趣也蓋言所以必欲因果相同者以因果不同則不能澄濁取涅槃也經文顯然可見然此一義文短而義長義長者蓋直至如來斷果究竟極證也又此雖因果雙舉而意在略明果證之遠非比小教化城之果僅齊圓之七信亦非比始教腮之果僅止圓之二行也由彼皆以生滅識心為本修因而因果不同故不能遠趨佛之常果是故先須說此第一決定也此旨妙甚分三一正令審觀又分二一令剋體審觀剋體直就因果而加研窮也又三一標本回心阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見菩薩乘者非墮三乘乃一乘之圓頓也佛知見詳現三藏科中二令審同異應當審觀因地發心與果地覺為同為異三反決必同阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處不生不滅即涅槃妙德四德中舉常為要明生滅因不可以成真常果也二令閲世例觀閲世者旁觀萬法以例推也分二一令閲世以是義故汝當照明諸器世間以因也是義者即因果須同之義也此句躡上起下照明世間者遍觀常無常品於中審察也此句略標下科方以詳教觀法也二令例觀又分為二一觀有作必壞可作之法皆從變滅阿難汝觀世間可作之法誰為不壞首句促舉諸有為法次句佛先斷定盡屬無常品類所謂如夢幻泡影也阿難下教令詳觀驗其是否也二觀無作不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故首二句借例虗空發明常品次二句更以徵釋無作為因末二句斷定畢竟不壞也此但借虗空為例意明欲求不壞因心須取無作之性不應復用生滅心也生滅即指識心無作妙性即根中圓湛不生滅性也正令審觀已竟二明所欲除科名正顯經文來意此須徵問上文所以必取無生滅性為因心者果何故耶良以衆生心海現為五濁昏擾無時清明今欲澄之以取涅槃妙德非圓湛不生滅性以為因心必不能也故此科先明所除之濁而下文乃示能除之性教其去取之法此經文之脉絡也分為二一總示五濁孤山曰今文五濁永異餘經餘經見以五利為體煩惱以五鈍為體利鈍共十使也衆生但攬見慢果報立此假名命以連持一期色心為體摧年促壽故曰命濁劫無別體但以四濁聚在其時故名劫濁今文不然蓋約五陰妄想為五濁也故下文色陰有堅固妄想受陰有虗明妄想等此說今濁猶約後文而推尚非懇切今據本文但是於圓湛見等水中投以空大等土而分亂見等不圓不湛便是濁體也又分二一剋示濁體夫心海湛然而渾濁於其中者諸大即其實體也然外五大與內四大雖均之為濁體而逼切生死障絶涅槃者惟內四大為尤甚故下科多論身中者此也又三一釋身中四大則汝身中堅相為地潤濕為水暖觸為火動搖為風堅相即骨肉之類潤等可知心海中本無此物爰自結暗為色乃至想相為身遂被此物渾濁久不能復湛也二示分隔圓明由此四纏分汝湛圓妙覺明心為視為聽為覺為察本無渾濁曰湛本無分隔曰圓下覺之與心名體雙舉也覺者心之體由圓而不隔則本有互融之妙故曰妙覺心者覺之名由湛而不渾則本有徹照之明故曰明心具此湛明圓妙是本然性一為四大所分則本然俱失但為目之視乃至意之察渾濁分隔無復湛圓之體矣覺攝鼻舌身三總六根也三結成濁標數從始入終五疊渾濁始終者按下文始於劫濁終於命濁二喻明濁相云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是倫類也留礙謂有形塊也法爾本來一定之相也不相循猶言不相干土失留礙謂形塊開散也汩字從日從水謂如水中日影昏擾不定也總示五濁已竟二別示五濁此別即前總中之別而所示諸濁與前總中亦稍不同總中但約內四大方當別中第二見濁今餘四既兼外之五大而又併約法塵生死及六根也然法塵是四大之影象生死是四大之合離六根是四大之分隔故總中獨約四大六根意已略盡別中亦外少而內多詳之分五一劫濁阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁孤山曰此濁依於色陰當知凡言濁者蓋以本然見聞覺知如湛水而內四大外五大等俱如灰沙故此中外五大以濁四性而大之與性各有影略性則舉見以影聞等大則舉空以影地等而所以獨舉見之與空者以見空各遍皆無自體而妄織之相易明也首二句即舉所依色陰蓋空是對一顯色故也空見下就見空而正是濁體有空無體者以虗空可見而不可執捉無形塊也有見無覺者以見雖遍空而無冷暖等覺受也如見空中有火而見不覺熱是也相織者如經緯密織不可分也妄成者本無二相而成此交織之妄也末二句結成濁名所以名劫濁者正以此中竝該四大山河等有成住壞空之劫也又表衆生無始自晦昧為空時便入劫濁非如常途百歲以後也舊說不明影略則性大各有所缺豈無體之空尚為渾濁而地水等熾然反非濁乎且澄濁之後則所澄之性豈獨澄見而不澄聞等所沉之濁豈獨沉空而不沉地等乎請詳味之當信然也二見濁汝身現搏四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁孤山曰此濁依於受陰湛圓中本無內四大之身相今搏四大為之故為第二重濁首二句即所依受陰搏即受也領納為身境耳見聞下正示濁體壅者障隔也留礙者滯於形也謂四性本無留礙而為四大所壅無留礙者於是而有留礙矣旋者攝為自體也四大本無覺知而為四性所旋無覺知者而有覺知矣相織妄成者一旋一壅如一經一緯密織而不可分矣亦是有知無知渾合無分便同相織耳末二句結成濁名見濁者以四大本無情之物由因妄織雖針鋒草刺咸有痛覺是以衆生堅起我見為諸見之王六十二見咸統於此是謂見濁也三煩惱濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁孤山曰此濁依於想陰首二句即所依想陰長水曰憶過去境識現在塵誦未來境性發下正示濁體蓋想陰但是所依而能依濁體更是法塵孤山曰性發知見謂能取六想容現六塵謂所取六塵之相也六想即六識妄覺也六塵即現在五塵過未法塵離塵無相者謂覺離六塵則覺無自相離覺無性者謂塵離妄覺則塵無自體二法更互相依離一泯二固未有離塵之覺亦未有離覺之塵也相織妄成者塵覺既不能離亦如經緯密織而不可分矣末二句結成濁名煩擾也惱勞也緣塵盈念無時而不勞擾故為煩惱濁矣四衆生濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名衆生濁孤山曰此濁作於行陰首二句即所依行陰指念念遷流而言知見下正示濁體然行陰亦但是所依而濁體更是生死蓋湛圓中本無生死以上三濁器界身心俱備故於遷器界續身心處遂有無邊生死知見欲留者生從順習而凡夫無不貪生也業運常遷者死從變流而凡夫無自由分也相織妄成者謂一留一遷亦如一經一緯密織而不可分矣末二句結成濁名由因此故流轉七趣變幻一切衆生之相故名衆生濁也五命濁汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁孤山曰此濁依於識陰首二句亦指所依識陰然偏指第八不取前六以根中無分別之見聞正是第八見分今濁體中同異元約根言非識也問前見濁約身似已該根豈不重復答彼約內四大為身總相而顯我見為見濁此約六根別相而顯乖背為命濁總別各旨不為重也問舊釋指於六識今不取彼豈六識於湛圓中獨不為濁乎答煩惱濁中全約識之六想方成豈塵自能成於煩惱耶然此濁必欲約識則唯約前五以第六無隔越義分屬煩惱濁中亦似略通但據後佛伸一六之妄明約六根顯體知用背之旨似甚可憑況所依既是識陰而能依又復是識是自依自恐不通也智者酌之衆塵下正示濁體隔越生異者即四大結為六根隔離見聞各不相通耳次二句躡成同異也性體相知似同而非異動用相背則又異而非同或同或異二不可定故曰失準也相織妄成者亦以一同一異如一經一緯密織而不可分也末二句結成濁名所以為命濁者只以六根結滯命托於中體用俱不自在便為命濁或以根塵攬結則為命存根塵離散則為命謝亦通通上論之妙覺明心惟一湛圓尚無內外豈有諸濁今自晦昧為空之後則外被五大器界所渾而為劫濁稍內被四大身相所渾而為見濁更內被六塵緣影所渾而為煩惱濁由是斷續身心遷流國土復被生死所渾而為衆生濁約此四相則內外通一渾濁而全失湛義又由是而衆塵結滯六根不復通融約此一相則全失圓義故欲復本湛圓須求澄濁之法是以下文方教澄濁也明所欲除已竟三去取方除上科先示所除之濁此科次示能除之法除法在於決擇去取若決擇不明而去取顛倒則濁不能除湛圓終不可復也分四一示欲頓證阿難汝今欲令見聞覺知遠契如來常樂我淨見聞覺知衆生現具六根中性即本覺也常樂我淨如來無餘涅槃即究竟覺也解現前圓具空藏科中蓋凡夫本覺湛圓雖與佛同以有衆生濁則遷流生死故失真常以有煩惱濁則法塵勞擾故失真樂以有劫濁則空界無情故失真我以有見濁命濁則根身不淨故失真淨此約別義若約通相則每於一濁俱失四德是以與佛果德逈爾懸殊今欲即以具五濁之四性而遠契如來四德以頓證極果誠為最勝之法門也二決定去取應當先擇死生根本依不生滅圓湛性成擇者揀去不用也死生根本即六處識心而經初七番破處顯發全非者也凡外權小悉取之而錯亂修習皆為因不同果今決定擇去而不用此緣佛前判二種根本時即以此心為生死根本故知然也不生滅圓湛性者即根中所具經初十番顯示二見剖瑩近具六根遠周萬法者也凡外權小悉昧之而日用不知今決取而依之茲蓋緣佛自判此性為菩提涅槃元清淨體故知然也若此則經文前後召應脉絡貫通極為妙旨舊注不達於死生根本自呼為五濁業用圓湛之性自立為三止觀門全不取於經中本有此等非惟臆說無憑仍使前之開示悉成無用豈前之開示不與此修進相干哉詳之三取以伏斷分二一法又分二一伏成因地以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心上科成字但是帶言正謂成此因地并下果地也以用也湛即取上不生滅圓湛性也約前即如來所示之見性約後即觀音所用之聞性其體本來湛然而不動按前文屈指飛光及後文擊鐘所驗不動不搖無生無滅之本性也虗妄滅生即前五濁總一生滅之妄法以湛旋之者如後文云若棄生滅守於真常常光現前根塵識心應時銷落是也五濁不過根塵識而已伏還元明覺為因地心者正表因中即本真常非同生滅為因約下合喻似是十信滿心至合喻處再當明之二斷入果地然後圓成果地修證此自初住以去至等覺為果地之修妙覺為果地之證問前云自五濁起已失四德何得復有此圓湛之性能成因果二地答五濁雖遍擾圓湛如空中華常自虗無圓湛雖被濁遍擾如太虗空不動自在人惟迷棄圓湛而反用五濁中生滅心為因終不能澄諸濁以此說失豈真失哉二喻又二一喻伏成因地如澄濁水貯於靜器靜深不動沙土自沈清水現前名為初伏客塵煩惱五濁濁於見等圓湛性中遍成虗妄滅生之相如沙土濁於清水之內遍現渾濁之形故以湛旋妄如以靜器澄水靜器即根中性也理實後文反聞自性即靜深不動也漸獲二空即沙土自沈也末二句出名合喻也𭬥李曰客塵煩惱諸經論皆說為煩惱障天台目為界內見思按小乘法初伏見思位在七賢方當圓之觀行似太卑劣今詳經意惟以進斷根本無明方說為斷見思塵沙雖斷亦只云伏故知初伏客塵應是信滿已斷二惑并伏無明者也佛語隨宜勿泥執焉且圓通文云生滅既滅寂滅現前與今所謂旋其虗妄滅生伏還元覺無生滅性語意何別乎二喻斷入果地去泥純水名為永斷根本無明前之沙土方沉泥猶未去以喻無明伏而未斷斯則去泥喻斷無明也前之清水現前以喻元覺澄而未純斯則純水喻究竟淨覺也末二句出名合喻𭬥李曰根本無明諸經論皆說為所知障智障等天台目為界外見思此亦不分塵沙無明二相今詳經文既云永斷而又云根本明是初住以去所斷別惑乃至等覺生相悉盡無餘正是如來無餘涅槃其取果豈不遠哉取以伏斷已竟四結證極果明相精純一切變現不為煩惱皆合涅槃清淨妙德明相精純者如清涼所謂富有萬德蕩無纖塵孤山曰一切變現即隨機所感十界現形也理實依舊變現器界身心乃至示居生死互融六根皆不為濁皆成妙用無礙涅槃良以昔由迷心起執人法紛然故悉成濁礙今由迷盡執空唯心所現自在無礙故無非妙德亦如泥盡水純任攪不復渾也此科全顯因果若同取果究竟非如權教因果差異中止化城也涅槃妙德即常樂我淨攝盡萬德皆合云者順行逆行左右逢源之意決定以因同果澄濁頓入涅槃義已竟二決定從根解結脫纏頓入圓通義從根解結者便是第二決定之宗脫纏等便是此宗之趣蓋言所以必欲從根解結者以不從根則不能脫纏頓入圓通也經文亦顯然可見然此一義義短而文長義短者以所說圓通似惟始入住位較前涅槃義則短也文長者以一經要義下手工夫全在此科故不但本科較前為長次下釋二疑示倫次選本根皆所以足此科之義問一大因果何故前詳後略如此答此有二意一者是初心方便故蓋初學切要所當詳知者住前功夫也不得不詳假使詳談住後功夫殊非初學切用也二者是圓頓化儀故蓋圓頓法門功夫惟在住前住後則一超直入後心此意本經後文亦甚顯著後再發明此科對前科前是顯果遠而究竟此是顯因巧而證速也以經於六根尚選圓根文云圓根與不圓根日劫相倍何況較之從識從塵而入者則豈止於日劫之倍哉故知此之法門最巧而至速矣夫果雖遠而入之遲鈍因雖速而證之淺近皆不足為勝今證之既遠而入之又速此所以為最勝法門也具眼者辨之分二一開示解結一周分三一標處指根明結又三一原其增上修心第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相佛慈利生雖急而施教須待發心所謂不憤不啓也菩提心即直深大悲之三屬願亦是果體菩薩乘即一佛乘無有二三運至寶所圓滿六度屬行方是真因按位則上句欲從初信希入初住下句欲從住後希至等覺不退轉也諸有為相即權小舊修行也蓋權小皆以生滅心為本修因故彼所證無為尚非真正何況諸行後偈云真性有為空緣生故如幻無為無起滅不實如空華是也今回權小向於實大故皆決定棄之二泛言當知結處泛言者不明指何法為處也分二一法說又分二一正令審詳妄本應當審詳煩惱根本此無始來發業潤生誰作誰受煩惱者按唯識局於心所偏於惡法根隨二十六數而已此則不然應如起信竝該界內善惡無記及權小諸愚以其俱為二死深源故均名煩惱根本暗指六根問生死根本與此何別答生死是苦果根本即是六識煩惱是苦因根本即是六根問根以起因識以起果各不相干耶答根所引生之煩惱意許總相即是六識如唯識根隨心所不過心王開出而合為一體即是心王此可類知是則煩惱既即六識當知六識為生死根本六根復為六識根本元是一貫豈不相干耶業謂現陰所造發與造不同造即煩惱成辦發謂煩惱來由生指中陰所潤即求父母時憎愛等無明也誰作誰受正令自審詳也吳興曰發業潤生者此指煩惱也誰作誰受者此推根本也意顯六根自作自受然又當知根即八識八識引起六識全是煩惱而為苦因六識拘引生死而為苦果粗論似惟六識作之而細推實是八識自作現觀似當六識受之而六壞惟是八識自受故曰自作自受但不言八識而言六根者意使衆生現前易曉解也二反顯決當知處阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位虗妄根塵攝法甚寬根即總指四大六根之肉身塵即總指偏虗空之無情器界一真清淨之全心緣此二法總成結縛然根身器界雖極廣大而的實結處至為簡要不繁決當知而後可解也詳下譬喻明白可了二喻明又分為二一同喻正明阿難汝觀世間解結之人不見所結云何知解此如以繩作結雖諸股共成結體而的實所結之處惟在一股若不真見而知之則終不能解二異喻番顯不聞虗空被汝隳裂何以故空無相形無結解故此喻顯所解六根非指根中無形性體乃指六精墮於勝浮二根之結體也以勝浮二根俱有相形能令無留礙之妙性妄成留礙也虗空無有相形是彼異喻故取以反顯根有相形有結必解也且以密顯結解惟有相形之二根即是結處矣問解結聖人豈皆灰滅二根耶答不然根雖全具而見聞十虗互融變現不被縛礙而已若此則豈惟根身不縛器界亦無留礙矣下文可了泛言當知結處已竟三確實指根是結上科注雖偷釋根義而經實未顯然說根此科方顯然指出矣分為三一直指處體則汝現前眼耳鼻舌及與身心心意根也此蓋直指六根乃是真實結處之體二出其過患六為賊媒自劫家寶賊媒者內人而引外賊者也如世外賊必賴家內奸人勾引指教方能成劫也媒喻六根無疑舊注賊喻六塵然塵雖在外而體本無情說賊非義亦於本經無據今據七徵之初佛云譬如發兵討賊要當知賊住處向下便徵心處是佛明以識心為賊也問心說外賊其義何居答識是有情賊義勝塵體即塵影說外亦通自劫家寶者根引識起顛倒分別遂將如來藏中諸大家寶悉皆劫為外之六塵乃至肉身皆不自在經云由汝認賊為子迷惑無知故有輪轉祖師云損法財滅功德莫不由他心意識是也三顯為結處由此無始衆生世界生纏縛故於器世間不能超越世界即世間別經云世間有二一者衆生世間即有情根身二者器世間即無情器界惟此二法盡一切法衆生於二遍成纏縛皆不自在總為結體然的實結處不在器界唯在六根故迷者求出三界悟者但解六根今經言由根縛故不能超世反顯根解則不惟於身自在而於器亦超得大自在如後觀音三十二應等即超越之相也標處指根明結已竟二備顯六根數量上科大要方以指出根是結處而行人已知解結必從於根然根乃有六解惟從一不可不擇欲擇當須通達六根數量不知數量憑何選擇此科所以顯數量也分為二一統論本所數量本所數量則無優劣不可選擇然必先陳此科者有二意一者明數量緣起由於世界相涉二者顯原用本無優劣而優劣生於隨方之業力而已分為五科一躡前徵起阿難云何名為衆生世界觀此徵詞當知所說世界但約根身非干器界至下再明二正釋世界三一釋名世為遷流界為方位世屬於時故以遷流不住為義界屬於處故以方位定在為義二指體汝今當知東西南北東南西南東北西北上下為界過去未來現在為世此界世皆約身中而言問世無可議界似不通器界不動可說東西等定位身常轉移何有定方答此有二說一者假借謂借器界東西等以明身中東西等也此則在身惟左右前後等如溫陵所解是矣二者就實謂身外可見轉移身中豈覺轉移如世界非真不動當亦有轉動時雜華明世界游行往來過百千萬世界而世界中人但見不動不移豈能覺哉當知身中亦有定位界外亦見轉移何用情計乎三結數方位有十流數有三正釋世界已竟三明其相涉一切衆生織妄相成身中貿遷世界相涉首二句泛論諸法蓋言理中本無衆生迷而後有一切衆生皆由諸妄交織而成下二句方以確指世界身中二字足顯惟屬根身貿者有無交易也遷者彼此互到也如世行商貿遷諸貨也相涉者即交織不離之義下文自明言此世界相涉乃織妄相成中之一法耳夫織妄貿遷相涉皆同一意但上通而下局焉織妄舊局根塵非也四勒成數量分二一去留界數世數惟三而界數有十不將界數去留成四不能與世涉成十二也又分為二一去六留四而此界性設雖十方定位可明世間只目東西南北二明其所以上下無位中無定方則師云上下無位者指著上下皆是四方之上下也除此別無上下故曰無位中無定方者謂四隅之中也隅以兩方交接而得名既一隅而屬兩方故曰無定方也當結云因此所以界數惟四也二正勒涉數分二一涉成本數四數必明與世相涉三四四三宛轉十二此為疊數之本故曰本數三疊成滿數流變三疊一十百千流者自一重流至三重也變者變少為多也吳興曰一十百千者通舉增數之法耳謂增一為十增十為百等今且以方涉世明三疊者第一約四方各論三世共成十二也第二於東方三世變一為十成三十南西北方亦復如是四方各三十成一百二十也第三於東方三十變十為百成三百三方亦爾四方各三百成千二百也以世涉方其例可解五總括始終總括始終六根之中各各功德有千二百此中德字義當活看乃是用字能字之意蓋六根中三世四方即唯識色心假分位法名不相應行全依根中色心而立故六根之功用功能皆於自體所具三世四方無不圓滿自少增多顯其圓滿而已似不必強配法相以傷穿鑿況古德言西天傳來三疊注釋亦止增數而已如上嶽師所解也且此意但是欲令選根不得不明數量非是正修行處而修行正意惟在耳根圓通長水剋意深釋畫圖示人乃謂修行意惟在此是雖別有理據而不知遮晦本修正意智者不應惑之可也又此千二百數但是統論凡夫所具未局此方故言各滿非即真性勝用且如下言此方衆生耳舌意現滿千二亦但比餘根稍圓而已豈即遍周法界如佛所證耶故知稱真聖人六根功德數當無量溫陵謂此但權依世論六解一忘則何數量可及斯為知言矣統論本所數量已竟二揀別隨方數量此科是獨就娑婆而揀若依上科則不可揀別今因諸方互有優劣而娑婆三優三劣仍可獨推一根最優故須揀別分為二一總令克定阿難汝復於中克定優劣二別示具缺具則千二缺則八百分六一眼根缺如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德則師云若一方三百前與左右合成九百義不通也當知四方各二百四隅四百今眼所見前及左右三方已成六百并前二隅二百共成八百惟後方二百及後二隅二百不見故云三分之二也二耳根具如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德有聲為動若者相似非實之辭邇近也動若邇遙者如世人聞聲必知遠近也就實而論如前經云觀聽與聲俱無處所則邇遙亦屬情執非實故曰若也靜無邊際者如世人聞無聲之靜豈能度其遠近夫圓聽十方聞靜無際斯根所以最優也三鼻根缺如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻惟八百功德闕於中交者如調適之息出盡少停後乃方入於少停時所謂缺中交也冬月驗之可見息既有缺功豈能全溫陵曰出能取香入能聞香出入之中無能故闕中交長水曰出入中交共成三分一分四百闕於中交故惟八百而已矣四舌根具如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德孤山曰取能言說不論嘗味若取嘗味其功則劣以合中知故問宣揚二智智者能之愚者不能有能不能豈皆千二答愚者之言雖無出世之智而世間之智則有之況下文云言有方分者詞或局也理無窮盡者義遍通也約此則世諦語言至粗淺者皆通至理如祖師聞淫詞而悟道出世智也孔子聽孺歌而警心世間智也若是則愚者之言亦具二智圓滿功德何所差別乎五身根缺如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身惟八百功德孤山曰離一合雙者離中不知是缺一分合時能覺有違有順故具二分六意根具如意默容十方三世一切世間出世間法惟聖與凡無不包容盡其涯際當知意根圓滿一千二百功德默容者異前宣揚也彼是能議此是能思問約通達一切法者則能包容盡際而未通達者無有此能何均千二答意根本具此能而愚者不能引發非意根之罪也譬如剛刃本能解斷而拙工不能磨礪非刃之罪也今但約其本具故說一切圓滿備顯六根數量竟三教其悟圓入一上二科先以指根為結處備示優劣而已此科方以令其自悟最圓之根但從一門修證也故知此科更是下手切要處也分二一合驗六悟圓又分為三一本其欲證無生阿難汝今欲逆生死欲流返窮流根至不生滅逆者不順其流也欲即五塵即名五欲雖意所獨緣者亦但五塵之影此蓋六根流逸奔塵而成無邊生死是謂順生死流旋根脫塵逆之而不順之也返窮流根者謂從淺至深務令生死源竭也其實六根既為煩惱根本即是生死深源至無生滅者妄窮真現證極真寂滅理也按後觀音圓通入流忘所等即逆生死流聞所聞盡等即返窮流根寂滅現前即至無生滅二令其驗六推詳當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿領納塵境為受發作功能為用六根皆具此二故曰六受用根諸誰字正是令其推詳也合謂合中知離謂離中知近性為深遠性為淺通滿一意用具為圓通用缺為不圓滿也今詳六根眼耳為離知鼻舌身三為合知意雖多離而五俱意中鼻舌身三亦屬合知是則兼合而非純離也耳意所緣靜滅為近性謂初旋耳根即捨動入靜靜絶暄亂故近性也才旋意根則離生入滅滅無生起亦近性也眼鼻舌身所緣暗塞淡離為遠性以暗則不明塞則不通淡則無味離則不覺皆於性靈遠不相似也圓缺經文顯然三顯示圓通勝進若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍此科結處雖顯勝進而初文實欲其自悟決擇一根而修也上科本令其於六義中推詳謂離合淺深圓缺也而今但云悟圓者語略也蓋選根取離深圓而捨合淺缺今以六義推驗則隱然惟耳根全當其選也良以眼雖同為離知而深圓不及也舌雖同其圓滿而離深不及也意雖同其深圓而純離不及也然則離知近性圓滿三義具全者惟耳根而已故此文義當補云若悟離深圓根云云乃至得循離深圓通與不離不深不圓之根日劫相倍其義方全但佛語影略文雖省而意則具最宜知之後偈云初心入正定遲速不同倫即日劫相倍之意也織妄業流即塵欲交結流生死也二令入一解六上科重一悟字義含信解此科重一入字文兼修證先須信解一最圓之根然後從一根修進證入所謂信解行證因果相應事略周也分四一舉前數量我今備顯六湛圓明本所功德數量如是湛圓明即第一決定中圓湛不生滅性足顯前指根中之性無疑也本所二字明衆生現今本具箇箇皆同非由修行造作而然意實雙兼統論與揀別二科之意皆本所數量也二令其擇修隨汝詳擇其可入者吾當發明令汝增進問悟擇何分答朗然無疑謂之悟決定取用謂之擇然但不與說破何根且先令其自悟自擇發明即與其說增進之漸次也增進者即漸次修行功夫矣故此科合下科屬修三出擇一由又分二一十方統論則無擇十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣此即如偈云聖性無不通順逆皆方便也雖說如來實談本修因時最初方便但因統論十方則隨方之機千差萬別故諸門皆可入證無優劣也然文雖局界而七大實亦兼該矣問後偈云十方薄伽梵一路涅槃門指耳根也此何通之答彼雖亦云十方蓋取觀音一類之機以觀音同機亦遍十方三界故也今此十方更是統論不局一類之機故有多門矣二此方就機故須擇但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入下劣謂具足煩惱四住尚紆圓自在慧則備達法門頭頭可入無復遲速之殊者也此實深位方能非初心入正定者可能也故我下正以結明擇一之由矣問觀音豈亦下劣之類答約今現位雖是如來而本其初心亦從博地且最初方便雖諸佛亦皆各隨一方之機入一而已豈止觀音乎又阿難入一之後則一入一切入而圓自在慧當亦現前豈終於下劣哉出擇一由已竟四一入六解入一無妄彼六知根一時清淨此科屬證令一門而入者即從一根而解也恐阿難疑其但解一根餘根尚縛故結示以一解一切解也按後圓通則當以聞所聞盡為入一無妄然一根返元則六根解脫由是而見所見盡乃至知所知盡即六根一時同淨也夫上來六義推驗耳根既已密示且由悟而修由修而證則解結功夫大槩已略周矣開示解結一周已竟二因問重申委悉此問不同後疑蓋疑為信之不及而辨定是非問為解之不徹而請益開示故佛下答但是足前示而更加詳明與之增解非與之斷疑也分二一阿難躡前發問阿難白佛言世尊云何逆流深入一門能令六根一時清淨此問但從悟圓入一科中而來且於悟圓科中但問前半如何是流如何逆之於入一科中但問後半如何惟令入一如何便能解六的明此之問意方了後之答文二如來就問重申重申者不出前義但以加詳之謂也又分四一申惑執尚深此科一則出其不能頓了之故二則明其欲流尚在決當逆之而方可至無生滅也又分二一直明我執未盡佛告阿難汝今已得須陀洹果已滅三界衆生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得須陀還小乘初果也此云預流謂小乘從賢入聖至一果方預聖流也金剛經佛自釋云須陀還名為入流而實無所入以不入色聲香味觸法名須陀還按此既出金言而復與此經孚合之甚宜惟取此良以不入六塵即逆生死欲流也三界衆生世間者以四住見思皆界內所斷非已出世間者所斷也孤山曰見諦所斷之惑即八十八使也修道所斷之惑即八十一思也見謂見道位中蓋小乘初果屬見道位初果方斷我執分別而分別曰見故此亦名見惑即十使對三界四諦所疊八十八數此是阿難初果已滅者也根中虗習即是思惑所謂我執俱生也根即第八賴耶識以相宗呼此識為根本依積生若釋為多生則似與無始相重今釋積為種子生為現行虗習為習氣即四使對三界九地所疊八十一數也又當知根亦即是六根但相宗唯目八法所成故屬無情色法此經直指根中六精心體故即賴耶是以後文觀音圓通根盡即當七信四果也要因修斷者屬小乘修道位中所斷也小乘以二三果屬修道位方斷思惑阿難未入修位故猶未知所斷也二況顯法執全在何況此中生住異滅分劑頭數此中仍指根中以離賴耶諸惑無依也孤山曰生住異滅即同體無明也分劑頭數謂初住以上至於妙覺四十二品也同體無明總攝法執中分別俱生微細之惑所謂塵沙無明合為一住天台目為界外見思是也按起信論三細中之業相是生相三細之後二六粗之前二為住相六粗之三四為異相第五為滅相而第六不與焉疏釋四相義以最初心動為生以法執堅住為住以內外人我為異以周盡終極為滅此約順流之相若約逆斷推人則十信覺於滅相二乘三賢覺於異相天台判圓七信齊於小乘極果此與三賢配之恐非圓教三賢而前言十信亦似別十信也再俟考之初地至九地覺於住相十方乃至如來覺於生相理實如來方於生相現量親見而法雲地但是此相中發覺初心耳故知此之四相蓋取順流中從微至著逆斷時自淺之深通該五住以立非取一剎那所具四相也分劑頭數者明數量極多非二乘所測之境也良以粗分四十二品細分則應無量矣此科大意答前汝問如何是流即汝未斷之思惑及塵沙無明別惑是乃欲流尚在所當逆斷者矣申惑執尚深已竟二申一六由妄此答問中後二義如何惟令入一如何便能解六為答此問故說此科又曲分為六科一雙以徵起今汝且觀現前六根為一為六二別破二計二一破計一阿難若言一者耳何不見目何不聞頭奚不履足奚無語既言體一即當用通則計之為定一者真妄計非實也二破計六若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承若言體六即當用不相隨今既相隨則計之為定六者亦妄計也三承明上義是故應知非一終六非六終一終不汝根元一元六非一二句開說非一終六則一不可定也非六終一則六不可定也且非一兩字斷定之辭終六者即用不相通之意此二字釋上非一之故言由用不相通所以決定非一也非六兩字亦斷定之辭終一者即用乃相隨之意此二字釋上非六之故言由用乃相隨所以決定非六也末二句結定雙非以竝遣一六之惑切不可更添雙亦以成矯亂之過也四推原由妄阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生此根既非六而又非一衆生惑之為六為一者果何故哉推究而言根之本體元非一六由無始來云云顛倒即惑業當論中三細五粗淪替即苦果當論中第六粗也圓則用具而本非一湛則體一而本非六也一六義生者謂博地凡夫執之為六淺解學者執之為一而曾不達圓而非一湛而非六之本真復何一六之可得哉五判示當機汝須陀洹雖得六銷猶未亡一約孤山所引金剛經不入色聲香味觸法此但六塵消歇然根以了塵為用塵既不入則根之六用已即不行又此但說用之不行非即體盡四果方能體盡按後觀音圓通動靜不生即此六銷聞所聞盡方當體盡猶未忘一者約孤山釋為執有涅槃不差然不止初果四果亦然以彼道成盡晦六用為灰斷涅槃故也此正所謂淺解學者執之為一也然所以說此者以凡夫執六人皆知之二乘執一人或未達故此判屬示之以見與凡夫執六者同一妄而非真耳六更以喻明二一舉喻又三一從一成六喻如太虗空參合羣器由器形異名之異空虗空喻圓湛之性羣器喻六根之相器異者方圓長短等也然器異本無干於虗空因參合而遂謂虗空有異者誠妄也二除六說一喻除器觀空說空為一器未參合之先無故而豈說空一今因除器而後說一斯亦對待妄立非本真也三真體無干喻彼太虗空云何為汝成同不同何況更名是一非一首二句破正計也因參器而說空為不同不同即異也因除器而說空為同同即一也此但徒有言說而虗空豈為汝之言說而真成同與不同哉此已將上一異雙遣也末二句防轉計也更略一層蓋上文因破異而復立為一故一異己竝遣矣今恐因破一而復立非一故此復加何況更名所以重將一與非一復竝遣之舉喻已竟二合法則汝了知六受用根亦復如是此須將喻中三科一一合之初合從一成六喻云彼圓湛性結滯六根由根六而遂謂性六殊不知根六本無干於圓湛因結滯而遂謂性六者固妄計也次合除六說一喻云銷六根而立性為一殊不知根未結滯之先無故而豈說性一今因銷根而後立一斯亦對待妄立非本真也末合真體無干喻亦作兩節先合破正計云因結根而說性為六銷根而說性為一此亦徒言說而圓湛豈為汝之言說真成一六之殊哉此已將上一六竝遣也末合防轉計云因銷六而立一一六固已墮於俱妄矣何況因破一而更名非一則一與非一喻妄無已也意恐破二乘涅槃之後而復有人計非涅槃故重遣也然此根性一六俱妄何殊虗空之與器形乎故曰亦復如是此科大意答前問云由此根性本無一六所以一解而六即消也申一六由妄已竟三申根結由塵此科仍同首科答如何是流之問而流相益加顯明也分為二科一別明又分為六一攬色成眼由明暗等二種相形於妙圓中粘湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色首四句初成見精上二句單舉塵相相形者互顯也下二句正成見精妙圓指性妙亦湛也粘染著也粘湛發見且言湛性被粘而初發妄見根未結也中四句次成勝義根也上二句表成勝義見精承上而言即粘湛發見之見精所映之色即明暗等所成之根即內四大勝義根也根成則是顛倒從塵有見矣下二句檢異浮塵根元者表其為浮塵根之本也目為清淨四大者明其雖屬四大而其相最為微細聖目天眼方能見之凡夫莫覩非浮根所能比也末四句後成浮塵根也上二句定名示相因名眼體者因有勝義根為之本元方成眼體如蒲萄朵者粗相顯著凡夫共見也此二句或可屬上勝義既曰聖等可見非無相狀故表其如葡萄令不見者知也若是則體者謂能見之實體也下放此下二句檢異示流浮根者明其為粗浮之根檢異勝義也四塵指其體也即色香味觸二根雖粗細有異要皆以能成地水火風所成色香味觸八法為體今於勝義說四大浮塵說四塵者就名而互影也流逸奔色者是乃聚見於眼顛倒從塵發見循色流轉惟以色為所緣之境二根分屬全依擕李而但變其文耳下五根大意準此類推之二攬聲成耳由動靜等二種相擊於妙圓中粘湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲相擊者互不相容也卷包攬也與結意同奔聲即循聲流轉也餘竝準上三攬香成鼻由通塞等二種相發於妙圓中粘湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香相發者互相引起也納吸取也四攬味成舌由恬變等二種相參於妙圓中粘湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味恬即是淡無味之味也變即五味之總有味之味也以無味有味相對而成兩端耳參雜和也旋取曰絞五攬觸成身由離合等二種相摩於妙圓中粘湛發覺覺精映觸摶觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸摩際交也摶攬取也腰鼓俗名杖鼓顙腔也細腰而以革瞞其兩頭狀似人身六攬法成意由生滅等二種相續於妙圓中粘湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法不云意體而言意思者以意之浮根即肉團心孤山所引正法念經狀如蓮華開合是也然在於身中人不可見故用思字以明有思量處即意根所在也如幽室見者檢非日中所見以前五根對塵實體共見明了如日中之見意根對塵獨影自見隱暗如幽室見物也此亦但狀其知體非象其浮根也形擊結卷等字但是變文無大差殊不必過於分析別明已竟二總結阿難如是六根由彼覺明有明明覺失彼精了粘妄發光孤山曰由彼覺明真明也有明明覺妄明也迷彼真明故云失彼精了成此妄明故云粘妄發光此雖推重無明再研經意惟重粘妄二字即染著於塵之謂也粘妄發光即先見精等初成然後攬塵以結諸根此染塵為成根之本是以下科一忘塵而結自開也三申根結由塵已竟四申塵忘結盡此答問中第二意如何逆之斯正教以逆之之法所謂下手功夫也良以奔塵既即為流而忘塵豈不是逆乎分二一正申解結以酬問又二一統論離塵無結是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安奇此猶泛論離十二塵元無六根結體非正教脫塵之功功在下科無有見體者無聚見於眼結滯為根之妄體也非是并其照用自在之常體而俱斷滅也餘五準此此處看得明白下文方知阿難為謬解妄辨此若不了下文徒信佛語而阿難之難終不能解也二正教脫一盡五此中方是教以脫盡功夫分三一離塵汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相不循即是旋根不復奔塵功夫此以耳身舌鼻意眼為序者佛言隨便自在無他意也有為屬生滅法十二塵相皆生滅法故云諸有為相也夫一大功夫惟在不循二字所謂簡則易能真圓頓上乘也但學者珍重而勿輕忽方能得其力矣二脫一隨拔一根脫粘內伏伏歸元真發本明耀首句言非是教汝六根齊拔但當選一圓根旋倒逆流以拔之此與後觀音意同脫粘即是忘塵內伏即是盡根伏歸元真即是歸一精明發本明耀即是心光融泄矣三盡五耀性發明諸餘五粘應拔圓脫此即一根若返元六根成解脫所以答前入一門而六根一時清淨之問也正伸解結以酬問已竟二兼成二妙以證驗前科已盡正答此復明其勝妙令其決定趨進也伏問意云未審六根淨後有何利益故復答此然亦因如來初開義門元為哀憫二乘於菩提心未得自在故此明解根之後當得大自在也又前科屬修門此科屬證門以二妙即所證圓通境界爾分二一情界脫纏成互用妙情界即正報根身衆生世界也前文佛云由此無始衆生世界生纏縛故故此先明情界脫纏也又二一先以示妙不由前塵所起知見明不循根寄根明發由是六根互相為用首二句外不由塵也知見舉意眼而該餘四也由塵起見者如眼因空明而後見等今心光遍照則塞不能礙暗不能昏豈假外緣所謂不由前塵起知見也次二句內不循根也明不循根者照用遍周不用勝浮二根也寄者權假之意寄根明發者但權假二根示為照明之相而實不全由也故佛菩薩之視不俯仰不回轉蓋由不全用根故也設隨世相亦權假表法非真也末二句結成互用妙也由是者因此外不由塵內不循根根塵雙脫之故方成此妙也互用者如眼能聽耳亦能見之類是也良以心光既遍六用皆周故六門互通理之自然矣孤山所謂似如法華真如華嚴者當取於真蓋此妙由於無漏性發非同法華尚假果報之力故也斯於衆生世界無復縛礙而內之根身既已得大自在矣二證不循根阿難汝豈不知今此會中阿那律陀無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念此恐凡小久執六用必循於根驟聞明不循根疑而不信故引此證之令其信極也孤山曰殑伽河名此云天堂來以其自雪山頂無熱惱池流出故也溫陵曰驕梵受牛哨報故曰異舌舜若多神主空神也其質如風而能覺觸空神多劫以無身為苦如來放拔苦光映令暫現身觸則樂不可言然則纏空外道當知警矣溫陵曰修滅盡定得寂聲聞意根斯滅如大迦葉雖滅意根而能了知孤山曰那律等六人或是凡夫業報或是小聖修得斯皆妄力尚不依根何況圓脫豈無互用情界脫纏成互用妙已竟二器界超越成純覺妙前文佛云於器世間不能超越故此後明器界超越也分二一先以示妙阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷冰應念化成無上知覺言有次第理實諸根圓拔則二妙齊臻故此首二句重牒起也內瑩發光者心光融鎔洞徹表裏也浮塵畢竟虗法也器世間似有體法也諸變化相總該山河萬物染淨苦樂等相也前於奢摩他中但方了妄即真此則親證實到故無情滯相為心光所鎔還本覺體所以如湯銷冰應念成覺也夫山河大地既皆自心純覺之體則番苦作樂變穢為珍乃至大小互融一多不礙無所不可如後觀音三十二應等得大自在也是知六根未解非惟器界不得自在雖根身亦不得自在六根既解非惟根身得大自在雖器界亦得自在矣此學者但當解根無勞出界也二驗不藉緣此恐凡小過慮圓妙未發先銷根塵萬一根塵既已雙失而圓妙又或不發豈不落空故此驗以示之令其進銷勿畏也然由不循根為根身自在之本故前證不循根由不藉緣是器界自在之本故今驗不藉緣又分為二一即事以驗即目前之事驗之令易省解也又三一用肉眼局量阿難如彼世人聚見於眼聚見於眼者謂見性本周法界顛倒故但聚於眼離眼別無也二令合成暗相若令急合暗相現前六根黯然頭足相類此中依吳興下文作合眼者循繞他人之體則此六根二句即當指合眼者所對之他人方通然譯文闕略仍當補云正合眼時設復有人當其前立則六根莫辨手足何分乎三驗暗中知覺彼人以手循體外繞彼雖不見頭足一辨知覺是同吳興曰彼人即指合眼之人循體謂繞他人之體知覺是同言暗中知覺與明中所見不殊即事以驗竟二明不籍緣緣見因明暗成無見不明自發則諸暗相永不能昏緣見因明者緣塵之見尋常必因於明也暗成無見者即合成暗相科也不明自發者即暗中知覺科也末二句斷定滅緣決不礙見也三決成圓通根塵既銷云何覺明不成圓妙根塵銷落諸緣滅盡也承上滅緣既不礙見則根塵銷而豈不決發圓通乎圓妙即圓通乃根身器界大自在之境也通前開示重申二科則解根下手功夫略已發盡但未說出一門的指何根而已學者宜當反覆潛玩則圓通修證思過半矣又通前二義論之前一義為略示因果全功令懸知究竟極果後一義為詳示初心方便令切曉下手功夫爾分門以定二義已竟二證驗以釋二疑前二義正與說示修門此下諸科皆因辨問而與之除疑增解本科正當除疑而疑則有二就分為二一驗釋根性斷滅疑此疑從前第二義門統論離塵無結科中而來又分二一阿難錯解佛語以謬難佛謂離塵無有結體阿難誤謂離塵全滅性體故謬起斯難也又分為三科一因果相違三一按定如來教旨阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應第一義門反決必同科中文云若於因地以生滅心為本修因而求佛乘不生不滅無有是處阿難所按蓋按斯文也名目相應者要因果二地覺心同一常住然後可爾二引果較量今因又二一引果明常又二一備引七果世尊如來位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智七果皆取如來究竟證極不取在纏理具者也菩提取萬德莊嚴號無上者涅槃取五住淨盡號無餘者與夫究竟真如證得佛性離垢白識出纏空藏轉識鏡智皆果位所有非因位能共者也菴摩羅此云無垢與大圓鏡智皆轉第八所成皆同照萬法故規矩云大圓無垢同時發普照十方塵剎中但圓照萬法而無分別處名鏡智分別一切而無染著處名淨識故楞伽經云分別是識無分別是智此因二名對舉暫以分屬如此非謂是智皆無分別是識皆有分別良以識有無記為性者智有分別為體者也問此二何異前之智果答彼乃一切種智三諦圓照此二多照俗諦是其差別也二總結真常是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞斷盡無明曰清淨具足性德曰圓滿不可破曰堅不可動曰凝金剛王即常釋寶而金剛經釋有堅利二義今獨取堅義以合常住不壞蓋七果皆一成永成無復變也二說因為斷又二一疑因斷滅若此見聽離於明暗動靜通塞畢竟無體根惟略舉前二塵乃略舉前六以該其餘總言根之離塵無體也領前統論離塵無結科而謬疑爾二疑同妄心猶如念心離於前塵本無所有念心即六處識心領前最初三番破心中第三名其無體意也言佛前破識心離塵無體今此六根亦離塵無體豈不同於彼心乎二謬疑因果相違云何將此畢竟斷滅以為修因欲獲如來七常住果言既離塵無體則是畢竟斷滅之法然佛既言生滅為因不可獲常住之果以其不相應也今何以斷滅因而修七常住果乎因果相違已竟二後先異說即自語相違也分三一據今現說斷滅又三一貶根同識世尊若離明暗見畢竟空如無前塵念自性滅此單舉眼根例該餘五然此科亦但牒前說因為斷中文首二句迭疑因斷滅科也次二句迭疑同妄心科也言此根性與前佛所破之識心何所差別乎二正疑斷滅進退循環微細推求本無我心及我心所進退者前後反覆也循環者周而復始也微細者檢異粗心也無我心者無心體也無我心所者無心處也同前最初破心無體破心無處矣心所非謂相應法也據此科意全將根性疑同識心無體亦無處也三懼難剋果將誰立因求無上覺真因方可尅果今因尚斷滅其誰成果乎此亦全領最初破心文中佛言塵非常住若變滅時則汝法身應同斷滅其誰修證無生法忍大抵既惑根性全同識心則全將前破識之意而轉以破根矣據今現說斷滅已竟二考前多許真常如來先說湛精圓常上科據如來今說根性是其斷滅此科考如來先說根性多許其湛精圓常若作四義澄清不動曰湛靈明不昧曰精充滿法界曰圓體恆不滅曰常或以湛精即指六精則但以圓常為二義亦可此科總取前十番示見義故曰如先說也示見十義圓常二字收之殆盡不動不滅不失不還皆常義也不雜不礙不分乃至不偏因緣自然皆圓義也三謬疑自語相違違越誠言終成戲論云何如來真實語者先說根性圓常後說根性斷滅故曰違言成戲也戲論如矯亂之語也云何二句明其不得為聖語稱理曰真不虗曰實三更求開示惟垂大慈開我蒙吝蒙謂根暗而不了佛言吝謂疑滯而不果進領也阿難錯解佛語以謬難已竟二如來即事驗常以釋疑即目前之事驗根性果常以釋之分四一許以除疑又二一責徒聞未識佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識首二句以其務多聞而不暇盡漏見多聞功專也非責其不盡漏也顛倒即錯誤之惑也徒知顛倒所因者徒知顛倒為諸妄所因也真倒未識者蓋多聞之人徒記顛倒名字亦知諸妄皆因顛倒而實不知何為真實顛倒亦如說藥人而實未見真藥者也及至真倒現前實未能識亦如真藥現前實未能辨也二許即事除疑恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑首二句言我若不設方便直說根性為常恐汝云云末三句正許設為方便而與之除疑蓋擊鐘引夢皆塵俗易曉之事故也二擊鐘驗常分四一兩番問答又二一問聞答聞謂問聞之有無即以聞之有無為答也又二一三次致審就分三一先審有聞即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大衆俱言我聞今我俱作有字方妙二次審無聞鐘歇無聲佛又問言汝今聞不阿難大衆俱言不聞今仍作有不聞宜作無聞三復審有聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大衆又言俱聞今字同前俱亦作有夫審有審無似乎兩次足矣何用第三復審蓋此復審甚有關要至下申正義處必用此三臨文再為指出二重與確定佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絶則名無聞不仍作無音即本聲響乃虗谷應聲之影也此之確定要令衆等親口自言或有或無但惟是聲無關於聞也問聞答聞已竟二問聲答聲謂問聲有無即以聲之有無為答也分二一三次致審就分為三一先審有聲如來又敕羅睺擊鐘問阿難言汝今聲不阿難大衆俱言有聲汝今二字不如今有二字為妙二次審無聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲此與下科爾今俱應作今有讀之三復審有聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大衆俱言有聲少選有頃皆言少時也關要同前二重與確定佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絶則名無聲首句不如只言云何有聲此與上文數字譯文傷巧故皆換字代讀義自顯現蓋變文圖巧不如顯義為高也兩番問答已竟二責其矯亂分二一直責矯亂佛語阿難及諸大衆汝今云何自語矯亂二因問勘定大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲惟聞與聲報答無定如是云何不名矯亂聲聞報答無定即真矯亂而凡小素無智眼混濫無分隨口而應殊不自覺故激責令問因問與說也蓋聲聞雖以雙審有無只歸一邊今乃二俱隨應真混濫矯亂之答也理實只當答聲有無豈可混答聞之有無哉三破申正義聲有生滅聞乃常存是其正義審之不悟故與申明而破其誤執之深惑也分二一先破滅無之見又二一取更擊以驗未滅阿難聲銷無響汝說無聞若實無聞聞性已滅同于枯木鐘聲更擊汝云何知此中方顯若無第二聲之擊竝無第三次之審則此破何所施乎故曰第三之審甚為關要也鐘聲更擊汝云何知者言聞既隨聲已滅更擊應當不聞今更擊仍聞豈云隨滅而遂言無聞乎知字即第三次所審知有之知也二取知無以驗不無知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者首句迭表生滅惟聲也言知有知無者謂所知之有及與所知之無也故惟重有無二字不重知字次三句迭表有無不關於聞性也豈彼聞性為汝有無者言豈是聞性因聲之有無而亦為汝成有成無哉此皆迭申正義而破意全在末二句聞實云無者縱詞也言若果隨於聲盡即無也誰知無者奪詞也言我第二次審汝復將何性知其為無聲乎此科之破恐彼承前破而轉辨之曰初擊既久揣知聲滅而聞亦隨滅及其再擊不妨聲生而聞亦隨生故即用此科末二句義以破之云若實聲滅而聞亦隨滅即應聲無而不知無聲然則汝當次審是誰知其無聲乎先破滅無之見已竟二後申真常正義是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無此方剖決斷定生滅與不生滅者文似重前而此實更有交互之意不同前文首二句聲於聞中實有生滅也末四句聞於聲中實不隨生滅也非為汝當另讀聞字連下句讀之言非為汝聞聲之生滅即令汝聞性亦或有而或無也破申正義已竟四責迷戒謬汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性首四句責迷也意謂斷常縱使難定根塵宜當易分今惑聲為聞尚於易分者而不能分何怪以根中之常性而惑為斷滅此固於難定者益不能定也理實凡小不能決定信根性為常住者病根在於根塵混濫而粗心未能斟別故佛擊鐘詳審發其混濫然後與申明之最為妙示也末四句戒其止謬辨也加閉塞開通者似明浮塵根亦與聞性無干也擊鐘驗常已竟二引夢驗常前阿難領佛離動離靜元無聽質之旨而起根性斷滅之疑今擊鐘之示有聲驗之於動無聲驗之於靜而實未及動靜雙離以驗之故此再引睡中雙離動靜時以驗也分為二一驗夢不昧分四一夢外實境如重睡人眠熟床枕其家有人於彼睡時搗練舂米輕睡者有聲即醒不成斯喻故惟取於重睡眠熟者睡濃時也搗練砧聲也舂米碓聲也或二事竝作亦可耳二夢中誤認其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘睡中昏識境多顛倒聞外聲而誤作別音此其常事或鐘或鼓二俱雙取亦可以後文互影故也三分別不昧即於夢時自怪其鐘為木石響此但取聞聲即為根性不昧不論其誤與不誤也夢中分明見其撞鐘其聲實是杵音故於夢中怪此鐘聲響同乎木石矣四寤時述誤於時忽寤遄知杵音自告家人我正夢時或此舂音將為鼓響夢中怪鐘醒時說鼓互影略也驗夢不昧已竟二決定性常承此決定根性為常住也二一即離塵不昧阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏搖即動也靜搖即動靜二塵也復加開閉通塞者兼肉耳也言此夢中豈惟動靜雙離兼亦根塵竝捨其實睡中之人舉身皆忘豈猶記肉耳之開閉通塞汝疑動靜雙離根性斷滅即當此之睡人動靜根塵俱忘之時全應無覺也今乃猶能分別杵音則聞性離塵不滅宛有明驗矣復何疑哉二知形銷不昧縱汝形銷命光遷謝此性云何為汝銷滅此猶更進一步令知非惟睡中不昧即當因此并信死後亦不昧也云何為汝銷滅者言豈為汝形之銷滅而聞性亦與之俱滅乎此處阿難仍當更有一問問云既此根性動靜無關生死不礙如來何言離動離靜元無聽質乎如來應答云我言離塵無聽質者為無聚聞於耳結滯為根之聽質也此質若忘則遍周法界之聞性方以全彰豈令番成斷滅乎此方明出元無聽質之故顯其自是阿難謬解非佛自語相違也不然則佛前言離塵無質後言離塵有體終無以解自語相違之難矣故此問答理應有之而經文缺者秪由阿難承擊鐘引夢之巧示親覺根性常住自悟前難為謬不復重徵以致後之學者多不知元無聽質者指於何質也此意從來人所未覺補明甚有關係智者詳之吳興曰前阿難通疑六根塵離無體如來所以別顯聞性為常誠欲發耳根圓通之機也故後偈云聲無亦無滅聲有亦非生乃至縱令在夢想不為不思無皆取於此也引夢驗常已竟四申迷教守前但發明正解此科警勸專修分二一普申迷常故墮無常又二一明逐妄迷真以諸衆生從無始來循諸色聲逐念流轉曾不開悟性淨妙常循諸二句逐妄也統言循塵流轉略舉色聲以該攝餘一切塵也末二句迷真也不悟根中之性淨而不染妙而不縛常住而無生滅也二結無常流轉不循所常逐諸生滅由是生生雜染流轉上科逐念流轉而不開悟但屬於惑此中不循所常者即不守根中所具常性逐諸生滅者流逸奔塵造諸塵業也生生流轉者乃指六趣遷流苦果無盡也而惑業苦三具足無缺矣迷常故墮無常竟二教令守常必成正覺上警無邊生死但因迷常不知所循此故勸以守常必成究竟也守即循也分為三一正教守常若棄生滅守於真常上句不逐妄也即不奔諸塵下句惟守真也即旋根反照所謂脫粘內伏也理實即後圓通入流忘所功夫耳二六解一忘又分為二一常光現而六解常光現前根塵識心應時銷落首句即伏歸元真發本明曜也末二句正六解之相據文則十八界俱已竝銷理實盡根而餘自盡矣即前所謂耀性發明諸餘五粘應拔圓脫矣按後圓通應齊聞所聞盡二緣影盡而一忘想相為塵識情為垢二俱遠離則汝法眼應時清明此中塵垢非指粗者良以上科根塵識心悉以銷盡故也今言到銷落之後心中純想湛一之體即所想湛一之相更是一種最細難除之塵識情亦非粗識即對此湛一為能想之心亦名法愛以其不捨湛一之境也即此法愛情念更是一種貼體難刮之垢若能於此二俱遠離則法眼當下清明以粗細塵垢淨盡無餘故也按後圓通此科應齊盡聞不住乃至寂滅現前至此則湛一亦忘何六根之可結哉二決成正覺云何不成無上知覺上法眼清明似方至於初住今即許以究竟極果良以因地真正則果無紆屈而從初發心必成正覺矣驗釋根性斷滅疑已竟
