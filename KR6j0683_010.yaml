body:
  text: 京都西湖沙門交光真鑑述想陰魔相已竟四行陰魔相此陰前於二卷五陰科中彼約迷位故取其粗譬如瀑流此約修位故取其細喻同野馬以前三已空而所餘行陰最為深細分三一具示始終又二一始初未破區宇又二一躡前想陰盡相阿難彼善男子修三摩地想陰盡者是人平常夢想消滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑑明來無所粘過無縱迹虗受照應了罔陳習惟一精真前來十種若具透過或始終不起愛求或魔來便能先覺如是久久想陰自有盡時故此科示想盡之相寐即睡也寤即醒也寐中有夢寤中有想然夢乃寐中之想想乃寤中之夢皆獨頭意識所為想陰之體相也故想陰盡者夢想皆滅由寐無夢而寤無想故寤寐恆常一念不生自是性覺妙明之體豈不恆常虗而無窒礙靜而無喧雜如雲散空澄且粗重塵影即是法塵全依想陰為體想盡塵自無依故言無復粗塵等此以上約心之自體妙觀諸下約心之照境妙也又上獨影先虗也以下性境亦虗也如鏡鑑明者蓋言心照山河等如鏡現影無罣礙也過者離境之後也無迹者如鏡還空無留滯也虗受照應者收束上文言心之觸境但虗受照應而已明心境皆虗融也末二句總言想盡真純以結之也罔無也宿積深厚曰陳習即習氣也蓋浮想擾心誠宿積難除之習氣今乃一旦滅盡故言了罔謂了不可得也惟一精真者純一虗靜覺明之體也二狀示行陰區宇生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇生滅指分段生死而言三界衆生所以生滅無停根元皆是行陰所遷前三陰未破則此根元終不可見今前三盡除第四自現殫盡也十二類生該盡天上人間四空不出行苦正謂此耳故曰畢殫其類也環師謂由緒為識陰而生基為行陰見二陰深淺之殊圓師謂各命為別相同分為總相定二陰細粗之別皆宜深玩之也莊子注中已辨野馬但是陽焰非是塵埃且熠字從火既表光明閃爍足顯與焰為順乃田間地氣春晴伏地可見狀如水而光如焰也清擾言動之細微也焰喻正表隱微難見若通前後俱用水喻則想陰尚如大浪行陰乃如細浪識陰則如無浪流水真覺性體當如湛然不動之水故行陰為分段根元識陰為變易根元前後較量粗細妄真歷然指掌故知惟一精真亦縱許也浮根塵即浮根四塵謂肉身也究竟樞穴謂遷謝老死之深本全在於此矣末結行陰區宇蓋獨取熠熠清擾為其相也二終破顯露妄源若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超衆生濁觀其所由幽隱妄想以為其本首舉行陰而稱元性明其為生滅之根元性體也水浪停息曰澄元澄即識陰也性入元澄者蓋細浪之行水收歸無浪之識海元習即行陰種子一澄元習者永絶行陰之種習更不起也下喻可明全孚前之水喻溫陵曰生滅不停業運常遷名衆生濁故行陰盡則超之行陰密移曾無覺悟故曰幽隱妄想具示始終已竟二中間十計變境言計者顯此但是自緣定中所見而生種種邪計非有外境魔事之擾也就分十一二種無因又為三一標由示墜阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論此下十計既當想陰已破行陰未破中間所起故此科牒敘想破行現以為發端是得正知者即不遭邪慮也奢摩他中者即圓定發明也凝不動也即始終不起愛求明不迷也即魔來先覺不惑正心即雙承不動不迷而頭正尾正也如是則上來十類天魔畢竟不得方便方得精研者始能力破想陰也窮生類本者初得徹至行陰也此上方以歷述想破行現竟於本下却說正因行現而遂起十種邪計良以想破之後天魔無可奈何不復更至惟是自心邪解作孽所謂心魔也本類即十二類生元即行陰也露顯現也圓者遍十二類也幽清擾動即微細動相圓元勒成行名二無因論乃先世外道修心邪解所立違理背正之惡見耳今行現之解適與之同故即墜彼論中如後車蹈前車之覆轍故即同墮一坑塹也後文諸論皆放此意二分條詳釋又二一本無因此約過去不得達因而立又分三一據己見量一者是人見本無因何以故是人既得生機全破乘于眼根八百功德見八萬劫所有衆生業流灣環死此生彼只見衆生輪回其處八萬劫外冥無所觀前二句標定下徵釋之生機發動之本即指行陰破乃顯意非盡也見屬于眼故乘眼功德八百八萬其數相應而已不必分約過未數反不合蓋乘眼根全分功德合乎定力能徹見於過去諸類業流即宿命通也問此何不為別相答亦多總見類生展轉生死無停而已非一一各詳也若能各詳則不成自然之執待下執自然處再當明之其處者八萬劫以內也蓋其通力分量止於此數故數外冥無所見矣二謬成邪計便作是解此等世間十方衆生八萬劫來無因自有以不見處而起無因之計約此則名無因外道嶽師謂即冥諦是也蓋衆生三道展轉相因窮極無始惟佛眼能徹菩薩尚有分限何況凡小故凡小極其通力但此而止嶽師責其不知因識非是縱知因識亦豈能窮乎三失真墮外由此計度亡正遍知墮落外道惑菩提性邪計故非正知不了業道無始故非遍知末言已墮邪覺終迷正覺矣二末無因此約未來無後因果分三一據己見量二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移標徵同前據釋詞乃是詳推過去例定未來生即劫內類生根即劫外無因蓋即以無因為類生元本知人下詳明皆本無因自然而然也故此轉記名為自然外道然此驗知但是總相見於多分衆生長時不變輒起斯計如人總觀閙市但見人行不見坐立若能一一別察則少分坐立者亦應知之良以十二類生惟人類易轉而餘皆長時難變今由總見不能別觀故約多分而成自然之計是以末二句結成無變嶽師注此意同但引鶖子觀鴿之事應不盡同彼能別相而見如來故擇常不變者令其別觀欲勉其進也且四果羅漢行開識現便能別見各命由緒終不執於自然二謬成邪計今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因上科全是詳推過去此科方以例定未來盡形者盡未來也亦如是者決定其皆不改移也下釋成之本來不見菩提者言八萬劫前元不見其從菩提性起也云何下言例知八萬劫後亦終不成也當知下遂以判決執成邪計矣嶽師謂本字合是末字是也末無因者言八萬劫盡終成斷滅無復因果而已蓋以從無因而起者還復無因返於冥初之意但是推前而知不言觀後而見疑恐行陰未破不能前後劫同不然何用種種推前再詳三失真墮外由此計度亡正遍知墮落外道惑菩提性準上可知三結成外論是則名為第一外道立無因論二種無因已竟二四種遍常分三一標由示墜阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四遍常論大意但因窮至行陰尚猶被覆而未見其幽隱遷流遂於未遍未常者早計遍常是謂常見外道然四種雖皆不離行陰起計而前三皆兼窮他法且以法之廣狹而分劫之多少惟第四則無所兼而亦不言劫量此其別也長水曰行陰生滅相續不失故名常所計四種遍一切法故名圓溫陵曰遍即圓也故此標名遍常後結名圓常二分條詳釋分四一心境計常一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常首二句言是人想破行現乘此心開遂以窮研內心外境本元自何而起然窮之不遠但見二萬劫前無因自有良以所窮之法粗略而狹故其見量止此而已修習者即窮心境之修習能知下蓋言二萬劫外固冥無知見而二萬劫內親見衆生生滅不斷故不計劫外斷滅惟計劫內相續為遍常以是異前後三準此二四大計常二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常此亦乘心開而窮化元見萬法皆從四大和合而成故作意窮之見其體性常住洞照衆生生死劫量至於四萬比上所窮之法稍為詳廣故其照劫數倍於前然計常之故亦凖前人但據劫內而已三八識計常三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常根字決是識字之訛不必能所曲釋蓋末那執受既是七八前是六識無疑況下復以心意識逆次收束八七六識猶可驗知舊注諸師疑此處行陰未開豈能窮徹八識殊不知八識但是此人乘開心後所用進修法門徹固未徹窮乃許窮例如聲聞窮四諦法但盡生滅豈能徹無作底至於本元由處嶽師謂別指行陰是也以彼尚為行覆故所徹性元但止行陰而妄謂真常耳特以所窮八識法門深廣詳切倍前四大故所知劫數亦倍前人而遠窮八萬也至於劫內觀生計常不殊前計矣四想盡計常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常斯人於想盡行現之後無復窮研之力便計為常比之第一尚為淺劣何況二三故不復立能知之劫量度其所知必不逮於二萬劫矣以是推知前文本無因中所以照八萬劫者亦應乘眼功德更加窮研之力方始能之非想盡即能也溫陵曰想元想陰也生理行陰也妄謂流轉生滅皆屬想心今已永滅則不生滅理自然屬行不知行陰即生滅元也三結成外論由此計常亡正遍知墮落外道惑菩提性是則名為第二外道立圓常論非遍圓而計遍圓非真常而計真常故墮邪覺而失正覺矣此中不必取舊注強分屬於五陰而言前廣後狹反顛亂於本文矣四種遍常已竟三四種顛倒合前二計觀之二無因似觀劫外斷處而計無常四遍常似觀劫內續處而計常各皆單計而已今此乃是雙計常與無常也分三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論此於想盡行現之後窮研自他而起邪妄分別更是或單或雙不離自他而已非一一雙兼也首楞定中須了一切事究竟堅固方為正覺今乃常與無常等分計之故成顛倒見二分條詳釋分四一雙約自他一者是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性吳興曰觀妙下重舉觀行湛然下正明起計亦由不了行陰生滅妄謂此處心性湛然以為神我言神我者外道名主諦謂一切法皆是我所悉以此神而為其主此蓋二十五諦中末後諦也二卷說有真我遍滿十方亦即此耳當知自心無生滅即計自是常衆生於我心中生死即計他是無常故為雙計二約他國土二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常既曰不觀其心顯是單觀他法即惟觀國土也吳興曰三禪以下終為三灾所壞名無常種性四禪以上災不能壞名究竟常三約自身心三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性身心皆自而別觀心能細轉不變為常令身生死變壞為無常然外道所計我相有三一微細我二廣大我三大小我此微細我也精言非雜細言非粗微言非著密言非顯如微塵言細小難見知也流轉二句即計其自心常不生滅能令下即計其自身無常生滅也末四句牒定常與無常上二句牒心下二句牒身豈非單約自而成計耶四雙非他自四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常此觀前四陰而起計以自他不純故言雙非計行則非他以行是自心故計三陰則非純自心以色有外六塵故若約自多他少以少從多亦可科云約自四陰今圖四義不缺不重故作是科其分常與無常文易可了三結成外論由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論此蓋所約自他雖單雙不定而所計常與無常皆同雙計也四種顛倒已竟四四種有邊文中雖雙計有邊無邊理實但是邪計邊見而已非真得於無邊理體故以正教判之但名有邊詳其立意殆以有邊為有限際非勝法也以無邊為無限際是殊勝法例如雙計常與無常而惟取常為勝也分三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論溫陵曰分位有四謂三際分位見聞分位彼我分位生滅分位二分條詳釋分四一約三際一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊溫陵曰生元流用行陰也因遷流計三際以過者已滅來者未見故名有邊現在相續故名無邊既取現心續處為無限際則必以過未斷處為有限際然現心無限際者以當念觀心浩渺無涯岸之謂也二約見聞二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊此與前計相反嶽師所謂回互倒計是也前計過未為有邊似計無見聞處也計現在為無邊似計有見聞處也今却計劫內有見聞處為有邊以其限於八萬之數也計劫外無見聞處為無邊以其無窮極而不可測知也吳興曰後八萬劫亦合如前今恐存略三約彼我三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性首三句自任無邊之性下言彼人現我知中者謂彼性但在我性之中也我曾不知彼性者謂我於自性之中不見別有彼之知性也亦明彼性不能外於我性之意末二句遂判彼為有邊性也四約生滅四者是人窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊窮行陰空者蓋斯人窮至行陰不了區宇未空而遂謂真空寂滅之性故下半生半滅乃據見妄度衆生身中自想陰以前半屬於生自行陰以後半屬於滅更判生為有邊滅為無邊而意取行陰空寂為無限際之勝性也三結成外論由此計度有邊無邊墮落外道惑菩提性是即名為第四外道立有邊論四種有邊已竟五四種矯亂分三一標由示墜又三摩中諸善男子堅礙正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂遍計虗論知見生計者據彼定中所知所見而倒計也溫陵曰以邪倒故於知見中狂解不決遂矯亂其語也今之邪人妄謂得道而中無主正矯惑於人者多類此四資中曰準婆沙論釋外道計天常住名為不死計不亂答得生彼天若實不知而輒答者恐成矯亂故有問時答言祕密言亂不應皆說或不定答佛法訶云此真矯亂故名不死矯亂虗論也二分條詳釋又為四一八亦矯亂一者是人觀變化元見遷流處名之為變見相總處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句長水曰於一生滅行陰分為八義別見謂變恆生滅增減有無也答中略舉六義以不能定其道理但兩楹而答故云亦生亦滅等八義雖皆依行而起而實約行陰中所見萬象以別計也故言相續之因性不斷者此是由象推性方成增計所以別於恆也增者多餘也正相續中所離者蓋凡言相續必是前後相續故中間亦必有缺乏之處如出入二息相續則必缺於中交是也缺少即減也互互亡處即各各滅處也前人即問義之人也失章句有二意一謂答者既自矯亂聞者自難憶持故隨聞隨失也二謂言既兩持是非不決能令聞者番疑平日舊習經論猶言喪其所守也二惟無矯亂二者是人諦觀其心互互無處因無得證有人來問惟答一字但言其無除無之餘無所言說嶽師釋得證謂悟一切法皆無也蓋執拗而不順於理為矯心無主正為亂今詳第一第四言皆兩可亂意為多而終非順理亦兼於矯也第二第三言惟一偏矯意為多而終非主正同歸於亂故總名矯亂勿疑一字為非亂也三惟是矯亂三者是人諦觀其心各各有處因有得證有人來問惟答一字但言其是除是之餘無所言說不言有而言是以所見既偏於法法皆有則隨所問莫不皆是故作如是答也四有無矯亂四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰枝者如木一本而分二枝即空有岐二兩楹不定之意吳興曰從二至四於前八中有無分出也二三單計第四兩亦有即是無如冰是水也無不是有如水非冰也四句之中但涉三句未見雙非其計猶粗三結成外論由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂遍計虗論虗無謂虗妄非實也顛倒性明其見非真正末判屬於遍計執性見其執繩為蛇妄之至也四種矯亂已竟六十六有相分為三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒資中曰無盡流即行陰也由見無盡故言死後有相真悟無生了知初生本即有滅是知生前尚空洞而無相何況死後豈可妄計有相耶二詳釋其相又二一正成本計又二一分條例顯或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色此即外道六十二見中四計也初自固身者堅持護養也云色是我者同彼即色是我也二我含國土云我有色者同彼我大色小色在我中也三前緣隨我云色屬我者同彼離色是我也前緣沇師謂即目前之色是也回復即運用也既云屬我顯是我所與我為二非即我矣四我依行中云我在色者同彼色大我小我在色中也沇師謂行相續相即色故我行中即色中也二總勒名數皆計度言死後有相如是循環有十六相環師謂於色作此四於受想行亦然故成十六相我故科上名例顯也敏師謂不言識陰者所計之我即識陰也嶽師非之乃謂行陰未破識不當情故不言之耳二更成轉計從此或計畢竟煩惱畢竟菩提兩性竝驅各不相觸上因見行無盡遂計前三已滅之陰仍復無盡而同成有相此更轉計一切染淨諸法無不皆然故言煩惱攝盡染法言菩提攝盡淨法皆無盡而恆有竝驅即竝行也各不相觸猶言各不相礙也三結成外論由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論吳興曰言五陰者通結五陰正在前四又雖在前四義惟行陰耳十六有相已竟七八種無相又三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒此與上計敵體相番故變有成無蓋上覩未滅之行陰見其無盡而因計前三并萬法皆當無盡此覩已滅之前三見其無相而因計行陰并萬法皆當無相也二詳釋其相分二一正成本計又為二一分條例顯見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性消散縱有生理而無受想與草木同上總標無相此分條一一明之色為形想為心而受則雙以連持色心今因皆滅故形無因心無繫而受無連綴也下乃例顯行陰亦應同滅成無相也溫陵曰陰性消散謂色受想滅也生理即行謂無受想則行亦滅也二總勒名數此質現前猶不可得死彼云何更有諸相因之勘校死後相無如是循環有八無相此質即指現陰色心不可得者言今在定現見四陰皆無相之可得因決死後豈有相邪問此與前解中初生有滅等意何以別乎答彼約即有而空本自無生前後一際是佛正教此約昔有今無今滅後無全是生滅顛倒邪計何殊天壤哉勘校即計度也每陰各計現未二無四陰故成八無相矣二更成轉計從此或計涅槃因果一切皆空徒有名字究竟斷滅上由前三而推行陰同滅為無此更轉計諸法皆然同歸斷滅涅槃以轉生死為因故生死即涅槃之因涅槃即生死之果且生死攝世間法涅槃攝出世間法一切死後皆無故曰徒有等也吳興曰涅槃因果依現陰而修後陰而證陰既叵測修證何有邪三結成外論由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論八種無相已竟八八種俱非分三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論於行存中者見行陰未滅區宇宛在也兼受想滅者見前三已滅體相全空也雙計有無者於存計有於滅計無也自體相破者以行陰之有破前三之無以前三之無破行陰之有也末言墜俱非者以破無則成非無破有則成非有也二詳釋其相又二一正成本計又二一分條例顯色受想中見有非有行遷流內觀無不無此科全是自體相破色受想中者前三滅境之中也見有非有者言正在滅境時雖見行有亦即同滅而非有矣如暗夜中看皎潔之物亦同暗而非皎潔矣行遷流內者行陰擾動之內也觀無不無者言正在擾動處雖觀前三已無亦即同動而非無矣如動水中看靜定之影亦同動而非靜定矣互破以成雙非正自體相破也二總勒名數如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相首三句標定八非循環窮陰者歷四陰而遍計之也八俱非者正以勒成名數末三句釋成上八非之由也隨得一緣者言每於一陰也皆言有相無相乃出雙非之因所以成立上雙非之宗如云因有相故非無因無相故非有每於一陰計此二非歷四陰而成八非也故知首科但言受想滅語之略也舊注不達以因立宗之旨而釋為雙亦雙非應成十六何名八非邪二更成轉計又計諸行性遷訛故心發通悟有無俱非虗實失措此諸行乃指萬法非謂行陰如諸行無常亦指萬法也上但雙觀已滅未滅之四陰而正計八非此則更以例成轉計而謂一切法無不皆然性遷訛者例皆死後有無交相破奪也心發通悟者增廣邪見解也末二句結成一切雙非虗實亦有無也失措不定也三結成外論由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論後際即死後盡未來際也昏瞢猶言杳冥即一切皆非也道言也以有無俱不可定故無可言也八俱非相已竟九七際斷滅此之斷滅雖似第七無相而起計不同彼由前三此由行陰又彼推過去以定死後此觀未來念念成滅故計處處有斷滅處也分三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論溫陵曰見行陰念念滅處名後後無由是妄計設生人天七處後皆斷滅二具顯其相又二一分條詳釋或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅此計陰性如無源之水有流近而竭者有流遠而竭者今至近如人間即滅至遠如有頂方滅也二總勒名數如是循環窮盡七際現前消滅滅已無復七際謂四洲六欲初禪二禪三禪四禪四空共七處也消滅謂生理永無無復謂更不復有也此方儒宗末流惡聞輪轉亦計似此然但許人間即滅仍不許有餘六處也三結成外論由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論觀此亦總結於五陰則知所謂消滅者後陰全無也七際斷滅已竟十五現涅槃此計與第五有相甚大不同彼計死後有相此計現所生處即常住極果舊言從彼流出甚無謂也分三一標由示墜又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論後後有亦應準前相番前於行陰念念滅處起計此却於行陰念念生處起計後後有者蓋觀見行陰念念相續新新成有故解其當有實果必不滅無也而曰現涅槃者不待灰斷即於現所生處即是此果也其數有五下別列之二具顯其相分二一分條詳釋或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故或者不定之辭顯非一人遍計五處各隨所見或計一處而已欲界指六欲天上也為正轉依者妄計為真涅槃境也以涅槃為佛轉依之果而環師所謂轉生死依涅槃也此如仙家計六欲天上無生死耳以彼所計玉皇橫統三十三天仍不知其即六欲之帝釋也此句應通後四每於中間皆當有之而經家省文更不重標令準上也觀見圓明者以初得天眼普觀天光清淨明麗逈離人間之濁穢而已準下四皆對本天勝境為言非指性也生愛慕故者正出妄計之由謂彼圓明即涅槃真境也下四故字皆準此說按前色界天中初禪苦惱不逼二禪憂懸不逼以苦重憂輕序之宜也今初禪無憂二禪無苦決譯人誤顛倒也三禪極悅隨者前云歡喜畢具具大隨順是也四禪苦樂雙亡顯同前文雙捨不受輪回生滅者由彼定中見此處三灾不壞故起斯計也二總勒名數迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟作無為解即妄計為離繫自在之果此誤濫涅槃之真我也五處安隱者以稍離下界之不安而誤濫涅槃之真樂也為勝淨依者以稍離下界之濁穢而誤濫涅槃之真淨也結言究竟者以稍離下界之短壽而誤濫涅槃之真常也此總判五處皆然若分五處別判初於六欲乍離人間之塵穢而妄謂真淨次於初禪二禪乍離下界之憂苦而妄謂真樂又於三禪乍得隨順自在而妄謂真我後於四禪暫得三灾不壞而妄謂真常不生滅也此正於無常苦空無我不淨中而妄計常樂我淨所謂前四顛倒耳三結成外論由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論中間十計已竟三結害囑護分三一示因交互阿難如是十種禪那狂解皆是行陰用心交互故現斯悟溫陵曰前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深孽凡見道不真多岐妄計皆即狂解是謂心魔最宜深防也交互準前悟即邪解也然通論十種邪解不出斷常空有四字而已且前五屬斷常後五屬空有第一斷見第二常見第三雙亦第四第五皆充廣雙亦也問何無雙非答斷常皆過若雙非則為離過正見非外道也第六執有第七執空第八雙非問此何不為離過正見答有空不定屬過偏始過生且此雙非蓋指後陰昏瞢不定有無非是雙遮之中道故非正見第九推廣畢竟斷空第十推廣畢竟滯有若更以空有攝入斷常仍惟斷常二見而已二迷則成害衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄癡暗曰頑正悟難發也惑亂曰迷邪解易生也不自忖量者大端由於不揣己之修證至何地位輒敢自專判決立論且僭稱聖位成大妄語故墮極重之獄矣三囑令保護又分二一囑作摧邪知識汝等必須將如來語於我滅後傳示末法遍令衆生覺了斯義無令心魔自起深孽保持覆護消息邪見覺了斯義謂迷解分明不顛倒也下復令其冥顯加持之也孽者禍之萌也心魔自起者言天魔不至自心禍生也猶曰天作孽猶可違自作孽不可活也然此二句蓋今未起者勿起末二句是已起者令息也二囑作趣真導師教其身心開覺真義於無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指真義者真心實義也逈然不屬於斷常空有即前離即離非是即非即一念不生中中流入木旁出曰枝路旁出曰岐夫遭枝岐即墮外道祈求也求少足則流二乘此二皆為極果中途之險阻心目洞開方不為所惑故須教示之力也末二句囑其作成佛指南一邪不染故稱清淨耳行陰魔相已竟五識陰魔相分三一具示始終又二一始初未破區宇又為二一躡前行陰盡相阿難彼善男子修三摩地行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特伽羅酬業深脉感應懸絶諸世間性者十二類生遷流體性也同分生機者即同生基也基表生之根機明動之始其意一也同分仍目總相以上躡前行陰向下明盡相也倐然猶忽然也隳裂解散也連下四字讀之沉細極表深微綱紐狀明總要然即生機綱紐結縛之深根也由前大定堅凝正心十計不墮功夫徹至故能於此綱紐忽然解散矣末三句復明此處於三界分段生死即應解脫然亦約一類聖性習種純熟者言之餘不盡然補特伽羅此云數取趣即中有也衆生由此能數數取於諸趣而受生也且受生所以酬答宿業而酬業深潛脉絡即此行陰所為感應即因果也而言懸絶者以行陰既盡則深脉已斷故分段生死因亡果喪不復受生是謂懸絶問證同則事同此何別取於聖性熟者而餘又不然耶答按下佛言各以所愛先習迷心而自休息今言界內因果斷絶顯是十執後二聲聞緣覺所能他豈能哉二狀示識陰區宇於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇溫陵曰涅槃性天為五陰所覆昏如長夜前三陰盡如雞初鳴雖為曙兆猶沉二陰精色未分此行陰盡如雞後鳴惟餘一陰故將大明悟也六根虗靜無復馳逸者按圓通此當聞所聞盡已得六銷之時亦即漸次中塵既不緣根無所偶反流全一六用不行之時也內外湛明者言根塵化為一味湛明之境入無所入者謂初心亡所故言入流既盡根塵更何所入受命元由環師謂即識陰然亦即是類生別相所謂各命由緒顯異前之總相而見故曰深達也觀由執元諸類不召者承上言既以觀見受命由緒必能執守受生元本令不流逸則盡十二類皆不能牽引受生矣於十方界已獲其同者界指情界同有二解一謂同者一也言其銷六和合復一精明也二謂同者空也言其根塵既盡惟一空性也此即已得六銷猶未亡一小乘涅槃正齊於此精色不沉者如曉天可辨色也發現幽祕言其具見暗中之物也即是行除識現如脫盡外衣方見最內貼體汗衫故即結為識陰區宇二終破顯露妄原若於羣召已獲同中消磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本首三句猶躡未破區宇羣召即指類生十二皆能牽引受生故言羣召同中即識陰區宇之中所謂受命元由空靜湛一故稱為同然自行陰盡後已入此境故曰已獲同中消磨六門者解其結而泯其異也合開成就者歸於一而融為空也成就猶言功成此猶躡上以牒銷六成一所以起下文亡一而用六也故下方明圓通之用不惟情界脫纏而亦以情器交徹也見聞者略舉六根之二通鄰者其結已解其體不隔也互用者體既無隔用可互通也謂眼家能作耳家佛事等以其逈脫浮塵勝義二種根結無障無礙故曰清淨此即情界脫纏下文情器交徹文易可知即前所謂山河大地應念化為無上知覺是也名識陰盡一句結定故知行盡無過者在七信位齊小羅漢識盡乃十信滿心住位初心方以證入圓通是知凡言羅漢獲圓通者皆指初住以圓住齊於別地是大乘羅漢也末復結其所超所觀溫陵曰性本一真由塵隔越性用之間同異失準名為命濁故識盡則超之識乃妄覺影明元無自體由顛倒起故名罔象虗無顛倒妄想具示始終已竟二中間十執變計而言執依經本文以經文一一皆名為執故耳就分為十一因所因執又分三一兩楹之間阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓夫行陰即是前楹識陰即是後楹而十執起處正當此二之中故十執皆以此科冠之窮諸下三句明已破行陰也窮諸行空照見行蘊空也於識還元者明行空而識現則前之行相泯然沒入識海之中蓋元從識海騰躍轉生者返本還元矣已滅生滅者仍結行破也以初滅行之清擾也末二句明未破識陰也所言寂滅者即圓通中次第解結末後之寂滅也不帶纖毫生滅曰精惟餘一味寂常曰妙始是純真性體此而未圓正明識陰未破尚為所覆似一似常未精未妙也若連上句讀之宛是已得圓通中生滅既滅而尚猶未得寂滅現前耳後放此二邪解執背能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見能令下先舉起執之由大凡起執必覩大定中殊勝之象以發端耳首二句躡前銷六入一之境次三句明此境為羣心統同混一之區如千燈共室光通無二也圓元即識陰也而圓表諸類遍含元彰萬化托始其言能入此者意明四陰蕩盡歸宿於斯如諸浪已停銷落於海正識陰區宇也若於下方是所起之計所歸即此圓元因者依也因所因執者本非可依而妄計能依之心所依之境也良以識乃無明幻影罔象虗無畢竟非實故也如人夢見依歸得托之地妄生慶幸豈有真實哉下明所墮同類即黃髮外道所立冥諦有二十五第一冥初生覺遂計終亦還歸冥諦前文云非色非空拘舍黎等昧為冥諦是也然計此者非止一人前後異出耳伴侶即同類也迷菩提昧正果也亡知見失真因也放此三結名異種是名第一立所得心成所歸果違遠圓通背涅槃城生外道種溫陵曰以心有所得果有所歸即因即果皆墮所妄所以違遠圓通背涅槃也內教究竟歸無所得今有得有歸如人夢見拾得金寶歸於家中所得所歸皆非真也違圓通則失因地心背涅槃則亡果地證後皆放此因所因執已竟二能非能執分三一兩楹之間阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓準前二邪解執背若於所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見上科已將識陰作所歸果故今所歸二字仍躡前識陰也前但計為歸托之性今復覽為自體是其差別也溫陵曰執識元為自體而謂一切衆生自此流出遂執我能生彼而實不能故曰能非能執摩醯首羅即色頂魔王也妄計我能現起無邊衆生亦能非能類也二結名異種是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種能為心者能造化之心也能事果者能成辦所造化之事以為實果也溫陵曰大慢天即摩醯也不能謂能故名大慢也遍圓者計我體圓遍空界也問此計識為自心流出一切何異內教萬法惟識答內教萬法惟識表如夢幻生即無生此計實生安得一轍又惟識正明無他心外之法此計能生他法宛是顛倒奚疑乎能非能執已竟三常非常執分三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見此與上執皆從識起而所計不同上謂識即是我能生萬物此謂我從識出彼是真常是其差別也溫陵曰以識元為所歸依故疑彼能生我及一切法遂計生起流出之處為真常無生之體此則在生滅中妄計常住既惑真不生性又迷現生滅法以非常為常故名常非常執既計彼能生我即與計自在天能生一切者同矣三結名異種是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種溫陵曰由依識元妄計常住故曰立因依心成妄記果前計我圓生物此計彼圓生我名倒圓常非常執已竟四知無知執分三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背若於所知知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見溫陵曰所知即所觀識陰也謂識有知而一切法由知變起因計知體圓遍諸法遂立異解謂無情遍皆有知草木下三句承上無異言既與有情相同則當互輪轉焉無擇者不分有情與無情而遍皆有知也是其謬計無情有知而實本無知故言知無知執也環師謂婆吒霰尼乃二外道覺即知也亦計遍知之類三結名異種是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種溫陵曰此謬計圓知以為因心則果終虗謬矣以無知為知是倒知也問此與內教山河化為知覺無情作佛之旨何所簡別答孤山亦有此辨意是而辭缺明了今詳內教明見相二分本惟一心迷之為二故妄見無情不通知覺大悟復歸一心則通一知覺更無外物非謂各各有知同他心量也今計各各有知互相輪轉誠為虗謬是知內教明訓銷歸一心此執謬計成無數心豈濫同哉問今何草木為妖亦有知乎答此非草木有知是彼依草附木之精靈有知斯則仍是有情之知非彼無情之草木能知也知無知執已竟五生無生執分為三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此羣塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見環師謂識陰盡者消磨六門諸根互用今此未盡則才得隨順而已此解極是然觀中之一字足且互用之妙含之未發也且言已得隨順者已能顯發隨心順意神通變化也如身上出水身下出火十八變等是也嶽師謂圓化乃觀中所見圓融變化惟識之境固無不是然詳便於二字亦應即是隨順中圓化又云一切發生即四大之相然亦即是覩圓化之四大而種種起著也下列四種求樂愛觀是矣三大可知塵即地大而言成就者即環師謂能成器界是也大凡有形磈者皆塵所為耳崇尊尚也事供養也而言各各者或有尊供於火者乃至或有尊供於地者各隨所見而遍執也嶽師謂羣塵總指四大是也然發者出生也作者辦造也本因者根元也邪計四大為出生一切辦造一切之根元也立常住解者目為常司造化之真宰也生無生執者妄計能生萬法而實不能生也迦葉波別姓也婆羅門總姓也總有十八迦葉其一也求出生死者以四大既為出生辦造之根元則出因辦果靡不由之如果上依正清淨光明等皆彼四大為之故事之以求真常果也三結名異種是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種計著邪惑也崇事邪業也迷心謂迷己一真靈覺之心從物謂從彼四大無知之物妄求因者非因計因也妄冀果者無果望果也反將無情之物以為生物之原誠如環師所謂思果皆妄顛倒化理故名顛化種也生無生執已竟六歸無歸執分三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背若於圓明計明中虗非滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見圓明即識陰區宇計明中虗者於此境中初見前四陰盡諸有皆空即以虗無為究竟性非毀也非滅羣化者便欲灰身滅土纖塵不立也以永下復願常處虗空永為依托也歸無歸者蓋謬計斷空為休歸處不知幻滅虗境亦等空華非實歸處也無想天略舉非非想以該四空非取四禪無想也諸舜若多總舉趣空天衆為同類也三結名異種是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種圓虗無心者以取空之心為因也成空亡果者以斷滅之境為果也問此與後二乘何別答棄有取空見解志願皆同但先心各別此凡外種伏惑取空彼聖性種斷惑取空歸無歸執已竟七貪非貪執分三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見圓常亦識陰區宇歷觀上來於此一境稱圓元圓融圓明圓常義各有表元表諸法統歸融表萬化含蓄明表徹體虗朗常表究竟堅牢各與本文關涉細尋可見然同是識海周遍故皆稱圓且均是識陰似一似常之相行人不達似而非真故各隨所見而起異執耳今觀圓常而欲身常住者蓋因見性常而并欲命常即仙家性命雙修之見而又言同於精圓長不傾逝者精即性也如見性轉稱見精之例傾逝即死也即欲身命與性同圓長生不死也貪非貪執者言其妄起貪留而不知生滅無停本非可貪留也良以所托之性但惟識陰已是似常而非真常何況所兼之命全是生滅虗幻縱經多劫終落空亡豈真實常住哉阿斯陀此云無比古仙名也三結名異種是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄延種執著命元以識陰為長命之元立固妄因者以因中功夫惟求堅固妄性妄命也趣長勞果者言所趣之果徒以長勞終非常住也𤀹師謂勞應作牢為聲之誤者似為最順妄延者妄求身命延長也貪非貪執已竟八真無真執分三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背觀命互通却留塵勞恐其銷盡便於此際坐蓮華宮廣化七珍多增寶媛恣縱其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見此命異前身命以天魔不用前身故也應如環師所謂以識為命元也要之亦住世壽者之相且命以連持色心為名今互通即連持之意而塵勞不出運心役色諸欲叢擾也今言觀命留塵者以見命元既與塵勞連持則存與俱存亡與俱亡故懼塵勞盡而元命必斷由是妄起留塵之計不令銷盡且行盡識現者圓化隨心得大自在故恣意化諸欲境七珍美女於中放逸矣真無真執者妄執命元為己真宰而實非真也溫陵曰吒枳迦羅即欲頂自在天類也三結名異種是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種熾塵果者熾然恣縱塵勞妄謂果中受用也墜入欲頂天魔者生以類聚也真非真執已竟九定性聲聞分為三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背於命明中分別精粗疏決真僞因果相酬惟求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見命明者環師所謂因窮識陰深明衆生受命元由是也分別精粗者了達界外聖法為精界內凡定為粗疏決真僞者揀擇內教因緣為真外道斷常為僞因果相酬者雙明世出世間二種因果感即是修應即是證惟求感應者惟求實修實證速出三界而已背清淨道者不順無修之修無證之證了義如幻之大道也所謂下躡上確實指陳也苦集是世間果因滅道是出世果因即因果相酬也知之與斷是於世間則厭果除因慕之與修是於出世則欣果從因即惟求感應也居滅下是化城止息不趣寶所也定性聲聞不回心鈍羅漢也諸無聞下言此一類多由愚法無聞未證謂證未得謂得者也三結名異種是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種圓滿也專求曰精滿其專求取證之因心成其偏趣冥寂之斷果也為空所縛曰纏空種良以有餘涅槃位僅齊於七信識陰所覆尚不達圓通之因地安能至無餘之果地哉故均之違圓通而背涅槃也下科辟支放此定性聲聞已竟十定性辟支分三一兩楹之間又善男子窮諸行空已滅生滅而於寂滅精妙未圓二邪解執背若於圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見銷六入一為圓融破有歸空為清淨了見命元為覺明發研深妙有二獨覺觀物遷變緣覺推審因緣皆發深妙之悟即以所悟之境為涅槃歸息之地諸緣獨倫者即緣覺獨覺之同倫也餘可準前例知三結名異種是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種圓即圓融覺即覺明㳷心即清淨湛明果即以悟境為涅槃也不化圓種者不能融化透過所悟所執空淨圓影祖家所謂隱人胸次自成情也住此則障真寂滅礙圓通用終不達於寶所矣問聲聞辟支為內教正乘號出世小聖今何亦列魔數答以魔羅害正之稱今此經大定以順圓通向涅槃為益以違圓通背涅槃為損而二乘宛然違背墮之者則枝岐鈍滯害正事均非魔而何然以定性簡之是但取於不回心者而能回心固不墮斯數也中間十執已竟三結害囑護分三一示因交互阿難如是十種禪那中途成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位文雖是總結而亦可略分中途一句前八意多蓋前八魔外中途各起狂解或所歸果及熾塵果等於末二句後二意多蓋後二少乘得小為足不復前進因依一句意兼前後蓋十執無非因迷而起依迷而住皆是下方總判交互現前色陰文中二迷則成害又曲為二一總標迷妄衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成頑迷不忖解現前文所愛先習者各以積劫薰習偏愛邪種也今於定中各境界相適與先心相似者投彼病根發其痼疾即以欣取依止妄謂究竟極證末句結為墮因下科方判也二分害重輕外道邪魔所感業終墮無間獄聲聞緣覺不成增進嶽師謂七是外道八是邪魔是也夫魔外既由先心而各墮其類是業已成矣及享其修禪福盡墮獄何疑圓人住前墮義解現想陰中貪求善巧科矣此害之至重者也聲聞下明其若於先心原有二乘種習見其境界有相似處即證小果然二乘已能斷惑取證必無墮義但惟永閉化城不達寶所此害之稍輕者也永嘉所謂一愚癡一小騃是也三囑令保護汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔自作沉孽保綏哀救消息邪緣令其身心入佛知見從始成就不遭岐路存心者存如來大悲之心秉道者秉如來二利覺道此法門即辨魔法門也分別曰見見魔即顛倒分別也依嶽師七純是見八具見愛以留塵勞生勝解故也至於二乘界內見愛雖盡而界外見愛仍存如其於涅槃則迷真執似於諦理則厭有著空不達法空惟求自利等皆顛倒分別也沉亦深也綏安也邪緣即前倒見全障正真知見能消磨息滅則障盡理現於佛知見自證入矣成就即至終也魔外二乘皆違圓通背涅槃故皆岐路也詳分五魔境相一大科已竟三結示超證護持分二一先示超證謂從識破超入後心果地也又三一諸佛先證如是法門先過去世恆沙劫中微塵如來乘此心開得無上道此法門亦應總指五陰中辨魔法門諸佛乘此心開者每於一陰未開之時要須依此法門以辨別之不為十種魔境所惑方得一陰破除從色至識無不皆然故云爾也成無上道者言乘此陰破入住可以超證極果矣二識盡所超分三一識盡根融識陰若盡則汝現前諸根互用此之單舉識盡者將齊此以明超證也互用解現識陰終破科中蓋體固圓融而用亦不隔每一根中皆兼具五根之用此正初住圓通之位舊注乃判七信不思經文明言聲聞緣覺位在識陰交互未開列於魔數正齊七信何乃識開仍是七信理不通也二頓齊等覺分二一法說從互用中能入菩薩金剛乾慧圓明精心於中發化從互用中者即從初住位也能入金剛乾慧者即一超直入等覺後心也此蓋促舉始終也金剛乾慧解現八卷等覺位中圓明二句又以略表中間廓周法界曰圓寂照無邊曰明此即知見菩提之實相偈曰現在諸菩薩今各入圓明是也而言精心者揀異相似位中無明初伏之粗心也於中者於初住等覺兩楹之中也發化者以清淨禪那歷超於諸位也二喻說如淨琉璃內含寶月琉璃譬圓明精心含月譬於中發化之諸位也三示超諸位如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明此即於中發化一切諸位而確指列名也蓋識陰破後信滿入住之初一超直過以至後心然既當信滿而復超十信者全顯此經十信乃初住十心也於地而特言所行者意表入地乃真修聖位耳皆以金剛利智修斷故言金剛十地於等覺而復言圓明者見始終惟此一心但至等覺則發化之極也按天台言圓教有利根者一生超登十地清涼言解行在躬一生圓曠劫之果皆從初住超之蓋初住名發心住以是義言從初發心即成正覺故舊注謂從七信超之未敢聞命大抵詳究圓家只有二位一斷前通惑從滿觀行一超直入初住中間更不取證二斷後別惑從入初住一超直至等覺中間亦不取證而佛於圓家仍列多位者有二意一者引為漸機令欣從圓頓也二者見佛眼明極能於至迅速者能見能析也譬飛隼上山雖至迅疾然亦自下歷上但眼鈍者終不能徹見而分析之故須佛眼也三圓證極果入於如來妙莊嚴海圓滿菩提歸無所得孤山曰金剛乾慧是妙覺無間道轉入解脫道即妙覺也故云入於如來等也妙莊嚴海是福究竟圓滿菩提是智究竟歸無所得是理究竟福即解脫智即般若理即法身不縱不橫三德祕藏於茲具顯妙莊嚴海者具足萬德莊嚴之果海也圓滿菩提者完復一切種智也歸無所得者一一契合性真本有而不從外得也上二句顯修成末句顯性具蓋從性起修者而修還契性離性真外無片法可得矣先示超證已竟二後示護持又分三一首明遵古辨析此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事止觀性修說現前文覺明二句言此乃諸佛因中始覺智明詳分魔事也二正令諳識護持分二一先令自己諳識又三一諳識魔邪魔境現前汝能諳識心垢洗除不落邪見成害雖似由魔致魔實因心垢前云各以所愛先習迷心即心垢也今能諳識魔境豈但不墮魔奸兼亦洗除心垢不陷邪宗二諸魔不現陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生陰魔即心見兩魔也發雖在於最後今由即屬心垢故首先言其銷滅有以深況淺之意如云汝能依此明誨識魔除垢陰魔早已銷滅絶根何況外魔焉敢留難是以天魔及鬼神精魅悉摧心喪魄以逃遁矣三二果無障直至菩提無諸少乏下劣增進於大涅槃心不迷悶首二句言自初因以至無上智果中間略無缺乏於辨魔之法要後三句作一氣讀大涅槃是佛究竟無餘斷果所謂五百由旬之外真實寶所前行識中二十種魔外小乘皆下劣得少為足或迷馳險路或悶閉化城不成增進今惟諳識魔境則諸下劣皆增進於寶所無迷悶矣是此法門後二尚賴如此何況前三陰中利賴可知二轉令呪護衆生分為三一正教勸持若諸末世愚鈍衆生未識禪那不知說法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪未識禪那者不能明悟於諸魔境也不知說法者缺多聞性也樂修三昧者好獨領簡便之法而樂於靜修如直修反聞之定是也二兼通寫帶若未能誦寫於禪堂或帶身上三總結魔伏一切諸魔所不能動此全顯呪力極勸行人當持也三叮囑欽古教範汝當恭欽十方如來究竟修進最後垂範論自利之智則究竟之修進非中路化城之止息也論利他之悲則最後之垂範非始教不了之權義也可不敬承以利己利他哉無間問說五陰魔境已竟二因請重明五陰起滅分二一躡前請問又三一領前請後阿難即從座起聞佛示誨頂禮欽奉憶持無失於大衆中重復白佛憶持無失者於己諸法不漏落乎毫髮也二具陳三問就分三一問生起妄想如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示指前每於終破妄原各有所觀妄想以為根本今總舉之以重問也我等下申罕聞以求細示也蓋聞之熟者可一舉而便見今由曾未蒙示故乍聞未得其詳也二問滅除頓漸又此五陰為併銷除為次第盡併銷者五陰齊除也次第者五陰漸破也三問陰界淺深如是五重詣何為界淺深即各陰邊際也後文自見三願利現未惟願如來發宣大慈為此大衆清明心目以為末世一切衆生作將來眼發宣大慈者於三問一一詳示大慈無倦也下求開現未道眼可知二酬請具答分二一具答三問就分三一答生起妄想又三一標說妄想之由又三一推原生起元虗又三一明真本無陰佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空精真者純真全體也妙明者惟有寂照雙融也名之以本覺者揀非修成也而特言其圓淨者即彌滿清淨也非留下即表中不容他也亦即心經空中無色等義死生即界內分段也塵垢即界外涅槃也所謂想相為塵識情為垢也乃至者超多之詞如正報依報皆在其中極於虗空盡色邊際矣取要言之但是本覺中元無五陰而已蓋界內分段即受想行之三陰界外涅槃即識陰依正等乃至虗空即色陰也二表陰皆妄生皆因妄想之所生起皆字總躡上死生塵垢乃至虗空應以伏難起之如云既本覺中元無生死涅槃乃至虗空等五陰實法奈何即今衆生宛然現有耶答此等皆但因於五種妄想次第生起而已豈性真本有耶當知此句正乃確答妄想生起三喻妄生非實斯元本覺妙明精真妄以發生諸器世間如演若多迷頭認影元字似是緣字之訛作元頗無情味若強釋之元者總統也蓋總統前之真妄以為法說起下喻說而已言真本有而妄迷如失如演若頭本在而妄驚其失也妄本空而誤迷為有如演若影非實而錯認為真也意表五陰從本虗妄不實矣二判決倒計非是又二一直示二計俱妄妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是衆生妄心計度此中所以必斥二計者良以五陰始從妄想而生雖有恆無終依倒計而住雖無恆有所謂從畢竟無成畢竟有是故二計不忘則五陰牢不可破矣所以如來欲掘妄想之原先斥所依之計也初五句先以雙舉二計妄元無因者惟此一句是其實義也於妄二句明其迷無因而方立因緣也迷因二句又其明迷因緣而方說自然也彼虗空下例明二計皆妄也蓋虗空宛似不動不壞猶是虗幻非真何況二計本出衆生顛倒分別豈有真實義哉二縱奪況顯必妄阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者上科直斷其妄此顯其所以為妄而縱奪況顯之間仍見二計之妄有淺有深首二句縱許因緣也言汝果能知妄起處則許汝說因緣也次三句斥奪因緣非真也若妄元無者言妄若本無起處可得則說因說緣本非實有而為不了義矣以上先以縱奪因緣非真何況下方是況顯自然愈妄之甚也何況不知者何況竝因緣而亦未通達也推自然者復更違因緣而謬說自然可謂迷執中之迷執矣三結歸故說妄想是故如來與汝發明五陰本因同是妄想承明我所以說五陰同是妄想者一欲衆生了見五陰真正本因而破除無難二欲衆生捐捨五陰遍執情計而達妄無惑矣若約三性分之則精真妙明圓成本實也皆因妄起依他已虗也二計俱非偏計愈妄也標說妄想之由已竟二詳示五重妄想就分為五一色陰妄想分三一示體因想汝體先因父母想生汝心非想則不能來想中傳命色陰雖兼五根六塵今圖易顯其與想相應故且單就內身而言先因父母想生者以父母俱動染愛之想而後有赤白二陰也汝心非想則不能來者言汝之父母染想雖具而汝之中陰不作愛憎之想亦不能來入胎中是則全乘父母竝己三想成就而後結胎中命根故曰想中傳命也二引喻詳釋又二一雙引二想如我先言心想酢味口中涎生心想登高足心酸起先言者二卷想陰中言也口涎足酸全顯虗想能感通實體也二辨顯虗妄懸崖不有酢物未來汝體必非虗妄通倫口水如何因談酢出首二句言二物但是空談非是實有汝體下反言以顯體乃妄倫也言汝之身體若不與虗妄通為一類空談酢崖而口水足酸何為妄出耶二結妄想名是故當知汝現色身名為堅固第一妄想堅固妄想者言此想之體取著有力固結而不可解也如父母交遘染心并己憎愛深心其交固有力不待言矣問內根固然若兼外器何關三想答如前世界相續中言堅明立礙及與堅覺寶成等亦堅固妄想也二受陰妄想分二一轉想成受即此所說臨高想心能令汝形真受酸澀首二句躡前想陰亦即躡前喻中臨高虗想次二句但取受酸澀處以為受陰所謂轉想成受也而言真受者意明想雖無實高險而形乃受真酸澀諸受皆可例知其妄二推廣結名由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想首二句牒前妄受動體例下諸受皆是妄動吳興曰汝今現前下正示受想也順益即樂受違損即苦受合有非違非順即不苦不樂受但是文略耳溫陵曰臨高空想而酸澀真發違順皆妄而損益現馳則受陰無體虗有所明故名虗明妄想三想陰妄想分為二一身念相應由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應此科全舉想陰之虗能使色陰之實而虗實相應以見想陰之妄也溫陵曰念慮虗情也色身實質也虗實不倫而能相使者由想融之也心生虗想形取實物心形異用而能相應者由想通之也二推廣結名寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想寤想寐夢皆獨頭意識為體故即想陰而言搖動妄情者顯其皆非寂靜真心也溫陵曰寤寐搖變使心隨境使境隨心皆融通妄想也四行陰妄想分三一體遷不覺化理不住運運密移甲長髮生氣消容皺日夜相代曾無覺悟此亦例前明虗妄行陰能遷實體也首二句舉行陰也化理猶言變化之性即指行陰以遷流為相故曰不住運運猶言念念也密移者表其動之隱微也莊子喻以夜壑負舟正此密移之意但彼謂造化此言行陰也次二句正表能遷實體也蓋遷少至長遷壯成老也日夜相代即剎那剎那不得停住也曾無覺悟言不能念念了知正以見遷移之密也二雙詰是非阿難此若非汝云何體遷如必是真汝何無覺此字即指行陰此若非汝者言此遷流之行陰若果非汝心耶云何體遷者詰其何能遷變汝之實體耶以見不非汝也如必是真者言此遷流之行陰若果真汝心也汝何不覺者詰其何不念念覺知耶以見不即汝也非汝是汝二不可定足知虗妄而非真矣三推廣結名則汝諸行念念不停名為幽隱第四妄想幽隱者固以遷流難知是非莫定為義亦以前三覆藏非修莫見為相也大抵受想行之三陰雖皆屬心而文中皆要顯與色身通貫受則能令色身領境想則能驅使於身行則能遷變乎體又雖說三陰通貫色身而實要顯身為念倫非真實有也五識陰妄想分四一縱奪真妄又二一約性縱真又汝精明湛不搖處名恆常者於身不出見聞覺知若實精真不容習妄迷位識陰雖通收八識而修斷位中前四陰盡無復粗浮遷動更何論於前七應知此惟目於第八也故此首三句先用縱詞牒定恆常精明不搖即指第八識也純一不雜而橫竪洞照曰精明所謂似一也浮想已盡而遷擾俱停曰湛不搖所謂似常也名恆常者正是牒定之詞言若即以此精明不搖之識為真常不變之性耶於身下縱其應不習妄也於身不出見聞覺知者益顯經前所示根中之性即是第八實體無疑矣但前帶妄顯真此則研真斷妄也若實精真不容習妄者如云若實精金不應混沙也習妄之事下科方以見之也二驗憶奪妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算此但約記持多年不忘舊見為八識習妄之過蓋最初熏習雖由前六而憶持不忘非前六所能前六如聚斂之臣第八似庫藏之吏第七同出納之官故知此論收執不忘惟約第八也理實此識尚能憶持多劫無量種習次第成熟豈止現生之多年乎舊注不達濫收前七失旨甚矣湛不搖中念念受熏者言見物之後雖似忘情置過而實念念熏持無有剎那間歇如其不然於後覆覩豈能宛然現前耶有何籌算者言此方是驗一物之不忘而實持種之無量積習以無邊故云爾也二正申喻示阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習急流水須取無波平流之急水望如恬靜者以其無波浪之參差無飛湍之上下也次二句明其正因流急故不可見非真無流也嘗對此水間驗其流拋一草葉於其水面草葉迅疾而去方覺其流之最急非無流也故佛前驗其記物如拋草葉也末二句判定仍想元也蓋前想陰之盡但盡粗想其實此陰仍是細想所以仍受此妄習也大抵究本惟一妄想但粗而著者極於色陰細而微者極於識陰也三的指滅時非汝六根互用合開此之妄想無時得滅此言識陰既非確實精真猶屬妄習然則此妄何時而方滅耶要須六根互用之時根隔合開之後此之妄想方以滅除也但經用反言以顯故云若非根解入圓此妄終無滅時也蓋互用合開正當寂滅現前獲二殊勝十信滿心十住初心之際也四推廣結名故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒細微精想現在見聞覺知者即就阿難現前六根中性一念不生之體如佛前十番開顯不動不滅等識精明元也而言中串習幾者即覩物不忘念念受熏也湛了內即精明湛然不搖之中也罔象虗無者謂其本是無明幻翳似實而虗似有而無也顛倒者迷真執似也細微者陀那細識也精想者識精明元也簡異前想陰中瀑流粗想耳詳示五重妄想已竟三總結妄想所成阿難是五受陰五妄想成溫陵曰五受陰亦曰五取蘊由一念迷妄受此取此以自蔽藏也承上總言由是觀之五陰雖淺深粗細不同而要之皆妄想所成悉非真心本有也答生起妄想已竟二答陰界淺深汝今欲知因界淺深惟色與空是色邊際惟觸及離是受邊際惟記與忘是想邊際惟滅與生是行邊際湛入合湛歸識邊際阿難前第三問云如是五重詣何為界佛今於第二答中答此問也因界者舊注以空色相因等義釋之頗無情謂今考古訓十八界乃云界者因義謂出生諸法如地生物而地為物因也今五陰即界之開合故名因界但是陰之別名而已淺深即邊際之淺深歷五陰而各有也如色陰中有相為色無相為空若離諸色相而棲心空淨祖家謂之一色邊惟識謂為空一顯色是知盡色而不盡空皆未出乎色陰邊際而一切空忍皆非究竟也受陰中取著曰觸厭捨曰離斷諸取著而不忘厭捨是猶住捨受之中故佛於離幻之後復教離離是知盡觸而不盡離亦未出乎受陰邊際而一切背捨皆非究竟也想陰中有念為記無念為忘除諸念而不忘無念是仍住於靜念之中故佛言有念無念同歸迷悶祖云莫謂無心是道無心猶隔一關是知盡記而不盡忘亦未出乎想陰邊際而一切無想皆非究竟也行陰中以迷位散心粗行為生相如二卷喻如瀑流者是也以修位定心細行為滅相如此卷喻如野馬者是也然此細行似滅非滅仍是清擾細遷如定中人不免爪生髮長足以驗之是知盡生而不盡滅亦未出乎行陰邊際而一切滅定皆非究竟也識陰中以有入為湛入蓋泯行流而沒歸識海經云性入元澄一澄元習如波瀾滅化為澄水是也以無入為合湛經云內外湛明入無所入是也蓋合字有不動之意即流急不見其流也然此合湛境界分劑非淺良以始言湛入特表行陰方消識海初入按位已當七信齊於四果而圓通正在聞所聞盡終言合湛更名識海久停湛明淨極區宇漸啓將通未通按位可當八九十信而圓通應在後三結中雖視湛入有加居然仍在識境咸不免於最細四相所遷是知盡湛入而不盡合湛終未出乎識陰邊際所謂清光照眼猶似迷家而一切明白法身俱未究竟也問識陰盡時畢竟何位答入初住證圓通也經云非汝六根互用合開此之妄想無時得滅是其明徵也問此之識陰既惟第八即是業識而別經論皆謂無明生相等覺後心方盡今言初住即盡而後位依何住持耶答彼是漸教所談初住等覺尚隔天淵豈遽說盡此是圓頓之旨經文明言從互用中頓超諸位能入金剛乾慧非等覺後心而何應知勝義中真勝義性大不思議不應以漸而難圓也然以此總較因界之淺深者若但知色為色而不知空亦是色者知色界之淺者也知空色之皆色者知色界之深者也如是乃至但知湛入為識而不知合湛亦識者知識界之淺者也知湛入合湛皆識者知識界之深者也是則發揮五重妄想可謂極盡其境界矣三答滅除頓漸阿難前第二問云又此五陰為併消除為次第盡故如來今於第三答中答此問也分為三一生滅次第此五陰元重疊生起生因識有滅從色除此五陰生滅次第即六根結解次第將明五陰雖頓悟而須漸修故先陳五陰生起滅除本有兩重次第豈得併消除哉元本也重疊生起言本由積壘非頓成也孤山曰約生則由內造外從細至粗如著衣也故迷理有識乃至有色約滅則由外至內從粗至細如脫衣也故悟理色盡至識盡二頓漸始終理則頓悟乘悟併消事非頓除因次第盡上科雙舉生滅二種次第此則單陳滅除次第而仍兼始悟則無次第而終修須次第也其言理則頓悟者理謂妄理頓悟謂了達五陰惟一妄想妄則本空一念悟徹焉有次第乘悟併消者即銷其億劫顛倒之想也如暗夜驚杌為鬼奔馳荒越一旦被人說破鬼想全消事非頓除者事謂破除修斷之事不頓除者言不能一時俱除也因次第盡者要須歷五陰次第而漸除之也如鬼想雖以全消馳途豈能遽返要須歷返前途方歸舊處矣總是頓悟漸修之意而已三責忘前教我已示汝劫波巾結何所不明再此詢問已示巾結者即五卷佛取劫波羅天所獻華巾綰結以示倫次之文何所不明者言前法喻昭然無不明了汝當即彼悟此方為善領佛誨何乃忽略於彼而再問於此哉研究斯貴則的知前觀音解六結而入圓通全同此處破五陰而入初住但法數前六此五開合參差難以細對略作兩節粗分攝之從色空乃至湛入攝前三結惟合湛二字攝後三結舊解誤以六根為六結而不達一根分具六結今解既已不從故此處舊注中橫竪之辨皆無用矣具答三問已竟二結勸傳示汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界開通者於一一陰皆了達其根元全是妄想非性實有矣此教其自利也傳示下勸其利他也令識虗妄者令其達陰妄本空如己無二也深厭自生者自之一字有二意一者自然意謂既達全妄則深切厭離之至自然生發矣二者自己意謂既悟五陰元無便發深心厭此皆由自己妄生還須自力滅除末二句言便知自性本有無蓋覆無集聚常樂我淨之果性不復更戀三界生死有漏因果矣蓋厭戀相反既厭而豈復戀哉自談七趣以至於此名超有出魔周正宗分一大科已竟三流通分此於法華既為一轍法華較顯經功流通勸讚之文品品有之至後流通大分仍延數品而斯經流通之文何甚少耶答此與法華同一轍者義理分劑同也至於流通多少略以二義推之一者疑信差別故法華廢立之初疑深信淺故洗蕩疑情為詳而發揮理行為略如知見實相等但標名字而已而顧重重較讚勸通者意在決了滯疑且令信受也此經開顯之久疑消信定故發揮理行為詳而洗蕩不信為略如知見實相等詳確搜揚竭盡不已而不多勸通者知其領受易也二者以約該博故蓋流通之文雖比法華為約實以約辭而收博義非真缺略由佛語微妙故也該博入文自見分為二一極顯經功又分二一開二利而況顯福報蓋舉少示以況顯廣示也又二一舉利他況顯又二科一舉多功較定又二一如來舉功令較阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不此中據佛所舉財田各極其盛蓋十方虗空本無邊量滿空七寶豈有量耶若是則一閻浮遍世界皆不足論凡稱財勝者縱重壘其詞終不能過於斯矣法界微塵本自無盡塵數諸佛豈有盡耶若此則三四五佛百千萬億皆未可比凡稱揚田勝者縱增崇其語終不加於是矣承事供養者即以盈空之寶承供也心無虗過者即於微塵諸佛一一無遺也是人下令其較量也然較量且從獲福以滅罪尚未及言故也二阿難較定無量阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充遍皆施珍寶窮劫思議尚不能及是福云何更有邊際首二句單以牒言財勝昔有下雙以況顯財田俱勝蓋以七錢而施一佛財田俱劣也而猶得轉輪勝報況顯遍空佛土即田勝也皆施珍寶即財勝也窮劫下決其獲福不思議而無邊際也二況顯經功超越當知況顯之意全在言外分為三一示誠言起信佛告阿難諸佛如來語無虗妄此因向下弘經之功至少而滅罪獲福至多恐難信及故此先明佛無不實不真之語令當諦信之也二明滅罪往生又三一極言惡因惡果若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷若復有人者設言有此一人也四重即殺盜淫妄十波羅夷或即十惡未見的據然波羅夷五篇第一義當極惡集云三意釋之一退沒二不共住三墮落亦譯名棄五刑如斬按下惡報極重則此四重十惡應必集至無邊此上惡因向下惡果瞬息即經者言臨墮至近也阿鼻即五無間獄之至重也窮盡十方皆經歷者獄之至多也二略舉暫爾弘經能以一念將此法門於末劫中開示末學能念之人即前臨墮獄者一念者暫時發心也此法門須確指大定圓通超出深入之一門也末劫者聖遠魔強之日也末學者難進易退之人也須知弘經既惟一念經必非多所謂四句偈等人必非衆所謂竊為一人等也三因之離苦得樂是人罪障應念消滅變其所受地獄苦因成安樂國罪障即上最重最多之惡報應念即應弘經之一念銷滅者如星火之爇積草無有不灰燼者矣變其下更言不但只消罪業仍以轉見樂而往生其中夫一念微功而能離極苦以生極樂者良以應觀法界一切惟心實華嚴破獄之偈而斯經圓彰法界極顯惟心一念持此是以能令無量阿鼻隨處滅盡難思樂土當處發生然須自信方以剋功自信不及深孤妙利痛哉三明獲福勝前得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及言不但離苦得樂仍當獲福無量超勝無比而言超前施人者即超前以虗空剎寶供塵數諸佛之人也其超越之數不但一倍二倍蓋百千萬億倍乃至算喻不及也正以斯經開如來祕密之寶藏獲本然周遍之家珍成塵剎互融之佛果故非財施之多執相之供有為之果所能及矣問全經雖有是功一念豈能盡義遽滅多愆而頓膺廣福胡不為濫賞乎答圓融不思議境智剎塵齊量而念劫相收豈以大小短長情量而測之哉宜深忍樂佛言勿自疑阻於本真之妙利也又復應知言外況顯之意此處當明蓋極重罪人一念弘經尚能滅罪獲福如此何況輕罪無罪乃至有福多福之人弘經果報殊勝可知一念尚能如此何況久弘乃至盡形一句一偈尚能如此何況一卷半部乃至全經竊謂一人尚能如此何況多人乃至在大衆中廣為人說其果報殊勝益可知矣舉利他況顯已竟二舉自利況顯阿難若有衆生能誦此經能持此呪如我廣說窮劫不盡誦經持顯文也持呪誦密經也如我廣說者謂以佛八音四辨稱揚斯人滅如上罪獲如上福窮盡劫數尚不能盡應知此中亦具有言外況顯之意良以誦經持呪方得聞慧其功其報已至佛說不盡何況進於思修如解義習定作觀反聞自性乃至達於六度萬行其功其報益不可盡說之矣問廣如上說而更加窮劫不盡豈自利反勝於利他耶答互影略耳前詳較量超越要之由經勝妙故使二利均之超勝無比均之演說不盡矣開二利而況顯勝報已竟二合二利而深許極果依我教言如教行道直成菩提無復魔業此科雙承上二利而合言之依教行道即謂遵佛以此法門自利利他方為如教行道良由斯經元以具足二利而況無上菩提必須二利圓滿方為證極故也直成菩提者從初發心以至成佛中問更無諸委曲相如水赴壑似箭穿空更無留難固非如小乘化城之中止亦非如漸教歷證之遲延所謂不歷僧祇一超直入者也末句略出其由蓋中間凡有退屈紆回皆因魔業肆擾斯經顯密加持永無魔障所以直成菩提更無留滯也是則此之流通據文無幾而研究辭旨雖重篇纍帙亦不能過豈非以約收博無所遺餘所謂我為法王於法自在信不誣矣極顯經功已竟二結衆法喜佛說此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸地方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去此科與序分相為首尾皆經家所設首句竝結正宗流通以二皆佛說故也比丘下先列歡喜之衆然此與序分列衆各有所兼故分二分前兼嘆德時會故為序分列衆此兼歡喜禮散故為流通列衆且序分列衆雖詳而缺此科列衆雖略而全請別詳略缺全之相如此科首列四衆而序分但列比丘是缺三衆也次略陳八部辭雖略而具顯八部之相序分則盡缺焉次標菩薩次標二乘皆總略而未如序分之別而詳也後加聖仙力神二衆非但序分缺之諸經未多見也然於仙而特加聖童者明其雖居仙趣而修行內教三乘聖道以希童真妙果所以揀餘仙衆也於鬼神特加發心大力者表其建志護法而具大神通力洞無畏所以揀暴惡及羸劣者也此之二衆皆能弘護流通八部收之未盡故增列之末二句正結法喜謝辭大歡喜者既聞正宗而獲本妙圓心復聞流通而知究竟弘益近無墮惡之憂遠有證真之望非同人天三乘微利得大饒益故慶非常大歡喜也去者歸也各離隨相法會各歸自心不動道場或修習或弘通非如世人離法會而遂成散亂也刊楞嚴正脉後跋豫寓上黨制斯疏時妙峯澄印輩數子清譽振於寰宇著作流於海內心祈稿成得一證明足驗乎不乖聖意但慮其值之不偶稿將半妙峯忽至潞已甚異之將往拜師已及門一見即傾倒肺腑如三生好咨其來意曰鑄萬固塔頂耳豫曰茲有佛頂當呈似君即出其稿再拜請證師亦拜受讀未竟驚曰當代僧英指摘舊解若易梁柱然茲如革故鼎新大番昔按非細事也已領其槩未盡其詳乞携歸旅寓一研味之豫唯唯別去次日往答拜師乃稽首謝曰昨披妙注抵暮徹曉不能釋手新意疊現聞所未聞楞嚴本旨如日初出非諸聖冥加決不至此願師專志速成恐時不逮刊刻之事某甲效勞豫承斯證許亦稽首謝之私念此或聖心𠃔若何遇之奇而獲證之早耶別日師復諄諄豫感時光不逮之警日夕孜孜復三載而稿完歲逼除師又忽至慶慰無量請稿如蒲豫謂非躬理之不可容緩圖之元日後復別去仲春豫遂有五頂飯僧之行轉至蘆芽華嚴寺過夏寺亦師所建也冬寓於汾次春復應臺山之請說觀經疏鈔夏游雲中留西巖寺講楞嚴值妙師應宣城之招過西嵓促豫歸蒲事亦甚奇豫乃繼行仲冬始達萬固承師厚遇種種次年二月一日命工就刊王公大人莫不與力師復吹噓於鄰郡及上谷乃至自鬻所乘以足之是以周歲而畢夫經疏科釋過四十萬言而速成如此固不無默相之者而師之法眼道力所願成就尤不可測其亦多生有大因緣於是經而鑑蒙翊助非茲一世也否則安能不期而至而緣之輳際如是乎因紀顛末以見法有所證功有所歸焉時萬曆庚子八月望日沙門真鑑謹跋不肖梃育斯叔世宿性庸愚雖嗜道真恨乏指授此生何幸值我王兄殿下研精貝典洞燭玄微深荷磨礲僅通一線稔聞交光尊師潞陽掛錫改注楞嚴梃數數神交願祈親炙戊戌歲妙峯師約師過萬固刻楞嚴新疏梃謁之領誨無量次春師講華嚴懸談梃侍坐與聞不啻撥雲覩日出井觀天頓覺身心擴周法界踰年新疏工竣荷師頒示焚香披閲始知識心為無量障源根性即真心實體反聞乃無功用道捨障源則妄盡見實體則心安用無功則頓入華嚴固無盡寶藏斯經其入華嚴之捷徑矣乎法乳汪洋粉軀莫報蕪言謬贅敢告同心時萬曆庚子中秋日持菩薩戒門下弟子體玄子朱俊梴和南謹跋
